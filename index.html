<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>LTG Werkstatt</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0f1623; color:#f1f5f9; font-family:'DM Sans','Segoe UI',sans-serif; }
    .container { max-width:460px; margin:0 auto; padding:40px 20px; text-align:center; }
    .logo { font-size:48px; font-weight:900; letter-spacing:-2px; margin-bottom:8px; }
    .line { height:5px; width:80px; background:#e2001a; border-radius:3px; margin:0 auto 48px; }
    .btn { display:block; width:100%; padding:18px; border-radius:14px; 
           text-decoration:none; font-weight:800; font-size:16px;
           margin-bottom:14px; transition:transform 0.1s; }
    .btn:active { transform:scale(0.97); }
    .btn-blue { background:#1c3a6b; color:#fff; border:2px solid #3b82f6; }
    .btn-orange { background:#2a1f0a; color:#f59e0b; border:2px solid #f59e0b; }
    .btn-green { background:#0a2010; color:#22c55e; border:2px solid #22c55e; }
    .icon { font-size:28px; display:block; margin-bottom:6px; }
    .sub { font-size:12px; opacity:0.6; font-weight:500; margin-top:4px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">LTG</div>
    <div class="line"></div>
    <a href="./werkstatt.html" class="btn btn-blue">
      <span class="icon">🔧</span>
      Werkstatt
      <div class="sub">Mechaniker · Herr Doll · Jens</div>
    </a>
    <a href="./fahrer.html" class="btn btn-orange">
      <span class="icon">🚛</span>
      Fahrer App
      <div class="sub">LKW · Sattelauflieger · Inspection</div>
    </a>
    <a href="./stapler.html" class="btn btn-green">
      <span class="icon">📦</span>
      Stapler App
      <div class="sub">Gabelstapler · Meldung</div>
    </a>
    <div style="margin-top:40px; font-size:11px; color:#374151;">
      LTG Landauer Transportgesellschaft Doll KG · Hockenheim
    </div>
  </div>
</body>
</html>
