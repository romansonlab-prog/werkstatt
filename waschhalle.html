<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LTG Waschhalle</title>
  <style>
    * { box-sizing:border-box; }
    body { margin:0; background:#f0f4f8; color:#1a2332; font-family:Arial, Helvetica, sans-serif; }
    .top { background:#1a3a6b; color:white; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; }
    .logo { font-size:28px; font-weight:900; letter-spacing:-1px; }
    .user { font-size:13px; color:#dbeafe; text-align:right; }
    .reset { background:transparent; color:#dbeafe; border:1px solid rgba(255,255,255,.25); padding:8px 10px; border-radius:10px; font-weight:800; cursor:pointer; }
    .wrap { max-width:820px; margin:0 auto; padding:18px; }
    h1 { margin:8px 0 16px; font-size:25px; }
    .card { background:white; border:1px solid #d0dbe8; border-radius:18px; padding:16px; margin-bottom:14px; box-shadow:0 8px 20px rgba(26,58,107,.07); }
    .card h2 { margin:0 0 14px; font-size:18px; }
    label { display:block; color:#4a6080; font-size:12px; font-weight:900; text-transform:uppercase; letter-spacing:.5px; margin:10px 0 6px; }
    input, select, textarea { width:100%; border:1px solid #d0dbe8; background:#fff; border-radius:12px; padding:13px 14px; font-size:16px; color:#1a2332; font-family:inherit; outline:none; }
    textarea { min-height:96px; resize:vertical; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    .btn { width:100%; min-height:52px; border:0; border-radius:14px; font-weight:900; font-size:16px; cursor:pointer; padding:0 14px; }
    .primary { background:#1a3a6b; color:white; }
    .green { background:#16a34a; color:white; }
    .gold { background:#c8a84b; color:#10254a; }
    .ghost { background:#e2e8f0; color:#1a2332; }
    .danger { background:#dc2626; color:white; }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
    .kpis { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .kpi { border:1px solid #d0dbe8; border-radius:14px; padding:12px; background:#f8fafc; }
    .kpi .v { font-size:24px; font-weight:900; }
    .kpi .l { font-size:12px; color:#4a6080; font-weight:800; text-transform:uppercase; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:10px 8px; border-bottom:1px solid #e2e8f0; font-size:14px; vertical-align:top; }
    th { color:#4a6080; font-size:12px; text-transform:uppercase; }
    .badge { display:inline-block; padding:5px 8px; border-radius:999px; font-size:11px; font-weight:900; background:#e2e8f0; }
    .done { background:#dcfce7; color:#15803d; }
    .archived { background:#dbeafe; color:#1d4ed8; }
    .empty { text-align:center; color:#7a90a8; padding:20px; }
    .msg { min-height:22px; color:#15803d; font-weight:800; text-align:center; margin-top:10px; }
    @media (max-width:720px) {
      .grid2, .grid3, .actions, .kpis { grid-template-columns:1fr; }
      th:nth-child(4), td:nth-child(4) { display:none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
(function () {
  const LTG_SB_URL = "https://vtswzvrflqoueowylidy.supabase.co";
  const LTG_SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0c3d6dnJmbHFvdWVvd3lsaWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTY4NTEsImV4cCI6MjA5MjA3Mjg1MX0.xfsewg1ZGW4UDlNJAAYR-wwXStcVJIWOyCAOavuxnRI";

  function appKey(app) { return "ltg_device_session_" + app + "_v1"; }

  function deviceLabel() {
    return [
      navigator.platform || "unknown",
      navigator.language || "",
      (screen && screen.width ? screen.width + "x" + screen.height : ""),
      (navigator.userAgent || "").slice(0, 120)
    ].join(" | ");
  }

  async function rpc(name, body) {
    const res = await fetch(LTG_SB_URL + "/rest/v1/rpc/" + name, {
      method: "POST",
      headers: {
        "apikey": LTG_SB_KEY,
        "Authorization": "Bearer " + LTG_SB_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });
    const text = await res.text();
    if (!res.ok) throw new Error(text || "RPC failed");
    try { return JSON.parse(text); } catch(e) { return null; }
  }

  function firstRow(data) {
    if (Array.isArray(data)) return data[0] || null;
    return data || null;
  }

  function saveSession(app, row) {
    const value = {
      token: row.token,
      role: row.role,
      app: row.app,
      display_name: row.display_name,
      saved_at: new Date().toISOString()
    };
    localStorage.setItem(appKey(app), JSON.stringify(value));
    window.LTG_ACCESS = value;
    return value;
  }

  function loadSession(app) {
    try {
      const raw = localStorage.getItem(appKey(app));
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  }

  function clearSession(app) {
    localStorage.removeItem(appKey(app));
    window.LTG_ACCESS = null;
  }

  async function validateStored(app, requiredRole) {
    const stored = loadSession(app);
    if (!stored || !stored.token) return null;
    try {
      const row = firstRow(await rpc("ltg_validate_device_session", {
        p_token: stored.token,
        p_app: app
      }));
      if (!row || !row.ok) {
        clearSession(app);
        return null;
      }
      if (requiredRole && row.role !== requiredRole) {
        clearSession(app);
        return null;
      }
      const value = {
        token: stored.token,
        role: row.role,
        app: row.app,
        display_name: row.display_name,
        saved_at: stored.saved_at || new Date().toISOString()
      };
      localStorage.setItem(appKey(app), JSON.stringify(value));
      window.LTG_ACCESS = value;
      return value;
    } catch(e) {
      console.error("LTG session validation:", e);
      return null;
    }
  }

  function renderGate(config, resolve) {
    const root = document.getElementById("root");
    const title = config.title || "LTG App";
    const hint = config.hint || "Bitte Aktivierungscode eingeben";
    const codeExample = config.example || "";
    root.innerHTML = `
      <div style="min-height:100vh;background:#0f1623;color:#f8fafc;font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center;padding:22px;">
        <div style="width:100%;max-width:430px;background:#172033;border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:26px;box-shadow:0 24px 60px rgba(0,0,0,.32);">
          <div style="text-align:center;margin-bottom:24px;">
            <div style="font-size:46px;font-weight:900;letter-spacing:-1px;">LTG</div>
            <div style="width:86px;height:6px;border-radius:999px;background:#dc2626;margin:16px auto 0;"></div>
          </div>
          <div style="font-size:24px;font-weight:900;text-align:center;margin-bottom:8px;">${title}</div>
          <div style="font-size:15px;color:#94a3b8;text-align:center;line-height:1.4;margin-bottom:24px;">${hint}</div>
          <label style="display:block;font-size:12px;text-transform:uppercase;letter-spacing:.7px;font-weight:900;color:#cbd5e1;margin-bottom:8px;">Aktivierungscode</label>
          <input id="ltgAccessCode" autocomplete="one-time-code" inputmode="text" placeholder="${codeExample}" style="width:100%;height:58px;border-radius:16px;border:2px solid rgba(255,255,255,.16);background:#0f1623;color:#fff;font-size:22px;font-weight:900;text-align:center;letter-spacing:1px;outline:none;text-transform:uppercase;" />
          <button id="ltgActivateBtn" style="width:100%;height:58px;border:0;border-radius:16px;margin-top:16px;background:#c8a84b;color:#10254a;font-size:17px;font-weight:900;cursor:pointer;">Gerät aktivieren</button>
          <div id="ltgAccessMsg" style="min-height:22px;text-align:center;color:#fca5a5;font-size:14px;font-weight:700;margin-top:14px;"></div>
          <div style="margin-top:22px;padding:14px;border-radius:16px;background:rgba(255,255,255,.06);color:#94a3b8;font-size:13px;line-height:1.45;">
            Dieser Code wird nur einmal auf diesem Gerät eingegeben. Danach öffnet sich die App direkt.
          </div>
        </div>
      </div>
    `;
    const input = document.getElementById("ltgAccessCode");
    const btn = document.getElementById("ltgActivateBtn");
    const msg = document.getElementById("ltgAccessMsg");

    async function activate() {
      const code = (input.value || "").trim();
      if (!code) { msg.textContent = "Bitte Code eingeben."; return; }
      btn.disabled = true;
      btn.textContent = "Prüfe...";
      msg.textContent = "";
      try {
        const row = firstRow(await rpc("ltg_activate_device", {
          p_code: code,
          p_app: config.app,
          p_device_label: deviceLabel()
        }));
        if (!row || !row.ok) {
          msg.textContent = row && row.message === "device_limit_reached"
            ? "Gerätelimit erreicht. Bitte Admin fragen."
            : "Code ist falsch oder nicht für diese App gültig.";
          btn.disabled = false;
          btn.textContent = "Gerät aktivieren";
          return;
        }
        if (config.role && row.role !== config.role) {
          msg.textContent = "Dieser Code gehört nicht zu dieser App.";
          btn.disabled = false;
          btn.textContent = "Gerät aktivieren";
          return;
        }
        saveSession(config.app, row);
        root.innerHTML = "";
        resolve(window.LTG_ACCESS);
      } catch(e) {
        console.error(e);
        msg.textContent = "Verbindung/Setup prüfen. SQL für Aktivierung schon ausgeführt?";
        btn.disabled = false;
        btn.textContent = "Gerät aktivieren";
      }
    }
    btn.onclick = activate;
    input.addEventListener("keydown", function(e) { if (e.key === "Enter") activate(); });
    setTimeout(function(){ input.focus(); }, 120);
  }

  window.LTGClearDevice = function(app) {
    clearSession(app || (window.LTG_ACCESS && window.LTG_ACCESS.app) || "");
    location.reload();
  };

  window.LTGRequireAccess = async function(config) {
    const valid = await validateStored(config.app, config.role);
    if (valid) return valid;
    return new Promise(function(resolve) { renderGate(config, resolve); });
  };
})();
</script>
  <script>
    const SB_URL = "https://vtswzvrflqoueowylidy.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0c3d6dnJmbHFvdWVvd3lsaWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTY4NTEsImV4cCI6MjA5MjA3Mjg1MX0.xfsewg1ZGW4UDlNJAAYR-wwXStcVJIWOyCAOavuxnRI";
    let access = null;
    let washTypes = [];
    let brands = [];
    let orders = [];
    let form = {
      vehicle_type: "truck",
      vehicle_brand: "",
      vehicle_model: "",
      plate_number: "",
      fleet_number: "",
      wash_type_code: "",
      wash_type_name: "",
      price_eur: "",
      duration_minutes: "",
      report_text: ""
    };

    function h(prefer) {
      return {
        "apikey": SB_KEY,
        "Authorization": "Bearer " + SB_KEY,
        "Content-Type": "application/json",
        "Prefer": prefer || "return=minimal"
      };
    }

    function today() { return new Date().toISOString().slice(0,10); }

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, function(c) {
        return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"})[c];
      });
    }

    async function getJson(url) {
      const res = await fetch(url, { headers:h() });
      if (!res.ok) throw new Error(await res.text());
      return await res.json();
    }

    async function postJson(url, payload) {
      const res = await fetch(url, {
        method:"POST",
        headers:h("return=representation"),
        body:JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(await res.text());
      return await res.json();
    }

    async function rpc(name, payload) {
      const res = await fetch(SB_URL + "/rest/v1/rpc/" + name, {
        method:"POST",
        headers:h("return=representation"),
        body:JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(await res.text());
      try { return await res.json(); } catch(e) { return null; }
    }

    function setField(k, v) {
      form[k] = v;
      renderFormOnly();
    }

    async function loadData() {
      washTypes = await getJson(SB_URL + "/rest/v1/wash_types?select=*&active=eq.true&order=name_de.asc");
      brands = await getJson(SB_URL + "/rest/v1/wash_vehicle_brands?select=*&active=eq.true&order=brand.asc");
      orders = await getJson(SB_URL + "/rest/v1/wash_orders?select=*&work_date=eq." + today() + "&order=created_at.desc");
      render();
    }

    function totals() {
      const finished = orders.filter(o => ["done","archived"].includes(o.status));
      const open = orders.filter(o => !["done","archived","cancelled"].includes(o.status));
      const revenue = finished.reduce((s,o) => s + Number(o.price_eur || 0), 0);
      const minutes = finished.reduce((s,o) => s + Number(o.duration_minutes || 0), 0);
      return { finished:finished.length, open:open.length, revenue, minutes };
    }

    function render() {
      const root = document.getElementById("root");
      root.innerHTML = `
        <header class="top">
          <div class="logo">LTG</div>
          <div>
            <div class="user">${escapeHtml(access.display_name)} · WASCHHALLE</div>
            <button class="reset" onclick="LTGClearDevice('washhall')">Gerät zurücksetzen</button>
          </div>
        </header>
        <main class="wrap">
          <h1>Waschhalle</h1>
          <section class="card">
            <h2>Neuer Waschauftrag</h2>
            <div id="formBox"></div>
            <div class="actions">
              <button class="btn primary" onclick="saveOrder()">Auftrag speichern</button>
              <button class="btn ghost" onclick="clearForm()">Formular leeren</button>
            </div>
            <div id="msg" class="msg"></div>
          </section>

          <section class="card">
            <h2>Heute</h2>
            <div id="kpiBox"></div>
            <div class="actions">
              <button class="btn gold" onclick="createArchive()">Tagesarchiv erstellen</button>
              <button class="btn ghost" onclick="loadData()">Aktualisieren</button>
            </div>
            <div id="archiveMsg" class="msg"></div>
          </section>

          <section class="card">
            <h2>Aufträge heute</h2>
            <div id="ordersBox"></div>
          </section>
        </main>
      `;
      renderFormOnly();
      renderKpis();
      renderOrders();
    }

    function renderFormOnly() {
      const box = document.getElementById("formBox");
      if (!box) return;

      const brandOptions = brands
        .filter(b => b.vehicle_type === form.vehicle_type || form.vehicle_type === "truck_trailer")
        .map(b => `<option value="${escapeHtml(b.brand + "||" + (b.model || ""))}">${escapeHtml(b.brand)} ${escapeHtml(b.model || "")}</option>`)
        .join("");

      const typeOptions = washTypes.map(t =>
        `<option value="${escapeHtml(t.code)}">${escapeHtml(t.name_de)}${Number(t.default_price||0) ? " · " + Number(t.default_price).toFixed(2) + " €" : ""}</option>`
      ).join("");

      box.innerHTML = `
        <div class="grid2">
          <div>
            <label>Fahrzeugtyp</label>
            <select onchange="onVehicleType(this.value)">
              <option value="truck" ${form.vehicle_type==="truck"?"selected":""}>LKW</option>
              <option value="trailer" ${form.vehicle_type==="trailer"?"selected":""}>Auflieger</option>
              <option value="truck_trailer" ${form.vehicle_type==="truck_trailer"?"selected":""}>LKW + Auflieger</option>
              <option value="car" ${form.vehicle_type==="car"?"selected":""}>PKW</option>
              <option value="van" ${form.vehicle_type==="van"?"selected":""}>Transporter</option>
              <option value="forklift" ${form.vehicle_type==="forklift"?"selected":""}>Stapler</option>
              <option value="other" ${form.vehicle_type==="other"?"selected":""}>Sonstiges</option>
            </select>
          </div>
          <div>
            <label>Marke / Modell</label>
            <select onchange="onBrandSelect(this.value)">
              <option value="">Bitte wählen</option>
              ${brandOptions}
            </select>
          </div>
        </div>

        <div class="grid2">
          <div>
            <label>Kennzeichen</label>
            <input value="${escapeHtml(form.plate_number)}" oninput="setField('plate_number', this.value)" placeholder="z.B. MA-LT 441" />
          </div>
          <div>
            <label>Fuhrpark-Nr.</label>
            <input value="${escapeHtml(form.fleet_number)}" oninput="setField('fleet_number', this.value)" placeholder="optional" />
          </div>
        </div>

        <div class="grid3">
          <div>
            <label>Waschtyp</label>
            <select onchange="onWashType(this.value)">
              <option value="">Bitte wählen</option>
              ${typeOptions}
            </select>
          </div>
          <div>
            <label>Preis €</label>
            <input type="number" step="0.01" value="${escapeHtml(form.price_eur)}" oninput="setField('price_eur', this.value)" placeholder="0.00" />
          </div>
          <div>
            <label>Zeit Minuten</label>
            <input type="number" step="1" value="${escapeHtml(form.duration_minutes)}" oninput="setField('duration_minutes', this.value)" placeholder="z.B. 45" />
          </div>
        </div>

        <label>Bericht</label>
        <textarea oninput="setField('report_text', this.value)" placeholder="Was wurde gemacht? Besonderheiten?">${escapeHtml(form.report_text)}</textarea>
      `;
    }

    window.onVehicleType = function(v) {
      form.vehicle_type = v;
      form.vehicle_brand = "";
      form.vehicle_model = "";
      renderFormOnly();
    };

    window.onBrandSelect = function(v) {
      const parts = (v || "").split("||");
      form.vehicle_brand = parts[0] || "";
      form.vehicle_model = parts[1] || "";
    };

    window.onWashType = function(code) {
      const t = washTypes.find(x => x.code === code);
      if (!t) return;
      form.wash_type_code = t.code;
      form.wash_type_name = t.name_de;
      if (!form.price_eur && Number(t.default_price || 0)) form.price_eur = String(t.default_price);
      renderFormOnly();
    };

    function payload() {
      return {
        work_date: today(),
        status: "done",
        washer_name: access.display_name,
        vehicle_type: form.vehicle_type,
        vehicle_brand: form.vehicle_brand || null,
        vehicle_model: form.vehicle_model || null,
        plate_number: (form.plate_number || "").trim(),
        fleet_number: (form.fleet_number || "").trim() || null,
        wash_type_code: form.wash_type_code || null,
        wash_type_name: form.wash_type_name || "Waschauftrag",
        price_eur: Number(form.price_eur || 0),
        duration_minutes: Number(form.duration_minutes || 0),
        report_text: (form.report_text || "").trim(),
        finished_at: new Date().toISOString()
      };
    }

    window.saveOrder = async function() {
      const msg = document.getElementById("msg");
      msg.style.color = "#15803d";
      msg.textContent = "";
      const p = payload();
      if (!p.plate_number && !p.fleet_number) {
        msg.style.color = "#dc2626";
        msg.textContent = "Bitte Kennzeichen oder Fuhrpark-Nr. eingeben.";
        return;
      }
      if (!form.wash_type_code) {
        msg.style.color = "#dc2626";
        msg.textContent = "Bitte Waschtyp wählen.";
        return;
      }
      try {
        await postJson(SB_URL + "/rest/v1/wash_orders", p);
        msg.textContent = "Gespeichert.";
        clearForm(false);
        await loadData();
      } catch(e) {
        console.error(e);
        msg.style.color = "#dc2626";
        msg.textContent = "Fehler beim Speichern. Tabelle/SQL prüfen.";
      }
    };

    window.clearForm = function(shouldRender=true) {
      form = {
        vehicle_type: "truck",
        vehicle_brand: "",
        vehicle_model: "",
        plate_number: "",
        fleet_number: "",
        wash_type_code: "",
        wash_type_name: "",
        price_eur: "",
        duration_minutes: "",
        report_text: ""
      };
      if (shouldRender) renderFormOnly();
    };

    function renderKpis() {
      const t = totals();
      document.getElementById("kpiBox").innerHTML = `
        <div class="kpis">
          <div class="kpi"><div class="v">${t.finished}</div><div class="l">Fertig</div></div>
          <div class="kpi"><div class="v">${t.revenue.toFixed(2)} €</div><div class="l">Umsatz</div></div>
          <div class="kpi"><div class="v">${t.minutes}</div><div class="l">Minuten</div></div>
        </div>
      `;
    }

    function renderOrders() {
      const box = document.getElementById("ordersBox");
      if (!orders.length) {
        box.innerHTML = '<div class="empty">Noch keine Waschaufträge heute.</div>';
        return;
      }
      box.innerHTML = '<table><thead><tr><th>Fahrzeug</th><th>Waschtyp</th><th>Preis</th><th>Status</th></tr></thead><tbody>' +
        orders.map(o => `
          <tr>
            <td><b>${escapeHtml(o.plate_number || o.fleet_number || "-")}</b><br><span style="color:#7a90a8">${escapeHtml((o.vehicle_brand || "") + " " + (o.vehicle_model || ""))}</span></td>
            <td>${escapeHtml(o.wash_type_name || "-")}<br><span style="color:#7a90a8">${Number(o.duration_minutes || 0)} min</span></td>
            <td><b>${Number(o.price_eur || 0).toFixed(2)} €</b></td>
            <td><span class="badge ${o.status==="archived"?"archived":o.status==="done"?"done":""}">${escapeHtml(o.status)}</span></td>
          </tr>
        `).join("") +
        '</tbody></table>';
    }

    window.createArchive = async function() {
      const msg = document.getElementById("archiveMsg");
      msg.style.color = "#15803d";
      msg.textContent = "";
      try {
        await rpc("create_wash_daily_archive", {
          p_work_date: today(),
          p_created_by: access.display_name
        });
        msg.textContent = "Tagesarchiv erstellt.";
        await loadData();
      } catch(e) {
        console.error(e);
        msg.style.color = "#dc2626";
        msg.textContent = "Archiv konnte nicht erstellt werden. Finalize-SQL prüfen.";
      }
    };

    LTGRequireAccess({
      app:"washhall",
      role:"washer",
      title:"Waschhalle",
      hint:"Einmal aktivieren. Danach öffnet sich die Waschhalle App direkt.",
