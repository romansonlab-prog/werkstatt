// === SLIDER ===
function SliderScreen({ name, onUnlock, onChange }) {
  var _x = useState(0); var x = _x[0]; var setX = _x[1];
  var _d = useState(false); var drag = _d[0]; var setDrag = _d[1];
  var ref = useRef(null); var maxR = useRef(0);
  useEffect(function(){ if(ref.current) maxR.current = ref.current.offsetWidth-78; },[]);
  function slide(cx0) {
    setDrag(true);
    var s=cx0, ox=x, cur=ox;
    function mv(e){ var cx=e.touches?e.touches[0].clientX:e.clientX; cur=Math.max(0,Math.min(maxR.current,cx-s+ox)); setX(cur); }
    function up() {
      window.removeEventListener("mousemove",mv); window.removeEventListener("touchmove",mv);
      window.removeEventListener("mouseup",up); window.removeEventListener("touchend",up);
      setDrag(false);
      if(cur>=maxR.current*0.82){ setX(maxR.current); setTimeout(onUnlock,120); } else setX(0);
    }
    window.addEventListener("mousemove",mv); window.addEventListener("touchmove",mv,{passive:false});
    window.addEventListener("mouseup",up); window.addEventListener("touchend",up);
  }
  return (

    </div>
  );
}

function WaschApp({ user, onLogout }) {

              <span style={{ fontSize:12, fontWeight:700 }}>{user.name}</span>
            </div>
            <button onClick={onLogout} style={{ border:"1px solid rgba(255,255,255,0.15)", background:"transparent", color:"rgba(255,255,255,0.5)", borderRadius:9, padding:"6px 10px", fontSize:12, fontWeight:700 }}>↩</button>
          </div>
        </div>

        {/* KPI */}
        <div className="kpi-row">
          <div className="kpi"><div className="kpi-val">{todayOrders.length}</div><div className="kpi-lab">Aufträge</div></div>
          <div className="kpi"><div className="kpi-val">{revenue.toFixed(2)} €</div><div className="kpi-lab">Umsatz</div></div>
          <div className="kpi"><div className="kpi-val">{fmtMin(totalMin)}</div><div className="kpi-lab">Gesamtzeit</div></div>
        </div>

        {/* Tabs */}
        <div style={{ display:"flex", gap:8, marginBottom:16 }}>
          <button className={"btn-sm"+(tab==="form"?" active":"")} onClick={function(){ setTab("form"); }}>+ Neuer Auftrag</button>
          <button className={"btn-sm"+(tab==="list"?" active":"")} onClick={function(){ setTab("list"); loadData(); }}>
            Heute ({todayOrders.length})
          </button>
        </div>

        {/* FORM TAB */}
        {tab === "form" && (
          <div>
            {/* Fahrzeugtyp */}
            <div className="glass-panel">
              <div className="label-cap">🚗 FAHRZEUGTYP</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                {VEH_TYPES.map(function(vt){
                  return (
                    <button key={vt.k} className={"tile-btn"+(vehType===vt.k?" active":"")}
                      onClick={function(){ setVehType(vt.k); setVehBrand(""); }}>
                      {vt.l}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Kennzeichen */}
            <div className="glass-panel">
              <div className="label-cap">🔢 KENNZEICHEN / FUHRPARK-NR.</div>
              <div className="grid2">
                <div>
                  <div style={{ fontSize:11, color:"rgba(255,255,255,0.45)", marginBottom:5 }}>Kennzeichen</div>
                  <input className="input-dark" value={plate}
                    onChange={function(e){ setPlate(e.target.value); }}
                    placeholder="z.B. MA-LT 441" />
                </div>
                <div>
                  <div style={{ fontSize:11, color:"rgba(255,255,255,0.45)", marginBottom:5 }}>Fuhrpark-Nr.</div>
                  <input className="input-dark" value={fleetNr}
                    onChange={function(e){ setFleetNr(e.target.value); }}
                    placeholder="optional" />
                </div>
              </div>
              <div style={{ marginTop:10 }}>
                <div style={{ fontSize:11, color:"rgba(255,255,255,0.45)", marginBottom:5 }}>Marke / Modell</div>
                <input className="input-dark" value={vehBrand}
                  onChange={function(e){ setVehBrand(e.target.value); }}
                  placeholder="z.B. MAN, Mercedes, Linde..." />
              </div>
            </div>

            {/* Waschtyp */}
            <div className="glass-panel">
              <div className="label-cap">🚿 WASCHTYP / WAS WURDE GEMACHT</div>
              <input className="input-dark" value={selWashType ? selWashType.name_de : ""}
                onChange={function(e){ setSelWashType(e.target.value ? { code:"manual", name_de:e.target.value } : null); }}
                placeholder="z.B. Vollwäsche, Innenreinigung, Motorwäsche..." />
            </div>

            {/* Preis & Zeit */}
            <div className="glass-panel">
              <div className="label-cap">💶 PREIS & ZEIT</div>
              <div className="grid2">
                <div>
                  <div style={{ fontSize:11, color:"rgba(255,255,255,0.45)", marginBottom:5 }}>Preis (€)</div>
                  <div style={{ position:"relative" }}>
                    <input className="input-dark" inputMode="decimal" value={price}
                      onChange={function(e){ setPrice(e.target.value.replace(/[^0-9.,]/g,"")); }}
                      placeholder="0.00" style={{ paddingRight:28 }} />
                    <span style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", fontSize:13, color:"rgba(255,255,255,0.4)", pointerEvents:"none" }}>€</span>
                  </div>
                </div>
                <div>
                  <div style={{ fontSize:11, color:"rgba(255,255,255,0.45)", marginBottom:5 }}>Dauer (Minuten)</div>
                  <div style={{ position:"relative" }}>
                    <input className="input-dark" inputMode="numeric" value={duration}
                      onChange={function(e){ setDuration(e.target.value.replace(/\D/g,"")); }}
                      placeholder="45" style={{ paddingRight:38 }} />
                    <span style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", fontSize:11, color:"rgba(255,255,255,0.4)", pointerEvents:"none" }}>min</span>
                  </div>
                </div>
              </div>
            </div>

            {/* Bericht */}
            <div className="glass-panel">
              <div className="label-cap">📝 BERICHT (optional)</div>
              <textarea className="textarea-dark" value={note}
                onChange={function(e){ setNote(e.target.value); }}
                placeholder="Was wurde gemacht? Besonderheiten?" />
            </div>

            {msg && (
              <div style={{ marginBottom:10, padding:"10px 14px", borderRadius:10,
                background: msg.startsWith("✅") ? "rgba(34,197,94,0.12)" : "rgba(239,68,68,0.12)",
                border: "1px solid "+(msg.startsWith("✅") ? "rgba(34,197,94,0.3)" : "rgba(239,68,68,0.3)"),
                fontSize:13, fontWeight:700,
                color: msg.startsWith("✅") ? "#22c55e" : "#ef4444" }}>
                {msg}
              </div>
            )}

            <button className="btn-primary" disabled={saving} onClick={save} style={{ marginBottom:8 }}>
              {saving ? "Speichert..." : "💾 AUFTRAG SPEICHERN"}
            </button>
            <button className="btn-outline" onClick={clearForm}>
              Formular leeren
            </button>
          </div>
        )}

        {/* LIST TAB */}
        {tab === "list" && (
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <div style={{ fontSize:14, fontWeight:700, color:"rgba(255,255,255,0.7)" }}>Heute — {todayOrders.length} Aufträge</div>
              <button className="btn-sm" onClick={loadData}>{loading?"...":"↻ Aktualisieren"}</button>
            </div>
            {todayOrders.length === 0
              ? <div style={{ textAlign:"center", padding:"40px 0", color:"rgba(255,255,255,0.35)", fontSize:14 }}>
                  Noch keine Aufträge heute
                </div>
              : todayOrders.map(function(o){
                  var isDone = ["done","archived"].includes(o.status);
                  return (
                    <div key={o.id} className="order-card">
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                        <div>
                          <div style={{ fontWeight:800, fontSize:16 }}>{o.plate_number||o.fleet_number||"—"}</div>
                          <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)", marginTop:2 }}>
                            {o.vehicle_type||""} · {fmtTime(o.created_at||o.finished_at)}
                          </div>
                        </div>
                        <span className={"badge "+(isDone?"badge-green":o.status==="cancelled"?"badge-red":"badge-orange")}>
                          {isDone?"✓ Fertig":o.status||"—"}
                        </span>
                      </div>
                      <div style={{ display:"flex", gap:12, flexWrap:"wrap", fontSize:13 }}>
                        <span style={{ color:"#ffa500", fontWeight:700 }}>{o.wash_type_name||"—"}</span>
                        {o.price_eur ? <span style={{ color:"#22c55e", fontWeight:700 }}>{Number(o.price_eur).toFixed(2)} €</span> : null}
                        {o.duration_minutes ? <span style={{ color:"rgba(255,255,255,0.55)" }}>{o.duration_minutes} min</span> : null}
                        {o.washer_name || o.worker_name ? <span style={{ color:"rgba(255,255,255,0.4)" }}>· {o.washer_name||o.worker_name}</span> : null}
                      </div>
                      {o.report_text && (
                        <div style={{ marginTop:6, fontSize:12, color:"rgba(255,255,255,0.55)", lineHeight:1.4 }}>{o.report_text}</div>
                      )}
                    </div>
                  );
                })
            }
          </div>
        )}
      </div>
    </div>
  );
}

// === ROOT ===
function App() {
  var _stg = useState("loading"); var stg = _stg[0]; var setStg = _stg[1];
  var _nm = useState(""); var nm = _nm[0]; var setNm = _nm[1];
  var _u = useState(null); var user = _u[0]; var setUser = _u[1];

  useEffect(function(){
    try {
      var s = localStorage.getItem(SESSION_KEY);
      if (s) { var u=JSON.parse(s); if(u&&u.name){ setNm(u.name); setUser(u); setStg("slider"); return; } }
    } catch(e) {}
    setStg("register");
  }, []);

  if (stg==="loading") return <div className="scrn" style={{ alignItems:"center", justifyContent:"center" }}><Bg /><div style={{ position:"relative", zIndex:2 }}><Logo /></div></div>;
  if (stg==="register") return <ErsteAnmeldung onNext={function(n){ setNm(n); setStg("pin"); }} />;
  if (stg==="pin") return (
    <PinScreen onBack={function(){ setStg("register"); }}
      onOk={function(){
        var u = { id:"wh_"+Date.now(), name:nm, avatar:nm.split(" ").map(function(w){ return w[0]||""; }).join("").slice(0,2).toUpperCase() };
        try { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); } catch(e) {}
        setUser(u); setStg("slider");
      }}
    />
  );
  if (stg==="slider") return (
    <SliderScreen name={nm}
      onUnlock={function(){ setStg("app"); }}
      onChange={function(){ try{ localStorage.removeItem(SESSION_KEY); }catch(e){} setNm(""); setUser(null); setStg("register"); }}
    />
  );
  if (stg==="app" && user) return <WaschApp user={user} onLogout={function(){ setStg("slider"); }} />;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
