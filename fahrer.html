  <!-- === Sentry/Glitchtip Error Monitoring ===
       Активация: подставь DSN в SENTRY_DSN ниже (отдельный проект на каждое приложение).
       Без DSN — Sentry молча отключён, ничего не отправляет.
       Получить DSN: https://glitchtip.com (бесплатно, EU) или https://sentry.io (free до 5k/мес) -->
  <script src="https://browser.sentry-cdn.com/8.45.0/bundle.min.js" crossorigin="anonymous"></script>
  <script>
    (function(){
      var SENTRY_DSN = ""; // ← вставь DSN для fahrer, пусто = выключено
      if (SENTRY_DSN && window.Sentry) {
        try {
          Sentry.init({
            dsn: SENTRY_DSN,
            release: "fahrer@2026-05-13",
            environment: location.hostname.indexOf("localhost") >= 0 ? "dev" : "prod",
            tracesSampleRate: 0.0,
            beforeSend: function(event){
              if (event.exception && event.exception.values) {
                var msg = (event.exception.values[0]||{}).value || "";
                if (msg.indexOf("ResizeObserver") >= 0) return null;
                if (msg.indexOf("extension://") >= 0) return null;
              }
              return event;
            }
          });
        } catch(e){ console.warn("Sentry init failed:", e); }
      }
    })();
  </script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js').then(function(reg) {
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
        reg.addEventListener('updatefound', function() {
          var nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', function() {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              nw.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
        document.addEventListener('visibilitychange', function() {
          if (document.visibilityState === 'visible') {
            reg.update().catch(function(){});
          }
        });
      }).catch(function(e){ console.warn('SW:', e); });

      var reloaded = false;
      navigator.serviceWorker.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'SW_UPDATED' && !reloaded) {
          reloaded = true;
          window.location.reload();
        }
      });
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (reloaded) return;
        reloaded = true;
        window.location.reload();
      });
    });
  }
</script>

function getT(lang) { return T[LANG_MAP[lang]] || T.de; }

// ── SUPABASE ──────────────────────────────────────────────────────────────────
// Генерация уникального ID записи БД. Префикс сохраняем для читаемости,
// хвост — UUID вместо timestamp, чтобы исключить коллизию при
// одновременном создании записей с нескольких устройств.
function genId(prefix) {
  var uuid;
  try {
    if (window.crypto && window.crypto.randomUUID) {
      uuid = window.crypto.randomUUID();
    }
  } catch(e) {}
  if (!uuid) {
    uuid = Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 11);
  }
  return (prefix || "") + uuid;
}
function sbGet(table, q) {
  return fetch(SB_URL+"/rest/v1/"+table+(q?"?"+q:""), {
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}
  }).then(function(r){ return r.ok?r.json():[]; })
    .then(function(d){ return Array.isArray(d)?d:[]; })
    .catch(function(){ return []; });
}
function sbPost(table, body) {
  return fetch(SB_URL+"/rest/v1/"+table, {
    method:"POST",
    headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal"},
    body:JSON.stringify(body)
  }).then(function(r){ if(!r.ok) return r.text().then(function(t){ throw new Error(t); }); return true; })
    .catch(function(e){
      // Сетевой сбой — кладём в очередь, не теряем данные. Вернём успех (данные сохранены локально).
      if (isNetworkError(e)) {
        offlineEnqueue({ table:table, method:"POST", body:body });
        return "queued";
      }
      throw e;
    });
}

// Понятное сообщение об ошибке для водителя.
// Сетевые сбои (нет интернета) → дружелюбный текст вместо "Failed to fetch".
function netErrMsg(e) {
  var msg = (e && (e.message || e)) ? String(e.message || e) : "";
  var isNet = !navigator.onLine
    || /failed to fetch|networkerror|load failed|err_|fetch/i.test(msg);
  if (isNet) {
    return "Keine Internetverbindung — bitte später erneut senden.";
  }
  return "Fehler: " + (msg || "Unbekannt");
}
function sbPatch(table, col, val, body) {
  return fetch(SB_URL+"/rest/v1/"+table+"?"+col+"=eq."+encodeURIComponent(val), {
    method:"PATCH",
    headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal"},
    body:JSON.stringify(body)
  }).then(function(r){
    if (!r.ok) return r.text().then(function(t){ throw new Error(table + " patch: " + t); });
    return true;
  }).catch(function(e){
    if (isNetworkError(e)) {
      offlineEnqueue({ table:table, method:"PATCH",
        qs: col + "=eq." + encodeURIComponent(val), body:body });
      return "queued";
    }
    throw e;
  });
}
// === OFFLINE-QUEUE ===
// Если отправка не прошла из-за сети — запрос кладётся в localStorage-очередь
// и автоматически повторяется при возврате связи. Данные не теряются.
// Только текстовые записи (фото грузятся в Storage отдельно до записи).
var OFFLINE_QUEUE_KEY = "wf_offline_queue";

function offlineQueueRead() {
  try {
    var raw = localStorage.getItem(OFFLINE_QUEUE_KEY);
    var arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}
function offlineQueueWrite(arr) {
  try { localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(arr)); } catch (e) {}
}
function offlineQueueSize() { return offlineQueueRead().length; }

// Положить запрос в очередь
function offlineEnqueue(item) {
  var q = offlineQueueRead();
  item.id = "oq_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
  item.ts = Date.now();
  q.push(item);
  offlineQueueWrite(q);
  try { window.dispatchEvent(new CustomEvent("wf-queue-changed")); } catch(e) {}
}

// Является ли ошибка сетевой (а не отказом сервера 4xx/5xx)
function isNetworkError(e) {
  var msg = (e && (e.message || e)) ? String(e.message || e) : "";
  return !navigator.onLine
    || /failed to fetch|networkerror|load failed|err_|fetch|timeout/i.test(msg);
}

// Низкоуровневая отправка одного элемента очереди
function offlineSendRaw(item) {
  var url = SB_URL + "/rest/v1/" + item.table + (item.qs ? "?" + item.qs : "");
  var headers = { "Content-Type":"application/json", "apikey":SB_KEY,
    "Authorization":"Bearer " + SB_KEY, "Prefer":"return=minimal" };
  return fetch(url, { method:item.method, headers:headers, body:JSON.stringify(item.body) })
    .then(function(r){
      if (!r.ok) {
        return r.text().then(function(t){
          // 4xx (кроме 408/429) — постоянная ошибка, не повторяем (например, дубль PK)
          if (r.status >= 400 && r.status < 500 && r.status !== 408 && r.status !== 429) {
            return { ok:false, permanent:true, msg:t };
          }
          throw new Error(t);
        });
      }
      return { ok:true };
    });
}

// Отправить всё что в очереди (по очереди, бережно)
var offlineFlushing = false;
function offlineFlush() {
  if (offlineFlushing) return Promise.resolve();
  if (!navigator.onLine) return Promise.resolve();
  var q = offlineQueueRead();
  if (!q.length) return Promise.resolve();
  offlineFlushing = true;

  function step() {
    var cur = offlineQueueRead();
    if (!cur.length) { offlineFlushing = false;
      try { window.dispatchEvent(new CustomEvent("wf-queue-changed")); } catch(e) {}
      return Promise.resolve(); }
    var item = cur[0];
    return offlineSendRaw(item).then(function(res){
      if (res.ok || res.permanent) {
        // Успех ИЛИ постоянная ошибка (дубль и т.п.) — убираем из очереди
        var rest = offlineQueueRead();
        rest.shift();
        offlineQueueWrite(rest);
        try { window.dispatchEvent(new CustomEvent("wf-queue-changed")); } catch(e) {}
        return step();
      }
      offlineFlushing = false;
      return Promise.resolve();
    }).catch(function(){
      // Сеть снова пропала — стоп, повторим позже
      offlineFlushing = false;
      return Promise.resolve();
    });
  }
  return step();
}

function offlineInit() {
  window.addEventListener("online", function(){ offlineFlush(); });

function compressPhoto(b64, maxWidth, quality) {
  maxWidth = maxWidth || 1200;
  quality = quality || 0.75;
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      var canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = function(){ resolve(b64); };
    img.src = b64;
  });
}
function compressAll(photos) {
  return Promise.all(photos.map(function(p){ return compressPhoto(p); }));
}
function uploadPhoto(b64, alertId, i) {
  if (!b64) return Promise.resolve(null);
  return fetch(b64).then(function(r){ return r.blob(); }).then(function(blob){
    var ext = blob.type && blob.type.indexOf("png")!==-1?"png":"jpg";
    var path = "eingang/"+alertId+"/photo_"+i+"."+ext;
    return fetch(SB_URL+"/storage/v1/object/inspection-photos/"+path, {
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":blob.type||"image/jpeg","x-upsert":"true"},
      body:blob
    }).then(function(r){ return r.ok?(SB_URL+"/storage/v1/object/public/inspection-photos/"+path):null; });
  }).catch(function(){ return null; });
}
function uploadAll(photos, alertId) {
  if (!photos.length) return Promise.resolve([]);
  return Promise.all(photos.map(function(p,i){ return uploadPhoto(p,alertId,i); }))
    .then(function(urls){ return urls.filter(Boolean); });
}

// Ранняя загрузка одного фото во ВРЕМЕННУЮ папку — сразу при добавлении.
// Так фото переживает выход/вход (URL хранится, не base64 в localStorage).
// При отправке заявки URL уже готов — перезаливать не нужно.
// Собирает финальные URL из photos. Большинство уже загружено (uploadPhotoEarly).
// Если какое-то ещё грузится / не успело — доуливаем по alertId как раньше.
function collectPhotoUrls(photos, alertId) {
  if (!photos || !photos.length) return Promise.resolve([]);
  var ready = [];
  var pending = [];
  photos.forEach(function(p){
    if (typeof p === "string") { pending.push(p); return; }      // старый формат base64
    if (p && p.url) { ready.push(p.url); return; }                // уже загружено
    if (p && p.b64) { pending.push(p.b64); return; }              // ещё не успело — догрузим
  });
  if (!pending.length) return Promise.resolve(ready);
  return compressAll(pending)
    .then(function(c){ return uploadAll(c, alertId); })
    .then(function(urls){ return ready.concat(urls.filter(Boolean)); });
}

function uploadPhotoEarly(b64) {
  if (!b64) return Promise.resolve(null);
  var tmpId = "_tmp/" + Date.now() + "_" + Math.random().toString(36).slice(2,8);
  return compressPhoto(b64).then(function(c){
    return fetch(c).then(function(r){ return r.blob(); }).then(function(blob){
      var ext = blob.type && blob.type.indexOf("png")!==-1?"png":"jpg";
      var path = "eingang/"+tmpId+"/photo_0."+ext;
      return fetch(SB_URL+"/storage/v1/object/inspection-photos/"+path, {
        method:"POST",
        headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":blob.type||"image/jpeg","x-upsert":"true"},
        body:blob
      }).then(function(r){ return r.ok?(SB_URL+"/storage/v1/object/public/inspection-photos/"+path):null; });
    });
  }).catch(function(){ return null; });
}

function PhotoUpload({ photos, setPhotos, t }) {

    Promise.all(files.map(function(f){
      return new Promise(function(res){ var r=new FileReader(); r.onload=function(ev){ res(ev.target.result); }; r.readAsDataURL(f); });
    })).then(function(arr){
      // Добавляем с флагом uploading, сразу грузим в Storage (переживёт выход/вход)
      var newItems = arr.map(function(b64){ return { b64:b64, url:null, uploading:true }; });
      var base = photos.concat(newItems);

      newItems.forEach(function(item, idx){

    };
  }, []);
  if (n <= 0) return null;
  return (

      {n} wartet auf Senden
    </div>
  );
}

  function setCheck(k,v){ setChk(function(prev){ var n=Object.assign({},prev); n[k]=v; return n; }); }

        }).then(function(){

  if(done){

        <div className="insp-hd">
          <div className="tsp"></div><div className="sp"></div>
          <div className="col">{t.okH}</div><div className="col">{t.nOkH}</div>

              <button className={"insp-btn"+(chk[c.k]==="fail"?" fail-on":"")} onClick={function(){ setCheck(c.k,"fail"); }}>✕</button>

          {(typeof window!=="undefined"&&(window.SpeechRecognition||window.webkitSpeechRecognition))&&(
            <div>
              <button type="button"
                onPointerDown={function(e){
                  e.preventDefault();
                  if(voiceNotesRef.current)return;
                  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
                  var rec;
                  try{rec=new SR();}catch(err){return;}
                  rec.lang=speechLang(lang);rec.continuous=false;rec.interimResults=true;rec.maxAlternatives=1;
                  var finalText="";

                    var captured=finalText.trim();

                    setVoiceNotesText("");

                  try{rec.start();}catch(err){voiceNotesRef.current=null;setVoiceNotes(false);}
                }}
                onPointerUp={function(e){
                  e.preventDefault();
                  if(!voiceNotesRef.current)return;
                  try{voiceNotesRef.current.stop();}catch(err){}

                  if(!voiceNotesRef.current)return;
                  try{voiceNotesRef.current.stop();}catch(err){}

                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                {voiceNotes?"Loslassen...":"Gedrückt halten — Sprechen"}
              </button>
              {voiceNotes&&voiceNotesText?<div style={{marginTop:6,padding:"8px 12px",borderRadius:"var(--radius-sm)",background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.2)",fontSize:13,color:"rgba(255,255,255,0.7)",fontStyle:"italic"}}>{voiceNotesText}</div>:null}
            </div>

          <span>{checkedCount}/{items.length} {t.inspected}{hasFault?" · "+t.faultShort:""}</span>

        {errMsg && <div style={{ color:"#ef4444",fontSize:13,marginBottom:8,fontWeight:700 }}>{errMsg}</div>}
      </div>

        <button className="btn-primary" disabled={!allDone||!sel||!sel.plate||sending} onClick={submit}>
          {sending?t.sending:t.submit}
        </button>
      </div>
    </div>
  );
}

// ── BREAKDOWN ─────────────────────────────────────────────────────────────────
function BreakdownScreen({ driverName, driverNied, lang, setLang, onBack }) {
  var t=getT(lang);
  var _veh=useState([]); var vehicles=_veh[0]; var setVehicles=_veh[1];

  // Восстановить черновик
  var _draftInit = (function(){
    try { var d=localStorage.getItem(DRAFT_KEY_FAHRER); return d?JSON.parse(d):{}; } catch(e){ return {}; }
  })();

  var _sel=useState(_draftInit.sel||null); var sel=_sel[0]; var setSel=_sel[1];
  var _bt=useState(_draftInit.bType||null); var bType=_bt[0]; var setBType=_bt[1];
  var _urg=useState(_draftInit.urg||null); var urg=_urg[0]; var setUrg=_urg[1];
  var _loc=useState(_draftInit.loc||""); var loc=_loc[0]; var setLoc=_loc[1];
  var _gps=useState(false); var gpsLoad=_gps[0]; var setGpsLoad=_gps[1];
  var _gacc=useState(null); var gpsAcc=_gacc[0]; var setGpsAcc=_gacc[1];
  var _desc=useState(_draftInit.desc||""); var desc=_desc[0]; var setDesc=_desc[1];
  var _svd=useState(false); var voiceDesc=_svd[0]; var setVoiceDesc=_svd[1];
  var _svdt=useState(""); var voiceDescText=_svdt[0]; var setVoiceDescText=_svdt[1];
  var voiceDescRef=useRef(null);
  // Фото: восстанавливаем из черновика только уже загруженные (с url).
  // base64 в черновик не пишем (большие), поэтому переживают только залитые в Storage.
  var _ph=useState((_draftInit.photos && _draftInit.photos.length)
    ? _draftInit.photos.filter(function(x){ return x && x.url; })
    : []);
  var photos=_ph[0]; var setPhotos=_ph[1];
  var _snd=useState(false); var sending=_snd[0]; var setSending=_snd[1];
  var _sent=useState(false); var sent=_sent[0]; var setSent=_sent[1];
  var _err=useState(""); var errMsg=_err[0]; var setErrMsg=_err[1];
  var _wk=useState(_draftInit.targetWerkstatt||"hockenheim"); var targetWerkstatt=_wk[0]; var setTargetWerkstatt=_wk[1];
  var sendingRef = useRef(false);

  // Автосохранение черновика
  useEffect(function(){
    try {
      // В черновик кладём только загруженные фото как {url} — короткие строки.
      // b64 НЕ сохраняем (раздуют localStorage, лимит ~5MB).
      var photoMeta = (photos||[])
        .filter(function(p){ return p && typeof p === "object" && p.url; })
        .map(function(p){ return { url:p.url }; });
      localStorage.setItem(DRAFT_KEY_FAHRER, JSON.stringify({
        sel:sel, bType:bType, urg:urg, loc:loc, desc:desc, targetWerkstatt:targetWerkstatt,
        photos: photoMeta
      }));
    } catch(e) {}
  }, [sel, bType, urg, loc, desc, targetWerkstatt, photos]);

  useEffect(function(){
    sbGet("vehicles","select=id,plate,brand,model&order=plate").then(function(rows){
      setVehicles(rows.map(function(r){ return {id:r.id,plate:r.plate,brand:(r.brand||"")+(r.model?" "+r.model:""),type:r.type}; }));
    });
  },[]);

  function detectGPS(){
    if(!navigator.geolocation){ alert("GPS nicht verfügbar"); return; }
    setGpsLoad(true); setGpsAcc(null);
    navigator.geolocation.getCurrentPosition(
      function(p){
        var lat = p.coords.latitude.toFixed(6);
        var lon = p.coords.longitude.toFixed(6);
        var acc = Math.round(p.coords.accuracy);
        setGpsAcc(acc);
        var coords = lat+", "+lon;
        var mapsLink = "https://maps.google.com/?q="+lat+","+lon;
        fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lon+"&accept-language=de&zoom=18")
          .then(function(r){ return r.json(); })
          .then(function(d){
            var a=d.address||{}; var parts=[];
            if(a.road) parts.push(a.road+(a.house_number?" "+a.house_number:""));
            if(a.neighbourhood||a.suburb) parts.push(a.neighbourhood||a.suburb);
            if(a.postcode) parts.push(a.postcode);
            if(a.city||a.town||a.village||a.municipality) parts.push(a.city||a.town||a.village||a.municipality);
            if(a.country_code) parts.push((a.country_code+"").toUpperCase());
            var result = (parts.length ? parts.join(", ")+" | " : "") + coords;
            setLoc(result);
            setGpsLoad(false);
          })
          .catch(function(){ setLoc(coords); setGpsLoad(false); });
      },
      function(e){ setGpsLoad(false); alert("GPS: "+e.message); },
      {enableHighAccuracy:true,timeout:15000,maximumAge:0}
    );
  }

  var ok=sel&&sel.plate&&bType&&urg&&loc.trim()&&desc.trim();
  function submit(){
    if(sendingRef.current) return;
    if(!ok||sending) return;
    sendingRef.current = true;
    setSending(true); setErrMsg("");
    var alertId=genId("A");
    var saveVeh=sel.isNew
      ? sbPost("vehicles",{id:genId("v_"),plate:sel.plate,brand:(sel.brand||"").split(" ")[0]||"",model:(sel.brand||"").split(" ").slice(1).join(" "),type:"truck",mileage:0}).catch(function(){})
      : Promise.resolve(true);
    // SOS Unfall = особый уровень срочности (выше чем "urgent")
    // Логика: тип поломки "sos" автоматически даёт urgency="sos"
    // Если водитель выбрал "sofort" + другой тип — это просто "urgent"
    var finalUrgency = (bType === "sos") ? "sos" : (urg === "sofort" ? "urgent" : "normal");
    saveVeh
      .then(function(){ return collectPhotoUrls(photos, alertId); })
      .then(function(urls){
        return sbPost("alerts",{
          id:alertId,type:bType,plate:sel.plate,location:loc,description:desc,
          urgency:finalUrgency,
          sender:driverName||"driver",sender_app:"fahrer",status:"open",
          niederlassung_id: driverNied || null,
          target_workshop_niederlassung_id: targetWerkstatt,
          tenant_id: "ltg",
          photo_urls:JSON.stringify(urls)
        });
      })
      .then(function(){
        try { localStorage.removeItem(DRAFT_KEY_FAHRER); } catch(e) {}
        sendingRef.current = false;
        setSending(false); setSent(true);
      })
      .catch(function(e){ sendingRef.current = false; setSending(false); setErrMsg(netErrMsg(e)); });
  }

  if(sent){
    return (
      <div className="scrn">
        <Bg />
        <div style={{ position:"relative",zIndex:2,flex:1,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",textAlign:"center" }}>
          <div style={{ width:90,height:90,borderRadius:"50%",background:"rgba(34,197,94,0.18)",border:"2px solid #22c55e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:42,marginBottom:20 }}>✓</div>
          <div style={{ fontSize:24,fontWeight:800,marginBottom:8 }}>{t.sentBreak}</div>
          <div style={{ color:"rgba(255,255,255,0.7)",marginBottom:30 }}>{t.sentBreakDesc}</div>
          <button className="btn-primary" style={{ maxWidth:280 }} onClick={onBack}>{t.newRep}</button>
        </div>
      </div>
    );
  }

  return (
    <div className="page-wrap">
      <Bg />
      <div style={{ position:"relative",zIndex:2,padding:"max(env(safe-area-inset-top),14px) 16px 0" }}>
        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16 }}>
          <BackBtn onClick={onBack} />
          <LangSwitcher lang={lang} setLang={setLang} />
        </div>
        <div style={{ fontSize:28,fontWeight:900,lineHeight:1,marginBottom:18 }}>{t.bdTitle}</div>

        <div style={{ marginBottom:14 }}>
          <div className="label-cap">FAHRZEUG *</div>
          <VehicleCombobox vehicles={vehicles} allowAll={true} value={sel} onChange={setSel} t={t} />
        </div>

        <div style={{ marginBottom:14 }}>
          <div className="label-cap">{(t.bdType+" *").toUpperCase()}</div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
            {t.bdTypes.map(function(bt){
              var isSosTile = bt.k === "sos";
              var isSelected = bType === bt.k;
              var tileStyle = isSosTile
                ? {
                    background: isSelected ? "rgba(239,68,68,0.35)" : "rgba(239,68,68,0.12)",
                    border: "2px solid #ef4444",
                    boxShadow: isSelected ? "0 0 0 2px #ef4444, 0 0 20px rgba(239,68,68,0.5)" : "0 0 12px rgba(239,68,68,0.25)",
                    color: "#fff",
                    fontWeight: 800
                  }
                : {};
              var tagStyle = isSosTile
                ? { background: "#ef4444", color: "#fff", fontWeight: 900 }
                : {};
              return (
                <div key={bt.k}
                  className={"type-tile"+(isSelected && !isSosTile ? " on" : "")}
                  style={tileStyle}
                  onClick={function(){
                    setBType(bt.k);
                    // SOS = всегда sofort, выбор Dringlichkeit не нужен
                    if (bt.k === "sos") setUrg("sofort");
                  }}>
                  <span className="type-tag" style={tagStyle}>{bt.tag}</span>
                  <span style={{ flex:1,fontSize:13 }}>{bt.label}</span>
                </div>
              );
            })}
          </div>
        </div>

        <div style={{ marginBottom:14 }}>
          <div className="label-cap">{(t.urgLabel+" *").toUpperCase()}</div>
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            <div className={"urg-row"+(urg==="sofort"?" r":"")} onClick={function(){ setUrg("sofort"); }}>
              <div className="urg-dot" style={{ background:"#ff3b30" }}></div>
              <span>{t.urgYes}</span>
            </div>
            <div className={"urg-row"+(urg==="warten"?" o":"")} onClick={function(){ setUrg("warten"); }}>
              <div className="urg-dot" style={{ background:"#ffa500" }}></div>
              <span>{t.urgNo}</span>
            </div>
          </div>
        </div>

        <div style={{ marginBottom:14 }}>
          <div className="label-cap">{(t.locLabel+" *").toUpperCase()}</div>
          <div style={{ display:"flex",gap:10 }}>
            <input className="inp-dark" style={{ flex:1 }} value={loc}
              placeholder={t.locPh} onChange={function(e){ setLoc(e.target.value); }} />
            <button className="geo-btn" onClick={detectGPS} disabled={gpsLoad}>{gpsLoad?"⏳":"📍"}</button>
          </div>
          {gpsAcc !== null && (
            <div style={{ marginTop:6, fontSize:12, fontWeight:700,
              color: gpsAcc <= 50 ? "#22c55e" : gpsAcc <= 200 ? "#ffa500" : "#ef4444" }}>
              {gpsAcc <= 50 ? "✓ Genau" : gpsAcc <= 200 ? "⚠ Mittel" : "✕ Ungenau"} — ±{gpsAcc}m
              {loc && loc.includes(", ") && (
                <a href={"https://maps.google.com/?q="+loc.split("|").pop().trim()}
                  target="_blank" rel="noreferrer"
                  style={{ marginLeft:10, color:"#60a5fa", textDecoration:"none", fontWeight:700 }}>
                  📌 Google Maps
                </a>
              )}
            </div>
          )}
        </div>

        <div style={{ marginBottom:14 }}>
          <div className="label-cap">{(t.descLabel+" *").toUpperCase()}</div>
          <textarea className="textarea-dark" placeholder={t.descPh} value={desc}
            onChange={function(e){ setDesc(e.target.value); }}
            style={{ borderColor:voiceDesc?"var(--red)":undefined, marginBottom:8 }} />
          {(typeof window!=="undefined"&&(window.SpeechRecognition||window.webkitSpeechRecognition))&&(
            <div>
              <button type="button"
                onPointerDown={function(e){
                  e.preventDefault();
                  if(voiceDescRef.current)return;
                  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
                  var rec;
                  try{rec=new SR();}catch(err){return;}
                  rec.lang=speechLang(lang);rec.continuous=false;rec.interimResults=true;rec.maxAlternatives=1;
                  var finalText="";
                  rec.onresult=function(ev){
                    var last=ev.results[ev.results.length-1];
                    if(!last) return;
                    var txt=last[0].transcript;
                    if(last.isFinal){ finalText=txt; }
                    setVoiceDescText(txt);
                  };
                  rec.onerror=function(){};
                  rec.onend=function(){
                    voiceDescRef.current=null;setVoiceDesc(false);
                    var captured=finalText.trim();
                    if(captured){setDesc(function(prev){return prev?prev+" "+captured:captured;});}
                    setVoiceDescText("");
                  };
                  voiceDescRef.current=rec;setVoiceDescText("");setVoiceDesc(true);
                  try{rec.start();}catch(err){voiceDescRef.current=null;setVoiceDesc(false);}
                }}
                onPointerUp={function(e){
                  e.preventDefault();
                  if(!voiceDescRef.current)return;
                  try{voiceDescRef.current.stop();}catch(err){}
                }}
                onPointerLeave={function(e){
                  if(!voiceDescRef.current)return;
                  try{voiceDescRef.current.stop();}catch(err){}
                }}
                onPointerCancel={function(e){
                  if(!voiceDescRef.current)return;
                  try{voiceDescRef.current.stop();}catch(err){}
                }}
                style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:10,padding:"14px",borderRadius:"var(--radius-md)",border:"1.5px solid",borderColor:voiceDesc?"var(--red)":"var(--border)",background:voiceDesc?"rgba(239,68,68,0.1)":"var(--bg-elevated)",color:voiceDesc?"var(--red)":"var(--text-secondary)",fontFamily:"var(--font-display)",fontWeight:700,fontSize:14,letterSpacing:1,minHeight:"var(--touch)",userSelect:"none",WebkitUserSelect:"none",touchAction:"none",animation:voiceDesc?"voicePulse 0.6s infinite":"none"}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                {voiceDesc?"Loslassen...":"Gedrückt halten — Sprechen"}
              </button>
              {voiceDesc&&voiceDescText?<div style={{marginTop:6,padding:"8px 12px",borderRadius:"var(--radius-sm)",background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.2)",fontSize:13,color:"rgba(255,255,255,0.7)",fontStyle:"italic"}}>{voiceDescText}</div>:null}
            </div>
          )}
        </div>

        <PhotoUpload photos={photos} setPhotos={setPhotos} t={t} />
        {errMsg && <div style={{ color:"#ef4444",fontSize:13,marginTop:10,fontWeight:700 }}>{errMsg}</div>}
        <div style={{ textAlign:"center",color:"rgba(255,255,255,0.4)",fontSize:12,marginTop:14 }}>* {t.req}</div>
      </div>
      <div className="fixed-bar">
        <button className="btn-primary" disabled={!ok||sending} onClick={submit}>{sending?t.sending:t.sendBtn}</button>
      </div>
    </div>
  );
}

const DRAFT_KEY_FAHRER = "draft_fahrer_breakdown";

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App() {
  var _stg=useState("loading"); var stg=_stg[0]; var setStg=_stg[1];
  var _lang=useState("DE"); var lang=_lang[0]; var setLangRaw=_lang[1];
  var _name=useState(""); var name=_name[0]; var setName=_name[1];
  var _nied=useState(""); var userNied=_nied[0]; var setUserNied=_nied[1];
  var _scr=useState("menu"); var scr=_scr[0]; var setScr=_scr[1];
  var _dynPin=useState(null); var dynPin=_dynPin[0]; var setDynPin=_dynPin[1];

  function setLang(v){ setLangRaw(v); try{ localStorage.setItem("werkflow_fahrer_lang",v); }catch(e){} }

  // Onboarding — один раз после входа
  useEffect(function(){
    if (stg !== "menu") return;
    var key = "werkflow_onboarding_fahrer_v1";
    if (localStorage.getItem(key)) return;
    var t = setTimeout(function(){
      if (!window.introJs) return;
      window.introJs().setOptions({
        steps: [
          { intro: "<strong>Willkommen in WerkFlow Fahrer!</strong><br/>Kurze Einführung in die App." },
          { intro: "<strong>LKW Inspektion</strong><br/>Vor jeder Fahrt Fahrzeug prüfen und Mängel melden." },
          { intro: "<strong>Auflieger Inspektion</strong><br/>Auflieger vor dem Ankuppeln prüfen." },
          { intro: "🚨 <strong>Panne / Defekt</strong><br/>Bei Problemen unterwegs hier Meldung erstatten." },
          { intro: "✅ <strong>Fertig!</strong><br/>Alle Meldungen gehen sofort an die Werkstatt." }
        ],
        showProgress: true,
        showBullets: false,
        exitOnOverlayClick: true,
        doneLabel: "Los gehts!",
        nextLabel: "Weiter →",
        prevLabel: "← Zurück",
        skipLabel: "Überspringen"
      }).oncomplete(function(){ localStorage.setItem(key,"1"); })
        .onexit(function(){ localStorage.setItem(key,"1"); })
        .start();
    }, 1500);
    return function(){ clearTimeout(t); };
  }, [stg]);

  function nameToId(fullName){
    var s = (fullName||"").trim().toLowerCase()
      .replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss")
      .replace(/\s+/g,"-").replace(/[^a-z0-9\-]/g,"");
    return s || ("driver-"+Date.now());
  }

  // Фикс дубликатов: сначала ищем существующего по имени, потом создаём нового
  function registerOrUpdateDriver(fullName, niedId) {
    if (!fullName) return;
    var avatar = fullName.trim().split(/\s+/).map(function(w){ return (w[0]||"").toUpperCase(); }).join("").slice(0,2);
    var nameLower = fullName.trim().toLowerCase();
    sbGet("users", "select=id,name,role&active=eq.true").then(function(rows) {
      var existing = (rows || []).find(function(u) {
        return (u.name || "").trim().toLowerCase() === nameLower;
      });
      if (existing) {
        fetch(SB_URL+"/rest/v1/users?id=eq."+encodeURIComponent(existing.id), {
          method:"PATCH",
          headers:{ "Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal" },
          body:JSON.stringify({ last_login: new Date().toISOString(), active: true,
            niederlassung_id: niedId || existing.niederlassung_id || "hockenheim" })
        }).catch(function(){});
      } else {
        var id = nameToId(fullName);
        fetch(SB_URL+"/rest/v1/users", {
          method:"POST",
          headers:{ "Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal,resolution=merge-duplicates" },
          body:JSON.stringify({
            id: id, name: fullName, avatar: avatar,
            role: "fahrer", tenant_id: "ltg",
            niederlassung_id: niedId || "hockenheim",
            scope_level: "niederlassung",
            active: true, app_access: [],
            last_login: new Date().toISOString()
          })
        }).catch(function(){});
      }
    }).catch(function(){});
  }

  useEffect(function(){
    try{
      var sl=localStorage.getItem("werkflow_fahrer_lang"); if(sl) setLangRaw(sl);
      var sn=localStorage.getItem(SESS_KEY);
      if(sn){
        // Поддержка старого формата (просто строка с именем) и нового (JSON)
        try {
          var parsed = JSON.parse(sn);
          if (parsed && parsed.name) {
            setName(parsed.name);
            setUserNied(parsed.niederlassung_id || "");
            // Старая сессия без niederlassung_id — форсим перерегистрацию
            if (!parsed.niederlassung_id) {
              try { localStorage.removeItem(SESS_KEY); } catch(e2) {}
              setStg("register"); return;
            }
            setStg("slider"); return;
          }
        } catch(pe) {
          // Старый формат — строка с именем, нет niederlassung_id → перерегистрация
          try { localStorage.removeItem(SESS_KEY); } catch(e2) {}
        }
      }
      setStg("register");
    }catch(e){ setStg("register"); }
    sbGet("app_settings","key=eq.driver_shared_pin&select=value").then(function(r){
      if (r && r.length && r[0].value) setDynPin(r[0].value);
    }).catch(function(){});
  },[]);

  if(stg==="loading") return <div className="scrn"><Bg /></div>;
  if(stg==="register") return (
    <ErsteAnmeldung lang={lang} setLang={setLang} onNext={function(v,n,nied){
      setName(v+" "+n);
      setUserNied(nied);
      setStg("pin");
    }} />
  );
  if(stg==="pin") return (
    <PinScreen lang={lang} setLang={setLang} dynPin={dynPin} onOk={function(){
      try{ localStorage.setItem(SESS_KEY, JSON.stringify({ name: name, niederlassung_id: userNied })); }catch(e){}
      registerOrUpdateDriver(name, userNied);
      setStg("menu");
    }} />
  );
  if(stg==="slider") return <SliderScreen lang={lang} setLang={setLang} name={name}
    onUnlock={function(){ setStg("menu"); }}
    onChange={function(){
      try{ localStorage.removeItem(SESS_KEY); }catch(e){}
      try{ localStorage.removeItem(DRAFT_KEY_FAHRER); }catch(e){}
      setName(""); setStg("register");
    }} />;
  if(scr==="menu") return <MainMenu lang={lang} setLang={setLang} onPick={function(k){ if(k==="lkw") setScr("insp_lkw"); else if(k==="auf") setScr("insp_auf"); else if(k==="bd") setScr("bd"); }} />;
  if(scr==="insp_lkw") return <InspectionScreen kind="lkw" driverName={name} driverNied={userNied} lang={lang} setLang={setLang} onBack={function(){ setScr("menu"); }} />;
  if(scr==="insp_auf") return <InspectionScreen kind="auf" driverName={name} driverNied={userNied} lang={lang} setLang={setLang} onBack={function(){ setScr("menu"); }} />;
  if(scr==="bd") return <BreakdownScreen driverName={name} driverNied={userNied} lang={lang} setLang={setLang} onBack={function(){ setScr("menu"); }} />;
  return null;
}

// === ErrorBoundary — ловит падения React-компонентов и показывает экран вместо белого экрана ===
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, errorMsg: "" };
  }
  static getDerivedStateFromError(err) {
    return { hasError: true, errorMsg: (err && err.message) ? err.message : String(err) };
  }
  componentDidCatch(err, info) {
    console.error("App crash:", err, info);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement("div", {
        style: {
          minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
          background:"#0a0a0a", color:"#fff", padding:24, fontFamily:"system-ui,sans-serif"
        }
      },
        React.createElement("div", { style:{ maxWidth:400, textAlign:"center" } },
          React.createElement("div", { style:{ fontSize:48, marginBottom:16 } }, "⚠️"),
          React.createElement("div", { style:{ fontSize:20, fontWeight:700, marginBottom:8 } }, "Etwas ist schiefgelaufen"),
          React.createElement("div", { style:{ fontSize:13, color:"rgba(255,255,255,0.6)", marginBottom:20, wordBreak:"break-word" } }, this.state.errorMsg),
          React.createElement("button", {
            onClick: function(){ window.location.reload(); },
            style: {
              background:"#ffa500", color:"#000", border:"none", padding:"12px 24px",
              borderRadius:10, fontWeight:800, fontSize:14, cursor:"pointer"
            }
          }, "🔄 App neu laden")
        )
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
</script>
</body>
</html>
