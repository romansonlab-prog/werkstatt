// ── SUPABASE ──────────────────────────────────────────────────────────────────
function sbGet(table, q) {
  return fetch(SB_URL+"/rest/v1/"+table+(q?"?"+q:""), {
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}
  }).then(function(r){ return r.ok?r.json():[]; })
    .then(function(d){ return Array.isArray(d)?d:[]; })
    .catch(function(){ return []; });
}
function sbPost(table, body) {
  return fetch(SB_URL+"/rest/v1/"+table, {
    method:"POST",
    headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal"},
    body:JSON.stringify(body)
  }).then(function(r){ if(!r.ok) return r.text().then(function(t){ throw new Error(t); }); return true; });
}
function sbPatch(table, col, val, body) {
  return fetch(SB_URL+"/rest/v1/"+table+"?"+col+"=eq."+encodeURIComponent(val), {
    method:"PATCH",
    headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal"},
    body:JSON.stringify(body)
  }).then(function(r){ return r.ok; }).catch(function(){ return false; });
}
function uploadPhoto(b64, alertId, i) {
  if (!b64) return Promise.resolve(null);
  return fetch(b64).then(function(r){ return r.blob(); }).then(function(blob){
    var ext = blob.type && blob.type.indexOf("png")!==-1?"png":"jpg";
    var path = "eingang/"+alertId+"/photo_"+i+"."+ext;
    return fetch(SB_URL+"/storage/v1/object/inspection-photos/"+path, {
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":blob.type||"image/jpeg","x-upsert":"true"},
      body:blob
    }).then(function(r){ return r.ok?(SB_URL+"/storage/v1/object/public/inspection-photos/"+path):null; });
  }).catch(function(){ return null; });
}
function uploadAll(photos, alertId) {
  if (!photos.length) return Promise.resolve([]);
  return Promise.all(photos.map(function(p,i){ return uploadPhoto(p,alertId,i); }))
    .then(function(urls){ return urls.filter(Boolean); });
}

function VehicleCombobox({ vehicles, vehicleType, value, onChange, t, allowAll }) {
  var _p = useState(value&&value.plate?value.plate:""); var plate = _p[0]; var setPlate = _p[1];
  var _b = useState(value&&value.brand?value.brand:""); var brand = _b[0]; var setBrand = _b[1];
  var _o = useState(false); var open = _o[0]; var setOpen = _o[1];
  var ref = useRef(null);
  useEffect(function(){
    function h(e){ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown",h); document.addEventListener("touchstart",h);
    return function(){ document.removeEventListener("mousedown",h); document.removeEventListener("touchstart",h); };
  },[]);
  var list = vehicles.filter(function(v){
    if(!allowAll && vehicleType && v.type && v.type!==vehicleType) return false;
    if(!plate.trim()) return true;
    return ((v.plate||"")+" "+(v.brand||"")).toLowerCase().indexOf(plate.toLowerCase().trim())!==-1;
  });
  function pick(v){ setPlate(v.plate); setBrand(v.brand||""); setOpen(false); onChange({plate:v.plate,brand:v.brand||"",id:v.id,isNew:false}); }

    if(ex) onChange({plate:ex.plate,brand:ex.brand||brand,id:ex.id,isNew:false});
    else onChange({plate:p,brand:brand.trim(),isNew:true});
  }

      <input className="drop-input" value={plate}
        placeholder={t?t.vehPh:"Kennzeichen eingeben..."}
        onChange={function(e){ setPlate(e.target.value); setOpen(true); }}
        onFocus={function(){ setOpen(true); }}
        onBlur={function(){ setTimeout(commit,200); }} />
      {open && list.length>0 && (
        <div className="drop-list">
          {list.slice(0,30).map(function(v){
            return (
              <div key={v.id||v.plate} className="drop-item"
                onMouseDown={function(e){ e.preventDefault(); pick(v); }}
                onTouchStart={function(e){ e.preventDefault(); pick(v); }}>
                <div style={{ fontWeight:700 }}>{v.plate}</div>
                {v.brand && <div style={{ fontSize:12,color:"rgba(255,255,255,0.55)" }}>{v.brand}</div>}
              </div>
            );
          })}
        </div>
      )}
      {plate.trim() && (
        <input className="drop-input" style={{ marginTop:8,fontSize:14,padding:"10px 16px" }}
          value={brand} placeholder={t?t.brandPh:"Marke / Modell"}
          onChange={function(e){ setBrand(e.target.value); }}
          onBlur={function(){ setTimeout(commit,200); }} />
      )}
      {plate.trim() && !vehicles.some(function(v){ return (v.plate||"").toLowerCase()===plate.trim().toLowerCase(); }) && (
        <div style={{ marginTop:6,color:"rgba(255,255,255,0.55)",fontSize:12,fontWeight:600 }}>
          + Neues Fahrzeug: <span style={{ color:"#ffa500" }}>{plate.trim()}</span>
        </div>
      )}
    </div>
  );
}

          <div style={{ position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:24,color:"rgba(255,255,255,0.35)",fontSize:13,fontWeight:700,pointerEvents:"none" }}>SCHIEBEN →</div>
          <div className="slider-thumb" style={{ left:6+x,transition:drag?"none":"left 0.3s" }}
            onMouseDown={function(e){ slide(e.clientX); }} onTouchStart={function(e){ slide(e.touches[0].clientX); }}>
            <div className="slider-grip"><span></span><span></span><span></span></div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── INSPECTION ────────────────────────────────────────────────────────────────
function InspectionScreen({ kind, driverName, lang, setLang, onBack }) {
  var vType = kind==="lkw"?"truck":"trailer";
  var t = getT(lang);
  var items = kind==="lkw" ? t.truckChecks : t.trailerChecks;
  var _veh=useState([]); var vehicles=_veh[0]; var setVehicles=_veh[1];
  var _sel=useState(null); var sel=_sel[0]; var setSel=_sel[1];
  var _chk=useState({}); var chk=_chk[0]; var setChk=_chk[1];
  var _notes=useState(""); var notes=_notes[0]; var setNotes=_notes[1];
  var _km=useState(""); var km=_km[0]; var setKm=_km[1];
  var _ph=useState([]); var photos=_ph[0]; var setPhotos=_ph[1];
  var _snd=useState(false); var sending=_snd[0]; var setSending=_snd[1];
  var _done=useState(false); var done=_done[0]; var setDone=_done[1];
  var _err=useState(""); var errMsg=_err[0]; var setErrMsg=_err[1];

  useEffect(function(){
    sbGet("vehicles","type=eq."+vType+"&select=id,plate,brand,model&order=plate").then(function(rows){
      setVehicles(rows.map(function(r){ return {id:r.id,plate:r.plate,brand:(r.brand||"")+(r.model?" "+r.model:""),type:vType}; }));
    });
  },[vType]);

  var checkedCount=items.filter(function(c){ return chk[c.k]; }).length;
  var hasFault=items.some(function(c){ return chk[c.k]==="fail"; });
  var allDone=checkedCount===items.length;
  function setCheck(k,v){ setChk(function(prev){ var n=Object.assign({},prev); n[k]=v; return n; }); }

  function submit(){
    if(!allDone||!sel||!sel.plate||sending) return;
    setSending(true); setErrMsg("");
    var alertId="I"+Date.now();
    var badItems=items.filter(function(c){ return chk[c.k]==="fail"; }).map(function(c){ return c.label; });
    var defText=badItems.join(", ");
    if(notes) defText=defText?defText+" — "+notes:notes;
    var prefix=vType==="truck"?"LKW":"Auflieger";
    var saveVeh=sel.isNew
      ? sbPost("vehicles",{id:"v_"+Date.now(),plate:sel.plate,brand:(sel.brand||"").split(" ")[0]||"",model:(sel.brand||"").split(" ").slice(1).join(" "),type:vType,mileage:0}).catch(function(){})
      : Promise.resolve(true);
    saveVeh
      .then(function(){ return uploadAll(photos,alertId); })
      .then(function(urls){
        var checksObj = {}; items.forEach(function(c){ checksObj[c.k]=chk[c.k]||"ok"; });
        var mangelObj = {}; items.forEach(function(c){ if(chk[c.k]==="fail") mangelObj[c.k]=c.label; });
        return sbPost("inspections",{
          id:alertId,
          plate:sel.plate,
          brand:sel.brand||null,
          type:vType,
          driver:driverName||"driver",
          status:hasFault?"mangel":"ok",
          checks:JSON.stringify(checksObj),
          mangel:JSON.stringify(mangelObj),
          note:notes||null,
          photos:JSON.stringify(urls),
          mileage:km?parseInt(km):null,
          created_at:new Date().toISOString()
        }).then(function(){
          if(km&&parseInt(km)>0&&sel.id&&!sel.isNew) return sbPatch("vehicles","id",sel.id,{mileage:parseInt(km)});
          return true;
        });
      })
      .then(function(){
        // Если есть мангели — дополнительно шлём алерт в Eingang механикам
        if(hasFault){
          return sbPost("alerts",{
            id:"IA"+Date.now(),
            type:"inspection_mangel",
            plate:sel.plate,
            location:"Werkstatt",
            description:defText||(prefix+"-Inspektion: Mangel"),
            urgency:"normal",
            sender:driverName||"driver",
            sender_app:"fahrer",
            status:"open"
          }).catch(function(){});
        }
        return true;
      })
      .then(function(){ setSending(false); setDone(true); })
      .catch(function(e){ setSending(false); setErrMsg("Fehler: "+(e.message||e)); });
  }

  if(done){
    return (
      <div className="scrn">
        <Bg />
        <div style={{ position:"relative",zIndex:2,flex:1,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",textAlign:"center" }}>
          <div style={{ width:90,height:90,borderRadius:"50%",background:"rgba(34,197,94,0.18)",border:"2px solid #22c55e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:42,marginBottom:20 }}>✓</div>
          <div style={{ fontSize:24,fontWeight:800,marginBottom:8 }}>{t.sentTitle}</div>
          <div style={{ color:"rgba(255,255,255,0.7)",marginBottom:30 }}>{t.sentOk}</div>
          <button className="btn-primary" style={{ maxWidth:280 }} onClick={onBack}>{t.newInsp}</button>
        </div>
      </div>
    );
  }

  return (
    <div className="page-wrap">
      <Bg />
      <div style={{ position:"relative",zIndex:2,padding:"max(env(safe-area-inset-top),14px) 16px 0" }}>
        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16 }}>
          <BackBtn onClick={onBack} />
          <LangSwitcher lang={lang} setLang={setLang} />
        </div>
        <div style={{ fontSize:28,fontWeight:900,lineHeight:1,marginBottom:18 }}>{kind==="lkw"?t.inspTruck:t.inspTrailer}</div>

        <div style={{ marginBottom:14 }}>
          <div className="label-cap">FAHRZEUG</div>
          <VehicleCombobox vehicles={vehicles} vehicleType={vType} value={sel} onChange={setSel} t={t} />
        </div>

        <div style={{ marginBottom:16 }}>
          <div className="label-cap">{(t.kmPh||"Kilometerstand").toUpperCase()}</div>
          <div style={{ position:"relative" }}>
            <input className="drop-input" type="text" inputMode="numeric" value={km}
              placeholder="z.B. 245000"
              onChange={function(e){ setKm(e.target.value.replace(/\D/g,"")); }}
              style={{ paddingRight:46 }} />
            <span style={{ position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"rgba(255,255,255,0.4)",fontWeight:700,pointerEvents:"none" }}>km</span>
          </div>
        </div>

        <div className="insp-hd">
          <div className="tsp"></div><div className="sp"></div>
          <div className="col">{t.okH}</div><div className="col">{t.nOkH}</div>
        </div>
        {items.map(function(c){
          return (
            <div key={c.k} className="insp-row">
              <div className="insp-tag">{c.tag}</div>
              <div className="insp-label">{c.label}</div>
              <button className={"insp-btn"+(chk[c.k]==="ok"?" ok-on":"")} onClick={function(){ setCheck(c.k,"ok"); }}>✓</button>
              <button className={"insp-btn"+(chk[c.k]==="fail"?" fail-on":"")} onClick={function(){ setCheck(c.k,"fail"); }}>✕</button>
            </div>
          );
        })}

        <div style={{ marginTop:18,marginBottom:14 }}>
          <div className="label-cap">{t.defects}</div>
          <textarea className="textarea-dark" placeholder={t.defectsPh} value={notes} onChange={function(e){ setNotes(e.target.value); }} />
        </div>

        <PhotoUpload photos={photos} setPhotos={setPhotos} t={t} />

        <div className={"progress-box"+(hasFault?" bad":"")} style={{ marginTop:14,marginBottom:8 }}>
          <span style={{ color:hasFault?"#ff3b30":"#22c55e",fontSize:18 }}>{hasFault?"⚠":"✓"}</span>
          <span>{checkedCount}/{items.length} {t.inspected}{hasFault?" · "+t.faultShort:""}</span>
        </div>
        {errMsg && <div style={{ color:"#ef4444",fontSize:13,marginBottom:8,fontWeight:700 }}>{errMsg}</div>}
      </div>
      <div className="fixed-bar">
        <button className="btn-primary" disabled={!allDone||!sel||!sel.plate||sending} onClick={submit}>
          {sending?t.sending:t.submit}
        </button>
      </div>
    </div>
  );
}

// ── BREAKDOWN ─────────────────────────────────────────────────────────────────
function BreakdownScreen({ driverName, lang, setLang, onBack }) {
  var t=getT(lang);
  var _veh=useState([]); var vehicles=_veh[0]; var setVehicles=_veh[1];
  var _sel=useState(null); var sel=_sel[0]; var setSel=_sel[1];
  var _bt=useState(null); var bType=_bt[0]; var setBType=_bt[1];
  var _urg=useState(null); var urg=_urg[0]; var setUrg=_urg[1];
  var _loc=useState(""); var loc=_loc[0]; var setLoc=_loc[1];
  var _gps=useState(false); var gpsLoad=_gps[0]; var setGpsLoad=_gps[1];
  var _desc=useState(""); var desc=_desc[0]; var setDesc=_desc[1];
  var _ph=useState([]); var photos=_ph[0]; var setPhotos=_ph[1];
  var _snd=useState(false); var sending=_snd[0]; var setSending=_snd[1];
  var _sent=useState(false); var sent=_sent[0]; var setSent=_sent[1];
  var _err=useState(""); var errMsg=_err[0]; var setErrMsg=_err[1];

  useEffect(function(){
    sbGet("vehicles","select=id,plate,brand,model&order=plate").then(function(rows){
      setVehicles(rows.map(function(r){ return {id:r.id,plate:r.plate,brand:(r.brand||"")+(r.model?" "+r.model:""),type:r.type}; }));
    });
  },[]);

  function detectGPS(){
    if(!navigator.geolocation){ alert("GPS nicht verfügbar"); return; }
    setGpsLoad(true);
    navigator.geolocation.getCurrentPosition(
      function(p){
        fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat="+p.coords.latitude+"&lon="+p.coords.longitude+"&accept-language=de&zoom=18")
          .then(function(r){ return r.json(); })
          .then(function(d){
            var a=d.address||{}; var parts=[];
            if(a.road) parts.push(a.road+(a.house_number?" "+a.house_number:""));
            if(a.neighbourhood||a.suburb) parts.push(a.neighbourhood||a.suburb);
            if(a.postcode) parts.push(a.postcode);
            if(a.city||a.town||a.village||a.municipality) parts.push(a.city||a.town||a.village||a.municipality);
            if(a.country_code) parts.push((a.country_code+"").toUpperCase());
            var coords = p.coords.latitude.toFixed(6)+", "+p.coords.longitude.toFixed(6);
            setLoc(parts.length?parts.join(", "):coords);
            setGpsLoad(false);
          })
          .catch(function(){ setLoc(p.coords.latitude.toFixed(6)+", "+p.coords.longitude.toFixed(6)); setGpsLoad(false); });
      },
      function(e){ setGpsLoad(false); alert("GPS: "+e.message); },
      {enableHighAccuracy:true,timeout:10000,maximumAge:0}
    );
  }

  var ok=sel&&sel.plate&&bType&&urg&&loc.trim()&&desc.trim();
  function submit(){
    if(!ok||sending) return;
    setSending(true); setErrMsg("");
    var alertId="A"+Date.now();
    var saveVeh=sel.isNew
      ? sbPost("vehicles",{id:"v_"+Date.now(),plate:sel.plate,brand:(sel.brand||"").split(" ")[0]||"",model:(sel.brand||"").split(" ").slice(1).join(" "),type:"truck",mileage:0}).catch(function(){})
      : Promise.resolve(true);
    saveVeh
      .then(function(){ return uploadAll(photos,alertId); })
      .then(function(urls){
        return sbPost("alerts",{
          id:alertId,type:bType,plate:sel.plate,location:loc,description:desc,
          urgency:urg==="sofort"?"urgent":"normal",
          sender:driverName||"driver",sender_app:"fahrer",status:"open",photo_urls:urls
        });
      })
      .then(function(){ setSending(false); setSent(true); })
      .catch(function(e){ setSending(false); setErrMsg("Fehler: "+(e.message||e)); });
  }

  if(sent){
    return (
      <div className="scrn">
        <Bg />
        <div style={{ position:"relative",zIndex:2,flex:1,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",textAlign:"center" }}>
          <div style={{ width:90,height:90,borderRadius:"50%",background:"rgba(34,197,94,0.18)",border:"2px solid #22c55e",display:"flex",alignItems:"center",justifyContent:"center",fontSize:42,marginBottom:20 }}>✓</div>
          <div style={{ fontSize:24,fontWeight:800,marginBottom:8 }}>{t.sentBreak}</div>
          <div style={{ color:"rgba(255,255,255,0.7)",marginBottom:30 }}>{t.sentBreakDesc}</div>
          <button className="btn-primary" style={{ maxWidth:280 }} onClick={onBack}>{t.newRep}</button>
        </div>
      </div>
    );
  }

  return (
    <div className="page-wrap">
      <Bg />
      <div style={{ position:"relative",zIndex:2,padding:"max(env(safe-area-inset-top),14px) 16px 0" }}>
        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16 }}>
          <BackBtn onClick={onBack} />
          <LangSwitcher lang={lang} setLang={setLang} />
        </div>
        <div style={{ fontSize:28,fontWeight:900,lineHeight:1,marginBottom:18 }}>{t.bdTitle}</div>

        <div style={{ marginBottom:14 }}>
          <div className="label-cap">FAHRZEUG *</div>
          <VehicleCombobox vehicles={vehicles} allowAll={true} value={sel} onChange={setSel} t={t} />
        </div>

        <div style={{ marginBottom:14 }}>
          <div className="label-cap">{(t.bdType+" *").toUpperCase()}</div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
            {t.bdTypes.map(function(bt){
              return (
                <div key={bt.k} className={"type-tile"+(bType===bt.k?" on":"")} onClick={function(){ setBType(bt.k); }}>
                  <span className="type-tag">{bt.tag}</span>
                  <span style={{ flex:1,fontSize:13 }}>{bt.label}</span>
                </div>
              );
            })}
          </div>
        </div>

        <div style={{ marginBottom:14 }}>
          <div className="label-cap">{(t.urgLabel+" *").toUpperCase()}</div>
          <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
            <div className={"urg-row"+(urg==="sofort"?" r":"")} onClick={function(){ setUrg("sofort"); }}>
              <div className="urg-dot" style={{ background:"#ff3b30" }}></div>
              <span>{t.urgYes}</span>
            </div>
            <div className={"urg-row"+(urg==="warten"?" o":"")} onClick={function(){ setUrg("warten"); }}>
              <div className="urg-dot" style={{ background:"#ffa500" }}></div>
              <span>{t.urgNo}</span>
            </div>
          </div>
        </div>

        <div style={{ marginBottom:14 }}>
          <div className="label-cap">{(t.locLabel+" *").toUpperCase()}</div>
          <div style={{ display:"flex",gap:10 }}>
            <input className="inp-dark" style={{ flex:1 }} value={loc}
              placeholder={t.locPh} onChange={function(e){ setLoc(e.target.value); }} />
            <button className="geo-btn" onClick={detectGPS} disabled={gpsLoad}>{gpsLoad?"...":"📍"}</button>
          </div>
        </div>

        <div style={{ marginBottom:14 }}>
          <div className="label-cap">{(t.descLabel+" *").toUpperCase()}</div>
          <textarea className="textarea-dark" placeholder={t.descPh} value={desc} onChange={function(e){ setDesc(e.target.value); }} />
        </div>

        <PhotoUpload photos={photos} setPhotos={setPhotos} t={t} />
        {errMsg && <div style={{ color:"#ef4444",fontSize:13,marginTop:10,fontWeight:700 }}>{errMsg}</div>}
        <div style={{ textAlign:"center",color:"rgba(255,255,255,0.4)",fontSize:12,marginTop:14 }}>* {t.req}</div>
      </div>
      <div className="fixed-bar">
        <button className="btn-primary" disabled={!ok||sending} onClick={submit}>{sending?t.sending:t.sendBtn}</button>
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App() {
  var _stg=useState("loading"); var stg=_stg[0]; var setStg=_stg[1];
  var _lang=useState("DE"); var lang=_lang[0]; var setLangRaw=_lang[1];
  var _name=useState(""); var name=_name[0]; var setName=_name[1];
  var _scr=useState("menu"); var scr=_scr[0]; var setScr=_scr[1];

  function setLang(v){ setLangRaw(v); try{ localStorage.setItem("werkflow_fahrer_lang",v); }catch(e){} }

  useEffect(function(){
    try{
      var sl=localStorage.getItem("werkflow_fahrer_lang"); if(sl) setLangRaw(sl);
      var sn=localStorage.getItem(SESS_KEY); if(sn){ setName(sn); setStg("slider"); } else setStg("register");
    }catch(e){ setStg("register"); }
  },[]);

  if(stg==="loading") return <div className="scrn"><Bg /></div>;
  if(stg==="register") return <ErsteAnmeldung lang={lang} setLang={setLang} onNext={function(v,n){ setName(v+" "+n); setStg("pin"); }} />;
  if(stg==="pin") return <PinScreen lang={lang} setLang={setLang} onOk={function(){ try{ localStorage.setItem(SESS_KEY,name); }catch(e){} setStg("menu"); }} />;
  if(stg==="slider") return <SliderScreen lang={lang} setLang={setLang} name={name} onUnlock={function(){ setStg("menu"); }} />;
  if(scr==="menu") return <MainMenu lang={lang} setLang={setLang} onPick={function(k){ if(k==="lkw") setScr("insp_lkw"); else if(k==="auf") setScr("insp_auf"); else if(k==="bd") setScr("bd"); }} />;
  if(scr==="insp_lkw") return <InspectionScreen kind="lkw" driverName={name} lang={lang} setLang={setLang} onBack={function(){ setScr("menu"); }} />;
  if(scr==="insp_auf") return <InspectionScreen kind="auf" driverName={name} lang={lang} setLang={setLang} onBack={function(){ setScr("menu"); }} />;
  if(scr==="bd") return <BreakdownScreen driverName={name} lang={lang} setLang={setLang} onBack={function(){ setScr("menu"); }} />;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
