// ── Photo compression + Storage upload ──────────────────────
const compressPhoto = (base64, maxW=1200, quality=0.75) => new Promise(resolve => {
  const img = new Image();
  img.onload = () => {
    const scale = Math.min(1, maxW / Math.max(img.width, img.height));
    const w = Math.round(img.width * scale);
    const h = Math.round(img.height * scale);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    resolve(canvas.toDataURL('image/jpeg', quality));
  };
  img.onerror = () => resolve(base64);
  img.src = base64;
});

const uploadPhotoToStorage = async (base64, reportId, index) => {
  try {
    const compressed = await compressPhoto(base64);
    const res = await fetch(compressed);
    const blob = await res.blob();
    const path = reportId + '/photo_' + index + '.jpg';
    const up = await fetch(SB_URL + '/storage/v1/object/inspection-photos/' + path, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'image/jpeg'
      },
      body: blob
    });
    if (!up.ok) return null;
    return SB_URL + '/storage/v1/object/public/inspection-photos/' + path;
  } catch(e) { console.error('photo upload:', e); return null; }
};

const sbInsertReport = async (payload) => {
  try {
    const res = await fetch(SB_URL + '/rest/v1/reports', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(payload)
    });
    if (!res.ok) return null;
    const data = await res.json();
    return Array.isArray(data) ? data[0] : data;
  } catch(e) { console.error('sbInsertReport:', e); return null; }
};

const sbInsert = async (table, data) => {
  try {
    await fetch(SB_URL + "/rest/v1/" + table, {
      method: "POST",
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY,
        "Content-Type": "application/json", "Prefer": "return=minimal" },
      body: JSON.stringify(data)
    });
  } catch(e) { console.error("sb:", e); }
};


const createJob = async (data) => {
  try {
    const res = await fetch(SB_URL + "/rest/v1/jobs", {
      method: "POST",
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY,
        "Content-Type": "application/json", "Prefer": "return=representation" },
      body: JSON.stringify(data)
    });
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(txt || "createJob failed");
    }
    return await res.json();
  } catch(e) { console.error("job:", e); throw e; }
};

    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514", max_tokens:500,
      messages:[{role:"user",
        content:"Translate to German. Return ONLY the translation:\n\n"+text}]
    })
  }).then(function(r){ return r.json(); })
    .then(function(d){ return (d.content && d.content[0] ? d.content[0].text : null) || text; })
    .catch(function(){ return text; });
}

function PhotoUpload({ photos, onAdd, onRemove, label }) {
  const handle = (e) => {
    const files = Array.from(e.target.files);
    Promise.all(files.map(f => new Promise(res => {
      const r = new FileReader();
      r.onload = ev => res(ev.target.result);
      r.readAsDataURL(f);
    }))).then(results => onAdd(results));
  };
  return (
    <div style={{ marginBottom:16 }}>
      <label style={{ display:"flex", alignItems:"center", justifyContent:"center",
        gap:10, border:"2px dashed "+C.border, borderRadius:10,
        padding:"12px 20px", cursor:"pointer", color:C.gray3,
        fontSize:14, fontWeight:600, background:C.surface }}>
        <span style={{ fontSize:22 }}>📷</span>
        <span>{label} {photos.length > 0 ? "("+photos.length+")" : ""}</span>
        <input type="file" accept="image/*" multiple
          style={{ display:"none" }} onChange={handle} />
      </label>
      {photos.length > 0 && (
        <div style={{ display:"flex", gap:8, marginTop:10, flexWrap:"wrap" }}>
          {photos.map((src,i) => (
            <div key={i} style={{ position:"relative" }}>
              <img src={src} alt="" style={{ width:80, height:60,
                objectFit:"cover", borderRadius:8, border:"1px solid "+C.border }} />
              <button onClick={() => onRemove(i)}
                style={{ position:"absolute", top:-6, right:-6, width:20, height:20,
                  borderRadius:"50%", background:C.red, border:"none",
                  color:"#fff", fontSize:12, cursor:"pointer" }}>x</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}



// ── Vehicle Dropdown Select ──────────────────────────────────────
function VehicleSelect({ trucks, trailers, value, onChange, t, C }) {
  const [open, setOpen]     = useState(false);
  const [custom, setCustom] = useState(false);
  const [customVal, setCustomVal] = useState("");

  const all = [
    ...trucks.map(v  => ({...v, vtype:"truck"})),
    ...trailers.map(v => ({...v, vtype:"trailer"})),
  ];
  const selected = all.find(v => v.id === value);
  const isCustom = value && value.startsWith("custom_");

  const handleSelect = (v) => {
    onChange(v.id, v.plate, v.brand, v.vtype);
    setOpen(false); setCustom(false);
  };

  const handleCustom = () => {
    if (!customVal.trim()) return;
    onChange("custom_"+customVal, customVal.trim(), "", "truck");
    setCustomVal(""); setCustom(false); setOpen(false);
  };

  // ── Trigger (closed state) ────────────────────────────────────
  const Trigger = () => (
    <button onClick={() => setOpen(true)}
      style={{ width:"100%", background:"#ffffff",
        border:"1px solid "+(value ? "#f97316" : "#2e3350"),
        borderRadius:10, padding:"13px 16px", cursor:"pointer",
        display:"flex", alignItems:"center", justifyContent:"space-between",
        textAlign:"left" }}>
      {selected ? (
        <div>
          <div style={{ fontWeight:800, fontSize:15, color:"#f97316" }}>
            {selected.plate}
          </div>
          <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>
            {selected.vtype==="truck" ? t.truck : t.trailer} — {selected.brand}
          </div>
        </div>
      ) : isCustom ? (
        <div>
          <div style={{ fontWeight:800, fontSize:15, color:"#f97316" }}>
            {value.replace("custom_","")}
          </div>
          <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>✏️ {t.enterCustom}</div>
        </div>
      ) : (
        <span style={{ color:"#64748b", fontSize:14 }}>{t.selectOrEnter}</span>
      )}
      <span style={{ color:"#64748b", fontSize:14, marginLeft:8 }}>▼</span>
    </button>
  );

  // ── Modal overlay (open state) ────────────────────────────────
  if (open) {
    return (
      <div style={{ position:"fixed", inset:0, zIndex:999,
        background:"rgba(0,0,0,0.7)", display:"flex",
        flexDirection:"column", justifyContent:"flex-end" }}>
        <div style={{ background:"#ffffff", borderRadius:"16px 16px 0 0",
          maxHeight:"80vh", display:"flex", flexDirection:"column",
          overflow:"hidden" }}>
          {/* Header */}
          <div style={{ display:"flex", alignItems:"center",
            justifyContent:"space-between", padding:"16px 18px",
            borderBottom:"1px solid #2e3350", flexShrink:0 }}>
            <div style={{ fontWeight:800, fontSize:15, color:"#f1f5f9" }}>
              {t.selectOrEnter}
            </div>
            <button onClick={() => { setOpen(false); setCustom(false); }}
              style={{ background:"none", border:"none", color:"#64748b",
                fontSize:22, cursor:"pointer", padding:0 }}>✕</button>
          </div>

          {/* Scrollable list */}
          <div style={{ overflowY:"auto", flex:1 }}>
            {/* Trucks */}
            {trucks.length > 0 && (
              <div>
                <div style={{ padding:"10px 18px 4px", fontSize:10,
                  color:"#64748b", fontWeight:700, textTransform:"uppercase",
                  letterSpacing:"1.2px" }}>
                  {t.truck}
                </div>
                {trucks.map(v => (
                  <button key={v.id}
                    onClick={() => handleSelect({...v, vtype:"truck"})}
                    style={{ display:"flex", alignItems:"center",
                      justifyContent:"space-between", width:"100%",
                      padding:"13px 18px",
                      background:value===v.id?"#f9731611":"transparent",
                      border:"none", borderBottom:"1px solid #2e335044",
                      cursor:"pointer", textAlign:"left" }}>
                    <div>
                      <div style={{ fontWeight:700, fontSize:15,
                        color:value===v.id?"#f97316":"#f1f5f9" }}>
                        {v.plate}
                      </div>
                      <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>
                        {v.brand}
                      </div>
                    </div>
                    {value===v.id &&
                      <span style={{ color:"#f97316", fontSize:18 }}>✓</span>}
                  </button>
                ))}
              </div>
            )}

            {/* Trailers */}
            {trailers.length > 0 && (
              <div>
                <div style={{ padding:"10px 18px 4px", fontSize:10,
                  color:"#64748b", fontWeight:700, textTransform:"uppercase",
                  letterSpacing:"1.2px", borderTop:"1px solid #2e3350",
                  marginTop:4 }}>
                  {t.trailer}
                </div>
                {trailers.map(v => (
                  <button key={v.id}
                    onClick={() => handleSelect({...v, vtype:"trailer"})}
                    style={{ display:"flex", alignItems:"center",
                      justifyContent:"space-between", width:"100%",
                      padding:"13px 18px",
                      background:value===v.id?"#f9731611":"transparent",
                      border:"none", borderBottom:"1px solid #2e335044",
                      cursor:"pointer", textAlign:"left" }}>
                    <div>
                      <div style={{ fontWeight:700, fontSize:15,
                        color:value===v.id?"#f97316":"#f1f5f9" }}>
                        {v.plate}
                      </div>
                      <div style={{ fontSize:12, color:"#64748b", marginTop:2 }}>
                        {v.brand}
                      </div>
                    </div>
                    {value===v.id &&
                      <span style={{ color:"#f97316", fontSize:18 }}>✓</span>}
                  </button>
                ))}
              </div>
            )}

            {/* Custom entry */}
            <div style={{ padding:"12px 18px 24px",
              borderTop:"1px solid #2e3350", marginTop:4 }}>
              {!custom ? (
                <button onClick={() => setCustom(true)}
                  style={{ width:"100%", padding:"12px 16px",
                    background:"transparent",
                    border:"1px dashed #2e3350", borderRadius:10,
                    color:"#94a3b8", fontSize:14, cursor:"pointer",
                    fontWeight:600, textAlign:"center" }}>
                  ✏️ {t.enterCustom}
                </button>
              ) : (
                <div>
                  <div style={{ fontSize:12, color:"#64748b",
                    marginBottom:8, fontWeight:600 }}>
                    {t.platePh}
                  </div>
                  <div style={{ display:"flex", gap:8 }}>
                    <input autoFocus
                      value={customVal}
                      onChange={e => setCustomVal(e.target.value)}
                      onKeyDown={e => e.key==="Enter" && handleCustom()}
                      placeholder={t.platePh}
                      style={{ flex:1, background:"#f0f4f8",
                        border:"1px solid #f97316", borderRadius:8,
                        padding:"10px 14px", color:"#f1f5f9",
                        fontSize:15, outline:"none",
                        fontFamily:"inherit" }} />
                    <button onClick={handleCustom}
                      style={{ background:"#f97316", color:"#000",
                        border:"none", borderRadius:8, padding:"0 18px",
                        fontWeight:800, fontSize:15, cursor:"pointer" }}>
                      OK
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    );
  }

  return <Trigger />;
}


// ── GPS Location Picker ──────────────────────────────────────────
function LocationPicker({ value, onChange, placeholder, C }) {
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState(null);
  const [coords,  setCoords]  = useState(null);

  const colors = C || { surface:"#1c2840", border:"#2a3a52", white:"#f1f5f9",
    red:"#ef4444", green:"#22c55e", gray500:"#64748b", blue:"#3b82f6",
    navyMid:"#1c2840", blueLt:"#60a5fa" };

  const getLocation = function() {
    if (!navigator.geolocation) {
      setError("GPS: Bitte Standort manuell eingeben");
      return;
    }
    setLoading(true); setError(null);
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        var lat = pos.coords.latitude.toFixed(5);
        var lng = pos.coords.longitude.toFixed(5);
        setCoords({ lat: lat, lng: lng });
        fetch("https://nominatim.openstreetmap.org/reverse?lat="+lat+"&lon="+lng+"&format=json&accept-language=de",
          { headers: { "Accept-Language":"de", "User-Agent":"LTG-App/1.0" }})
          .then(function(r){ return r.json(); })
          .then(function(data) {
            var p = data.address || {};
            var parts = [p.road, p.suburb||p.quarter,
              p.town||p.city||p.village||p.county, p.postcode].filter(Boolean);
            onChange(parts.length ? parts.join(", ") : lat+", "+lng);
          })
          .catch(function(){ onChange(lat+", "+lng); })
          .then(function(){ setLoading(false); },
                function(){ setLoading(false); });
      },
      function(err) {
        var msg = err.message || "";
        if (msg.indexOf("permissions") !== -1 || msg.indexOf("disabled") !== -1 ||
            msg.indexOf("denied") !== -1) {
          setError("GPS: Bitte Standort manuell eingeben");
        } else {
          setError("GPS Fehler - bitte manuell eingeben");
        }
        setLoading(false);
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  };

  var openMaps = function() {
    if (coords) {
      window.open("https://www.google.com/maps?q="+coords.lat+","+coords.lng+"&zoom=16", "_blank");
    }
  };

  return (
    <div>
      <div style={{ display:"flex", gap:8 }}>
        <input value={value} onChange={function(e){ onChange(e.target.value); }}
          placeholder={placeholder || "Standort eingeben..."}
          style={{ flex:1, background:colors.surface, border:"1px solid "+colors.border,
            borderRadius:10, padding:"12px 14px", color:colors.white,
            fontSize:14, outline:"none", fontFamily:"inherit",
            boxSizing:"border-box" }} />
        <button onClick={getLocation} disabled={loading}
          style={{ background:loading ? colors.navyMid : colors.blue, border:"none",
            borderRadius:10, padding:"0 16px",
            cursor:loading ? "not-allowed" : "pointer",
            fontSize:20, color:"#fff", flexShrink:0,
            opacity:loading ? 0.6 : 1, minWidth:52 }}>
          {loading ? "..." : "📍"}
        </button>
        {coords && (
          <button onClick={openMaps}
            style={{ background:colors.surface, border:"1px solid "+colors.border,
              borderRadius:10, padding:"0 14px", cursor:"pointer",
              fontSize:20, flexShrink:0 }}>
            🗺
          </button>
        )}
      </div>
      {error && (
        <div style={{ fontSize:11, color:colors.gray500, marginTop:5, fontStyle:"italic" }}>
          {error}
        </div>
      )}
      {coords && (
        <div style={{ fontSize:11, color:colors.gray500, marginTop:5 }}>
          📍 {coords.lat}, {coords.lng}
          <button onClick={openMaps}
            style={{ background:"none", border:"none", color:colors.blueLt,
              cursor:"pointer", fontSize:11, padding:"0 4px",
              textDecoration:"underline" }}>
            Google Maps
          </button>
        </div>
      )}
    </div>
  );
}


function App() {
  const [lang, setLang] = useState("de");
  const [screen, setScreen] = useState("home");
  const [prevScreen, setPrevScreen] = useState("home");
  const [driverName, setDriverName] = useState("");
  const [homeAction, setHomeAction] = useState("truckSetup");

  const [truckVehicle, setTruckVehicle] = useState(null);
  const [truckChecks, setTruckChecks] = useState({});
  const [truckDefects, setTruckDefects] = useState("");
  const [truckPhotos, setTruckPhotos] = useState([]);
  const [truckTranslated, setTruckTranslated] = useState("");
  const [truckLoading, setTruckLoading] = useState(false);
  const [truckResult, setTruckResult] = useState("ok");

  const [trailerVehicle, setTrailerVehicle] = useState(null);
  const [trailerChecks, setTrailerChecks] = useState({});
  const [trailerDefects, setTrailerDefects] = useState("");
  const [trailerPhotos, setTrailerPhotos] = useState([]);
  const [trailerTranslated, setTrailerTranslated] = useState("");
  const [trailerLoading, setTrailerLoading] = useState(false);
  const [trailerResult, setTrailerResult] = useState("ok");

  const [bd, setBd] = useState({vehicle:"",type:"",location:"",description:"",urgency:"",photos:[]});
  const [bdSent, setBdSent] = useState(false);
  const [bdAlertId, setBdAlertId] = useState(null);
  const [bdAlertStatus, setBdAlertStatus] = useState("open");
  const [bdSending, setBdSending] = useState(false);
  const [bdTranslated, setBdTranslated] = useState("");

  const t = T[lang];

  const getInspectionResult = function(checks, items) {
    return items.some(function(item){ return checks[item.k] === "not_ok"; }) ? "not_ok" : "ok";
  };

  const getInspectionStats = function(checks, items) {
    var marked = items.filter(function(item){ return checks[item.k] === "ok" || checks[item.k] === "not_ok"; }).length;
    var bad = items.filter(function(item){ return checks[item.k] === "not_ok"; }).length;
    return { marked: marked, total: items.length, bad: bad, complete: marked === items.length };
  };

  const getBadInspectionItems = function(checks, items) {
    return items
      .filter(function(item){ return checks[item.k] === "not_ok"; })
      .map(function(item){ return { key: item.k, label: item.label }; });
  };

  const submitTruck = function() {
    const inspectionResult = getInspectionResult(truckChecks, t.truckChecks);
    const inspectionStats = getInspectionStats(truckChecks, t.truckChecks);
    const badItems = getBadInspectionItems(truckChecks, t.truckChecks);
    setTruckResult(inspectionResult);
    setTruckLoading(true);
    translateToGerman(lang !== "de" && safeTrim(truckDefects) ? truckDefects : "")
      .then(async function(tr) {
        if (tr && tr !== "") setTruckTranslated(tr);
        try {
          // 1. Загружаем фото в Storage
          const rId = "TRK-" + Date.now();
          let photoUrls = [];
          if (truckPhotos && truckPhotos.length > 0) {
            const ups = await Promise.all(truckPhotos.map((p, i) => uploadPhotoToStorage(p, rId, i)));
            photoUrls = ups.filter(Boolean);
          }
          // 2. Сохраняем полный отчёт в reports
          const report = await sbInsertReport({
            id: rId,
            source_app: "fahrer",
            source_type: "inspection_truck",
            sender: driverName || "",
            plate: truckVehicle ? (truckVehicle.plate || "") : "",
            location: "Werkstatt",
            description: (tr && tr !== "") ? tr : (safeTrim(truckDefects) || (inspectionResult === "ok" ? "LKW-Inspektion OK" : "LKW-Inspektion nicht OK")),
            urgency: inspectionResult === "not_ok" ? "urgent" : "info",
            checklist_json: { inspection_type: "truck", checks: truckChecks, stats: inspectionStats },
            defects_json: { result: inspectionResult, defects_text: truckDefects || "", bad_items: badItems },
            photos: photoUrls,
            status: "new"
          });
          // 3. Если есть мангел — сигнал в alerts
          if (inspectionResult === "not_ok") {
            await sbInsert("alerts", {
              id: "A" + Date.now(),
              type: "inspection_truck",
              plate: truckVehicle ? (truckVehicle.plate || "") : "",
              location: "Werkstatt",
              description: safeTrim(truckDefects) || "LKW-Inspektion: Mangel festgestellt",
              urgency: "normal",
              sender: driverName || "driver",
              sender_app: "fahrer",
              status: "open",
              report_id: report ? report.id : rId
            });
          }
          // 4. Создаём job как раньше
          await createJob({
            source_app: "driver", source_type: "inspection_truck",
            asset_type: "truck",
            asset_label: truckVehicle ? ((truckVehicle.plate || "") + (truckVehicle.brand ? " - " + truckVehicle.brand : "")) : "",
            reporter_name: driverName || "", reporter_contact: driverName || "",
            language: lang || "de",
            urgency: inspectionResult === "not_ok" ? "medium" : "low",
            status: "new",
            description_raw: safeTrim(truckDefects) || (inspectionResult === "ok" ? "Truck inspection OK" : "Truck inspection not OK"),
            description_de: (tr && tr !== "") ? tr : (safeTrim(truckDefects) || (inspectionResult === "ok" ? "LKW-Inspektion OK" : "LKW-Inspektion nicht OK")),
            checklist_json: { inspection_type: "truck", checks: truckChecks, stats: inspectionStats },
            defects_json: { result: inspectionResult, defects_text: truckDefects || "", bad_items: badItems, photos: photoUrls }
          });
        } catch(e) { console.error("submitTruck:", e); }
        setTruckLoading(false);
        setScreen("truckDone");
      })
      .catch(function(){ setTruckLoading(false); setScreen("truckDone"); });
  };

  const submitTrailer = function() {
    const inspectionResult = getInspectionResult(trailerChecks, t.trailerChecks);
    const inspectionStats = getInspectionStats(trailerChecks, t.trailerChecks);
    const badItems = getBadInspectionItems(trailerChecks, t.trailerChecks);
    setTrailerResult(inspectionResult);
    setTrailerLoading(true);
    translateToGerman(lang !== "de" && safeTrim(trailerDefects) ? trailerDefects : "")
      .then(async function(tr) {
        if (tr && tr !== "") setTrailerTranslated(tr);
        try {
          // 1. Загружаем фото
          const rId = "TRL-" + Date.now();
          let photoUrls = [];
          if (trailerPhotos && trailerPhotos.length > 0) {
            const ups = await Promise.all(trailerPhotos.map((p, i) => uploadPhotoToStorage(p, rId, i)));
            photoUrls = ups.filter(Boolean);
          }
          // 2. Полный отчёт в reports
          const report = await sbInsertReport({
            id: rId,
            source_app: "fahrer",
            source_type: "inspection_trailer",
            sender: driverName || "",
            plate: trailerVehicle ? (trailerVehicle.plate || "") : "",
            location: "Werkstatt",
            description: (tr && tr !== "") ? tr : (safeTrim(trailerDefects) || (inspectionResult === "ok" ? "Auflieger-Inspektion OK" : "Auflieger-Inspektion nicht OK")),
            urgency: inspectionResult === "not_ok" ? "urgent" : "info",
            checklist_json: { inspection_type: "trailer", checks: trailerChecks, stats: inspectionStats },
            defects_json: { result: inspectionResult, defects_text: trailerDefects || "", bad_items: badItems },
            photos: photoUrls,
            status: "new"
          });
          // 3. Сигнал в alerts только если mangel
          if (inspectionResult === "not_ok") {
            await sbInsert("alerts", {
              id: "A" + Date.now(),
              type: "inspection_trailer",
              plate: trailerVehicle ? (trailerVehicle.plate || "") : "",
              location: "Werkstatt",
              description: safeTrim(trailerDefects) || "Auflieger-Inspektion: Mangel festgestellt",
              urgency: "normal",
              sender: driverName || "driver",
              sender_app: "fahrer",
              status: "open",
              report_id: report ? report.id : rId
            });
          }
          // 4. Job как раньше
          await createJob({
            source_app: "driver", source_type: "inspection_trailer",
            asset_type: "trailer",
            asset_label: trailerVehicle ? ((trailerVehicle.plate || "") + (trailerVehicle.brand ? " - " + trailerVehicle.brand : "")) : "",
            reporter_name: driverName || "", reporter_contact: driverName || "",
            language: lang || "de",
            urgency: inspectionResult === "not_ok" ? "medium" : "low",
            status: "new",
            description_raw: safeTrim(trailerDefects) || (inspectionResult === "ok" ? "Trailer inspection OK" : "Trailer inspection not OK"),
            description_de: (tr && tr !== "") ? tr : (safeTrim(trailerDefects) || (inspectionResult === "ok" ? "Auflieger-Inspektion OK" : "Auflieger-Inspektion nicht OK")),
            checklist_json: { inspection_type: "trailer", checks: trailerChecks, stats: inspectionStats },
            defects_json: { result: inspectionResult, defects_text: trailerDefects || "", bad_items: badItems, photos: photoUrls }
          });
        } catch(e) { console.error("submitTrailer:", e); }
        setTrailerLoading(false);
        setScreen("trailerDone");
      })
      .catch(function(){ setTrailerLoading(false); setScreen("trailerDone"); });
  };

  const submitBreakdown = function() {
    var ok = bd.vehicle && bd.type && bd.location && bd.description && bd.urgency && driverName;
    if (!ok) return;
    setBdSending(true);
    var alertId = "A" + Date.now();
    var rId = "BD-" + Date.now();
    translateToGerman(lang !== "de" && bd.description.trim() ? bd.description : "")
      .then(async function(tr) {
        if (tr && tr !== "") setBdTranslated(tr);
        try {
          // 1. Загружаем фото в Storage (сжатые)
          let photoUrls = [];
          if (bd.photos && bd.photos.length > 0) {
            const ups = await Promise.all(bd.photos.map((p, i) => uploadPhotoToStorage(p, rId, i)));
            photoUrls = ups.filter(Boolean);
          }
          // 2. Полный отчёт в reports
          const report = await sbInsertReport({
            id: rId,
            source_app: "fahrer",
            source_type: bd.vehicle === "trailer" ? "breakdown_trailer" : "breakdown_truck",
            sender: driverName || "",
            plate: bd.plate || "",
            location: bd.location || "",
            description: (tr && tr !== "") ? tr : (bd.description || ""),
            urgency: bd.urgency || "urgent",
            checklist_json: null,
            defects_json: { issue_type: bd.type || "breakdown", urgent: bd.urgency === "urgent" },
            photos: photoUrls,
            status: "new"
          });
          // 3. Краткий сигнал в alerts (всегда при поломке)
          await sbInsert("alerts", {
            id: alertId,
            type: bd.type || "breakdown",
            plate: bd.plate || null,
            location: bd.location || "",
            description: bd.description || "",
            urgency: bd.urgency || "urgent",
            sender: driverName || "driver",
            sender_app: "fahrer",
            status: "open",
            report_id: report ? report.id : rId
          });
          // 4. Job как раньше
          await createJob({
            source_app: "driver",
            source_type: bd.vehicle === "trailer" ? "breakdown_trailer" : "breakdown_truck",
            asset_type: bd.vehicle === "trailer" ? "trailer" : "truck",
            asset_label: bd.plate || bd.vehicle || "",
            reporter_name: driverName || "",
            reporter_contact: driverName || "",
            language: lang || "de",
            urgency: toJobUrgency(bd.urgency),
            status: "new",
            location_label: bd.location || "",
            description_raw: bd.description || "",
            description_de: (tr && tr !== "") ? tr : (bd.description || ""),
            defects_json: { issue_type: bd.type || "breakdown", urgent: bd.urgency === "urgent", photos: photoUrls }
          });
        } catch(e) { console.error("submitBreakdown:", e); }
        setBdSending(false);
        setBdAlertId(alertId);
        setBdAlertStatus("open");
        setBdSent(true);
        var pollInterval = setInterval(function() {
          fetch(SB_URL + "/rest/v1/alerts?id=eq." + alertId + "&select=status", {
            headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
          }).then(function(r){ return r.json(); })
            .then(function(d){
              if (d && d[0]) {
                setBdAlertStatus(d[0].status);
                if (d[0].status === "done") clearInterval(pollInterval);
              }
            }).catch(function(){});
        }, 10000);
      })
      .catch(function(){ setBdSending(false); });
  };

  const DoneCard = ({ label, original, translated, color }) => (
    original ? (
      <div style={{ background:C.surface, border:"1px solid "+C.border,
        borderRadius:12, padding:14, marginBottom:14, textAlign:"left" }}>
        <div style={{ fontSize:11, color:C.gray5, marginBottom:4, textTransform:"uppercase" }}>
          {label}
        </div>
        <div style={{ fontSize:13, color:C.gray3, marginBottom: translated && translated!==original ? 10 : 0 }}>
          {original}
        </div>
        {translated && translated !== original && (
          <div>
            <div style={{ fontSize:11, color:C.orange, fontWeight:700,
              textTransform:"uppercase", marginBottom:4 }}>
              {t.translatedAuto || "Deutsch (auto)"}
            </div>
            <div style={{ fontSize:13, color:C.white }}>{translated}</div>
          </div>
        )}
      </div>
    ) : null
  );

  return (
    <div style={{ minHeight:"100vh", background:C.bg,
      fontFamily:"'DM Sans','Segoe UI',sans-serif", color:C.white }}>

      <div style={{ position:"sticky", top:0, zIndex:100 }}>
        <div style={{ height:5, background:"linear-gradient(90deg, #1e4fa0 0%, #f5a623 40%, #f5a623 60%, #1e4fa0 100%)" }} />
        <div style={{ background:"#1e4fa0", borderBottom:"1px solid #1a3a8a",
          padding:"0 14px", height:54, display:"flex", alignItems:"center",
          justifyContent:"space-between" }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          {screen !== "home" && (
            <button onClick={function(){ var p = prevScreen; setPrevScreen(screen); setScreen(p); }}
              style={{ background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.3)",
                borderRadius:8, color:"#fff",
                cursor:"pointer", fontSize:22, padding:"4px 12px", fontWeight:700 }}>
              ←
            </button>
          )}
          <LTGLogo size={0.65} />
        </div>
        <div style={{ display:"flex", gap:7, alignItems:"center", justifyContent:"flex-end", paddingRight:4 }}>
          {LANGS.map(l => {
            const langLabel = ({de:"DE",ru:"RU",en:"GB",uk:"UA",ro:"RO",hu:"HU",cs:"CZ"}[l.code] || l.code.toUpperCase());
            const active = lang===l.code;
            return (
              <button key={l.code} onClick={() => setLang(l.code)}
                aria-label={langLabel}
                style={{
                  minWidth:42, height:34, padding:"0 10px", borderRadius:10,
                  border:active ? "1px solid #f5a623" : "1px solid rgba(255,255,255,0.22)",
                  cursor:"pointer", fontSize:13, fontWeight:900, letterSpacing:"0.4px",
                  background:active ? "#f5a623" : "rgba(255,255,255,0.10)",
                  opacity:active ? 1 : 0.82,
                  color:active ? "#10254a" : "#fff",
                  boxShadow:active ? "0 6px 16px rgba(245,166,35,0.28)" : "none"
                }}>
                {langLabel}
              </button>
            );
          })}
        </div>
        </div>
      </div>

      {/* HOME */}
      {screen === "home" && (
        <div style={{ padding:"24px 16px", maxWidth:480, margin:"0 auto" }}>

            <div style={{ display:"inline-flex", flexDirection:"column", alignItems:"center", justifyContent:"center",

              background:"linear-gradient(135deg, #1a3a6b, #0f2445)",
              border:"1px solid rgba(200,168,75,0.65)", boxShadow:"0 10px 24px rgba(26,58,107,0.22)" }}>
              <div style={{ color:C.orange, fontSize:22, fontWeight:900, letterSpacing:"1.7px", lineHeight:1 }}>LTG</div>
              <div style={{ color:"#fff", fontSize:9, fontWeight:800, letterSpacing:"1.3px", marginTop:6 }}>{t.fleetCheck || "FLEET CHECK"}</div>
            </div>
            <div style={{ fontSize:21, fontWeight:900 }}>{t.title}</div>
            <div style={{ fontSize:13, color:C.gray5, marginTop:3 }}>{t.subtitle}</div>
          </div>

          <div style={{ marginBottom:22 }}>
            <div style={{ fontSize:12, fontWeight:900, color:C.gray3,
              textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:8 }}>

            </div>
            <input value={driverName} onChange={e => setDriverName(e.target.value)}
              placeholder={t.namePh}
              style={{ width:"100%", background:C.surface, border:"1px solid "+C.border,
                borderRadius:12, padding:"14px 15px", color:C.white, fontSize:16,
                outline:"none", boxSizing:"border-box", fontFamily:"inherit" }} />
          </div>

          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            {[
              { screen:"truckSetup", code:t.truckCode || "LKW", label:t.inspectTruck,
                sub:t.truckChecks.length+" "+(t.points||"Punkte"), color:C.green },
              { screen:"trailerSetup", code:t.trailerCode || "ANH", label:t.inspectTrailer,
                sub:t.trailerChecks.length+" "+(t.points||"Punkte"), color:C.blue },
              { screen:"breakdown", code:t.sosCode || "SOS", label:t.reportBreakdown,
                sub:t.breakdownTitle, color:C.red },
            ].map(btn => (
              <button key={btn.screen} onClick={() => setScreen(btn.screen)}
                style={{
                  width:"100%",
                  minHeight:132,
                  background:"linear-gradient(135deg,"+btn.color+"20,"+btn.color+"0d)",
                  border:"2px solid "+btn.color,
                  borderRadius:18,
                  padding:"22px 20px",
                  cursor:"pointer",
                  textAlign:"left",
                  boxShadow:"0 12px 26px rgba(26,58,107,0.10)",
                  fontFamily:"inherit"
                }}>
                <div style={{ display:"inline-flex", alignItems:"center", justifyContent:"center",
                  minWidth:64, height:38, padding:"0 13px", borderRadius:11, marginBottom:13,
                  background:btn.color+"18", border:"1px solid "+btn.color,
                  color:btn.color, fontSize:14, fontWeight:900, letterSpacing:"0.8px" }}>
                  {btn.code}
                </div>
                <div style={{ fontSize:20, fontWeight:900, color:C.white, marginBottom:6 }}>

              </button>
            ))}
          </div>
        </div>
      )}

{screen === "truckSetup" && (

          <button onClick={function(){ setPrevScreen(screen); setScreen("home"); }}
            style={{ background:"none", border:"none", color:C.gray5,
              cursor:"pointer", fontSize:13, marginBottom:16, padding:0 }}>

          </button>
          <div style={{ fontSize:17, fontWeight:800, marginBottom:16 }}>{t.selectTruck}</div>
          <VehicleSelect
            trucks={TRUCKS} trailers={[]}
            value={(truckVehicle && truckVehicle.id) || ""}
            onChange={(id, plate, brand) => {

          />

      {/* TRUCK CHECKLIST */}
      {screen === "truckCheck" && (
        <div style={{ padding:"16px", maxWidth:460, margin:"0 auto" }}>

                    background:truckChecks[item.k] === "not_ok" ? C.red+"10" : (truckChecks[item.k] === "ok" ? C.green+"10" : C.surface),
                    border:"1px solid "+(truckChecks[item.k] === "not_ok" ? C.red : (truckChecks[item.k] === "ok" ? C.green : C.border)),
                    borderRadius:12, padding:"12px 10px", marginBottom:10,
                    transition:"all 0.15s" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:12, minWidth:0 }}>
                    <span style={{ minWidth:42, height:26, borderRadius:7, display:"inline-flex", alignItems:"center", justifyContent:"center", background:"rgba(26,58,107,0.08)", border:"1px solid rgba(26,58,107,0.18)", color:C.navy, fontSize:10, fontWeight:900, letterSpacing:"0.4px" }}>{item.emoji}</span>
                    <span style={{ fontWeight:700, fontSize:14, color:C.white, lineHeight:1.25 }}>
                      {item.label}
                    </span>
                  </div>
                  <button type="button" onClick={() => setTruckChecks(c => ({...c,[item.k]:"ok"}))}
                    style={{ height:36, borderRadius:9, border:"1px solid "+(truckChecks[item.k] === "ok" ? C.green : C.border),
                      background:truckChecks[item.k] === "ok" ? C.green : C.bg,
                      color:truckChecks[item.k] === "ok" ? "#fff" : C.gray3,
                      fontWeight:900, fontSize:16, cursor:"pointer" }}>✓</button>
                  <button type="button" onClick={() => setTruckChecks(c => ({...c,[item.k]:"not_ok"}))}
                    style={{ height:36, borderRadius:9, border:"1px solid "+(truckChecks[item.k] === "not_ok" ? C.red : C.border),
                      background:truckChecks[item.k] === "not_ok" ? C.red : C.bg,
                      color:truckChecks[item.k] === "not_ok" ? "#fff" : C.gray3,
                      fontWeight:900, fontSize:12, cursor:"pointer" }}>{t.notOkShort}</button>
                </div>
              ))}
              <div style={{ background:C.surface, border:"1px solid "+C.border,
                borderRadius:12, padding:14, marginBottom:12 }}>
                <div style={{ fontSize:12, fontWeight:700, color:C.gray3,
                  textTransform:"uppercase", marginBottom:8 }}>{t.defects}</div>
                <textarea value={truckDefects} onChange={e => setTruckDefects(e.target.value)}
                  placeholder={t.defectsPh}
                  style={{ width:"100%", background:C.bg, border:"1px solid "+C.border,
                    borderRadius:8, padding:"10px 12px", color:C.white,
                    fontSize:14, resize:"vertical", minHeight:70,
                    fontFamily:"inherit", outline:"none", boxSizing:"border-box" }} />
              </div>
              <PhotoUpload photos={truckPhotos}
                onAdd={r => setTruckPhotos(p => [...p,...r])}
                onRemove={i => setTruckPhotos(p => p.filter((_,j)=>j!==i))}
                label={t.photo} />
              {(() => {
                const stats = getInspectionStats(truckChecks, t.truckChecks);
                const okState = stats.bad === 0;
                return (
                  <div>
                    <div style={{ background:okState?C.green+"12":C.red+"10",
                      border:"1px solid "+(okState?C.green:C.red)+"33",
                      borderRadius:10, padding:"10px 14px", marginBottom:14,
                      fontSize:13, color:okState?C.green:C.red, fontWeight:700 }}>
                      {stats.marked}/{stats.total} {t.checkedLabel || "checked"} · {stats.bad === 0 ? (t.okShort || "OK") : stats.bad+" "+(t.notOkShort || "Not OK")}
                    </div>
                    <button onClick={submitTruck}
                      style={{ width:"100%", background:okState?C.green:C.orange,
                        color:okState?"#fff":"#000", border:"none", borderRadius:12,
                        padding:"14px 0", fontWeight:900, fontSize:15,
                        cursor:"pointer", opacity:1 }}>
                      {t.submit}
                    </button>
                  </div>
                );
              })()}
            </div>
          )}
        </div>
      )}

      {/* TRUCK DONE */}
      {screen === "truckDone" && (
        <div style={{ padding:"40px 16px", maxWidth:460, margin:"0 auto", textAlign:"center" }}>
          <div style={{ fontSize:64, marginBottom:12 }}>
            {truckResult === "not_ok" ? "⚠️" : "✅"}
          </div>
          <div style={{ fontSize:22, fontWeight:900, marginBottom:6,
            color:truckResult === "not_ok" ? C.yellow : C.green }}>
            {t.done}
          </div>
          <div style={{ fontSize:14, color:C.gray3, marginBottom:24 }}>
            {truckResult === "not_ok" ? t.defectsFound : t.ok}
          </div>
          <DoneCard label={t.defects} original={truckDefects} translated={truckTranslated} />
          <button onClick={() => {
            setTruckChecks({}); setTruckDefects(""); setTruckPhotos([]);
            setTruckTranslated(""); setTruckResult("ok"); setScreen("home");
          }} style={{ width:"100%", background:C.orange, color:"#000",
            border:"none", borderRadius:12, padding:"14px 0",
            fontWeight:900, fontSize:15, cursor:"pointer" }}>
            {t.newInspection}
          </button>
        </div>
      )}

      {/* TRAILER SETUP */}
      {screen === "trailerSetup" && (
        <div style={{ padding:"16px", maxWidth:460, margin:"0 auto" }}>
          <button onClick={function(){ setPrevScreen(screen); setScreen("home"); }}
            style={{ background:"none", border:"none", color:C.gray5,
              cursor:"pointer", fontSize:13, marginBottom:16, padding:0 }}>
            {t.back}
          </button>
          <div style={{ fontSize:17, fontWeight:800, marginBottom:16 }}>{t.selectTrailer}</div>
          <VehicleSelect
            trucks={[]} trailers={TRAILERS}
            value={(trailerVehicle && trailerVehicle.id) || ""}
            onChange={(id, plate, brand) => {
              setTrailerVehicle({id, plate, brand});
              setScreen("trailerCheck");
            }}
            t={t} C={C}
          />
        </div>
      )}

      {/* TRAILER CHECKLIST */}
      {screen === "trailerCheck" && (
        <div style={{ padding:"16px", maxWidth:460, margin:"0 auto" }}>
          {trailerLoading ? (
            <div style={{ textAlign:"center", padding:60 }}>
              <div style={{ fontSize:22, fontWeight:900, letterSpacing:"1px", marginBottom:12 }}>...</div>
              <div style={{ color:C.orange, fontWeight:700 }}>{t.translating}</div>
            </div>
          ) : (
            <div>
              <button onClick={function(){ setPrevScreen(screen); setScreen("trailerSetup"); }}
                style={{ background:"none", border:"none", color:C.gray5,
                  cursor:"pointer", fontSize:13, marginBottom:16, padding:0 }}>
                {t.back}
              </button>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20 }}>
                <span style={{ minWidth:46, height:30, borderRadius:8, display:"inline-flex", alignItems:"center", justifyContent:"center", background:C.blue+"18", border:"1px solid "+C.blue, color:C.blue, fontSize:12, fontWeight:900, letterSpacing:"0.8px" }}>{t.trailerCode || "TRL"}</span>
                <div>
                  <div style={{ fontSize:17, fontWeight:800 }}>{t.inspectTrailer}</div>
                  <div style={{ fontSize:13, color:C.gray5 }}>
                    {trailerVehicle ? trailerVehicle.plate : ""} - {trailerVehicle ? trailerVehicle.brand : ""}
                  </div>
                </div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 54px 72px",
                gap:8, alignItems:"center", padding:"0 10px 8px 10px",
                color:C.gray3, fontSize:10, fontWeight:900, letterSpacing:"0.5px",
                textTransform:"uppercase" }}>
                <div></div>
                <div style={{ textAlign:"center" }}>{t.okShort || "OK"}</div>
                <div style={{ textAlign:"center" }}>{t.notOkShort}</div>
              </div>
              {t.trailerChecks.map(item => (
                <div key={item.k}
                  style={{ display:"grid", gridTemplateColumns:"1fr 54px 72px",
                    alignItems:"center", gap:8, width:"100%",
                    background:trailerChecks[item.k] === "not_ok" ? C.red+"10" : (trailerChecks[item.k] === "ok" ? C.green+"10" : C.surface),
                    border:"1px solid "+(trailerChecks[item.k] === "not_ok" ? C.red : (trailerChecks[item.k] === "ok" ? C.green : C.border)),
                    borderRadius:12, padding:"12px 10px", marginBottom:10,
                    transition:"all 0.15s" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:12, minWidth:0 }}>
                    <span style={{ minWidth:42, height:26, borderRadius:7, display:"inline-flex", alignItems:"center", justifyContent:"center", background:"rgba(26,58,107,0.08)", border:"1px solid rgba(26,58,107,0.18)", color:C.navy, fontSize:10, fontWeight:900, letterSpacing:"0.4px" }}>{item.emoji}</span>
                    <span style={{ fontWeight:700, fontSize:14, color:C.white, lineHeight:1.25 }}>
                      {item.label}
                    </span>
                  </div>
                  <button type="button" onClick={() => setTrailerChecks(c => ({...c,[item.k]:"ok"}))}
                    style={{ height:36, borderRadius:9, border:"1px solid "+(trailerChecks[item.k] === "ok" ? C.green : C.border),
                      background:trailerChecks[item.k] === "ok" ? C.green : C.bg,
                      color:trailerChecks[item.k] === "ok" ? "#fff" : C.gray3,
                      fontWeight:900, fontSize:16, cursor:"pointer" }}>✓</button>
                  <button type="button" onClick={() => setTrailerChecks(c => ({...c,[item.k]:"not_ok"}))}
                    style={{ height:36, borderRadius:9, border:"1px solid "+(trailerChecks[item.k] === "not_ok" ? C.red : C.border),
                      background:trailerChecks[item.k] === "not_ok" ? C.red : C.bg,
                      color:trailerChecks[item.k] === "not_ok" ? "#fff" : C.gray3,
                      fontWeight:900, fontSize:12, cursor:"pointer" }}>{t.notOkShort}</button>
                </div>
              ))}
              <div style={{ background:C.surface, border:"1px solid "+C.border,
                borderRadius:12, padding:14, marginBottom:12 }}>
                <div style={{ fontSize:12, fontWeight:700, color:C.gray3,
                  textTransform:"uppercase", marginBottom:8 }}>{t.defects}</div>
                <textarea value={trailerDefects} onChange={e => setTrailerDefects(e.target.value)}
                  placeholder={t.defectsPh}
                  style={{ width:"100%", background:C.bg, border:"1px solid "+C.border,
                    borderRadius:8, padding:"10px 12px", color:C.white,
                    fontSize:14, resize:"vertical", minHeight:70,
                    fontFamily:"inherit", outline:"none", boxSizing:"border-box" }} />
              </div>
              <PhotoUpload photos={trailerPhotos}
                onAdd={r => setTrailerPhotos(p => [...p,...r])}
                onRemove={i => setTrailerPhotos(p => p.filter((_,j)=>j!==i))}
                label={t.photo} />
              {(() => {
                const stats = getInspectionStats(trailerChecks, t.trailerChecks);
                const okState = stats.bad === 0;
                return (
                  <div>
                    <div style={{ background:okState?C.green+"12":C.red+"10",
                      border:"1px solid "+(okState?C.green:C.red)+"33",
                      borderRadius:10, padding:"10px 14px", marginBottom:14,
                      fontSize:13, color:okState?C.green:C.red, fontWeight:700 }}>
                      {stats.marked}/{stats.total} {t.checkedLabel || "checked"} · {stats.bad === 0 ? (t.okShort || "OK") : stats.bad+" "+(t.notOkShort || "Not OK")}
                    </div>
                    <button onClick={submitTrailer}
                      style={{ width:"100%", background:okState?C.green:C.orange,
                        color:okState?"#fff":"#000", border:"none", borderRadius:12,
                        padding:"14px 0", fontWeight:900, fontSize:15,
                        cursor:"pointer", opacity:1 }}>
                      {t.submit}
                    </button>
                  </div>
                );
              })()}
            </div>
          )}
        </div>
      )}

      {/* TRAILER DONE */}
      {screen === "trailerDone" && (
        <div style={{ padding:"40px 16px", maxWidth:460, margin:"0 auto", textAlign:"center" }}>
          <div style={{ fontSize:64, marginBottom:12 }}>
            {trailerResult === "not_ok" ? "⚠️" : "✅"}
          </div>
          <div style={{ fontSize:22, fontWeight:900, marginBottom:6,
            color:trailerResult === "not_ok" ? C.yellow : C.green }}>
            {t.done}
          </div>
          <div style={{ fontSize:14, color:C.gray3, marginBottom:24 }}>
            {trailerResult === "not_ok" ? t.defectsFound : t.ok}
          </div>
          <DoneCard label={t.defects} original={trailerDefects} translated={trailerTranslated} />
          <button onClick={() => {
            setTrailerChecks({}); setTrailerDefects(""); setTrailerPhotos([]);
            setTrailerTranslated(""); setTrailerResult("ok"); setScreen("home");
          }} style={{ width:"100%", background:C.orange, color:"#000",
            border:"none", borderRadius:12, padding:"14px 0",
            fontWeight:900, fontSize:15, cursor:"pointer" }}>
            {t.newInspection}
          </button>
        </div>
      )}

      {/* BREAKDOWN */}
      {screen === "breakdown" && (
        <div style={{ padding:"16px", maxWidth:460, margin:"0 auto", paddingBottom:40 }}>
          {bdSent ? (
            <div style={{ textAlign:"center", padding:"40px 0" }}>
              <div style={{ display:"inline-flex", alignItems:"center", justifyContent:"center", minWidth:96, height:64, borderRadius:16, marginBottom:12, background:bd.urgency==="urgent"?C.red+"18":C.green+"18", border:"2px solid "+(bd.urgency==="urgent"?C.red:C.green), color:bd.urgency==="urgent"?C.red:C.green, fontSize:22, fontWeight:900, letterSpacing:"1.2px" }}>
                {bd.urgency==="urgent" ? (t.sosCode || "SOS") : (t.okShort || "OK")}
              </div>
              <div style={{ fontSize:22, fontWeight:900, marginBottom:8,
                color:bd.urgency==="urgent"?C.red:C.green }}>
                {t.sent}
              </div>
              <div style={{ fontSize:14, color:C.gray3, marginBottom:16 }}>{t.sentDesc}</div>
              <div style={{ background: bdAlertStatus === "done" ? "#16a34a22" : bdAlertStatus === "inProgress" ? "#f59e0b22" : "#3b82f622",
                border: "1px solid " + (bdAlertStatus === "done" ? "#16a34a" : bdAlertStatus === "inProgress" ? "#f59e0b" : "#3b82f6"),
                borderRadius:10, padding:"12px 16px", marginBottom:20, textAlign:"center" }}>
                <div style={{ fontSize:13, fontWeight:700,
                  color: bdAlertStatus === "done" ? "#22c55e" : bdAlertStatus === "inProgress" ? "#f59e0b" : "#60a5fa" }}>
                  {bdAlertStatus === "done" ? "✅ " + (t.statusDone || "Erledigt") :
                   bdAlertStatus === "inProgress" ? "🔧 " + (t.statusInProgress || "In Bearbeitung") : "📨 " + (t.statusWaitingMechanic || "Gesendet — warte auf Mechaniker...")}
                </div>
              </div>
              <DoneCard label={t.description} original={bd.description} translated={bdTranslated} />
              <button onClick={() => {
                setBd({vehicle:"",type:"",location:"",description:"",urgency:"",photos:[]});
                setBdSent(false); setBdTranslated(""); setScreen("home");
              }} style={{ width:"100%", background:C.orange, color:"#000",
                border:"none", borderRadius:12, padding:"14px 0",
                fontWeight:900, fontSize:15, cursor:"pointer" }}>
                {t.newReport}
              </button>
            </div>
          ) : (
            <div>
              <button onClick={function(){ setPrevScreen(screen); setScreen("home"); }}
                style={{ background:"none", border:"none", color:C.gray5,
                  cursor:"pointer", fontSize:13, marginBottom:16, padding:0 }}>
                {t.back}
              </button>
              <div style={{ fontSize:17, fontWeight:800, marginBottom:20 }}>
                {t.breakdownTitle}
              </div>

              {/* Driver name - show if empty */}
              {!driverName && (
                <div style={{ background:"#f59e0b22", border:"1px solid #f59e0b44",
                  borderRadius:10, padding:"12px 14px", marginBottom:14 }}>
                  <div style={{ fontSize:12, fontWeight:700, color:"#f59e0b",
                    textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:8 }}>
                    {t.yourName} *
                  </div>
                  <input value={driverName} onChange={e => setDriverName(e.target.value)}
                    placeholder={t.namePh}
                    style={{ width:"100%", background:C.surface, border:"1px solid #f59e0b",
                      borderRadius:10, padding:"12px 14px", color:C.white, fontSize:15,
                      outline:"none", boxSizing:"border-box", fontFamily:"inherit" }} />
                </div>
              )}

              {/* Vehicle select */}
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:12, fontWeight:700, color:C.gray3,
                  textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:8 }}>
                  {t.selectTruck} / {t.selectTrailer} *
                </div>
                <VehicleSelect
                trucks={TRUCKS} trailers={TRAILERS}
                value={bd.vehicle}
                onChange={(id, plate, brand, vtype) =>
                  setBd(b=>({...b, vehicle:id, plate, brand, vtype}))}
                t={t} C={C}
              />
              </div>

              {/* Type */}
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:12, fontWeight:700, color:C.gray3,
                  textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:8 }}>
                  {t.breakdownType} *
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                  {t.types.map(tp => (
                    <button key={tp.k} onClick={() => setBd(b=>({...b,type:tp.k}))}
                      style={{ padding:"12px 8px", borderRadius:10, textAlign:"center",
                        border:"1px solid "+(bd.type===tp.k?C.orange:C.border),
                        background:bd.type===tp.k?C.orange+"22":C.surface,
                        color:bd.type===tp.k?C.orange:C.gray3,
                        fontWeight:600, fontSize:13, cursor:"pointer" }}>
                      {tp.emoji} {tp.label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Urgency */}
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:12, fontWeight:700, color:C.gray3,
                  textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:8 }}>
                  {t.urgency} *
                </div>
                {[
                  {k:"urgent",label:"🔴 "+t.urgentYes,color:C.red,bg:C.red+"22"},
                  {k:"canwait",label:"🟡 "+t.urgentNo,color:C.yellow,bg:C.yellow+"22"},
                ].map(opt => (
                  <button key={opt.k} onClick={() => setBd(b=>({...b,urgency:opt.k}))}
                    style={{ display:"block", width:"100%", padding:"12px 16px",
                      borderRadius:10, textAlign:"left", marginBottom:8,
                      border:"1px solid "+(bd.urgency===opt.k?opt.color:C.border),
                      background:bd.urgency===opt.k?opt.bg:C.surface,
                      color:bd.urgency===opt.k?opt.color:C.gray3,
                      fontWeight:700, fontSize:13, cursor:"pointer" }}>
                    {opt.label}
                  </button>
                ))}
              </div>

              {/* Location */}
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:12, fontWeight:700, color:C.gray3,
                  textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:8 }}>
                  {t.location} *
                </div>
                <LocationPicker
                  value={bd.location}
                  onChange={v => setBd(b=>({...b,location:v}))}
                  placeholder={t.locationPh}
                  t={t}
                />
              </div>

              {/* Description */}
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:12, fontWeight:700, color:C.gray3,
                  textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:8 }}>
                  {t.description} *
                </div>
                <textarea value={bd.description}
                  onChange={e => setBd(b=>({...b,description:e.target.value}))}
                  placeholder={t.descPh || "Was ist passiert? / Что случилось?"}
                  style={{ width:"100%", background:C.surface, border:"1px solid "+C.border,
                    borderRadius:10, padding:"12px 14px", color:C.white,
                    fontSize:14, resize:"vertical", minHeight:80,
                    fontFamily:"inherit", outline:"none", boxSizing:"border-box" }} />
              </div>

              <PhotoUpload photos={bd.photos}
                onAdd={r => setBd(b=>({...b,photos:[...b.photos,...r]}))}
                onRemove={i => setBd(b=>({...b,photos:b.photos.filter((_,j)=>j!==i)}))}
                label={t.photo} />

              {(!bd.vehicle||!bd.type||!bd.location||!bd.description||!bd.urgency||!driverName) && (
                <div style={{ fontSize:12, color:"#f59e0b", marginBottom:8, textAlign:"center" }}>
                  {!driverName ? "* " + t.yourName : !bd.vehicle ? "* " + t.selectTruck : !bd.location ? "* " + t.location : !bd.type ? "* " + t.breakdownType : !bd.urgency ? "* " + t.urgency : !bd.description ? "* " + t.description : ""}
                </div>
              )}
              <button onClick={submitBreakdown}
                disabled={!bd.vehicle||!bd.type||!bd.location||!bd.description||!bd.urgency||!driverName||bdSending}
                style={{ width:"100%", borderRadius:14, padding:"16px 0",
                  fontWeight:900, fontSize:16, border:"none",
                  background:bd.urgency==="urgent"?C.red:C.orange,
                  color:"#fff", cursor:"pointer",
                  opacity:(!bd.vehicle||!bd.type||!bd.location||!bd.description||!bd.urgency||!driverName)?0.5:1,
                  boxShadow:bd.urgency==="urgent"?"0 4px 20px "+C.red+"66":"none" }}>
                {bdSending ? t.sending : t.send}
              </button>
              <div style={{ textAlign:"center", fontSize:12, color:C.gray5, marginTop:10 }}>
                * {t.required}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
