      background-position:center center;
      background-repeat:no-repeat;
      pointer-events:none;

    @media (min-width: 481px) {

      width:100%; max-width:480px; z-index:5;
      padding:14px 16px calc(env(safe-area-inset-bottom) + 14px);
      background:linear-gradient(180deg, transparent, rgba(10,23,48,0.95) 30%);

    button { font:inherit; color:inherit; cursor:pointer; }
    input, textarea, select { font:inherit; }
    textarea { resize:none; }
    ::placeholder { color:rgba(255,255,255,0.45); }

    .btn-primary {

      color:#0a1730; border:none; border-radius:12px;

      box-shadow:0 8px 24px rgba(255,165,0,0.35);

    .btn-back {

    .lang-pill {

      border-radius:14px;
      font-weight:700; font-size:13px; letter-spacing:0.4px;
      background:rgba(255,255,255,0.04);
      color:rgba(255,255,255,0.85);
      flex-shrink:0;
    }
    .lang-pill.active {
      background:#ffa500; border-color:#ffa500; color:#0a1730;
      box-shadow:0 6px 18px rgba(255,165,0,0.4);
    }

    .input-light {
      width:100%; padding:14px 14px 14px 44px;
      background:#fff; color:#0a1730;
      border:1px solid #e5e7eb; border-radius:12px;
      font-size:16px; outline:none;
    }
    .field-icon-light {
      position:absolute; left:14px; top:50%; transform:translateY(-50%);
      color:#9aa3b2; font-size:18px;
    }

    .keypad-btn {
      width:68px; height:68px; border-radius:50%;
      background:transparent;
      border:1.5px solid rgba(255,255,255,0.35);
      color:#fff; font-size:24px; font-weight:500;
      display:flex; align-items:center; justify-content:center;
    }
    .keypad-btn:active { background:rgba(255,255,255,0.10); }

    .pin-dot { width:14px; height:14px; border-radius:50%;
      background:rgba(255,255,255,0.20); transition:background 0.15s; }
    .pin-dot.filled { background:#ffa500; box-shadow:0 0 12px rgba(255,165,0,0.6); }
    .pin-dot.error { background:#ff3b30; }

    .slider-track {
      position:relative; height:78px; border-radius:18px;
      background:rgba(0,0,0,0.45);
      border:1px solid rgba(255,255,255,0.10);
      overflow:hidden;
    }
    .slider-thumb {
      position:absolute; top:6px; left:6px;
      width:66px; height:66px; border-radius:14px;
      background:linear-gradient(180deg,#ffa500,#ff8c00);
      box-shadow:0 0 20px rgba(255,165,0,0.7);
      display:flex; align-items:center; justify-content:center;
      touch-action:none; cursor:grab;
    }
    .slider-grip { display:flex; gap:4px; }
    .slider-grip span { width:3px; height:22px; background:#0a1730; border-radius:2px; }
    .slider-marks { position:absolute; inset:0; display:flex;
      align-items:center; justify-content:space-around; padding:0 90px 0 80px;
      pointer-events:none; }
    .slider-mark { width:2px; height:24px; background:rgba(255,255,255,0.2); border-radius:2px; }

    .menu-card {
      display:flex; align-items:center; gap:14px;
      padding:18px;
      border:1px solid rgba(255,255,255,0.10);
      border-radius:18px;
      background:rgba(20,40,80,0.55);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      width:100%;
    }
    .menu-card.active {
      border-color:#ffa500;
      box-shadow:0 0 0 1px #ffa500, 0 8px 28px rgba(255,165,0,0.25);
    }
    .menu-card.danger {
      border-color:rgba(255,59,48,0.55);
      background:rgba(60,20,30,0.55);
    }
    .menu-card.danger.active {
      box-shadow:0 0 0 1px #ff3b30, 0 8px 28px rgba(255,59,48,0.25);
    }
    .menu-icon {
      width:54px; height:54px; border-radius:14px;
      background:rgba(255,165,0,0.10);
      display:flex; align-items:center; justify-content:center;
      color:#ffa500; flex-shrink:0;
    }
    .menu-card.danger .menu-icon {
      background:rgba(255,59,48,0.10); color:#ff3b30;
    }

    .insp-row {
      display:flex; align-items:center;
      gap:8px;
      padding:10px;
      border-radius:12px;
      background:rgba(20,40,80,0.50);
      border:1px solid rgba(255,255,255,0.08);
      margin-bottom:8px;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }
    .insp-tag {
      width:50px;
      flex-shrink:0;
      background:#ffa500; color:#0a1730;
      font-weight:800; font-size:11px;
      padding:7px 0; text-align:center; border-radius:8px;
      letter-spacing:0.5px;
    }
    .insp-label {
      flex:1; min-width:0;
      font-size:13px; font-weight:600;
      line-height:1.2;
      color:#fff;
    }
    .insp-btn {

      flex-shrink:0;
      padding:0;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.18);

      border-color:#ffa500; color:#ffa500;
      box-shadow:0 0 0 1px #ffa500;
    }
    .insp-btn.fail-active {

      border-color:#ff3b30; color:#ff3b30;
      box-shadow:0 0 0 1px #ff3b30;
    }
    .insp-header {

      color:rgba(255,255,255,0.55);

    .textarea-dark {

      background:rgba(20,40,80,0.45);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:12px;
      color:#fff; min-height:96px; outline:none;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);

    .textarea-dark:focus { border-color:#ffa500; }

    .input-dark {
      width:100%; padding:14px 14px 14px 40px;
      background:rgba(20,40,80,0.45);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:12px; color:#fff; outline:none;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);

    .geo-btn {
      width:48px; height:48px; border-radius:12px;
      background:rgba(255,165,0,0.12);
      border:1px solid rgba(255,165,0,0.5);
      color:#ffa500;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;

    .geo-btn:active { background:rgba(255,165,0,0.25); }

    .label-cap {

    .lang-switch {

      background:rgba(20,40,80,0.65);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:10px;
      color:#fff; font-weight:700; font-size:13px;

    .lang-switch .arrow { color:#ffa500; font-size:10px; }
    .lang-menu {
      position:absolute; top:calc(100% + 6px); right:0;
      padding:6px;
      background:#0d1f3d;
      border:1px solid rgba(255,165,0,0.5);
      border-radius:12px;
      box-shadow:0 16px 40px rgba(0,0,0,0.6);

      width:42px; padding:8px 0; text-align:center;

      background:transparent; color:#fff;
    }
    .lang-menu button.active {
      background:#ffa500; border-color:#ffa500; color:#0a1730;
    }

async function sbSelect(table, query) {
  const url = SB_URL + "/rest/v1/" + table + (query ? "?" + query : "");
  const res = await fetch(url, {
    headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
  });
  if (!res.ok) throw new Error("Supabase select failed");
  return res.json();
}

async function sbInsert(table, payload) {
  const res = await fetch(SB_URL + "/rest/v1/" + table, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SB_KEY,
      "Authorization": "Bearer " + SB_KEY,
      "Prefer": "return=representation"
    },
    body: JSON.stringify(payload)
  });
  if (!res.ok) {
    var msg = "";
    try { msg = await res.text(); } catch(e){}
    throw new Error("Supabase " + table + " insert failed: " + res.status + " " + msg);
  }
  return res.json();
}

async function uploadPhotoToEingang(base64, alertId, index) {
  if (!base64) return null;
  try {
    const res = await fetch(base64);
    const blob = await res.blob();
    const ext = blob.type && blob.type.indexOf("png") !== -1 ? "png" : "jpg";
    const path = "eingang/" + alertId + "/photo_" + index + "." + ext;
    const up = await fetch(SB_URL + "/storage/v1/object/inspection-photos/" + path, {
      method: "POST",
      headers: {
        "apikey": SB_KEY,
        "Authorization": "Bearer " + SB_KEY,
        "Content-Type": blob.type || "image/jpeg",
        "x-upsert": "true"
      },
      body: blob
    });
    if (!up.ok) return null;
    return SB_URL + "/storage/v1/object/public/inspection-photos/" + path;
  } catch(e) {
    console.error("photo upload:", e);
    return null;
  }
}

function SliderUnlock({ onUnlock, lang, setLang }) {
  const [x, setX] = useState(0);
  const [drag, setDrag] = useState(false);
  const t = getT(lang);
  const trackRef = useRef(null);
  const MAX_REF = useRef(0);

  useEffect(function(){
    if (trackRef.current) MAX_REF.current = trackRef.current.offsetWidth - 78;
  }, []);

  const start = function(clientX){
    setDrag(true);
    const startX = clientX;
    let curX = x;
    const move = function(e){
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      curX = Math.max(0, Math.min(MAX_REF.current, cx - startX + x));
      setX(curX);
    };
    const up = function(){
      window.removeEventListener("mousemove", move);
      window.removeEventListener("touchmove", move);
      window.removeEventListener("mouseup", up);
      window.removeEventListener("touchend", up);
      setDrag(false);
      if (curX >= MAX_REF.current * 0.85) {
        setX(MAX_REF.current);
        setTimeout(onUnlock, 100);
      } else {
        setX(0);
      }
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("touchmove", move, { passive:false });
    window.addEventListener("mouseup", up);
    window.addEventListener("touchend", up);
  };

  return (
    <div className="scrn" style={{ paddingTop:"max(env(safe-area-inset-top), 60px)" }}>
      <Bg />
      <div style={{ position:"relative", zIndex:2, flex:1, display:"flex", flexDirection:"column" }}>
        <LangSwitcher lang={lang} setLang={setLang} />
        <div style={{ marginTop:80 }}>
          <Logo size={42} />
          <FahrerLabel size={32} label={t.driverLabel} />
        </div>
        <div style={{ flex:1 }}></div>
        <div ref={trackRef} className="slider-track" style={{ marginBottom:30 }}>
          <div className="slider-marks">
            <div className="slider-mark"></div>
            <div className="slider-mark"></div>
            <div className="slider-mark"></div>
            <div className="slider-mark"></div>
          </div>
          <div className="slider-thumb"
            style={{ left: 6 + x, transition: drag ? "none" : "left 0.3s ease" }}
            onMouseDown={function(e){ start(e.clientX); }}
            onTouchStart={function(e){ start(e.touches[0].clientX); }}>
            <div className="slider-grip">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function VehicleCombobox({ vehicles, vehicleType, value, onChange, label, placeholder, allowAll }) {
  // value = { plate, brand } or null
  const [open, setOpen] = useState(false);
  const [plate, setPlate] = useState(value && value.plate ? value.plate : "");
  const [brand, setBrand] = useState(value && value.brand ? value.brand : "");
  const [editingBrand, setEditingBrand] = useState(false);
  const ref = useRef(null);

  useEffect(function(){
    if (value) {
      setPlate(value.plate || "");
      setBrand(value.brand || "");
    }
  }, [value]);

  useEffect(function(){
    const handler = function(e){
      if (ref.current && !ref.current.contains(e.target)) {
        setOpen(false);
        setEditingBrand(false);
      }
    };
    document.addEventListener("mousedown", handler);
    document.addEventListener("touchstart", handler);
    return function(){
      document.removeEventListener("mousedown", handler);
      document.removeEventListener("touchstart", handler);
    };
  }, []);

  // Filter list by typed plate
  const list = vehicles.filter(function(v){
    if (!allowAll && v.type && vehicleType && v.type !== vehicleType) return false;
    if (!plate.trim()) return true;
    return (v.plate + " " + (v.brand||"")).toLowerCase()
      .indexOf(plate.toLowerCase().trim()) !== -1;
  });

  const pickExisting = function(v){
    setPlate(v.plate);
    setBrand(v.brand || "");
    setOpen(false);
    onChange({ plate: v.plate, brand: v.brand || "", id: v.id, isNew: false });
  };

  const commit = function(){
    const p = plate.trim();
    const b = brand.trim();
    if (!p) { onChange(null); return; }
    // Check if matches existing
    const existing = vehicles.find(function(v){
      return v.plate.toLowerCase() === p.toLowerCase();
    });
    if (existing) {
      onChange({ plate: existing.plate, brand: existing.brand || b, id: existing.id, isNew: false });
    } else {
      onChange({ plate: p, brand: b, isNew: true });
    }
  };

  return (
    <div ref={ref} style={{ position:"relative" }}>
      {label && <div className="label-cap">{label}</div>}

      {/* Plate input */}
      <div style={{ position:"relative" }}>
        <input
          className="dropdown-trigger"
          style={{ paddingRight:40, fontWeight:600 }}
          placeholder={placeholder || "Kennzeichen eingeben oder wählen"}
          value={plate}
          onChange={function(e){ setPlate(e.target.value); setOpen(true); }}
          onFocus={function(){ setOpen(true); }}
          onBlur={function(){ setTimeout(commit, 200); }}
        />
        <span style={{ position:"absolute", right:14, top:"50%", transform:"translateY(-50%)",
          color:"#ffa500", fontSize:14, pointerEvents:"none" }}>▼</span>
      </div>

      {/* Brand input - shown when plate is entered */}
      {plate.trim() && (
        <div style={{ marginTop:8, position:"relative" }}>
          <input
            className="dropdown-trigger"
            style={{ fontWeight:500, fontSize:14, paddingTop:10, paddingBottom:10,
              borderColor: brand.trim() ? "#ffa500" : "rgba(255,255,255,0.2)" }}
            placeholder="Marke / Modell (z.B. MAN TGX 18.440)"
            value={brand}
            onChange={function(e){ setBrand(e.target.value); }}
            onBlur={function(){ setTimeout(commit, 200); }}
          />
        </div>
      )}

      {/* Dropdown with existing vehicles */}
      {open && list.length > 0 && (
        <div className="dropdown-list">
          {list.slice(0, 30).map(function(v){
            return (
              <div key={v.id || v.plate} className="dropdown-item"
                onMouseDown={function(e){ e.preventDefault(); pickExisting(v); }}
                onTouchStart={function(e){ e.preventDefault(); pickExisting(v); }}>
                <div style={{ fontWeight:700 }}>{v.plate}</div>
                {v.brand && <div style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>{v.brand}</div>}
              </div>
            );
          })}
        </div>
      )}

      {plate.trim() && !vehicles.some(function(v){ return (v.plate || "").toLowerCase() === plate.trim().toLowerCase(); }) && (
        <div style={{ marginTop:8, color:"rgba(255,255,255,0.65)", fontSize:12, fontWeight:600 }}>
          + Neues Fahrzeug wird beim Senden gespeichert: <span style={{ color:"#ffa500" }}>{plate.trim()}</span>
        </div>
      )}
    </div>
  );
}

// Helper: ensure vehicle exists in DB (insert if new)
async function ensureVehicleInDb(plate, brand, vehicleType) {
  if (!plate) return null;
  // Check if exists
  const existing = await sbSelect("vehicles", "plate=eq." + encodeURIComponent(plate) + "&select=*").catch(function(){ return []; });
  if (existing && existing.length > 0) return existing[0];
  // Insert new
  const newId = "v_" + Date.now();
  try {
    await sbInsert("vehicles", {
      id: newId,
      plate: plate,
      brand: (brand || "").split(" ")[0] || (brand || ""),
      model: (brand || "").split(" ").slice(1).join(" "),
      type: vehicleType || "truck",
      year: null, mileage: 0,
      tuev: null, insurance: null, uvv: null,
      next_service: null, notes: ""
    });
    return { id: newId, plate: plate, brand: brand || "", type: vehicleType };
  } catch(e) {
    console.error("Could not save vehicle:", e);
    return { id: newId, plate: plate, brand: brand || "", type: vehicleType };
  }
}

function InspectionScreen({ kind, onBack, driverName, lang, setLang }) {
  const vehicleType = kind === "lkw" ? "truck" : "trailer";
  const t = getT(lang);
  const items = kind === "lkw" ? localizeChecks(TRUCK_CHECKS, t.truckChecks) : localizeChecks(TRAILER_CHECKS, t.trailerChecks);
  const seedFleet = kind === "lkw" ? TRUCKS : TRAILERS;
  const [vehicles, setVehicles] = useState(seedFleet.map(function(v){
    return { id: v.id, plate: v.plate, brand: v.brand, type: vehicleType };
  }));
  const [vehSel, setVehSel] = useState(null); // { plate, brand, isNew }
  const [checks, setChecks] = useState({});
  const [notes, setNotes] = useState("");
  const [mileage, setMileage] = useState("");
  const [photos, setPhotos] = useState([]);
  const [sending, setSending] = useState(false);

  // Load vehicles from Supabase
  useEffect(function(){
    sbSelect("vehicles", "type=eq." + vehicleType + "&select=*&order=plate")
      .then(function(rows){
        if (rows && rows.length > 0) {
          setVehicles(rows.map(function(r){
            return {
              id: r.id, plate: r.plate,
              brand: (r.brand || "") + (r.model ? " " + r.model : ""),
              type: r.type
            };
          }));
        }
      })
      .catch(function(){});
  }, [vehicleType]);
  const checkedCount = items.filter(function(it){ return checks[it.k]; }).length;
  const hasFault = items.some(function(it){ return checks[it.k] === "fail"; });
  const allDone = checkedCount === items.length;

  const submit = async function(){
    if (!allDone || !vehSel || !vehSel.plate || sending) return;
    setSending(true);
    try {
      // If new vehicle, save to DB
      if (vehSel.isNew) {
        await ensureVehicleInDb(vehSel.plate, vehSel.brand, vehicleType);
      }
      // Build defects text from failed checks
      var badItems = items
        .filter(function(it){ return checks[it.k] === "fail"; })
        .map(function(it){ return it.label; });
      var defectsText = badItems.join(", ");
      if (notes) defectsText = defectsText ? (defectsText + " — " + notes) : notes;
      var prefix = vehicleType === "truck" ? "LKW" : "Auflieger";

      // Send alert into Werkstatt > Eingang. Photos are stored under inspection-photos/eingang/<alertId>/
      const alertId = "I" + Date.now();
      const photoUrls = photos.length
        ? (await Promise.all(photos.map(function(p, i){ return uploadPhotoToEingang(p, alertId, i); }))).filter(Boolean)
        : [];
      await sbInsert("alerts", {
        id: alertId,
        type: hasFault ? "inspection_mangel" : "inspection_ok",
        plate: vehSel.plate,
        location: "Werkstatt",
        description: defectsText || (prefix + "-Inspektion: " + (hasFault ? "Mangel" : "OK")),
        urgency: hasFault ? "normal" : "info",
        sender: driverName || "driver",
        sender_app: "fahrer",
        status: hasFault ? "open" : "done",
        photos: photoUrls.length,
        photo_urls: photoUrls
      });

      // Обновляем пробег если введён
      if (mileage && parseInt(mileage) > 0 && vehSel && vehSel.id && !vehSel.isNew) {
        try {
          await fetch(SB_URL + "/rest/v1/vehicles?id=eq." + encodeURIComponent(vehSel.id), {
            method: "PATCH",
            headers: { "Content-Type":"application/json", "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY, "Prefer":"return=minimal" },
            body: JSON.stringify({ mileage: parseInt(mileage) })
          });
        } catch(e) { console.warn("mileage update:", e); }
      }

      onBack();
    } catch(e) {
      setSending(false);
      console.error("Inspection error:", e);
      alert("Fehler beim Senden: " + (e.message || e));
    }
  };

  return (
    <div style={{ position:"relative", minHeight:"100vh", minHeight:"100dvh",
      paddingBottom:"calc(env(safe-area-inset-bottom) + 90px)",
      maxWidth:480, margin:"0 auto" }}>
      <Bg />
      <div style={{ position:"relative", zIndex:2, padding:"max(env(safe-area-inset-top), 14px) 16px 0" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
          <BackBtn onClick={onBack} />
          <div style={{ marginLeft:"auto" }}>
            <LangSwitcher lang={lang} setLang={setLang} inline />
          </div>
        </div>

        <div style={{ marginTop:6 }}>
          <div style={{ fontSize:30, fontWeight:900, lineHeight:1 }}>
            {kind === "lkw" ? (t.truck + " ") : (t.trailer + " ")}
            <span style={{ color:"#ffa500" }}>{t.inspectionWord}</span>
          </div>
        </div>

        <div style={{ marginTop:12, marginBottom:16 }}>
          <VehicleCombobox vehicles={vehicles} vehicleType={vehicleType}
            value={vehSel} onChange={setVehSel}
            placeholder={t.selectVehiclePh} />
        </div>

        <div style={{ marginBottom:16 }}>
          <div className="label-cap" style={{ marginBottom:8 }}>KILOMETERSTAND *</div>
          <div style={{ position:"relative" }}>
            <input
              className="input-dark"
              type="number"
              inputMode="numeric"
              value={mileage}
              onChange={function(e){ setMileage(e.target.value.replace(/\D/g,"")); }}
              placeholder="z.B. 245000"
              style={{ paddingRight:50 }}
            />
            <span style={{ position:"absolute", right:14, top:"50%", transform:"translateY(-50%)", fontSize:12, color:"rgba(255,255,255,0.4)", fontWeight:700 }}>km</span>
          </div>
        </div>

        <div className="insp-header">
          <div className="h-tag-spacer"></div>
          <div className="h-spacer"></div>
          <div className="h-col">{t.okHeader}</div>
          <div className="h-col">{t.notOkHeader}</div>
        </div>

        {items.map(function(it){
          return (
            <div key={it.k} className="insp-row">
              <div className="insp-tag">{it.emoji}</div>
              <div className="insp-label">{it.label}</div>
              <button className={"insp-btn" + (checks[it.k] === "ok" ? " ok-active" : "")}
                onClick={function(){ setChecks(Object.assign({}, checks, { [it.k]: "ok" })); }}>
                ✓
              </button>
              <button className={"insp-btn" + (checks[it.k] === "fail" ? " fail-active" : "")}
                onClick={function(){ setChecks(Object.assign({}, checks, { [it.k]: "fail" })); }}>
                ✕
              </button>
            </div>
          );
        })}

        <div style={{ marginTop:18 }}>
          <div className="label-cap">{(t.defects || "Mangel / Bemerkungen").toUpperCase()}</div>
          <textarea className="textarea-dark" placeholder={t.defectsPh}
            value={notes} onChange={function(e){ setNotes(e.target.value); }} />
        </div>

        <div style={{ marginTop:14 }}>
          <PhotoUpload photos={photos} setPhotos={setPhotos} t={t} />
        </div>

        <div className={"progress-box" + (hasFault ? " warn" : "")} style={{ marginTop:14 }}>
          <span style={{ color: hasFault ? "#ff3b30" : "#22c55e", fontSize:18 }}>
            {hasFault ? "⚠" : "✓"}
          </span>
          <span>{checkedCount}/{items.length} {t.inspected} · {hasFault ? t.faultShort : "OK"}</span>
        </div>
      </div>

      <div className="fixed-bottom-bar">
        <PrimaryBtn onClick={submit} disabled={!allDone || !vehSel || !vehSel.plate || !mileage || sending}>
          {sending ? t.sending : t.submit}
        </PrimaryBtn>
      </div>
    </div>
  );
}

// === SCREEN: Breakdown ===

function BreakdownScreen({ onBack, driverName, lang, setLang }) {
  const t = getT(lang);
  const seedFleet = TRUCKS.map(function(v){ return Object.assign({}, v, { type:"truck" }); })
    .concat(TRAILERS.map(function(v){ return Object.assign({}, v, { type:"trailer" }); }));
  const [vehicles, setVehicles] = useState(seedFleet);
  const [vehSel, setVehSel] = useState(null);
  const [type, setType] = useState(null);
  const [urg, setUrg] = useState(null);
  const [loc, setLoc] = useState("");
  const [locLoading, setLocLoading] = useState(false);
  const [desc, setDesc] = useState("");
  const [photos, setPhotos] = useState([]);
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);

  // Load vehicles from Supabase (all types)
  useEffect(function(){
    sbSelect("vehicles", "select=*&order=plate")
      .then(function(rows){
        if (rows && rows.length > 0) {
          setVehicles(rows.map(function(r){
            return {
              id: r.id, plate: r.plate,
              brand: (r.brand || "") + (r.model ? " " + r.model : ""),
              type: r.type
            };
          }));
        }
      })
      .catch(function(){});
  }, []);

  const ok = vehSel && vehSel.plate && type && urg && loc && desc && driverName;

  const detectLoc = function(){
    if (!navigator.geolocation) {
      alert("Geolocation nicht verfügbar");
      return;
    }
    setLocLoading(true);
    navigator.geolocation.getCurrentPosition(
      function(p){
        const lat = p.coords.latitude;
        const lon = p.coords.longitude;
        // Reverse geocoding via OpenStreetMap Nominatim
        fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lon + "&accept-language=de&zoom=14")
          .then(function(r){ return r.json(); })
          .then(function(d){
            const a = d.address || {};
            const parts = [];
            if (a.road) parts.push(a.road + (a.house_number ? " " + a.house_number : ""));
            if (a.city || a.town || a.village || a.suburb) {
              parts.push(a.city || a.town || a.village || a.suburb);
            }
            if (a.country_code) parts.push((a.country_code + "").toUpperCase());
            const txt = parts.length ? parts.join(", ") : (lat.toFixed(5) + ", " + lon.toFixed(5));
            setLoc(txt);
            setLocLoading(false);
          })
          .catch(function(){
            setLoc(lat.toFixed(5) + ", " + lon.toFixed(5));
            setLocLoading(false);
          });
      },
      function(err){
        setLocLoading(false);
        alert("Standort konnte nicht ermittelt werden: " + err.message);
      },
      { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
    );
  };

  const submit = async function(){
    if (!ok || sending) return;
    setSending(true);
    try {
      if (vehSel && vehSel.isNew) {
        var asTy = (vehSel.type === "trailer") ? "trailer" : "truck";
        await ensureVehicleInDb(vehSel.plate, vehSel.brand, asTy);
      }
      const alertId = "A" + Date.now();
      const photoUrls = photos.length
        ? (await Promise.all(photos.map(function(p, i){ return uploadPhotoToEingang(p, alertId, i); }))).filter(Boolean)
        : [];

      await sbInsert("alerts", {
        id: alertId,
        type: type,
        plate: vehSel.plate,
        location: loc,
        description: desc,
        urgency: urg === "sofort" ? "urgent" : "normal",
        sender: driverName || "driver",
        sender_app: "fahrer",
        status: "open",
        photos: photoUrls.length,
        photo_urls: photoUrls
      });

      setSent(true); setSending(false);
    } catch(e) {
      setSending(false);
      console.error("Breakdown error:", e);
      alert("Fehler beim Senden: " + (e.message || e));
    }
  };

  if (sent) {
    return (
      <div className="scrn">
        <Bg />
        <div style={{ position:"relative", zIndex:2, flex:1, display:"flex",
          flexDirection:"column", justifyContent:"center", alignItems:"center", textAlign:"center" }}>
          <div style={{ width:90, height:90, borderRadius:"50%",
            background:"rgba(34,197,94,0.18)", border:"2px solid #22c55e",
            display:"flex", alignItems:"center", justifyContent:"center", fontSize:42, marginBottom:20 }}>✓</div>
          <div style={{ fontSize:24, fontWeight:800, marginBottom:8 }}>{t.sent}</div>
          <div style={{ color:"rgba(255,255,255,0.7)", marginBottom:30 }}>
            {t.sentDesc}
          </div>
          <PrimaryBtn onClick={onBack} style={{ maxWidth:280 }}>{t.newReport || "Zurück zum Menü"}</PrimaryBtn>
        </div>
      </div>
    );
  }

  return (
    <div style={{ position:"relative", minHeight:"100vh", minHeight:"100dvh",
      paddingBottom:"calc(env(safe-area-inset-bottom) + 90px)",
      maxWidth:480, margin:"0 auto" }}>
      <Bg />
      <div style={{ position:"relative", zIndex:2, padding:"max(env(safe-area-inset-top), 14px) 16px 0" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
          <BackBtn onClick={onBack} />
          <div style={{ marginLeft:"auto" }}>
            <LangSwitcher lang={lang} setLang={setLang} inline />
          </div>
        </div>

        <div style={{ fontSize:32, fontWeight:900, lineHeight:1, marginTop:6, marginBottom:18 }}>
          {(t.breakdownTitle || "Störung melden").split(" ")[0]} <span style={{ color:"#ffa500" }}>{(t.breakdownTitle || "Störung melden").split(" ").slice(1).join(" ")}</span>
        </div>

        <div style={{ marginBottom:18 }}>
          <VehicleCombobox vehicles={vehicles} allowAll={true}
            value={vehSel} onChange={setVehSel}
            label={(t.selectTruck + " / " + t.selectTrailer + " *").toUpperCase()}
            placeholder={t.selectOrEnter} />
        </div>

        <div className="label-cap">{(t.breakdownType || "Art der Störung").toUpperCase() + " *"}</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:18 }}>
          {localizeBreakdownTypes(t).map(function(bt){
            return (
              <div key={bt.k} className={"type-tile" + (type === bt.k ? " active" : "")}
                onClick={function(){ setType(bt.k); }}
                style={{ cursor:"pointer" }}>
                <span className="type-tag">{bt.tag}</span>
                <span style={{ flex:1 }}>{bt.label}</span>
              </div>
            );
          })}
        </div>

        <div className="label-cap">{(t.urgency || "Dringlichkeit").toUpperCase() + " *"}</div>
        <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:18 }}>
          <div onClick={function(){ setUrg("sofort"); }}
            className={"urg-row" + (urg === "sofort" ? " active-red" : "")}
            style={{ cursor:"pointer" }}>
            <div className="urg-dot" style={{ background:"#ff3b30" }}></div>
            <span>{t.urgentYes}</span>
          </div>
          <div onClick={function(){ setUrg("warten"); }}
            className={"urg-row" + (urg === "warten" ? " active-orange" : "")}
            style={{ cursor:"pointer" }}>
            <div className="urg-dot" style={{ background:"#ffa500" }}></div>
            <span>{t.urgentNo}</span>
          </div>
        </div>

        <div className="label-cap">{(t.location || "Standort").toUpperCase() + " *"}</div>
        <div style={{ display:"flex", gap:10, marginBottom:18 }}>
          <div style={{ position:"relative", flex:1 }}>
            <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)",
              color:"#9aa3b2", fontSize:18 }}>📍</span>
            <input className="input-dark" placeholder={t.locationInputPh}
              value={loc} onChange={function(e){ setLoc(e.target.value); }} />
          </div>
          <button className="geo-btn" onClick={detectLoc} disabled={locLoading}>
            {locLoading ? "..." : "📍"}
          </button>
        </div>

        <div className="label-cap">{(t.description || "Beschreibung").toUpperCase() + " *"}</div>
        <textarea className="textarea-dark" placeholder={t.descPh}
          value={desc} onChange={function(e){ setDesc(e.target.value); }}
          style={{ marginBottom:14 }} />

        <PhotoUpload photos={photos} setPhotos={setPhotos} t={t} />

        <div style={{ textAlign:"center", color:"rgba(255,255,255,0.5)", fontSize:13, marginTop:14, marginBottom:14 }}>
          {"* " + (t.required || "Pflichtfeld")}
        </div>
      </div>

      <div className="fixed-bottom-bar">
        <PrimaryBtn onClick={submit} disabled={!ok || sending}>
          {sending ? t.sending : t.send}
        </PrimaryBtn>
      </div>
    </div>
  );
}

// === MAIN APP ===

function App() {
  const [stage, setStage] = useState("loading");
  const [lang, setLangRaw] = useState("DE");
  const setLang = function(v){
    setLangRaw(v);
    try { localStorage.setItem("werkflow_lang", v); } catch(e){}
  };
  const [savedName, setSavedName] = useState("");
  const [screen, setScreen] = useState("menu");

  useEffect(function(){
    try {
      const savedLang = localStorage.getItem("werkflow_lang");
      if (savedLang) setLangRaw(savedLang);
      const n = localStorage.getItem(APP_STORAGE_KEY);
      if (n) { setSavedName(n); setStage("slider"); }
      else setStage("register");
    } catch(e) { setStage("register"); }
  }, []);

  if (stage === "loading") return <div className="scrn"><Bg /></div>;

  if (stage === "register") {
    return <ErsteAnmeldung lang={lang} setLang={setLang}
      onContinue={function(v, n){
        setSavedName(v + " " + n);
        setStage("pin_first");
      }} />;
  }

  if (stage === "pin_first") {
    return <PinLogin lang={lang} setLang={setLang} onSuccess={function(){
      try { localStorage.setItem(APP_STORAGE_KEY, savedName); } catch(e){}
      setStage("menu");
    }} />;
  }

  if (stage === "slider") {
    return <SliderUnlock lang={lang} setLang={setLang}
      onUnlock={function(){ setStage("menu"); }} />;
  }

  if (screen === "menu") {
    return <MainMenu lang={lang} setLang={setLang} onPick={function(k){
      if (k === "lkw") setScreen("insp_lkw");
      else if (k === "auf") setScreen("insp_auf");
      else if (k === "bd") setScreen("breakdown");
    }} />;
  }
  if (screen === "insp_lkw") {
    return <InspectionScreen kind="lkw" driverName={savedName} lang={lang} setLang={setLang}
      onBack={function(){ setScreen("menu"); }} />;
  }
  if (screen === "insp_auf") {
    return <InspectionScreen kind="auf" driverName={savedName} lang={lang} setLang={setLang}
      onBack={function(){ setScreen("menu"); }} />;
  }
  if (screen === "breakdown") {
    return <BreakdownScreen lang={lang} setLang={setLang} driverName={savedName}
      onBack={function(){ setScreen("menu"); }} />;
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
