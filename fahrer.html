function translateToGerman(text) {
  if (!text || !text.trim()) return Promise.resolve(text);
  return fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514", max_tokens:500,
      messages:[{role:"user",
        content:"Translate to German. Return ONLY the translation:\n\n"+text}]
    })
  }).then(function(r){ return r.json(); })
    .then(function(d){ return (d.content && d.content[0] ? d.content[0].text : null) || text; })
    .catch(function(){ return text; });
}


async function sbInsert(table, payload) {
  const res = await fetch(SB_URL + "/rest/v1/" + table, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SB_KEY,
      "Authorization": "Bearer " + SB_KEY,
      "Prefer": "return=representation"
    },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error("Supabase insert failed");
  return res.json();
}

// === SCREEN: Slider unlock ===

function SliderUnlock({ onUnlock }) {
  const [x, setX] = useState(0);
  const [drag, setDrag] = useState(false);
  const trackRef = useRef(null);
  const MAX_REF = useRef(0);

  useEffect(function(){
    if (trackRef.current) {
      MAX_REF.current = trackRef.current.offsetWidth - 78;
    }
  }, []);

  const start = function(clientX){
    setDrag(true);
    const startX = clientX;
    const startSlide = x;
    const move = function(e){
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const dx = Math.max(0, Math.min(MAX_REF.current, cx - startX + startSlide));
      setX(dx);
    };
    const up = function(){
      window.removeEventListener("mousemove", move);
      window.removeEventListener("touchmove", move);
      window.removeEventListener("mouseup", up);
      window.removeEventListener("touchend", up);
      setDrag(false);
      setX(function(curr){
        if (curr >= MAX_REF.current * 0.85) {
          setTimeout(onUnlock, 100);
          return MAX_REF.current;
        }
        return 0;
      });
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("touchmove", move, { passive:false });
    window.addEventListener("mouseup", up);
    window.addEventListener("touchend", up);
  };

  return (
    <div className="scrn" style={{ paddingTop:"max(env(safe-area-inset-top), 60px)" }}>
      <AppBackground withTruck />
      <div style={{ position:"relative", zIndex:2, flex:1, display:"flex", flexDirection:"column" }}>
        <div style={{ marginTop:160 }}>
          <Logo />
          <FahrerLabel size={32} />
        </div>

        <div style={{ flex:1 }}></div>

        <div ref={trackRef} className="slider-track" style={{ marginBottom:30 }}>
          <div className="slider-marks">
            <div className="slider-mark"></div>
            <div className="slider-mark"></div>
            <div className="slider-mark"></div>
            <div className="slider-mark"></div>
          </div>
          <div className="slider-thumb"
            style={{ left: 6 + x, transition: drag ? "none" : "left 0.3s ease" }}
            onMouseDown={function(e){ start(e.clientX); }}
            onTouchStart={function(e){ start(e.touches[0].clientX); }}>
            <div className="slider-grip">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function VehicleDropdown({ items, value, onChange, label, placeholder }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(function(){
    const handler = function(e){
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", handler);

  }, []);

  const sel = items.find(function(x){ return x.id === value; });

  return (
    <div ref={ref} style={{ position:"relative" }}>
      {label && <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.6)",

function InspectionScreen({ kind, onBack, driverName }) {
  const items = kind === "lkw" ? TRUCK_CHECKS : TRAILER_CHECKS;
  const fleet = kind === "lkw" ? TRUCKS : TRAILERS;
  const [vehicleId, setVehicleId] = useState(fleet[0].id);
  const [checks, setChecks] = useState({});
  const [notes, setNotes] = useState("");
  const [photos, setPhotos] = useState([]);
  const [sending, setSending] = useState(false);
  const fileRef = useRef(null);

  const veh = fleet.find(function(x){ return x.id === vehicleId; });
  const checkedCount = items.filter(function(it){ return checks[it.k]; }).length;
  const hasFault = items.some(function(it){ return checks[it.k] === "fail"; });
  const allDone = checkedCount === items.length;

  const handlePhoto = function(e){
    const files = Array.from(e.target.files || []);
    Promise.all(files.map(function(f){
      return new Promise(function(res){
        const r = new FileReader();
        r.onload = function(ev){ res(ev.target.result); };
        r.readAsDataURL(f);
      });
    })).then(function(arr){ setPhotos(photos.concat(arr)); });
  };

  const submit = async function(){
    if (!allDone || sending) return;
    setSending(true);
    try {
      await sbInsert("inspections", {
        kind: kind === "lkw" ? "truck" : "trailer",
        plate: veh.plate, brand: veh.brand,
        result: hasFault ? "mangel" : "ok",
        checks_json: checks,
        notes: notes || null,
        photos: photos,
        driver: driverName || "fahrer",
        status: hasFault ? "mangel" : "ok",
      });
      if (hasFault) {
        await sbInsert("alerts", {
          id: "I" + Date.now(),
          type: "inspection_mangel",
          plate: veh.plate, location: kind === "lkw" ? "Werkstatt" : "Werkstatt",
          description: notes || "Mangel bei Inspektion",
          urgency: "normal",
          sender: driverName || "driver", sender_app: "fahrer",
          status: "open",

      onBack();
    } catch(e) {
      setSending(false);
      alert("Fehler beim Senden");

  return (
    <div style={{ position:"relative", minHeight:"100vh", minHeight:"100dvh",
      paddingBottom:"calc(env(safe-area-inset-bottom) + 90px)" }}>
      <AppBackground withTruck />
      <div style={{ position:"relative", zIndex:2, padding:"max(env(safe-area-inset-top), 14px) 20px 0" }}>
        <BackBtn onClick={onBack} />

        <div style={{ marginTop:14 }}>
          <div style={{ fontSize:32, fontWeight:900, lineHeight:1 }}>
            {kind === "lkw" ? "LKW " : "Auflieger "}
            <span style={{ color:"#ffa500" }}>Inspektion</span>
          </div>
        </div>

        <div style={{ marginTop:12, marginBottom:16 }}>
          <VehicleDropdown items={fleet} value={vehicleId} onChange={setVehicleId} />
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 90px 90px",
          gap:8, marginBottom:8, padding:"0 8px" }}>
          <div></div>
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.55)",
            letterSpacing:1.5, textAlign:"center" }}>OK</div>
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.55)",
            letterSpacing:1.5, textAlign:"center" }}>NICHT OK</div>
        </div>

        {items.map(function(it){
          return (
            <div key={it.k} className="insp-row">

              <div style={{ fontSize:14, fontWeight:600 }}>{it.label}</div>

                onClick={function(){ setChecks(Object.assign({}, checks, { [it.k]: "ok" })); }}>
                ✓
              </button>
              <button className={"insp-btn" + (checks[it.k] === "fail" ? " fail-active" : "")}
                onClick={function(){ setChecks(Object.assign({}, checks, { [it.k]: "fail" })); }}>
                ✕ Fehler
              </button>
            </div>
          );
        })}

        <div style={{ marginTop:20 }}>

  );

          style={{ marginBottom:14 }} />

        <button className="photo-box" onClick={function(){ fileRef.current && fileRef.current.click(); }}
          style={{ width:"100%", all:"unset", display:"block", marginBottom:14 }}>
          <div className="photo-box">
            <div style={{ fontSize:24 }}>📷</div>
            <div style={{ marginTop:6 }}>Fotos hinzufügen {photos.length > 0 ? "(" + photos.length + ")" : ""}</div>
          </div>
        </button>
        <input ref={fileRef} type="file" accept="image/*" multiple
          style={{ display:"none" }} onChange={handlePhoto} />

        <div style={{ textAlign:"center", color:"rgba(255,255,255,0.5)", fontSize:13, marginBottom:14 }}>
          * Pflichtfeld
        </div>
      </div>

      <div style={{ position:"fixed", bottom:0, left:0, right:0, zIndex:5,
        padding:"14px 20px calc(env(safe-area-inset-bottom) + 14px)",
        background:"linear-gradient(180deg, transparent, rgba(10,23,48,0.95) 30%)" }}>
        <PrimaryBtn onClick={submit} disabled={!ok || sending}>
          {sending ? "Senden..." : "STÖRUNG MELDEN"}
        </PrimaryBtn>
      </div>
    </div>
  );
}

// === MAIN APP ===

function App() {
  const [stage, setStage] = useState("loading");
  const [lang, setLang] = useState("DE");
  const [savedName, setSavedName] = useState("");
  const [screen, setScreen] = useState("menu");

  useEffect(function(){
    try {
      const n = localStorage.getItem(APP_STORAGE_KEY);
      if (n) { setSavedName(n); setStage("slider"); }
      else setStage("register");
    } catch(e) { setStage("register"); }
  }, []);

  if (stage === "loading") {
    return <div className="scrn"><AppBackground /></div>;
  }

  if (stage === "register") {
    return <ErsteAnmeldung lang={lang} setLang={setLang}
      onContinue={function(v, n){
        setSavedName(v + " " + n);
        setStage("pin_first");
      }} />;
  }

  if (stage === "pin_first") {
    return <PinLogin onSuccess={function(){
      try { localStorage.setItem(APP_STORAGE_KEY, savedName); } catch(e){}
      setStage("menu");
    }} />;
  }

  if (stage === "slider") {
    return <SliderUnlock onUnlock={function(){ setStage("menu"); }} />;
  }

  // stage === "menu"
  if (screen === "menu") {
    return <MainMenu onPick={function(k){
      if (k === "lkw") setScreen("insp_lkw");
      else if (k === "auf") setScreen("insp_auf");
      else if (k === "bd") setScreen("breakdown");
    }} />;
  }
  if (screen === "insp_lkw") {
    return <InspectionScreen kind="lkw" driverName={savedName}
      onBack={function(){ setScreen("menu"); }} />;
  }
  if (screen === "insp_auf") {
    return <InspectionScreen kind="auf" driverName={savedName}
      onBack={function(){ setScreen("menu"); }} />;
  }
  if (screen === "breakdown") {
    return <BreakdownScreen lang={lang} driverName={savedName}
      onBack={function(){ setScreen("menu"); }} />;
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
