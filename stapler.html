    (function(){
      var SENTRY_DSN = ""; // ← вставь DSN для stapler, пусто = выключено
      if (SENTRY_DSN && window.Sentry) {
        try {
          Sentry.init({
            dsn: SENTRY_DSN,
            release: "stapler@2026-05-13",
            environment: location.hostname.indexOf("localhost") >= 0 ? "dev" : "prod",
            tracesSampleRate: 0.0,
            beforeSend: function(event){
              if (event.exception && event.exception.values) {
                var msg = (event.exception.values[0]||{}).value || "";
                if (msg.indexOf("ResizeObserver") >= 0) return null;
                if (msg.indexOf("extension://") >= 0) return null;

            }

// Генерация уникального ID записи БД. Префикс сохраняем для читаемости,
// хвост — UUID вместо timestamp, чтобы исключить коллизию при

function genId(prefix) {
  var uuid;
  try {
    if (window.crypto && window.crypto.randomUUID) {
      uuid = window.crypto.randomUUID();
    }
  } catch(e) {}
  if (!uuid) {
    uuid = Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 11);
  }
  return (prefix || "") + uuid;
}

function netErrMsg(e) {
  var msg = (e && (e.message || e)) ? String(e.message || e) : "";
  var isNet = !navigator.onLine
    || /failed to fetch|networkerror|load failed|err_|fetch/i.test(msg);

// === OFFLINE-QUEUE ===
// Если отправка не прошла из-за сети — запрос кладётся в localStorage-очередь
// и автоматически повторяется при возврате связи. Данные не теряются.
var OFFLINE_QUEUE_KEY = "wf_offline_queue";
function offlineQueueRead() {
  try {
    var raw = localStorage.getItem(OFFLINE_QUEUE_KEY);
    var arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}
function offlineQueueWrite(arr) {
  try { localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(arr)); } catch (e) {}
}
function offlineQueueSize() { return offlineQueueRead().length; }
function offlineEnqueue(item) {
  var q = offlineQueueRead();
  item.id = "oq_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
  item.ts = Date.now();
  q.push(item);
  offlineQueueWrite(q);
  try { window.dispatchEvent(new CustomEvent("wf-queue-changed")); } catch(e) {}
}
function isNetworkError(e) {
  var msg = (e && (e.message || e)) ? String(e.message || e) : "";
  return !navigator.onLine
    || /failed to fetch|networkerror|load failed|err_|fetch|timeout/i.test(msg);
}
function offlineSendRaw(item) {
  var url = SB_URL + "/rest/v1/" + item.table + (item.qs ? "?" + item.qs : "");
  var headers = { "Content-Type":"application/json", "apikey":SB_KEY,
    "Authorization":"Bearer " + SB_KEY, "Prefer":"return=minimal" };
  return fetch(url, { method:item.method, headers:headers, body:JSON.stringify(item.body) })
    .then(function(r){
      if (!r.ok) {
        return r.text().then(function(t){
          if (r.status >= 400 && r.status < 500 && r.status !== 408 && r.status !== 429) {
            return { ok:false, permanent:true, msg:t };
          }
          throw new Error(t);
        });
      }
      return { ok:true };
    });
}
var offlineFlushing = false;
function offlineFlush() {
  if (offlineFlushing) return Promise.resolve();
  if (!navigator.onLine) return Promise.resolve();
  var q = offlineQueueRead();
  if (!q.length) return Promise.resolve();
  offlineFlushing = true;
  function step() {
    var cur = offlineQueueRead();
    if (!cur.length) { offlineFlushing = false;
      try { window.dispatchEvent(new CustomEvent("wf-queue-changed")); } catch(e) {}
      return Promise.resolve(); }
    var item = cur[0];
    return offlineSendRaw(item).then(function(res){
      if (res.ok || res.permanent) {
        var rest = offlineQueueRead();
        rest.shift();
        offlineQueueWrite(rest);
        try { window.dispatchEvent(new CustomEvent("wf-queue-changed")); } catch(e) {}
        return step();
      }
      offlineFlushing = false;
      return Promise.resolve();
    }).catch(function(){
      offlineFlushing = false;
      return Promise.resolve();
    });
  }
  return step();
}
function offlineInit() {
  window.addEventListener("online", function(){ offlineFlush(); });
  setTimeout(offlineFlush, 2500);
  setInterval(function(){ if (navigator.onLine) offlineFlush(); }, 30000);
}

function compressPhoto(b64, maxWidth, quality) {
  maxWidth = maxWidth || 1200;
  quality = quality || 0.75;
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      var canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = function(){ resolve(b64); };
    img.src = b64;
  });
}
function compressAll(photos) {
  return Promise.all(photos.map(function(p){ return compressPhoto(p); }));
}
function uploadPhoto(b64, alertId, i) {
  if (!b64) return Promise.resolve(null);
  return fetch(b64).then(function(r){ return r.blob(); }).then(function(blob){
    var ext = blob.type && blob.type.indexOf("png")!==-1 ? "png" : "jpg";
    var path = "stapler/"+alertId+"/photo_"+i+"."+ext;
    return fetch(SB_URL+"/storage/v1/object/inspection-photos/"+path, {
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":blob.type||"image/jpeg","x-upsert":"true"},
      body:blob
    }).then(function(r){ return r.ok?(SB_URL+"/storage/v1/object/public/inspection-photos/"+path):null; });
  }).catch(function(){ return null; });
}

function uploadAll(photos, alertId) {
  if (!photos || !photos.length) return Promise.resolve([]);
  return Promise.all(photos.map(function(p,i){ return uploadPhoto(p,alertId,i); }))

}

                  voiceRef.current=rec; setVoiceText(""); setVoiceActive(true);
                  try{rec.start();}catch(err){ voiceRef.current=null; setVoiceActive(false); }
                }}
                onPointerUp={function(e){
                  e.preventDefault();
                  if(!voiceRef.current) return;
                  try{ voiceRef.current.stop(); }catch(err){}
                }}
                onPointerLeave={function(e){
                  if(!voiceRef.current) return;
                  try{ voiceRef.current.stop(); }catch(err){}
                }}
                onPointerCancel={function(e){
                  if(!voiceRef.current) return;
                  try{ voiceRef.current.stop(); }catch(err){}
                }}
                style={{ width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:12,padding:"16px",borderRadius:"var(--radius-md)",border:"1.5px solid",borderColor:voiceActive?"var(--red)":"var(--border)",background:voiceActive?"rgba(239,68,68,0.1)":"var(--bg-elevated)",color:voiceActive?"var(--red)":"var(--text-secondary)",fontFamily:"var(--font-display)",fontWeight:700,fontSize:14,letterSpacing:1,minHeight:"var(--touch)",transition:"background 0.1s, border-color 0.1s",userSelect:"none",WebkitUserSelect:"none",touchAction:"none",animation:voiceActive?"voicePulse 0.6s infinite":"none" }}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                {voiceActive ? "Loslassen zum Speichern..." : "Gedrückt halten — Sprechen"}
              </button>
              {voiceActive && voiceText ? <div style={{ marginTop:8,padding:"10px 12px",borderRadius:"var(--radius-sm)",background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.2)",fontSize:13,color:"rgba(255,255,255,0.7)",fontStyle:"italic" }}>{voiceText}</div> : null}
            </div>
          )}
        </div>

        <div className="glass-panel">
          <div className="label-cap">👤 IHR NAME / KONTAKT *</div>
          <input className="input-dark" value={nm}
            onChange={function(e){ setNm(e.target.value); }}
            placeholder="Name und Telefon" />
        </div>

        <div className="glass-panel">
          <div className="label-cap">📷 FOTO (optional)</div>
          <input ref={photoRef} type="file" accept="image/*" capture="environment" multiple style={{ display:"none" }} onChange={onFiles} />
          <input ref={galleryPhotoRef} type="file" accept="image/*" multiple style={{ display:"none" }} onChange={onFiles} />
          <div style={{ display:"flex", gap:8 }}>
            <button className="photo-box" type="button" style={{ flex:1 }} onClick={function(){ if (photoRef.current) photoRef.current.click(); }}>
              📷 Aufnehmen
            </button>
            <button className="photo-box" type="button" style={{ flex:1 }} onClick={function(){ if (galleryPhotoRef.current) galleryPhotoRef.current.click(); }}>
              🖼️ Galerie
            </button>
          </div>
          {ph.length > 0 && (
            <div className="photo-grid">
              {ph.map(function(src, i){
                return (
                  <div key={i} className="photo-thumb">
                    <img src={src} alt="" />
                    <button type="button" onClick={function(){ setPh(ph.filter(function(_,j){ return j !== i; })); }}>×</button>
                  </div>
                );
              })}
            </div>
          )}
        </div>

      </div>

      {/* Кнопка — вне скроллируемого контента, фиксирована снизу */}
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, zIndex:20, padding:"10px 16px calc(env(safe-area-inset-bottom) + 10px)", background:"linear-gradient(to bottom, transparent, rgba(10,23,48,0.97) 30%)" }}>
        {!ok && missing.length > 0 && (
          <div style={{ marginBottom:8, textAlign:"center", fontSize:11, color:"rgba(255,255,255,0.4)" }}>
            Noch: {missing.join(" · ")}
          </div>
        )}
        <button className={urg === "urgent" ? "btn-danger" : "btn-primary"} disabled={!ok || snd} onClick={submit}>
          {snd ? "Wird gesendet..." : (urg === "urgent" ? "🚨 NOTRUF MELDEN" : "STÖRUNG MELDEN")}
        </button>
      </div>
    </div>
  );
}

// === SENT SCREEN ===
function SentScreen({ sentData, onReset, onLogout }) {
  var _s = useState("open"); var st = _s[0]; var setSt = _s[1];
  var poll = useRef(null);
  useEffect(function(){
    poll.current = setInterval(function(){
      sbStatus(sentData.alertId).then(function(s){ setSt(s); if (s === "done") clearInterval(poll.current); });
    }, 10000);
    return function(){ clearInterval(poll.current); };
  }, [sentData.alertId]);

  var fk = sentData.forklift;
  var urgent = sentData.urg === "urgent";
  var si = st === "done"
    ? { text:"✅ Erledigt", color:"#22c55e", cls:"d" }
    : st === "inProgress"
    ? { text:"🔧 Mechaniker arbeitet daran...", color:"#f59e0b", cls:"p" }
    : { text:"⏳ Gesendet — warte auf Mechaniker...", color:"#60a5fa", cls:"w" };

  return (
    <div style={{ position:"relative", minHeight:"100vh", minHeight:"100dvh", maxWidth:480, margin:"0 auto" }}>
      <Bg />
      <div style={{ position:"relative", zIndex:2, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", padding:"24px 20px" }}>
        <div style={{ fontSize:80, marginBottom:16 }}>{urgent ? "🚨" : "✅"}</div>
        <div style={{ fontSize:26, fontWeight:900, marginBottom:8, color: urgent ? "#ef4444" : "#22c55e" }}>Gesendet!</div>
        <div style={{ color:"rgba(255,255,255,0.65)", marginBottom:24, textAlign:"center" }}>Werkstatt wurde benachrichtigt</div>
        <div className={"status-box " + si.cls} style={{ width:"100%", maxWidth:400 }}>
          <div style={{ fontSize:14, fontWeight:700, color:si.color }}>{si.text}</div>
        </div>
        <div className="glass-panel" style={{ width:"100%", maxWidth:400 }}>
          <div style={{ marginBottom:10 }}>
            <span style={{ padding:"4px 12px", borderRadius:999, fontSize:12, fontWeight:800,
              background: urgent ? "rgba(239,68,68,0.2)" : "rgba(255,165,0,0.15)",
              color: urgent ? "#ef4444" : "#ffa500",
              border:"1px solid " + (urgent ? "rgba(239,68,68,0.4)" : "rgba(255,165,0,0.4)") }}>
              {urgent ? "🔴 DRINGEND" : "🟡 Kann warten"}
            </span>
          </div>
          {fk && (
            <div style={{ fontWeight:800, fontSize:15, marginBottom:4 }}>
              Stapler {fk.nummer || fk.plate || ""}
              {fk.hersteller ? " · " + fk.hersteller : ""}
              {fk.model ? " " + fk.model : ""}
            </div>
          )}
          <div style={{ color:"rgba(255,255,255,0.6)", fontSize:13, marginBottom:6 }}>📍 {sentData.location}</div>
          <div style={{ fontSize:13, lineHeight:1.45 }}>{sentData.desc}</div>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:10, width:"100%", maxWidth:400 }}>
          <button className="btn-primary" onClick={onReset}>Neue Meldung</button>
          <button onClick={onLogout} style={{ border:0, background:"transparent", color:"rgba(255,255,255,0.5)", fontWeight:700, fontSize:13, padding:8 }}>← Abmelden</button>
        </div>
      </div>
    </div>
  );
}

// === ROOT ===
function App() {
  var _stg = useState("loading"); var stg = _stg[0]; var setStg = _stg[1];
  var _nm  = useState(""); var nm = _nm[0]; var setNm = _nm[1];
  var _usr = useState(null); var usr = _usr[0]; var setUsr = _usr[1];
  var _sd  = useState(null); var sd = _sd[0]; var setSd = _sd[1];
  var _users = useState([]); var dbUsers = _users[0]; var setDbUsers = _users[1];
  var _fb = useState(null); var fbPin = _fb[0]; var setFbPin = _fb[1];

  function loginPersonal(u){
    var sessUser = {
      id: u.id, name: u.name, avatar: u.avatar || "??",
      role: u.role, niederlassung_id: u.niederlassung_id, scope_level: u.scope_level,
      app_access: u.app_access||[], tenant_id: "ltg"
    };
    try { localStorage.setItem(SESSION_KEY, JSON.stringify(sessUser)); } catch(e){}
    fetch(SB_URL+"/rest/v1/users?id=eq."+encodeURIComponent(u.id), {
      method:"PATCH",
      headers:{ "Content-Type":"application/json", "apikey":SB_KEY, "Authorization":"Bearer "+SB_KEY, "Prefer":"return=minimal" },
      body:JSON.stringify({ last_login: new Date().toISOString() })
    }).catch(function(){});
    setNm(u.name); setUsr(sessUser); setStg("slider");
  }

  // Запись/обновление пользователя в public.users
  function registerOrUpdateUser(fullName, niedId, fallbackUserId) {
    if (!fullName) return;
    var avatar = fullName.trim().split(/\s+/).map(function(w){ return (w[0]||"").toUpperCase(); }).join("").slice(0,2);
    var nameLower = fullName.trim().toLowerCase();
    sbGet("users", "select=id,name,niederlassung_id&active=eq.true").then(function(rows) {
      var existing = (rows || []).find(function(u) {
        return (u.name || "").trim().toLowerCase() === nameLower;
      });
      if (existing) {
        fetch(SB_URL+"/rest/v1/users?id=eq."+encodeURIComponent(existing.id), {
          method:"PATCH",
          headers:{ "Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal" },
          body:JSON.stringify({ last_login: new Date().toISOString(), active: true,
            niederlassung_id: niedId || existing.niederlassung_id || "hockenheim" })
        }).catch(function(){});
      } else {
        fetch(SB_URL+"/rest/v1/users", {
          method:"POST",
          headers:{ "Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal,resolution=merge-duplicates" },
          body:JSON.stringify({
            id: fallbackUserId, name: fullName, avatar: avatar,
            role: "stapler", tenant_id: "ltg",
            niederlassung_id: niedId || "hockenheim",
            scope_level: "niederlassung",
            active: true, app_access: ["stapler"],
            last_login: new Date().toISOString()
          })
        }).catch(function(){});
      }
    }).catch(function(){});
  }

  function loginFallback(fullName, nied) {
    var u = {
      id: genId("st_"),
      name: fullName,
      avatar: fullName.split(" ").map(function(w){ return w[0]||""; }).join("").slice(0,2).toUpperCase(),
      role: "stapler",
      niederlassung_id: nied || "hockenheim",
      scope_level: "niederlassung",
      app_access: ["stapler"],
      tenant_id: "ltg"
    };
    try { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); } catch(e) {}
    registerOrUpdateUser(fullName, u.niederlassung_id, u.id);
    setNm(fullName); setUsr(u); setStg("slider");
  }

  useEffect(function(){
    try {
      var s = localStorage.getItem(SESSION_KEY);
      if (s) {
        var u = JSON.parse(s);
        if (u && u.name) {
          if (!u.niederlassung_id) {
            try { localStorage.removeItem(SESSION_KEY); } catch(e2) {}
            setStg("pin"); return;
          }
          setNm(u.name); setUsr(u); setStg("slider");
        } else setStg("pin");
      } else setStg("pin");
    } catch(e) { setStg("pin"); }
    sbGet("users","active=eq.true&select=id,name,avatar,role,niederlassung_id,scope_level,pin,app_access").then(function(r){
      setDbUsers(r||[]);
    }).catch(function(){ setDbUsers([]); });
    sbGet("app_settings","key=eq.stapler_fallback_pin&select=value").then(function(r){
      if (r && r.length && r[0].value) setFbPin(r[0].value);
    }).catch(function(){});
  }, []);

  if (stg === "loading") return <div className="scrn" style={{ alignItems:"center", justifyContent:"center" }}><Bg /><div style={{ position:"relative", zIndex:2 }}><Logo /></div></div>;

  if (stg === "pin") return (
    <PinScreen users={dbUsers} fallbackPin={fbPin}
      onPersonal={loginPersonal}
      onFallback={function(){ setStg("register"); }}
      onBack={function(){}}
    />
  );

  if (stg === "register") return <ErsteAnmeldung onNext={function(n, nied){ loginFallback(n, nied); }} />;

  if (stg === "slider") return (
    <SliderScreen name={nm}
      onUnlock={function(){ setStg("form"); }}
      onChange={function(){ try { localStorage.removeItem(SESSION_KEY); } catch(e) {} try { localStorage.removeItem(DRAFT_KEY_STAPLER); } catch(e) {} setNm(""); setUsr(null); setStg("pin"); }}
    />
  );

  if (stg === "form" && usr) return <ReportForm user={usr} onSent={function(d){ setSd(d); setStg("sent"); }} />;

  if (stg === "sent" && sd) return <SentScreen sentData={sd} onReset={function(){ setSd(null); setStg("form"); }} onLogout={function(){ setStg("slider"); }} />;

  return null;
}

// === ErrorBoundary — ловит падения React-компонентов и показывает экран вместо белого экрана ===
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, errorMsg: "" };
  }
  static getDerivedStateFromError(err) {
    return { hasError: true, errorMsg: (err && err.message) ? err.message : String(err) };
  }
  componentDidCatch(err, info) {
    console.error("App crash:", err, info);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement("div", {
        style: {
          minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
          background:"#0a0a0a", color:"#fff", padding:24, fontFamily:"system-ui,sans-serif"
        }
      },
        React.createElement("div", { style:{ maxWidth:400, textAlign:"center" } },
          React.createElement("div", { style:{ fontSize:48, marginBottom:16 } }, "⚠️"),
          React.createElement("div", { style:{ fontSize:20, fontWeight:700, marginBottom:8 } }, "Etwas ist schiefgelaufen"),
          React.createElement("div", { style:{ fontSize:13, color:"rgba(255,255,255,0.6)", marginBottom:20, wordBreak:"break-word" } }, this.state.errorMsg),
          React.createElement("button", {
            onClick: function(){ window.location.reload(); },
            style: {
              background:"#ffa500", color:"#000", border:"none", padding:"12px 24px",
              borderRadius:10, fontWeight:800, fontSize:14, cursor:"pointer"
            }
          }, "🔄 App neu laden")
        )
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
</script>
</body>
