// === Supabase helpers ===
function sbInsert(table, payload) {
  return fetch(SB_URL + "/rest/v1/" + table, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY,
      "Prefer":"return=minimal"
    },
    body:JSON.stringify(payload)
  }).then(function(res){
    if (!res.ok) return res.text().then(function(t){ throw new Error(t); });
    return true;
  });
}

function sbGetStatus(alertId) {
  return fetch(SB_URL + "/rest/v1/alerts?id=eq." + alertId + "&select=status", {
    headers:{ "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY }
  }).then(function(r){ return r.json(); })
    .then(function(d){ return d && d[0] ? d[0].status : "open"; })
    .catch(function(){ return "open"; });
}

function LangSwitcher({ lang, setLang }) {

    return function(){ document.removeEventListener("mousedown", h); document.removeEventListener("touchstart", h); };
  }, []);
  return (
    <div ref={ref} style={{ position:"relative" }}>
      <button className="lang-switch" onClick={function(){ setOpen(!open); }}>
        <span>🌐</span><span>{lang}</span>
        <span style={{ color:"#ffa500", fontSize:10, transform: open ? "rotate(180deg)" : "none", transition:"transform 0.2s" }}>▼</span>

function PinScreen({ lang, setLang, onSuccess, onBack }) {

function SliderScreen({ lang, setLang, userName, onUnlock, onChangeUser }) {
  var t = getT(lang);
  var _sx = useState(0); var x = _sx[0]; var setX = _sx[1];
  var _sd = useState(false); var drag = _sd[0]; var setDrag = _sd[1];
  var trackRef = useRef(null);
  var maxRef = useRef(0);

  useEffect(function(){
    if (trackRef.current) maxRef.current = trackRef.current.offsetWidth - 78;
  }, []);

  function startSlide(clientX) {
    setDrag(true);
    var start = clientX; var oldX = x; var cur = oldX;
    function move(e) {
      var cx = e.touches ? e.touches[0].clientX : e.clientX;
      cur = Math.max(0, Math.min(maxRef.current, cx - start + oldX));
      setX(cur);
    }
    function up() {
      window.removeEventListener("mousemove", move);
      window.removeEventListener("touchmove", move);
      window.removeEventListener("mouseup", up);
      window.removeEventListener("touchend", up);
      setDrag(false);
      if (cur >= maxRef.current * 0.82) { setX(maxRef.current); setTimeout(onUnlock, 120); }
      else setX(0);
    }
    window.addEventListener("mousemove", move);
    window.addEventListener("touchmove", move, { passive:false });
    window.addEventListener("mouseup", up);
    window.addEventListener("touchend", up);
  }

  return (
    <div className="scrn" style={{ justifyContent:"flex-end", paddingBottom:40 }}>
      <Bg />
      <div style={{ position:"relative", zIndex:2, flex:1, display:"flex", flexDirection:"column" }}>
        <div style={{ position:"absolute", top:16, right:0 }}>
          <LangSwitcher lang={lang} setLang={setLang} />
        </div>
        <div style={{ marginTop:"40vh" }}>
          <Logo />

          {userName && (
            <div style={{ marginTop:6, color:"rgba(255,255,255,0.65)", fontSize:14, fontWeight:600 }}>
              Guten Tag, {userName}
            </div>
          )}
        </div>
        <div style={{ flex:1 }}></div>
        <div className="slider-track" ref={trackRef} style={{ marginBottom:18 }}>
          <div className="slider-marks">
            <div className="slider-mark"></div><div className="slider-mark"></div>
            <div className="slider-mark"></div><div className="slider-mark"></div>
          </div>
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"flex-end", paddingRight:24, color:"rgba(255,255,255,0.35)", fontSize:13, fontWeight:700, letterSpacing:1, pointerEvents:"none" }}>
            {t.sliderLabel}
          </div>
          <div className="slider-thumb"
            style={{ left:6 + x, transition: drag ? "none" : "left 0.25s" }}
            onMouseDown={function(e){ startSlide(e.clientX); }}
            onTouchStart={function(e){ startSlide(e.touches[0].clientX); }}>
            <div className="slider-grip"><span></span><span></span><span></span></div>
          </div>
        </div>
        <button style={{ border:0, background:"transparent", color:"rgba(255,255,255,0.5)", fontWeight:700, fontSize:13, paddingBottom:8 }} onClick={onChangeUser}>
          {t.changeUser}
        </button>
      </div>
    </div>
  );
}

function ReportForm({ lang, setLang, user, onSent }) {

        var r = new FileReader();
        r.onload = function(ev){ resolve(ev.target.result); };

      setSending(false);
      onSent({ alertId:alertId, loc:loc, fork:fork, urg:urg, desc:desc });

      </div>

      <div style={{ fontSize:28, fontWeight:900, lineHeight:1.1, marginBottom:20 }}>

      </div>

      {/* Standort */}
      <div className="glass-panel">
        <div className="label-cap">🏭 {t.location}</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
          {LOCATIONS.map(function(l){
            return (

                onClick={function(){ setLoc(l.id); setFork(""); }}>

      </div>

      {/* Stapler */}
      {loc && (

            return (

                onClick={function(){ setFork(f.id); }}>
                <div>
                  <div style={{ fontWeight:800, fontSize:15, color: fork === f.id ? "#ffa500" : "#fff" }}>{f.plate}</div>

        disabled={!canSubmit || sending}

        {sending ? t.sending : (urg === "urgent" ? t.sendUrgent : t.send)}

    </div>
  );

// === SENT SCREEN ===
function SentScreen({ lang, setLang, sentData, user, onReset, onLogout }) {
  var t = getT(lang);
  var _ss = useState("open"); var status = _ss[0]; var setStatus = _ss[1];
  var pollRef = useRef(null);

  useEffect(function(){
    pollRef.current = setInterval(function(){
      sbGetStatus(sentData.alertId).then(function(s){
        setStatus(s);
        if (s === "done") clearInterval(pollRef.current);
      });
    }, 10000);
    return function(){ clearInterval(pollRef.current); };
  }, [sentData.alertId]);

  var selectedFork = FORKLIFTS.find(function(f){ return f.id === sentData.fork; });
  var selectedLoc  = LOCATIONS.find(function(l){ return l.id === sentData.loc; });
  var isUrgent = sentData.urg === "urgent";

  var statusInfo = status === "done"
    ? { text:t.statusDone,    color:"#22c55e", cls:"done"     }
    : status === "inProgress"
    ? { text:t.statusProgress, color:"#f59e0b", cls:"progress" }
    : { text:t.statusWaiting,  color:"#60a5fa", cls:"waiting"  };

  return (
    <div style={{ position:"relative", minHeight:"100vh", minHeight:"100dvh", maxWidth:480, margin:"0 auto" }}>
      <Bg />
      <div style={{ position:"relative", zIndex:2, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", padding:"24px 20px" }}>

        <div style={{ fontSize:80, marginBottom:16 }}>{isUrgent ? "🚨" : "✅"}</div>
        <div style={{ fontSize:26, fontWeight:900, marginBottom:8, color: isUrgent ? "#ef4444" : "#22c55e" }}>
          {t.sent}
        </div>

        {/* Статус */}
        <div className={"status-box " + statusInfo.cls} style={{ width:"100%", maxWidth:400 }}>
          <div style={{ fontSize:22 }}>{status === "done" ? "✅" : status === "inProgress" ? "🔧" : "⏳"}</div>
          <div style={{ fontSize:14, fontWeight:700, color:statusInfo.color }}>{statusInfo.text}</div>
        </div>

        {/* Сводка */}
        <div className="glass-panel" style={{ width:"100%", maxWidth:400 }}>
          <div style={{ display:"flex", gap:8, marginBottom:12, flexWrap:"wrap" }}>
            <span style={{ padding:"4px 12px", borderRadius:999, fontSize:12, fontWeight:800,
              background: isUrgent ? "rgba(239,68,68,0.2)" : "rgba(255,165,0,0.15)",
              color: isUrgent ? "#ef4444" : "#ffa500",
              border: "1px solid " + (isUrgent ? "rgba(239,68,68,0.4)" : "rgba(255,165,0,0.4)") }}>
              {isUrgent ? "🔴 DRINGEND" : "🟡 Kann warten"}
            </span>
          </div>
          <div style={{ fontWeight:800, fontSize:16, marginBottom:4 }}>
            {selectedFork ? selectedFork.plate : sentData.fork}
          </div>
          <div style={{ color:"rgba(255,255,255,0.6)", fontSize:13, marginBottom:8 }}>
            📍 {selectedLoc ? selectedLoc.name : sentData.loc}
          </div>
          <div style={{ fontSize:13, lineHeight:1.45, color:"rgba(255,255,255,0.85)" }}>
            {sentData.desc}
          </div>
        </div>

        <div style={{ display:"flex", flexDirection:"column", gap:10, width:"100%", maxWidth:400 }}>
          <button className="btn-primary" onClick={onReset}>{t.newReport}</button>
          <button onClick={onLogout}

          </button>

      </div>
    </div>
  );
}

// === ROOT APP ===
function App() {
  var _sl = useState("DE"); var lang = _sl[0]; var setLang = _sl[1];
  var _ss = useState("loading"); var stage = _ss[0]; var setStage = _ss[1];
  var _sname = useState(""); var savedName = _sname[0]; var setSavedName = _sname[1];
  var _su = useState(null); var user = _su[0]; var setUser = _su[1];
  var _sd = useState(null); var sentData = _sd[0]; var setSentData = _sd[1];

  useEffect(function(){
    try {
      var saved = localStorage.getItem(SESSION_KEY);
      if (saved) {
        var u = JSON.parse(saved);
        if (u && u.name) { setSavedName(u.name); setUser(u); setStage("slider"); return; }
      }
    } catch(e) {}
    setStage("register");
  }, []);

  if (stage === "loading") {
    return (
      <div className="scrn" style={{ alignItems:"center", justifyContent:"center" }}>
        <Bg /><div style={{ position:"relative", zIndex:2 }}><Logo /></div>
      </div>
    );
  }

  if (stage === "register") {
    return (
      <ErsteAnmeldung lang={lang} setLang={setLang}
        onContinue={function(v, n){
          setSavedName(v + " " + n);
          setStage("pin");
        }}
      />
    );
  }

  if (stage === "pin") {
    return (
      <PinScreen lang={lang} setLang={setLang}
        onBack={function(){ setStage("register"); }}
        onSuccess={function(){
          var name = savedName || "Stapler";
          var avatar = name.split(" ").map(function(w){ return w[0]||""; }).join("").slice(0,2).toUpperCase() || "ST";
          var u = { id:"stapler_" + Date.now(), name:name, avatar:avatar };
          try { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); } catch(e) {}
          setUser(u);
          setStage("slider");
        }}
      />
    );
  }

  if (stage === "slider") {
    return (
      <SliderScreen lang={lang} setLang={setLang}
        userName={savedName}
        onUnlock={function(){ setStage("form"); }}
        onChangeUser={function(){
          try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
          setSavedName(""); setUser(null); setStage("register");
        }}
      />
    );
  }

  if (stage === "form" && user) {
    return (
      <ReportForm lang={lang} setLang={setLang} user={user}
        onSent={function(data){
          setSentData(data);
          setStage("sent");
        }}
      />
    );
  }

  if (stage === "sent" && sentData) {
    return (
      <SentScreen lang={lang} setLang={setLang}
        sentData={sentData} user={user}
        onReset={function(){ setSentData(null); setStage("form"); }}
        onLogout={function(){
          setStage("slider");
        }}
      />
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
