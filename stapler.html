    .urg-row.active-red { border-color:#ff3b30; background:rgba(239,68,68,0.10); box-shadow:0 0 0 1px #ff3b30; }

    .light-field-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#8a94a7; font-size:18px; pointer-events:none; }
    .blue-btn { width:100%; border:0; border-radius:13px; padding:17px; background:#082b66; color:#fff; font-size:17px; font-weight:800; display:flex; align-items:center; justify-content:center; gap:12px; }

    .powered-line { width:1px; height:34px; background:rgba(255,255,255,0.42); }
    .powered-name { font-size:12px; line-height:1.35; font-weight:700; color:rgba(255,255,255,0.92); }
    .nummer-big { width:100%; padding:18px; text-align:center; background:rgba(9,27,58,0.74); border:2px solid rgba(255,255,255,0.2); border-radius:14px; color:#fff; font-size:36px; font-weight:900; outline:none; letter-spacing:6px; }
    .nummer-big:focus { border-color:#ffa500; box-shadow:0 0 0 2px rgba(255,165,0,0.3); }
    .nummer-big.found { border-color:#22c55e; }
    .nummer-big.notfound { border-color:#ef4444; }
    .forklift-card { background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.3); border-radius:14px; padding:14px 16px; margin-top:10px; }
    .forklift-tag { font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.7); border:1px solid rgba(255,255,255,0.12); display:inline-block; margin:3px 3px 0 0; }
    .gps-btn { display:flex; align-items:center; gap:8px; padding:12px 14px; border-radius:12px; border:1px solid rgba(255,165,0,0.35); background:rgba(255,165,0,0.08); color:#ffa500; font-weight:700; font-size:13px; width:100%; margin-top:10px; justify-content:center; }
    .gps-btn:disabled { opacity:0.5; }
    .status-box { border-radius:14px; padding:14px 16px; margin-bottom:16px; display:flex; align-items:center; gap:12px; }
    .status-box.waiting { background:rgba(59,130,246,0.12); border:1px solid rgba(59,130,246,0.35); }
    .status-box.progress { background:rgba(245,158,11,0.12); border:1px solid rgba(245,158,11,0.35); }
    .status-box.done { background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.35); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SB_URL = "https://vtswzvrflqoueowylidy.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0c3d6dnJmbHFvdWVvd3lsaWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTY4NTEsImV4cCI6MjA5MjA3Mjg1MX0.xfsewg1ZGW4UDlNJAAYR-wwXStcVJIWOyCAOavuxnRI";
const APP_PIN = "6038";
const SESSION_KEY = "werkflow_stapler_user_v1";

const LOCATIONS = [
  { id:"hoc1", name:"HOC 1" },
  { id:"hoc2", name:"HOC 2" },
  { id:"hoc3", name:"HOC 3" },
  { id:"hoc4", name:"HOC 4" },
  { id:"hoc5", name:"HOC 5" },
  { id:"jd",   name:"John Deere" },
];

function sbInsert(table, payload) {
  return fetch(SB_URL + "/rest/v1/" + table, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY, "Prefer":"return=minimal" },
    body:JSON.stringify(payload)
  }).then(function(res){
    if (!res.ok) return res.text().then(function(t){ throw new Error(t); });
    return true;
  });
}

function sbGetStatus(alertId) {
  return fetch(SB_URL + "/rest/v1/alerts?id=eq." + encodeURIComponent(alertId) + "&select=status", {
    headers:{ "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY }
  }).then(function(r){ return r.json(); })
    .then(function(d){ return d && d[0] ? d[0].status : "open"; })
    .catch(function(){ return "open"; });
}

function sbFindForklift(nummer) {
  return fetch(SB_URL + "/rest/v1/forklifts?nummer=eq." + encodeURIComponent(nummer) + "&limit=1", {
    headers:{ "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY }
  }).then(function(r){ return r.json(); })
    .then(function(d){ return d && d[0] ? d[0] : null; })
    .catch(function(){ return null; });
}

function Bg() { return React.createElement("div", { className:"bg-image" }); }

function Logo({ small }) {
  var sz = small ? 26 : 42;
  return (
    <div style={{ fontSize:sz, fontWeight:900, letterSpacing:-1.5, lineHeight:1 }}>
      <span style={{ color:"#fff" }}>Werk</span><span style={{ color:"#ffa500" }}>Flow</span>
    </div>

}

function Powered() {
  return (
    <div className="powered">
      <div className="powered-small">POWERED BY</div>
      <div className="powered-line"></div>
      <div className="powered-name">Die <span style={{ color:"#ffa500", fontWeight:900 }}>LTG</span> - Landauer<br/>Transportgesellschaft Doll KG</div>
    </div>
  );
}

function ErsteAnmeldung({ onContinue }) {
  var _sv = useState(""); var vorname = _sv[0]; var setVorname = _sv[1];
  var _sn = useState(""); var nachname = _sn[0]; var setNachname = _sn[1];
  var ok = vorname.trim() && nachname.trim();
  return (
    <div className="scrn">
      <Bg />
      <div style={{ position:"relative", zIndex:2, paddingTop:54 }}>
        <Logo /><Powered />
        <div style={{ marginTop:50, color:"#ffa500", fontSize:38, fontWeight:900, lineHeight:1 }}>Stapler</div>
        <div style={{ marginTop:12, color:"rgba(255,255,255,0.72)", textTransform:"uppercase", letterSpacing:4, fontSize:12, fontWeight:800 }}>ERSTE ANMELDUNG</div>
        <div className="white-card">
          <div className="light-label">Vorname <span style={{ color:"#ff3b30" }}>*</span></div>
          <div className="light-field">
            <span className="light-field-icon">👤</span>
            <input className="input-light" value={vorname} onChange={function(e){ setVorname(e.target.value); }} placeholder="Roman" />
          </div>
          <div className="light-label">Nachname <span style={{ color:"#ff3b30" }}>*</span></div>
          <div className="light-field" style={{ marginBottom:26 }}>
            <span className="light-field-icon">👤</span>
            <input className="input-light" value={nachname} onChange={function(e){ setNachname(e.target.value); }} placeholder="Anokhin" />
          </div>
          <button className="blue-btn" disabled={!ok} style={{ opacity: ok ? 1 : 0.5 }}
            onClick={function(){ if (ok) onContinue(vorname.trim(), nachname.trim()); }}>
            Weiter →
          </button>
        </div>
      </div>
    </div>
  );
}

function PinScreen({ onSuccess, onBack }) {
  var _sp = useState(""); var pin = _sp[0]; var setPin = _sp[1];
  var _se = useState(false); var err = _se[0]; var setErr = _se[1];
  function press(d) {
    if (pin.length >= 4) return;
    setErr(false);
    var next = pin + d; setPin(next);
    if (next.length === 4) {
      setTimeout(function(){
        if (next === APP_PIN) onSuccess();
        else { setErr(true); setTimeout(function(){ setPin(""); setErr(false); }, 650); }
      }, 120);
    }
  }
  function del() { setPin(function(p){ return p.slice(0,-1); }); setErr(false); }
  return (
    <div className="scrn">
      <Bg />
      <div style={{ position:"relative", zIndex:2, paddingTop:16 }}>
        <button onClick={onBack} style={{ border:0, background:"transparent", color:"#ffa500", fontSize:13, fontWeight:700, padding:4 }}>← Zurück</button>
      </div>
      <div style={{ position:"relative", zIndex:2, flex:1, display:"flex", flexDirection:"column", alignItems:"center", paddingTop:32 }}>
        <Logo /><Powered />
        <div style={{ marginTop:40, color:"#ffa500", fontSize:36, fontWeight:900 }}>Stapler</div>
        <div style={{ marginTop:10, color:"rgba(255,255,255,0.72)", textTransform:"uppercase", letterSpacing:4, fontSize:12, fontWeight:800 }}>PIN EINGEBEN</div>
        <div style={{ display:"flex", gap:18, margin:"28px 0 32px" }}>
          {[0,1,2,3].map(function(i){ return <div key={i} className={"pin-dot" + (i < pin.length ? " filled" : "") + (err ? " error" : "")}></div>; })}
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 70px)", gap:16, justifyContent:"center" }}>
          {[1,2,3,4,5,6,7,8,9].map(function(d){ return <button key={d} className="keypad-btn" onClick={function(){ press(String(d)); }}>{d}</button>; })}
          <div></div>
          <button className="keypad-btn" onClick={function(){ press("0"); }}>0</button>
          <button className="keypad-btn" onClick={del}>⌫</button>
        </div>
      </div>
    </div>
  );
}

function SliderScreen({ userName, onUnlock, onChangeUser }) {
  var _sx = useState(0); var x = _sx[0]; var setX = _sx[1];
  var _sd = useState(false); var drag = _sd[0]; var setDrag = _sd[1];
  var trackRef = useRef(null); var maxRef = useRef(0);
  useEffect(function(){ if (trackRef.current) maxRef.current = trackRef.current.offsetWidth - 78; }, []);
  function startSlide(clientX) {
    setDrag(true);
    var start = clientX; var oldX = x; var cur = oldX;
    function move(e) { var cx = e.touches ? e.touches[0].clientX : e.clientX; cur = Math.max(0, Math.min(maxRef.current, cx - start + oldX)); setX(cur); }
    function up() {
      window.removeEventListener("mousemove", move); window.removeEventListener("touchmove", move);
      window.removeEventListener("mouseup", up); window.removeEventListener("touchend", up);
      setDrag(false);
      if (cur >= maxRef.current * 0.82) { setX(maxRef.current); setTimeout(onUnlock, 120); } else setX(0);
    }
    window.addEventListener("mousemove", move); window.addEventListener("touchmove", move, { passive:false });
    window.addEventListener("mouseup", up); window.addEventListener("touchend", up);
  }
  return (
    <div className="scrn" style={{ justifyContent:"flex-end", paddingBottom:40 }}>
      <Bg />
      <div style={{ position:"relative", zIndex:2, flex:1, display:"flex", flexDirection:"column" }}>
        <div style={{ marginTop:"40vh" }}>
          <Logo />
          <div style={{ color:"#ffa500", fontSize:32, fontWeight:900, marginTop:8 }}>Stapler</div>
          {userName && <div style={{ marginTop:6, color:"rgba(255,255,255,0.65)", fontSize:14, fontWeight:600 }}>Guten Tag, {userName}</div>}
        </div>
        <div style={{ flex:1 }}></div>
        <div className="slider-track" ref={trackRef} style={{ marginBottom:18 }}>
          <div className="slider-marks">
            <div className="slider-mark"></div><div className="slider-mark"></div>
            <div className="slider-mark"></div><div className="slider-mark"></div>
          </div>
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"flex-end", paddingRight:24, color:"rgba(255,255,255,0.35)", fontSize:13, fontWeight:700, letterSpacing:1, pointerEvents:"none" }}>
            SCHIEBEN →
          </div>
          <div className="slider-thumb" style={{ left:6 + x, transition: drag ? "none" : "left 0.25s" }}
            onMouseDown={function(e){ startSlide(e.clientX); }}
            onTouchStart={function(e){ startSlide(e.touches[0].clientX); }}>
            <div className="slider-grip"><span></span><span></span><span></span></div>
          </div>
        </div>
        <button style={{ border:0, background:"transparent", color:"rgba(255,255,255,0.5)", fontWeight:700, fontSize:13, paddingBottom:8 }} onClick={onChangeUser}>
          Anderer Benutzer
        </button>
      </div>
    </div>
  );
}

// === Stapler Nummer Input ===
function StaplerInput({ onSelect }) {
  var _sn = useState(""); var nummer = _sn[0]; var setNummer = _sn[1];
  var _sl = useState(false); var loading = _sl[0]; var setLoading = _sl[1];
  var _sf = useState(null); var found = _sf[0]; var setFound = _sf[1];
  var _snotf = useState(false); var notFound = _snotf[0]; var setNotFound = _snotf[1];
  var timerRef = useRef(null);

  function lookup(num) {
    if (!num || num.length < 2) { setFound(null); setNotFound(false); onSelect(null); return; }
    setLoading(true); setNotFound(false);
    sbFindForklift(num).then(function(f){
      setLoading(false);
      if (f) { setFound(f); setNotFound(false); onSelect(f); }
      else { setFound(null); setNotFound(true); onSelect({ nummer:num, isUnknown:true }); }
    });
  }

  function onChange(e) {
    var v = e.target.value.replace(/\D/g,"").slice(0,4);
    setNummer(v); setFound(null); setNotFound(false);
    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(function(){ lookup(v); }, 600);
  }

  var borderClass = found ? "found" : (notFound && nummer.length >= 2 ? "notfound" : "");

  return (
    <div>
      <div style={{ position:"relative" }}>
        <input className={"nummer-big " + borderClass} type="text" inputMode="numeric"
          value={nummer} onChange={onChange} placeholder="128" maxLength={4} />
        {loading && (
          <div style={{ position:"absolute", right:16, top:"50%", transform:"translateY(-50%)", fontSize:20 }}>⏳</div>
        )}
      </div>

      {found && (
        <div className="forklift-card">
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
            <span style={{ fontSize:20 }}>🏗</span>
            <div style={{ fontWeight:900, fontSize:18, color:"#22c55e" }}>Stapler {found.nummer}</div>
          </div>
          <div style={{ fontWeight:800, fontSize:15, marginBottom:6 }}>
            {found.hersteller || ""} {found.model || ""}
          </div>
          <div>
            {found.standort && <span className="forklift-tag">📍 {found.standort}</span>}
            {found.baujahr && <span className="forklift-tag">📅 {found.baujahr}</span>}
            {found.betrieb_std ? <span className="forklift-tag">⏱ {found.betrieb_std} Std</span> : null}
            {found.uvv_datum && <span className="forklift-tag">🔧 UVV: {found.uvv_datum}</span>}
            {found.einsatzort && <span className="forklift-tag">{found.einsatzort}</span>}
            {found.fahrgestell && <span className="forklift-tag">FG: {found.fahrgestell}</span>}
          </div>
          {found.aktiv === false && (
            <div style={{ marginTop:8, color:"#ef4444", fontSize:12, fontWeight:700 }}>⚠️ Als INAKTIV markiert</div>
          )}
        </div>
      )}

      {notFound && nummer.length >= 2 && (
        <div style={{ marginTop:10, padding:"12px 14px", borderRadius:12, background:"rgba(239,68,68,0.08)", border:"1px solid rgba(239,68,68,0.3)", fontSize:13, color:"rgba(255,120,120,0.9)" }}>
          ⚠️ Stapler {nummer} nicht gefunden.<br/>
          <span style={{ color:"rgba(255,255,255,0.5)", fontSize:12 }}>Meldung wird trotzdem gesendet.</span>
        </div>
      )}
    </div>
  );
}

// === Standort Picker — плитки + ручной ввод + GPS ===
function StandortPicker({ value, onChange }) {
  var _sc = useState(false); var custom = _sc[0]; var setCustom = _sc[1];
  var _sg = useState(false); var gpsLoading = _sg[0]; var setGpsLoading = _sg[1];
  var _si = useState(""); var customVal = _si[0]; var setCustomVal = _si[1];
  var isPreset = LOCATIONS.some(function(l){ return l.id === value; });
  var isCustomVal = value && !isPreset;

  function detectGPS() {
    if (!navigator.geolocation) { alert("Geolocation nicht verfügbar"); return; }
    setGpsLoading(true);
    navigator.geolocation.getCurrentPosition(
      function(p) {
        var lat = p.coords.latitude; var lon = p.coords.longitude;
        fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lon + "&accept-language=de&zoom=14")
          .then(function(r){ return r.json(); })
          .then(function(d){
            var a = d.address || {}; var parts = [];
            if (a.road) parts.push(a.road + (a.house_number ? " " + a.house_number : ""));
            if (a.city || a.town || a.village || a.suburb) parts.push(a.city || a.town || a.village || a.suburb);
            if (a.country_code) parts.push((a.country_code + "").toUpperCase());
            var txt = parts.length ? parts.join(", ") : (lat.toFixed(5) + ", " + lon.toFixed(5));
            onChange(txt); setCustomVal(txt); setCustom(true); setGpsLoading(false);
          })
          .catch(function(){
            var txt = lat.toFixed(5) + ", " + lon.toFixed(5);
            onChange(txt); setCustomVal(txt); setCustom(true); setGpsLoading(false);
          });
      },
      function(err){ setGpsLoading(false); alert("Standort: " + err.message); },
      { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
    );
  }

  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
        {LOCATIONS.map(function(l){
          return (
            <button key={l.id} type="button" className={"tile-btn" + (value === l.id ? " active" : "")}
              onClick={function(){ onChange(l.id); setCustom(false); setCustomVal(""); }}>
              {l.name}
            </button>
          );
        })}
        <button type="button" className={"tile-btn" + ((custom || isCustomVal) ? " active" : "")}
          style={{ gridColumn:"1 / -1" }}
          onClick={function(){ setCustom(true); }}>
          ✎ Eigener Standort
        </button>
      </div>
      {(custom || isCustomVal) && (
        <input className="input-dark" style={{ marginTop:10 }}
          value={customVal || (isCustomVal ? value : "")}
          placeholder="Adresse oder Beschreibung eingeben..."
          onChange={function(e){ setCustomVal(e.target.value); onChange(e.target.value); }}
        />
      )}
      <button type="button" className="gps-btn" disabled={gpsLoading} onClick={detectGPS}>
        {gpsLoading ? "⏳ Ermittle Standort..." : "📍 GPS — Aktuellen Standort verwenden"}
      </button>
    </div>
  );
}

// === MAIN FORM ===
function ReportForm({ user, onSent }) {
  var _sloc = useState(""); var location = _sloc[0]; var setLocation = _sloc[1];
  var _sfork = useState(null); var forklift = _sfork[0]; var setForklift = _sfork[1];
  var _surg = useState(""); var urg = _surg[0]; var setUrg = _surg[1];
  var _sdesc = useState(""); var desc = _sdesc[0]; var setDesc = _sdesc[1];
  var _sname = useState(user.name || ""); var contactName = _sname[0]; var setContactName = _sname[1];
  var _sphotos = useState([]); var photos = _sphotos[0]; var setPhotos = _sphotos[1];
  var _ssend = useState(false); var sending = _ssend[0]; var setSending = _ssend[1];
  var photoRef = useRef(null);

  var locationVal = (typeof location === "string" ? location : "").trim();
  var forkVal = forklift && (forklift.nummer || forklift.plate || forklift.id);
  var canSubmit = !!(locationVal && forkVal && urg && desc.trim() && contactName.trim());

  function onFiles(e) {
    var files = Array.from(e.target.files || []);
    Promise.all(files.map(function(file){
      return new Promise(function(resolve){
        var r = new FileReader(); r.onload = function(ev){ resolve(ev.target.result); }; r.readAsDataURL(file);
      });
    })).then(function(results){ setPhotos((photos || []).concat(results)); });
    e.target.value = "";
  }

  function submit() {
    if (!canSubmit || sending) return;
    setSending(true);
    var alertId = "ST" + Date.now();
    var plate = forklift ? (forklift.nummer || forklift.plate || forklift.id || "") : "";
    var locPreset = LOCATIONS.find(function(l){ return l.id === location; });
    var locFinal = locPreset ? locPreset.name : locationVal;
    sbInsert("alerts", {
      id: alertId, type: urg === "urgent" ? "breakdown" : "other",
      plate: plate, location: locFinal, description: desc,
      urgency: urg === "urgent" ? "urgent" : "normal",
      sender: contactName, sender_app: "stapler", status: "open"
    }).then(function(){
      setSending(false);
      onSent({ alertId:alertId, location:locFinal, forklift:forklift, urg:urg, desc:desc });
    }).catch(function(e){ alert("Fehler: " + (e.message || e)); setSending(false); });
  }

  var missingItems = [];
  if (!forkVal) missingItems.push("Stapler-Nummer");
  if (!locationVal) missingItems.push("Standort");
  if (!urg) missingItems.push("Dringlichkeit");
  if (!desc.trim()) missingItems.push("Beschreibung");
  if (!contactName.trim()) missingItems.push("Name");

  return (
    <div style={{ position:"relative", zIndex:2, maxWidth:480, margin:"0 auto",
      padding:"max(env(safe-area-inset-top),16px) 16px calc(env(safe-area-inset-bottom) + 32px)" }}>
      <Bg />
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div>
          <Logo small={true} />
          <div style={{ color:"#ffa500", fontSize:16, fontWeight:900, marginTop:2 }}>Stapler</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6, background:"rgba(12,36,76,0.62)", border:"1px solid rgba(255,255,255,0.13)", padding:"7px 10px", borderRadius:12 }}>
          <div style={{ width:8, height:8, borderRadius:"50%", background:"#22c55e" }}></div>
          <span style={{ fontSize:12, fontWeight:700 }}>{user.name}</span>
        </div>
      </div>

      <div style={{ fontSize:28, fontWeight:900, lineHeight:1.1, marginBottom:20 }}>
        🏗 Stapler <span style={{ color:"#ffa500" }}>Störung</span>
      </div>

      <div className="glass-panel">
        <div className="label-cap">🚜 STAPLER NUMMER</div>
        <div style={{ color:"rgba(255,255,255,0.55)", fontSize:12, marginBottom:10 }}>Dreistellige Nummer eingeben — Daten werden automatisch geladen</div>
        <StaplerInput onSelect={setForklift} />
      </div>

      <div className="glass-panel">
        <div className="label-cap">🏭 STANDORT</div>
        <StandortPicker value={location} onChange={setLocation} />
      </div>

      <div className="glass-panel">
        <div className="label-cap">⚡ DRINGLICHKEIT</div>
        <div className={"urg-row" + (urg === "urgent" ? " active-red" : "")} onClick={function(){ setUrg("urgent"); }}>
          <div className="urg-dot" style={{ background:"#ff3b30" }}></div>
          <span>🔴 DRINGEND — Arbeit steht still</span>
        </div>
        <div className={"urg-row" + (urg === "canwait" ? " active-orange" : "")} onClick={function(){ setUrg("canwait"); }}>
          <div className="urg-dot" style={{ background:"#ffa500" }}></div>
          <span>🟡 Kann warten</span>
        </div>
      </div>

      <div className="glass-panel">
        <div className="label-cap">📝 PROBLEMBESCHREIBUNG *</div>
        <textarea className="textarea-dark" value={desc}
          onChange={function(e){ setDesc(e.target.value); }}
          placeholder="z.B. Stapler fährt nicht an, Hydraulik defekt, Geräusch beim Fahren..." />
      </div>

      <div className="glass-panel">
        <div className="label-cap">👤 IHR NAME / KONTAKT *</div>
        <input className="input-dark" value={contactName}
          onChange={function(e){ setContactName(e.target.value); }}
          placeholder="Name und Telefon" />
      </div>

      <div className="glass-panel">
        <div className="label-cap">📷 FOTO (optional)</div>
        <input ref={photoRef} type="file" accept="image/*" capture="environment" multiple style={{ display:"none" }} onChange={onFiles} />
        <button className="photo-box" type="button" onClick={function(){ if (photoRef.current) photoRef.current.click(); }}>
          📷 Foto aufnehmen
        </button>
        {photos.length > 0 && (
          <div className="photo-grid">
            {photos.map(function(src, i){
              return (
                <div key={i} className="photo-thumb">
                  <img src={src} alt="" />
                  <button type="button" onClick={function(){ setPhotos(photos.filter(function(_,idx){ return idx !== i; })); }}>×</button>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {!canSubmit && missingItems.length > 0 && (
        <div style={{ marginBottom:10, padding:"10px 14px", borderRadius:10, background:"rgba(255,255,255,0.05)", fontSize:12, color:"rgba(255,255,255,0.45)", textAlign:"center" }}>
          Noch ausfüllen: {missingItems.join(" · ")}
        </div>
      )}

      <button
        className={urg === "urgent" ? "btn-danger" : "btn-primary"}
        disabled={!canSubmit || sending}
        onClick={submit}
        style={{ marginBottom:20 }}>
        {sending ? "Wird gesendet..." : (urg === "urgent" ? "🚨 NOTRUF MELDEN" : "STÖRUNG MELDEN")}
      </button>
    </div>
  );
}

// === SENT SCREEN ===
function SentScreen({ sentData, user, onReset, onLogout }) {
  var _ss = useState("open"); var status = _ss[0]; var setStatus = _ss[1];
  var pollRef = useRef(null);
  useEffect(function(){
    pollRef.current = setInterval(function(){
      sbGetStatus(sentData.alertId).then(function(s){ setStatus(s); if (s === "done") clearInterval(pollRef.current); });
    }, 10000);
    return function(){ clearInterval(pollRef.current); };
  }, [sentData.alertId]);

  var fork = sentData.forklift; var isUrgent = sentData.urg === "urgent";
  var statusInfo = status === "done"
    ? { text:"✅ Erledigt", color:"#22c55e", cls:"done" }
    : status === "inProgress"
    ? { text:"🔧 Mechaniker arbeitet daran...", color:"#f59e0b", cls:"progress" }
    : { text:"⏳ Gesendet — warte auf Mechaniker...", color:"#60a5fa", cls:"waiting" };

  return (
    <div style={{ position:"relative", minHeight:"100vh", minHeight:"100dvh", maxWidth:480, margin:"0 auto" }}>
      <Bg />
      <div style={{ position:"relative", zIndex:2, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", padding:"24px 20px" }}>
        <div style={{ fontSize:80, marginBottom:16 }}>{isUrgent ? "🚨" : "✅"}</div>
        <div style={{ fontSize:26, fontWeight:900, marginBottom:8, color: isUrgent ? "#ef4444" : "#22c55e" }}>Gesendet!</div>
        <div style={{ color:"rgba(255,255,255,0.65)", marginBottom:24, textAlign:"center" }}>Werkstatt wurde benachrichtigt</div>
        <div className={"status-box " + statusInfo.cls} style={{ width:"100%", maxWidth:400 }}>
          <div style={{ fontSize:14, fontWeight:700, color:statusInfo.color }}>{statusInfo.text}</div>
        </div>
        <div className="glass-panel" style={{ width:"100%", maxWidth:400 }}>
          <div style={{ display:"flex", gap:8, marginBottom:12 }}>
            <span style={{ padding:"4px 12px", borderRadius:999, fontSize:12, fontWeight:800,
              background: isUrgent ? "rgba(239,68,68,0.2)" : "rgba(255,165,0,0.15)",
              color: isUrgent ? "#ef4444" : "#ffa500",
              border:"1px solid " + (isUrgent ? "rgba(239,68,68,0.4)" : "rgba(255,165,0,0.4)") }}>
              {isUrgent ? "🔴 DRINGEND" : "🟡 Kann warten"}
            </span>
          </div>
          {fork && (
            <div style={{ fontWeight:800, fontSize:16, marginBottom:4 }}>
              🏗 Stapler {fork.nummer || fork.plate || ""}
              {fork.hersteller ? " · " + fork.hersteller : ""}
              {fork.model ? " " + fork.model : ""}
            </div>
          )}
          <div style={{ color:"rgba(255,255,255,0.6)", fontSize:13, marginBottom:8 }}>📍 {sentData.location}</div>
          <div style={{ fontSize:13, lineHeight:1.45 }}>{sentData.desc}</div>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:10, width:"100%", maxWidth:400 }}>
          <button className="btn-primary" onClick={onReset}>Neue Meldung</button>
          <button onClick={onLogout} style={{ border:0, background:"transparent", color:"rgba(255,255,255,0.5)", fontWeight:700, fontSize:13, padding:8 }}>← Abmelden</button>
        </div>
      </div>
    </div>
  );
}

// === ROOT APP ===
function App() {
  var _ss = useState("loading"); var stage = _ss[0]; var setStage = _ss[1];
  var _sname = useState(""); var savedName = _sname[0]; var setSavedName = _sname[1];
  var _su = useState(null); var user = _su[0]; var setUser = _su[1];
  var _sd = useState(null); var sentData = _sd[0]; var setSentData = _sd[1];

  useEffect(function(){
    try {
      var saved = localStorage.getItem(SESSION_KEY);
      if (saved) {
        var u = JSON.parse(saved);
        if (u && u.name) { setSavedName(u.name); setUser(u); setStage("slider"); return; }
      }
    } catch(e) {}
    setStage("register");
  }, []);

  if (stage === "loading") return <div className="scrn" style={{ alignItems:"center", justifyContent:"center" }}><Bg /><div style={{ position:"relative", zIndex:2 }}><Logo /></div></div>;
  if (stage === "register") return <ErsteAnmeldung onContinue={function(v,n){ setSavedName(v+" "+n); setStage("pin"); }} />;
  if (stage === "pin") return (
    <PinScreen onBack={function(){ setStage("register"); }}
      onSuccess={function(){
        var name = savedName || "Stapler";
        var u = { id:"stapler_" + Date.now(), name:name, avatar:name.split(" ").map(function(w){ return w[0]||""; }).join("").slice(0,2).toUpperCase() };
        try { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); } catch(e) {}
        setUser(u); setStage("slider");
      }}
    />
  );
  if (stage === "slider") return (
    <SliderScreen userName={savedName}
      onUnlock={function(){ setStage("form"); }}
      onChangeUser={function(){ try { localStorage.removeItem(SESSION_KEY); } catch(e) {} setSavedName(""); setUser(null); setStage("register"); }}
    />
  );
  if (stage === "form" && user) return <ReportForm user={user} onSent={function(data){ setSentData(data); setStage("sent"); }} />;
  if (stage === "sent" && sentData) return <SentScreen sentData={sentData} user={user} onReset={function(){ setSentData(null); setStage("form"); }} onLogout={function(){ setStage("slider"); }} />;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
