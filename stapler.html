  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js').then(function(reg) {
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
        reg.addEventListener('updatefound', function() {
          var nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', function() {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              nw.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
        document.addEventListener('visibilitychange', function() {
          if (document.visibilityState === 'visible') {
            reg.update().catch(function(){});
          }
        });
      }).catch(function(e){ console.warn('SW:', e); });

      var reloaded = false;
      navigator.serviceWorker.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'SW_UPDATED' && !reloaded) {
          reloaded = true;
          window.location.reload();
        }
      });
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (reloaded) return;
        reloaded = true;
        window.location.reload();
      });
    });
  }
</script>

function compressPhoto(b64, maxWidth, quality) {
  maxWidth = maxWidth || 1200;
  quality = quality || 0.75;
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      var canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = function(){ resolve(b64); };
    img.src = b64;
  });
}
function compressAll(photos) {
  return Promise.all(photos.map(function(p){ return compressPhoto(p); }));
}
function uploadPhoto(b64, alertId, i) {
  if (!b64) return Promise.resolve(null);
  return fetch(b64).then(function(r){ return r.blob(); }).then(function(blob){
    var ext = blob.type && blob.type.indexOf("png")!==-1 ? "png" : "jpg";
    var path = "stapler/"+alertId+"/photo_"+i+"."+ext;
    return fetch(SB_URL+"/storage/v1/object/inspection-photos/"+path, {
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":blob.type||"image/jpeg","x-upsert":"true"},
      body:blob
    }).then(function(r){ return r.ok?(SB_URL+"/storage/v1/object/public/inspection-photos/"+path):null; });
  }).catch(function(){ return null; });
}

function uploadAll(photos, alertId) {
  if (!photos || !photos.length) return Promise.resolve([]);
  return Promise.all(photos.map(function(p,i){ return uploadPhoto(p,alertId,i); }))

  var _nf = useState(false); var notFound = _nf[0]; var setNotFound = _nf[1];
  var timer = useRef(null);
  function lookup(v) {
    if (!v || v.length < 2) { setFound(null); setNotFound(false); onSelect(null); return; }
    setLoading(true); setNotFound(false);
    sbForklift(v).then(function(f){
      setLoading(false);
      if (f) { setFound(f); setNotFound(false); onSelect(f); }
      else { setFound(null); setNotFound(true); onSelect({ nummer:v, isUnknown:true }); }
    });
  }
  function onChange(e) {
    var v = e.target.value.replace(/\D/g,"").slice(0,4);
    setNum(v); setFound(null); setNotFound(false);
    clearTimeout(timer.current);
    timer.current = setTimeout(function(){ lookup(v); }, 600);
  }
  var bc = found ? "ok" : (notFound && num.length >= 2 ? "no" : "");
  return (
    <div>
      <div style={{ position:"relative" }}>
        <input className={"nummer-big " + bc} type="text" inputMode="numeric" value={num} placeholder="128" maxLength={4} onChange={onChange} />
        {loading && <div style={{ position:"absolute", right:16, top:"50%", transform:"translateY(-50%)", fontSize:18 }}>⏳</div>}
      </div>
      {found && (
        <div className="fork-card">
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
            <span style={{ fontSize:18 }}>🏗</span>
            <div style={{ fontWeight:900, fontSize:17, color:"#22c55e" }}>Stapler {found.nummer}</div>
          </div>
          <div style={{ fontWeight:800, fontSize:14, marginBottom:6 }}>{found.hersteller || ""} {found.model || ""}</div>
          <div>
            {found.standort && <span className="fork-tag">📍 {found.standort}</span>}
            {found.baujahr && <span className="fork-tag">📅 {found.baujahr}</span>}
            {found.betrieb_std ? <span className="fork-tag">⏱ {found.betrieb_std} Std</span> : null}
            {found.uvv_datum && <span className="fork-tag">🔧 UVV: {found.uvv_datum}</span>}
            {found.einsatzort && <span className="fork-tag">{found.einsatzort}</span>}
            {found.fahrgestell && <span className="fork-tag">FG: {found.fahrgestell}</span>}
          </div>
          {found.aktiv === false && <div style={{ marginTop:8, color:"#ef4444", fontSize:12, fontWeight:700 }}>⚠️ Als INAKTIV markiert</div>}
        </div>
      )}
      {notFound && num.length >= 2 && (
        <div style={{ marginTop:10, padding:"12px 14px", borderRadius:12, background:"rgba(239,68,68,0.08)", border:"1px solid rgba(239,68,68,0.3)", fontSize:13, color:"rgba(255,120,120,0.9)" }}>
          ⚠️ Stapler {num} nicht gefunden — Meldung wird trotzdem gesendet.
        </div>
      )}
    </div>
  );
}

// === STANDORT PICKER ===
function StandortPicker({ value, onChange }) {
  var _c = useState(false); var custom = _c[0]; var setCustom = _c[1];
  var _g = useState(false); var gps = _g[0]; var setGps = _g[1];
  var _cv = useState(""); var cv = _cv[0]; var setCv = _cv[1];
  var _ga = useState(null); var gpsAcc = _ga[0]; var setGpsAcc = _ga[1];
  var isPreset = LOCS.some(function(l){ return l.id === value; });
  var isCustom = value && !isPreset;
  function detectGPS() {
    if (!navigator.geolocation) { alert("Geolocation nicht verfügbar"); return; }
    setGps(true); setGpsAcc(null);
    navigator.geolocation.getCurrentPosition(
      function(p) {
        var lat = p.coords.latitude.toFixed(6);
        var lon = p.coords.longitude.toFixed(6);
        var acc = Math.round(p.coords.accuracy);
        setGpsAcc(acc);
        var coords = lat + ", " + lon;
        fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lon + "&accept-language=de&zoom=18")
          .then(function(r){ return r.json(); })
          .then(function(d){
            var a = d.address || {}; var parts = [];
            if (a.road) parts.push(a.road + (a.house_number ? " " + a.house_number : ""));
            if (a.neighbourhood || a.suburb) parts.push(a.neighbourhood || a.suburb);
            if (a.postcode) parts.push(a.postcode);
            if (a.city || a.town || a.village || a.municipality) parts.push(a.city || a.town || a.village || a.municipality);
            if (a.country_code) parts.push((a.country_code + "").toUpperCase());
            var txt = (parts.length ? parts.join(", ") + " | " : "") + coords;
            onChange(txt); setCv(txt); setCustom(true); setGps(false);
          })
          .catch(function(){
            onChange(coords); setCv(coords); setCustom(true); setGps(false);
          });
      },
      function(e){ setGps(false); alert("GPS: " + e.message); },
      { enableHighAccuracy:true, timeout:15000, maximumAge:0 }
    );
  }
  var coordsFromValue = isCustom && value && value.includes("|") ? value.split("|").pop().trim() : (isCustom ? value : "");
  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
        {LOCS.map(function(l){
          return (
            <button key={l.id} type="button" className={"tile-btn" + (value === l.id ? " active" : "")}
              onClick={function(){ onChange(l.id); setCustom(false); setCv(""); setGpsAcc(null); }}>
              {l.name}
            </button>
          );
        })}
        <button type="button" className={"tile-btn" + ((custom || isCustom) ? " active" : "")}
          style={{ gridColumn:"1 / -1" }}
          onClick={function(){ setCustom(true); }}>
          ✎ Eigener Standort
        </button>
      </div>
      {(custom || isCustom) && (
        <input className="input-dark" style={{ marginTop:10 }}
          value={cv || (isCustom ? value : "")}
          placeholder="Adresse oder Beschreibung..."
          onChange={function(e){ setCv(e.target.value); onChange(e.target.value); }}
        />
      )}
      <button type="button" className="gps-btn" disabled={gps} onClick={detectGPS}>
        {gps ? "⏳ Ermittle Standort..." : "📍 GPS — Aktuellen Standort verwenden"}
      </button>
      {gpsAcc !== null && (
        <div style={{ marginTop:6, fontSize:12, fontWeight:700,
          color: gpsAcc <= 50 ? "#22c55e" : gpsAcc <= 200 ? "#ffa500" : "#ef4444" }}>
          {gpsAcc <= 50 ? "✓ Genau" : gpsAcc <= 200 ? "⚠ Mittel" : "✕ Ungenau"} — ±{gpsAcc}m
          {coordsFromValue && (
            <a href={"https://maps.google.com/?q="+coordsFromValue}
              target="_blank" rel="noreferrer"
              style={{ marginLeft:10, color:"#60a5fa", textDecoration:"none", fontWeight:700 }}>
              📌 Google Maps
            </a>
          )}
        </div>
      )}
    </div>
  );
}

// === REPORT FORM ===
function ReportForm({ user, onSent }) {
  var _loc = useState(""); var loc = _loc[0]; var setLoc = _loc[1];
  var _fk  = useState(null); var fk = _fk[0]; var setFk = _fk[1];
  var _urg = useState(""); var urg = _urg[0]; var setUrg = _urg[1];
  var _dsc = useState(""); var dsc = _dsc[0]; var setDsc = _dsc[1];
  var _nm  = useState(user.name || ""); var nm = _nm[0]; var setNm = _nm[1];
  var _ph  = useState([]); var ph = _ph[0]; var setPh = _ph[1];
  var _snd = useState(false); var snd = _snd[0]; var setSnd = _snd[1];
  var photoRef = useRef(null);

  var locV = (typeof loc === "string" ? loc : "").trim();
  var fkV  = fk && (fk.nummer || fk.plate || fk.id);
  var ok   = !!(locV && fkV && urg && dsc.trim() && nm.trim());

  var missing = [];
  if (!fkV)       missing.push("Stapler-Nr.");
  if (!locV)      missing.push("Standort");
  if (!urg)       missing.push("Dringlichkeit");
  if (!dsc.trim()) missing.push("Beschreibung");
  if (!nm.trim()) missing.push("Name");

  function onFiles(e) {
    var files = Array.from(e.target.files || []);
    Promise.all(files.map(function(f){
      return new Promise(function(res){ var r = new FileReader(); r.onload = function(ev){ res(ev.target.result); }; r.readAsDataURL(f); });
    })).then(function(rs){ setPh(ph.concat(rs)); });
    e.target.value = "";
  }

  function submit() {
    if (!ok || snd) return;
    setSnd(true);
    var id = "ST" + Date.now();
    var locPreset = LOCS.find(function(l){ return l.id === loc; });
    var locFinal = locPreset ? locPreset.name : locV;
    var plate = fk ? (fk.nummer || fk.plate || fk.id || "") : "";
    compressAll(ph).then(function(compressed){ return uploadAll(compressed, id); }).then(function(photoUrls){
      return sbPost("alerts", {
        id:id, type: urg === "urgent" ? "breakdown" : "other",
        plate:plate, location:locFinal, description:dsc,
        urgency: urg === "urgent" ? "urgent" : "normal",
        sender:nm, sender_app:"stapler", status:"open",
        photo_urls: JSON.stringify(photoUrls)
      });
    }).then(function(){
      setSnd(false);
      onSent({ alertId:id, location:locFinal, forklift:fk, urg:urg, desc:dsc });
    }).catch(function(e){ alert("Fehler: " + (e.message || e)); setSnd(false); });
  }

  return (
    <div style={{ position:"relative", maxWidth:480, margin:"0 auto" }}>
      <Bg />
      <div style={{ position:"relative", zIndex:2, padding:"max(env(safe-area-inset-top),16px) 16px 100px" }}>

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <div>
            <Logo sm={true} />
            <div style={{ color:"#ffa500", fontSize:16, fontWeight:900, marginTop:2 }}>Stapler</div>
          </div>
          <UserPill name={user.name} />
        </div>

        <div style={{ fontSize:28, fontWeight:900, lineHeight:1.1, marginBottom:20 }}>
          🏗 Stapler <span style={{ color:"#ffa500" }}>Störung</span>
        </div>

        <div className="glass-panel">
          <div className="label-cap">🚜 STAPLER NUMMER</div>
          <div style={{ color:"rgba(255,255,255,0.55)", fontSize:12, marginBottom:10 }}>Dreistellige Nummer eingeben — Daten werden geladen</div>
          <StaplerInput onSelect={setFk} />
        </div>

        <div className="glass-panel">
          <div className="label-cap">🏭 STANDORT</div>
          <StandortPicker value={loc} onChange={setLoc} />
        </div>

        <div className="glass-panel">
          <div className="label-cap">⚡ DRINGLICHKEIT</div>
          <div className={"urg-row" + (urg === "urgent" ? " r" : "")} onClick={function(){ setUrg("urgent"); }}>
            <div className="urg-dot" style={{ background:"#ff3b30" }}></div>
            <span>🔴 DRINGEND — Arbeit steht still</span>
          </div>
          <div className={"urg-row" + (urg === "canwait" ? " o" : "")} onClick={function(){ setUrg("canwait"); }}>
            <div className="urg-dot" style={{ background:"#ffa500" }}></div>
            <span>🟡 Kann warten</span>
          </div>
        </div>

        <div className="glass-panel">
          <div className="label-cap">📝 PROBLEMBESCHREIBUNG *</div>
          <textarea className="textarea-dark" value={dsc}
            onChange={function(e){ setDsc(e.target.value); }}
            placeholder="z.B. Stapler fährt nicht an, Hydraulik defekt..." />
        </div>

        <div className="glass-panel">
          <div className="label-cap">👤 IHR NAME / KONTAKT *</div>
          <input className="input-dark" value={nm}
            onChange={function(e){ setNm(e.target.value); }}
            placeholder="Name und Telefon" />
        </div>

        <div className="glass-panel">
          <div className="label-cap">📷 FOTO (optional)</div>
          <input ref={photoRef} type="file" accept="image/*" capture="environment" multiple style={{ display:"none" }} onChange={onFiles} />
          <button className="photo-box" type="button" onClick={function(){ if (photoRef.current) photoRef.current.click(); }}>
            📷 Foto aufnehmen
          </button>
          {ph.length > 0 && (
            <div className="photo-grid">
              {ph.map(function(src, i){
                return (
                  <div key={i} className="photo-thumb">
                    <img src={src} alt="" />
                    <button type="button" onClick={function(){ setPh(ph.filter(function(_,j){ return j !== i; })); }}>×</button>
                  </div>
                );
              })}
            </div>
          )}
        </div>

      </div>

      {/* Кнопка — вне скроллируемого контента, фиксирована снизу */}
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, zIndex:20, padding:"10px 16px calc(env(safe-area-inset-bottom) + 10px)", background:"linear-gradient(to bottom, transparent, rgba(10,23,48,0.97) 30%)" }}>
        {!ok && missing.length > 0 && (
          <div style={{ marginBottom:8, textAlign:"center", fontSize:11, color:"rgba(255,255,255,0.4)" }}>
            Noch: {missing.join(" · ")}
          </div>
        )}
        <button className={urg === "urgent" ? "btn-danger" : "btn-primary"} disabled={!ok || snd} onClick={submit}>
          {snd ? "Wird gesendet..." : (urg === "urgent" ? "🚨 NOTRUF MELDEN" : "STÖRUNG MELDEN")}
        </button>
      </div>
    </div>
  );
}

// === SENT SCREEN ===
function SentScreen({ sentData, onReset, onLogout }) {
  var _s = useState("open"); var st = _s[0]; var setSt = _s[1];
  var poll = useRef(null);
  useEffect(function(){
    poll.current = setInterval(function(){
      sbStatus(sentData.alertId).then(function(s){ setSt(s); if (s === "done") clearInterval(poll.current); });
    }, 10000);
    return function(){ clearInterval(poll.current); };
  }, [sentData.alertId]);

  var fk = sentData.forklift;
  var urgent = sentData.urg === "urgent";
  var si = st === "done"
    ? { text:"✅ Erledigt", color:"#22c55e", cls:"d" }
    : st === "inProgress"
    ? { text:"🔧 Mechaniker arbeitet daran...", color:"#f59e0b", cls:"p" }
    : { text:"⏳ Gesendet — warte auf Mechaniker...", color:"#60a5fa", cls:"w" };

  return (
    <div style={{ position:"relative", minHeight:"100vh", minHeight:"100dvh", maxWidth:480, margin:"0 auto" }}>
      <Bg />
      <div style={{ position:"relative", zIndex:2, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", padding:"24px 20px" }}>
        <div style={{ fontSize:80, marginBottom:16 }}>{urgent ? "🚨" : "✅"}</div>
        <div style={{ fontSize:26, fontWeight:900, marginBottom:8, color: urgent ? "#ef4444" : "#22c55e" }}>Gesendet!</div>
        <div style={{ color:"rgba(255,255,255,0.65)", marginBottom:24, textAlign:"center" }}>Werkstatt wurde benachrichtigt</div>
        <div className={"status-box " + si.cls} style={{ width:"100%", maxWidth:400 }}>
          <div style={{ fontSize:14, fontWeight:700, color:si.color }}>{si.text}</div>
        </div>
        <div className="glass-panel" style={{ width:"100%", maxWidth:400 }}>
          <div style={{ marginBottom:10 }}>
            <span style={{ padding:"4px 12px", borderRadius:999, fontSize:12, fontWeight:800,
              background: urgent ? "rgba(239,68,68,0.2)" : "rgba(255,165,0,0.15)",
              color: urgent ? "#ef4444" : "#ffa500",
              border:"1px solid " + (urgent ? "rgba(239,68,68,0.4)" : "rgba(255,165,0,0.4)") }}>
              {urgent ? "🔴 DRINGEND" : "🟡 Kann warten"}
            </span>
          </div>
          {fk && (
            <div style={{ fontWeight:800, fontSize:15, marginBottom:4 }}>
              🏗 Stapler {fk.nummer || fk.plate || ""}
              {fk.hersteller ? " · " + fk.hersteller : ""}
              {fk.model ? " " + fk.model : ""}
            </div>
          )}
          <div style={{ color:"rgba(255,255,255,0.6)", fontSize:13, marginBottom:6 }}>📍 {sentData.location}</div>
          <div style={{ fontSize:13, lineHeight:1.45 }}>{sentData.desc}</div>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:10, width:"100%", maxWidth:400 }}>
          <button className="btn-primary" onClick={onReset}>Neue Meldung</button>
          <button onClick={onLogout} style={{ border:0, background:"transparent", color:"rgba(255,255,255,0.5)", fontWeight:700, fontSize:13, padding:8 }}>← Abmelden</button>
        </div>
      </div>
    </div>
  );
}

// === ROOT ===
function App() {
  var _stg = useState("loading"); var stg = _stg[0]; var setStg = _stg[1];
  var _nm  = useState(""); var nm = _nm[0]; var setNm = _nm[1];
  var _usr = useState(null); var usr = _usr[0]; var setUsr = _usr[1];
  var _sd  = useState(null); var sd = _sd[0]; var setSd = _sd[1];

  useEffect(function(){
    try {
      var s = localStorage.getItem(SESSION_KEY);
      if (s) { var u = JSON.parse(s); if (u && u.name) { setNm(u.name); setUsr(u); setStg("slider"); return; } }
    } catch(e) {}
    setStg("register");
  }, []);

  if (stg === "loading") return <div className="scrn" style={{ alignItems:"center", justifyContent:"center" }}><Bg /><div style={{ position:"relative", zIndex:2 }}><Logo /></div></div>;

  if (stg === "register") return <ErsteAnmeldung onNext={function(n){ setNm(n); setStg("pin"); }} />;

  if (stg === "pin") return (
    <PinScreen onBack={function(){ setStg("register"); }}
      onOk={function(){
        var u = { id:"st_" + Date.now(), name:nm, avatar:nm.split(" ").map(function(w){ return w[0]||""; }).join("").slice(0,2).toUpperCase() };
        try { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); } catch(e) {}
        setUsr(u); setStg("slider");
      }}
    />
  );

  if (stg === "slider") return (
    <SliderScreen name={nm}
      onUnlock={function(){ setStg("form"); }}
      onChange={function(){ try { localStorage.removeItem(SESSION_KEY); } catch(e) {} setNm(""); setUsr(null); setStg("register"); }}
    />
  );

  if (stg === "form" && usr) return <ReportForm user={usr} onSent={function(d){ setSd(d); setStg("sent"); }} />;

  if (stg === "sent" && sd) return <SentScreen sentData={sd} onReset={function(){ setSd(null); setStg("form"); }} onLogout={function(){ setStg("slider"); }} />;

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
