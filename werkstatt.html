// ── Driver Inspection ─────────────────────────────────────────────
function DriverInspection({ user, vehicles, t }) {
  const [step, setStep] = useState("select"); // select | inspect | done
  const [selectedVehicle, setSelectedVehicle] = useState(null);
  const [checks, setChecks] = useState({
    tires:false, lights:false, brakes:false, body:false, documents:false
  });
  const [notes, setNotes] = useState("");
  const [defects, setDefects] = useState("");

  const items = [
    { k:"tires",     label:t.tires,     emoji:"🔄" },
    { k:"lights",    label:t.lights,    emoji:"💡" },
    { k:"brakes",    label:t.brakes,    emoji:"🛑" },
    { k:"body",      label:t.body,      emoji:"🚛" },
    { k:"documents", label:t.documents, emoji:"📋" },
  ];

  const allOk = Object.values(checks).every(Boolean);

  if (step === "done") {
    return (
      <div style={{ textAlign:"center", padding:"40px 20px" }}>
        <div style={{ fontSize:64, marginBottom:16 }}>
          {allOk && !defects ? "✅" : "⚠"}
        </div>
        <div style={{ fontSize:20, fontWeight:900, marginBottom:8 }}>
          {t.inspectionDone}
        </div>
        <div style={{ fontSize:14, color:C.gray500, marginBottom:20 }}>
          {allOk && !defects ? t.noDefects : t.defectsFound}
        </div>
        {defects ? (
          <Card style={{ textAlign:"left", marginBottom:20 }}>
            <div style={{ fontSize:13, color:C.gray300 }}>{defects}</div>
          </Card>
        ) : null}
        <button onClick={() => { setStep("select"); setChecks({tires:false,lights:false,brakes:false,body:false,documents:false}); setNotes(""); setDefects(""); }}
          style={{ background:C.orange, color:"#000", border:"none",
            borderRadius:10, padding:"12px 24px", fontWeight:800, cursor:"pointer" }}>
          {t.startInspection}
        </button>
      </div>
    );
  }

  if (step === "inspect") {
    return (
      <div>
        <button onClick={() => setStep("select")}
          style={{ background:"none", border:"none", color:C.gray500,
            cursor:"pointer", fontSize:13, marginBottom:16, padding:0 }}>
          {t.backBtn}
        </button>
        <div style={{ fontSize:18, fontWeight:800, marginBottom:4 }}>
          {t.driverInspection}
        </div>
        <div style={{ fontSize:13, color:C.gray500, marginBottom:20 }}>
          {selectedVehicle ? selectedVehicle.plate+" - "+selectedVehicle.brand : ""}
        </div>

        {items.map(item => (
          <button key={item.k} onClick={() => setChecks(c => ({...c, [item.k]:!c[item.k]}))}
            style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
              width:"100%", background: checks[item.k] ? C.green+"18" : C.surface,
              border:"1px solid "+(checks[item.k] ? C.green : C.border),
              borderRadius:12, padding:"16px 18px", marginBottom:10,
              cursor:"pointer" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <span style={{ fontSize:24 }}>{item.emoji}</span>
              <span style={{ fontWeight:600, fontSize:15, color:C.white }}>
                {item.label}
              </span>
            </div>
            <span style={{ fontSize:24 }}>
              {checks[item.k] ? "✅" : "⬜"}
            </span>
          </button>
        ))}

        <Card style={{ marginBottom:16 }}>
          <div style={{ fontSize:11, color:C.gray500, marginBottom:6,
            textTransform:"uppercase" }}>
            {t.inspectionNote}
          </div>
          <Textarea value={defects} onChange={e => setDefects(e.target.value)}
            placeholder={t.defectsFound+"..."} style={{ minHeight:60 }} />
        </Card>

        <button onClick={() => setStep("done")}
          style={{ width:"100%", background: allOk ? C.green : C.orange,
            color: allOk ? "#fff" : "#000", border:"none",
            borderRadius:10, padding:"14px 0", fontWeight:900,
            fontSize:15, cursor:"pointer" }}>
          {t.inspectionDone}
        </button>
      </div>
    );
  }

  return (
    <div>
      <div style={{ fontSize:20, fontWeight:800, color:C.white, marginBottom:20 }}>
        🔍 {t.driverInspection}
      </div>
      <div style={{ fontSize:13, color:C.gray500, marginBottom:20 }}>
        {t.selectUser}:
      </div>
      {vehicles.filter(v => v.type === "truck" || v.type === "semiTrailer").map(v => (
        <button key={v.id} onClick={() => { setSelectedVehicle(v); setStep("inspect"); }}
          style={{ display:"block", width:"100%", background:C.surface,
            border:"1px solid "+C.border, borderRadius:12,
            padding:"14px 16px", marginBottom:10, textAlign:"left",
            cursor:"pointer" }}>
          <div style={{ fontWeight:800, fontSize:15, color:C.white }}>{v.plate}</div>
          <div style={{ fontSize:12, color:C.gray500, marginTop:2 }}>{v.brand} - {v.year}</div>
        </button>
      ))}
    </div>
  );
}

// ── Archive ───────────────────────────────────────────────────────
function Archive({ jobs, user, t }) {
  const [search, setSearch]   = useState("");
  const [expanded, setExpanded] = useState(null);

  const visible = user.role === "mechanic"
    ? jobs.filter(j => j.mechanic === user.id || j.colleague === user.id)
    : jobs;

  const filtered = visible.filter(j =>
    (j.plate || "").toLowerCase().includes(search.toLowerCase()) ||
    (j.location || "").toLowerCase().includes(search.toLowerCase()) ||
    (j.description||"").toLowerCase().includes(search.toLowerCase()) ||
    (j.date||"").includes(search)
  );

  const getName = (id) => (USERS.find(u => u.id === id) || {}).name || id;

  const formatJobText = (j) => {
    const lines = [
      `📋 LTG Werkstatt — Auftrag ${j.id}`,
      "-------------------------",
      `🚛 Fahrzeug:  ${j.plate}`,
      `📍 Standort:  ${j.location}`,
      `📅 Datum:     ${j.date}`,
      `🔧 Arbeitstyp: ${j.workType}`,
      `👷 Mechaniker: ${getName(j.mechanic)}${j.colleague ? " + "+getName(j.colleague) : ""}`,
      j.description ? `📝 Beschreibung: ${j.description}` : "",
      j.workMin   ? `⏱ Arbeitszeit: ${formatMin(j.workMin)}` : "",
      j.travelToMin ? `🚗 Fahrzeit: ${formatMin((j.travelToMin||0)+(j.travelBackMin||0))}` : "",
      j.cost > 0  ? `💶 Kosten: ${j.cost.toFixed(2)} €` : "",
      j.partsType ? `📦 Teile: ${j.partsType}` : "",
      j.partsInvoice ? `🧾 Beleg-Nr: ${j.partsInvoice}` : "",
      `✅ Status: ${j.status}`,
      "-------------------------",
      `LTG Hockenheim`,
    ].filter(Boolean).join("\n");
    return lines;
  };

  const handleShare = function(j) {
    var text = formatJobText(j);
    if (navigator.share) {
      navigator.share({ title: "Auftrag " + j.plate + " - " + j.date, text: text })
        .catch(function(){});
    } else {
      navigator.clipboard.writeText(text);
      alert("Kopiert!");
    }
  };

  const handlePrint = (j) => {
    const win = window.open("", "_blank");
    if (!win) return;
    const tMin = (j.travelToMin||0)+(j.travelBackMin||0);
    const row = (label, val) =>
      "<div class='row'><span class='label'>" + label + "</span>"
      + "<span class='value'>" + val + "</span></div>";
    const rows = [];
    rows.push(row("Fahrzeug", j.plate + (j.vehicleType ? " (" + j.vehicleType + ")" : "")));
    rows.push(row("Standort", j.location || ""));
    rows.push(row("Datum", j.date || ""));
    rows.push(row("Arbeitstyp", j.workType || ""));
    rows.push(row(t.mechanic||"Mechaniker", getName(j.mechanic) + (j.colleague ? " + " + getName(j.colleague) : "")));
    if (j.description)   rows.push(row("Beschreibung", j.description));
    if (j.workMin > 0)   rows.push(row("Arbeitszeit", formatMin(j.workMin)));
    if (tMin > 0)        rows.push(row("Fahrzeit", formatMin(tMin)));
    if (j.cost > 0)      rows.push(row("Kosten", j.cost.toFixed(2) + " EUR"));
    if (j.partsType)     rows.push(row("Teile", j.partsType));
    if (j.partsInvoice)  rows.push(row("Beleg-Nr.", j.partsInvoice + (j.partsDate ? ' · '+j.partsDate : '')));
    if (j.partsSupplier) rows.push(row("Lieferant", j.partsSupplier));
    rows.push("<div class='row'><span class='label'>Status</span>"
      + "<span class='value'><span class='status'>" + j.status + "</span></span></div>");
    const css = [
      "body{font-family:Arial,sans-serif;padding:32px;max-width:600px;margin:0 auto;color:#1a1a1a}",
      "h2{color:#1e3a5f;border-bottom:3px solid #e2001a;padding-bottom:8px;margin-bottom:16px}",
      ".row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #eee}",
      ".label{color:#666;font-size:13px}",
      ".value{font-weight:600;font-size:14px}",
      ".status{background:#22c55e;color:#fff;padding:3px 10px;border-radius:20px;font-size:12px}",
      ".logo{font-size:26px;font-weight:900;color:#1e3a5f;letter-spacing:-1px;margin-bottom:4px}",

// ── GPS Location Picker ──────────────────────────────────────────
function LocationPicker({ value, onChange, placeholder, C }) {
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState(null);
  const [coords,  setCoords]  = useState(null);

  const colors = C || { surface:"#ffffff", border:"#d0dbe8", white:"#1a2332",
    red:"#ef4444", green:"#22c55e", gray500:"#64748b", blue:"#3b82f6",
    navyMid:"#1e4280", blueLt:"#2d5fa8" };

  const getLocation = function() {
    if (!navigator.geolocation) {
      setError("GPS: Bitte Standort manuell eingeben");
      return;
    }
    setLoading(true); setError(null);
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        var lat = pos.coords.latitude.toFixed(5);
        var lng = pos.coords.longitude.toFixed(5);
        setCoords({ lat: lat, lng: lng });
        fetch("https://nominatim.openstreetmap.org/reverse?lat="+lat+"&lon="+lng+"&format=json&accept-language=de",
          { headers: { "Accept-Language":"de", "User-Agent":"LTG-App/1.0" }})
          .then(function(r){ return r.json(); })
          .then(function(data) {
            var p = data.address || {};
            var parts = [p.road, p.suburb||p.quarter,
              p.town||p.city||p.village||p.county, p.postcode].filter(Boolean);
            onChange(parts.length ? parts.join(", ") : lat+", "+lng);
          })
          .catch(function(){ onChange(lat+", "+lng); })
          .then(function(){ setLoading(false); },
                function(){ setLoading(false); });
      },
      function(err) {
        var msg = err.message || "";
        if (msg.indexOf("permissions") !== -1 || msg.indexOf("disabled") !== -1 ||
            msg.indexOf("denied") !== -1) {
          setError("GPS: Bitte Standort manuell eingeben");
        } else {
          setError("GPS Fehler - bitte manuell eingeben");
        }
        setLoading(false);
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  };

  var openMaps = function() {
    if (coords) {
      window.open("https://www.google.com/maps?q="+coords.lat+","+coords.lng+"&zoom=16", "_blank");
    }
  };

  return (
    <div>
      <div style={{ display:"flex", gap:8 }}>
        <input value={value} onChange={function(e){ onChange(e.target.value); }}
          placeholder={placeholder || "Standort eingeben..."}
          style={{ flex:1, background:colors.surface, border:"1px solid "+colors.border,
            borderRadius:10, padding:"12px 14px", color:colors.white,
            fontSize:14, outline:"none", fontFamily:"inherit",
            boxSizing:"border-box" }} />
        <button onClick={getLocation} disabled={loading}
          style={{ background:loading ? colors.navyMid : colors.blue, border:"none",
            borderRadius:10, padding:"0 16px",
            cursor:loading ? "not-allowed" : "pointer",
            fontSize:20, color:"#fff", flexShrink:0,
            opacity:loading ? 0.6 : 1, minWidth:52 }}>
          {loading ? "..." : "📍"}
        </button>
        {coords && (
          <button onClick={openMaps}
            style={{ background:colors.surface, border:"1px solid "+colors.border,
              borderRadius:10, padding:"0 14px", cursor:"pointer",
              fontSize:20, flexShrink:0 }}>
            🗺
          </button>
        )}
      </div>
      {error && (
        <div style={{ fontSize:11, color:colors.gray500, marginTop:5, fontStyle:"italic" }}>
          {error}
        </div>
      )}
      {coords && (
        <div style={{ fontSize:11, color:colors.gray500, marginTop:5 }}>
          📍 {coords.lat}, {coords.lng}
          <button onClick={openMaps}
            style={{ background:"none", border:"none", color:colors.blueLt,
              cursor:"pointer", fontSize:11, padding:"0 4px",
              textDecoration:"underline" }}>
            Google Maps
          </button>
        </div>
      )}
    </div>
  );
}

function JensMelden({ jobs, vehicles, setJobs, t }) {
  const [sent, setSent]     = useState(false);

  const [form, setForm] = useState({
    vehicleType:"", plate:"", location:"", description:"",
    urgency:"", type:"", photos:[],
  });

  const VEHICLE_OPTIONS = [
    ...vehicles.map(v => ({id:v.id, label:v.plate+" — "+v.brand, plate:v.plate})),
    {id:"custom", label:"✏ "+t.enterCustom, plate:""},
  ];
  const [customPlate, setCustomPlate] = useState("");
  const [showVehicles, setShowVehicles] = useState(false);

  const handlePhoto = (e) => {
    const files = Array.from(e.target.files);
    Promise.all(files.map(f => new Promise(res => {
      const r = new FileReader();
      r.onload = ev => res(ev.target.result);
      r.readAsDataURL(f);
    }))).then(results => setForm(f => ({...f, photos:[...f.photos,...results]})));
  };

    if (!canSend) return;
    setSending(true);
    var alertId = "J" + Date.now();
    sb.insert("alerts", {
      id: alertId,
      type: form.type || "other",
      plate: form.plate || null,
      location: form.location || "",
      description: form.description || "",
      urgency: form.urgency || "normal",
      sender: "jens",
      sender_app: "werkstatt",
      status: "open",
    }).catch(function(e){ console.error("jens melden:", e); });

    setSent(true);
  };

  if (sent) return (

      <div style={{ fontSize:64, marginBottom:12 }}>

        {t.meldenNotified}

          borderRadius:12, padding:"14px 0", fontWeight:900,

  return (

          </button>

// -- Incoming Alerts (Eingang) for mechanics --
function IncomingAlerts({ alerts, t, onCreateJob, C }) {
  var openAlerts = (alerts||[]).filter(function(a){ return a.status !== "done"; });
  var appLabel = function(app) {
    if (app === "fahrer") return t.fromDriver || "von Fahrer";
    if (app === "stapler") return t.fromStapler || "von Stapler";
    if (app === "werkstatt") return t.fromFPL || "von Jens";
    return app || "";
  };
  var urgColor = function(u) { return u === "urgent" ? C.red : C.yellow; };
  return (
    <div>
      <div style={{ fontSize:16, fontWeight:800, marginBottom:16 }}>
        {t.incomingTab||"Eingang"}
        {openAlerts.length > 0 && (
          <span style={{ marginLeft:8, background:C.red, color:"#fff",
            borderRadius:20, padding:"2px 8px", fontSize:12, fontWeight:700 }}>
            {openAlerts.length}
          </span>
        )}
      </div>
      {openAlerts.length === 0 ? (
        <div style={{ textAlign:"center" }}>
          <div style={{ color:C.gray500, padding:"30px 0 16px", fontSize:14 }}>
            {t.noAlerts||"Keine neuen Meldungen"}
          </div>
          <button onClick={function(){ loadAlerts(); }}
            style={{ background:C.surface, border:"1px solid "+C.border,
              borderRadius:8, padding:"8px 16px", color:C.gray300,
              cursor:"pointer", fontSize:12, fontWeight:700 }}>
            Aktualisieren
          </button>
        </div>
      ) : openAlerts.map(function(a) {
        return (
          <div key={a.id} style={{ background:C.surface,
            border:"1px solid " + (a.urgency==="urgent" ? C.red : C.border),
            borderLeft:"4px solid " + urgColor(a.urgency),
            borderRadius:10, padding:"14px 16px", marginBottom:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between",
              alignItems:"flex-start", marginBottom:8 }}>
              <div>
                <span style={{ fontWeight:700, fontSize:14, color:C.white }}>
                  {a.urgency === "urgent" ? "🔴 " : "🟡 "}
                  {a.plate || a.type || "Meldung"}
                </span>
                <span style={{ marginLeft:8, fontSize:11, color:C.gray500 }}>
                  {appLabel(a.senderApp)}
                </span>
              </div>
              <span style={{ fontSize:11, color:C.gray500 }}>
                {a.createdAt ? new Date(a.createdAt).toLocaleTimeString("de-DE",
                  {hour:"2-digit",minute:"2-digit"}) : ""}
              </span>
            </div>
            {a.location && (
              <div style={{ fontSize:13, color:C.gray300, marginBottom:4 }}>
                📍 {a.location}
              </div>
            )}
            {a.description && (
              <div style={{ fontSize:13, color:C.gray300, marginBottom:12 }}>
                {a.description}
              </div>
            )}
            <button onClick={function(){ onCreateJob(a); }}
              style={{ width:"100%", background:C.blue, color:"#fff",
                border:"none", borderRadius:8, padding:"10px 0",
                fontWeight:700, fontSize:13, cursor:"pointer" }}>
              + {t.createJobFrom||"Auftrag erstellen"}
            </button>
          </div>
        );
      })}
    </div>
  );
}

// -- Data mappers (Supabase snake_case -> app camelCase) --
function mapJob(r) {
  return {
    id: r.id, mechanic: r.mechanic, colleague: r.colleague,
    vehicleType: r.vehicle_type, plate: r.plate, location: r.location,
    workType: r.work_type, description: r.description, status: r.status,
    date: r.date, travelToMin: r.travel_to_min || 0,
    travelBackMin: r.travel_back_min || 0, workMin: r.work_min || 0,
    cost: parseFloat(r.cost) || 0, downtime: r.downtime || 0,
    partsType: r.parts_type, partsItems: r.parts_items,
    partsInvoice: r.parts_invoice, partsSupplier: r.parts_supplier,
    partsNote: r.parts_note, partsDate: r.parts_date,
    photos: r.photos || 0, photoUrls: r.photo_urls || [],
    createdAt: r.created_at,
  };
}
function mapVehicle(r) {
  return {
    id: r.id, plate: r.plate, brand: r.brand + (r.model ? " " + r.model : ""),
    type: r.type, year: r.year, mileage: r.mileage || 0,
    tuev: r.tuev, insurance: r.insurance, uvv: r.uvv,
    nextService: r.next_service, notes: r.notes || "",
  };
}
function mapStock(r) {
  return {
    id: r.id, name: r.name, category: r.category,
    quantity: r.quantity || 0, minQty: r.min_qty || 0,
    unit: r.unit || "Stk", location: r.location || "",
  };
}
function mapInvoice(r) {
  return {
    id: r.id, date: r.date, supplier: r.supplier,
    amount: parseFloat(r.amount) || 0, items: r.items || "",
    mechanic: r.mechanic, jobId: r.job_id, photo: r.photo_url,
  };
}

function App() {
  const [lang, setLang] = useState("de");
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState("new");
  const [prevTab, setPrevTab] = useState("new");
  const [jobs, setJobs] = useState([]);
  const [stock, setStock] = useState([]);
  const [invoices, setInvoices] = useState([]);
  const [vehicles, setVehicles] = useState([]);
  const [alerts, setAlerts] = useState([]);
  const [selectedVehicleId, setSelectedVehicleId] = useState(null);
  const [loading, setLoading] = useState(true);
  const [dbError, setDbError] = useState(null);
  const [prefillAlert, setPrefillAlert] = useState(null);
  const [formKey, setFormKey] = useState(0);
  const goTab = function(newTab) {
    setPrevTab(function(){ return tab; });
    setTab(newTab);
  };
  const [alertModal, setAlertModal] = useState(null);
  const [meldungenOpen, setMeldungenOpen] = useState(false);
  const [dbStatus, setDbStatus] = useState("loading");
  const t = T[lang];

  // Load all data from Supabase
  function loadAlerts() {
    sb.query("alerts", { select: "*", filter: "status=eq.open",
      order: "created_at.desc", limit: "50" })
      .then(function(a) {
        setDbStatus("ok");
        if (Array.isArray(a)) setAlerts(a.map(function(r){
          return { id:r.id, type:r.type, plate:r.plate, location:r.location,
            description:r.description, urgency:r.urgency, sender:r.sender,
            senderApp:r.sender_app, status:r.status, createdAt:r.created_at };
        }));
      }).catch(function(e){
        setDbStatus("error");
        console.error("loadAlerts error:", e);
      });
  }

  useEffect(function() {
    // Safety timeout - if Supabase hangs, show app after 6 seconds anyway
    var safetyTimer = setTimeout(function() {
      setLoading(false);
      setDbStatus("error");
    }, 6000);

    // Initial load
    Promise.all([
      sb.query("jobs",     { select: "*", order: "created_at.desc", limit: "200" }),
      sb.query("vehicles", { select: "*", order: "plate.asc" }),
      sb.query("stock",    { select: "*", order: "name.asc" }),
      sb.query("invoices", { select: "*", order: "created_at.desc", limit: "100" }),
    ]).then(function(results) {
      var j = results[0], v = results[1], s = results[2], inv = results[3];
      clearTimeout(safetyTimer);
      setDbStatus("ok");
      if (Array.isArray(j)) setJobs(j.map(mapJob));
      if (Array.isArray(v)) setVehicles(v.map(mapVehicle));
      if (Array.isArray(s)) setStock(s.map(mapStock));
      if (Array.isArray(inv)) setInvoices(inv.map(mapInvoice));
      setLoading(false);
    }).catch(function(e) {
      clearTimeout(safetyTimer);
      setDbStatus("error");
      setDbError("DB: " + (e.message || "Verbindungsfehler"));
      setLoading(false);
    });

    // Load alerts immediately
    loadAlerts();

    // Poll alerts every 15 seconds (reliable alternative to WebSocket)
    var alertTimer = setInterval(function() {
      loadAlerts();
      // Also refresh jobs every 30s
    }, 8000);

    // Poll jobs every 30 seconds
    var jobTimer = setInterval(function() {
      sb.query("jobs", { select: "*", order: "created_at.desc", limit: "200" })
        .then(function(j) {
          if (Array.isArray(j)) setJobs(j.map(mapJob));
        }).catch(function(){});
    }, 30000);

    return function() {
      clearInterval(alertTimer);
      clearInterval(jobTimer);
    };
  }, []);

  const LANG_FLAGS = { de:"🇩🇪" };

  // Loading screen
  if (loading) return (
    <div style={{ background: C.bg, minHeight: "100vh", display: "flex",
      flexDirection: "column", alignItems: "center", justifyContent: "center",
      fontFamily: "'DM Sans','Segoe UI',sans-serif", color: "#f1f5f9" }}>
      <div style={{ fontSize: 32, fontWeight: 900, color: "#f1f5f9",
        letterSpacing: "-1px", marginBottom: 8 }}>LTG</div>
      <div style={{ height: 3, width: 60, background: "#e2001a",
        borderRadius: 2, marginBottom: 24 }} />
      <div style={{ fontSize: 14, color: "#64748b", marginBottom: 24 }}>
        Verbinde mit Datenbank...
      </div>
      <div style={{ width: 40, height: 40, border: "3px solid #d0dbe8",
        borderTop: "3px solid #3b82f6", borderRadius: "50%",
        animation: "spin 1s linear infinite" }} />
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      {dbError && <div style={{ marginTop: 20, color: "#ef4444",
        fontSize: 13, textAlign: "center", maxWidth: 300 }}>{dbError}</div>}
    </div>
  );

  if (!user) return <LoginScreen onLogin={function(u) {
    setUser(u);
    setTab(u.role === "fpl" || u.role === "boss" ? "dashboard" : "new");
  }} lang={lang} setLang={setLang} alerts={alerts}
    onRefresh={function(){ loadAlerts(); }} />;

  const isViewer = user.role === "boss" || user.role === "fpl";
  const isMechanic = user.role === "mechanic";

  const tabs = user.role === "fpl"
    ? [{ k:"dashboard", icon:"📊", label:"Dashboard" }, { k:"melden", icon:"⚡", label:t.breakdown||"Melden" }, { k:"jobs", icon:"📋", label:t.myJobs }, { k:"fahrzeuge", icon:"🚛", label:t.vehicles }, { k:"lager", icon:"📦", label:t.lager }, { k:"archive", icon:"🗂", label:t.archive }]
    : isViewer
    ? [{ k:"dashboard", icon:"📊", label:"Dashboard" }, { k:"jobs", icon:"📋", label:t.myJobs }, { k:"fahrzeuge", icon:"🚛", label:t.vehicles }, { k:"lager", icon:"📦", label:t.lager }, { k:"archive", icon:"🗂", label:t.archive }]
    : [{ k:"new", icon:"+", label:t.newJob }, { k:"eingang", icon:"📥", label:t.incomingTab }, { k:"jobs", icon:"📋", label:t.myJobs }, { k:"fahrzeuge", icon:"🚛", label:t.vehicles }, { k:"lager", icon:"📦", label:t.lager }, { k:"archive", icon:"🗂", label:t.archive }];

  const activeTab = ((user.role === "boss" || user.role === "fpl") && tab === "new") ? "dashboard" : tab;

  return (
    <div style={{ fontFamily: "'DM Sans', 'Segoe UI', sans-serif", background: C.bg, minHeight: "100vh", color: C.white }}>
      {/* Header */}
      <div style={{ position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ height: 5, background: "linear-gradient(90deg, #1e4fa0 0%, #f5a623 40%, #f5a623 60%, #1e4fa0 100%)" }} />
        <div style={{ background: "#1e4fa0", borderBottom: "1px solid #1a3a8a", padding: "0 16px", height: 54, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ fontSize:14, fontWeight:900, color:"#f5a623", letterSpacing:"2px", fontStyle:"italic" }}>LTG</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {/* DB status dot */}
          <div title={dbStatus === "ok" ? "Supabase verbunden" : dbStatus === "error" ? "Supabase Fehler - kein Netzwerk" : "Verbinde..."}
            style={{ width:8, height:8, borderRadius:"50%",
              background: dbStatus==="ok" ? C.green : dbStatus==="error" ? C.red : C.yellow,
              flexShrink:0, cursor:"default" }} />

          {/* Meldungen button - boss/Jens */}
          {isViewer && (function() {
            var cnt = (alerts||[]).filter(function(a){ return a.status !== "done"; }).length;
            var hasUrgent = (alerts||[]).some(function(a){ return a.urgency === "urgent" && a.status !== "done"; });
            if (cnt === 0) return null;
            return (
              <button onClick={function(){ setMeldungenOpen(true); }}
                style={{ position:"relative", background:hasUrgent?"#ef4444":"#f5a623",
                  color:"#000", border:"none", borderRadius:8,
                  padding:"4px 10px", fontSize:12, fontWeight:800, cursor:"pointer" }}>
                {cnt} Meldung{cnt > 1 ? "en" : ""}
              </button>
            );
          })()}
          {/* Alert indicator for mechanics */}
          {isMechanic && (function() {
            var allOpen = (alerts||[]).filter(function(a){ return a.status !== "done"; });
            var hasUrgent = allOpen.some(function(a){ return a.urgency === "urgent"; });
            if (allOpen.length === 0) return null;
            return (
              <button onClick={function(){ setAlertModal(allOpen[0]); setPrevTab(tab); setTab("eingang"); }}
                style={{ background:hasUrgent?"#ef4444":"#f5a623", color:"#000", border:"none",
                  borderRadius:8, padding:"4px 10px", fontSize:12,
                  fontWeight:800, cursor:"pointer" }}>
                {hasUrgent?"🔴":"🟡"} {allOpen.length}
              </button>
            );
          })()}

          <button onClick={() => { setPrevTab(tab); setTab(prevTab); }}
            style={{ background: "rgba(255,255,255,0.15)", border: "1px solid rgba(255,255,255,0.3)", borderRadius: 8, padding: "8px 14px", color: "#fff", fontSize: 18, cursor: "pointer" }}
            title="Zurück">
            ←
          </button>
        </div>
        </div>
      </div>

      {/* DB connection error banner */}
      {dbStatus === "error" && (
        <div style={{ background:"#1a0808", borderBottom:"1px solid "+C.red+"44",

          <span style={{ fontSize:12, color:C.red, fontWeight:600 }}>

          <button onClick={function(){ loadAlerts(); }}
            style={{ background:"none", border:"1px solid "+C.red+"44",
              borderRadius:6, padding:"3px 10px", color:C.red,

      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: C.surfaceAlt, borderTop: `1px solid ${C.border}`, display: (user.role==="boss"||user.role==="fpl") ? "none" : "flex", zIndex: 100 }}>
        {tabs.map(({ k, icon, label }) => (
          <button key={k} onClick={() => { setPrevTab(tab); setTab(k); }} style={{ flex: 1, padding: "10px 0", background: "transparent", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
            <div style={{ position:"relative", fontSize: k === "new" ? 20 : 18, background: activeTab === k && k === "new" ? C.blue : "transparent", borderRadius: 10, width: 36, height: 36, display: "flex", alignItems: "center", justifyContent: "center", color: activeTab === k ? (k === "new" ? "#fff" : C.orange) : C.gray500, fontWeight: 800 }}>
              {icon}
              {k === "eingang" && (alerts||[]).filter(function(a){ return a.status !== "done"; }).length > 0 && (
                <span style={{ position:"absolute", top:0, right:0, background:C.red,
                  color:"#fff", borderRadius:"50%", width:16, height:16,
                  fontSize:9, fontWeight:900, display:"flex",
                  alignItems:"center", justifyContent:"center" }}>
                  {(alerts||[]).filter(function(a){ return a.status !== "done"; }).length}
                </span>
              )}
            </div>
            <div style={{ fontSize: 10, color: activeTab === k ? C.orange : C.gray500, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.3px" }}>{label}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
