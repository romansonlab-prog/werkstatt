<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>WerkFlow Werkstatt</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>

  <!-- === Sentry/Glitchtip Error Monitoring ===
       Активация: подставь DSN в SENTRY_DSN ниже (отдельный проект на каждое приложение).
       Без DSN — Sentry молча отключён, ничего не отправляет.
       Получить DSN: https://glitchtip.com (бесплатно, EU) или https://sentry.io (free до 5k/мес) -->
  <script src="https://browser.sentry-cdn.com/8.45.0/bundle.min.js" crossorigin="anonymous"></script>
  <script>
    (function(){
      var SENTRY_DSN = ""; // ← вставь DSN для werkstatt, пусто = выключено
      if (SENTRY_DSN && window.Sentry) {
        try {
          Sentry.init({
            dsn: SENTRY_DSN,
            release: "werkstatt@2026-05-13",
            environment: location.hostname.indexOf("localhost") >= 0 ? "dev" : "prod",
            tracesSampleRate: 0.0,
            beforeSend: function(event){
              if (event.exception && event.exception.values) {
                var msg = (event.exception.values[0]||{}).value || "";
                if (msg.indexOf("ResizeObserver") >= 0) return null;
                if (msg.indexOf("extension://") >= 0) return null;
              }
              return event;
            }
          });
        } catch(e){ console.warn("Sentry init failed:", e); }
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #ffa500;
      --accent-dark: #cc7a00;
      --accent-glow: rgba(255,165,0,0.35);
      --bg-base: #080e1a;
      --bg-card: rgba(13,25,52,0.85);
      --bg-input: rgba(6,15,38,0.9);
      --bg-elevated: rgba(18,35,70,0.9);
      --border: rgba(255,255,255,0.1);
      --border-active: rgba(255,165,0,0.6);
      --text-primary: #f0f4ff;
      --text-secondary: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.3);
      --green: #22c55e;
      --red: #ef4444;
      --blue: #60a5fa;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 18px;
      --radius-xl: 22px;
      --touch: 56px;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --transition: 150ms ease;
      --sp1: 8px; --sp2: 16px; --sp3: 24px; --sp4: 32px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; overscroll-behavior:none; }
    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height:100vh; min-height:100dvh;
    }
    #root { min-height:100vh; min-height:100dvh; }

    .bg-image {
      position:fixed; inset:0; z-index:0;
      background-color:#0a1730;
      background-image:
        linear-gradient(180deg, rgba(10,23,48,0.35) 0%, rgba(10,23,48,0.7) 60%, rgba(10,23,48,0.92) 100%),
        url("./bg-truck.png");
      background-size:cover;
      background-position:center center;
      background-repeat:no-repeat;
      pointer-events:none;
    }

    .scrn {
      position:relative; z-index:2; min-height:100vh; min-height:100dvh;
      padding:env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
      display:flex; flex-direction:column;
      max-width:480px; margin:0 auto; width:100%;
    }
    @media (min-width:481px) {
      body::before {
        content:""; position:fixed; inset:0; z-index:1;
        background:rgba(0,0,0,0.4); pointer-events:none;
      }
      .scrn { box-shadow:0 0 60px rgba(0,0,0,0.6); }
    }

    .fixed-bottom-bar {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:480px; z-index:5;
      padding:14px 16px calc(env(safe-area-inset-bottom) + 14px);
      background:linear-gradient(180deg, transparent, rgba(10,23,48,0.95) 30%);
    }

    button { font:inherit; color:inherit; cursor:pointer; }
    input, textarea, select { font:inherit; }
    textarea { resize:none; }
    ::placeholder { color:rgba(255,255,255,0.45); }

    .btn-primary {
      background:linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      color:#0a1730; border:none; border-radius:var(--radius-md);
      font-family:var(--font-display); font-weight:900; letter-spacing:1px;
      padding:20px; width:100%; min-height:var(--touch);
      box-shadow:0 8px 24px var(--accent-glow); font-size:17px;
      transition:all var(--transition);
    }
    .btn-primary:active { transform:scale(0.98); box-shadow:0 4px 12px var(--accent-glow); }
    .btn-primary:disabled { opacity:0.4; }

    .btn-back {
      width:48px; height:48px; border-radius:12px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.14);
      display:flex; align-items:center; justify-content:center;
      color:#ffa500;
    }

    .input-light {
      width:100%; padding:14px 14px 14px 44px;
      background:#fff; color:#0a1730;
      border:1px solid #e5e7eb; border-radius:12px;
      font-size:16px; outline:none;
    }
    .input-light:focus { border-color:#ffa500; }

    .keypad-btn {
      width:70px; height:70px; border-radius:50%;
      background:rgba(3,12,28,0.18);
      border:1.5px solid rgba(255,255,255,0.35);
      color:#fff; font-size:28px; font-weight:500;
      display:flex; align-items:center; justify-content:center;
    }
    .keypad-btn:active { background:rgba(255,255,255,0.10); }

    .pin-dot { width:14px; height:14px; border-radius:50%;
      background:rgba(255,255,255,0.20); transition:background 0.15s; }
    .pin-dot.filled { background:#ffa500; box-shadow:0 0 12px rgba(255,165,0,0.6); }
    .pin-dot.error { background:#ff3b30; }

    .slider-track {
      position:relative; height:78px; border-radius:18px;
      background:rgba(0,0,0,0.45);
      border:1px solid rgba(255,255,255,0.10);
      overflow:hidden;
    }
    .slider-thumb {
      position:absolute; top:6px; left:6px;
      width:66px; height:66px; border-radius:14px;
      background:linear-gradient(180deg,#ffa500,#ff8c00);
      box-shadow:0 0 20px rgba(255,165,0,0.7);
      display:flex; align-items:center; justify-content:center;
      touch-action:none; cursor:grab; user-select:none;
    }
    .slider-grip { display:flex; gap:4px; }
    .slider-grip span { width:3px; height:22px; background:#0a1730; border-radius:2px; }
    .slider-marks { position:absolute; inset:0; display:flex;
      align-items:center; justify-content:space-around; padding:0 90px 0 80px;
      pointer-events:none; }
    .slider-mark { width:2px; height:24px; background:rgba(255,255,255,0.2); border-radius:2px; }

    .slider-alerts { margin-top:20px; display:flex; flex-direction:column; gap:10px; }
    .slider-alert-urgent {
      display:flex; gap:12px; align-items:center;
      padding:12px 14px; border-radius:14px;
      background:rgba(90,20,33,0.72);
      border:1px solid rgba(255,59,48,0.55);
      backdrop-filter:blur(12px);
    }
    .slider-alert-normal {
      display:flex; gap:12px; align-items:center;
      padding:12px 14px; border-radius:14px;
      background:rgba(50,30,0,0.72);
      border:1px solid rgba(255,165,0,0.45);
      backdrop-filter:blur(12px);
    }

    .label-cap {
      font-family: var(--font-display);
      font-size:12px; font-weight:700; color:var(--text-secondary);
      letter-spacing:2px; text-transform:uppercase; margin-bottom:var(--sp1);
    }

    .input-dark {
      width:100%; padding:18px var(--sp2);
      background:var(--bg-input);
      border:1.5px solid var(--border);
      border-radius:var(--radius-md); color:var(--text-primary);
      outline:none; font-size:17px; font-family:var(--font-body);
      transition:border-color var(--transition), box-shadow var(--transition);
      min-height:var(--touch);
    }
    .input-dark:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-glow);
    }

    .select-dark {
      width:100%; padding:18px var(--sp2);
      background:var(--bg-input);
      border:1.5px solid var(--border);
      border-radius:var(--radius-md); color:var(--text-primary);
      outline:none; font-size:17px; font-family:var(--font-body);
      appearance:none; min-height:var(--touch);
      transition:border-color var(--transition);
    }
    .select-dark:focus { border-color:var(--accent); }

    .textarea-dark {
      width:100%; padding:18px var(--sp2);
      background:var(--bg-input);
      border:1.5px solid var(--border);
      border-radius:var(--radius-md); color:var(--text-primary);
      min-height:120px; outline:none; font-size:17px;
      font-family:var(--font-body); resize:none;
      transition:border-color var(--transition), box-shadow var(--transition);
    }
    .textarea-dark:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-glow);
    }

    .glass-panel {
      background:var(--bg-card);
      border:1px solid var(--border);
      border-radius:var(--radius-lg); padding:var(--sp2); margin-bottom:var(--sp2);
      backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    }
    .panel-title {
      display:flex; align-items:center; gap:10px; margin-bottom:var(--sp2);
      font-family:var(--font-display);
      font-size:15px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase;
      color:var(--text-primary);
    }

    .chips { display:flex; flex-wrap:wrap; gap:10px; }
    .chip {
      border:1.5px solid var(--border);
      background:var(--bg-input);
      color:var(--text-primary); border-radius:var(--radius-sm);
      padding:14px 20px; font-size:15px; font-weight:600;
      font-family:var(--font-body);
      transition:all var(--transition);
      min-height:var(--touch); display:flex; align-items:center;
    }
    .chip:active { transform:scale(0.97); }
    .chip.active {
      border-color:var(--accent); background:rgba(255,165,0,0.12);
      color:var(--accent); box-shadow:0 0 0 1px var(--accent);
    }

    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:var(--sp2); }

    .photo-box {
      border:2px dashed rgba(255,165,0,0.4); border-radius:var(--radius-md);
      padding:var(--sp3); text-align:center; color:var(--text-secondary);
      background:rgba(255,165,0,0.03); width:100%; font-weight:600;
      font-size:15px; display:flex; align-items:center; justify-content:center;
      gap:10px; min-height:72px; transition:background var(--transition);
    }
    .photo-box:active { background:rgba(255,165,0,0.08); }
    .photo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px; }
    .photo-thumb {
      position:relative; aspect-ratio:1/1; overflow:hidden;
      border-radius:var(--radius-sm); border:1px solid var(--border); background:#040d1e;
    }
    .photo-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .photo-thumb button {
      position:absolute; right:5px; top:5px;
      width:30px; height:30px; border:0; border-radius:50%;
      background:rgba(0,0,0,0.8); color:#fff; font-weight:800; font-size:15px;
    }

    .timer-card {
      border:1px solid var(--border);
      background:var(--bg-elevated); border-radius:var(--radius-md); padding:var(--sp2);
    }
    .timer-label {
      color:var(--text-muted); font-family:var(--font-display);
      font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px;
    }
    .timer-time {
      font-family:var(--font-mono);
      font-size:36px; font-weight:500; letter-spacing:-1px; margin-bottom:14px;
    }
    .mini-btn {
      padding:14px 18px; border-radius:var(--radius-sm); font-size:14px; font-weight:700;
      font-family:var(--font-display); letter-spacing:0.5px;
      border:1.5px solid var(--border); background:transparent; color:var(--text-primary);
      min-height:var(--touch); transition:all var(--transition);
    }
    .mini-btn:active { transform:scale(0.96); }
    .mini-btn.start { border-color:var(--green); color:var(--green); background:rgba(34,197,94,0.08); }
    .mini-btn.stop  { border-color:var(--red); color:var(--red); background:rgba(239,68,68,0.08); }
    .mini-btn.pause { border-color:var(--accent); color:var(--accent); background:rgba(255,165,0,0.08); }

    .alert-card {
      background:rgba(15,39,78,0.64); border:1px solid rgba(255,255,255,0.14);
      border-radius:16px; padding:16px; margin-bottom:12px; backdrop-filter:blur(10px);
    }
    .alert-card.urgent { background:rgba(70,15,25,0.72); border-color:rgba(255,59,48,0.55); }
    .badge {
      display:inline-block; padding:4px 10px; border-radius:999px;
      font-size:11px; font-weight:800; letter-spacing:0.5px;
    }
    .badge.red    { background:rgba(239,68,68,0.2);   color:#ef4444; border:1px solid rgba(239,68,68,0.4); }
    .badge.orange { background:rgba(255,165,0,0.15);  color:#ffa500; border:1px solid rgba(255,165,0,0.4); }
    .badge.green  { background:rgba(34,197,94,0.15);  color:#22c55e; border:1px solid rgba(34,197,94,0.4); }
    .badge.blue   { background:rgba(59,130,246,0.15); color:#60a5fa; border:1px solid rgba(59,130,246,0.4); }
    .badge.gray   { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.55); border:1px solid rgba(255,255,255,0.18); }

    .meta { font-size:12px; color:rgba(255,255,255,0.55); font-weight:500; }

    .save-btn {
      width:100%; padding:18px; border:none; border-radius:14px;
      background:linear-gradient(180deg,#ffa500,#ff8c00);
      color:#0a1730; font-size:17px; font-weight:800;
      box-shadow:0 8px 24px rgba(255,165,0,0.35);
      margin-top:6px; margin-bottom:20px;
    }
    .save-btn:disabled { opacity:0.5; }

    .outline-btn {
      width:100%; border:1.5px solid var(--border);
      background:var(--bg-elevated); color:var(--text-primary);
      border-radius:var(--radius-md);
      padding:18px; font-size:16px; font-weight:600;
      font-family:var(--font-body);
      display:flex; align-items:center; justify-content:center; gap:10px;
      min-height:var(--touch); transition:all var(--transition);
    }
    .outline-btn:active { transform:scale(0.98); border-color:var(--accent); }

    .page-title {
      font-family:var(--font-display);
      font-size:36px; font-weight:900; line-height:1;
      letter-spacing:-0.5px; margin:4px 0 var(--sp2);
      color:var(--text-primary);
    }

    .emergency-strip {
      margin-bottom:14px; padding:12px 14px; border-radius:15px;
      border:1px solid rgba(255,59,48,0.58); background:rgba(80,18,31,0.74);
      display:flex; align-items:center; gap:10px;
      backdrop-filter:blur(12px); cursor:pointer;
    }
    .emergency-count {
      margin-left:auto; min-width:28px; height:25px;
      border-radius:999px; background:#ff3b30; color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:800;
    }

    .user-pill {
      display:flex; align-items:center; gap:8px;
      border:1px solid rgba(255,255,255,0.13);
      background:rgba(12,36,76,0.62); padding:8px 10px;
      border-radius:14px; backdrop-filter:blur(12px);
    }
    .status-dot { width:8px; height:8px; border-radius:50%; background:#22c55e; }

    .nav-wrap {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:480px; z-index:20;
      background:rgba(8,14,28,0.98);
      border-top:1px solid rgba(255,255,255,0.07);
      padding:0 4px calc(env(safe-area-inset-bottom) + 4px);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    }
    .nav { display:flex; align-items:stretch; height:80px; }
    .nav-btn {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:4px; padding:8px 4px; border:none; background:transparent;
      color:var(--text-muted); font-size:10px; font-weight:700;
      font-family:var(--font-display); letter-spacing:1.5px; text-transform:uppercase;
      min-height:80px; transition:color var(--transition); position:relative;
    }
    .nav-btn.active { color:var(--accent); }
    .nav-btn:active { opacity:0.6; }
    .nav-btn svg { display:block; }
    .nav-btn.nav-center { flex:1.2; }
    .nav-btn.nav-center .nav-ico-wrap {
      width:52px; height:52px; border-radius:16px;
      background:rgba(255,165,0,0.1);
      border:1.5px solid rgba(255,165,0,0.2);
      display:flex; align-items:center; justify-content:center;
      transition:all var(--transition);
    }
    .nav-btn.nav-center.active .nav-ico-wrap {
      background:rgba(255,165,0,0.2);
      border-color:var(--accent);
      box-shadow:0 0 16px rgba(255,165,0,0.2);
    }
    .nav-badge {
      position:absolute; right:calc(50% - 20px); top:6px;
      background:#ef4444; color:#fff; border-radius:99px;
      font-size:10px; font-weight:800; min-width:18px; height:18px;
      display:flex; align-items:center; justify-content:center;
      padding:0 4px; border:2px solid rgba(8,14,28,0.98);
    }

    .app-wrap {
      position:relative; z-index:2; max-width:480px; margin:0 auto;
      padding:0 16px calc(env(safe-area-inset-bottom) + 90px);
      min-height:100vh; min-height:100dvh;
    }
    .app-top {
      padding:max(env(safe-area-inset-top),16px) 0 12px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }

    .modal-back {
      position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,0.65); display:flex;
      align-items:center; justify-content:center;
      padding:20px;
    }
    .modal {
      width:100%; max-width:440px; background:#0d1f3d;
      border:1px solid rgba(255,255,255,0.18);
      border-radius:22px;
      padding:24px 20px;
      box-shadow:0 20px 60px rgba(0,0,0,0.6);
      max-height:90vh; overflow-y:auto;
    }

    .dropdown-list {
      position:absolute; top:100%; left:0; right:0; margin-top:6px; padding:6px;
      background:#0d1f3d; border:1px solid rgba(255,165,0,0.5);
      border-radius:12px; box-shadow:0 16px 40px rgba(0,0,0,0.6);
      max-height:250px; overflow:auto; z-index:200;
    }
    .dropdown-item { padding:11px 13px; border-radius:8px; cursor:pointer; color:#fff; }
    .dropdown-item:active { background:rgba(255,165,0,0.18); color:#ffa500; }

    .white-card {
      margin-top:28px; background:#fff; color:#0a1730;
      border-radius:24px; padding:28px 24px;
      box-shadow:0 22px 60px rgba(0,0,0,0.45);
    }
    .light-label { color:#102d62; font-size:16px; font-weight:800; margin-bottom:10px; }
    .light-field { position:relative; margin-bottom:22px; }
    .light-field-icon {
      position:absolute; left:14px; top:50%; transform:translateY(-50%);
      color:#8a94a7; font-size:18px; pointer-events:none;
    }
    .blue-btn {
      width:100%; border:0; border-radius:13px; padding:17px;
      background:#082b66; color:#fff; font-size:17px; font-weight:800;
      display:flex; align-items:center; justify-content:center; gap:12px;
    }
    .blue-btn:disabled { opacity:0.5; }

    .powered { display:flex; align-items:center; gap:12px; margin-top:14px; }
    .powered-small { font-size:10px; font-weight:800; color:rgba(255,255,255,0.62); letter-spacing:1.9px; text-transform:uppercase; }
    .powered-line { width:1px; height:34px; background:rgba(255,255,255,0.42); }
    .powered-name { font-size:12px; line-height:1.35; font-weight:700; color:rgba(255,255,255,0.92); }

    .lager-row {
      display:flex; align-items:center; gap:10px; padding:12px 14px;
      border-radius:12px; background:rgba(9,27,58,0.74);
      border:1px solid rgba(255,255,255,0.1); margin-bottom:8px;
    }
    .lager-name { flex:1; font-weight:700; font-size:14px; }
    .lager-qty { font-size:20px; font-weight:800; color:#ffa500; min-width:32px; text-align:center; }
    .lager-unit { font-size:11px; color:rgba(255,255,255,0.55); margin-left:2px; }
    .lager-low { color:#ef4444; }

    .stock-select-row {
      display:flex; align-items:center; gap:8px; padding:10px 0;
      border-bottom:1px solid rgba(255,255,255,0.07);

// === parsePriceDE — корректно парсит немецкий формат чисел ===
// Примеры: "1.250,00" → 1250.00 | "50,99" → 50.99 | "1250" → 1250
// Поддерживает: точку как разделитель тысяч, запятую как десятичный
// Также корректно обрабатывает американский формат: "1,250.00" → 1250.00
function parsePriceDE(s) {
  if (s === null || s === undefined) return 0;
  if (typeof s === "number") return isFinite(s) ? s : 0;
  var str = String(s).trim().replace(/\s/g, "").replace(/€/g, "");
  if (!str) return 0;
  var hasComma = str.indexOf(",") !== -1;
  var hasDot = str.indexOf(".") !== -1;
  if (hasComma && hasDot) {
    // оба разделителя — последний из них является десятичным
    var lastComma = str.lastIndexOf(",");
    var lastDot = str.lastIndexOf(".");
    if (lastComma > lastDot) {
      // немецкий: "1.250,00" — точки = тысячи, запятая = десятичный
      str = str.replace(/\./g, "").replace(",", ".");
    } else {
      // американский: "1,250.00" — запятые = тысячи, точка = десятичный
      str = str.replace(/,/g, "");
    }
  } else if (hasComma) {
    // только запятая — десятичный разделитель: "50,99"
    str = str.replace(",", ".");
  }
  // только точка или ничего — оставляем как есть
  var n = parseFloat(str);
  return isFinite(n) ? n : 0;
}

function dataUrlToBlob(dataUrl) {
  // Превращает "data:image/jpeg;base64,..." в Blob для отправки.
  try {
    var parts = dataUrl.split(",");
    var meta = parts[0] || "";
    var b64 = parts[1] || "";
    var mime = (meta.match(/data:([^;]+)/) || [])[1] || "image/jpeg";
    var bin = atob(b64);
    var len = bin.length;
    var bytes = new Uint8Array(len);
    for (var i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
    return new Blob([bytes], { type: mime });
  } catch(e) { return null; }
}

function compressPhoto(b64, maxWidth, quality) {
  maxWidth = maxWidth || 1200;
  quality = quality || 0.75;
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      var canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = function(){ resolve(b64); };
    img.src = b64;
  });
}
function compressAll(photos) {
  return Promise.all(photos.map(function(p){ return compressPhoto(p); }));
}
// === PhotoCapture & RemotePhotos ===
function PhotoCapture({ photos, setPhotos }) {
  var ref = useRef(null);
  function onFiles(e) {
    var files = Array.from(e.target.files || []);
    Promise.all(files.map(function(file) {
      return new Promise(function(resolve) {
        var r = new FileReader();
        r.onload = function(ev) {
          compressPhoto(ev.target.result).then(function(compressed){
            resolve({ file:file, base64:compressed });
          });
        };
        r.readAsDataURL(file);
      });
    })).then(function(arr) { setPhotos((photos || []).concat(arr)); });
    e.target.value = "";
  }
  return (
    <div>
      <input ref={ref} type="file" accept="image/*" capture="environment" multiple style={{ display:"none" }} onChange={onFiles} />
      <button className="photo-box" type="button" onClick={function(){ if (ref.current) ref.current.click(); }}>
        📷 Foto aufnehmen

      {photos.length > 0 && (
        <div className="photo-grid">

            return (
              <div className="photo-thumb" key={i}>
                <img src={p.base64} alt="" />
                <button type="button" onClick={function(){ setPhotos(photos.filter(function(_,idx){ return idx !== i; })); }}>×</button>
              </div>
            );
          })}
        </div>
      )}

  );
}

function TimerBox({ label, value, setValue, withPause }) {

  var _ss = useState(0); var sec = _ss[0]; var setSec = _ss[1];

  function start() { setActive(true); setPaused(false); }

  function stop() {
    setActive(false); setPaused(false);

function BarcodeScanner({ onDetected, onClose }) {
  var scannerRef = useRef(null);
  var scannerDivId = "quagga-scanner-" + useRef(Math.random().toString(36).slice(2)).current;

  useEffect(function(){
    if (!window.Quagga) { onClose(); return; }
    var divId = scannerDivId;
    var started = false;

    window.Quagga.init({
      inputStream: {
        type: "LiveStream",
        target: document.getElementById(divId),
        constraints: { facingMode: "environment", width: 300, height: 200 }
      },
      decoder: { readers: ["ean_reader","ean_8_reader","code_128_reader","code_39_reader","upc_reader"] },
      locate: true
    }, function(err){
      if (err) { console.warn("Quagga init error:", err); onClose(); return; }
      window.Quagga.start();
      started = true;
    });

    window.Quagga.onDetected(function(result){
      var code = result && result.codeResult && result.codeResult.code;
      if (code) {
        window.Quagga.stop();
        onDetected(code);
      }
    });

    return function(){
      if (started) { try { window.Quagga.stop(); } catch(e){} }
    };
  }, []);

  return (
    <div className="scanner-overlay" onClick={onClose}>
      <div style={{ textAlign:"center", marginBottom:16 }}>
        <div style={{ fontSize:18, fontWeight:800, color:"#fff", marginBottom:4 }}>📷 Barcode scannen</div>
        <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>Kamera auf Barcode richten</div>
      </div>
      <div className="scanner-viewport" onClick={function(e){ e.stopPropagation(); }}>
        <div id={scannerDivId} style={{ width:"100%", height:"100%" }}></div>
        <div className="scanner-line"></div>
      </div>
      <button type="button" onClick={onClose}
        style={{ marginTop:20, border:"1px solid rgba(255,255,255,0.3)", background:"transparent", color:"#fff", borderRadius:10, padding:"10px 28px", fontSize:14, fontWeight:700, cursor:"pointer" }}>
        Abbrechen
      </button>
    </div>
  );
}

// === StandortPicker — плитки как Arbeitstyp ===
function StandortPicker({ value, onChange, locations }) {
  var LOCS = (locations && locations.length) ? locations : LOCATIONS_FALLBACK;
  var _sc = useState(false); var custom = _sc[0]; var setCustom = _sc[1];

  var isCustom = value && !LOCS.includes(value);
  // Инициализируем customVal значением из value (если оно кастомное),
  // чтобы кнопка ✓ работала сразу без необходимости что-то печатать
  var _si = useState(isCustom ? value : ""); var customVal = _si[0]; var setCustomVal = _si[1];

  // Синхронизируем customVal с входящим value (например, при prefill из алерта)
  useEffect(function(){
    if (isCustom && value !== customVal) {
      setCustomVal(value);
    }
  }, [value]);

  function pick(l) {
    if (l === "__custom__") {
      setCustom(true);
      if (isCustom) setCustomVal(value);
    } else {
      onChange(l);
      setCustom(false);
    }
  }

  function confirmCustom() {
    var v = (customVal || "").trim();
    if (v) {
      onChange(v);
      setCustom(false);
    }
  }

  var allItems = LOCS.concat(["__custom__"]);

  return (
    <div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
        {allItems.map(function(l) {
          var isCustomBtn = l === "__custom__";
          var isActive = isCustomBtn ? (custom || isCustom) : value === l;
          return (
            <button key={l} type="button"
              onClick={function(){ pick(l); }}
              style={{
                padding:"10px 14px", borderRadius:999,
                border: isActive ? "1px solid #ffa500" : "1px solid rgba(255,255,255,0.18)",
                background: isActive ? "#ffa500" : "rgba(9,27,58,0.72)",
                color: isActive ? "#0a1730" : "#fff",
                fontSize:13, fontWeight:700,
                boxShadow: isActive ? "0 4px 14px rgba(255,165,0,0.3)" : "none"
              }}>
              {isCustomBtn ? (isCustom ? ("✎ " + value) : "✎ Eigener...") : l}
            </button>
          );
        })}
      </div>
      {(custom || isCustom) && (
        <div style={{ display:"flex", gap:8, marginTop:10 }}>
          <input
            className="input-dark"
            style={{ flex:1 }}
            value={customVal}
            placeholder="Eigenen Standort eingeben..."
            onChange={function(e){ setCustomVal(e.target.value); }}
            onBlur={confirmCustom}
          />
          <button type="button" className="mini-btn start" onClick={confirmCustom}>
            ✓
          </button>
        </div>
      )}
    </div>
  );
}

        }

// === Звук алерта (Web Audio API, без файлов) ===
function playAlertSound() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.18, 0.36].forEach(function(t) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = "sine";
      gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.15);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.15);
    });
  } catch(e) {}
}

// === EINGANG (с taken_by, Ablehnen, Zurückstellen) ===
function Eingang({ alerts, user, onCreate, onStatusChange, loading, onRefresh }) {
  var _sreason = useState(""); var reason = _sreason[0]; var setReason = _sreason[1];
  var _smodal = useState(null); var modal = _smodal[0]; var setModal = _smodal[1];
  var _sup = useState(false); var updating = _sup[0]; var setUpdating = _sup[1];

  var open = (alerts || []).filter(function(a) {
    return a.status !== "done" && a.status !== "rejected";
  });

  function handleAction(a, action) {
    setModal({ alert:a, action:action });
    setReason("");
  }

  function confirmAction() {
    var a = modal.alert;
    var action = modal.action;
    if ((action === "reject" || action === "defer") && !reason.trim()) {
      alert("Bitte Grund angeben.");
      return;
    }
    setUpdating(true);
    var patch = {};
    if (action === "take") {
      patch = { taken_by: user.id, taken_by_name: user.name };
    } else if (action === "reject") {
      patch = { status:"rejected", reject_reason: reason };
    } else if (action === "defer") {
      patch = { status:"pending", reject_reason: reason };
    }
    sbPatch("alerts", a.id, patch)
      .then(function() { setUpdating(false); setModal(null); onRefresh(); })
      .catch(function(e) { alert("Fehler: " + e.message); setUpdating(false); });
  }

  function doCreate(a) {
    // При создании заказа — блокируем алерт для других
    sbPatch("alerts", a.id, { taken_by: user.id, taken_by_name: user.name })
      .catch(function(){});
    onCreate(a);
  }

  return (
    <div>
      <div className="page-title">Ein<span style={{ color:"#ffa500" }}>gang</span></div>
      <button className="outline-btn" type="button" style={{ marginBottom:14, padding:13 }} onClick={onRefresh}>
        {loading ? "Lädt..." : "↻ Aktualisieren"}
      </button>
      {open.length === 0 && (
        <div className="glass-panel" style={{ textAlign:"center", color:"rgba(255,255,255,0.55)", padding:32 }}>
          ✅ Keine neuen Meldungen
        </div>
      )}
      {open.map(function(a) {
        var urgent = (a.urgency || "").includes("urgent") || (a.type || "").includes("accident");
        var takenByMe = a.taken_by === user.id;
        var takenByOther = a.taken_by && a.taken_by !== user.id;
        var isPending = a.status === "pending";
        return (
          <div key={a.id} className={"alert-card" + (urgent ? " urgent" : "") + (takenByOther ? "" : "")}
            style={{ opacity: takenByOther ? 0.55 : 1 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:8 }}>
              <span className={urgent ? "badge red" : (isPending ? "badge gray" : "badge orange")}>
                {urgent ? "🚨 DRINGEND" : isPending ? "⏸ ZURÜCKGESTELLT" : "⚠️ MELDUNG"}
              </span>
              <strong style={{ fontSize:17 }}>{a.plate || "Ohne Kennzeichen"}</strong>
              {takenByMe && <span className="badge green">✓ Ich</span>}
              {takenByOther && <span className="badge gray">🔒 {a.taken_by_name || a.taken_by}</span>}
            </div>
            <div className="meta">
              von {a.sender_app === "stapler" ? "Stapler" : "Fahrer"} · {a.created_at ? timeHM(a.created_at) : ""} · {a.sender || ""}
            </div>
            <div className="meta" style={{ marginTop:6 }}>📍 {a.location || "kein Standort"}</div>
            <div style={{ fontSize:14, lineHeight:1.45, marginTop:10, whiteSpace:"pre-wrap" }}>
              {a.description || a.note || "Keine Beschreibung"}
            </div>
            <RemotePhotos urls={a.photo_urls} />
            {a.reject_reason && (
              <div style={{ marginTop:8, fontSize:12, color:"rgba(255,165,0,0.7)", fontStyle:"italic" }}>
                Grund: {a.reject_reason}
              </div>
            )}

            {!takenByOther && (
              <div style={{ display:"flex", gap:8, marginTop:12, flexWrap:"wrap" }}>
                <button className="save-btn" type="button"
                  style={{ flex:2, marginTop:0, marginBottom:0, padding:14, fontSize:14 }}
                  onClick={function(){ doCreate(a); }}>
                  + Auftrag erstellen
                </button>
                <button type="button"
                  style={{ flex:1, padding:14, borderRadius:12, border:"1px solid rgba(255,165,0,0.4)", background:"transparent", color:"#ffa500", fontWeight:700, fontSize:13 }}
                  onClick={function(){ handleAction(a, "defer"); }}>
                  ⏸ Später
                </button>
                <button type="button"
                  style={{ flex:1, padding:14, borderRadius:12, border:"1px solid rgba(239,68,68,0.4)", background:"transparent", color:"#ef4444", fontWeight:700, fontSize:13 }}
                  onClick={function(){ handleAction(a, "reject"); }}>
                  ✕ Ablehnen
                </button>
              </div>
            )}
            {takenByOther && (
              <div style={{ marginTop:10, padding:"10px 14px", borderRadius:10, background:"rgba(255,255,255,0.05)", fontSize:13, color:"rgba(255,255,255,0.5)", textAlign:"center" }}>
                🔒 Übernommen von {a.taken_by_name || a.taken_by}
              </div>
            )}
          </div>
        );
      })}

      {modal && (
        <div className="modal-back" onClick={function(){ setModal(null); }}>
          <div className="modal" onClick={function(e){ e.stopPropagation(); }}>
            <div style={{ fontSize:18, fontWeight:800, marginBottom:8 }}>
              {modal.action === "reject" ? "✕ Ablehnen" : "⏸ Zurückstellen"}
            </div>
            <div style={{ fontSize:13, color:"rgba(255,255,255,0.6)", marginBottom:14 }}>
              {modal.alert.plate} · {modal.alert.description ? modal.alert.description.slice(0,60) : ""}
            </div>
            <div className="label-cap">Grund *</div>
            <textarea className="textarea-dark" value={reason}
              onChange={function(e){ setReason(e.target.value); }}
              placeholder={modal.action === "reject" ? "Warum abgelehnt?" : "Warum zurückgestellt?"}
              style={{ minHeight:80, marginBottom:14 }}
            />
            <div style={{ display:"flex", gap:10 }}>
              <button className="btn-primary" type="button" style={{ flex:1 }} disabled={updating} onClick={confirmAction}>
                {updating ? "..." : "Bestätigen"}
              </button>
              <button className="outline-btn" type="button" style={{ flex:1, padding:14 }} onClick={function(){ setModal(null); }}>
                Abbrechen
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// === MEINE AUFTRÄGE ===
function MeineAuftraege({ jobs, user, onRefresh, loading }) {
  var _spause = useState(null); var pauseTarget = _spause[0]; var setPauseTarget = _spause[1];
  var _sreason = useState(""); var reason = _sreason[0]; var setReason = _sreason[1];
  var _sup = useState(false); var updating = _sup[0]; var setUpdating = _sup[1];

  var myJobs = (jobs || [])
    .filter(function(j) { return j.mechanic === (user && user.id); })
    .filter(function(j) { return j.status !== "done"; });

  // Все заказы механика за сегодня (включая done) для экспорта
  var todayJobs = (jobs || []).filter(function(j) {
    return j.mechanic === (user && user.id) &&
      (j.date || (j.created_at || "").slice(0,10)) === todayIso();
  });

  function exportDay() {
    var date = todayIso();
    var totalMin = todayJobs.reduce(function(s,j){ return s + (j.work_min || 0); }, 0);
    var totalCost = todayJobs.reduce(function(s,j){ return s + (Number(j.cost) || 0); }, 0);
    var rows = todayJobs.map(function(j) {
      var statusDE = j.status === "done" ? "Fertig" : j.status === "inProgress" ? "In Arbeit" : j.status === "paused" ? "Pause" : "Neu";
      return "<tr>" +
        "<td>" + (j.plate || "—") + "</td>" +
        "<td>" + (labelFrom(WORK_TYPES, j.work_type) || "") + "</td>" +
        "<td>" + (j.location || "") + "</td>" +
        "<td>" + (j.description ? j.description.slice(0,80) : "") + "</td>" +
        "<td>" + fmtMin(j.work_min || 0) + "</td>" +
        "<td>" + fmtMin((j.travel_to_min||0)+(j.travel_back_min||0)) + "</td>" +
        "<td>" + (j.cost ? Number(j.cost).toFixed(2) + " €" : "—") + "</td>" +
        "<td style='color:" + (j.status === "done" ? "green" : "orange") + ";font-weight:bold'>" + statusDE + "</td>" +
        "</tr>";
    }).join("");
    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'>" +
      "<title>Tagesbericht " + date + "</title>" +
      "<style>body{font-family:Arial,sans-serif;padding:24px;color:#111;max-width:900px;margin:0 auto}" +
      "h1{color:#0a1730;margin-bottom:4px}h2{color:#555;font-size:14px;font-weight:normal;margin-bottom:20px}" +
      "table{width:100%;border-collapse:collapse;margin-bottom:20px}" +
      "td,th{padding:9px 11px;border-bottom:1px solid #e0e0e0;text-align:left;font-size:13px}" +
      "th{background:#0a1730;color:#fff;font-size:12px;letter-spacing:0.5px}" +
      "tr:nth-child(even){background:#f8f9fc}" +
      ".summary{display:flex;gap:24px;background:#f0f4ff;border-radius:12px;padding:16px 20px;margin-bottom:24px}" +
      ".sum-item{text-align:center}.sum-val{font-size:24px;font-weight:900;color:#0a1730}" +
      ".sum-lab{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}" +
      "</style></head><body>" +
      "<h1>WerkFlow — Tagesbericht</h1>" +
      "<h2>" + user.name + " · " + dateDMY(date) + "</h2>" +
      "<div class='summary'>" +
      "<div class='sum-item'><div class='sum-val'>" + todayJobs.length + "</div><div class='sum-lab'>Aufträge</div></div>" +
      "<div class='sum-item'><div class='sum-val'>" + fmtMin(totalMin) + "</div><div class='sum-lab'>Arbeitszeit</div></div>" +
      "<div class='sum-item'><div class='sum-val'>" + totalCost.toFixed(2) + " €</div><div class='sum-lab'>Gesamtkosten</div></div>" +
      "</div>" +
      "<table><thead><tr><th>Fahrzeug</th><th>Typ</th><th>Standort</th><th>Beschreibung</th><th>Arbeitszeit</th><th>Fahrzeit</th><th>Kosten</th><th>Status</th></tr></thead>" +
      "<tbody>" + rows + "</tbody></table></body></html>";

    var fileName = "Tagesbericht_" + user.name.replace(/ /g,"_") + "_" + date + ".html";

    // Web Share API — системный диалог "Поделиться" на мобильных
    if (navigator.share && navigator.canShare) {
      var blob = new Blob([html], { type:"text/html" });
      var file = new File([blob], fileName, { type:"text/html" });
      if (navigator.canShare({ files:[file] })) {
        navigator.share({
          title: "Tagesbericht " + user.name + " · " + dateDMY(date),
          text: "WerkFlow Tagesbericht: " + todayJobs.length + " Aufträge, " + fmtMin(totalMin) + ", " + totalCost.toFixed(2) + " €",
          files: [file]
        }).catch(function(e){
          if (e.name !== "AbortError") fallbackDownload(html, fileName);
        });
        return;
      }
    }
    // Fallback: обычное скачивание (десктоп или старые браузеры)
    fallbackDownload(html, fileName);
  }

  function fallbackDownload(html, fileName) {
    var blob = new Blob([html], { type:"text/html" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = fileName; a.click();
    URL.revokeObjectURL(url);
  }

  function changeStatus(job, newStatus, pauseNote) {
    setUpdating(true);
    var patch = { status:newStatus };
    if (pauseNote) patch.pause_note = pauseNote;
    if (newStatus === "done") patch.finished_at = new Date().toISOString();
    sbPatch("jobs", job.id, patch)
      .then(function() { setUpdating(false); if (onRefresh) onRefresh(); })
      .catch(function(e) { alert("Fehler: " + e.message); setUpdating(false); });
  }

  function confirmPause() {
    if (!reason.trim()) { alert("Bitte Grund angeben."); return; }
    changeStatus(pauseTarget, "paused", reason);
    setPauseTarget(null); setReason("");
  }

  function statusLabel(s) {
    if (s === "inProgress") return { text:"In Arbeit", cls:"green" };
    if (s === "paused")     return { text:"Pause",    cls:"orange" };
    return { text:"Neu", cls:"blue" };
  }

  return (
    <div>
      <div className="page-title">Meine <span style={{ color:"#ffa500" }}>Aufträge</span></div>
      <div style={{ display:"flex", gap:10, marginBottom:14 }}>
        <button className="outline-btn" type="button" style={{ padding:13 }} onClick={onRefresh}>
          {loading ? "Lädt..." : "↻ Aktualisieren"}
        </button>
        <button type="button" onClick={exportDay}
          style={{ flexShrink:0, padding:"13px 16px", borderRadius:12, border:"1px solid rgba(255,165,0,0.5)", background:"rgba(255,165,0,0.08)", color:"#ffa500", fontWeight:700, fontSize:13, whiteSpace:"nowrap" }}>
          📄 Tagesbericht
        </button>
      </div>
      {todayJobs.length > 0 && (
        <div style={{ marginBottom:12, padding:"10px 14px", borderRadius:12, background:"rgba(255,255,255,0.05)", fontSize:12, color:"rgba(255,255,255,0.55)", display:"flex", gap:16 }}>
          <span>Heute: {todayJobs.length} Aufträge</span>
          <span>⏱ {fmtMin(todayJobs.reduce(function(s,j){ return s + (j.work_min||0); },0))}</span>
          <span>💶 {todayJobs.reduce(function(s,j){ return s + (Number(j.cost)||0); },0).toFixed(2)} €</span>
        </div>
      )}
      {myJobs.length === 0 && (
        <div className="glass-panel" style={{ textAlign:"center", color:"rgba(255,255,255,0.55)", padding:32 }}>Keine offenen Aufträge</div>
      )}
      {myJobs.map(function(j) {
        var sl = statusLabel(j.status);
        var isNew    = j.status !== "inProgress" && j.status !== "paused";
        var isActive = j.status === "inProgress";
        var isPaused = j.status === "paused";
        return (
          <div key={j.id} className="alert-card">
            <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:8, marginBottom:8 }}>
              <div>
                <div style={{ fontSize:17, fontWeight:800 }}>{j.plate || "Ohne Kennzeichen"}</div>
                <div className="meta" style={{ marginTop:4 }}>📍 {j.location || "Werkstatt"} · {labelFrom(WORK_TYPES, j.work_type)}</div>
              </div>
              <span className={"badge " + sl.cls}>{sl.text}</span>
            </div>
            {j.description && <div style={{ fontSize:13, lineHeight:1.4, marginBottom:8, whiteSpace:"pre-wrap" }}>{j.description}</div>}
            {j.pause_note && (
              <div className="pause-reason-box">
                <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,165,0,0.8)", marginBottom:4 }}>PAUSE-GRUND</div>
                <div style={{ fontSize:13 }}>{j.pause_note}</div>
              </div>
            )}
            <div className="meta" style={{ marginTop:8 }}>⏱ {fmtMin(j.work_min || 0)} · Fahrt: {fmtMin((j.travel_to_min||0)+(j.travel_back_min||0))}</div>
            <div style={{ display:"flex", gap:8, marginTop:12, flexWrap:"wrap" }}>
              {isNew && <button className="mini-btn start" type="button" disabled={updating} onClick={function(){ changeStatus(j, "inProgress"); }}>▶ Starten</button>}
              {isActive && <button className="mini-btn pause" type="button" disabled={updating} onClick={function(){ setPauseTarget(j); setReason(""); }}>⏸ Pause</button>}
              {isPaused && <button className="mini-btn start" type="button" disabled={updating} onClick={function(){ changeStatus(j, "inProgress"); }}>▶ Weiter</button>}
              {(isActive || isPaused) && (
                <button className="mini-btn stop" type="button" disabled={updating}
                  onClick={function(){ if (window.confirm("Auftrag als erledigt markieren?")) changeStatus(j, "done"); }}>
                  ■ Fertig

            </div>
          </div>
        );
      })}

      {pauseTarget && (
        <div className="modal-back" onClick={function(){ setPauseTarget(null); }}>
          <div className="modal" onClick={function(e){ e.stopPropagation(); }}>
            <div style={{ fontSize:18, fontWeight:800, marginBottom:14 }}>⏸ Pause — Grund angeben</div>
            <div style={{ color:"rgba(255,255,255,0.65)", fontSize:13, marginBottom:10 }}>
              {pauseTarget.plate} · {labelFrom(WORK_TYPES, pauseTarget.work_type)}
            </div>
            <textarea className="textarea-dark" value={reason}
              onChange={function(e){ setReason(e.target.value); }}
              placeholder="Grund der Pause (z.B. Ersatzteil fehlt, Mittagspause...)"
              style={{ minHeight:80, marginBottom:14 }}
            />
            <div style={{ display:"flex", gap:10 }}>
              <button className="btn-primary" type="button" style={{ flex:1 }} onClick={confirmPause}>Bestätigen</button>
              <button className="outline-btn" type="button" style={{ flex:1, padding:14 }} onClick={function(){ setPauseTarget(null); }}>Abbrechen</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function AppShell({ user, onLogout }) {
  var _stab = useState("new"); var tab = _stab[0]; var setTab = _stab[1];
  var _sjobs = useState([]); var jobs = _sjobs[0]; var setJobs = _sjobs[1];
  var _salerts = useState([]); var alerts = _salerts[0]; var setAlerts = _salerts[1];
  var _svehicles = useState([]); var vehicles = _svehicles[0]; var setVehicles = _svehicles[1];
  var _sstock = useState([]); var stock = _sstock[0]; var setStock = _sstock[1];
  var _susers = useState([]); var dbUsers = _susers[0]; var setDbUsers = _susers[1];
  var _slocs = useState([]); var dbLocations = _slocs[0]; var setDbLocations = _slocs[1];
  var _sloading = useState(false); var loading = _sloading[0]; var setLoading = _sloading[1];
  var _sprefill = useState(null); var prefill = _sprefill[0]; var setPrefill = _sprefill[1];
  var _sdbOk = useState(null); var dbOk = _sdbOk[0]; var setDbOk = _sdbOk[1];
  var prevAlertCount = useRef(0);
  var wsRef = useRef(null);

  function loadAll() {
    setLoading(true);
    var nied = (user && user.niederlassung_id) ? user.niederlassung_id : "__none__";
    var stockQ = "select=*&niederlassung_id=eq." + encodeURIComponent(nied) + "&order=name.asc&limit=200";
    var locsQ  = "select=*&niederlassung_id=eq." + encodeURIComponent(nied) + "&order=sort_order.asc,name.asc";
    var alertsQ = "select=*&order=created_at.desc&limit=100";
    Promise.all([
      sbSelect("jobs","select=*&order=created_at.desc&limit=300"),
      sbSelect("alerts", alertsQ),
      sbSelect("vehicles","select=*&order=plate.asc&limit=500"),
      sbSelect("stock", stockQ),
      sbSelect("users","select=*"),
      sbSelect("niederlassung_locations", locsQ)
    ]).then(function(results) {
      setJobs(results[0]);
      var rawAlerts = results[1].map(function(a){ return Object.assign({},a,{photo_urls:normalizeUrls(a.photo_urls)}); });
      var myAlerts = rawAlerts.filter(function(a){
        return !a.target_workshop_niederlassung_id || a.target_workshop_niederlassung_id === nied;
      });
      var newOpen = myAlerts.filter(function(a){ return a.status !== "done" && a.status !== "rejected"; });
      if (newOpen.length > prevAlertCount.current && prevAlertCount.current >= 0) {
        playAlertSound();
      }
      prevAlertCount.current = newOpen.length;
      setAlerts(myAlerts);
      setVehicles(results[2]);
      setStock(results[3]);
      if (results[4] && results[4].length) setDbUsers(results[4]);
      if (results[5] && results[5].length) setDbLocations(results[5].map(function(l){ return l.name; }));
      setDbOk(true); setLoading(false);
    }).catch(function(e) {
      console.error(e); setDbOk(false); setLoading(false);
    });
  }

  // Realtime подписка на alerts (с heartbeat и переподключением)
  useEffect(function() {
    loadAll();

    var hbTimer = null;     // интервал отправки heartbeat
    var reconnectTimer = null;
    var refCounter = 1;
    var stopped = false;    // флаг чтобы при unmount не пытаться переподключиться

    function connect() {
      if (stopped) return;
      try {
        var wsUrl = SB_URL.replace("https://","wss://") + "/realtime/v1/websocket?apikey=" + SB_KEY + "&vsn=1.0.0";
        var ws = new WebSocket(wsUrl);
        wsRef.current = ws;

        ws.onopen = function() {
          // Подписываемся на alerts и jobs
          ws.send(JSON.stringify({ topic:"realtime:public:alerts", event:"phx_join", payload:{}, ref:String(refCounter++) }));
          ws.send(JSON.stringify({ topic:"realtime:public:jobs", event:"phx_join", payload:{}, ref:String(refCounter++) }));
          // Heartbeat каждые 25 сек
          if (hbTimer) clearInterval(hbTimer);
          hbTimer = setInterval(function(){
            try {
              if (ws.readyState === 1) {
                ws.send(JSON.stringify({ topic:"phoenix", event:"heartbeat", payload:{}, ref:String(refCounter++) }));
              }
            } catch(e) {}
          }, 25000);
        };

        ws.onmessage = function(e) {
          try {
            var msg = JSON.parse(e.data);
            if (msg.event === "INSERT" || msg.event === "UPDATE") {
              playAlertSound();
              loadAll();
            }
          } catch(err) {}
        };

        ws.onerror = function() {};

        ws.onclose = function() {
          if (hbTimer) { clearInterval(hbTimer); hbTimer = null; }
          // Автоматическое переподключение через 3 сек, если компонент ещё жив.
          if (!stopped) {
            if (reconnectTimer) clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(connect, 3000);
          }
        };
      } catch(e) {}
    }

    connect();

    // Fallback: polling каждые 30 сек на случай если WS совсем не работает
    var poll = setInterval(function() { loadAll(); }, 30000);

    return function() {
      stopped = true;
      clearInterval(poll);
      if (hbTimer) clearInterval(hbTimer);
      if (reconnectTimer) clearTimeout(reconnectTimer);
      try { if (wsRef.current) wsRef.current.close(); } catch(e) {}
    };
  }, []);

  // Ставка текущего механика
  var myRate = 0;
  var dbUser = dbUsers.find(function(u){ return u.id === user.id; });
  if (dbUser && dbUser.rate_per_hour) myRate = Number(dbUser.rate_per_hour) || 0;

  var openAlerts = alerts.filter(function(a) { return a.status !== "done" && a.status !== "rejected"; });

  function createFromAlert(a) {
    setPrefill(Object.assign({},a,{
      vehicle_type: a.vehicle_type || a.vehicleType || "truck",
      work_type:"emergency",
      photo_urls:normalizeUrls(a.photo_urls)
    }));
    setTab("new");
  }

  return (
    <div style={{ position:"relative", minHeight:"100vh", minHeight:"100dvh", maxWidth:480, margin:"0 auto" }}>
      <Bg />
      <div className="app-wrap">
        <div className="app-top">
          <div>
            <Logo small={true} />
            <div style={{ color:"#ffa500", fontSize:18, fontWeight:900, marginTop:2 }}>Werkstatt</div>
          </div>
          <div className="user-pill">
            <div className="status-dot" style={{ background: dbOk === false ? "#ff3b30" : dbOk === true ? "#22c55e" : "#ffa500" }}></div>
            <span style={{ fontSize:12, fontWeight:700 }}>{user.name}</span>
            <button type="button" onClick={onLogout} style={{ border:0, background:"rgba(255,255,255,0.08)", color:"#fff", padding:"5px 8px", borderRadius:9, fontSize:12, fontWeight:700 }}>↩</button>
          </div>
        </div>

        {openAlerts.length > 0 && (
          <div className="emergency-strip" onClick={function(){ setTab("eingang"); }}>
            <div style={{ fontSize:20 }}>🚨</div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontWeight:800, fontSize:14 }}>Neue Meldungen: {openAlerts.length}</div>
              <div className="meta" style={{ whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                {openAlerts[0].plate || ""}{openAlerts[0].description ? " · " + openAlerts[0].description.slice(0,40) : ""}
              </div>
            </div>
            <div className="emergency-count">{openAlerts.length}</div>
          </div>
        )}

        {tab === "new" && (
          <NewJob vehicles={vehicles} setVehicles={setVehicles}
            user={user} userRate={myRate}
            prefill={prefill}
            locations={dbLocations}
            dbUsers={dbUsers}
            stock={stock}
            onClear={function(){ setPrefill(null); }}
            onSaved={function(){ loadAll(); setTab("jobs"); }}
          />
        )}
        {tab === "eingang" && (
          <Eingang alerts={alerts} user={user} onCreate={createFromAlert} loading={loading} onRefresh={loadAll} />
        )}
        {tab === "jobs" && (
          <MeineAuftraege jobs={jobs} user={user} onRefresh={loadAll} loading={loading} />
        )}
        {tab === "lager" && (
          <Lager stock={stock} loading={loading} onRefresh={loadAll} />
        )}
        {tab === "du" && (
          <DUAuflieger user={user} vehicles={vehicles} onRefresh={loadAll} />
        )}
        {tab === "archiv" && (
          <Archiv jobs={jobs} user={user} />
        )}
        {tab === "settings" && (
          <Einstellungen stock={stock} jobs={jobs} user={user} loading={loading} onRefresh={loadAll} onLogout={onLogout} />
        )}
      </div>
      <BottomNav tab={tab} setTab={setTab} alertCount={openAlerts.length} />
    </div>
  );
}

  // Логин по персональному PIN — данные из public.users
  function loginPersonal(u){

      role: u.role, niederlassung_id: u.niederlassung_id, scope_level: u.scope_level,
      app_access: u.app_access||[], tenant_id: "ltg"
    };
    try { localStorage.setItem(SESSION_KEY, JSON.stringify(sessUser)); } catch(e) {}
    fetch(SB_URL+"/rest/v1/users?id=eq."+encodeURIComponent(u.id), {
      method:"PATCH",
      headers:{ "Content-Type":"application/json", "apikey":SB_KEY, "Authorization":"Bearer "+SB_KEY, "Prefer":"return=minimal" },
      body:JSON.stringify({ last_login: new Date().toISOString() })

    setUser(sessUser);
    setStage("slider");

  // Запись/обновление пользователя в public.users (по образцу fahrer.registerOrUpdateDriver)
  function registerOrUpdateUser(fullName, niedId, fallbackUserId) {
    if (!fullName) return;
    var avatar = fullName.trim().split(/\s+/).map(function(w){ return (w[0]||"").toUpperCase(); }).join("").slice(0,2);
    var nameLower = fullName.trim().toLowerCase();
    sbSelect("users", "select=id,name,niederlassung_id&active=eq.true").then(function(rows) {
      var existing = (rows || []).find(function(u) {
        return (u.name || "").trim().toLowerCase() === nameLower;
      });
      if (existing) {
        fetch(SB_URL+"/rest/v1/users?id=eq."+encodeURIComponent(existing.id), {
          method:"PATCH",
          headers:{ "Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal" },
          body:JSON.stringify({ last_login: new Date().toISOString(), active: true,
            niederlassung_id: niedId || existing.niederlassung_id || "hockenheim" })
        }).catch(function(){});
      } else {
        fetch(SB_URL+"/rest/v1/users", {
          method:"POST",
          headers:{ "Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal,resolution=merge-duplicates" },
          body:JSON.stringify({
            id: fallbackUserId, name: fullName, avatar: avatar,
            role: "mechaniker", tenant_id: "ltg",
            niederlassung_id: niedId || "hockenheim",
            scope_level: "niederlassung",
            active: true, app_access: ["werkstatt"],
            last_login: new Date().toISOString()
          })
        }).catch(function(){});
      }
    }).catch(function(){});
  }

  // Fallback PIN — старая логика: ввод имени, попытка распознать по локальному USERS
  function loginFallback(fullName, nied) {
    var niedId = nied || "hockenheim";
    var avatar = fullName.split(" ").map(function(w){ return w[0] || ""; }).join("").slice(0,2).toUpperCase() || "WK";
    var knownUser = USERS.find(function(u){ return fullName.toLowerCase().indexOf(u.id) !== -1; });
    var u = knownUser
      ? { id: knownUser.id, name: fullName, avatar: knownUser.avatar||avatar,
          role:"mechaniker", niederlassung_id: niedId, scope_level:"niederlassung",
          app_access:["werkstatt"], tenant_id:"ltg" }
      : { id:"wk_"+Date.now(), name:fullName, avatar:avatar,
          role:"mechaniker", niederlassung_id: niedId, scope_level:"niederlassung",
          app_access:["werkstatt"], tenant_id:"ltg" };
    try { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); } catch(e) {}
    registerOrUpdateUser(fullName, niedId, u.id);
    setSavedName(fullName);
    setUser(u);
    setStage("slider");
  }

  useEffect(function() {
    sbSelect("alerts","select=*&order=created_at.desc&limit=30")
      .then(function(a){ setAlerts(a.map(function(x){ return Object.assign({},x,{photo_urls:normalizeUrls(x.photo_urls)}); })); })
      .catch(function(){});

    sbSelect("users","active=eq.true&select=id,name,avatar,role,niederlassung_id,scope_level,pin,app_access").then(function(r){
      setDbUsers(r||[]);
    }).catch(function(){ setDbUsers([]); });
    sbSelect("app_settings","key=eq.werkstatt_fallback_pin&select=value").then(function(r){
      if (r && r.length && r[0].value) setFbPin(r[0].value);
    }).catch(function(){});

    try {
      var saved = localStorage.getItem(SESSION_KEY);
      if (saved) {
        var u = JSON.parse(saved);
        if (u && u.name) {
          // Старая сессия без niederlassung_id — форсим релогин
          if (!u.niederlassung_id) {
            try { localStorage.removeItem(SESSION_KEY); } catch(e2) {}
          } else {
            setSavedName(u.name);
            setUser(u);
            setStage("slider");
            return;
          }
        }
      }
    } catch(e) {}
    setStage("pin");
  }, []);

  if (stage === "loading") {
    return (
      <div className="scrn" style={{ alignItems:"center", justifyContent:"center" }}>
        <Bg />
        <div style={{ position:"relative", zIndex:2 }}><Logo /></div>
      </div>
    );
  }

  if (stage === "pin") {
    return (
      <PinScreen
        users={dbUsers}
        fallbackPin={fbPin}
        hideBack={true}
        onPersonal={loginPersonal}
        onFallback={function(){ setStage("register"); }}
      />
    );
  }

  // ErsteAnmeldung теперь только после fallback PIN
  if (stage === "register") {
    return (
      <ErsteAnmeldung onContinue={function(v, n, nied) {
        loginFallback(v + " " + n, nied);
      }} />
    );
  }

  if (stage === "slider") {
    return (
      <SliderScreen
        userName={savedName}
        alerts={alerts}
        onUnlock={function(){ setStage("app"); }}
        onChangeUser={function() {
          try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
          try { localStorage.removeItem(DRAFT_KEY); } catch(e) {}
          setSavedName(""); setUser(null); setStage("pin");
        }}
      />
    );
  }

  if (stage === "app" && user) {
    return (
      <AppShell
        user={user}
        onLogout={function() {
          setStage("slider");
        }}
      />
    );
  }

  return null;
}

// === ErrorBoundary — ловит падения React-компонентов и показывает экран вместо белого экрана ===
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, errorMsg: "" };
  }
  static getDerivedStateFromError(err) {
    return { hasError: true, errorMsg: (err && err.message) ? err.message : String(err) };
  }
  componentDidCatch(err, info) {
    console.error("App crash:", err, info);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement("div", {
        style: {
          minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
          background:"#0a0a0a", color:"#fff", padding:24, fontFamily:"system-ui,sans-serif"
        }
      },
        React.createElement("div", { style:{ maxWidth:400, textAlign:"center" } },
          React.createElement("div", { style:{ fontSize:48, marginBottom:16 } }, "⚠️"),
          React.createElement("div", { style:{ fontSize:20, fontWeight:700, marginBottom:8 } }, "Etwas ist schiefgelaufen"),
          React.createElement("div", { style:{ fontSize:13, color:"rgba(255,255,255,0.6)", marginBottom:20, wordBreak:"break-word" } }, this.state.errorMsg),
          React.createElement("button", {
            onClick: function(){ window.location.reload(); },
            style: {
              background:"#ffa500", color:"#000", border:"none", padding:"12px 24px",
              borderRadius:10, fontWeight:800, fontSize:14, cursor:"pointer"
            }
          }, "🔄 App neu laden")
        )
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
</script>
</body>
