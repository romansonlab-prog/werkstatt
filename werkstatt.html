function todayIso() { return new Date().toISOString().slice(0,10); }
function timeHM(x) {
  try { return new Date(x).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}); }
  catch(e) { return ""; }
}
function fmtMin(m) {
  m = parseInt(m || 0, 10) || 0;
  if (!m) return "0min";
  const h = Math.floor(m / 60);
  const mm = m % 60;
  return h ? h + "h " + mm + "min" : mm + "min";
}
function fmtSec(s) {
  s = parseInt(s || 0, 10) || 0;
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return h ? h + ":" + String(m).padStart(2,"0") + ":" + String(sec).padStart(2,"0") : String(m).padStart(2,"0") + ":" + String(sec).padStart(2,"0");
}
function labelFrom(list, value) {
  const row = list.find(x => x[0] === value);
  return row ? row[1] : value || "";
}
function normalizeUrls(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v.filter(Boolean);
  if (typeof v === "string") {
    try {
      const parsed = JSON.parse(v);
      return Array.isArray(parsed) ? parsed.filter(Boolean) : [];
    } catch(e) {
      return v ? [v] : [];
    }
  }
  return [];
}

const api = {
  async select(table, query) {
    const url = SUPABASE_URL + "/rest/v1/" + table + (query ? "?" + query : "");
    const res = await fetch(url, {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    });
    if (!res.ok) {
      console.warn("select failed", table, await res.text());
      return [];
    }
    const json = await res.json();
    return Array.isArray(json) ? json : [];
  },
  async insert(table, payload, returning=true) {
    const res = await fetch(SUPABASE_URL + "/rest/v1/" + table, {
      method:"POST",
      headers: {
        "Content-Type":"application/json",
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
        Prefer: returning ? "return=representation" : "return=minimal"
      },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(table + " insert failed: " + await res.text());
    if (!returning) return true;
    return await res.json();
  },
  async patch(table, id, payload) {
    const res = await fetch(SUPABASE_URL + "/rest/v1/" + table + "?id=eq." + encodeURIComponent(id), {
      method:"PATCH",
      headers: {
        "Content-Type":"application/json",
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
        Prefer:"return=minimal"
      },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(table + " patch failed: " + await res.text());
    return true;
  }

          return;
        }
      }
    } catch(e) {}
    setStage("register");
  }, []);

  useEffect(() => {
    if (stage === "slider" && trackRef.current) maxRef.current = trackRef.current.offsetWidth - 78;
  }, [stage]);

  function saveNameAndPinOk() {
    const name = (first.trim() + " " + last.trim()).trim() || "Werkstatt";
    const u = {
      id: name.toLowerCase().includes("petr") ? "petr" : "roman",
      name,
      avatar: name.split(" ").map(w => w[0] || "").join("").slice(0,2).toUpperCase() || "WK"
    };
    try { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); } catch(e) {}
    setStage("slider");
    setPin("");
  }

  function press(d) {
    if (pin.length >= 4) return;
    setErr(false);
    const next = pin + d;
    setPin(next);
    if (next.length === 4) {
      setTimeout(() => {
        if (next === APP_PIN) saveNameAndPinOk();
        else {
          setErr(true);
          setTimeout(() => { setPin(""); setErr(false); }, 650);
        }
      }, 120);
    }
  }

  function startSlide(clientX) {
    setDrag(true);
    const start = clientX;
    const oldX = x;
    let cur = oldX;

    function move(e) {
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      cur = Math.max(0, Math.min(maxRef.current, cx - start + oldX));
      setX(cur);
    }
    function up() {
      window.removeEventListener("mousemove", move);
      window.removeEventListener("touchmove", move);
      window.removeEventListener("mouseup", up);
      window.removeEventListener("touchend", up);
      setDrag(false);
      if (cur >= maxRef.current * .85) {
        setX(maxRef.current);
        setTimeout(() => {
          try {
            const saved = JSON.parse(localStorage.getItem(SESSION_KEY) || "{}");
            onLogin(saved && saved.name ? saved : {id:"roman", name:"Werkstatt", avatar:"WK"});
          } catch(e) {
            onLogin({id:"roman", name:"Werkstatt", avatar:"WK"});
          }
        }, 120);
      } else {
        setX(0);
      }
    }

    window.addEventListener("mousemove", move);
    window.addEventListener("touchmove", move, {passive:false});
    window.addEventListener("mouseup", up);
    window.addEventListener("touchend", up);
  }

  if (stage === "register") {
    const ok = first.trim() && last.trim();
    return (
      <div className="phone">
        <Bg/>
        <div className="screen" style={{paddingTop:54}}>
          <Logo/>
          <Powered/>
          <div className="role">Werkstatt</div>
          <div className="subtitle">Erste Anmeldung</div>
          <div className="white-card">
            <div className="light-label">Vorname <span style={{color:"#ff3b30"}}>*</span></div>
            <div className="light-field">
              <UserSvg/>
              <input className="light-input" value={first} onChange={e=>setFirst(e.target.value)} placeholder="Roman"/>
            </div>
            <div className="light-label">Nachname <span style={{color:"#ff3b30"}}>*</span></div>
            <div className="light-field">
              <UserSvg/>
              <input className="light-input" value={last} onChange={e=>setLast(e.target.value)} placeholder="Anokhin"/>
            </div>
            <button className="blue-btn" disabled={!ok} style={{opacity:ok?1:.55}} onClick={() => ok && setStage("pin")}>
              Weiter <span style={{fontSize:26}}>→</span>
            </button>
          </div>
        </div>
      </div>
    );
  }

  if (stage === "pin") {
    return (
      <div className="phone">
        <Bg/>
        <div className="screen" style={{paddingTop:70}}>
          <Logo/>
          <Powered/>
          <div className="role" style={{marginTop:42}}>Werkstatt</div>
          <div className="subtitle">PIN eingeben</div>
          <div className="pin-dots">
            {[0,1,2,3].map(i => <div key={i} className={"pin-dot " + (i < pin.length ? "filled " : "") + (err ? "error" : "")}></div>)}
          </div>
          <div className="keypad">
            {[1,2,3,4,5,6,7,8,9].map(d => <button key={d} className="key" onClick={() => press(String(d))}>{d}</button>)}
            <div></div>
            <button className="key" onClick={() => press("0")}>0</button>
            <button className="key" onClick={() => { setPin(pin.slice(0,-1)); setErr(false); }}>⌫</button>
          </div>
          <div style={{flex:1}}></div>
          <button className="outline-btn" disabled={pin.length !== 4} style={{opacity:pin.length===4?1:.55, marginBottom:30}} onClick={() => {
            if (pin === APP_PIN) saveNameAndPinOk();
            else { setErr(true); setTimeout(() => { setPin(""); setErr(false); }, 650); }
          }}>
            Anmelden <span style={{fontSize:24}}>→</span>
          </button>
        </div>
      </div>
    );
  }

  const openAlerts = (alerts || []).filter(a => a.status !== "done");
  return (
    <div className="phone">
      <Bg/>
      <div className="screen">
        <div style={{marginTop:"42vh"}}>
          <Logo/>
          <div className="role" style={{fontSize:34, marginTop:8}}>Werkstatt</div>
        </div>

        {openAlerts.length > 0 && (
          <div className="slider-alerts">
            <div className="subtitle" style={{fontSize:11, marginTop:0}}>Eingang · {openAlerts.length} Meldungen</div>
            {openAlerts.slice(0,3).map(a => (
              <div className="slider-alert" key={a.id}>
                <div style={{fontSize:22}}>🚨</div>
                <div className="text">
                  <div className="top">{(a.urgency || "").includes("urgent") ? "Sofortige Hilfe" : "Neue Meldung"} · {a.plate || "ohne Kennzeichen"}</div>
                  <div className="desc">{a.description || a.note || a.type || "Störung gemeldet"}</div>
                </div>
              </div>
            ))}
          </div>
        )}

        <div style={{flex:1}}></div>
        <div className="slider-track" ref={trackRef} style={{marginBottom:32}}>
          <div className="slider-marks">
            <div className="slider-mark"></div><div className="slider-mark"></div><div className="slider-mark"></div><div className="slider-mark"></div>
          </div>
          <div
            className="slider-thumb"
            style={{left:6+x, transition:drag ? "none" : "left .28s"}}
            onMouseDown={e => startSlide(e.clientX)}
            onTouchStart={e => startSlide(e.touches[0].clientX)}
          >
            <div className="grip"><span></span><span></span><span></span></div>
          </div>
        </div>
        <button style={{border:0, background:"transparent", color:"rgba(255,255,255,.6)", fontWeight:800, marginBottom:18}} onClick={() => {
          localStorage.removeItem(SESSION_KEY);
          setFirst("");
          setLast("");
          setStage("register");
        }}>Anderer Benutzer</button>
      </div>
    </div>
  );
}

function PhotoCapture({photos,setPhotos}) {
  const ref = useRef(null);
  function onFiles(e) {
    const files = Array.from(e.target.files || []);
    Promise.all(files.map(file => new Promise(resolve => {
      const r = new FileReader();
      r.onload = ev => resolve({file, base64:ev.target.result});
      r.readAsDataURL(file);
    }))).then(arr => setPhotos([...(photos || []), ...arr]));
    e.target.value = "";
  }
  return (
    <div>
      <input ref={ref} type="file" accept="image/*" capture="environment" multiple style={{display:"none"}} onChange={onFiles}/>
      <button className="camera-box" type="button" onClick={() => ref.current && ref.current.click()}>📷 Foto aufnehmen</button>
      {photos.length > 0 && (
        <div className="photo-grid">
          {photos.map((p,i) => (
            <div className="thumb" key={i}>
              <img src={p.base64} alt=""/>
              <button type="button" onClick={() => setPhotos(photos.filter((_,idx) => idx !== i))}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function RemotePhotos({urls}) {
  const list = normalizeUrls(urls);
  if (!list.length) return null;
  return (
    <div className="photo-grid">
      {list.slice(0,6).map((u,i) => (
        <a className="thumb" href={u} target="_blank" rel="noreferrer" key={i}>
          <img src={u} alt=""/>
        </a>
      ))}
    </div>
  );
}

function VehicleInput({vehicles,value,onChange,type}) {
  const [plate,setPlate] = useState(value && value.plate ? value.plate : "");
  const [brand,setBrand] = useState(value && value.brand ? value.brand : "");
  const [open,setOpen] = useState(false);

  useEffect(() => {
    setPlate(value && value.plate ? value.plate : "");
    setBrand(value && value.brand ? value.brand : "");
  }, [value && value.plate]);

  const filtered = (vehicles || [])
    .filter(v => !type || type === "other" || !v.type || v.type === type)
    .filter(v => ((v.plate || "") + " " + (v.brand || "")).toLowerCase().includes(plate.toLowerCase()))
    .slice(0,8);

  function commit(p=plate,b=brand) {
    const clean = (p || "").trim();
    if (!clean) {
      onChange(null);
      return;
    }
    const existing = (vehicles || []).find(v => (v.plate || "").toLowerCase() === clean.toLowerCase());
    if (existing) onChange({id:existing.id, plate:existing.plate, brand:existing.brand || "", type:existing.type || type, isNew:false});
    else onChange({plate:clean, brand:(b || "").trim(), type:type || "other", isNew:true});
  }

  return (
    <div style={{position:"relative"}}>
      <input className="input" value={plate} placeholder="Kennzeichen eingeben oder wählen" onFocus={() => setOpen(true)} onChange={e => { setPlate(e.target.value); setOpen(true); }} onBlur={() => setTimeout(() => { commit(); setOpen(false); }, 180)}/>
      {plate.trim() && <input className="input" style={{marginTop:8}} value={brand} placeholder="Marke / Modell optional" onChange={e => setBrand(e.target.value)} onBlur={() => commit()}/>}
      {open && (
        <div style={{position:"absolute", zIndex:50, top:50, left:0, right:0, background:"#0b1d3a", border:"1px solid rgba(255,165,0,.55)", borderRadius:12, padding:6, boxShadow:"0 18px 50px rgba(0,0,0,.55)", maxHeight:245, overflow:"auto"}}>
          {filtered.map(v => (
            <div key={v.id || v.plate} style={{padding:12, borderRadius:9}} onMouseDown={() => { setPlate(v.plate || ""); setBrand(v.brand || ""); onChange({id:v.id, plate:v.plate, brand:v.brand || "", type:v.type || type, isNew:false}); setOpen(false); }}>
              <div style={{fontWeight:950}}>{v.plate}</div>
              <div className="meta">{v.brand || labelFrom(VEHICLE_TYPES, v.type)}</div>
            </div>
          ))}
          {plate.trim() && !filtered.some(v => (v.plate || "").toLowerCase() === plate.toLowerCase()) && (
            <div style={{padding:12, color:"#ffa500", fontWeight:950}}>+ Neues Fahrzeug: {plate}</div>
          )}
        </div>
      )}
    </div>
  );
}

function TimerBox({label,value,setValue}) {
  const [active,setActive] = useState(false);
  const [sec,setSec] = useState(0);
  const [manual,setManual] = useState(false);
  const [h,setH] = useState("");
  const [m,setM] = useState("");

  useEffect(() => {
    if (!active) return;
    const id = setInterval(() => setSec(s => s + 1), 1000);
    return () => clearInterval(id);
  }, [active]);

  function stop() {
    setActive(false);
    const min = Math.max(1, Math.round(sec / 60));
    setValue((value || 0) + min);
    setSec(0);
  }

  function applyManual() {
    const hh = parseInt(h || "0", 10) || 0;
    const mm = parseInt(m || "0", 10) || 0;
    if (hh < 0 || mm < 0 || mm > 59) return alert("Ungültige Zeit.");
    const total = hh * 60 + mm;
    if (total > 24 * 60) return alert("Maximal 24 Stunden.");
    setValue(total);
    setManual(false);
    setH("");
    setM("");
  }

  return (
    <div className="timer-card">
      <div className="timer-label">{label}</div>
      <div className="timer-time" style={{color:active ? "#22c55e" : "#fff"}}>{active ? fmtSec(sec) : fmtMin(value)}</div>
      <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
        {!active ? <button className="mini-btn start" type="button" onClick={() => setActive(true)}>▶ Start</button> : <button className="mini-btn stop" type="button" onClick={stop}>■ Stop</button>}
        <button className="mini-btn edit" type="button" onClick={() => setManual(true)}>✎ Manuell</button>
        {!!value && !active && <button className="mini-btn edit" type="button" onClick={() => setValue(0)}>↺ Reset</button>}
      </div>

      {manual && (
        <div className="modal-back" onClick={() => setManual(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div style={{fontSize:21, fontWeight:950, marginBottom:14}}>Zeit manuell erfassen</div>
            <div className="grid2">
              <input className="input" inputMode="numeric" value={h} placeholder="Stunden" onChange={e => setH(e.target.value.replace(/\D/g,""))}/>
              <input className="input" inputMode="numeric" value={m} placeholder="Minuten" onChange={e => setM(e.target.value.replace(/\D/g,""))}/>
            </div>
            <div style={{display:"flex", gap:10, marginTop:14}}>
              <button className="save-btn" type="button" style={{margin:0}} onClick={applyManual}>Übernehmen</button>
              <button className="outline-btn" type="button" style={{padding:14}} onClick={() => setManual(false)}>Abbrechen</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

async function uploadPhotos(jobId, photos) {
  if (!photos || !photos.length) return [];
  const urls = [];
  for (let i=0; i<photos.length; i++) {
    const file = photos[i].file;
    if (!file) continue;
    const ext = (file.name || "photo.jpg").split(".").pop() || "jpg";
    const path = "jobs/" + jobId + "/" + Date.now() + "_" + i + "." + ext;
    const res = await fetch(SUPABASE_URL + "/storage/v1/object/photos/" + path, {
      method:"POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
        "Content-Type": file.type || "image/jpeg",
        "x-upsert":"true"
      },
      body:file
    });
    if (res.ok) urls.push(SUPABASE_URL + "/storage/v1/object/public/photos/" + path);
    else console.warn("photo upload failed", await res.text());
  }
  return urls;
}

async function ensureVehicle(vehicle, vehicles, setVehicles) {
  if (!vehicle || !vehicle.plate) return;
  const exists = (vehicles || []).find(v => (v.plate || "").toLowerCase() === vehicle.plate.toLowerCase());
  if (exists) return exists;
  const row = {
    id:"V" + Date.now(),
    plate:vehicle.plate,
    brand:vehicle.brand || "",
    type:vehicle.type || "other",
    location:"Werkstatt",
    created_at:new Date().toISOString()
  };
  try {
    await api.insert("vehicles", row, false);
    setVehicles(prev => [row, ...(prev || [])]);
  } catch(e) {
    console.warn("vehicle insert failed", e);
  }
  return row;
}

function NewJob({vehicles,setVehicles,user,prefill,onSaved,onClear}) {
  const [vehicleType,setVehicleType] = useState("truck");
  const [vehicle,setVehicle] = useState({plate:"MA-LT 441", brand:"", type:"truck", isNew:false});
  const [location,setLocation] = useState("Werkstatt");
  const [workType,setWorkType] = useState("repair");
  const [description,setDescription] = useState("");
  const [photos,setPhotos] = useState([]);
  const [travelTo,setTravelTo] = useState(0);
  const [travelBack,setTravelBack] = useState(0);
  const [workMin,setWorkMin] = useState(0);
  const [colleague,setColleague] = useState(false);
  const [colleagueName,setColleagueName] = useState("");
  const [parts,setParts] = useState("");
  const [saving,setSaving] = useState(false);

  useEffect(() => {
    if (!prefill) return;
    setVehicleType(prefill.vehicle_type || prefill.vehicleType || "truck");
    setVehicle({plate:prefill.plate || "", brand:prefill.brand || "", type:prefill.vehicle_type || "truck", isNew:false});
    setLocation(prefill.location || "Werkstatt");
    setWorkType(prefill.work_type || "emergency");
    setDescription(prefill.description || prefill.note || "");
  }, [prefill && prefill.id]);

  async function save() {
    if (!vehicle || !vehicle.plate) return alert("Bitte Fahrzeug eingeben.");
    setSaving(true);
    try {
      await ensureVehicle({...vehicle,type:vehicleType}, vehicles, setVehicles);
      const id = "J" + Date.now();
      const mechanicUrls = await uploadPhotos(id, photos);

      const payload = {
        id,
        mechanic:user.id || "roman",
        colleague:colleague ? (colleagueName || "Kollege") : null,
        vehicle_type:vehicleType,
        vehicleType:vehicleType,
        plate:vehicle.plate,
        location,
        work_type:workType,
        workType:workType,
        description,
        status:workMin > 0 ? "done" : "inProgress",
        date:todayIso(),
        travel_to_min:travelTo,
        travelToMin:travelTo,
        travel_back_min:travelBack,
        travelBackMin:travelBack,
        work_min:workMin,
        workMin,
        parts_note:parts || null,
        cost:0,
        downtime:workMin || 0,
        photos:mechanicUrls.length,
        photourls:mechanicUrls,
        photo_urls:mechanicUrls,
        source:prefill ? (prefill.source || "eingang") : "werkstatt",
        alert_id:prefill && prefill.id ? prefill.id : null,
        incoming_photo_urls:prefill ? normalizeUrls(prefill.photo_urls) : []

      await api.insert("jobs", payload, false);
      if (prefill && prefill.id) {
        try { await api.patch("alerts", prefill.id, {status:"done"}); } catch(e) { console.warn(e); }
      }

      alert("Bericht gespeichert!");
      setDescription("");
      setPhotos([]);
      setTravelTo(0);
      setTravelBack(0);
      setWorkMin(0);
      setParts("");
      onClear && onClear();
      onSaved && onSaved();
    } catch(e) {
      console.error(e);
      alert("Fehler beim Speichern: " + (e.message || e));
    } finally {
      setSaving(false);
    }
  }

  return (
    <div>
      <div className="page-title">Neuer <span className="orange">Auftrag</span></div>

      {prefill && (
        <div className="alert-card urgent">
          <div className="badge red">Aus Eingang übernommen</div>

        <div className="grid2">
          <TimerBox label="Hinfahrt erfassen" value={travelTo} setValue={setTravelTo}/>

        </div>
        <div style={{height:10}}></div>
        <TimerBox label="Arbeitszeit erfassen" value={workMin} setValue={setWorkMin}/>
      </div>

      <button className="save-btn" type="button" disabled={saving} onClick={save}>{saving ? "Speichert..." : "💾 Bericht speichern"}</button>
    </div>
  );
}

                  <strong style={{fontSize:18}}>{a.plate || "Ohne Kennzeichen"}</strong>
                </div>
                <div className="meta" style={{marginTop:8}}>von {a.source === "stapler" ? "Stapler" : "Fahrer"} · {a.created_at ? timeHM(a.created_at) : ""}</div>
              </div>
            </div>
            <div className="meta" style={{marginTop:10}}>📍 {a.location || "kein Standort"}</div>
            <div style={{fontSize:16, lineHeight:1.35, marginTop:10, whiteSpace:"pre-wrap"}}>{a.description || a.note || "Keine Beschreibung"}</div>
            <RemotePhotos urls={a.photo_urls}/>
            {!normalizeUrls(a.photo_urls).length && <div className="meta" style={{marginTop:10}}>📷 Keine Fotos angehängt</div>}
            <button className="save-btn" type="button" style={{marginTop:12, marginBottom:0}} onClick={() => onCreate(a)}>+ Auftrag erstellen</button>
          </div>
        );
      })}
    </div>
  );
}

function MyJobs({jobs}) {
  const active = (jobs || []).filter(j => j.status !== "done");
  return (
    <div>
      <div className="page-title">Meine <span className="orange">Aufträge</span></div>
      {!active.length && <div className="panel" style={{textAlign:"center", color:"rgba(255,255,255,.66)", padding:32}}>Keine offenen Aufträge</div>}
      {active.map(j => (
        <div className="alert-card" key={j.id}>
          <div className="job-head">
            <div>
              <div style={{fontSize:18,fontWeight:950}}>{j.plate || "Ohne Kennzeichen"}</div>
              <div className="meta" style={{marginTop:5}}>📍 {j.location || "Werkstatt"} · {labelFrom(WORK_TYPES, j.work_type || j.workType)}</div>
            </div>
            <span className="badge orange">{j.status === "inProgress" ? "In Arbeit" : "Offen"}</span>
          </div>
          <div style={{marginTop:10, whiteSpace:"pre-wrap"}}>{j.description}</div>
          <RemotePhotos urls={j.photo_urls || j.photourls}/>
          <div className="meta" style={{marginTop:10}}>Arbeitszeit: {fmtMin(j.work_min || j.workMin || 0)} · Fahrzeit: {fmtMin((j.travel_to_min || j.travelToMin || 0) + (j.travel_back_min || j.travelBackMin || 0))}</div>
        </div>
      ))}
    </div>
  );
}

function LagerPlaceholder() {
  return (
    <div>
      <div className="page-title">La<span className="orange">ger</span></div>
      <div className="panel">
        <div className="panel-title"><span className="ico">📦</span>Lager & Belege</div>
        <div className="meta">Lagerlogik bleibt erhalten als eigener Bereich. Die Fahrzeugverwaltung wurde aus der Werkstatt entfernt und gehört ins Dashboard.</div>
      </div>
    </div>
  );
}

function Archive({jobs}) {
  const done = (jobs || []).filter(j => j.status === "done");
  function exportReport() {
    const date = todayIso();
    const rows = done.slice(0,100).map(j => (
      "<tr>" +
      "<td>" + (j.plate || "") + "</td>" +
      "<td>" + (j.mechanic || "") + "</td>" +
      "<td>" + (labelFrom(WORK_TYPES, j.work_type || j.workType) || "") + "</td>" +
      "<td>" + (j.description || "") + "</td>" +
      "<td>" + fmtMin(j.work_min || j.workMin || 0) + "</td>" +
      "</tr>"
    )).join("");
    const html =
      "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>WerkFlow Bericht</title>" +
      "<style>body{font-family:Arial,sans-serif;padding:20px;color:#222}h1{color:#082b66}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid #ddd;text-align:left}th{background:#082b66;color:#fff}</style>" +
      "</head><body><h1>WerkFlow Werkstatt — Bericht</h1><p>Datum: " + date + "</p><table><thead><tr><th>Fahrzeug</th><th>Mechaniker</th><th>Art</th><th>Beschreibung</th><th>Zeit</th></tr></thead><tbody>" +
      rows +
      "</tbody></table></body></html>";
    const blob = new Blob([html], {type:"text/html"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "WerkFlow_Bericht_" + date + ".html";
    a.click();
    URL.revokeObjectURL(url);
  }
  return (
    <div>
      <div className="page-title">Ar<span className="orange">chiv</span></div>
      <button className="outline-btn" type="button" style={{marginBottom:14,padding:13}} onClick={exportReport}>Bericht exportieren</button>
      {!done.length && <div className="panel" style={{textAlign:"center", color:"rgba(255,255,255,.66)", padding:32}}>Noch keine erledigten Aufträge</div>}
      {done.map(j => (
        <div className="alert-card" key={j.id}>
          <strong>{j.plate}</strong>
          <div className="meta" style={{marginTop:5}}>{j.date} · {fmtMin(j.work_min || j.workMin || 0)}</div>
          <div style={{marginTop:8}}>{j.description}</div>
        </div>
      ))}
    </div>
  );
}

function AppShell({user,onLogout}) {
  const [tab,setTab] = useState("new");
  const [jobs,setJobs] = useState([]);
  const [alerts,setAlerts] = useState([]);
  const [vehicles,setVehicles] = useState([]);
  const [loading,setLoading] = useState(false);
  const [prefill,setPrefill] = useState(null);
  const [dbOk,setDbOk] = useState(null);

  async function loadAll() {
    setLoading(true);
    try {
      const [j,a,v] = await Promise.all([
        api.select("jobs","select=*&order=created_at.desc&limit=250"),
        api.select("alerts","select=*&order=created_at.desc&limit=100"),
        api.select("vehicles","select=*&order=plate.asc&limit=500")
      ]);
      setJobs(j);
      setAlerts(a.map(x => ({...x, photo_urls:normalizeUrls(x.photo_urls)})));
      setVehicles(v);
      setDbOk(true);
    } catch(e) {
      console.error(e);
      setDbOk(false);
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { loadAll(); }, []);

  const openAlerts = alerts.filter(a => a.status !== "done");

  function createFromAlert(a) {
    setPrefill({
      ...a,
      vehicle_type:a.vehicle_type || a.vehicleType || "truck",
      work_type:"emergency",
      photo_urls:normalizeUrls(a.photo_urls)
    });
    setTab("new");
  }

  return (
    <div className="phone">
      <Bg/>
      <div className="app">
        <div className="top">
          <div>
            <Logo small/>
            <div style={{color:"#ffa500", fontSize:20, fontWeight:950, marginTop:2}}>Werkstatt</div>
          </div>
          <div className="user-pill">
            <span className="status-dot" style={{background:dbOk === false ? "#ff3b30" : dbOk === true ? "#22c55e" : "#ffa500"}}></span>
            <span style={{fontSize:12, fontWeight:850}}>{user.name}</span>
            <button type="button" onClick={onLogout} style={{border:0, background:"rgba(255,255,255,.08)", color:"#fff", padding:"6px 8px", borderRadius:9}}>↩</button>
          </div>
        </div>

        {openAlerts.length > 0 && (
          <div className="emergency-strip" onClick={() => setTab("eingang")}>
            <div>🚨</div>
            <div>
              <div style={{fontWeight:950}}>Neue Meldungen: {openAlerts.length}</div>
              <div className="meta">{openAlerts[0].plate || ""} {openAlerts[0].description ? "· " + openAlerts[0].description.slice(0,45) : ""}</div>
            </div>
            <div className="count">{openAlerts.length}</div>
          </div>
        )}

        {tab === "new" && <NewJob vehicles={vehicles} setVehicles={setVehicles} user={user} prefill={prefill} onClear={() => setPrefill(null)} onSaved={loadAll}/>}
        {tab === "eingang" && <Incoming alerts={alerts} onCreate={createFromAlert} loading={loading} onRefresh={loadAll}/>}
        {tab === "jobs" && <MyJobs jobs={jobs}/>}
        {tab === "lager" && <LagerPlaceholder/>}
        {tab === "archive" && <Archive jobs={jobs}/>}
      </div>

      <BottomNav tab={tab} setTab={setTab} alerts={openAlerts.length}/>
    </div>
  );
}

function BottomNav({tab,setTab,alerts}) {
  const items = [
    ["new","➕","Neuer Auftrag"],
    ["eingang","📥","Eingang"],
    ["jobs","📋","Meine Aufträge"],
    ["lager","📦","Lager"],
    ["archive","🗃️","Archiv"]
  ];
  return (
    <div className="nav-wrap">
      <div className="nav">
        {items.map(([k,ico,label]) => (
          <button key={k} type="button" className={"nav-btn " + (tab === k ? "active" : "")} onClick={() => setTab(k)}>
            <span className="nav-ico" style={{position:"relative"}}>
              {ico}
              {k === "eingang" && alerts > 0 && <span style={{position:"absolute", right:-10, top:-8, background:"#ff3b30", color:"#fff", borderRadius:99, fontSize:10, fontWeight:950, minWidth:17, height:17, display:"flex", alignItems:"center", justifyContent:"center"}}>{alerts}</span>}
            </span>
            <span>{label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [user,setUser] = useState(null);
  const [alerts,setAlerts] = useState([]);

  async function loadAlertsOnly() {
    const a = await api.select("alerts","select=*&order=created_at.desc&limit=20");
    setAlerts(a.map(x => ({...x, photo_urls:normalizeUrls(x.photo_urls)})));
  }

  useEffect(() => { loadAlertsOnly(); }, []);

  if (!user) {
    return <LoginScreen alerts={alerts} onLogin={(u) => setUser(u)}/>;
  }

  return <AppShell user={user} onLogout={() => { setUser(null); localStorage.removeItem(SESSION_KEY); }}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
