async function sbSelect(table, query) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + table + (query ? "?" + query : ""), {
    headers:{ apikey:SB_KEY, Authorization:"Bearer "+SB_KEY }
  });
  if(!res.ok) throw new Error(await res.text());
  return await res.json();
}
async function sbInsert(table, payload) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + table, {
    method:"POST",
    headers:{ "Content-Type":"application/json", apikey:SB_KEY, Authorization:"Bearer "+SB_KEY, Prefer:"return=representation" },
    body:JSON.stringify(payload)
  });
  if(!res.ok) throw new Error(await res.text());
  return await res.json();
}
async function sbPatch(table, id, payload) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + table + "?id=eq." + encodeURIComponent(id), {
    method:"PATCH",
    headers:{ "Content-Type":"application/json", apikey:SB_KEY, Authorization:"Bearer "+SB_KEY, Prefer:"return=minimal" },
    body:JSON.stringify(payload)
  });
  if(!res.ok) throw new Error(await res.text());
  return true;
}
async function uploadJobPhotos(jobId, photos) {
  if(!photos || !photos.length) return [];
  const uploads = photos.map(async (p,i)=>{
    const file = p.file;
    const ext = (file.name || "photo.jpg").split(".").pop() || "jpg";
    const path = "jobs/" + jobId + "/" + Date.now() + "_" + i + "." + ext;
    const up = await fetch(SUPABASE_URL + "/storage/v1/object/photos/" + path, {
      method:"POST",
      headers:{ apikey:SB_KEY, Authorization:"Bearer "+SB_KEY, "Content-Type":file.type || "image/jpeg", "x-upsert":"true" },
      body:file
    }).catch(()=>null);
    if(!up || !up.ok) return null;
    return SUPABASE_URL + "/storage/v1/object/public/photos/" + path;
  });
  const urls = await Promise.all(uploads);
  return urls.filter(Boolean);
}
async function ensureVehicleInDb(v, vehicles, setVehicles) {
  if(!v || !v.plate) return null;
  const existing = (vehicles||[]).find(x => (x.plate||"").toLowerCase() === v.plate.toLowerCase());
  if(existing) return existing;
  const row = {
    id: "V" + Date.now(),
    plate: v.plate,
    brand: v.brand || "",
    type: v.type || "other",
    location: "Werkstatt",
    created_at: new Date().toISOString()
  };
  try {
    await sbInsert("vehicles", row);
    setVehicles(prev => [row].concat(prev||[]));
  } catch(e) {
    console.warn("vehicle insert failed", e);
  }
  return row;
}

function SliderUnlock({onUnlock}) {
  const [x,setX]=useState(0); const [drag,setDrag]=useState(false); const track=useRef(null); const max=useRef(0);

        <div className="slider-grip"><span/><span/><span/></div>
      </div>

}

function Icon({type}) {
  const common={width:34,height:34,viewBox:"0 0 24 24",fill:"none"};
  const stroke={stroke:"currentColor",strokeWidth:"2",strokeLinecap:"round",strokeLinejoin:"round"};
  if(type==="truck") return <svg {...common}><path {...stroke} d="M14 18V6H1v12h13zM14 9h4l3 3v6h-7M5.5 21a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM18.5 21a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg>;
  if(type==="pin") return <svg {...common}><path {...stroke} d="M12 21s7-4.35 7-11a7 7 0 1 0-14 0c0 6.65 7 11 7 11z"/><circle {...stroke} cx="12" cy="10" r="2.5"/></svg>;
  if(type==="tools") return <svg {...common}><path {...stroke} d="M14.7 6.3a4 4 0 0 0-5 5L3 18v3h3l6.7-6.7a4 4 0 0 0 5-5l-2.4 2.4-2-2 2.4-2.4z"/></svg>;
  if(type==="doc") return <svg {...common}><path {...stroke} d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path {...stroke} d="M14 2v6h6M8 13h8M8 17h8M8 9h2"/></svg>;
  if(type==="cam") return <svg {...common}><path {...stroke} d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle {...stroke} cx="12" cy="13" r="4"/></svg>;
  if(type==="box") return <svg {...common}><path {...stroke} d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path {...stroke} d="M3.27 6.96 12 12l8.73-5.04M12 22V12"/></svg>;
  if(type==="users") return <svg {...common}><path {...stroke} d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle {...stroke} cx="9" cy="7" r="4"/><path {...stroke} d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
  if(type==="timer") return <svg {...common}><circle {...stroke} cx="12" cy="13" r="8"/><path {...stroke} d="M12 9v5l3 2M9 2h6"/></svg>;
  if(type==="wrench") return <svg {...common}><path {...stroke} d="M14.7 6.3a4 4 0 0 0-5 5L4 17v3h3l5.7-5.7a4 4 0 0 0 5-5l-2.4 2.4-2-2 2.4-2.4z"/></svg>;
  return <span>{type}</span>;
}

function VehiclePicker({vehicles,value,onChange,type}) {
  const [q,setQ]=useState(value?.plate||""); const [brand,setBrand]=useState(value?.brand||""); const [open,setOpen]=useState(false);
  useEffect(()=>{ if(value){ setQ(value.plate||""); setBrand(value.brand||""); } },[value]);
  const list=(vehicles||[]).filter(v=>(!type || type==="other" || v.type===type || !v.type) && ((v.plate+" "+(v.brand||"")).toLowerCase().includes(q.toLowerCase())));
  function commit(){
    const plate=q.trim(); if(!plate){ onChange(null); return; }
    const ex=(vehicles||[]).find(v=>(v.plate||"").toLowerCase()===plate.toLowerCase());
    if(ex) onChange({id:ex.id,plate:ex.plate,brand:ex.brand||"",type:ex.type||type,isNew:false});
    else onChange({plate,brand:brand.trim(),type:type||"other",isNew:true});
  }
  return <div style={{position:"relative"}}>
    <input className="input-dark" value={q} onFocus={()=>setOpen(true)} onChange={e=>{setQ(e.target.value); setOpen(true);}} onBlur={()=>setTimeout(()=>{commit();setOpen(false);},200)} placeholder="Kennzeichen eingeben oder wählen"/>
    {q.trim() && <input className="input-dark" style={{marginTop:8}} value={brand} onChange={e=>setBrand(e.target.value)} onBlur={commit} placeholder="Marke / Modell (optional)"/>}
    {open && <div style={{position:"absolute",zIndex:40,top:50,left:0,right:0,maxHeight:230,overflow:"auto",background:"#0b1d3a",border:"1px solid rgba(255,165,0,.5)",borderRadius:12,padding:6,boxShadow:"0 18px 46px rgba(0,0,0,.55)"}}>
      {list.slice(0,8).map(v=><div key={v.id||v.plate} onMouseDown={()=>{setQ(v.plate);setBrand(v.brand||"");onChange({id:v.id,plate:v.plate,brand:v.brand||"",type:v.type||type,isNew:false});setOpen(false);}} style={{padding:12,borderRadius:9,cursor:"pointer"}}>
        <div style={{fontWeight:900}}>{v.plate}</div><div style={{fontSize:12,color:"rgba(255,255,255,.62)"}}>{v.brand || typeLabel(v.type)}</div>
      </div>)}
      {q.trim() && !list.some(v=>(v.plate||"").toLowerCase()===q.toLowerCase()) && <div style={{padding:12,color:"#ffa500",fontWeight:900}}>+ Neues Fahrzeug: {q}</div>}
    </div>}
  </div>;
}

function PhotoCapture({photos,setPhotos}) {
  const ref=useRef(null);
  function handle(e){
    const files=Array.from(e.target.files||[]);
    Promise.all(files.map(file=>new Promise(resolve=>{
      const r=new FileReader(); r.onload=ev=>resolve({file,base64:ev.target.result}); r.readAsDataURL(file);
    }))).then(arr=>setPhotos(prev=>(prev||[]).concat(arr)));
    e.target.value="";
  }
  return <div>
    <input ref={ref} type="file" accept="image/*" capture="environment" multiple style={{display:"none"}} onChange={handle}/>
    <button className="photo-btn" onClick={()=>ref.current && ref.current.click()}><Icon type="cam"/> Foto aufnehmen</button>
    {!!photos.length && <div className="photo-grid">{photos.map((p,i)=><div className="thumb" key={i}><img src={p.base64}/><button onClick={()=>setPhotos(photos.filter((_,idx)=>idx!==i))}>×</button></div>)}</div>}
  </div>;
}

function TimerBox({label,value,setValue}) {
  const [active,setActive]=useState(false); const [sec,setSec]=useState(0); const [manual,setManual]=useState(false); const [h,setH]=useState(""); const [m,setM]=useState("");
  useEffect(()=>{ if(!active) return; const id=setInterval(()=>setSec(s=>s+1),1000); return ()=>clearInterval(id); },[active]);
  function stop(){ setActive(false); const min=Math.max(1,Math.round(sec/60)); setValue((value||0)+min); setSec(0); }
  function apply(){
    const hh=Math.max(0,parseInt(h||"0",10)||0), mm=Math.max(0,parseInt(m||"0",10)||0);
    const total=hh*60+mm;
    if(total>24*60){ alert("Maximal 24 Stunden."); return; }
    if(total<0){ alert("Ungültige Zeit."); return; }
    setValue(total); setManual(false); setH(""); setM("");
  }
  return <div className="timer-box">
    <div className="timer-label">{label}</div>
    <div className="timer-time" style={{color:active?"#22c55e":"#fff"}}>{active ? fmtSec(sec) : fmtMin(value||0)}</div>
    <div style={{display:"flex",gap:8}}>
      {!active ? <button className="mini-btn start" onClick={()=>setActive(true)}>▶ Start</button> : <button className="mini-btn stop" onClick={stop}>■ Stop</button>}
      <button className="mini-btn edit" onClick={()=>setManual(true)}>✎ Manuell</button>
    </div>
    {manual && <div className="modal-back" onClick={()=>setManual(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:20,fontWeight:950,marginBottom:12}}>Zeit manuell erfassen</div>
        <div className="grid2">
          <input className="input-dark" inputMode="numeric" placeholder="Stunden" value={h} onChange={e=>setH(e.target.value.replace(/\D/g,""))}/>
          <input className="input-dark" inputMode="numeric" placeholder="Minuten" value={m} onChange={e=>setM(e.target.value.replace(/\D/g,""))}/>
        </div>
        <div style={{display:"flex",gap:10,marginTop:14}}>
          <button className="btn-primary" onClick={apply}>Übernehmen</button>
          <button className="btn-outline" onClick={()=>setManual(false)}>Abbrechen</button>
        </div>
      </div>
    </div>}
  </div>;
}

function Section({icon,title,sub,children,open,setOpen}) {
  return <div className="section-card">
    <div className="section-row" onClick={()=>setOpen && setOpen(!open)}>
      <div className="section-icon"><Icon type={icon}/></div>
      <div style={{flex:1}}><div className="section-title">{title}</div><div className="section-sub">{sub}</div></div>
      {setOpen && <div className="chev">›</div>}
    </div>
    {(!setOpen || open) && children && <div style={{marginTop:14}}>{children}</div>}
  </div>;
}

function NewJob({vehicles,setVehicles,user,prefill,onSaved,clearPrefill}) {
  const [vehicleType,setVehicleType]=useState(prefill?.vehicle_type || prefill?.vehicleType || "truck");
  const [vehicle,setVehicle]=useState(prefill ? {plate:prefill.plate||"",brand:prefill.brand||"",type:prefill.vehicle_type||"truck",isNew:false} : null);
  const [location,setLocation]=useState(prefill?.location || "Werkstatt");
  const [workType,setWorkType]=useState(prefill?.work_type || prefill?.workType || (prefill ? "emergency" : "repair"));
  const [desc,setDesc]=useState(prefill?.description || "");
  const [photos,setPhotos]=useState([]);
  const [withColleague,setWithColleague]=useState(false);
  const [colleague,setColleague]=useState("");
  const [travelTo,setTravelTo]=useState(0); const [travelBack,setTravelBack]=useState(0); const [workMin,setWorkMin]=useState(0);
  const [partsNote,setPartsNote]=useState(""); const [saving,setSaving]=useState(false);
  const [open,setOpen]=useState({veh:true,loc:false,work:false,desc:false,photos:false,parts:false,mech:false,timer:false});
  useEffect(()=>{ if(prefill){ setVehicleType(prefill.vehicle_type || prefill.vehicleType || "truck"); setVehicle({plate:prefill.plate||"",brand:prefill.brand||"",type:prefill.vehicle_type||"truck",isNew:false}); setLocation(prefill.location||"Werkstatt"); setWorkType(prefill.work_type || "emergency"); setDesc(prefill.description||""); setOpen(o=>({...o,veh:true,desc:true})); } },[prefill]);
  async function save(){
    if(!vehicle || !vehicle.plate){ alert("Bitte Fahrzeug eingeben."); return; }
    setSaving(true);
    try {
      await ensureVehicleInDb(Object.assign({},vehicle,{type:vehicleType}),vehicles,setVehicles);
      const jobId="J"+String(Date.now()).slice(-8);
      const photoUrls=await uploadJobPhotos(jobId,photos);
      const payload={
        id:jobId, mechanic:user.id, colleague:withColleague ? colleague : null,
        vehicle_type:vehicleType, plate:vehicle.plate, location, work_type:workType, description:desc,
        status:workMin>0 ? "done" : "inProgress", date:today(),
        travel_to_min:travelTo, travel_back_min:travelBack, work_min:workMin, cost:0, downtime:0,
        parts_note:partsNote || null, photos:photoUrls.length, photourls:photoUrls,
        source:prefill ? (prefill.source || "eingang") : "werkstatt",
        alert_id:prefill?.id || null
      };
      await sbInsert("jobs", payload);
      if(prefill?.id) { try { await sbPatch("alerts", prefill.id, {status:"done"}); } catch(e){} }
      alert("Auftrag gespeichert!");
      setVehicle(null); setDesc(""); setPhotos([]); setTravelTo(0); setTravelBack(0); setWorkMin(0); setPartsNote("");
      clearPrefill && clearPrefill();
      onSaved && onSaved();
    } catch(e) {
      console.error(e);
      alert("Fehler beim Speichern: " + (e.message || e));
    } finally { setSaving(false); }
  }
  return <div>
    <div className="hero-mini"><button className="btn-back" onClick={()=>clearPrefill && clearPrefill()}>‹</button><div style={{flex:1}}/><div className="h1">Neuer <span className="accent">Auftrag</span></div></div>
    {prefill && <div className="alert-card urgent" style={{margin:"0 0 12px"}}>
      <div className="badge red">Aus Eingang übernommen</div>
      <div style={{fontWeight:900,marginTop:8}}>{prefill.plate}</div>
      <div className="meta">📍 {prefill.location}</div>
      {(prefill.photo_urls||[]).length>0 && <RemotePhotoGrid urls={prefill.photo_urls}/>}
    </div>}
    <Section icon="truck" title="Fahrzeug" sub={vehicle?.plate ? vehicle.plate + " · " + typeLabel(vehicleType) : "Fahrzeugtyp und Kennzeichen wählen"} open={open.veh} setOpen={v=>setOpen({...open,veh:v})}>
      <select className="select-dark" value={vehicleType} onChange={e=>{setVehicleType(e.target.value); if(vehicle) setVehicle({...vehicle,type:e.target.value});}}>
        {VEHICLE_TYPES.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
      </select>
      <div style={{height:8}}/>
      <VehiclePicker vehicles={vehicles} value={vehicle} type={vehicleType} onChange={setVehicle}/>
    </Section>
    <Section icon="pin" title="Standort" sub={location || "Bitte Standort wählen"} open={open.loc} setOpen={v=>setOpen({...open,loc:v})}>
      <input className="input-dark" list="locs" value={location} onChange={e=>setLocation(e.target.value)} placeholder="Standort eingeben"/>
      <datalist id="locs">{LOCATIONS.map(l=><option key={l} value={l}/>)}</datalist>
    </Section>
    <Section icon="tools" title="Arbeitstyp" sub={workLabel(workType)} open={open.work} setOpen={v=>setOpen({...open,work:v})}>
      <select className="select-dark" value={workType} onChange={e=>setWorkType(e.target.value)}>{WORK_TYPES.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select>
    </Section>
    <Section icon="doc" title="Fehlerbeschreibung" sub={desc ? desc.slice(0,45) : "Fehlerbeschreibung eingeben"} open={open.desc} setOpen={v=>setOpen({...open,desc:v})}>
      <textarea className="textarea-dark" value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Fehlerbeschreibung eingeben..."/>
    </Section>
    <Section icon="cam" title="Fotos" sub={photos.length ? photos.length+" Foto(s)" : "Foto aufnehmen"} open={open.photos} setOpen={v=>setOpen({...open,photos:v})}>
      <PhotoCapture photos={photos} setPhotos={setPhotos}/>
    </Section>
    <Section icon="box" title="Teile & Material" sub={partsNote ? partsNote.slice(0,45) : "Teile & Material auswählen"} open={open.parts} setOpen={v=>setOpen({...open,parts:v})}>
      <textarea className="textarea-dark" value={partsNote} onChange={e=>setPartsNote(e.target.value)} placeholder="Teile, Belege, Material..."/>
    </Section>
    <Section icon="users" title="Mechaniker / Kollege" sub={withColleague ? "Mit Kollegen" : "Allein"} open={open.mech} setOpen={v=>setOpen({...open,mech:v})}>
      <div className="grid2">
        <button className={"choice "+(!withColleague?"active":"")} onClick={()=>setWithColleague(false)}>👤 Allein</button>
        <button className={"choice "+(withColleague?"active":"")} onClick={()=>setWithColleague(true)}>👥 Mit Kollegen</button>
      </div>
      {withColleague && <select className="select-dark" style={{marginTop:10}} value={colleague} onChange={e=>setColleague(e.target.value)}>
        <option value="">Kollege wählen</option>{USERS.filter(u=>u.id!==user.id).map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
      </select>}
    </Section>
    <Section icon="timer" title="Fahrzeit" sub={fmtMin(travelTo+travelBack)} open={open.timer} setOpen={v=>setOpen({...open,timer:v})}>
      <div className="grid2"><TimerBox label="Hinfahrt erfassen" value={travelTo} setValue={setTravelTo}/><TimerBox label="Rückfahrt erfassen" value={travelBack} setValue={setTravelBack}/></div>
      <div style={{height:10}}/><TimerBox label="Arbeitszeit erfassen" value={workMin} setValue={setWorkMin}/>
    </Section>
    <div style={{padding:"4px 0 16px"}}><button className="btn-primary" disabled={saving} onClick={save}>{saving ? "Speichert..." : "💾 Bericht speichern"}</button></div>
  </div>;
}

function RemotePhotoGrid({urls}) {
  const clean=(urls||[]).filter(Boolean);

  return <div className="photo-grid">{clean.slice(0,6).map((u,i)=><a className="thumb" href={u} target="_blank" key={i}><img src={u}/></a>)}</div>;
}

function AppShell({user,onLogout}) {
  const [tab,setTab]=useState("new");
  const [alerts,setAlerts]=useState([]); const [jobs,setJobs]=useState([]); const [vehicles,setVehicles]=useState([]);
  const [prefill,setPrefill]=useState(null); const [refreshing,setRefreshing]=useState(false);
  async function load(){
    setRefreshing(true);
    try {
      const [a,j,v]=await Promise.all([
        sbSelect("alerts","select=*&order=created_at.desc&limit=100").catch(()=>[]),
        sbSelect("jobs","select=*&order=created_at.desc&limit=200").catch(()=>[]),
        sbSelect("vehicles","select=*&order=plate.asc&limit=300").catch(()=>[])
      ]);
      setAlerts((a||[]).map(x=>Object.assign({},x,{photo_urls:Array.isArray(x.photo_urls)?x.photo_urls:[]})));
      setJobs((j||[]).map(x=>Object.assign({},x,{workType:x.work_type,vehicleType:x.vehicle_type,workMin:x.work_min,travelToMin:x.travel_to_min,travelBackMin:x.travel_back_min,photourls:Array.isArray(x.photourls)?x.photourls:[]})));
      setVehicles(v||[]);
    } finally { setRefreshing(false); }
  }
  useEffect(()=>{ load(); },[]);
  function createFromAlert(a){ setPrefill({id:a.id,plate:a.plate,brand:a.brand||"",vehicle_type:a.vehicle_type || a.vehicleType || "truck",location:a.location || "Werkstatt",work_type:"emergency",description:a.description || a.note || "",source:a.source || "driver",photo_urls:a.photo_urls||[]}); setTab("new"); }
  return <div className="app">
    <Bg/>
    <div className="app-top">
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <Logo/><div style={{flex:1}}/><div style={{fontSize:12,color:"rgba(255,255,255,.68)",textAlign:"right"}}>{user.name}<br/><button onClick={onLogout} style={{border:0,background:"transparent",color:"#ffa500",fontWeight:800}}>Abmelden</button></div>
      </div>
    </div>
    <div className="page">
      {tab==="new" && <NewJob vehicles={vehicles} setVehicles={setVehicles} user={user} prefill={prefill} clearPrefill={()=>setPrefill(null)} onSaved={load}/>}
      {tab==="eingang" && <Eingang alerts={alerts} onCreate={createFromAlert} refreshing={refreshing} onRefresh={load}/>}
      {tab==="jobs" && <JobsList jobs={jobs}/>}
      {tab==="archive" && <Archive jobs={jobs}/>}
    </div>
    <div className="bottom-nav"><div className="nav-inner">
      <button className={"nav-btn "+(tab==="new"?"active":"")} onClick={()=>setTab("new")}><span className="ico">➕</span>Neuer Auftrag</button>
      <button className={"nav-btn "+(tab==="eingang"?"active":"")} onClick={()=>setTab("eingang")}><span className="ico">📥</span>Eingang</button>
      <button className={"nav-btn "+(tab==="jobs"?"active":"")} onClick={()=>setTab("jobs")}><span className="ico">📋</span>Meine Aufträge</button>
      <button className={"nav-btn "+(tab==="archive"?"active":"")} onClick={()=>setTab("archive")}><span className="ico">🗃️</span>Archiv</button>
    </div></div>
  </div>;
}

function App() {
  const [state,setState]=useState("init"); const [user,setUser]=useState(null);
  useEffect(()=>{ try { const raw=localStorage.getItem(STORAGE_KEY); if(raw){ setUser(JSON.parse(raw)); setState("slider"); } else setState("onboarding"); } catch(e){ setState("onboarding"); } },[]);
  function saveUser(name){ const initials=name.split(" ").map(w=>w[0]||"").join("").slice(0,2).toUpperCase(); const u={id:(name.toLowerCase().includes("petr")?"petr":"roman"),name,avatar:initials}; localStorage.setItem(STORAGE_KEY,JSON.stringify(u)); setUser(u); setState("pin"); }
  if(state==="init") return null;
  if(state==="onboarding") return <Onboarding onContinue={saveUser}/>;
  if(state==="pin") return <PinLogin onSuccess={()=>setState("app")}/>;
  if(state==="slider") return <SliderUnlock onUnlock={()=>setState("app")}/>;
  if(state==="app") return <AppShell user={user||{id:"roman",name:"Werkstatt"}} onLogout={()=>{localStorage.removeItem(STORAGE_KEY); setUser(null); setState("onboarding"); }}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
