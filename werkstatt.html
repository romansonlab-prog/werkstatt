function todayIso() { return new Date().toISOString().slice(0,10); }
function timeHM(x) {
  try { return new Date(x).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}); }
  catch(e) { return ""; }
}
function dateDMY(x) {
  try { return new Date(x).toLocaleDateString("de-DE"); }
  catch(e) { return x || ""; }
}
function fmtMin(m) {
  m = parseInt(m || 0, 10) || 0;
  if (!m) return "0 min";
  var h = Math.floor(m / 60);
  var mm = m % 60;
  return h ? h + "h " + mm + "min" : mm + " min";
}
function fmtSec(s) {
  s = parseInt(s || 0, 10) || 0;
  var h = Math.floor(s / 3600);
  var mn = Math.floor((s % 3600) / 60);
  var sec = s % 60;
  return h
    ? h + ":" + String(mn).padStart(2,"0") + ":" + String(sec).padStart(2,"0")
    : String(mn).padStart(2,"0") + ":" + String(sec).padStart(2,"0");
}
function labelFrom(list, value) {
  var row = list.find(function(x) { return x[0] === value; });
  return row ? row[1] : (value || "");
}
function normalizeUrls(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v.filter(Boolean);
  if (typeof v === "string") {
    try {
      var p = JSON.parse(v);
      return Array.isArray(p) ? p.filter(Boolean) : [];
    } catch(e) { return v ? [v] : []; }
  }
  return [];
}

// === Supabase API (.then/.catch only, no async/await) ===
function sbSelect(table, query) {
  var url = SB_URL + "/rest/v1/" + table + (query ? "?" + query : "");
  return fetch(url, {
    headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
  }).then(function(res) {
    if (!res.ok) return res.text().then(function(t) { throw new Error(table + " select: " + t); });
    return res.json();
  }).then(function(json) {
    return Array.isArray(json) ? json : [];
  });
}

function sbInsert(table, payload, minimal) {
  return fetch(SB_URL + "/rest/v1/" + table, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SB_KEY,
      "Authorization": "Bearer " + SB_KEY,
      "Prefer": minimal ? "return=minimal" : "return=representation"
    },
    body: JSON.stringify(payload)
  }).then(function(res) {
    if (!res.ok) return res.text().then(function(t) { throw new Error(table + " insert: " + t); });
    return minimal ? true : res.json();
  });
}

function sbPatch(table, id, payload) {
  return fetch(SB_URL + "/rest/v1/" + table + "?id=eq." + encodeURIComponent(id), {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      "apikey": SB_KEY,
      "Authorization": "Bearer " + SB_KEY,
      "Prefer": "return=minimal"
    },
    body: JSON.stringify(payload)
  }).then(function(res) {
    if (!res.ok) return res.text().then(function(t) { throw new Error(table + " patch: " + t); });
    return true;
  });
}

function sbUploadPhoto(path, file) {
  return fetch(SB_URL + "/storage/v1/object/inspection-photos/" + path, {
    method: "POST",
    headers: {
      "apikey": SB_KEY,
      "Authorization": "Bearer " + SB_KEY,
      "Content-Type": file.type || "image/jpeg",
      "x-upsert": "true"
    },
    body: file
  }).then(function(res) {
    if (!res.ok) return null;
    return SB_URL + "/storage/v1/object/public/inspection-photos/" + path;
  }).catch(function() { return null; });
}

function uploadAllPhotos(jobId, photos) {
  if (!photos || !photos.length) return Promise.resolve([]);

    setWorkType(prefill.work_type || "emergency");
    setDescription(prefill.description || prefill.note || "");
  }, [prefill && prefill.id]);

  function save() {
    if (!vehicle || !vehicle.plate) { alert("Bitte Fahrzeug eingeben."); return; }
    setSaving(true);

    var jobId = "J" + Date.now();

    ensureVehicle(Object.assign({}, vehicle, { type:vehicleType }), vehicles, setVehicles)
      .then(function() { return uploadAllPhotos(jobId, photos); })
      .then(function(photoUrls) {
        var partsArr = selParts.map(function(p) { return p.qty + "x " + p.name; });
        var payload = {
          id: jobId,
          mechanic: user.id || "roman",
          colleague: colleague ? (colleagueName || "Kollege") : null,
          vehicle_type: vehicleType,
          plate: vehicle.plate,
          location: location,
          work_type: workType,
          description: description,
          status: workMin > 0 ? "done" : "inProgress",
          date: todayIso(),
          travel_to_min: travelTo,
          travel_back_min: travelBack,
          work_min: workMin,
          parts_note: partsArr.length ? partsArr.join(", ") : null,
          parts_items: selParts.length ? JSON.stringify(selParts) : null,
          cost: selParts.reduce(function(sum, p) { return sum + (p.price || 0) * p.qty; }, 0),
          photos: photoUrls.length,
          photo_urls: photoUrls,
          source: prefill ? "eingang" : "werkstatt",
          alert_id: prefill && prefill.id ? prefill.id : null,
          incoming_photo_urls: prefill ? normalizeUrls(prefill.photo_urls) : [],
          created_at: new Date().toISOString()
        };
        return sbInsert("jobs", payload, true);
      })
      .then(function() {
        // deduct stock
        var patches = selParts.map(function(p) {
          var item = stock.find(function(s) { return s.id === p.id; });
          if (!item) return Promise.resolve();
          var newQty = Math.max(0, (item.qty || 0) - p.qty);
          return sbPatch("stock", p.id, { qty:newQty });
        });
        return Promise.all(patches);
      })
      .then(function() {
        if (prefill && prefill.id) {
          return sbPatch("alerts", prefill.id, { status:"done" }).catch(function(e){ console.warn(e); });
        }
        return Promise.resolve();
      })
      .then(function() {
        alert("Bericht gespeichert!");
        setDescription(""); setPhotos([]); setTravelTo(0); setTravelBack(0); setWorkMin(0); setSelParts([]);
        if (onClear) onClear();
        if (onSaved) onSaved();
        setSaving(false);
      })
      .catch(function(e) {
        console.error(e);
        alert("Fehler beim Speichern: " + (e.message || e));
        setSaving(false);
      });
  }

  return (
    <div>

      <div className="glass-panel">

          <div>
            <div className="label-cap">Fahrzeugtyp</div>

              setVehicleType(e.target.value);
              if (vehicle) setVehicle(Object.assign({}, vehicle, { type:e.target.value }));
            }}>
              {VEHICLE_TYPES.map(function(vt) { return <option key={vt[0]} value={vt[0]}>{vt[1]}</option>; })}
            </select>
          </div>
          <div>
            <div className="label-cap">Kennzeichen / Nr.</div>
            <VehicleInput vehicles={vehicles} value={vehicle} onChange={setVehicle} vehicleType={vehicleType} />
          </div>
        </div>
        <div className="label-cap" style={{ marginTop:10 }}>Standort</div>
        <input className="input-dark" list="wf-locations" value={location} onChange={function(e){ setLocation(e.target.value); }} placeholder="Standort" />
        <datalist id="wf-locations">
          {LOCATIONS.map(function(l) { return <option key={l} value={l} />; })}
        </datalist>
      </div>

      <div className="glass-panel">

        <textarea className="textarea-dark" value={description} onChange={function(e){ setDescription(e.target.value); }} placeholder="Fehlerbeschreibung eingeben..." />
      </div>

      <div className="glass-panel">
        <div className="panel-title">📷 Fotos</div>
        <PhotoCapture photos={photos} setPhotos={setPhotos} />
      </div>

      <div className="glass-panel">
        <div className="panel-title">📦 Teile &amp; Material</div>
        <StockPicker stock={stock} selected={selParts} setSelected={setSelParts} />
        {selParts.length > 0 && (
          <div style={{ marginTop:6, color:"rgba(255,255,255,0.55)", fontSize:12 }}>

          </div>

      <div className="glass-panel">
        <div className="panel-title">👥 Mechaniker</div>
        <div className="grid2">
          <button type="button" className={"chip" + (!colleague ? " active" : "")} onClick={function(){ setColleague(false); }}>👤 Allein</button>
          <button type="button" className={"chip" + (colleague ? " active" : "")} onClick={function(){ setColleague(true); }}>👥 Mit Kollegen</button>
        </div>
        {colleague && (
          <select className="select-dark" style={{ marginTop:10 }} value={colleagueName} onChange={function(e){ setColleagueName(e.target.value); }}>

// === MEINE AUFTRÄGE (mit Status-Steuerung) ===
function MeineAuftraege({ jobs, user, onRefresh, loading }) {
  var _spause = useState(null); var pauseTarget = _spause[0]; var setPauseTarget = _spause[1];
  var _sreason = useState(""); var reason = _sreason[0]; var setReason = _sreason[1];
  var _sup = useState(false); var updating = _sup[0]; var setUpdating = _sup[1];

  var myJobs = (jobs || []).filter(function(j) {
    return j.mechanic === (user && user.id);
  }).filter(function(j) { return j.status !== "done"; });

  function changeStatus(job, newStatus, pauseNote) {
    setUpdating(true);
    var patch = { status:newStatus };
    if (pauseNote) patch.pause_note = pauseNote;
    if (newStatus === "done") patch.finished_at = new Date().toISOString();
    sbPatch("jobs", job.id, patch)
      .then(function() { setUpdating(false); if (onRefresh) onRefresh(); })
      .catch(function(e) { alert("Fehler: " + e.message); setUpdating(false); });
  }

  function handlePause(job) {
    setPauseTarget(job); setReason("");
  }

  function confirmPause() {
    if (!reason.trim()) { alert("Bitte Pausengrund angeben."); return; }
    changeStatus(pauseTarget, "paused", reason);
    setPauseTarget(null); setReason("");
  }

  function statusLabel(s) {
    if (s === "inProgress") return { text:"In Arbeit", cls:"green" };
    if (s === "paused")     return { text:"Pause",    cls:"orange" };
    return { text:"Neu", cls:"blue" };
  }

  return (
    <div>
      <div className="page-title">Meine <span style={{ color:"#ffa500" }}>Aufträge</span></div>
      <button className="outline-btn" type="button" style={{ marginBottom:14, padding:13 }} onClick={onRefresh}>

      </button>
      {myJobs.length === 0 && (
        <div className="glass-panel" style={{ textAlign:"center", color:"rgba(255,255,255,0.55)", padding:32 }}>
          Keine offenen Aufträge
        </div>
      )}
      {myJobs.map(function(j) {
        var sl = statusLabel(j.status);
        var isActive = j.status === "inProgress";
        var isPaused = j.status === "paused";
        var isNew    = j.status !== "inProgress" && j.status !== "paused";
        return (
          <div key={j.id} className="alert-card">
            <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:8, marginBottom:8 }}>
              <div>
                <div style={{ fontSize:17, fontWeight:800 }}>{j.plate || "Ohne Kennzeichen"}</div>
                <div className="meta" style={{ marginTop:4 }}>
                  📍 {j.location || "Werkstatt"} · {labelFrom(WORK_TYPES, j.work_type)}
                </div>
              </div>
              <span className={"badge " + sl.cls}>{sl.text}</span>
            </div>
            {j.description && <div style={{ fontSize:13, lineHeight:1.4, marginBottom:8, whiteSpace:"pre-wrap" }}>{j.description}</div>}
            {j.pause_note && (
              <div className="pause-reason-box">
                <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,165,0,0.8)", marginBottom:4 }}>PAUSE-GRUND</div>
                <div style={{ fontSize:13 }}>{j.pause_note}</div>
              </div>
            )}
            <div className="meta" style={{ marginTop:8 }}>
              ⏱ Arbeit: {fmtMin(j.work_min || 0)} · Fahrt: {fmtMin((j.travel_to_min||0)+(j.travel_back_min||0))}
            </div>
            <div style={{ display:"flex", gap:8, marginTop:12, flexWrap:"wrap" }}>
              {isNew && (
                <button className="mini-btn start" type="button" disabled={updating}
                  onClick={function(){ changeStatus(j, "inProgress"); }}>▶ Starten</button>
              )}
              {isActive && (
                <button className="mini-btn pause" type="button" disabled={updating}
                  onClick={function(){ handlePause(j); }}>⏸ Pause</button>
              )}
              {isPaused && (
                <button className="mini-btn start" type="button" disabled={updating}
                  onClick={function(){ changeStatus(j, "inProgress"); }}>▶ Weiter</button>
              )}
              {(isActive || isPaused) && (
                <button className="mini-btn stop" type="button" disabled={updating}
                  onClick={function(){ if (window.confirm("Auftrag als erledigt markieren?")) changeStatus(j, "done"); }}>
                  ■ Fertig
                </button>
              )}
            </div>
          </div>
        );
      })}

      {pauseTarget && (
        <div className="modal-back" onClick={function(){ setPauseTarget(null); }}>
          <div className="modal" onClick={function(e){ e.stopPropagation(); }}>
            <div style={{ fontSize:18, fontWeight:800, marginBottom:14 }}>⏸ Pause — Grund angeben</div>
            <div style={{ color:"rgba(255,255,255,0.65)", fontSize:13, marginBottom:10 }}>
              {pauseTarget.plate} · {labelFrom(WORK_TYPES, pauseTarget.work_type)}
            </div>
            <textarea className="textarea-dark" value={reason}
              onChange={function(e){ setReason(e.target.value); }}
              placeholder="Grund der Pause (z.B. Ersatzteil fehlt, Mittagspause...)"
              style={{ minHeight:80, marginBottom:14 }}
            />
            <div style={{ display:"flex", gap:10 }}>
              <button className="btn-primary" type="button" style={{ flex:1 }} onClick={confirmPause}>Pause bestätigen</button>
              <button className="outline-btn" type="button" style={{ flex:1, padding:14 }} onClick={function(){ setPauseTarget(null); }}>Abbrechen</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    Promise.all([
      sbSelect("jobs", "select=*&order=created_at.desc&limit=300"),
      sbSelect("alerts", "select=*&order=created_at.desc&limit=100"),
      sbSelect("vehicles", "select=*&order=plate.asc&limit=500"),
      sbSelect("stock", "select=*&order=name.asc&limit=200")
    ]).then(function(results) {
      setJobs(results[0]);
      setAlerts(results[1].map(function(a) { return Object.assign({}, a, { photo_urls:normalizeUrls(a.photo_urls) }); }));
      setVehicles(results[2]);
      setStock(results[3]);
      setDbOk(true);
      setLoading(false);
    }).catch(function(e) {
      console.error(e);
      setDbOk(false);
      setLoading(false);
    });
  }

  useEffect(function() { loadAll(); }, []);

  var openAlerts = alerts.filter(function(a) { return a.status !== "done"; });

  function createFromAlert(a) {
    setPrefill(Object.assign({}, a, {
      vehicle_type: a.vehicle_type || a.vehicleType || "truck",
      work_type: "emergency",
      photo_urls: normalizeUrls(a.photo_urls)
    }));
    setTab("new");
  }

  return (
    <div style={{ position:"relative", minHeight:"100vh", minHeight:"100dvh", maxWidth:480, margin:"0 auto" }}>
      <Bg />
      <div className="app-wrap">
        <div className="app-top">
          <div>
            <Logo small={true} />
            <div style={{ color:"#ffa500", fontSize:18, fontWeight:900, marginTop:2 }}>Werkstatt</div>
          </div>
          <div className="user-pill">
            <div className="status-dot" style={{ background: dbOk === false ? "#ff3b30" : dbOk === true ? "#22c55e" : "#ffa500" }}></div>
            <span style={{ fontSize:12, fontWeight:700 }}>{user.name}</span>
            <button type="button" onClick={onLogout} style={{ border:0, background:"rgba(255,255,255,0.08)", color:"#fff", padding:"5px 8px", borderRadius:9, fontSize:12, fontWeight:700 }}>↩</button>
          </div>
        </div>

        {openAlerts.length > 0 && (
          <div className="emergency-strip" onClick={function(){ setTab("eingang"); }}>
            <div style={{ fontSize:20 }}>🚨</div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontWeight:800, fontSize:14 }}>Neue Meldungen: {openAlerts.length}</div>
              <div className="meta" style={{ whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                {openAlerts[0].plate || ""}{openAlerts[0].description ? " · " + openAlerts[0].description.slice(0,40) : ""}
              </div>
            </div>
            <div className="emergency-count">{openAlerts.length}</div>
          </div>
        )}

        {tab === "new" && (
          <NewJob
            vehicles={vehicles} setVehicles={setVehicles}
            stock={stock} user={user}
            prefill={prefill}
            onClear={function(){ setPrefill(null); }}
            onSaved={loadAll}
          />
        )}
        {tab === "eingang" && (
          <Eingang alerts={alerts} onCreate={createFromAlert} loading={loading} onRefresh={loadAll} />
        )}
        {tab === "jobs" && (
          <MeineAuftraege jobs={jobs} user={user} onRefresh={loadAll} loading={loading} />
        )}
        {tab === "lager" && (
          <Lager stock={stock} loading={loading} onRefresh={loadAll} />
        )}
        {tab === "archiv" && (
          <Archiv jobs={jobs} />
        )}
      </div>

      <BottomNav tab={tab} setTab={setTab} alertCount={openAlerts.length} />
    </div>
  );
}

// === ROOT APP ===
function App() {
  var _sstage = useState("loading"); var stage = _sstage[0]; var setStage = _sstage[1];
  var _sname = useState(""); var savedName = _sname[0]; var setSavedName = _sname[1];
  var _suser = useState(null); var user = _suser[0]; var setUser = _suser[1];
  var _salerts = useState([]); var alerts = _salerts[0]; var setAlerts = _salerts[1];

  useEffect(function() {
    sbSelect("alerts", "select=*&order=created_at.desc&limit=30")
      .then(function(a) { setAlerts(a.map(function(x) { return Object.assign({}, x, { photo_urls:normalizeUrls(x.photo_urls) }); })); })
      .catch(function(){});

    try {
      var saved = localStorage.getItem(SESSION_KEY);
      if (saved) {
        var u = JSON.parse(saved);
        if (u && u.name) {
          setSavedName(u.name);
          setUser(u);
          setStage("slider");
          return;
        }
      }
    } catch(e) {}
    setStage("register");
  }, []);

  if (stage === "loading") {
    return (
      <div className="scrn" style={{ alignItems:"center", justifyContent:"center" }}>
        <Bg />
        <div style={{ position:"relative", zIndex:2 }}>
          <Logo />
        </div>
      </div>
    );
  }

  if (stage === "register") {
    return (
      <ErsteAnmeldung onContinue={function(v, n) {
        setSavedName(v + " " + n);
        setStage("pin");
      }} />
    );
  }

  if (stage === "pin") {
    return (
      <PinScreen onSuccess={function() {
        var name = savedName || "Werkstatt";
        var avatar = name.split(" ").map(function(w){ return w[0] || ""; }).join("").slice(0,2).toUpperCase() || "WK";
        var knownUser = USERS.find(function(u) { return name.toLowerCase().includes(u.id); });
        var u = knownUser || { id:"roman", name:name, avatar:avatar };
        try { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); } catch(e) {}
        setUser(u);
        setStage("slider");
      }} />
    );
  }

  if (stage === "slider") {
    return (
      <SliderScreen
        userName={savedName}
        alerts={alerts}
        onUnlock={function() { setStage("app"); }}
        onChangeUser={function() {
          try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
          setSavedName(""); setUser(null); setStage("register");
        }}
      />
    );
  }

  if (stage === "app" && user) {
    return (
      <AppShell
        user={user}
        onLogout={function() {
          try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
          setUser(null); setSavedName(""); setStage("register");
        }}
      />
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
