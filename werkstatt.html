function Fahrzeuge({ user, vehicles, setVehicles, t, initialSelected, onClearSelected }) {
  const [selected, setSelected] = useState(initialSelected || null);
  useEffect(() => {
    if (initialSelected) { setSelected(initialSelected); if(onClearSelected) onClearSelected(); }
  }, [initialSelected]);
  const [showAdd, setShowAdd] = useState(false);
  const [search, setSearch] = useState("");
  const [saved, setSaved] = useState(false);

  // Parts state
  const [partsType, setPartsType] = useState(""); // no_parts | inspection | from_stock | buy | used
  const [partsItems, setPartsItems] = useState([]); // selected stock items
  const [partsInvoice, setPartsInvoice] = useState(""); // invoice number
  const [partsSupplier, setPartsSupplier] = useState(""); // supplier
  const [partsCost, setPartsCost] = useState(""); // cost
  const [partsNote, setPartsNote] = useState(""); // description for used/buy
  const [partsDate, setPartsDate] = useState(""); // invoice date
  const [newV, setNewV] = useState({
    type:"truck", plate:"", brand:"", year:"", tuev:"",
    insurance:"", uvv:"", nextService:"", mileage:"", notes:""
  });

  const today = new Date();
  const isViewer = user.role === "boss" || user.role === "fpl";

  const docStatus = (dateStr) => {
    if (!dateStr) return { color: C.gray500, icon: "-", label: "-", bg: C.gray500+"22" };
    const d = new Date(dateStr);
    const diff = Math.round((d - today) / 86400000);
    if (diff < 0)  return { color: C.red,    icon: "R", label: String(Math.abs(diff))+t.daysOverdue, bg: C.red+"22" };
    if (diff < 30) return { color: C.yellow, icon: "Y", label: diff+t.days,            bg: C.yellow+"22" };
    return              { color: C.green,  icon: "G", label: dateStr.slice(0,10),  bg: C.green+"22" };
  };

  // vIcon replaced by VehicleBrand component
  // vEmoji replaced by VehicleBrand component

  const filtered = vehicles.filter(v =>
    v.plate.toLowerCase().includes(search.toLowerCase()) ||
    v.brand.toLowerCase().includes(search.toLowerCase())
  );

  const urgent = vehicles.filter(v => {
    return [v.tuev, v.insurance, v.uvv, v.nextService].some(d => {
      if (!d) return false;
      return Math.round((new Date(d) - today) / 86400000) < 30;
    });
  }).length;

  const addVehicle = function() {
    if (!newV.plate) return;
    var v = Object.assign({}, newV, { id:"V"+Date.now(),
      year: parseInt(newV.year)||2020, mileage: parseInt(newV.mileage)||0 });
    sb.insert("vehicles", {
      id: v.id, plate: v.plate,
      brand: v.brand.split(" ")[0] || v.brand,
      model: v.brand.split(" ").slice(1).join(" ") || "",
      type: v.type, year: v.year, mileage: v.mileage,
      tuev: v.tuev || null, insurance: v.insurance || null,
      uvv: v.uvv || null, next_service: v.nextService || null,
      notes: v.notes || "",
    }).catch(function(e){ console.error("vehicle:", e); });
    setVehicles(function(prev){ return prev.concat([v]); });
    setNewV({ type:"truck", plate:"", brand:"", year:"", tuev:"",
      insurance:"", uvv:"", nextService:"", mileage:"", notes:"" });
    setShowAdd(false);
    setSaved(true);
    setTimeout(function(){ setSaved(false); }, 2000);
  };

  if (selected) {
    const v = vehicles.find(x => x.id === selected);
    if (!v) { setSelected(null); return null; }
    const docs = [
      { label: t.tuev,        date: v.tuev },
      { label: t.insurance,   date: v.insurance },
      { label: t.uvv,         date: v.uvv },
      { label: t.nextService, date: v.nextService },
    ];
    return (
      <div>
        <button onClick={() => setSelected(null)}
          style={{ background:"none", border:"none", color:C.gray500, cursor:"pointer",
                   fontSize:13, marginBottom:16, padding:0 }}>
          {t.backBtn}
        </button>
        <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:20 }}>
          <span style={{ fontSize:40 }}><VehicleBrand brand={v.brand} size={40} /></span>
          <div>
            <div style={{ fontSize:22, fontWeight:900 }}>{v.plate}</div>
            <div style={{ fontSize:14, color:C.gray500 }}>{v.brand} - {v.year}</div>
          </div>
        </div>
        <Card style={{ marginBottom:14 }}>
          <div style={{ fontWeight:800, fontSize:15, marginBottom:14 }}>
            {t.docsAndDates}
          </div>
          {docs.map((doc, idx) => {
            const st = docStatus(doc.date);
            return (
              <div key={idx} style={{ display:"flex", alignItems:"center",
                justifyContent:"space-between", padding:"12px 0",
                borderBottom:"1px solid "+C.border+"22" }}>
                <div>
                  <div style={{ fontWeight:600, fontSize:14 }}>{doc.label}</div>
                  <div style={{ fontSize:12, color:C.gray500, marginTop:2 }}>
                    {doc.date || "-"}
                  </div>
                </div>
                <span style={{ background:st.bg, color:st.color,
                  borderRadius:20, padding:"4px 12px", fontSize:13, fontWeight:700 }}>
                  {st.icon === "G" ? "✅" : st.icon === "Y" ? "⚠" : "❌"} {st.label}
                </span>
              </div>
            );
          })}
        </Card>
        {v.mileage > 0 && (
          <Card style={{ marginBottom:14 }}>
            <div style={{ fontWeight:800, fontSize:15, marginBottom:8 }}>km</div>
            <div style={{ fontSize:28, fontWeight:900, color:C.orange }}>
              {v.mileage.toLocaleString("de-DE")} km
            </div>
          </Card>
        )}
        {v.notes ? (
          <Card>
            <div style={{ fontWeight:800, fontSize:15, marginBottom:8 }}>{t.inspectionNote}</div>
            <div style={{ fontSize:14, color:C.gray300 }}>{v.notes}</div>
          </Card>
        ) : null}
      </div>
    );
  }

  return (
    <div>
      <div style={{ fontSize:20, fontWeight:800, color:C.white, marginBottom:16 }}>
        {t.vehicles}
      </div>

      {urgent > 0 ? (
        <div style={{ background:C.red+"18", border:"1px solid "+C.red+"44",
          borderRadius:12, padding:"12px 16px", marginBottom:16,
          display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:22 }}>⚠</span>
          <div>
            <div style={{ fontWeight:800, color:C.red, fontSize:14 }}>
              {urgent} {t.urgentAlert}
            </div>
            <div style={{ fontSize:12, color:C.gray500, marginTop:2 }}>
              {t.urgentDesc}
            </div>
          </div>
        </div>
      ) : null}

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
        <div style={{ background:C.surface, border:"1px solid "+C.border,
          borderLeft:"3px solid "+C.blue, borderRadius:10, padding:"12px 14px" }}>
          <div style={{ fontSize:22, fontWeight:900, color:C.white }}>
            {vehicles.length}
          </div>
          <div style={{ fontSize:11, color:C.gray500, marginTop:3 }}>{t.vehiclesTotal}</div>
        </div>
        <div style={{ background:C.surface, border:"1px solid "+C.border,
          borderLeft:"3px solid "+(urgent > 0 ? C.red : C.green),
          borderRadius:10, padding:"12px 14px" }}>
          <div style={{ fontSize:22, fontWeight:900, color:C.white }}>
            {urgent > 0 ? "⚠" : "✅"} {urgent}
          </div>
          <div style={{ fontSize:11, color:C.gray500, marginTop:3 }}>{t.attentionRequired}</div>
        </div>
      </div>

      {saved ? (
        <div style={{ background:C.green+"22", border:"1px solid "+C.green+"44",
          borderRadius:10, padding:"10px 16px", marginBottom:12,
          color:C.green, fontWeight:700 }}>
          {t.vehicleAdded}
        </div>
      ) : null}

      <Input placeholder={"🔍 "+t.plate+"..."} value={search}
        onChange={e => setSearch(e.target.value)} style={{ marginBottom:12 }} />

      {!isViewer ? (
        <button onClick={() => setShowAdd(!showAdd)}
          style={{ display:"flex", alignItems:"center", gap:8, width:"100%",
            background: showAdd ? C.orange+"22" : C.navyMid,
            border:"1px solid "+(showAdd ? C.orange : C.border),
            borderRadius:10, padding:"10px 16px",
            color: showAdd ? C.orange : C.gray300,
            fontWeight:700, fontSize:14, cursor:"pointer", marginBottom:14 }}>
          + {t.addVehicle}
        </button>
      ) : null}

      {showAdd ? (
        <Card style={{ marginBottom:14 }}>
          <div style={{ fontSize:13, fontWeight:800, color:C.orange, marginBottom:14 }}>
            {t.newVehicle}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
            {[
              { key:"plate",       label:t.plate+"*",     type:"text",   ph:"MA-LT 999" },
              { key:"brand",       label:t.brand,         type:"text",   ph:"MAN TGX"   },
              { key:"year",        label:t.buildYear,     type:"number", ph:"2020"      },
              { key:"mileage",     label:t.mileageLabel,  type:"number", ph:"0"         },
              { key:"tuev",        label:t.tuev,          type:"date",   ph:""          },
              { key:"insurance",   label:t.insurance,     type:"date",   ph:""          },
              { key:"uvv",         label:t.uvv,           type:"date",   ph:""          },
              { key:"nextService", label:t.nextService,   type:"date",   ph:""          },
            ].map(f => (
              <div key={f.key}>
                <div style={{ fontSize:11, color:C.gray500, marginBottom:4 }}>{f.label}</div>
                <Input type={f.type} value={newV[f.key]} placeholder={f.ph}
                  onChange={e => setNewV(v => ({ ...v, [f.key]: e.target.value }))} />
              </div>
            ))}
          </div>
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:11, color:C.gray500, marginBottom:4 }}>{t.vehicleType}</div>
            <Select value={newV.type} onChange={e => setNewV(v => ({ ...v, type:e.target.value }))}>
              <option value="truck">{t.truck}</option>
              <option value="semiTrailer">{t.semiTrailer}</option>
              <option value="forklift">{t.forklift}</option>
              <option value="trailer">{t.trailer}</option>
              <option value="other">{t.other}</option>
            </Select>
          </div>
          <button onClick={addVehicle}
            style={{ background:C.orange, color:"#fff", border:"none",
              borderRadius:8, padding:"10px 20px", fontWeight:800,
              fontSize:14, cursor:"pointer" }}>
            {t.add}
          </button>
        </Card>
      ) : null}

      {filtered.map(v => {
        const allDocs = [v.tuev, v.insurance, v.uvv, v.nextService].filter(Boolean);
        const minDiff = allDocs.length
          ? Math.min(...allDocs.map(d => Math.round((new Date(d) - today) / 86400000)))
          : 999;
        const tl = minDiff < 0 ? { emoji:"🔴", color:C.red }
                 : minDiff < 30 ? { emoji:"🟡", color:C.yellow }
                 : { emoji:"🟢", color:C.green };
        return (
          <button key={v.id} onClick={() => setSelected(v.id)}
            style={{ display:"block", width:"100%", background:C.surface,
              border:"1px solid "+C.border, borderLeft:"3px solid "+tl.color,
              borderRadius:12, padding:16, marginBottom:10,
              textAlign:"left", cursor:"pointer" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <span style={{ fontSize:26 }}><VehicleBrand brand={v.brand} size={40} /></span>
                <div>
                  <div style={{ fontWeight:800, fontSize:15, color:C.white }}>{v.plate}</div>
                  <div style={{ fontSize:12, color:C.gray500, marginTop:2 }}>
                    {v.brand} - {v.year}
                  </div>
                </div>
              </div>
              <span style={{ fontSize:20 }}>{tl.emoji}</span>
            </div>
          </button>
        );
      })}
    </div>
  );
}

// ── Notruf (Emergency Button) ─────────────────────────────────────
function NotrutButton({ user, onAlert, t, vehicles }) {
  const [open, setOpen]       = useState(false);
  const [sent, setSent]       = useState(false);
  const [sending, setSending] = useState(false);
  const [form, setForm] = useState({
    plate:"", type:"", urgency:"", location:"", description:"", photos:[],
  });
  const [showVehicles, setShowVehicles] = useState(false);
  const [customPlate, setCustomPlate]   = useState("");

  const canSend = form.plate && form.type && form.urgency && form.location && form.description;

  const handlePhoto = (e) => {
    const files = Array.from(e.target.files);
    Promise.all(files.map(f => new Promise(res => {
      const r = new FileReader(); r.onload = ev => res(ev.target.result); r.readAsDataURL(f);
    }))).then(results => setForm(f => ({...f, photos:[...f.photos,...results]})));
  };

  const send = function() {
    if (!canSend) return;
    setSending(true);
    sb.insert("alerts", {
      id: "A" + Date.now(),
      type: form.type || "breakdown", plate: form.plate || null,
      location: form.location, description: form.description,
      urgency: form.urgency, sender: user.id,
      sender_app: "werkstatt", status: "open",
    }).catch(function(e){ console.error("alert:", e); });
    onAlert({ type:form.type, location:form.location, desc:form.description,
      plate:form.plate, urgency:form.urgency, mechanic:user.id,
      time:new Date().toLocaleTimeString("de-DE") });
    setSending(false); setSent(true);
    setTimeout(function(){ setSent(false); setOpen(false);
      setForm({plate:"",type:"",urgency:"",location:"",description:"",photos:[]});
    }, 2500);
  };

  const types = [

    <div>

                🚨 {t.emergency}
              </div>
              <button onClick={() => setOpen(false)}

            </div>

              {sent ? (

                  <div style={{ fontSize:56, marginBottom:12 }}>✅</div>
                  <div style={{ fontSize:18, fontWeight:900, color:C.green, marginBottom:6 }}>

                  <div style={{ fontSize:13, color:C.gray500 }}>{t.emergencyNotified}</div>
                </div>
              ) : (
                <div>

                  {/* Vehicle */}
                  <div style={{ marginBottom:14 }}>
                    <div style={{ fontSize:11, fontWeight:700, color:C.gray500,

                    </button>

                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>

                            background:form.type===tp.k?C.orange+"22":C.navyDark,

                            fontWeight:600, fontSize:13, cursor:"pointer" }}>
                          {tp.e} {tp.l}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Urgency */}
                  <div style={{ marginBottom:14 }}>
                    <div style={{ fontSize:11, fontWeight:700, color:C.gray500,
                      textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:8 }}>
                      {t.urgency||"Dringlichkeit"} *
                    </div>
                    {[
                      {k:"urgent", l:"🔴 "+t.meldenUrgent, color:C.red,    bg:C.red+"22"},
                      {k:"wait",   l:"🟡 "+t.meldenWait,   color:C.yellow, bg:C.yellow+"22"},
                    ].map(opt => (
                      <button key={opt.k} onClick={() => setForm(f=>({...f,urgency:opt.k}))}
                        style={{ display:"block", width:"100%", padding:"11px 14px",

                          border:"1px solid "+(form.urgency===opt.k?opt.color:C.border),

                      justifyContent:"center", gap:10,

                      padding:"12px", cursor:"pointer",

        </div>

  );

// ── Evening Report ────────────────────────────────────────────────
function EveningReport({ user, jobs, t }) {
  const today = new Date().toISOString().slice(0,10);
  const myJobs = user.role === "mechanic"
    ? jobs.filter(j => j.date === today && (j.mechanic === user.id || j.colleague === user.id))
    : jobs.filter(j => j.date === today);
  const [sent, setSent] = useState(false);
  const getName = (id) => (USERS.find(u => u.id === id) || {}).name || id;

  const totalWork   = myJobs.reduce((s,j) => s+(j.workMin||0), 0);
  const totalTravel = myJobs.reduce((s,j) => s+(j.travelToMin||0)+(j.travelBackMin||0), 0);
  const done        = myJobs.filter(j => j.status === "done").length;

  const send = () => { setSent(true); setTimeout(() => setSent(false), 3000); };

  return (
    <div>
      <div style={{ fontSize:20, fontWeight:800, color:C.white, marginBottom:6 }}>
        📄 {t.eveningReport}
      </div>
      <div style={{ fontSize:13, color:C.gray500, marginBottom:20 }}>
        {t.reportFor} {today}
      </div>

      {sent ? (
        <div style={{ background:C.green+"22", border:"1px solid "+C.green+"44",
          borderRadius:12, padding:20, textAlign:"center", marginBottom:16 }}>
          <div style={{ fontSize:36, marginBottom:8 }}>✅</div>
          <div style={{ fontWeight:800, color:C.green, fontSize:16 }}>{t.reportSent}</div>
        </div>
      ) : null}

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:16 }}>
        <div style={{ background:C.surface, border:"1px solid "+C.border,
          borderLeft:"3px solid "+C.orange, borderRadius:10, padding:"12px 14px" }}>
          <div style={{ fontSize:22, fontWeight:900 }}>{myJobs.length}</div>
          <div style={{ fontSize:11, color:C.gray500, marginTop:3 }}>{t.jobsLabel}</div>
        </div>
        <div style={{ background:C.surface, border:"1px solid "+C.border,
          borderLeft:"3px solid "+C.green, borderRadius:10, padding:"12px 14px" }}>
          <div style={{ fontSize:22, fontWeight:900 }}>{done}</div>
          <div style={{ fontSize:11, color:C.gray500, marginTop:3 }}>{t.done}</div>
        </div>
        <div style={{ background:C.surface, border:"1px solid "+C.border,
          borderLeft:"3px solid "+C.blue, borderRadius:10, padding:"12px 14px" }}>
          <div style={{ fontSize:22, fontWeight:900 }}>{formatMin(totalWork)}</div>
          <div style={{ fontSize:11, color:C.gray500, marginTop:3 }}>{t.workTotal}</div>
        </div>
      </div>

      {myJobs.length === 0 ? (
        <div style={{ textAlign:"center", color:C.gray500, padding:40 }}>
          {t.noReportJobs}
        </div>
      ) : (
        <div>
          {myJobs.map(j => (
            <Card key={j.id} style={{ marginBottom:10 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:700 }}>{j.plate}
                    <span style={{ color:C.gray500, fontWeight:400 }}> - {j.location}</span>
                  </div>
                  <div style={{ fontSize:12, color:C.gray500, marginTop:2 }}>
                    {getName(j.mechanic)}{j.colleague ? " + "+getName(j.colleague) : ""}
                  </div>
                  {j.description ? (
                    <div style={{ fontSize:13, color:C.gray300, marginTop:4 }}>{j.description}</div>
                  ) : null}
                </div>
                <div style={{ textAlign:"right", flexShrink:0, marginLeft:10 }}>
                  <Badge status={j.status} t={t} />
                  <div style={{ fontSize:11, color:C.gray500, marginTop:4 }}>
                    {j.workMin ? formatMin(j.workMin) : "-"}
                  </div>
                </div>
              </div>
              {(j.travelToMin > 0 || j.travelBackMin > 0) ? (
                <div style={{ marginTop:8, fontSize:12, color:C.orange }}>
                  Fahrt: {formatMin((j.travelToMin||0)+(j.travelBackMin||0))}
                </div>
              ) : null}
            </Card>
          ))}

          <div style={{ background:C.navyMid, border:"1px solid "+C.border,
            borderRadius:10, padding:"14px 16px", marginBottom:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
              <span style={{ fontSize:13, color:C.gray300 }}>{t.workTotal}:</span>
              <span style={{ fontWeight:700, color:C.green }}>{formatMin(totalWork)}</span>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between" }}>
              <span style={{ fontSize:13, color:C.gray300 }}>{t.travelTotal}:</span>
              <span style={{ fontWeight:700, color:C.orange }}>{formatMin(totalTravel)}</span>
            </div>
          </div>

          <button onClick={send}
            style={{ width:"100%", background:C.orange, color:"#000",
              border:"none", borderRadius:10, padding:"14px 0",
              fontWeight:900, fontSize:15, cursor:"pointer" }}>
            {t.generateReport} - {t.reportFor} {(user.name||"").split(" ")[0]}
          </button>
        </div>
      )}
    </div>
  );
}

// ── Driver Inspection ─────────────────────────────────────────────
function DriverInspection({ user, vehicles, t }) {
  const [step, setStep] = useState("select"); // select | inspect | done
  const [selectedVehicle, setSelectedVehicle] = useState(null);
  const [checks, setChecks] = useState({
    tires:false, lights:false, brakes:false, body:false, documents:false
  });
  const [notes, setNotes] = useState("");
  const [defects, setDefects] = useState("");

  const items = [
    { k:"tires",     label:t.tires,     emoji:"🔄" },
    { k:"lights",    label:t.lights,    emoji:"💡" },
    { k:"brakes",    label:t.brakes,    emoji:"🛑" },
    { k:"body",      label:t.body,      emoji:"🚛" },
    { k:"documents", label:t.documents, emoji:"📋" },
  ];

  const allOk = Object.values(checks).every(Boolean);

  if (step === "done") {
    return (
      <div style={{ textAlign:"center", padding:"40px 20px" }}>
        <div style={{ fontSize:64, marginBottom:16 }}>
          {allOk && !defects ? "✅" : "⚠"}
        </div>
        <div style={{ fontSize:20, fontWeight:900, marginBottom:8 }}>
          {t.inspectionDone}
        </div>
        <div style={{ fontSize:14, color:C.gray500, marginBottom:20 }}>
          {allOk && !defects ? t.noDefects : t.defectsFound}
        </div>
        {defects ? (
          <Card style={{ textAlign:"left", marginBottom:20 }}>
            <div style={{ fontSize:13, color:C.gray300 }}>{defects}</div>
          </Card>
        ) : null}
        <button onClick={() => { setStep("select"); setChecks({tires:false,lights:false,brakes:false,body:false,documents:false}); setNotes(""); setDefects(""); }}
          style={{ background:C.orange, color:"#000", border:"none",
            borderRadius:10, padding:"12px 24px", fontWeight:800, cursor:"pointer" }}>
          {t.startInspection}
        </button>
      </div>
    );
  }

  if (step === "inspect") {
    return (
      <div>
        <button onClick={() => setStep("select")}
          style={{ background:"none", border:"none", color:C.gray500,
            cursor:"pointer", fontSize:13, marginBottom:16, padding:0 }}>
          {t.backBtn}
        </button>
        <div style={{ fontSize:18, fontWeight:800, marginBottom:4 }}>
          {t.driverInspection}
        </div>
        <div style={{ fontSize:13, color:C.gray500, marginBottom:20 }}>
          {selectedVehicle ? selectedVehicle.plate+" - "+selectedVehicle.brand : ""}
        </div>

        {items.map(item => (
          <button key={item.k} onClick={() => setChecks(c => ({...c, [item.k]:!c[item.k]}))}
            style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
              width:"100%", background: checks[item.k] ? C.green+"18" : C.surface,
              border:"1px solid "+(checks[item.k] ? C.green : C.border),
              borderRadius:12, padding:"16px 18px", marginBottom:10,
              cursor:"pointer" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <span style={{ fontSize:24 }}>{item.emoji}</span>
              <span style={{ fontWeight:600, fontSize:15, color:C.white }}>
                {item.label}
              </span>
            </div>
            <span style={{ fontSize:24 }}>
              {checks[item.k] ? "✅" : "⬜"}
            </span>
          </button>
        ))}

        <Card style={{ marginBottom:16 }}>
          <div style={{ fontSize:11, color:C.gray500, marginBottom:6,
            textTransform:"uppercase" }}>
            {t.inspectionNote}
          </div>
          <Textarea value={defects} onChange={e => setDefects(e.target.value)}
            placeholder={t.defectsFound+"..."} style={{ minHeight:60 }} />
        </Card>

        <button onClick={() => setStep("done")}
          style={{ width:"100%", background: allOk ? C.green : C.orange,
            color: allOk ? "#fff" : "#000", border:"none",
            borderRadius:10, padding:"14px 0", fontWeight:900,
            fontSize:15, cursor:"pointer" }}>
          {t.inspectionDone}
        </button>
      </div>
    );
  }

  return (
    <div>
      <div style={{ fontSize:20, fontWeight:800, color:C.white, marginBottom:20 }}>
        🔍 {t.driverInspection}
      </div>
      <div style={{ fontSize:13, color:C.gray500, marginBottom:20 }}>
        {t.selectUser}:
      </div>
      {vehicles.filter(v => v.type === "truck" || v.type === "semiTrailer").map(v => (
        <button key={v.id} onClick={() => { setSelectedVehicle(v); setStep("inspect"); }}
          style={{ display:"block", width:"100%", background:C.surface,
            border:"1px solid "+C.border, borderRadius:12,
            padding:"14px 16px", marginBottom:10, textAlign:"left",
            cursor:"pointer" }}>
          <div style={{ fontWeight:800, fontSize:15, color:C.white }}>{v.plate}</div>
          <div style={{ fontSize:12, color:C.gray500, marginTop:2 }}>{v.brand} - {v.year}</div>
        </button>
      ))}
    </div>
  );
}

function Archive({ jobs, user, t }) {
  const [search, setSearch]   = useState("");
  const [expanded, setExpanded] = useState(null);

  const visible = user.role === "mechanic"
    ? jobs.filter(j => j.mechanic === user.id || j.colleague === user.id)
    : jobs;

  const filtered = visible.filter(j =>
    (j.plate || "").toLowerCase().includes(search.toLowerCase()) ||
    (j.location || "").toLowerCase().includes(search.toLowerCase()) ||
    (j.description||"").toLowerCase().includes(search.toLowerCase()) ||
    (j.date||"").includes(search)
  );

  const getName = (id) => (USERS.find(u => u.id === id) || {}).name || id;

  const formatJobText = (j) => {
    const lines = [
      `📋 LTG Werkstatt — Auftrag ${j.id}`,
      "-------------------------",
      `🚛 Fahrzeug:  ${j.plate}`,
      `📍 Standort:  ${j.location}`,
      `📅 Datum:     ${j.date}`,
      `🔧 Arbeitstyp: ${j.workType}`,
      `👷 Mechaniker: ${getName(j.mechanic)}${j.colleague ? " + "+getName(j.colleague) : ""}`,
      j.description ? `📝 Beschreibung: ${j.description}` : "",
      j.workMin   ? `⏱ Arbeitszeit: ${formatMin(j.workMin)}` : "",
      j.travelToMin ? `🚗 Fahrzeit: ${formatMin((j.travelToMin||0)+(j.travelBackMin||0))}` : "",
      j.cost > 0  ? `💶 Kosten: ${j.cost.toFixed(2)} €` : "",
      j.partsType ? `📦 Teile: ${j.partsType}` : "",
      j.partsInvoice ? `🧾 Beleg-Nr: ${j.partsInvoice}` : "",
      `✅ Status: ${j.status}`,
      "-------------------------",
      `LTG Hockenheim`,
    ].filter(Boolean).join("\n");
    return lines;
  };

  const handleShare = function(j) {
    var text = formatJobText(j);
    if (navigator.share) {
      navigator.share({ title: "Auftrag " + j.plate + " - " + j.date, text: text })
        .catch(function(){});
    } else {
      navigator.clipboard.writeText(text);
      alert("Kopiert!");
    }
  };

  const handlePrint = (j) => {
    const win = window.open("", "_blank");
    if (!win) return;
    const tMin = (j.travelToMin||0)+(j.travelBackMin||0);
    const row = (label, val) =>
      "<div class='row'><span class='label'>" + label + "</span>"
      + "<span class='value'>" + val + "</span></div>";
    const rows = [];
    rows.push(row("Fahrzeug", j.plate + (j.vehicleType ? " (" + j.vehicleType + ")" : "")));
    rows.push(row("Standort", j.location || ""));
    rows.push(row("Datum", j.date || ""));
    rows.push(row("Arbeitstyp", j.workType || ""));
    rows.push(row(t.mechanic||"Mechaniker", getName(j.mechanic) + (j.colleague ? " + " + getName(j.colleague) : "")));
    if (j.description)   rows.push(row("Beschreibung", j.description));
    if (j.workMin > 0)   rows.push(row("Arbeitszeit", formatMin(j.workMin)));
    if (tMin > 0)        rows.push(row("Fahrzeit", formatMin(tMin)));
    if (j.cost > 0)      rows.push(row("Kosten", j.cost.toFixed(2) + " EUR"));
    if (j.partsType)     rows.push(row("Teile", j.partsType));
    if (j.partsInvoice)  rows.push(row("Beleg-Nr.", j.partsInvoice + (j.partsDate ? ' · '+j.partsDate : '')));
    if (j.partsSupplier) rows.push(row("Lieferant", j.partsSupplier));
    rows.push("<div class='row'><span class='label'>Status</span>"
      + "<span class='value'><span class='status'>" + j.status + "</span></span></div>");
    const css = [
      "body{font-family:Arial,sans-serif;padding:32px;max-width:600px;margin:0 auto;color:#1a1a1a}",
      "h2{color:#1e3a5f;border-bottom:3px solid #e2001a;padding-bottom:8px;margin-bottom:16px}",
      ".row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #eee}",
      ".label{color:#666;font-size:13px}",
      ".value{font-weight:600;font-size:14px}",
      ".status{background:#22c55e;color:#fff;padding:3px 10px;border-radius:20px;font-size:12px}",
      ".logo{font-size:26px;font-weight:900;color:#1e3a5f;letter-spacing:-1px;margin-bottom:4px}",
      ".red{height:4px;background:#e2001a;width:72px;margin-bottom:20px;border-radius:2px}",
      ".foot{margin-top:28px;font-size:11px;color:#999;text-align:center;padding-top:12px;border-top:1px solid #eee}",
      "@media print{.noprint{display:none}}",
    ].join("");
    const html = "<!DOCTYPE html><html><head><meta charset='utf-8'>"
      + "<title>Auftrag " + j.plate + "</title>"
      + "<style>" + css + "</style></head><body>"
      + "<div class='logo'>LTG</div>"
      + "<div class='red'></div>"
      + "<h2>Auftrag &mdash; " + j.plate + "</h2>"
      + rows.join("")
      + "<div class='foot'>LTG Landauer Transportgesellschaft Doll KG &middot; Hockenheim &middot; "
      + new Date().toLocaleDateString("de-DE") + "</div>"
      + "<br/><button class='noprint' onclick='window.print()'>Drucken</button>"
      + "</body></html>";
    win.document.write(html);
    win.document.close();
    win.focus();
    setTimeout(function() { win.print(); }, 400);
  };

  const PART_ICONS = {
    inspection:"📋", from_stock:"📦", buy:"🛒", used:"♻", no_parts:"🔧"
  };

  return (
    <div>
      <div style={{ fontSize: 20, fontWeight: 800, color: C.white, marginBottom: 20 }}>
        {t.archive}
      </div>

      <Input placeholder={`🔍 ${t.searchArchive}`} value={search}
        onChange={e => setSearch(e.target.value)} style={{ marginBottom: 16 }} />

      <div style={{ fontSize: 12, color: C.gray500, marginBottom: 12 }}>
        {filtered.length} {t.jobsLabel||"Einträge"}
      </div>

      {filtered.length === 0 && (
        <div style={{ textAlign:"center", color:C.gray500, padding:40, fontSize:14 }}>
          {t.noJobs}
        </div>
      )}

      {filtered.map(j => {
        const isOpen = expanded === j.id;
        const travelMin = (j.travelToMin||0) + (j.travelBackMin||0);
        return (
          <Card key={j.id} style={{ marginBottom: 10, overflow:"hidden",
            border: isOpen ? "1px solid "+C.blue+"66" : "1px solid "+C.border }}>

            {/* ── Collapsed header ── */}
            <button onClick={() => setExpanded(isOpen ? null : j.id)}
              style={{ width:"100%", background:"none", border:"none",
                cursor:"pointer", textAlign:"left", padding:0 }}>
              <div style={{ display:"flex", justifyContent:"space-between",
                alignItems:"center" }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:700, fontSize:14, color:C.white }}>
                    {j.plate}
                    <span style={{ color:C.gray500, fontWeight:400,
                      fontSize:12, marginLeft:8 }}>
                      {j.location}
                    </span>
                  </div>
                  <div style={{ fontSize:12, color:C.gray500, marginTop:3,
                    display:"flex", gap:10, flexWrap:"wrap" }}>
                    <span>📅 {j.date}</span>
                    <span>👷 {getName(j.mechanic).split(" ")[0]}</span>
                    {j.cost > 0 && <span style={{ color:C.orange }}>
                      💶 {j.cost.toFixed(2)}€
                    </span>}
                    {j.workMin > 0 && <span>⏱ {formatMin(j.workMin)}</span>}
                  </div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <Badge status={j.status} t={t} />
                  <span style={{ color:C.gray500, fontSize:14,
                    transition:"transform 0.2s",
                    transform: isOpen ? "rotate(180deg)" : "rotate(0deg)" }}>
                    ▼
                  </span>
                </div>
              </div>
            </button>

            {/* ── Expanded detail ── */}
            {isOpen && (
              <div style={{ marginTop:14,
                borderTop:"1px solid "+C.border, paddingTop:14 }}>

                {/* Details grid */}
                <div style={{ display:"grid", gridTemplateColumns:"auto 1fr",
                  gap:"6px 16px", marginBottom:14, fontSize:13 }}>
                  {[
                    ["🔧", t.workType||"Arbeitstyp", j.workType],
                    ["📍", t.location, j.location],
                    ["👷", t.mechanic, getName(j.mechanic)+(j.colleague?" + "+getName(j.colleague):"")],
                    j.description && ["📝", t.description, j.description],
                    j.workMin   > 0 && ["⏱", t.workTimeLabel||"Arbeitszeit", formatMin(j.workMin)],
                    travelMin   > 0 && ["🚗", t.travelLabel||"Fahrzeit", formatMin(travelMin)],
                    j.cost      > 0 && ["💶", t.partsCostLabel||"Kosten", j.cost.toFixed(2)+" €"],
                    j.partsType && ["📦", t.partsSection||"Teile", PART_ICONS[j.partsType]+" "+j.partsType],
                    j.partsInvoice && ["🧾", t.invoiceNr||"Beleg-Nr.", j.partsInvoice],
                    j.partsSupplier && ["🏪", t.supplier, j.partsSupplier],
                  ].filter(Boolean).map(([icon, label, value], i) => (
                    <div key={i} style={{ display:"contents" }}>
                      <span style={{ color:C.gray500, fontSize:12,
                        display:"flex", alignItems:"center", gap:4 }}>
                        {icon} {label}:
                      </span>
                      <span style={{ color:C.white, fontWeight:500 }}>{value}</span>
                    </div>
                  ))}
                </div>

                {/* Action buttons */}
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={() => handleShare(j)}
                    style={{ flex:1, background:C.blue, color:"#fff",
                      border:"none", borderRadius:9, padding:"10px 0",
                      fontWeight:700, fontSize:13, cursor:"pointer",
                      display:"flex", alignItems:"center",
                      justifyContent:"center", gap:6 }}>
                    📤 {t.share||"Teilen"}
                  </button>
                  <button onClick={() => handlePrint(j)}
                    style={{ flex:1, background:C.surfaceAlt,
                      color:C.gray300,
                      border:"1px solid "+C.border,
                      borderRadius:9, padding:"10px 0",
                      fontWeight:700, fontSize:13, cursor:"pointer",
                      display:"flex", alignItems:"center",
                      justifyContent:"center", gap:6 }}>
                    🖨 {t.print||"Drucken"}
                  </button>
                </div>
              </div>
            )}
          </Card>
        );
      })}
    </div>
  );
}

// ── GPS Location Picker ──────────────────────────────────────────
function LocationPicker({ value, onChange, placeholder, C }) {
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState(null);
  const [coords,  setCoords]  = useState(null);

  const colors = C || { surface:"#1c2840", border:"#2a3a52", white:"#f1f5f9",
    red:"#ef4444", green:"#22c55e", gray500:"#64748b", blue:"#3b82f6",
    navyMid:"#1c2840", blueLt:"#60a5fa" };

  const getLocation = function() {
    if (!navigator.geolocation) {
      setError("GPS: Bitte Standort manuell eingeben");
      return;
    }
    setLoading(true); setError(null);
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        var lat = pos.coords.latitude.toFixed(5);
        var lng = pos.coords.longitude.toFixed(5);
        setCoords({ lat: lat, lng: lng });
        fetch("https://nominatim.openstreetmap.org/reverse?lat="+lat+"&lon="+lng+"&format=json&accept-language=de",
          { headers: { "Accept-Language":"de", "User-Agent":"LTG-App/1.0" }})
          .then(function(r){ return r.json(); })
          .then(function(data) {
            var p = data.address || {};
            var parts = [p.road, p.suburb||p.quarter,
              p.town||p.city||p.village||p.county, p.postcode].filter(Boolean);
            onChange(parts.length ? parts.join(", ") : lat+", "+lng);
          })
          .catch(function(){ onChange(lat+", "+lng); })
          .then(function(){ setLoading(false); },
                function(){ setLoading(false); });
      },
      function(err) {
        var msg = err.message || "";
        if (msg.indexOf("permissions") !== -1 || msg.indexOf("disabled") !== -1 ||
            msg.indexOf("denied") !== -1) {
          setError("GPS: Bitte Standort manuell eingeben");
        } else {
          setError("GPS Fehler - bitte manuell eingeben");
        }
        setLoading(false);
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  };

  var openMaps = function() {
    if (coords) {
      window.open("https://www.google.com/maps?q="+coords.lat+","+coords.lng+"&zoom=16", "_blank");
    }
  };

  return (
    <div>
      <div style={{ display:"flex", gap:8 }}>
        <input value={value} onChange={function(e){ onChange(e.target.value); }}
          placeholder={placeholder || "Standort eingeben..."}
          style={{ flex:1, background:colors.surface, border:"1px solid "+colors.border,
            borderRadius:10, padding:"12px 14px", color:colors.white,
            fontSize:14, outline:"none", fontFamily:"inherit",
            boxSizing:"border-box" }} />
        <button onClick={getLocation} disabled={loading}
          style={{ background:loading ? colors.navyMid : colors.blue, border:"none",
            borderRadius:10, padding:"0 16px",
            cursor:loading ? "not-allowed" : "pointer",
            fontSize:20, color:"#fff", flexShrink:0,
            opacity:loading ? 0.6 : 1, minWidth:52 }}>
          {loading ? "..." : "📍"}
        </button>
        {coords && (
          <button onClick={openMaps}
            style={{ background:colors.surface, border:"1px solid "+colors.border,
              borderRadius:10, padding:"0 14px", cursor:"pointer",
              fontSize:20, flexShrink:0 }}>
            🗺
          </button>
        )}
      </div>
      {error && (
        <div style={{ fontSize:11, color:colors.gray500, marginTop:5, fontStyle:"italic" }}>
          {error}
        </div>
      )}
      {coords && (
        <div style={{ fontSize:11, color:colors.gray500, marginTop:5 }}>
          📍 {coords.lat}, {coords.lng}
          <button onClick={openMaps}
            style={{ background:"none", border:"none", color:colors.blueLt,
              cursor:"pointer", fontSize:11, padding:"0 4px",
              textDecoration:"underline" }}>
            Google Maps
          </button>
        </div>
      )}
    </div>
  );
}

    vehicleType:"", plate:"", location:"", description:"",
    urgency:"", type:"", photos:[],

    ...vehicles.map(v => ({id:v.id, label:v.plate+" — "+v.brand, plate:v.plate})),
    {id:"custom", label:"✏ "+t.enterCustom, plate:""},
  ];
  const [customPlate, setCustomPlate] = useState("");

    const files = Array.from(e.target.files);
    Promise.all(files.map(f => new Promise(res => {
      const r = new FileReader();
      r.onload = ev => res(ev.target.result);
      r.readAsDataURL(f);
    }))).then(results => setForm(f => ({...f, photos:[...f.photos,...results]})));

    setSending(true);

      description: form.description || "",

// -- Data mappers (Supabase snake_case -> app camelCase) --
function mapJob(r) {
  return {
    id: r.id, mechanic: r.mechanic, colleague: r.colleague,
    vehicleType: r.vehicle_type, plate: r.plate, location: r.location,
    workType: r.work_type, description: r.description, status: r.status,
    date: r.date, travelToMin: r.travel_to_min || 0,
    travelBackMin: r.travel_back_min || 0, workMin: r.work_min || 0,
    cost: parseFloat(r.cost) || 0, downtime: r.downtime || 0,
    partsType: r.parts_type, partsItems: r.parts_items,
    partsInvoice: r.parts_invoice, partsSupplier: r.parts_supplier,
    partsNote: r.parts_note, partsDate: r.parts_date,
    photos: r.photos || 0, photoUrls: r.photo_urls || [],
    createdAt: r.created_at,
  };
}
function mapVehicle(r) {
  return {
    id: r.id, plate: r.plate, brand: r.brand + (r.model ? " " + r.model : ""),
    type: r.type, year: r.year, mileage: r.mileage || 0,
    tuev: r.tuev, insurance: r.insurance, uvv: r.uvv,
    nextService: r.next_service, notes: r.notes || "",
  };
}
function mapStock(r) {
  return {
    id: r.id, name: r.name, category: r.category,
    quantity: r.quantity || 0, minQty: r.min_qty || 0,
    unit: r.unit || "Stk", location: r.location || "",
  };
}
function mapInvoice(r) {
  return {
    id: r.id, date: r.date, supplier: r.supplier,
    amount: parseFloat(r.amount) || 0, items: r.items || "",
    mechanic: r.mechanic, jobId: r.job_id, photo: r.photo_url,
  };
}

  const [lang, setLang] = useState("de");
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState("new");
  const [jobs, setJobs] = useState([]);
  const [stock, setStock] = useState([]);
  const [invoices, setInvoices] = useState([]);
  const [vehicles, setVehicles] = useState([]);
  const [alerts, setAlerts] = useState([]);
  const [selectedVehicleId, setSelectedVehicleId] = useState(null);
  const [loading, setLoading] = useState(true);
  const [dbError, setDbError] = useState(null);
  const [prefillAlert, setPrefillAlert] = useState(null);
  const [alertModal, setAlertModal] = useState(null);
  const [meldungenOpen, setMeldungenOpen] = useState(false);
  const [dbStatus, setDbStatus] = useState("loading");
  const t = T[lang];

  // Load all data from Supabase
  function loadAlerts() {
    sb.query("alerts", { select: "*", filter: "status=eq.open",
      order: "created_at.desc", limit: "50" })
      .then(function(a) {
        setDbStatus("ok");
        if (Array.isArray(a)) setAlerts(a.map(function(r){
          return { id:r.id, type:r.type, plate:r.plate, location:r.location,
            description:r.description, urgency:r.urgency, sender:r.sender,
            senderApp:r.sender_app, status:r.status, createdAt:r.created_at };
        }));
      }).catch(function(e){
        setDbStatus("error");
        console.error("loadAlerts error:", e);
      });
  }

  useEffect(function() {
    // Safety timeout - if Supabase hangs, show app after 6 seconds anyway
    var safetyTimer = setTimeout(function() {
      setLoading(false);
      setDbStatus("error");
    }, 6000);

    // Initial load
    Promise.all([
      sb.query("jobs",     { select: "*", order: "created_at.desc", limit: "200" }),
      sb.query("vehicles", { select: "*", order: "plate.asc" }),
      sb.query("stock",    { select: "*", order: "name.asc" }),
      sb.query("invoices", { select: "*", order: "created_at.desc", limit: "100" }),
    ]).then(function(results) {
      var j = results[0], v = results[1], s = results[2], inv = results[3];
      clearTimeout(safetyTimer);
      setDbStatus("ok");
      if (Array.isArray(j)) setJobs(j.map(mapJob));
      if (Array.isArray(v)) setVehicles(v.map(mapVehicle));
      if (Array.isArray(s)) setStock(s.map(mapStock));
      if (Array.isArray(inv)) setInvoices(inv.map(mapInvoice));
      setLoading(false);
    }).catch(function(e) {
      clearTimeout(safetyTimer);
      setDbStatus("error");
      setDbError("DB: " + (e.message || "Verbindungsfehler"));
      setLoading(false);
    });

    // Load alerts immediately
    loadAlerts();

    // Poll alerts every 15 seconds (reliable alternative to WebSocket)
    var alertTimer = setInterval(function() {
      loadAlerts();
      // Also refresh jobs every 30s
    }, 8000);

    // Poll jobs every 30 seconds
    var jobTimer = setInterval(function() {
      sb.query("jobs", { select: "*", order: "created_at.desc", limit: "200" })
        .then(function(j) {
          if (Array.isArray(j)) setJobs(j.map(mapJob));

            return (
              <button onClick={function(){ setMeldungenOpen(true); }}
                style={{ position:"relative", background:hasUrgent?C.red:C.orange,
                  color:"#fff", border:"none", borderRadius:8,
                  padding:"4px 10px", fontSize:12, fontWeight:800, cursor:"pointer" }}>
                {cnt} Meldung{cnt > 1 ? "en" : ""}
              </button>
            );
          })()}
          {/* Alert indicator for mechanics */}
          {isMechanic && (function() {
            var allOpen = (alerts||[]).filter(function(a){ return a.status !== "done"; });
            var hasUrgent = allOpen.some(function(a){ return a.urgency === "urgent"; });
            if (allOpen.length === 0) return null;
            return (
              <button onClick={function(){ setAlertModal(allOpen[0]); setTab("eingang"); }}
                style={{ background:hasUrgent?C.red:C.orange, color:"#fff", border:"none",
                  borderRadius:8, padding:"4px 10px", fontSize:12,
                  fontWeight:800, cursor:"pointer" }}>
                {hasUrgent?"🔴":"🟡"} {allOpen.length}
              </button>
            );
          })()}
          <div style={{ fontSize: 12, color: C.gray500 }}>{(user.name||"").split(" ")[0]}</div>
          <button onClick={() => { setUser(null); setTab("new"); setSelectedVehicleId(null); }}
            style={{ background: C.navyMid, border: "1px solid "+C.border, borderRadius: 7, padding: "4px 10px", color: C.gray300, fontSize: 12, cursor: "pointer" }}>
            ⏎
          </button>
        </div>
      </div>

      {/* DB connection error banner */}
      {dbStatus === "error" && (
        <div style={{ background:"#1a0808", borderBottom:"1px solid "+C.red+"44",
          padding:"8px 16px", display:"flex", justifyContent:"space-between",
          alignItems:"center" }}>
          <span style={{ fontSize:12, color:C.red, fontWeight:600 }}>
            Keine Datenbankverbindung — Daten werden lokal gespeichert
          </span>
          <button onClick={function(){ loadAlerts(); }}
            style={{ background:"none", border:"1px solid "+C.red+"44",
              borderRadius:6, padding:"3px 10px", color:C.red,
              cursor:"pointer", fontSize:11 }}>
            Retry
          </button>
        </div>
      )}

      {/* Inline alert bar for logged-in mechanics */}
      {isMechanic && (alerts||[]).filter(function(a){ return a.status !== "done"; }).length > 0 && activeTab !== "eingang" && (
        <div onClick={function(){
            var openAlerts = (alerts||[]).filter(function(a){ return a.status !== "done"; });
            openAlerts.sort(function(a,b){
              if (a.urgency === "urgent" && b.urgency !== "urgent") return -1;
              if (b.urgency === "urgent" && a.urgency !== "urgent") return 1;
              return new Date(b.createdAt||0) - new Date(a.createdAt||0);
            });
            var a = openAlerts[0];
            if (a && a.id) {
              sb.update("alerts", a.id, { status: "done" }).catch(function(e){ console.error("alert close:", e); });
              setAlerts(function(prev){ return prev.map(function(x){ return x.id === a.id ? Object.assign({}, x, { status: "done" }) : x; }); });
            }
            setPrefillAlert(a);
            setTab("jobs");
            setTimeout(function(){ setTab("new"); }, 50);
          }}
          style={{ cursor:"pointer", padding:"10px 16px",
            background:(alerts||[]).some(function(a){ return a.urgency === "urgent" && a.status !== "done"; }) ? C.red : C.orange,
            display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <span style={{ fontWeight:800, fontSize:13, color:"#fff" }}>
              {(alerts||[]).some(function(a){ return a.urgency === "urgent" && a.status !== "done"; }) ? "🔴" : "🟡"} Neue Meldungen: {(alerts||[]).filter(function(a){ return a.status !== "done"; }).length}
            </span>
            <span style={{ fontSize:12, color:"rgba(255,255,255,0.8)", marginLeft:10 }}>
              {(function(){
                var a = (alerts||[]).find(function(x){ return x.status !== "done"; });
                if (!a) return "";
                var src = a.senderApp==="fahrer"?"Fahrer":a.senderApp==="stapler"?"Stapler":"Jens";
                return src + (a.plate?" · "+a.plate:"") + (a.description?" — "+(a.description||"").slice(0,25):"");
              })()}
            </span>
          </div>
          <span style={{ color:"rgba(255,255,255,0.8)", fontSize:13 }}>
            {(alerts||[]).filter(function(a){ return a.status !== "done"; }).length === 1 ? "Auftrag ›" : "Eingang ›"}
          </span>
        </div>
      )}

      {/* Modals */}
      {isMechanic && alertModal && (
        <AlertModal alert={alertModal} t={t} C={C}
          onClose={function(){ setAlertModal(null); }}
          onCreateJob={function(a){
            if (a && a.id) {
              sb.update("alerts", a.id, { status: "done" }).catch(function(e){ console.error("alert close:", e); });
              setAlerts(function(prev){ return prev.map(function(x){ return x.id === a.id ? Object.assign({}, x, { status: "done" }) : x; }); });
            }
            setPrefillAlert(a);
            setAlertModal(null);
            setTab("new");
          }} />
      )}
      {isViewer && meldungenOpen && (
        <MeldungenPanel alerts={alerts} C={C} t={t}
          onClose={function(){ setMeldungenOpen(false); }} />
      )}

      {/* Content */}
      <div style={{ padding: 16, paddingBottom: 80, maxWidth: 700, margin: "0 auto" }}>
        {activeTab === "new"       && isMechanic && <NewJobForm user={user} jobs={jobs} setJobs={setJobs} t={t} stock={stock} prefill={prefillAlert} onClearPrefill={function(){ setPrefillAlert(null); }} onSaved={function(){ setTab("archive"); }} />}
        {activeTab === "jobs"                      && <MyJobs user={user} jobs={jobs} setJobs={setJobs} t={t} />}
        {activeTab === "dashboard" && user.role === "boss" && <DashboardBoss jobs={jobs} vehicles={vehicles} alerts={alerts} t={t} lang={lang} />}
        {activeTab === "dashboard" && user.role === "fpl"  && <DashboardFPL jobs={jobs} vehicles={vehicles} alerts={alerts} t={t} lang={lang} onNavigate={(vid) => { setSelectedVehicleId(vid); setTab("fahrzeuge"); }} onCreateJob={() => setTab("melden")} />}
        {activeTab === "lager"      && <Lager user={user} stock={stock} setStock={setStock} invoices={invoices} setInvoices={setInvoices} t={t} />}
        {activeTab === "fahrzeuge"  && <Fahrzeuge user={user} vehicles={vehicles} setVehicles={setVehicles} t={t} />}
        {activeTab === "report"     && isMechanic && <EveningReport user={user} jobs={jobs} t={t} />}
        {activeTab === "report"     && isViewer   && <DriverInspection user={user} vehicles={vehicles} t={t} />}
        {activeTab === "melden"     && user.role === "fpl" && <JensMelden jobs={jobs} vehicles={vehicles} setJobs={setJobs} t={t} />}
        {activeTab === "eingang" && isMechanic && <IncomingAlerts
          alerts={alerts} t={t} C={C}
          onCreateJob={function(alert){
            if (alert && alert.id) {
              sb.update("alerts", alert.id, { status: "done" }).catch(function(e){ console.error("alert close:", e); });
              setAlerts(function(prev){ return prev.map(function(x){ return x.id === alert.id ? Object.assign({}, x, { status: "done" }) : x; }); });
            }
            setPrefillAlert(null);
            setTab("jobs");
            setTimeout(function(){
              setPrefillAlert(alert);
              setTab("new");
            }, 100);
          }} />}
        {activeTab === "archive"    && <Archive jobs={jobs} user={user} t={t} />}
      </div>

      <NotrutButton user={user} onAlert={function(a) {
          setAlerts(function(prev) {
            return [{ id:"local_"+Date.now(), type:a.type, plate:a.plate,
              location:a.location, description:a.desc,
              urgency:a.urgency, sender:a.mechanic,
              senderApp:"werkstatt", status:"open",
              createdAt:new Date().toISOString() }, ...prev];
          });
          // Immediate re-poll to get server-confirmed data
          setTimeout(function(){ loadAlerts(); }, 2000);
        }} t={t} vehicles={vehicles} />
      {/* Bottom nav */}
      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: C.surfaceAlt, borderTop: `1px solid ${C.border}`, display: "flex", zIndex: 100 }}>
        {tabs.map(({ k, icon, label }) => (
          <button key={k} onClick={() => setTab(k)} style={{ flex: 1, padding: "10px 0", background: "transparent", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
            <div style={{ position:"relative", fontSize: k === "new" ? 20 : 18, background: activeTab === k && k === "new" ? C.blue : "transparent", borderRadius: 10, width: 36, height: 36, display: "flex", alignItems: "center", justifyContent: "center", color: activeTab === k ? (k === "new" ? "#fff" : C.orange) : C.gray500, fontWeight: 800 }}>
              {icon}
              {k === "eingang" && (alerts||[]).filter(function(a){ return a.status !== "done"; }).length > 0 && (
                <span style={{ position:"absolute", top:0, right:0, background:C.red,
                  color:"#fff", borderRadius:"50%", width:16, height:16,
                  fontSize:9, fontWeight:900, display:"flex",
                  alignItems:"center", justifyContent:"center" }}>
                  {(alerts||[]).filter(function(a){ return a.status !== "done"; }).length}
                </span>
              )}
            </div>
            <div style={{ fontSize: 10, color: activeTab === k ? C.orange : C.gray500, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.3px" }}>{label}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
