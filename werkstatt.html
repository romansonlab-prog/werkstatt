function Lager({ stock, loading, onRefresh }) {
  var lowItems = stock.filter(function(s) { return s.qty <= (s.min_qty || 0); });
  return (
    <div>
      <div className="page-title">La<span style={{ color:"#ffa500" }}>ger</span></div>
      <button className="outline-btn" type="button" style={{ marginBottom:14, padding:13 }} onClick={onRefresh}>
        {loading ? "Lädt..." : "↻ Aktualisieren"}
      </button>
      {lowItems.length > 0 && (
        <div className="alert-card urgent" style={{ marginBottom:14 }}>
          <div className="badge red" style={{ marginBottom:8 }}>⚠️ Nachbestellen erforderlich</div>
          {lowItems.map(function(s) {
            return <div key={s.id} style={{ fontSize:13, marginTop:4, color:"rgba(255,120,120,0.9)" }}>• {s.name}: noch {s.qty} {s.unit} (Min: {s.min_qty})</div>;
          })}
        </div>
      )}
      {stock.length === 0 && !loading && (
        <div className="glass-panel" style={{ textAlign:"center", color:"rgba(255,255,255,0.55)", padding:32 }}>
          Lager ist leer. Tabelle "stock" befüllen.
        </div>
      )}
      {stock.map(function(s) {
        var low = s.qty <= (s.min_qty || 0);
        return (
          <div key={s.id} className="lager-row" style={{ borderColor: low ? "rgba(239,68,68,0.45)" : "rgba(255,255,255,0.1)" }}>
            <div className="lager-name" style={{ color: low ? "#ef4444" : "#fff" }}>{s.name}</div>
            {s.price ? <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", marginRight:4 }}>{Number(s.price).toFixed(2)} €</div> : null}
            <div className={"lager-qty" + (low ? " lager-low" : "")}>{s.qty}</div>
            <div className="lager-unit">{s.unit || "Stk"}</div>
          </div>
        );
      })}
      <div style={{ marginTop:20, padding:14, borderRadius:14, background:"rgba(255,165,0,0.06)", border:"1px solid rgba(255,165,0,0.2)", color:"rgba(255,255,255,0.5)", fontSize:12, lineHeight:1.5 }}>
        💡 Vollständige Lagerverwaltung kommt als lager.html
      </div>
    </div>
  );
}

// === ARCHIV (с просмотром фото) ===
function Archiv({ jobs, user }) {
  var _sd = useState(""); var filterDate = _sd[0]; var setFilterDate = _sd[1];
  var _sp = useState(null); var photoJob = _sp[0]; var setPhotoJob = _sp[1];

  var myId = user && user.id;
  var done = (jobs || []).filter(function(j) {
    return j.status === "done" && j.mechanic === myId;
  });
  var filtered = filterDate
    ? done.filter(function(j) { return (j.date || (j.created_at || "").slice(0,10)) === filterDate; })
    : done;

  function exportReport() {
    var date = todayIso();
    var rows = filtered.slice(0,200).map(function(j) {
      return "<tr><td>" + (dateDMY(j.date || j.created_at) || "") + "</td><td>" + (j.plate || "") + "</td><td>" + (j.mechanic || "") + "</td><td>" + (labelFrom(WORK_TYPES, j.work_type) || "") + "</td><td>" + (j.description || "") + "</td><td>" + fmtMin(j.work_min || 0) + "</td><td>" + (j.cost ? Number(j.cost).toFixed(2) + " €" : "—") + "</td></tr>";
    }).join("");
    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>WerkFlow Bericht</title><style>body{font-family:Arial,sans-serif;padding:20px;color:#222}h1{color:#0a1730}table{width:100%;border-collapse:collapse}td,th{padding:8px 10px;border-bottom:1px solid #ddd;text-align:left}th{background:#0a1730;color:#fff}</style></head><body><h1>WerkFlow Werkstatt — Bericht</h1><p>Exportiert: " + date + "</p><table><thead><tr><th>Datum</th><th>Fahrzeug</th><th>Mechaniker</th><th>Typ</th><th>Beschreibung</th><th>Zeit</th><th>Kosten</th></tr></thead><tbody>" + rows + "</tbody></table></body></html>";
    var blob = new Blob([html], { type:"text/html" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "WerkFlow_Bericht_" + date + ".html"; a.click();
    URL.revokeObjectURL(url);
  }

  return (
    <div>
      <div className="page-title">Mein Ar<span style={{ color:"#ffa500" }}>chiv</span></div>
      <div style={{ display:"flex", gap:10, marginBottom:14, alignItems:"center" }}>
        <input type="date" className="input-dark" style={{ flex:1 }} value={filterDate} onChange={function(e){ setFilterDate(e.target.value); }} />
        {filterDate && <button className="mini-btn" type="button" onClick={function(){ setFilterDate(""); }}>✕</button>}
        <button className="mini-btn" type="button" onClick={exportReport} style={{ borderColor:"#ffa500", color:"#ffa500", whiteSpace:"nowrap" }}>📄 Export</button>
      </div>
      <div style={{ color:"rgba(255,255,255,0.45)", fontSize:12, marginBottom:10 }}>
        {filtered.length} Aufträge {filterDate ? "am " + filterDate : "gesamt"}
      </div>
      {filtered.length === 0 && (
        <div className="glass-panel" style={{ textAlign:"center", color:"rgba(255,255,255,0.55)", padding:32 }}>Keine erledigten Aufträge</div>
      )}
      {filtered.map(function(j) {
        var photoUrls = normalizeUrls(j.photo_urls);
        var incomingUrls = normalizeUrls(j.incoming_photo_urls);
        var allUrls = photoUrls.concat(incomingUrls);
        return (
          <div key={j.id} className="alert-card">
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
              <div>
                <div style={{ fontWeight:800, fontSize:16 }}>{j.plate || "Ohne KZ"}</div>
                <div className="meta" style={{ marginTop:4 }}>{dateDMY(j.date || j.created_at)} · {labelFrom(WORK_TYPES, j.work_type)}</div>
              </div>
              <span className="badge green">✓ Fertig</span>
            </div>
            {j.description && (
              <div style={{ fontSize:13, marginTop:8, whiteSpace:"pre-wrap" }}>
                {j.description.slice(0,120)}{j.description.length > 120 ? "..." : ""}
              </div>
            )}
            {j.parts_note && (
              <div style={{ marginTop:6, fontSize:12, color:"rgba(255,165,0,0.75)" }}>
                📦 {j.parts_note.slice(0,80)}
              </div>
            )}
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:8, flexWrap:"wrap", gap:6 }}>
              <div className="meta">
                ⏱ {fmtMin(j.work_min || 0)} · 👤 {j.mechanic || ""}
                {j.cost ? " · 💶 " + Number(j.cost).toFixed(2) + " €" : ""}
              </div>
              {allUrls.length > 0 && (
                <button type="button"
                  style={{ border:"1px solid rgba(255,255,255,0.2)", background:"transparent", color:"rgba(255,255,255,0.7)", borderRadius:8, padding:"5px 10px", fontSize:12, fontWeight:700 }}
                  onClick={function(){ setPhotoJob(j); }}>
                  📷 {allUrls.length} Foto{allUrls.length !== 1 ? "s" : ""}
                </button>
              )}
            </div>
          </div>
        );
      })}

      {photoJob && (
        <div className="modal-back" onClick={function(){ setPhotoJob(null); }}>
          <div className="modal" style={{ maxHeight:"85vh", overflowY:"auto" }} onClick={function(e){ e.stopPropagation(); }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
              <div style={{ fontWeight:800, fontSize:17 }}>📷 Fotos — {photoJob.plate}</div>
              <button type="button" onClick={function(){ setPhotoJob(null); }}
                style={{ border:0, background:"transparent", color:"rgba(255,255,255,0.6)", fontSize:22, fontWeight:700 }}>×</button>
            </div>
            {normalizeUrls(photoJob.photo_urls).length > 0 && (
              <div>
                <div className="label-cap">Fotos vom Mechaniker</div>
                <div className="photo-grid">
                  {normalizeUrls(photoJob.photo_urls).map(function(u, i) {
                    return (
                      <a key={i} className="photo-thumb" href={u} target="_blank" rel="noreferrer">
                        <img src={u} alt="" />
                      </a>
                    );
                  })}
                </div>
              </div>
            )}
            {normalizeUrls(photoJob.incoming_photo_urls).length > 0 && (
              <div style={{ marginTop:14 }}>
                <div className="label-cap">Fotos vom Fahrer</div>
                <div className="photo-grid">
                  {normalizeUrls(photoJob.incoming_photo_urls).map(function(u, i) {
                    return (
                      <a key={i} className="photo-thumb" href={u} target="_blank" rel="noreferrer">
                        <img src={u} alt="" />
                      </a>
                    );
                  })}
                </div>
              </div>
            )}
            {normalizeUrls(photoJob.photo_urls).length === 0 && normalizeUrls(photoJob.incoming_photo_urls).length === 0 && (
              <div style={{ textAlign:"center", color:"rgba(255,255,255,0.5)", padding:20 }}>Keine Fotos</div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

    "Aufstieg Leiter vorhanden, Funktion",
    "Spanngurte vollzählig – 15 Stück"

  { id:5, title:"5. Luftfederung", items:[

    "Stoßdämpfer auf Dichtheit und Festsitz prüfen"
  ]},
  { id:6, title:"6. Bremsen", items:[
    "Bremsschläuche und Leitungen auf Beschädigungen prüfen",
    "Bremsbeläge auf Verschleiß prüfen",
    "Bremsscheiben auf Zustand / Verschleiß prüfen"
  ]}
];

function buildDuResults(sections) {
  var results = {};
  sections.forEach(function(sec) {
    sec.items.forEach(function(item) {
      results[sec.id + "__" + item] = { status:"", bemerkung:"" };
    });
  });
  return results;
}

function DUAuflieger({ user, vehicles, onRefresh, taskPrefill, onTaskConsumed }) {
  var _sview = useState("list"); var view = _sview[0]; var setView = _sview[1];
  var _slist = useState([]); var duList = _slist[0]; var setDuList = _slist[1];
  var _sloading = useState(false); var loading = _sloading[0]; var setLoading = _sloading[1];
  var _splate = useState(null); var plate = _splate[0]; var setPlate = _splate[1];
  var _skm = useState(""); var km = _skm[0]; var setKm = _skm[1];
  var _sresults = useState(buildDuResults(DU_SECTIONS)); var results = _sresults[0]; var setResults = _sresults[1];
  var _sergaenzt = useState(""); var ergaenzt = _sergaenzt[0]; var setErgaenzt = _sergaenzt[1];
  var _sbemerk = useState(""); var bemerk = _sbemerk[0]; var setBemerk = _sbemerk[1];
  var _ssaving = useState(false); var saving = _ssaving[0]; var setSaving = _ssaving[1];
  var _slink = useState(null); var taskLink = _slink[0]; var setTaskLink = _slink[1];

  useEffect(function() {
    loadList();
  }, []);

  // Пришли из задания (строка типа DU) — открываем форму сразу с предзаполненным прицепом
  useEffect(function() {
    if (taskPrefill && taskPrefill.plate) {
      setPlate({ plate: taskPrefill.plate });
      setKm(""); setResults(buildDuResults(DU_SECTIONS));
      setErgaenzt(""); setBemerk("");
      setTaskLink({ task_id: taskPrefill.task_id, task_row_index: taskPrefill.task_row_index });
      setView("form");
      if (onTaskConsumed) onTaskConsumed();
    }
  }, [taskPrefill ? (taskPrefill.task_id + "_" + taskPrefill.task_row_index) : null]);

  function loadList() {
    setLoading(true);
    sbSelect("inspections", "select=*&type=eq.du_auflieger&order=created_at.desc&limit=100")
      .then(function(r){ setDuList(r || []); setLoading(false); })
      .catch(function(){ setLoading(false); });
  }

  function setItemStatus(secId, item, status) {
    var key = secId + "__" + item;
    setResults(function(prev) {
      var next = Object.assign({}, prev);
      next[key] = Object.assign({}, prev[key], { status: status });
      return next;
    });
  }

  function setItemBemerk(secId, item, val) {
    var key = secId + "__" + item;
    setResults(function(prev) {
      var next = Object.assign({}, prev);
      next[key] = Object.assign({}, prev[key], { bemerkung: val });
      return next;
    });
  }

  function calcResult() {
    var hasNio = false;
    Object.keys(results).forEach(function(k) {
      if (results[k].status === "nio") hasNio = true;
    });
    var allSet = Object.keys(results).every(function(k) { return results[k].status !== ""; });
    if (!allSet) return "incomplete";
    return hasNio ? "passed_with_remarks" : "passed";
  }

  function exportPdf(insp) {
    var data = insp ? JSON.parse(insp.items_json || "{}") : results;
    var sectionsHtml = DU_SECTIONS.map(function(sec) {
      var rows = sec.items.map(function(item) {
        var key = sec.id + "__" + item;
        var r = data[key] || { status:"", bemerkung:"" };
        var io = r.status === "io" ? "✓" : "";
        var nio = r.status === "nio" ? "✓" : "";
        return "<tr><td style='padding:5px 8px;border-bottom:1px solid #eee;font-size:12px'>" + item + "</td>" +
          "<td style='padding:5px 8px;border-bottom:1px solid #eee;text-align:center;width:40px;font-size:14px'>" + io + "</td>" +
          "<td style='padding:5px 8px;border-bottom:1px solid #eee;text-align:center;width:40px;font-size:14px'>" + nio + "</td>" +
          "<td style='padding:5px 8px;border-bottom:1px solid #eee;font-size:11px;color:#666'>" + (r.bemerkung || "") + "</td></tr>";
      }).join("");
      return "<tr><td colspan='4' style='background:#0a1730;color:#fff;padding:7px 8px;font-weight:800;font-size:13px'>" + sec.title + "</td></tr>" + rows;
    }).join("");

    var pl = insp ? insp.plate : (plate ? plate.plate : "");
    var dt = insp ? insp.date : todayIso();
    var mech = insp ? insp.mechanic_name : (user ? user.name : "");
    var kmVal = insp ? insp.km_stand : km;
    var ergVal = insp ? insp.ergaenzt_ersetzt : ergaenzt;
    var bemVal = insp ? insp.bemerkungen : bemerk;

    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>DU Auflieger - " + pl + "</title>" +
      "<style>body{font-family:Arial,sans-serif;padding:20px;color:#222;font-size:13px}" +
      "h1{font-size:18px;margin-bottom:4px}h2{font-size:13px;color:#555;font-weight:normal;margin-bottom:16px}" +
      "table{width:100%;border-collapse:collapse;margin-bottom:16px}" +
      "th{background:#0a1730;color:#fff;padding:6px 8px;text-align:left;font-size:12px}" +
      ".header-row{display:flex;gap:24px;margin-bottom:16px;flex-wrap:wrap}" +
      ".header-field{flex:1;min-width:140px}" +
      ".header-label{font-size:10px;color:#888;text-transform:uppercase;margin-bottom:2px}" +
      ".header-value{font-size:14px;font-weight:700;border-bottom:1px solid #ccc;padding-bottom:3px}" +
      ".footer{margin-top:24px;padding-top:16px;border-top:1px solid #ccc;display:flex;gap:32px}" +
      ".sig-block{flex:1}" +
      ".sig-label{font-size:10px;color:#888;margin-bottom:20px}" +
      ".sig-line{border-bottom:1px solid #333;height:30px}" +
      "</style></head><body>" +
      "<h1>Fahrzeug Checkliste – Plan Auflieger</h1>" +
      "<div class='header-row'>" +
      "<div class='header-field'><div class='header-label'>Fahrzeug</div><div class='header-value'>" + pl + "</div></div>" +
      "<div class='header-field'><div class='header-label'>Datum</div><div class='header-value'>" + dt + "</div></div>" +
      "<div class='header-field'><div class='header-label'>KM-Stand</div><div class='header-value'>" + (kmVal || "—") + "</div></div>" +
      "<div class='header-field'><div class='header-label'>Mitarbeiter</div><div class='header-value'>" + mech + "</div></div>" +
      "</div>" +
      "<table><thead><tr><th>Prüfpunkt</th><th style='width:40px;text-align:center'>i.O.</th><th style='width:40px;text-align:center'>n.i.O.</th><th style='width:180px'>Bemerkung</th></tr></thead><tbody>" +
      sectionsHtml + "</tbody></table>" +
      (ergVal ? "<p><strong>Ergänzt / Ersetzt:</strong> " + ergVal + "</p>" : "") +
      (bemVal ? "<p><strong>Bemerkungen:</strong> " + bemVal + "</p>" : "") +
      "<div class='footer'>" +
      "<div class='sig-block'><div class='sig-label'>Name des Mitarbeiters (Klarschrift)</div><div class='sig-line'></div></div>" +
      "<div class='sig-block'><div class='sig-label'>Unterschrift Mitarbeiter</div><div class='sig-line'></div></div>" +
      "<div class='sig-block'><div class='sig-label'>Kontrolliert durch</div><div class='sig-line' style='padding-top:4px;font-weight:700'>" + mech + "</div></div>" +
      "</div>" +
      "<p style='font-size:10px;color:#aaa;margin-top:12px'>WerkFlow · Seite 1 von 1 · Stand: " + todayIso() + "</p>" +
      "</body></html>";

    var blob = new Blob([html], { type:"text/html" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "DU_Auflieger_" + pl + "_" + dt + ".html";
    a.click();
    URL.revokeObjectURL(url);
  }

  function save() {
    if (!plate || !plate.plate) { showToast("Bitte Fahrzeug auswählen."); return; }
    var res = calcResult();
    if (res === "incomplete") {
      if (!window.confirm("Nicht alle Punkte ausgefüllt. Trotzdem speichern?")) return;
    }
    setSaving(true);
    var id = genId("DU");
    var payload = {
      id: id,
      type: "du_auflieger",
      plate: plate.plate,
      date: todayIso(),
      km_stand: km || null,
      mechanic_id: user ? user.id : null,
      mechanic_name: user ? user.name : null,
      niederlassung_id: user ? user.niederlassung_id : null,
      tenant_id: "ltg",
      result: res === "incomplete" ? "passed_with_remarks" : res,
      bemerkungen: bemerk || null,
      ergaenzt_ersetzt: ergaenzt || null,
      kontrolliert_durch: user ? user.name : null,
      items_json: JSON.stringify(results),
      created_at: new Date().toISOString()
    };
    sbInsert("inspections", payload, true)
      .then(function() {
        // Если DU пришёл из задания — помечаем связанную строку выполненной
        if (taskLink && taskLink.task_id) {
          var tl = taskLink;
          return sbSelect("tasks", "select=*&id=eq." + encodeURIComponent(tl.task_id) + "&limit=1").then(function(res){
            var tk = res && res[0];
            if (!tk) return true;
            var items = (tk.items && tk.items.length) ? tk.items.slice() : [];
            var rIx = tl.task_row_index;
            if (typeof rIx === "number" && items[rIx]) {
              items[rIx] = Object.assign({}, items[rIx], { done: true, du_id: id });
            }
            var allDone = items.length > 0 && items.every(function(it){ return it.done; });
            var patch = { items: items, updated_at: new Date().toISOString() };
            if (allDone) { patch.status = "erledigt"; patch.done_at = new Date().toISOString(); }
            return sbPatch("tasks", tl.task_id, patch);
          });
        }
        return true;
      })
      .then(function() {
        setSaving(false);
        setTaskLink(null);
        exportPdf(payload);
        setPlate(null); setKm(""); setResults(buildDuResults(DU_SECTIONS));
        setErgaenzt(""); setBemerk(""); setView("list");
        loadList();
        if (onRefresh) onRefresh();
      })
      .catch(function(e) { setSaving(false); showToast("Fehler: " + (e.message || e)); });
  }

  if (view === "form") {
    return (
      <div>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
          <button type="button" className="outline-btn" style={{ padding:"8px 14px" }} onClick={function(){ setView("list"); }}>← Zurück</button>
          <div className="page-title" style={{ margin:0 }}>DU <span style={{ color:"#ffa500" }}>Auflieger</span></div>
        </div>

        <div className="glass-panel">
          <div className="label-cap">Fahrzeug (Auflieger)</div>
          <VehicleInput vehicles={vehicles} value={plate} onChange={setPlate} vehicleType="trailer" />
        </div>

        <div className="glass-panel">
          <div className="label-cap">KM-Stand</div>
          <input className="input-dark" value={km} placeholder="z.B. 245000"
            onChange={function(e){ setKm(e.target.value.replace(/\D/g,"")); }} />
        </div>

        {DU_SECTIONS.map(function(sec) {
          return (
            <div key={sec.id} className="glass-panel">
              <div style={{ fontWeight:800, fontSize:13, color:"#ffa500", marginBottom:10, letterSpacing:0.5 }}>{sec.title}</div>
              {sec.items.map(function(item) {
                var key = sec.id + "__" + item;
                var r = results[key] || { status:"", bemerkung:"" };
                return (
                  <div key={item} style={{ marginBottom:12, paddingBottom:12, borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                    <div style={{ fontSize:13, color:"rgba(255,255,255,0.85)", marginBottom:6 }}>{item}</div>
                    <div style={{ display:"flex", gap:8, marginBottom: r.status === "nio" ? 6 : 0 }}>
                      <button type="button"
                        style={{ flex:1, padding:"8px 0", borderRadius:9, border:"1px solid", fontWeight:700, fontSize:12,
                          borderColor: r.status === "io" ? "#22c55e" : "rgba(255,255,255,0.2)",
                          background: r.status === "io" ? "rgba(34,197,94,0.15)" : "transparent",
                          color: r.status === "io" ? "#22c55e" : "rgba(255,255,255,0.6)" }}
                        onClick={function(){ setItemStatus(sec.id, item, r.status === "io" ? "" : "io"); }}>
                        i.O.
                      </button>
                      <button type="button"
                        style={{ flex:1, padding:"8px 0", borderRadius:9, border:"1px solid", fontWeight:700, fontSize:12,
                          borderColor: r.status === "nio" ? "#ef4444" : "rgba(255,255,255,0.2)",
                          background: r.status === "nio" ? "rgba(239,68,68,0.15)" : "transparent",
                          color: r.status === "nio" ? "#ef4444" : "rgba(255,255,255,0.6)" }}
                        onClick={function(){ setItemStatus(sec.id, item, r.status === "nio" ? "" : "nio"); }}>
                        n.i.O.
                      </button>
                    </div>
                    {r.status === "nio" && (
                      <input className="input-dark" style={{ fontSize:12, padding:"8px 12px" }}
                        value={r.bemerkung} placeholder="Bemerkung..."
                        onChange={function(e){ setItemBemerk(sec.id, item, e.target.value); }} />
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}

        <div className="glass-panel">
          <div className="label-cap">Ergänzt / Ersetzt</div>
          <textarea className="textarea-dark" value={ergaenzt} placeholder="Was wurde ergänzt oder ersetzt?"
            onChange={function(e){ setErgaenzt(e.target.value); }} style={{ minHeight:64 }} />
        </div>

        <div className="glass-panel">
          <div className="label-cap">Allgemeine Bemerkungen</div>
          <textarea className="textarea-dark" value={bemerk} placeholder="Weitere Bemerkungen..."
            onChange={function(e){ setBemerk(e.target.value); }} style={{ minHeight:64 }} />
        </div>

        <div className="glass-panel" style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>
          Kontrolliert durch: <strong style={{ color:"#fff" }}>{user ? user.name : ""}</strong>
        </div>

        <button className="btn-primary" type="button" disabled={saving}
          onClick={save} style={{ marginBottom:100 }}>
          {saving ? "Speichert..." : "💾 Speichern + PDF exportieren"}
        </button>
      </div>
    );
  }

  // LIST VIEW
  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
        <div className="page-title" style={{ margin:0 }}>DU <span style={{ color:"#ffa500" }}>Auflieger</span></div>
        <button className="btn-primary" type="button" style={{ padding:"10px 18px", fontSize:13 }}
          onClick={function(){ setResults(buildDuResults(DU_SECTIONS)); setPlate(null); setKm(""); setErgaenzt(""); setBemerk(""); setView("form"); }}>
          + Neue Prüfung
        </button>
      </div>

      {loading && <div style={{ textAlign:"center", color:"rgba(255,255,255,0.5)", padding:32 }}>Lädt...</div>}
      {!loading && duList.length === 0 && (
        <div className="glass-panel" style={{ textAlign:"center", color:"rgba(255,255,255,0.5)", padding:32 }}>
          Noch keine DU-Prüfungen. Erste Prüfung starten!
        </div>
      )}
      {duList.map(function(insp) {
        var resColor = insp.result === "passed" ? "#22c55e" : insp.result === "passed_with_remarks" ? "#ffa500" : "#ef4444";
        var resLabel = insp.result === "passed" ? "✓ Bestanden" : insp.result === "passed_with_remarks" ? "⚠ Mit Mängeln" : "✗ Nicht bestanden";
        return (
          <div key={insp.id} className="glass-panel" style={{ marginBottom:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
              <div>
                <div style={{ fontWeight:800, fontSize:15 }}>{insp.plate}</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)", marginTop:2 }}>
                  {dateDMY(insp.date)} · {insp.mechanic_name || "—"}
                  {insp.km_stand ? " · " + insp.km_stand + " km" : ""}
                </div>
              </div>
              <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6 }}>
                <span style={{ fontSize:11, fontWeight:800, color:resColor }}>{resLabel}</span>
                <button type="button"
                  style={{ fontSize:11, padding:"5px 10px", borderRadius:8, border:"1px solid rgba(255,165,0,0.4)", background:"rgba(255,165,0,0.08)", color:"#ffa500", fontWeight:700 }}
                  onClick={function(){ exportPdf(insp); }}>
                  📄 PDF
                </button>
              </div>
            </div>
            {insp.bemerkungen && (
              <div style={{ marginTop:8, fontSize:12, color:"rgba(255,255,255,0.55)" }}>{insp.bemerkungen}</div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function BottomNav({ tab, setTab, alertCount }) {

// Тумблер push-уведомлений для текущего устройства.
// Управляет полем enabled в push_subscriptions (отпуск/ночь — механик сам выключает).
function PushToggle({ user }) {
  var _st = useState("loading"); var state = _st[0]; var setState = _st[1];
  // state: loading | on | off | unsupported | nosub | busy

  function readState() {
    if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
      setState("unsupported"); return;
    }
    navigator.serviceWorker.ready.then(function(reg){
      return reg.pushManager.getSubscription();
    }).then(function(subObj){
      if (!subObj) { setState("nosub"); return; }
      var ep = subObj.endpoint;
      // Читаем текущее enabled из БД
      fetch(SB_URL + "/rest/v1/push_subscriptions?endpoint=eq." + encodeURIComponent(ep) + "&select=enabled", {
        headers:{ "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY }
      }).then(function(r){ return r.json(); }).then(function(rows){
        if (Array.isArray(rows) && rows.length && rows[0].enabled === false) setState("off");
        else setState("on");
      }).catch(function(){ setState("on"); });
    }).catch(function(){ setState("nosub"); });
  }

  useEffect(function(){ readState(); }, []);

  function toggle() {
    if (state === "busy") return;
    var target = state === "on" ? false : true;
    setState("busy");
    navigator.serviceWorker.ready.then(function(reg){
      return reg.pushManager.getSubscription();
    }).then(function(subObj){
      if (!subObj) {
        // Подписки нет — пробуем подписаться заново (включение)
        if (target === true && typeof pushSubscribe === "function") {
          return pushSubscribe({
            userId: user.id, userName: user.name,
            role: user.role || "mechaniker",
            niederlassungId: user.niederlassung_id || null,
            app: "werkstatt"
          }).then(function(){ setState("on"); });
        }
        setState("nosub"); return;
      }
      var ep = subObj.endpoint;
      return fetch(SB_URL + "/rest/v1/push_subscriptions?endpoint=eq." + encodeURIComponent(ep), {
        method:"PATCH",
        headers:{ "Content-Type":"application/json", "apikey":SB_KEY,
          "Authorization":"Bearer " + SB_KEY, "Prefer":"return=minimal" },
        body: JSON.stringify({ enabled: target })
      }).then(function(r){
        if (r.ok) setState(target ? "on" : "off");
        else setState(target ? "off" : "on");
      });
    }).catch(function(){ readState(); });
  }

  var isOn = state === "on";
  var label, desc;
  if (state === "loading") { label = "Benachrichtigungen"; desc = "Lädt..."; }
  else if (state === "unsupported") { label = "Benachrichtigungen"; desc = "Auf diesem Gerät nicht verfügbar"; }
  else if (state === "nosub") { label = "Benachrichtigungen"; desc = "Tippen zum Aktivieren"; }
  else if (state === "off") { label = "Benachrichtigungen aus"; desc = "Du erhältst keine Push-Meldungen (z.B. Urlaub)"; }
  else { label = "Benachrichtigungen an"; desc = "Neue Aufträge kommen als Push"; }

  var disabled = (state === "loading" || state === "unsupported" || state === "busy");

  return (
    <div style={{ marginTop:10, padding:"18px 20px", borderRadius:14,
      background:"var(--bg-card)", border:"1px solid var(--border)",
      display:"flex", alignItems:"center", gap:16 }}>
      <div style={{ color: isOn ? "var(--accent)" : "var(--text-muted)", flexShrink:0 }}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontFamily:"var(--font-display)", fontWeight:700, fontSize:16, letterSpacing:0.5 }}>{label}</div>
        <div style={{ fontSize:13, color:"var(--text-muted)", marginTop:2 }}>{desc}</div>
      </div>
      {(state === "on" || state === "off" || state === "busy" || state === "nosub") && (
        <button type="button" onClick={toggle} disabled={disabled}
          style={{ flexShrink:0, width:54, height:30, borderRadius:15, border:0,
            background: isOn ? "var(--accent)" : "rgba(255,255,255,0.15)",
            position:"relative", cursor: disabled ? "default" : "pointer",
            transition:"background 0.2s", opacity: state === "busy" ? 0.5 : 1 }}>
          <span style={{ position:"absolute", top:3, left: isOn ? 27 : 3,
            width:24, height:24, borderRadius:"50%", background:"#fff",
            transition:"left 0.2s" }}></span>
        </button>
      )}
    </div>
  );
}

// === APP SHELL ===
function AppShell({ user, onLogout }) {
  var _stab = useState("new"); var tab = _stab[0]; var setTab = _stab[1];
  var _sjobs = useState([]); var jobs = _sjobs[0]; var setJobs = _sjobs[1];
  var _salerts = useState([]); var alerts = _salerts[0]; var setAlerts = _salerts[1];
  var _stasks = useState([]); var tasks = _stasks[0]; var setTasks = _stasks[1];
  var _svehicles = useState([]); var vehicles = _svehicles[0]; var setVehicles = _svehicles[1];
  var _sstock = useState([]); var stock = _sstock[0]; var setStock = _sstock[1];
  var _susers = useState([]); var dbUsers = _susers[0]; var setDbUsers = _susers[1];
  var _slocs = useState([]); var dbLocations = _slocs[0]; var setDbLocations = _slocs[1];
  var _sloading = useState(false); var loading = _sloading[0]; var setLoading = _sloading[1];
  var _sprefill = useState(null); var prefill = _sprefill[0]; var setPrefill = _sprefill[1];
  var _sduPre = useState(null); var duTaskPrefill = _sduPre[0]; var setDuTaskPrefill = _sduPre[1];
  var _sdbOk = useState(null); var dbOk = _sdbOk[0]; var setDbOk = _sdbOk[1];
  var _ssos = useState(null); var sosAlert = _ssos[0]; var setSosAlert = _ssos[1];
  var prevAlertCount = useRef(0);
  var wsRef = useRef(null);

  function loadAll() {
    setLoading(true);
    var nied = (user && user.niederlassung_id) ? user.niederlassung_id : "__none__";
    var stockQ = "select=*&niederlassung_id=eq." + encodeURIComponent(nied) + "&order=name.asc&limit=200";
    var locsQ  = "select=*&niederlassung_id=eq." + encodeURIComponent(nied) + "&order=sort_order.asc,name.asc";
    var alertsQ = "select=*&order=created_at.desc&limit=100";
    Promise.all([
      sbSelect("jobs","select=*&order=created_at.desc&limit=300"),
      sbSelect("alerts", alertsQ),
      sbSelect("vehicles","select=*&order=plate.asc&limit=500"),
      sbSelect("stock", stockQ),
      sbSelect("users","select=*"),
      sbSelect("niederlassung_locations", locsQ),
      sbSelect("tasks","select=*&assignee_role=eq.mechaniker&order=created_at.desc&limit=300")
    ]).then(function(results) {
      setJobs(results[0]);
      var rawAlerts = results[1].map(function(a){ return Object.assign({},a,{photo_urls:normalizeUrls(a.photo_urls)}); });
      var myAlerts = rawAlerts.filter(function(a){
        return !a.target_workshop_niederlassung_id || a.target_workshop_niederlassung_id === nied;
      });
      var newOpen = myAlerts.filter(function(a){ return a.status !== "done" && a.status !== "rejected"; });
      if (newOpen.length > prevAlertCount.current && prevAlertCount.current >= 0) {
        playAlertSound();
      }
      prevAlertCount.current = newOpen.length;
      setAlerts(myAlerts);
      setVehicles(results[2]);
      setStock(results[3]);
      if (results[4] && results[4].length) setDbUsers(results[4]);
      if (results[5] && results[5].length) setDbLocations(results[5].map(function(l){ return l.name; }));
      setTasks(results[6] || []);
      setDbOk(true); setLoading(false);
    }).catch(function(e) {
      console.error(e); setDbOk(false); setLoading(false);
    });
  }

  // Реакция на потерю/возврат сети
  useEffect(function() {
    function onOnline() { loadAll(); }
    function onOffline() { setDbOk(false); }
    window.addEventListener("online", onOnline);
    window.addEventListener("offline", onOffline);
    return function(){
      window.removeEventListener("online", onOnline);
      window.removeEventListener("offline", onOffline);
    };
  }, []);

  // Realtime подписка на alerts (с heartbeat и переподключением)
  useEffect(function() {
    loadAll();

    var hbTimer = null;     // интервал отправки heartbeat
    var reconnectTimer = null;
    var refCounter = 1;
    var stopped = false;    // флаг чтобы при unmount не пытаться переподключиться

    function connect() {
      if (stopped) return;
      try {
        var wsUrl = SB_URL.replace("https://","wss://") + "/realtime/v1/websocket?apikey=" + SB_KEY + "&vsn=1.0.0";
        var ws = new WebSocket(wsUrl);
        wsRef.current = ws;

        ws.onopen = function() {
          // Подписываемся на alerts и jobs
          ws.send(JSON.stringify({ topic:"realtime:public:alerts", event:"phx_join", payload:{}, ref:String(refCounter++) }));
          ws.send(JSON.stringify({ topic:"realtime:public:jobs", event:"phx_join", payload:{}, ref:String(refCounter++) }));
          // Heartbeat каждые 25 сек
          if (hbTimer) clearInterval(hbTimer);
          hbTimer = setInterval(function(){
            try {
              if (ws.readyState === 1) {
                ws.send(JSON.stringify({ topic:"phoenix", event:"heartbeat", payload:{}, ref:String(refCounter++) }));
              }
            } catch(e) {}
          }, 25000);
        };

        ws.onmessage = function(e) {
          try {
            var msg = JSON.parse(e.data);
            if (msg.event === "INSERT" || msg.event === "UPDATE") {
              playAlertSound();
              loadAll();
            }
          } catch(err) {}
        };

        ws.onerror = function() {};

        ws.onclose = function() {
          if (hbTimer) { clearInterval(hbTimer); hbTimer = null; }
          // Автоматическое переподключение через 3 сек, если компонент ещё жив.
          if (!stopped) {
            if (reconnectTimer) clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(connect, 3000);
          }
        };
      } catch(e) {}
    }

    connect();

    // Fallback: polling каждые 30 сек на случай если WS совсем не работает
    var poll = setInterval(function() { loadAll(); }, 30000);

    return function() {
      stopped = true;
      clearInterval(poll);
      if (hbTimer) clearInterval(hbTimer);
      if (reconnectTimer) clearTimeout(reconnectTimer);
      try { if (wsRef.current) wsRef.current.close(); } catch(e) {}
    };
  }, []);

  // Ставка текущего механика
  var myRate = 0;
  var dbUser = dbUsers.find(function(u){ return u.id === user.id; });
  if (dbUser && dbUser.rate_per_hour) myRate = Number(dbUser.rate_per_hour) || 0;

  var openAlerts = alerts.filter(function(a) { return a.status !== "done" && a.status !== "rejected" && a.status !== "inProgress"; });
  var openTaskCount = (tasks || []).filter(function(t){ return t.status !== "erledigt"; }).length;
  var eingangBadge = openAlerts.length + openTaskCount;

  function createFromAlert(a) {
    // Сразу открываем форму заказа с предзаполненными данными из заявки.
    // Промежуточный SOS-экран убран — он был лишним шагом.
    var isEmergency = (a.type === "unfall" || a.type === "sos" ||
                       a.work_type === "emergency" || a.work_type === "notruf");
    var p = Object.assign({}, a, {
      vehicle_type: a.vehicle_type || a.vehicleType || "truck",
      work_type: isEmergency ? "emergency" : (a.work_type || "repair"),
      photo_urls: normalizeUrls(a.photo_urls)
    });
    setPrefill(p);
    setTab("new");
  }

  // Задача → заказ: предзаполняем форму, описание = пункты чек-листа.
  // task_id связывает заказ с задачей — при сохранении заказа задача станет erledigt.
  function createFromTask(t, ix) {
    var items = (t.items && t.items.length) ? t.items : [{ plate:t.plate||"", text:t.title||"", vehicle_type:"truck" }];
    var row = items[ix] || items[0];
    var vt = row.vehicle_type === "stapler" ? "stapler"
           : row.vehicle_type === "trailer" ? "trailer"
           : "truck";
    var p = {
      plate: row.plate || "",
      vehicle_type: vt,
      work_type: "repair",
      description: row.text || "",
      location: "Werkstatt",
      photo_urls: [],
      task_id: t.id,
      task_row_index: ix
    };
    setPrefill(p);
    setTab("new");
  }

  // Строка типа DU из задания → открываем форму DU-проверки с предзаполненным прицепом.
  // duTaskPrefill сообщает DUAuflieger: открыть форму сразу + при сохранении пометить строку задачи.
  function createDUFromTask(t, ix) {
    var items2 = (t.items && t.items.length) ? t.items : [{ plate:t.plate||"", text:t.title||"" }];
    var row2 = items2[ix] || items2[0];
    setDuTaskPrefill({
      plate: row2.plate || "",
      task_id: t.id,
      task_row_index: ix
    });
    setTab("du");
  }

  function acceptSos(a) {
    setSosAlert(null);
    var p = Object.assign({}, a, {
      vehicle_type: a.vehicle_type || a.vehicleType || "truck",
      work_type: "emergency",
      photo_urls: normalizeUrls(a.photo_urls)
    });
    setPrefill(p);
    setTab("new");
  }

  return (
    <div style={{ position:"relative", minHeight:"100vh", minHeight:"100dvh", maxWidth:480, margin:"0 auto" }}>
      <Bg />
      {dbOk === false && (
        <div onClick={function(){ loadAll(); }}
          style={{ position:"fixed", top:0, left:0, right:0, zIndex:9998,
            maxWidth:480, margin:"0 auto",
            background:"linear-gradient(90deg, #b91c1c, #dc2626)", color:"#fff",
            padding:"11px 16px", display:"flex", alignItems:"center", justifyContent:"center",
            gap:10, fontSize:13, fontWeight:700, cursor:"pointer",
            boxShadow:"0 4px 18px rgba(0,0,0,0.4)" }}>
          <span style={{ fontSize:16 }}>⚠</span>
          <span>Keine Verbindung — Internet prüfen</span>
          <span style={{ padding:"3px 10px", borderRadius:7, background:"rgba(255,255,255,0.2)", fontSize:12, fontWeight:800 }}>
            ↻
          </span>
        </div>
      )}
      <div className="app-wrap">
        <div className="app-top">
          <div>
            <Logo small={true} />
            <div style={{ color:"#ffa500", fontSize:18, fontWeight:900, marginTop:2 }}>Werkstatt</div>
          </div>
          <div className="user-pill">
            <div className="status-dot" style={{ background: dbOk === false ? "#ff3b30" : dbOk === true ? "#22c55e" : "#ffa500" }}></div>
            <span style={{ fontSize:12, fontWeight:700 }}>{user.name}</span>
            <button type="button" onClick={onLogout} style={{ border:0, background:"rgba(255,255,255,0.08)", color:"#fff", padding:"5px 8px", borderRadius:9, fontSize:12, fontWeight:700 }}>↩</button>
          </div>
        </div>

        {openAlerts.length > 0 && tab !== "eingang" && (
          <div className="emergency-strip" onClick={function(){ setTab("eingang"); }}>
            <div style={{ fontSize:20 }}>🚨</div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontWeight:800, fontSize:14 }}>
                {openAlerts.length === 1 ? "Neue Meldung — tippen zum Bearbeiten" : "Neue Meldungen: " + openAlerts.length + " — tippen"}
              </div>
              <div className="meta" style={{ whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                {openAlerts[0].plate || ""}{openAlerts[0].description ? " · " + openAlerts[0].description.slice(0,40) : ""}
              </div>
            </div>
            <div className="emergency-count">{openAlerts.length}</div>
          </div>
        )}

      {sosAlert && (
        <SOSScreen
          alert={sosAlert}
          vehicles={vehicles}
          onAccept={acceptSos}
          onBack={function(){ setSosAlert(null); }}
        />
      )}

        {tab === "new" && (
          <NewJob vehicles={vehicles} setVehicles={setVehicles}
            user={user} userRate={myRate}
            prefill={prefill}
            jobs={jobs}
            locations={dbLocations}
            dbUsers={dbUsers}
            stock={stock}
            onClear={function(){ setPrefill(null); }}
            onSaved={function(){ loadAll(); setTab("jobs"); }}
          />
        )}
        {tab === "eingang" && (
          <Eingang alerts={alerts} tasks={tasks} user={user} onCreate={createFromAlert} onTaskToJob={createFromTask} onTaskToDU={createDUFromTask} loading={loading} onRefresh={loadAll} />
        )}
        {tab === "jobs" && (
          <MeineAuftraege jobs={jobs} user={user} onRefresh={loadAll} loading={loading}
            onContinueJob={function(job){
              // Открыть отложенный заказ обратно в Auftrag для продолжения
              var p = Object.assign({}, job, {
                continueJobId: job.id,
                vehicle_type: job.vehicle_type || "truck",
                photo_urls: job.photo_urls
              });
              setPrefill(p);
              setTab("new");
            }}
          />
        )}
        {tab === "lager" && (
          <Lager stock={stock} loading={loading} onRefresh={loadAll} />
        )}
        {tab === "du" && (
          <DUAuflieger user={user} vehicles={vehicles} onRefresh={loadAll}
            taskPrefill={duTaskPrefill} onTaskConsumed={function(){ setDuTaskPrefill(null); }} />
        )}
        {tab === "archiv" && (
          <Archiv jobs={jobs} user={user} />
        )}
        {tab === "settings" && (
          <Einstellungen stock={stock} jobs={jobs} user={user} loading={loading} onRefresh={loadAll} onLogout={onLogout} />
        )}
      </div>
      <BottomNav tab={tab} setTab={setTab} alertCount={eingangBadge} />
    </div>
  );
}

// === ROOT APP ===
function App() {
  var _sstage = useState("loading"); var stage = _sstage[0]; var setStage = _sstage[1];
  var _sname = useState(""); var savedName = _sname[0]; var setSavedName = _sname[1];
  var _suser = useState(null); var user = _suser[0]; var setUser = _suser[1];
  var _salerts = useState([]); var alerts = _salerts[0]; var setAlerts = _salerts[1];
  var _users = useState([]); var dbUsers = _users[0]; var setDbUsers = _users[1];
  var _fb = useState(null); var fbPin = _fb[0]; var setFbPin = _fb[1];

  // Подписка на push-уведомления после входа (механики получают пуш о новых заявках)
  useEffect(function(){
    if (!user || !user.id) return;
    var t = setTimeout(function(){
      pushSubscribe({
        userId: user.id,
        userName: user.name,
        role: user.role || "mechaniker",
        niederlassungId: user.niederlassung_id || null,
        app: "werkstatt"
      });
    }, 3000);
    return function(){ clearTimeout(t); };
  }, [user]);

  // Логин по персональному PIN — данные из public.users
  function loginPersonal(u){
    var sessUser = {
      id: u.id, name: u.name, avatar: u.avatar || "??",
      role: u.role, niederlassung_id: u.niederlassung_id, scope_level: u.scope_level,
      app_access: u.app_access||[], tenant_id: "ltg"
    };
    try { localStorage.setItem(SESSION_KEY, JSON.stringify(sessUser)); } catch(e) {}
    fetch(SB_URL+"/rest/v1/users?id=eq."+encodeURIComponent(u.id), {
      method:"PATCH",
      headers:{ "Content-Type":"application/json", "apikey":SB_KEY, "Authorization":"Bearer "+SB_KEY, "Prefer":"return=minimal" },
      body:JSON.stringify({ last_login: new Date().toISOString() })
    }).catch(function(){});
    setSavedName(u.name);
    setUser(sessUser);
    setStage("slider");
  }

  // Запись/обновление пользователя в public.users (по образцу fahrer.registerOrUpdateDriver)
  function registerOrUpdateUser(fullName, niedId, fallbackUserId) {
    if (!fullName) return;
    var avatar = fullName.trim().split(/\s+/).map(function(w){ return (w[0]||"").toUpperCase(); }).join("").slice(0,2);
    var nameLower = fullName.trim().toLowerCase();
    sbSelect("users", "select=id,name,niederlassung_id&active=eq.true").then(function(rows) {
      var existing = (rows || []).find(function(u) {
        return (u.name || "").trim().toLowerCase() === nameLower;
      });
      if (existing) {
        fetch(SB_URL+"/rest/v1/users?id=eq."+encodeURIComponent(existing.id), {
          method:"PATCH",
          headers:{ "Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal" },
          body:JSON.stringify({ last_login: new Date().toISOString(), active: true,
            niederlassung_id: niedId || existing.niederlassung_id || "hockenheim" })
        }).catch(function(){});
      } else {
        fetch(SB_URL+"/rest/v1/users", {
          method:"POST",
          headers:{ "Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=minimal,resolution=merge-duplicates" },
          body:JSON.stringify({
            id: fallbackUserId, name: fullName, avatar: avatar,
            role: "mechaniker", tenant_id: "ltg",
            niederlassung_id: niedId || "hockenheim",
            scope_level: "niederlassung",
            active: true, app_access: ["werkstatt"],
            last_login: new Date().toISOString()
          })
        }).catch(function(){});
      }
    }).catch(function(){});
  }

  // Fallback PIN — старая логика: ввод имени, попытка распознать по локальному USERS
  function loginFallback(fullName, nied) {
    var niedId = nied || "hockenheim";
    var avatar = fullName.split(" ").map(function(w){ return w[0] || ""; }).join("").slice(0,2).toUpperCase() || "WK";
    var knownUser = USERS.find(function(u){ return fullName.toLowerCase().indexOf(u.id) !== -1; });
    var u = knownUser
      ? { id: knownUser.id, name: fullName, avatar: knownUser.avatar||avatar,
          role:"mechaniker", niederlassung_id: niedId, scope_level:"niederlassung",
          app_access:["werkstatt"], tenant_id:"ltg" }
      : { id:genId("wk_"), name:fullName, avatar:avatar,
          role:"mechaniker", niederlassung_id: niedId, scope_level:"niederlassung",
          app_access:["werkstatt"], tenant_id:"ltg" };
    try { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); } catch(e) {}
    registerOrUpdateUser(fullName, niedId, u.id);
    setSavedName(fullName);
    setUser(u);
    setStage("slider");
  }

  useEffect(function() {
    sbSelect("alerts","select=*&order=created_at.desc&limit=30")
      .then(function(a){ setAlerts(a.map(function(x){ return Object.assign({},x,{photo_urls:normalizeUrls(x.photo_urls)}); })); })
      .catch(function(){});

    sbSelect("users","active=eq.true&select=id,name,avatar,role,niederlassung_id,scope_level,pin,app_access").then(function(r){
      setDbUsers(r||[]);
    }).catch(function(){ setDbUsers([]); });
    sbSelect("app_settings","key=eq.werkstatt_fallback_pin&select=value").then(function(r){
      if (r && r.length && r[0].value) setFbPin(r[0].value);
    }).catch(function(){});

    try {
      var saved = localStorage.getItem(SESSION_KEY);
      if (saved) {
        var u = JSON.parse(saved);
        if (u && u.name) {
          // Старая сессия без niederlassung_id — форсим релогин
          if (!u.niederlassung_id) {
            try { localStorage.removeItem(SESSION_KEY); } catch(e2) {}
          } else {
            setSavedName(u.name);
            setUser(u);
            setStage("slider");
            return;
          }
        }
      }
    } catch(e) {}
    setStage("pin");
  }, []);

  if (stage === "loading") {
    return (
      <div className="scrn" style={{ alignItems:"center", justifyContent:"center" }}>
        <Bg />
        <div style={{ position:"relative", zIndex:2 }}><Logo /></div>
      </div>
    );
  }

  if (stage === "pin") {
    return (
      <PinScreen
        users={dbUsers}
        fallbackPin={fbPin}
        hideBack={true}
        onPersonal={loginPersonal}
        onFallback={function(){ setStage("register"); }}
      />
    );
  }

  // ErsteAnmeldung теперь только после fallback PIN
  if (stage === "register") {
    return (
      <ErsteAnmeldung onContinue={function(v, n, nied) {
        loginFallback(v + " " + n, nied);
      }} />
    );
  }

  if (stage === "slider") {
    return (
      <SliderScreen
        userName={savedName}
        alerts={alerts}
        onUnlock={function(){ setStage("app"); }}
        onChangeUser={function() {
          try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
          try { localStorage.removeItem(DRAFT_KEY); } catch(e) {}
          setSavedName(""); setUser(null); setStage("pin");
        }}
      />
    );
  }

  if (stage === "app" && user) {
    return (
      <AppShell
        user={user}
        onLogout={function() {
          setStage("slider");
        }}
      />
    );
  }

  return null;
}

// === ErrorBoundary — ловит падения React-компонентов и показывает экран вместо белого экрана ===
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, errorMsg: "" };
  }
  static getDerivedStateFromError(err) {
    return { hasError: true, errorMsg: (err && err.message) ? err.message : String(err) };
  }
  componentDidCatch(err, info) {
    console.error("App crash:", err, info);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement("div", {
        style: {
          minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
          background:"#0a0a0a", color:"#fff", padding:24, fontFamily:"system-ui,sans-serif"
        }
      },
        React.createElement("div", { style:{ maxWidth:400, textAlign:"center" } },
          React.createElement("div", { style:{ fontSize:48, marginBottom:16 } }, "⚠️"),
          React.createElement("div", { style:{ fontSize:20, fontWeight:700, marginBottom:8 } }, "Etwas ist schiefgelaufen"),
          React.createElement("div", { style:{ fontSize:13, color:"rgba(255,255,255,0.6)", marginBottom:20, wordBreak:"break-word" } }, this.state.errorMsg),
          React.createElement("button", {
            onClick: function(){ window.location.reload(); },
            style: {
              background:"#ffa500", color:"#000", border:"none", padding:"12px 24px",
              borderRadius:10, fontWeight:800, fontSize:14, cursor:"pointer"
            }
          }, "🔄 App neu laden")
        )
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
</script>
