function todayIso() { return new Date().toISOString().slice(0,10); }
function timeHM(x) {
  try { return new Date(x).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}); }
  catch(e) { return ""; }
}
function dateDMY(x) {
  try { return new Date(x).toLocaleDateString("de-DE"); }
  catch(e) { return x || ""; }
}
function fmtMin(m) {
  m = parseInt(m || 0, 10) || 0;
  if (!m) return "0 min";
  var h = Math.floor(m / 60);
  var mm = m % 60;
  return h ? h + "h " + mm + "min" : mm + " min";
}
function fmtSec(s) {
  s = parseInt(s || 0, 10) || 0;
  var h = Math.floor(s / 3600);
  var mn = Math.floor((s % 3600) / 60);
  var sec = s % 60;
  return h
    ? h + ":" + String(mn).padStart(2,"0") + ":" + String(sec).padStart(2,"0")
    : String(mn).padStart(2,"0") + ":" + String(sec).padStart(2,"0");
}
function labelFrom(list, value) {
  var row = list.find(function(x) { return x[0] === value; });
  return row ? row[1] : (value || "");
}
function normalizeUrls(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v.filter(Boolean);
  if (typeof v === "string") {
    try {
      var p = JSON.parse(v);
      return Array.isArray(p) ? p.filter(Boolean) : [];
    } catch(e) { return v ? [v] : []; }
  }
  return [];
}

// === Supabase API (только .then/.catch) ===
function sbSelect(table, query) {
  var url = SB_URL + "/rest/v1/" + table + (query ? "?" + query : "");
  return fetch(url, {
    headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
  }).then(function(res) {
    if (!res.ok) return res.text().then(function(t) { throw new Error(table + ": " + t); });
    return res.json();
  }).then(function(json) { return Array.isArray(json) ? json : []; });
}

function sbInsert(table, payload, minimal) {
  return fetch(SB_URL + "/rest/v1/" + table, {
    method:"POST",
    headers: {
      "Content-Type":"application/json",
      "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY,
      "Prefer": minimal ? "return=minimal" : "return=representation"
    },
    body: JSON.stringify(payload)
  }).then(function(res) {
    if (!res.ok) return res.text().then(function(t) { throw new Error(table + " insert: " + t); });
    return minimal ? true : res.json();
  });
}

function sbPatch(table, id, payload) {
  return fetch(SB_URL + "/rest/v1/" + table + "?id=eq." + encodeURIComponent(id), {
    method:"PATCH",
    headers: {
      "Content-Type":"application/json",
      "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY,
      "Prefer":"return=minimal"
    },
    body: JSON.stringify(payload)
  }).then(function(res) {
    if (!res.ok) return res.text().then(function(t) { throw new Error(table + " patch: " + t); });
    return true;
  });
}

function sbUploadPhoto(path, file) {
  return fetch(SB_URL + "/storage/v1/object/inspection-photos/" + path, {
    method:"POST",
    headers: {
      "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY,
      "Content-Type": file.type || "image/jpeg", "x-upsert":"true"
    },
    body: file
  }).then(function(res) {
    if (!res.ok) return null;
    return SB_URL + "/storage/v1/object/public/inspection-photos/" + path;
  }).catch(function() { return null; });
}

function uploadAllPhotos(jobId, photos) {
  if (!photos || !photos.length) return Promise.resolve([]);
  var promises = photos.map(function(p, i) {
    if (!p.file) return Promise.resolve(null);
    var ext = (p.file.name || "photo.jpg").split(".").pop() || "jpg";
    var path = "jobs/" + jobId + "/" + Date.now() + "_" + i + "." + ext;
    return sbUploadPhoto(path, p.file);
  });
  return Promise.all(promises).then(function(urls) { return urls.filter(Boolean); });
}

function ensureVehicle(vehicle, vehicles, setVehicles) {
  if (!vehicle || !vehicle.plate) return Promise.resolve(null);
  var exists = (vehicles || []).find(function(v) {
    return (v.plate || "").toLowerCase() === vehicle.plate.toLowerCase();
  });
  if (exists) return Promise.resolve(exists);
  var row = {
    id:"V" + Date.now(), plate:vehicle.plate, brand:vehicle.brand || "",
    type:vehicle.type || "other", created_at:new Date().toISOString()
  };
  return sbInsert("vehicles", row, true).then(function() {
    setVehicles(function(prev) { return [row].concat(prev || []); });
    return row;
  }).catch(function(e) { console.warn("vehicle insert:", e); return null; });
}

// === Звук алерта (Web Audio API, без файлов) ===
function playAlertSound() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.18, 0.36].forEach(function(t) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = "sine";
      gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.15);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.15);
    });
  } catch(e) {}
}

    return j.mechanic === (user && user.id) &&
      (j.date || (j.created_at || "").slice(0,10)) === todayIso();
  });

  function exportDay() {
    var date = todayIso();
    var totalMin = todayJobs.reduce(function(s,j){ return s + (j.work_min || 0); }, 0);
    var totalCost = todayJobs.reduce(function(s,j){ return s + (Number(j.cost) || 0); }, 0);
    var rows = todayJobs.map(function(j) {
      var statusDE = j.status === "done" ? "Fertig" : j.status === "inProgress" ? "In Arbeit" : j.status === "paused" ? "Pause" : "Neu";
      return "<tr>" +
        "<td>" + (j.plate || "—") + "</td>" +
        "<td>" + (labelFrom(WORK_TYPES, j.work_type) || "") + "</td>" +
        "<td>" + (j.location || "") + "</td>" +
        "<td>" + (j.description ? j.description.slice(0,80) : "") + "</td>" +
        "<td>" + fmtMin(j.work_min || 0) + "</td>" +
        "<td>" + fmtMin((j.travel_to_min||0)+(j.travel_back_min||0)) + "</td>" +
        "<td>" + (j.cost ? Number(j.cost).toFixed(2) + " €" : "—") + "</td>" +
        "<td style='color:" + (j.status === "done" ? "green" : "orange") + ";font-weight:bold'>" + statusDE + "</td>" +
        "</tr>";
    }).join("");
    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'>" +
      "<title>Tagesbericht " + date + "</title>" +
      "<style>body{font-family:Arial,sans-serif;padding:24px;color:#111;max-width:900px;margin:0 auto}" +
      "h1{color:#0a1730;margin-bottom:4px}h2{color:#555;font-size:14px;font-weight:normal;margin-bottom:20px}" +
      "table{width:100%;border-collapse:collapse;margin-bottom:20px}" +
      "td,th{padding:9px 11px;border-bottom:1px solid #e0e0e0;text-align:left;font-size:13px}" +
      "th{background:#0a1730;color:#fff;font-size:12px;letter-spacing:0.5px}" +
      "tr:nth-child(even){background:#f8f9fc}" +
      ".summary{display:flex;gap:24px;background:#f0f4ff;border-radius:12px;padding:16px 20px;margin-bottom:24px}" +
      ".sum-item{text-align:center}.sum-val{font-size:24px;font-weight:900;color:#0a1730}" +
      ".sum-lab{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}" +
      "</style></head><body>" +
      "<h1>WerkFlow — Tagesbericht</h1>" +
      "<h2>" + user.name + " · " + dateDMY(date) + "</h2>" +
      "<div class='summary'>" +
      "<div class='sum-item'><div class='sum-val'>" + todayJobs.length + "</div><div class='sum-lab'>Aufträge</div></div>" +
      "<div class='sum-item'><div class='sum-val'>" + fmtMin(totalMin) + "</div><div class='sum-lab'>Arbeitszeit</div></div>" +
      "<div class='sum-item'><div class='sum-val'>" + totalCost.toFixed(2) + " €</div><div class='sum-lab'>Gesamtkosten</div></div>" +
      "</div>" +
      "<table><thead><tr><th>Fahrzeug</th><th>Typ</th><th>Standort</th><th>Beschreibung</th><th>Arbeitszeit</th><th>Fahrzeit</th><th>Kosten</th><th>Status</th></tr></thead>" +
      "<tbody>" + rows + "</tbody></table>" +
      "</body></html>";

    var fileName = "Tagesbericht_" + user.name.replace(/ /g,"_") + "_" + date + ".html";

    // Web Share API — системный диалог "Поделиться" на мобильных
    if (navigator.share && navigator.canShare) {
      var blob = new Blob([html], { type:"text/html" });
      var file = new File([blob], fileName, { type:"text/html" });
      if (navigator.canShare({ files:[file] })) {
        navigator.share({
          title: "Tagesbericht " + user.name + " · " + dateDMY(date),
          text: "WerkFlow Tagesbericht: " + todayJobs.length + " Aufträge, " + fmtMin(totalMin) + ", " + totalCost.toFixed(2) + " €",
          files: [file]
        }).catch(function(e){
          if (e.name !== "AbortError") fallbackDownload(html, fileName);
        });
        return;
      }
    }
    // Fallback: обычное скачивание (десктоп или старые браузеры)
    fallbackDownload(html, fileName);
  }

  function fallbackDownload(html, fileName) {
    var blob = new Blob([html], { type:"text/html" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = fileName; a.click();
    URL.revokeObjectURL(url);
  }

  function changeStatus(job, newStatus, pauseNote) {
    setUpdating(true);
    var patch = { status:newStatus };
    if (pauseNote) patch.pause_note = pauseNote;
    if (newStatus === "done") patch.finished_at = new Date().toISOString();
    sbPatch("jobs", job.id, patch)
      .then(function() { setUpdating(false); if (onRefresh) onRefresh(); })
      .catch(function(e) { alert("Fehler: " + e.message); setUpdating(false); });
  }

  function confirmPause() {
    if (!reason.trim()) { alert("Bitte Grund angeben."); return; }
    changeStatus(pauseTarget, "paused", reason);
    setPauseTarget(null); setReason("");
  }

  function statusLabel(s) {
    if (s === "inProgress") return { text:"In Arbeit", cls:"green" };
    if (s === "paused")     return { text:"Pause",    cls:"orange" };
    return { text:"Neu", cls:"blue" };
  }

  return (
    <div>
      <div className="page-title">Meine <span style={{ color:"#ffa500" }}>Aufträge</span></div>
      <div style={{ display:"flex", gap:10, marginBottom:14 }}>
        <button className="outline-btn" type="button" style={{ padding:13 }} onClick={onRefresh}>
          {loading ? "Lädt..." : "↻ Aktualisieren"}
        </button>
        <button type="button" onClick={exportDay}
          style={{ flexShrink:0, padding:"13px 16px", borderRadius:12, border:"1px solid rgba(255,165,0,0.5)", background:"rgba(255,165,0,0.08)", color:"#ffa500", fontWeight:700, fontSize:13, whiteSpace:"nowrap" }}>
          📄 Tagesbericht
        </button>
      </div>
      {todayJobs.length > 0 && (
        <div style={{ marginBottom:12, padding:"10px 14px", borderRadius:12, background:"rgba(255,255,255,0.05)", fontSize:12, color:"rgba(255,255,255,0.55)", display:"flex", gap:16 }}>
          <span>Heute: {todayJobs.length} Aufträge</span>
          <span>⏱ {fmtMin(todayJobs.reduce(function(s,j){ return s + (j.work_min||0); },0))}</span>
          <span>💶 {todayJobs.reduce(function(s,j){ return s + (Number(j.cost)||0); },0).toFixed(2)} €</span>
        </div>
      )}
      {myJobs.length === 0 && (
        <div className="glass-panel" style={{ textAlign:"center", color:"rgba(255,255,255,0.55)", padding:32 }}>Keine offenen Aufträge</div>
      )}
      {myJobs.map(function(j) {
        var sl = statusLabel(j.status);
        var isNew    = j.status !== "inProgress" && j.status !== "paused";
        var isActive = j.status === "inProgress";
        var isPaused = j.status === "paused";
        return (
          <div key={j.id} className="alert-card">
            <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:8, marginBottom:8 }}>
              <div>
                <div style={{ fontSize:17, fontWeight:800 }}>{j.plate || "Ohne Kennzeichen"}</div>
                <div className="meta" style={{ marginTop:4 }}>📍 {j.location || "Werkstatt"} · {labelFrom(WORK_TYPES, j.work_type)}</div>
              </div>
              <span className={"badge " + sl.cls}>{sl.text}</span>
            </div>
            {j.description && <div style={{ fontSize:13, lineHeight:1.4, marginBottom:8, whiteSpace:"pre-wrap" }}>{j.description}</div>}
            {j.pause_note && (
              <div className="pause-reason-box">
                <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,165,0,0.8)", marginBottom:4 }}>PAUSE-GRUND</div>
                <div style={{ fontSize:13 }}>{j.pause_note}</div>
              </div>
            )}
            <div className="meta" style={{ marginTop:8 }}>⏱ {fmtMin(j.work_min || 0)} · Fahrt: {fmtMin((j.travel_to_min||0)+(j.travel_back_min||0))}</div>
            <div style={{ display:"flex", gap:8, marginTop:12, flexWrap:"wrap" }}>
              {isNew && <button className="mini-btn start" type="button" disabled={updating} onClick={function(){ changeStatus(j, "inProgress"); }}>▶ Starten</button>}
              {isActive && <button className="mini-btn pause" type="button" disabled={updating} onClick={function(){ setPauseTarget(j); setReason(""); }}>⏸ Pause</button>}
              {isPaused && <button className="mini-btn start" type="button" disabled={updating} onClick={function(){ changeStatus(j, "inProgress"); }}>▶ Weiter</button>}
              {(isActive || isPaused) && (
                <button className="mini-btn stop" type="button" disabled={updating}
                  onClick={function(){ if (window.confirm("Auftrag als erledigt markieren?")) changeStatus(j, "done"); }}>
                  ■ Fertig
                </button>
              )}
            </div>
          </div>
        );
      })}

      {pauseTarget && (
        <div className="modal-back" onClick={function(){ setPauseTarget(null); }}>
          <div className="modal" onClick={function(e){ e.stopPropagation(); }}>
            <div style={{ fontSize:18, fontWeight:800, marginBottom:14 }}>⏸ Pause — Grund angeben</div>
            <div style={{ color:"rgba(255,255,255,0.65)", fontSize:13, marginBottom:10 }}>
              {pauseTarget.plate} · {labelFrom(WORK_TYPES, pauseTarget.work_type)}
            </div>
            <textarea className="textarea-dark" value={reason}
              onChange={function(e){ setReason(e.target.value); }}
              placeholder="Grund der Pause (z.B. Ersatzteil fehlt, Mittagspause...)"
              style={{ minHeight:80, marginBottom:14 }}
            />
            <div style={{ display:"flex", gap:10 }}>
              <button className="btn-primary" type="button" style={{ flex:1 }} onClick={confirmPause}>Bestätigen</button>
              <button className="outline-btn" type="button" style={{ flex:1, padding:14 }} onClick={function(){ setPauseTarget(null); }}>Abbrechen</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    </div>
  );
}

// === APP SHELL ===
function AppShell({ user, onLogout }) {
  var _stab = useState("new"); var tab = _stab[0]; var setTab = _stab[1];
  var _sjobs = useState([]); var jobs = _sjobs[0]; var setJobs = _sjobs[1];
  var _salerts = useState([]); var alerts = _salerts[0]; var setAlerts = _salerts[1];
  var _svehicles = useState([]); var vehicles = _svehicles[0]; var setVehicles = _svehicles[1];
  var _sstock = useState([]); var stock = _sstock[0]; var setStock = _sstock[1];
  var _susers = useState([]); var dbUsers = _susers[0]; var setDbUsers = _susers[1];
  var _sloading = useState(false); var loading = _sloading[0]; var setLoading = _sloading[1];
  var _sprefill = useState(null); var prefill = _sprefill[0]; var setPrefill = _sprefill[1];
  var _sdbOk = useState(null); var dbOk = _sdbOk[0]; var setDbOk = _sdbOk[1];
  var prevAlertCount = useRef(0);
  var wsRef = useRef(null);

  function loadAll() {
    setLoading(true);
    Promise.all([
      sbSelect("jobs","select=*&order=created_at.desc&limit=300"),
      sbSelect("alerts","select=*&order=created_at.desc&limit=100"),
      sbSelect("vehicles","select=*&order=plate.asc&limit=500"),
      sbSelect("stock","select=*&order=name.asc&limit=200"),
      sbSelect("users","select=*")
    ]).then(function(results) {
      setJobs(results[0]);
      var newAlerts = results[1].map(function(a){ return Object.assign({},a,{photo_urls:normalizeUrls(a.photo_urls)}); });
      var newOpen = newAlerts.filter(function(a){ return a.status !== "done" && a.status !== "rejected"; });
      if (newOpen.length > prevAlertCount.current && prevAlertCount.current >= 0) {
        playAlertSound();
      }
      prevAlertCount.current = newOpen.length;
      setAlerts(newAlerts);
      setVehicles(results[2]);
      setStock(results[3]);
      if (results[4] && results[4].length) setDbUsers(results[4]);
      setDbOk(true); setLoading(false);
    }).catch(function(e) {
      console.error(e); setDbOk(false); setLoading(false);
    });
  }

  // Realtime подписка на alerts
  useEffect(function() {
    loadAll();
    // Supabase Realtime через WebSocket
    try {
      var wsUrl = SB_URL.replace("https://","wss://") + "/realtime/v1/websocket?apikey=" + SB_KEY + "&vsn=1.0.0";
      var ws = new WebSocket(wsUrl);
      wsRef.current = ws;
      ws.onopen = function() {
        ws.send(JSON.stringify({ topic:"realtime:public:alerts", event:"phx_join", payload:{}, ref:"1" }));
      };
      ws.onmessage = function(e) {
        try {
          var msg = JSON.parse(e.data);
          if (msg.event === "INSERT" || msg.event === "UPDATE") {
            playAlertSound();
            loadAll();
          }
        } catch(err) {}
      };
      ws.onerror = function() {};
    } catch(e) {}

    // Fallback: polling каждые 30 сек
    var poll = setInterval(function() { loadAll(); }, 30000);
    return function() {
      clearInterval(poll);
      try { if (wsRef.current) wsRef.current.close(); } catch(e) {}
    };
  }, []);

  // Ставка текущего механика
  var myRate = 0;
  var dbUser = dbUsers.find(function(u){ return u.id === user.id; });
  if (dbUser && dbUser.rate_per_hour) myRate = Number(dbUser.rate_per_hour) || 0;

  var openAlerts = alerts.filter(function(a) { return a.status !== "done" && a.status !== "rejected"; });

  function createFromAlert(a) {
    setPrefill(Object.assign({},a,{
      vehicle_type: a.vehicle_type || a.vehicleType || "truck",
      work_type:"emergency",
      photo_urls:normalizeUrls(a.photo_urls)
    }));
    setTab("new");
  }

  return (
    <div style={{ position:"relative", minHeight:"100vh", minHeight:"100dvh", maxWidth:480, margin:"0 auto" }}>
      <Bg />
      <div className="app-wrap">
        <div className="app-top">
          <div>
            <Logo small={true} />
            <div style={{ color:"#ffa500", fontSize:18, fontWeight:900, marginTop:2 }}>Werkstatt</div>
          </div>
          <div className="user-pill">
            <div className="status-dot" style={{ background: dbOk === false ? "#ff3b30" : dbOk === true ? "#22c55e" : "#ffa500" }}></div>
            <span style={{ fontSize:12, fontWeight:700 }}>{user.name}</span>
            <button type="button" onClick={onLogout} style={{ border:0, background:"rgba(255,255,255,0.08)", color:"#fff", padding:"5px 8px", borderRadius:9, fontSize:12, fontWeight:700 }}>↩</button>
          </div>
        </div>

        {openAlerts.length > 0 && (
          <div className="emergency-strip" onClick={function(){ setTab("eingang"); }}>
            <div style={{ fontSize:20 }}>🚨</div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontWeight:800, fontSize:14 }}>Neue Meldungen: {openAlerts.length}</div>
              <div className="meta" style={{ whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                {openAlerts[0].plate || ""}{openAlerts[0].description ? " · " + openAlerts[0].description.slice(0,40) : ""}
              </div>
            </div>
            <div className="emergency-count">{openAlerts.length}</div>
          </div>
        )}

        {tab === "new" && (
          <NewJob vehicles={vehicles} setVehicles={setVehicles}
            user={user} userRate={myRate}
            prefill={prefill}
            onClear={function(){ setPrefill(null); }}
            onSaved={loadAll}
          />
        )}
        {tab === "eingang" && (
          <Eingang alerts={alerts} user={user} onCreate={createFromAlert} loading={loading} onRefresh={loadAll} />
        )}
        {tab === "jobs" && (
          <MeineAuftraege jobs={jobs} user={user} onRefresh={loadAll} loading={loading} />
        )}
        {tab === "lager" && (
          <Lager stock={stock} loading={loading} onRefresh={loadAll} />
        )}
        {tab === "archiv" && (
          <Archiv jobs={jobs} />
        )}
      </div>
      <BottomNav tab={tab} setTab={setTab} alertCount={openAlerts.length} />
    </div>
  );
}

// === ROOT APP ===
function App() {
  var _sstage = useState("loading"); var stage = _sstage[0]; var setStage = _sstage[1];
  var _sname = useState(""); var savedName = _sname[0]; var setSavedName = _sname[1];
  var _suser = useState(null); var user = _suser[0]; var setUser = _suser[1];
  var _salerts = useState([]); var alerts = _salerts[0]; var setAlerts = _salerts[1];

  useEffect(function() {
    sbSelect("alerts","select=*&order=created_at.desc&limit=30")
      .then(function(a){ setAlerts(a.map(function(x){ return Object.assign({},x,{photo_urls:normalizeUrls(x.photo_urls)}); })); })
      .catch(function(){});

    try {
      var saved = localStorage.getItem(SESSION_KEY);
      if (saved) {
        var u = JSON.parse(saved);
        if (u && u.name) {
          setSavedName(u.name);
          setUser(u);
          // п.1: уже зарегистрирован → сразу слайдер, PIN не показываем
          setStage("slider");
          return;
        }
      }
    } catch(e) {}
    setStage("register");
  }, []);

  if (stage === "loading") {
    return (
      <div className="scrn" style={{ alignItems:"center", justifyContent:"center" }}>
        <Bg />
        <div style={{ position:"relative", zIndex:2 }}><Logo /></div>
      </div>
    );
  }

  if (stage === "register") {
    return (
      <ErsteAnmeldung onContinue={function(v, n) {
        setSavedName(v + " " + n);
        setStage("pin");
      }} />
    );
  }

  // п.1: PIN только после регистрации (первый раз)
  // п.3: стрелка назад в PinScreen → обратно на ErsteAnmeldung
  if (stage === "pin") {
    return (
      <PinScreen
        onBack={function(){ setStage("register"); }}
        onSuccess={function() {
          var name = savedName || "Werkstatt";
          var avatar = name.split(" ").map(function(w){ return w[0] || ""; }).join("").slice(0,2).toUpperCase() || "WK";
          var knownUser = USERS.find(function(u){ return name.toLowerCase().includes(u.id); });
          var u = knownUser || { id:"roman", name:name, avatar:avatar };
          try { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); } catch(e) {}
          setUser(u);
          setStage("slider");
        }}
      />
    );
  }

  if (stage === "slider") {
    return (
      <SliderScreen
        userName={savedName}
        alerts={alerts}
        onUnlock={function(){ setStage("app"); }}
        onChangeUser={function() {
          try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
          setSavedName(""); setUser(null); setStage("register");
        }}
      />
    );
  }

  if (stage === "app" && user) {
    return (
      <AppShell
        user={user}
        onLogout={function() {
          // Выход → обратно на слайдер (не удаляем сессию, просто идём на slider)
          setStage("slider");
        }}
      />
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
