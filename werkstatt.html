<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>WerkFlow Werkstatt</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>

  <!-- === Sentry/Glitchtip Error Monitoring ===
       Активация: подставь DSN в SENTRY_DSN ниже (отдельный проект на каждое приложение).
       Без DSN — Sentry молча отключён, ничего не отправляет.
       Получить DSN: https://glitchtip.com (бесплатно, EU) или https://sentry.io (free до 5k/мес) -->
  <script src="https://browser.sentry-cdn.com/8.45.0/bundle.min.js" crossorigin="anonymous"></script>
  <script>
    (function(){
      var SENTRY_DSN = ""; // ← вставь DSN для werkstatt, пусто = выключено
      if (SENTRY_DSN && window.Sentry) {
        try {
          Sentry.init({
            dsn: SENTRY_DSN,
            release: "werkstatt@2026-05-13",
            environment: location.hostname.indexOf("localhost") >= 0 ? "dev" : "prod",
            tracesSampleRate: 0.0,
            beforeSend: function(event){
              if (event.exception && event.exception.values) {
                var msg = (event.exception.values[0]||{}).value || "";
                if (msg.indexOf("ResizeObserver") >= 0) return null;
                if (msg.indexOf("extension://") >= 0) return null;
              }
              return event;
            }
          });
        } catch(e){ console.warn("Sentry init failed:", e); }
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #ffa500;
      --accent-dark: #cc7a00;
      --accent-glow: rgba(255,165,0,0.35);
      --bg-base: #080e1a;
      --bg-card: rgba(13,25,52,0.85);
      --bg-input: rgba(6,15,38,0.9);
      --bg-elevated: rgba(18,35,70,0.9);
      --border: rgba(255,255,255,0.1);
      --border-active: rgba(255,165,0,0.6);
      --text-primary: #f0f4ff;
      --text-secondary: rgba(255,255,255,0.55);
      --text-muted: rgba(255,255,255,0.3);
      --green: #22c55e;
      --red: #ef4444;
      --blue: #60a5fa;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 18px;
      --radius-xl: 22px;
      --touch: 56px;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --transition: 150ms ease;
      --sp1: 8px; --sp2: 16px; --sp3: 24px; --sp4: 32px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; overscroll-behavior:none; }
    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height:100vh; min-height:100dvh;
    }
    #root { min-height:100vh; min-height:100dvh; }

    .bg-image {
      position:fixed; inset:0; z-index:0;
      background-color:#0a1730;
      background-image:
        linear-gradient(180deg, rgba(10,23,48,0.35) 0%, rgba(10,23,48,0.7) 60%, rgba(10,23,48,0.92) 100%),
        url("./bg-truck.png");
      background-size:cover;
      background-position:center center;
      background-repeat:no-repeat;
      pointer-events:none;
    }

    .scrn {
      position:relative; z-index:2; min-height:100vh; min-height:100dvh;
      padding:env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
      display:flex; flex-direction:column;
      max-width:480px; margin:0 auto; width:100%;
    }
    @media (min-width:481px) {
      body::before {
        content:""; position:fixed; inset:0; z-index:1;
        background:rgba(0,0,0,0.4); pointer-events:none;
      }
      .scrn { box-shadow:0 0 60px rgba(0,0,0,0.6); }
    }

    .fixed-bottom-bar {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:480px; z-index:5;
      padding:14px 16px calc(env(safe-area-inset-bottom) + 14px);
      background:linear-gradient(180deg, transparent, rgba(10,23,48,0.95) 30%);
    }

    button { font:inherit; color:inherit; cursor:pointer; }
    input, textarea, select { font:inherit; }
    textarea { resize:none; }
    ::placeholder { color:rgba(255,255,255,0.45); }

    .btn-primary {
      background:linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      color:#0a1730; border:none; border-radius:var(--radius-md);
      font-family:var(--font-display); font-weight:900; letter-spacing:1px;
      padding:20px; width:100%; min-height:var(--touch);
      box-shadow:0 8px 24px var(--accent-glow); font-size:17px;
      transition:all var(--transition);
    }
    .btn-primary:active { transform:scale(0.98); box-shadow:0 4px 12px var(--accent-glow); }
    .btn-primary:disabled { opacity:0.4; }

    .btn-back {
      width:48px; height:48px; border-radius:12px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.14);
      display:flex; align-items:center; justify-content:center;
      color:#ffa500;
    }

    .input-light {
      width:100%; padding:14px 14px 14px 44px;
      background:#fff; color:#0a1730;
      border:1px solid #e5e7eb; border-radius:12px;
      font-size:16px; outline:none;
    }
    .input-light:focus { border-color:#ffa500; }

    .keypad-btn {
      width:70px; height:70px; border-radius:50%;
      background:rgba(3,12,28,0.18);
      border:1.5px solid rgba(255,255,255,0.35);
      color:#fff; font-size:28px; font-weight:500;
      display:flex; align-items:center; justify-content:center;
    }
    .keypad-btn:active { background:rgba(255,255,255,0.10); }

    .pin-dot { width:14px; height:14px; border-radius:50%;
      background:rgba(255,255,255,0.20); transition:background 0.15s; }
    .pin-dot.filled { background:#ffa500; box-shadow:0 0 12px rgba(255,165,0,0.6); }
    .pin-dot.error { background:#ff3b30; }

    .slider-track {
      position:relative; height:78px; border-radius:18px;
      background:rgba(0,0,0,0.45);
      border:1px solid rgba(255,255,255,0.10);
      overflow:hidden;
    }
    .slider-thumb {
      position:absolute; top:6px; left:6px;
      width:66px; height:66px; border-radius:14px;
      background:linear-gradient(180deg,#ffa500,#ff8c00);
      box-shadow:0 0 20px rgba(255,165,0,0.7);
      display:flex; align-items:center; justify-content:center;
      touch-action:none; cursor:grab; user-select:none;
    }
    .slider-grip { display:flex; gap:4px; }
    .slider-grip span { width:3px; height:22px; background:#0a1730; border-radius:2px; }
    .slider-marks { position:absolute; inset:0; display:flex;
      align-items:center; justify-content:space-around; padding:0 90px 0 80px;
      pointer-events:none; }
    .slider-mark { width:2px; height:24px; background:rgba(255,255,255,0.2); border-radius:2px; }

    .slider-alerts { margin-top:20px; display:flex; flex-direction:column; gap:10px; }
    .slider-alert-urgent {
      display:flex; gap:12px; align-items:center;
      padding:12px 14px; border-radius:14px;
      background:rgba(90,20,33,0.72);
      border:1px solid rgba(255,59,48,0.55);
      backdrop-filter:blur(12px);
    }
    .slider-alert-normal {
      display:flex; gap:12px; align-items:center;
      padding:12px 14px; border-radius:14px;
      background:rgba(50,30,0,0.72);
      border:1px solid rgba(255,165,0,0.45);
      backdrop-filter:blur(12px);
    }

    .label-cap {
      font-family: var(--font-display);
      font-size:12px; font-weight:700; color:var(--text-secondary);
      letter-spacing:2px; text-transform:uppercase; margin-bottom:var(--sp1);
    }

    .input-dark {
      width:100%; padding:18px var(--sp2);
      background:var(--bg-input);
      border:1.5px solid var(--border);
      border-radius:var(--radius-md); color:var(--text-primary);
      outline:none; font-size:17px; font-family:var(--font-body);
      transition:border-color var(--transition), box-shadow var(--transition);
      min-height:var(--touch);
    }
    .input-dark:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-glow);
    }

    /* Date input — иконка-стрелка убрана, календарь открывается тапом по всему полю */
    input.input-dark[type="date"] {
      -webkit-appearance:none; appearance:none;
      position:relative; cursor:pointer;
    }
    input.input-dark[type="date"]::-webkit-calendar-picker-indicator {
      position:absolute; inset:0; width:100%; height:100%;
      margin:0; padding:0; opacity:0; cursor:pointer;
    }
    input.input-dark[type="date"]::-webkit-inner-spin-button,
    input.input-dark[type="date"]::-webkit-clear-button {
      display:none; -webkit-appearance:none;
    }

    .select-dark {
      width:100%; padding:18px var(--sp2);
      background:var(--bg-input);
      border:1.5px solid var(--border);
      border-radius:var(--radius-md); color:var(--text-primary);
      outline:none; font-size:17px; font-family:var(--font-body);
      appearance:none; min-height:var(--touch);
      transition:border-color var(--transition);
    }
    .select-dark:focus { border-color:var(--accent); }

    .textarea-dark {
      width:100%; padding:18px var(--sp2);
      background:var(--bg-input);
      border:1.5px solid var(--border);
      border-radius:var(--radius-md); color:var(--text-primary);
      min-height:120px; outline:none; font-size:17px;
      font-family:var(--font-body); resize:none;
      transition:border-color var(--transition), box-shadow var(--transition);
    }
    .textarea-dark:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-glow);
    }

    .glass-panel {
      background:var(--bg-card);
      border:1px solid var(--border);
      border-radius:var(--radius-lg); padding:var(--sp2); margin-bottom:var(--sp2);
      backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    }
    .panel-title {
      display:flex; align-items:center; gap:10px; margin-bottom:var(--sp2);
      font-family:var(--font-display);
      font-size:18px; font-weight:800; letter-spacing:2.5px; text-transform:uppercase;
      color:#ffa500;
    }

    .chips { display:flex; flex-wrap:wrap; gap:10px; }
    .chip {
      border:1.5px solid var(--border);
      background:var(--bg-input);
      color:var(--text-primary); border-radius:var(--radius-sm);
      padding:14px 20px; font-size:15px; font-weight:600;
      font-family:var(--font-body);
      transition:all var(--transition);
      min-height:var(--touch); display:flex; align-items:center;
    }
    .chip:active { transform:scale(0.97); }
    .chip.active {
      border-color:var(--accent); background:rgba(255,165,0,0.12);
      color:var(--accent); box-shadow:0 0 0 1px var(--accent);
    }

    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:var(--sp2); }

    .photo-box {
      border:2px dashed rgba(255,165,0,0.4); border-radius:var(--radius-md);
      padding:var(--sp3); text-align:center; color:var(--text-secondary);
      background:rgba(255,165,0,0.03); width:100%; font-weight:600;
      font-size:15px; display:flex; align-items:center; justify-content:center;
      gap:10px; min-height:72px; transition:background var(--transition);
    }
    .photo-box:active { background:rgba(255,165,0,0.08); }
    .photo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px; }
    .photo-thumb {
      position:relative; aspect-ratio:1/1; overflow:hidden;
      border-radius:var(--radius-sm); border:1px solid var(--border); background:#040d1e;
    }
    .photo-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .photo-thumb button {
      position:absolute; right:5px; top:5px;
      width:30px; height:30px; border:0; border-radius:50%;
      background:rgba(0,0,0,0.8); color:#fff; font-weight:800; font-size:15px;
    }

    .timer-card {
      border:1px solid var(--border);
      background:var(--bg-elevated); border-radius:var(--radius-md); padding:var(--sp2);
    }
    .timer-label {
      color:var(--text-muted); font-family:var(--font-display);
      font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px;
    }
    .timer-time {
      font-family:var(--font-mono);
      font-size:36px; font-weight:500; letter-spacing:-1px; margin-bottom:14px;
    }
    .mini-btn {
      padding:14px 18px; border-radius:var(--radius-sm); font-size:14px; font-weight:700;
      font-family:var(--font-display); letter-spacing:0.5px;
      border:1.5px solid var(--border); background:transparent; color:var(--text-primary);
      min-height:var(--touch); transition:all var(--transition);
      display:flex; align-items:center; justify-content:center; gap:6px;
    }
    .mini-btn:active { transform:scale(0.96); }
    .mini-btn.start { border-color:var(--green); color:var(--green); background:rgba(34,197,94,0.08); }
    .mini-btn.stop  { border-color:var(--red); color:var(--red); background:rgba(239,68,68,0.08); }
    .mini-btn.pause { border-color:var(--accent); color:var(--accent); background:rgba(255,165,0,0.08); }

    .alert-card {
      background:rgba(15,39,78,0.64); border:1px solid rgba(255,255,255,0.14);
      border-radius:16px; padding:16px; margin-bottom:12px; backdrop-filter:blur(10px);
    }
    .alert-card.urgent { background:rgba(70,15,25,0.72); border-color:rgba(255,59,48,0.55); }
    .badge {
      display:inline-block; padding:4px 10px; border-radius:999px;
      font-size:11px; font-weight:800; letter-spacing:0.5px;
    }
    .badge.red    { background:rgba(239,68,68,0.2);   color:#ef4444; border:1px solid rgba(239,68,68,0.4); }
    .badge.orange { background:rgba(255,165,0,0.15);  color:#ffa500; border:1px solid rgba(255,165,0,0.4); }
    .badge.green  { background:rgba(34,197,94,0.15);  color:#22c55e; border:1px solid rgba(34,197,94,0.4); }
    .badge.blue   { background:rgba(59,130,246,0.15); color:#60a5fa; border:1px solid rgba(59,130,246,0.4); }
    .badge.gray   { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.55); border:1px solid rgba(255,255,255,0.18); }

    /* Обрезка длинного описания в карточках — макс 2 строки + троеточие */
    .text-clamp-2 {
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
      overflow:hidden; text-overflow:ellipsis;
      word-break:break-word; overflow-wrap:break-word;
    }

    .meta { font-size:12px; color:rgba(255,255,255,0.55); font-weight:500; }

    .save-btn {
      width:100%; padding:18px; border:none; border-radius:14px;
      background:linear-gradient(180deg,#ffa500,#ff8c00);
      color:#0a1730; font-size:17px; font-weight:800;
      box-shadow:0 8px 24px rgba(255,165,0,0.35);
      margin-top:6px; margin-bottom:20px;
    }
    .save-btn:disabled { opacity:0.5; }

    .outline-btn {
      width:100%; border:1.5px solid var(--border);
      background:var(--bg-elevated); color:var(--text-primary);
      border-radius:var(--radius-md);
      padding:18px; font-size:16px; font-weight:600;
      font-family:var(--font-body);
      display:flex; align-items:center; justify-content:center; gap:10px;
      min-height:var(--touch); transition:all var(--transition);
    }
    .outline-btn:active { transform:scale(0.98); border-color:var(--accent); }

    .page-title {
      font-family:var(--font-display);
      font-size:36px; font-weight:900; line-height:1;
      letter-spacing:-0.5px; margin:4px 0 var(--sp2);
      color:var(--text-primary);
    }

    .emergency-strip {
      margin-bottom:14px; padding:12px 14px; border-radius:15px;
      border:1px solid rgba(255,59,48,0.58); background:rgba(80,18,31,0.74);
      display:flex; align-items:center; gap:10px;
      backdrop-filter:blur(12px); cursor:pointer;
    }
    .emergency-count {
      margin-left:auto; min-width:28px; height:25px;
      border-radius:999px; background:#ff3b30; color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:800;
    }

    .user-pill {
      display:flex; align-items:center; gap:8px;
      border:1px solid rgba(255,255,255,0.13);
      background:rgba(12,36,76,0.62); padding:8px 10px;
      border-radius:14px; backdrop-filter:blur(12px);
    }
    .status-dot { width:8px; height:8px; border-radius:50%; background:#22c55e; }

    .nav-wrap {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:480px; z-index:20;
      background:rgba(8,14,28,0.98);
      border-top:1px solid rgba(255,255,255,0.07);
      padding:0 4px calc(env(safe-area-inset-bottom) + 4px);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    }
    .nav { display:flex; align-items:stretch; height:80px; }
    .nav-btn {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:4px; padding:8px 4px; border:none; background:transparent;
      color:var(--text-muted); font-size:10px; font-weight:700;
      font-family:var(--font-display); letter-spacing:1.5px; text-transform:uppercase;
      min-height:80px; transition:color var(--transition); position:relative;
    }
    .nav-btn.active { color:var(--accent); }
    .nav-btn:active { opacity:0.6; }
    .nav-btn svg { display:block; }
    .nav-btn.nav-center { flex:1.2; }
    .nav-btn.nav-center .nav-ico-wrap {
      width:52px; height:52px; border-radius:16px;
      background:rgba(255,165,0,0.1);
      border:1.5px solid rgba(255,165,0,0.2);
      display:flex; align-items:center; justify-content:center;
      transition:all var(--transition);
    }
    .nav-btn.nav-center.active .nav-ico-wrap {
      background:rgba(255,165,0,0.2);
      border-color:var(--accent);
      box-shadow:0 0 16px rgba(255,165,0,0.2);
    }
    .nav-badge {
      position:absolute; right:calc(50% - 20px); top:6px;
      background:#ef4444; color:#fff; border-radius:99px;
      font-size:10px; font-weight:800; min-width:18px; height:18px;
      display:flex; align-items:center; justify-content:center;
      padding:0 4px; border:2px solid rgba(8,14,28,0.98);
    }

    .app-wrap {
      position:relative; z-index:2; max-width:480px; margin:0 auto;
      padding:0 16px calc(env(safe-area-inset-bottom) + 90px);
      min-height:100vh; min-height:100dvh;
    }
    .app-top {
      padding:max(env(safe-area-inset-top),16px) 0 12px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }

    .modal-back {
      position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,0.65); display:flex;
      align-items:center; justify-content:center;
      padding:20px;
    }
    .modal {
      width:100%; max-width:440px; background:#0d1f3d;
      border:1px solid rgba(255,255,255,0.18);
      border-radius:22px;
      padding:24px 20px;
      box-shadow:0 20px 60px rgba(0,0,0,0.6);
      max-height:90vh; overflow-y:auto;
    }

    .dropdown-list {
      position:absolute; top:100%; left:0; right:0; margin-top:6px; padding:6px;
      background:#0d1f3d; border:1px solid rgba(255,165,0,0.5);
      border-radius:12px; box-shadow:0 16px 40px rgba(0,0,0,0.6);
      max-height:250px; overflow:auto; z-index:200;
    }
    .dropdown-item { padding:11px 13px; border-radius:8px; cursor:pointer; color:#fff; }
    .dropdown-item:active { background:rgba(255,165,0,0.18); color:#ffa500; }

    .white-card {
      margin-top:28px; background:#fff; color:#0a1730;
      border-radius:24px; padding:28px 24px;
      box-shadow:0 22px 60px rgba(0,0,0,0.45);
    }
    .light-label { color:#102d62; font-size:16px; font-weight:800; margin-bottom:10px; }
    .light-field { position:relative; margin-bottom:22px; }
    .light-field-icon {
      position:absolute; left:14px; top:50%; transform:translateY(-50%);
      color:#8a94a7; font-size:18px; pointer-events:none;
    }
    .blue-btn {
      width:100%; border:0; border-radius:13px; padding:17px;
      background:#082b66; color:#fff; font-size:17px; font-weight:800;
      display:flex; align-items:center; justify-content:center; gap:12px;
    }
    .blue-btn:disabled { opacity:0.5; }

// Сколько секунд реально проработано в заказе на момент `nowMs`.
// Считается как: (now - started_at) - сумма закрытых пауз - текущая активная пауза.
// Используется для живого таймера в OpenJobView и для финального расчёта при Fertig.
function jobElapsedSec(job, nowMs) {
  if (!job || !job.started_at) return 0;
  var startMs = new Date(job.started_at).getTime();
  if (isNaN(startMs)) return 0;
  var now = nowMs || Date.now();
  var elapsed = Math.max(0, Math.floor((now - startMs) / 1000));
  // Вычитаем все закрытые паузы (в pause_log у них есть minutes)
  var log = job.pause_log;
  if (typeof log === "string") { try { log = JSON.parse(log); } catch(e) { log = []; } }
  if (!Array.isArray(log)) log = [];
  var pauseSec = 0;
  for (var i = 0; i < log.length; i++) {
    var p = log[i];
    if (p.end) {
      // Закрытая пауза — берём minutes (округление) или считаем заново из start/end
      if (p.start) {
        var ps = new Date(p.start).getTime();
        var pe = new Date(p.end).getTime();
        if (!isNaN(ps) && !isNaN(pe)) pauseSec += Math.max(0, Math.floor((pe - ps) / 1000));
      } else if (p.minutes) {
        pauseSec += p.minutes * 60;
      }
    } else if (p.start && job.status === "paused") {
      // Открытая пауза — заказ на паузе, считаем до сейчас
      var ps2 = new Date(p.start).getTime();
      if (!isNaN(ps2)) pauseSec += Math.max(0, Math.floor((now - ps2) / 1000));
    }
  }
  return Math.max(0, elapsed - pauseSec);
}

// === parsePriceDE — корректно парсит немецкий формат чисел ===
// Примеры: "1.250,00" → 1250.00 | "50,99" → 50.99 | "1250" → 1250
// Поддерживает: точку как разделитель тысяч, запятую как десятичный
// Также корректно обрабатывает американский формат: "1,250.00" → 1250.00
function parsePriceDE(s) {
  if (s === null || s === undefined) return 0;
  if (typeof s === "number") return isFinite(s) ? s : 0;
  var str = String(s).trim().replace(/\s/g, "").replace(/€/g, "");
  if (!str) return 0;
  var hasComma = str.indexOf(",") !== -1;
  var hasDot = str.indexOf(".") !== -1;
  if (hasComma && hasDot) {
    // оба разделителя — последний из них является десятичным
    var lastComma = str.lastIndexOf(",");
    var lastDot = str.lastIndexOf(".");
    if (lastComma > lastDot) {
      // немецкий: "1.250,00" — точки = тысячи, запятая = десятичный
      str = str.replace(/\./g, "").replace(",", ".");
    } else {
      // американский: "1,250.00" — запятые = тысячи, точка = десятичный
      str = str.replace(/,/g, "");
    }
  } else if (hasComma) {
    // только запятая — десятичный разделитель: "50,99"
    str = str.replace(",", ".");
  }
  // только точка или ничего — оставляем как есть
  var n = parseFloat(str);
  return isFinite(n) ? n : 0;
}

function deToIso(s) {
  if (!s) return null;
  var t = String(s).trim();
  if (!t) return null;
  var m = t.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if (!m) return false;
  var dd = parseInt(m[1], 10), mm = parseInt(m[2], 10), yy = parseInt(m[3], 10);
  if (mm < 1 || mm > 12 || dd < 1 || dd > 31) return false;
  var dt = new Date(yy, mm - 1, dd);
  if (dt.getFullYear() !== yy || dt.getMonth() !== mm - 1 || dt.getDate() !== dd) return false;
  var p = function(n){ return (n < 10 ? "0" : "") + n; };
  return yy + "-" + p(mm) + "-" + p(dd);
}

  if (!s) return "";
  var t = String(s).slice(0, 10);
  var m = t.match(/^(\d{4})-(\d{2})-(\d{2})$/);

  return m[3] + "." + m[2] + "." + m[1];
}

// timestamp, чтобы исключить коллизию при одновременном создании.
function genId(prefix) {
  var uuid;
  try {
    if (window.crypto && window.crypto.randomUUID) {
      uuid = window.crypto.randomUUID();
    }
  } catch(e) {}
  if (!uuid) {
    // Fallback для старых браузеров: timestamp + случайный хвост
    uuid = Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 11);
  }
  return (prefix || "") + uuid;
}

// Вызов RPC-функции Postgres. Используется для атомарных операций,
// которые должны выполниться целиком или не выполниться вовсе (транзакция).
function sbRpc(fnName, params) {
  return fetch(SB_URL + "/rest/v1/rpc/" + fnName, {
    method:"POST",
    headers: {
      "Content-Type":"application/json",
      "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY
    },
    body: JSON.stringify(params || {})
  }).then(function(res) {
    if (!res.ok) return res.text().then(function(t) { throw new Error(fnName + " rpc: " + t); });
    return res.json();
  });
}

function sbUploadPhoto(path, file) {
  return fetch(SB_URL + "/storage/v1/object/job-photos/" + path, {
    method:"POST",
    headers: {
      "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY,
      "Content-Type": file.type || "image/jpeg", "x-upsert":"true"
    },
    body: file
  }).then(function(res) {
    if (!res.ok) {
      return res.text().then(function(t){
        throw new Error("Storage " + res.status + ": " + t);
      });
    }
    return SB_URL + "/storage/v1/object/public/job-photos/" + path;
  });
}

function dataUrlToBlob(dataUrl) {
  // Превращает "data:image/jpeg;base64,..." в Blob для отправки.
  try {
    var parts = dataUrl.split(",");
    var meta = parts[0] || "";
    var b64 = parts[1] || "";
    var mime = (meta.match(/data:([^;]+)/) || [])[1] || "image/jpeg";
    var bin = atob(b64);
    var len = bin.length;
    var bytes = new Uint8Array(len);
    for (var i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
    return new Blob([bytes], { type: mime });
  } catch(e) { return null; }
}

function uploadAllPhotos(jobId, photos) {
  if (!photos || !photos.length) return Promise.resolve([]);
  var promises = photos.map(function(p, i) {
    // Существующее фото (уже загружено ранее, есть url) — оставляем как есть
    if (p.existing && p.url) return Promise.resolve(p.url);
    // Берём сжатую версию (compressPhoto уже сделал её при выборе файла).
    var blob = p.base64 ? dataUrlToBlob(p.base64) : null;
    if (!blob && p.file) blob = p.file; // fallback на оригинал, если что-то пошло не так
    if (!blob) return Promise.resolve(null);
    var path = "jobs/" + jobId + "/" + Date.now() + "_" + i + ".jpg";
    return sbUploadPhoto(path, blob);
  });
  return Promise.all(promises).then(function(urls) { return urls.filter(Boolean); });
}

function ensureVehicle(vehicle, vehicles, setVehicles, user) {
  if (!vehicle || !vehicle.plate) return Promise.resolve(null);
  var exists = (vehicles || []).find(function(v) {
    return (v.plate || "").toLowerCase() === vehicle.plate.toLowerCase();

  if (exists) return Promise.resolve(exists);
  var nied = (user && user.niederlassung_id) ? user.niederlassung_id : null;

  };
  return sbInsert("vehicles", row, true).then(function() {

// === OFFLINE-QUEUE ===
// Если отправка не прошла из-за сети — запрос кладётся в localStorage-очередь
// и автоматически повторяется при возврате связи. Данные не теряются.
var OFFLINE_QUEUE_KEY = "wf_offline_queue";
function offlineQueueRead() {
  try {
    var raw = localStorage.getItem(OFFLINE_QUEUE_KEY);
    var arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}
function offlineQueueWrite(arr) {
  try { localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(arr)); } catch (e) {}
}
function offlineQueueSize() { return offlineQueueRead().length; }
function offlineEnqueue(item) {
  var q = offlineQueueRead();
  item.id = "oq_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
  item.ts = Date.now();
  q.push(item);
  offlineQueueWrite(q);
  try { window.dispatchEvent(new CustomEvent("wf-queue-changed")); } catch(e) {}
}
function isNetworkError(e) {
  var msg = (e && (e.message || e)) ? String(e.message || e) : "";
  return !navigator.onLine
    || /failed to fetch|networkerror|load failed|err_|fetch|timeout/i.test(msg);
}
function offlineSendRaw(item) {
  var url = SB_URL + "/rest/v1/" + item.table + (item.qs ? "?" + item.qs : "");
  var headers = { "Content-Type":"application/json", "apikey":SB_KEY,
    "Authorization":"Bearer " + SB_KEY, "Prefer":"return=minimal" };
  return fetch(url, { method:item.method, headers:headers, body:JSON.stringify(item.body) })
    .then(function(r){
      if (!r.ok) {
        return r.text().then(function(t){
          if (r.status >= 400 && r.status < 500 && r.status !== 408 && r.status !== 429) {
            return { ok:false, permanent:true, msg:t };
          }
          throw new Error(t);
        });
      }
      return { ok:true };
    });
}
var offlineFlushing = false;
function offlineFlush() {
  if (offlineFlushing) return Promise.resolve();
  if (!navigator.onLine) return Promise.resolve();
  var q = offlineQueueRead();
  if (!q.length) return Promise.resolve();
  offlineFlushing = true;
  function step() {
    var cur = offlineQueueRead();
    if (!cur.length) { offlineFlushing = false;
      try { window.dispatchEvent(new CustomEvent("wf-queue-changed")); } catch(e) {}
      return Promise.resolve(); }
    var item = cur[0];
    return offlineSendRaw(item).then(function(res){
      if (res.ok || res.permanent) {
        var rest = offlineQueueRead();
        rest.shift();
        offlineQueueWrite(rest);
        try { window.dispatchEvent(new CustomEvent("wf-queue-changed")); } catch(e) {}
        return step();
      }
      offlineFlushing = false;
      return Promise.resolve();
    }).catch(function(){
      offlineFlushing = false;
      return Promise.resolve();
    });
  }
  return step();
}

  window.addEventListener("online", function(){ offlineFlush(); });
  setTimeout(offlineFlush, 2500);
  setInterval(function(){ if (navigator.onLine) offlineFlush(); }, 30000);
}

function compressPhoto(b64, maxWidth, quality) {
  maxWidth = maxWidth || 1200;
  quality = quality || 0.75;
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      var canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = function(){ resolve(b64); };
    img.src = b64;
  });
}

  return Promise.all(photos.map(function(p){ return compressPhoto(p); }));

  return (

      {list.slice(0,6).map(function(u, i) {

          <a className="photo-thumb" href={u} target="_blank" rel="noreferrer" key={i}>
            <img src={u} alt="" />
          </a>
        );
      })}

  );

// === VehicleInput ===
function VehicleInput({ vehicles, value, onChange, vehicleType, onOpenChange }) {
  var _sp = useState(value && value.plate ? value.plate : ""); var plate = _sp[0]; var setPlate = _sp[1];
  var _sb = useState(value && value.brand ? value.brand : ""); var brand = _sb[0]; var setBrand = _sb[1];
  var _so = useState(false); var open = _so[0]; var setOpen = _so[1];

  function changeOpen(v) {
    setOpen(v);
    if (onOpenChange) onOpenChange(v);
  }

  useEffect(function() {
    setPlate(value && value.plate ? value.plate : "");
    setBrand(value && value.brand ? value.brand : "");
  }, [value && value.plate, value && value.brand]);

  var filtered = (vehicles || [])
    .filter(function(v) { return !vehicleType || vehicleType === "other" || !v.type || v.type === vehicleType; })
    .filter(function(v) { return ((v.plate || "") + " " + (v.brand || "")).toLowerCase().includes(plate.toLowerCase()); })
    .slice(0, 8);

  function commit(p, b) {
    var clean = (p !== undefined ? p : plate).trim();
    if (!clean) { onChange(null); return; }
    var existing = (vehicles || []).find(function(v) { return (v.plate || "").toLowerCase() === clean.toLowerCase(); });
    if (existing) onChange({ id:existing.id, plate:existing.plate, brand:existing.brand || "", type:existing.type || vehicleType, isNew:false });
    else onChange({ plate:clean, brand:(b !== undefined ? b : brand).trim(), type:vehicleType || "other", isNew:true });
  }

  return (
    <div style={{ position:"relative" }}>
      <input className="input-dark" value={plate} placeholder="Kennzeichen eingeben oder wählen"
        onFocus={function(){ changeOpen(true); }}
        onChange={function(e){ setPlate(e.target.value); changeOpen(true); }}
        onBlur={function(){ setTimeout(function(){ commit(); changeOpen(false); }, 180); }}
      />
      {plate.trim() && (
        <div>
          <div className="label-cap" style={{ visibility:"hidden" }}>Marke</div>
          <input className="input-dark" value={brand} placeholder="Marke / Modell (optional)"
            onChange={function(e){ setBrand(e.target.value); }}
            onBlur={function(){ commit(); }}
          />
        </div>
      )}
      {open && filtered.length > 0 && (
        <div className="dropdown-list">
          {filtered.map(function(v) {
            return (
              <div key={v.id || v.plate} className="dropdown-item"
                onMouseDown={function(){
                  setPlate(v.plate || ""); setBrand(v.brand || "");
                  onChange({ id:v.id, plate:v.plate, brand:v.brand || "", type:v.type || vehicleType, isNew:false });
                  changeOpen(false);
                }}>
                <div style={{ fontWeight:800 }}>{v.plate}</div>
                <div className="meta">{v.brand || labelFrom(VEHICLE_TYPES, v.type)}</div>
              </div>
            );
          })}
          {plate.trim() && !filtered.some(function(v){ return (v.plate || "").toLowerCase() === plate.toLowerCase(); }) && (
            <div className="dropdown-item" style={{ color:"#ffa500", fontWeight:800 }}>+ Neues Fahrzeug: {plate}</div>
          )}
        </div>
      )}
    </div>
  );
}

// === TimerBox: замер времени по реальным часам (переживает сворачивание и перезагрузку) ===
// storageKey — уникальный ключ для localStorage, чтобы старт пережил перезагрузку страницы
function TimerBox({ label, value, setValue, onFirstStart, storageKey }) {
  var TIMER_CAP_HOURS = 12; // потолок: дольше — подозрение что забыли выключить
  var lsKey = "wf_timer_" + (storageKey || label);

  var _sstart = useState(null); var startTs = _sstart[0]; var setStartTs = _sstart[1];
  var _stick = useState(0); var tick = _stick[0]; var setTick = _stick[1]; // только для перерисовки
  var _smm = useState(false); var manual = _smm[0]; var setManual = _smm[1];
  var _sh = useState(""); var h = _sh[0]; var setH = _sh[1];
  var _sm = useState(""); var m = _sm[0]; var setM = _sm[1];
  var _swarn = useState(false); var capWarn = _swarn[0]; var setCapWarn = _swarn[1];

  var active = startTs !== null;

  // При маунте — восстанавливаем незакрытый старт из localStorage
  useEffect(function() {
    try {
      var saved = localStorage.getItem(lsKey);
      if (saved) {
        var ts = parseInt(saved, 10);
        if (ts && !isNaN(ts)) {
          var elapsedH = (Date.now() - ts) / 3600000;
          if (elapsedH > TIMER_CAP_HOURS) {
            // Слишком долго — не доверяем, показываем предупреждение
            setCapWarn(true);
            localStorage.removeItem(lsKey);
          } else {
            setStartTs(ts);
          }
        }
      }
    } catch(e) {}
  }, []);

  // Тикалка — только перерисовывает экран раз в секунду, источник правды = startTs
  useEffect(function() {
    if (!active) return;
    var id = setInterval(function() { setTick(function(t) { return t + 1; }); }, 1000);
    return function() { clearInterval(id); };
  }, [active]);

  // Сколько секунд прошло с момента старта (по реальным часам)
  function elapsedSec() {
    if (startTs === null) return 0;
    return Math.max(0, Math.floor((Date.now() - startTs) / 1000));
  }

  function start() {
    if (onFirstStart) onFirstStart();
    var ts = Date.now();
    setStartTs(ts);
    try { localStorage.setItem(lsKey, String(ts)); } catch(e) {}
  }

  function stop() {
    var min = Math.max(1, Math.round(elapsedSec() / 60));
    setValue((value || 0) + min);
    setStartTs(null);
    try { localStorage.removeItem(lsKey); } catch(e) {}
  }

  function applyManual() {
    var hh = parseInt(h || "0", 10) || 0;
    var mm = parseInt(m || "0", 10) || 0;
    if (mm < 0 || mm > 59) { showToast("Ungültige Minuten."); return; }
    var total = hh * 60 + mm;
    if (total > 24 * 60) { showToast("Maximal 24 Stunden."); return; }
    if (onFirstStart) onFirstStart();
    // Если таймер шёл — останавливаем его, ручной ввод заменяет результат
    if (active) {
      setStartTs(null);
      try { localStorage.removeItem(lsKey); } catch(e) {}
    }
    setValue(total); setManual(false); setH(""); setM("");
  }

  function resetTimer() {
    setValue(0);
    setStartTs(null);
    setCapWarn(false);
    try { localStorage.removeItem(lsKey); } catch(e) {}
  }

  var statusColor = active ? "#22c55e" : "#fff";

  return (
    <div className="timer-card">
      <div className="timer-label">{label}</div>
      <div className="timer-time" style={{ color:statusColor }}>
        {active ? fmtSec(elapsedSec()) : fmtMin(value)}
      </div>
      {capWarn && (
        <div style={{ fontSize:12, color:"#ffa500", marginBottom:8, lineHeight:1.4 }}>
          ⚠ Timer lief sehr lange — bitte Zeit manuell prüfen und über „Manuell“ korrigieren.
        </div>
      )}
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {!active && (
          <button className="mini-btn start" type="button" onClick={start}
            style={{ width:"100%", padding:"16px", fontSize:16 }}>▶ Start</button>
        )}
        {active && (
          <button className="mini-btn stop" type="button" onClick={stop}
            style={{ width:"100%", padding:"16px", fontSize:16 }}>■ Stop</button>
        )}
        {!active && (
          <button className="mini-btn" type="button" onClick={function(){ setManual(true); }}
            style={{ width:"100%", padding:"16px", fontSize:16 }}>✎ Manuell</button>
        )}
        {!!value && !active && (
          <button className="mini-btn" type="button" onClick={resetTimer}
            style={{ width:"100%", padding:"16px", fontSize:16 }}>↺ Reset</button>
        )}
      </div>

      {manual && (
        <div className="modal-back" onClick={function(){ setManual(false); }}>
          <div className="modal" onClick={function(e){ e.stopPropagation(); }}>
            <div style={{ fontSize:20, fontWeight:800, marginBottom:14 }}>Zeit manuell erfassen</div>
            <div className="grid2">
              <input className="input-dark" inputMode="numeric" value={h} placeholder="Stunden" onChange={function(e){ setH(e.target.value.replace(/\D/g,"")); }} />
              <input className="input-dark" inputMode="numeric" value={m} placeholder="Minuten" onChange={function(e){ setM(e.target.value.replace(/\D/g,"")); }} />
            </div>
            <div style={{ display:"flex", gap:10, marginTop:14 }}>
              <button className="btn-primary" type="button" style={{ flex:1 }} onClick={applyManual}>Übernehmen</button>
              <button className="outline-btn" type="button" style={{ flex:1, padding:14 }} onClick={function(){ setManual(false); }}>Abbrechen</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// === BARCODE SCANNER ===
function BarcodeScanner({ onDetected, onClose }) {
  var scannerRef = useRef(null);
  var scannerDivId = "quagga-scanner-" + useRef(Math.random().toString(36).slice(2)).current;

  useEffect(function(){
    if (!window.Quagga) { onClose(); return; }
    var divId = scannerDivId;
    var started = false;

    window.Quagga.init({
      inputStream: {
        type: "LiveStream",
        target: document.getElementById(divId),
        constraints: { facingMode: "environment", width: 300, height: 200 }
      },
      decoder: { readers: ["ean_reader","ean_8_reader","code_128_reader","code_39_reader","upc_reader"] },
      locate: true
    }, function(err){
      if (err) { console.warn("Quagga init error:", err); onClose(); return; }
      window.Quagga.start();
      started = true;
    });

    window.Quagga.onDetected(function(result){
      var code = result && result.codeResult && result.codeResult.code;
      if (code) {
        window.Quagga.stop();
        onDetected(code);
      }
    });

    return function(){
      if (started) { try { window.Quagga.stop(); } catch(e){} }
    };
  }, []);

  return (
    <div className="scanner-overlay" onClick={onClose}>
      <div style={{ textAlign:"center", marginBottom:16 }}>
        <div style={{ fontSize:18, fontWeight:800, color:"#fff", marginBottom:4 }}>📷 Barcode scannen</div>
        <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>Kamera auf Barcode richten</div>
      </div>
      <div className="scanner-viewport" onClick={function(e){ e.stopPropagation(); }}>
        <div id={scannerDivId} style={{ width:"100%", height:"100%" }}></div>
        <div className="scanner-line"></div>
      </div>
      <button type="button" onClick={onClose}
        style={{ marginTop:20, border:"1px solid rgba(255,255,255,0.3)", background:"transparent", color:"#fff", borderRadius:10, padding:"10px 28px", fontSize:14, fontWeight:700, cursor:"pointer" }}>
        Abbrechen
      </button>
    </div>
  );
}

// Блок внешних услуг (Fremdleistung): балансировка, развал-схождение и т.п.
// Каждая запись создаёт invoice при старте заказа (привязка к машине + заказу).
function FremdleistungBlock({ fremdItems, setFremdItems, stageId }) {
  var _scol = useState(true); var collapsed = _scol[0]; var setCollapsed = _scol[1];

  function newFremd() {
    return { id: genId("FL"), bez:"", betrag:"", firma:"", rechnung_nr:"", foto:"" };
  }
  function addFremd() {
    setFremdItems((fremdItems || []).concat([newFremd()]));
    setCollapsed(false);
  }
  function updateFremd(id, field, val) {
    setFremdItems(fremdItems.map(function(f){
      return f.id === id ? Object.assign({}, f, { [field]:val }) : f;
    }));
  }
  function removeFremd(id) {
    setFremdItems(fremdItems.filter(function(f){ return f.id !== id; }));
  }

  var total = (fremdItems || []).reduce(function(s,f){ return s + parsePriceDE(f.betrag); }, 0);
  var hasItems = (fremdItems || []).length > 0;

  return (
    <div className="glass-panel">
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
        cursor: hasItems ? "pointer" : "default" }}
        onClick={function(){ if (hasItems) setCollapsed(!collapsed); }}>
        <div className="panel-title" style={{ marginBottom:0 }}>Fremdleistung</div>
        {hasItems && (
          <span style={{ fontSize:13, color:"#ffa500", fontWeight:700 }}>
            {fremdItems.length} · {total.toFixed(2)} € {collapsed ? "▾" : "▴"}
          </span>
        )}
      </div>
      <div style={{ fontSize:12, color:"rgba(255,255,255,0.45)", marginTop:4, marginBottom: (collapsed && hasItems) ? 0 : 12 }}>
        Arbeiten anderer Firmen (Reifenwuchten, Achsvermessung...)
      </div>

      {(!collapsed || !hasItems) && (
        <div>
          {(fremdItems || []).map(function(f, idx){
            return (
              <div key={f.id} style={{ background:"rgba(9,27,58,0.72)", border:"1px solid rgba(255,255,255,0.14)",
                borderRadius:14, padding:14, marginBottom:12 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                  <div style={{ fontSize:12, fontWeight:800, color:"#ffa500", letterSpacing:0.5 }}>FREMDLEISTUNG {idx + 1}</div>
                  <button type="button" onClick={function(){ removeFremd(f.id); }}
                    style={{ border:0, background:"transparent", color:"#ef4444", fontWeight:800, fontSize:20, lineHeight:1, padding:"0 6px" }}>×</button>
                </div>

                <div className="label-cap" style={{ marginBottom:4 }}>Bezeichnung *</div>
                <input className="input-dark" value={f.bez} placeholder="z.B. Reifenwuchten, Achsvermessung"
                  style={{ width:"100%", marginBottom:12 }}
                  onChange={function(e){ updateFremd(f.id, "bez", e.target.value); }} />

                <div className="label-cap" style={{ marginBottom:4 }}>Betrag (€) *</div>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
                  <input className="input-dark" inputMode="decimal" value={f.betrag} placeholder="0,00"
                    style={{ fontSize:18, padding:"12px 14px", fontWeight:700, flex:1 }}
                    onChange={function(e){ updateFremd(f.id, "betrag", e.target.value.replace(/[^0-9.,]/g,"")); }} />
                  <span style={{ fontSize:16, fontWeight:700, color:"rgba(255,255,255,0.5)" }}>€</span>
                </div>

                <div className="label-cap" style={{ marginBottom:4 }}>Firma (optional)</div>
                <input className="input-dark" value={f.firma} placeholder="Name der Firma"
                  style={{ width:"100%", marginBottom:12 }}
                  onChange={function(e){ updateFremd(f.id, "firma", e.target.value); }} />

                <div className="label-cap" style={{ marginBottom:4 }}>Rechnungs-Nr. (optional)</div>
                <input className="input-dark" value={f.rechnung_nr} placeholder="Nr."
                  style={{ width:"100%", marginBottom:12 }}

  function pauseJob() {
    if (savingRef.current) return;

// === Звук алерта (Web Audio API, без файлов) ===
function playAlertSound() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.18, 0.36].forEach(function(t) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = "sine";
      gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.15);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.15);
    });
  } catch(e) {}
}

    var pipe = s.indexOf("|");
    if (pipe !== -1) s = s.slice(0, pipe);
    s = s.replace(/-?\d+\.\d{3,},\s*-?\d+\.\d{3,}/g, "");
    s = s.replace(/,\s*DE\s*$/i, "").replace(/[,\s]+$/g, "").replace(/^\s+/, "");
    return s || "Standort";
  }

  function openNav(app, coords, loc) {
    var url;
    if (app === "google") {
      url = "https://maps.google.com/?q=" + coords.lat + "," + coords.lng;
    } else if (app === "waze") {
      url = "https://waze.com/ul?ll=" + coords.lat + "," + coords.lng + "&navigate=yes";
    } else if (app === "apple") {
      url = "https://maps.apple.com/?q=" + coords.lat + "," + coords.lng;
    }
    if (url) window.open(url, "_blank");
  }

  var open = (alerts || []).filter(function(a) {
    return a.status !== "done" && a.status !== "rejected";
  });

  function handleAction(a, action) {
    setModal({ alert:a, action:action });
    setReason("");
  }

  function confirmAction() {
    var a = modal.alert;
    var action = modal.action;
    if ((action === "reject" || action === "defer") && !reason.trim()) {
      showToast("Bitte Grund angeben.");
      return;
    }
    setUpdating(true);

    if (action === "take") {
      // Атомарно: берём алерт только если taken_by ещё пуст
      sbPatchConditional("alerts", a.id, "taken_by=is.null",
        { taken_by: user.id, taken_by_name: user.name })
        .then(function(rows) {
          setUpdating(false);
          setModal(null);
          if (rows.length === 0) {
            showToast("Bereits von einem anderen Mechaniker übernommen");
          }
          onRefresh();
        })
        .catch(function(e) { showToast("Fehler: " + e.message); setUpdating(false); });
      return;
    }

    var patch = {};
    if (action === "reject") {
      patch = { status:"rejected", reject_reason: reason };
    } else if (action === "defer") {
      patch = { status:"pending", reject_reason: reason };
    }
    sbPatch("alerts", a.id, patch)
      .then(function() { setUpdating(false); setModal(null); onRefresh(); })
      .catch(function(e) { showToast("Fehler: " + e.message); setUpdating(false); });
  }

  function doCreate(a) {
    // Атомарно пытаемся занять алерт. Если уже взят другим механиком —
    // форму НЕ открываем, только уведомляем. Просмотр остаётся, оформление — нет.
    setUpdating(true);
    sbPatchConditional("alerts", a.id, "taken_by=is.null",
      { taken_by: user.id, taken_by_name: user.name })
      .then(function(rows) {
        setUpdating(false);
        if (rows.length === 0) {
          // Условие taken_by=is.null не сработало — кто-то уже взял.
          // Исключение: мы сами уже держим этот алерт — тогда можно продолжать.
          if (a.taken_by === user.id) {
            onCreate(a);
          } else {
            showToast("Bereits von " + (a.taken_by_name || "einem anderen Mechaniker") + " übernommen");
            onRefresh();
          }
          return;
        }
        // Успешно заняли — открываем форму заказа
        onCreate(Object.assign({}, a, { taken_by: user.id, taken_by_name: user.name }));
      })
      .catch(function(e) {
        setUpdating(false);
        showToast("Fehler: " + e.message);
      });
  }

            <div style={{ display:"flex", gap:8 }}>
              <button type="button" disabled={internBusy} onClick={function(){ setInternRow(null); }}

                  fontSize:14, fontWeight:800, cursor:"pointer", opacity:(internBusy||!internMin)?0.5:1 }}>

      </div>
      {open.length === 0 && (
        <div className="glass-panel" style={{ textAlign:"center", color:"rgba(255,255,255,0.55)", padding:32 }}>

      {open.map(function(a) {

          <div key={a.id} className={"alert-card" + (urgent ? " urgent" : "") + (takenByOther ? "" : "")}

              </span>
              <strong style={{ fontSize:17 }}>{a.plate || "Ohne Kennzeichen"}</strong>
              {takenByMe && <span className="badge green">✓ Ich</span>}
              {takenByOther && <span className="badge gray">🔒 {a.taken_by_name || a.taken_by}</span>}

            <div className="meta">
              von {a.sender_app === "stapler" ? "Stapler" : "Fahrer"} · {a.created_at ? timeHM(a.created_at) : ""} · {a.sender || ""}

            <div style={{ marginTop:6 }}>

                        <button type="button" onClick={function(){ openNav("waze", coords, a.location); }}

                            borderRadius:12, border:"1.5px solid rgba(0,210,255,0.4)",
                            background:"rgba(0,210,255,0.08)", color:"#00D2FF",
                            fontFamily:"var(--font-display)", fontWeight:700, fontSize:15,
                            letterSpacing:0.5, cursor:"pointer", width:"100%" }}>
                          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="10" r="6"/><path d="M12 16v6"/><path d="M9 19h6"/></svg>
                          Waze öffnen
                        </button>
                        <button type="button" onClick={function(){
                            var txt = a.location || "";
                            if (navigator.clipboard) { navigator.clipboard.writeText(txt); }
                            setNavOpen(null);
                          }}
                          style={{ display:"flex", alignItems:"center", gap:12, padding:"14px 16px",
                            borderRadius:12, border:"1.5px solid rgba(255,255,255,0.15)",
                            background:"rgba(255,255,255,0.05)", color:"rgba(255,255,255,0.7)",
                            fontFamily:"var(--font-display)", fontWeight:700, fontSize:15,
                            letterSpacing:0.5, cursor:"pointer", width:"100%" }}>
                          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                          Adresse kopieren
                        </button>
                      </div>
                    )}
                  </div>
                );
              })()}
            </div>
            <div className="text-clamp-2" style={{ fontSize:14, lineHeight:1.45, marginTop:10, whiteSpace:"pre-wrap" }}>
              {a.description || a.note || "Keine Beschreibung"}
            </div>
            <RemotePhotos urls={a.photo_urls} />
            {a.reject_reason && (
              <div style={{ marginTop:8, fontSize:12, color:"rgba(255,165,0,0.7)", fontStyle:"italic" }}>
                Grund: {a.reject_reason}
              </div>
            )}

            {!takenByOther && (
              <div style={{ display:"flex", gap:8, marginTop:12, flexWrap:"wrap" }}>
                <button className="save-btn" type="button" disabled={updating}
                  style={{ flex:2, marginTop:0, marginBottom:0, padding:14, fontSize:14, opacity: updating ? 0.6 : 1 }}
                  onClick={function(){ doCreate(a); }}>
                  + Auftrag erstellen
                </button>
                <button type="button"
                  style={{ flex:1, padding:14, borderRadius:12, border:"1px solid rgba(255,165,0,0.4)", background:"transparent", color:"#ffa500", fontWeight:700, fontSize:13 }}
                  onClick={function(){ handleAction(a, "defer"); }}>
                  ⏸ Später
                </button>
                <button type="button"
                  style={{ flex:1, padding:14, borderRadius:12, border:"1px solid rgba(239,68,68,0.4)", background:"transparent", color:"#ef4444", fontWeight:700, fontSize:13 }}
                  onClick={function(){ handleAction(a, "reject"); }}>
                  ✕ Ablehnen
                </button>
              </div>
            )}
            {takenByOther && (
              <div style={{ marginTop:10, padding:"10px 14px", borderRadius:10, background:"rgba(255,255,255,0.05)", fontSize:13, color:"rgba(255,255,255,0.5)", textAlign:"center" }}>
                🔒 Übernommen von {a.taken_by_name || a.taken_by}
              </div>
            )}
          </div>
        );
      })}

      {modal && (
        <div className="modal-back" onClick={function(){ setModal(null); }}>
          <div className="modal" onClick={function(e){ e.stopPropagation(); }}>
            <div style={{ fontSize:18, fontWeight:800, marginBottom:8 }}>
              {modal.action === "reject" ? "✕ Ablehnen" : "⏸ Zurückstellen"}
            </div>
            <div style={{ fontSize:13, color:"rgba(255,255,255,0.6)", marginBottom:14 }}>
              {modal.alert.plate} · {modal.alert.description ? modal.alert.description.slice(0,60) : ""}
            </div>
            <div className="label-cap">Grund *</div>
            <textarea className="textarea-dark" value={reason}
              onChange={function(e){ setReason(e.target.value); }}
              placeholder={modal.action === "reject" ? "Warum abgelehnt?" : "Warum zurückgestellt?"}
              style={{ minHeight:80, marginBottom:14 }}
            />
            <div style={{ display:"flex", gap:10 }}>
              <button className="btn-primary" type="button" style={{ flex:1 }} disabled={updating} onClick={confirmAction}>
                {updating ? "..." : "Bestätigen"}
              </button>
              <button className="outline-btn" type="button" style={{ flex:1, padding:14 }} onClick={function(){ setModal(null); }}>
                Abbrechen
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

        doneRef.current = true;
        setActive(false);
        setProgress(0);
        if (onComplete) onComplete();
      }
      return;
    }
    rafRef.current = requestAnimationFrame(tick);
  }

  function start(e) {
    if (disabled) return;
    if (e && e.preventDefault) e.preventDefault();
    doneRef.current = false;
    startMsRef.current = Date.now();
    setActive(true);
    setProgress(0);
    rafRef.current = requestAnimationFrame(tick);
  }

  function cancel() {
    cancelAnimationFrame(rafRef.current);
    setActive(false);
    setProgress(0);
  }

  // Цвет фона прогресса = переданный color, фон кнопки = тот же с прозрачностью
  var bgFill = color || "#ef4444";
  var pctText = Math.round(progress * 100);

  return (
    <button type="button" disabled={disabled}
      onMouseDown={start} onMouseUp={cancel} onMouseLeave={cancel}
      onTouchStart={start} onTouchEnd={cancel} onTouchCancel={cancel}
      style={{
        position:"relative", overflow:"hidden",
        flex:1, padding:"16px 12px", borderRadius:14,
        border: "2px solid " + bgFill,
        background: active
          ? "linear-gradient(to right, " + bgFill + " " + pctText + "%, rgba(239,68,68,0.08) " + pctText + "%)"
          : "rgba(239,68,68,0.08)",
        color: active && progress > 0.5 ? "#fff" : bgFill,
        fontFamily:"var(--font-display)", fontWeight:800,
        fontSize:16, letterSpacing:0.5, cursor: disabled ? "default" : "pointer",
        opacity: disabled ? 0.5 : 1,
        transition: active ? "none" : "background 0.2s, color 0.2s",
        userSelect:"none", WebkitUserSelect:"none", touchAction:"manipulation"
      }}>
      {active ? "Halten... " + pctText + "%" : label}
    </button>
  );
}

// === MEINE AUFTRÄGE ===
function MeineAuftraege({ jobs, user, onRefresh, loading, onContinueJob }) {
  var _stab = useState("active"); var subTab = _stab[0]; var setSubTab = _stab[1];
  var _sup = useState(false); var updating = _sup[0]; var setUpdating = _sup[1];

  // Открытый заказ — полноэкранный просмотр с живым таймером
  var _soj = useState(null); var openJob = _soj[0]; var setOpenJob = _soj[1];
  // Модалка паузы (запрос причины)
  var _spm = useState(null); var pauseModalJob = _spm[0]; var setPauseModalJob = _spm[1];
  var _spr = useState(""); var pauseReasonInput = _spr[0]; var setPauseReasonInput = _spr[1];

  var mine = (jobs || []).filter(function(j) { return j.mechanic === (user && user.id); });

  // В работе — статус inProgress
  var activeJobs = mine.filter(function(j) { return j.status === "inProgress"; });
  // На паузе — статус paused
  var pausedJobs = mine.filter(function(j) { return j.status === "paused"; });
  // Завершённые сегодня — done с сегодняшней датой
  var doneToday = mine.filter(function(j) {
    return j.status === "done" &&
      (j.date || (j.created_at || "").slice(0,10)) === todayIso();
  });

  // Все заказы за сегодня для отчёта (все статусы)
  var todayJobs = mine.filter(function(j) {
    return (j.date || (j.created_at || "").slice(0,10)) === todayIso();
  });

  function parsePauseLog(j) {
    var log = j.pause_log;
    if (!log) return [];
    if (typeof log === "string") { try { log = JSON.parse(log); } catch(e) { return []; } }
    return Array.isArray(log) ? log : [];
  }

  function totalPauseMin(j) {
    return parsePauseLog(j).reduce(function(s, p) { return s + (p.minutes || 0); }, 0);
  }

  function exportDay() {
    var date = todayIso();
    var totalMin = todayJobs.reduce(function(s,j){ return s + (j.work_min || 0); }, 0);
    var totalCost = todayJobs.reduce(function(s,j){ return s + (Number(j.cost) || 0); }, 0);
    var totalPause = todayJobs.reduce(function(s,j){ return s + totalPauseMin(j); }, 0);
    var rows = todayJobs.map(function(j) {
      var statusDE = j.status === "done" ? "Fertig" : j.status === "inProgress" ? "In Arbeit" : j.status === "paused" ? "Pausiert" : "Neu";
      var statusColor = j.status === "done" ? "#16a34a" : j.status === "paused" ? "#ea7b00" : "#1e4fa0";
      var pLog = parsePauseLog(j);
      var pauseInfo = pLog.length > 0
        ? pLog.map(function(p){ return p.reason + (p.minutes ? " (" + fmtMin(p.minutes) + ")" : ""); }).join("; ")
        : "—";
      return "<tr>" +
        "<td>" + (j.plate || (j.work_type === "intern" ? "<i>Interne Arbeit</i>" : "—")) + "</td>" +
        "<td>" + (labelFrom(WORK_TYPES, j.work_type) || "") + "</td>" +
        "<td>" + (j.location || "") + "</td>" +
        "<td>" + (j.description ? j.description.slice(0,80) : "") + "</td>" +
        "<td>" + fmtMin(j.work_min || 0) + "</td>" +
        "<td>" + pauseInfo + "</td>" +
        "<td>" + (j.cost ? Number(j.cost).toFixed(2) + " EUR" : "—") + "</td>" +
        "<td style='color:" + statusColor + ";font-weight:bold'>" + statusDE + "</td>" +
        "</tr>";
    }).join("");
    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'>" +
      "<title>Tagesbericht " + date + "</title>" +
      "<style>body{font-family:Arial,sans-serif;padding:24px;color:#111;max-width:980px;margin:0 auto}" +
      "h1{color:#0a1730;margin-bottom:4px}h2{color:#555;font-size:14px;font-weight:normal;margin-bottom:20px}" +
      "table{width:100%;border-collapse:collapse;margin-bottom:20px}" +
      "td,th{padding:9px 11px;border-bottom:1px solid #e0e0e0;text-align:left;font-size:13px}" +
      "th{background:#0a1730;color:#fff;font-size:12px;letter-spacing:0.5px}" +
      "tr:nth-child(even){background:#f8f9fc}" +
      ".summary{display:flex;gap:24px;background:#f0f4ff;border-radius:12px;padding:16px 20px;margin-bottom:24px;flex-wrap:wrap}" +
      ".sum-item{text-align:center}.sum-val{font-size:24px;font-weight:900;color:#0a1730}" +
      ".sum-lab{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}" +
      "</style></head><body>" +
      "<h1>WerkFlow - Tagesbericht</h1>" +
      "<h2>" + user.name + " - " + dateDMY(date) + "</h2>" +
      "<div class='summary'>" +
      "<div class='sum-item'><div class='sum-val'>" + todayJobs.length + "</div><div class='sum-lab'>Aufträge</div></div>" +
      "<div class='sum-item'><div class='sum-val'>" + fmtMin(totalMin) + "</div><div class='sum-lab'>Arbeitszeit</div></div>" +
      "<div class='sum-item'><div class='sum-val'>" + fmtMin(totalPause) + "</div><div class='sum-lab'>Pausen</div></div>" +
      "<div class='sum-item'><div class='sum-val'>" + totalCost.toFixed(2) + " EUR</div><div class='sum-lab'>Gesamtkosten</div></div>" +
      "</div>" +
      "<table><thead><tr><th>Fahrzeug</th><th>Typ</th><th>Standort</th><th>Beschreibung</th><th>Arbeitszeit</th><th>Pausen</th><th>Kosten</th><th>Status</th></tr></thead>" +
      "<tbody>" + rows + "</tbody></table></body></html>";

    var fileName = "Tagesbericht_" + user.name.replace(/ /g,"_") + "_" + date + ".html";

    if (navigator.share && navigator.canShare) {
      var blob = new Blob([html], { type:"text/html" });
      var file = new File([blob], fileName, { type:"text/html" });
      if (navigator.canShare({ files:[file] })) {
        navigator.share({
          title: "Tagesbericht " + user.name + " - " + dateDMY(date),
          text: "WerkFlow Tagesbericht: " + todayJobs.length + " Aufträge, " + fmtMin(totalMin) + ", " + totalCost.toFixed(2) + " EUR",
          files: [file]
        }).catch(function(e){
          if (e.name !== "AbortError") fallbackDownload(html, fileName);
        });
        return;
      }
    }
    fallbackDownload(html, fileName);
  }

  function fallbackDownload(html, fileName) {
    var blob = new Blob([html], { type:"text/html" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = fileName; a.click();
    URL.revokeObjectURL(url);
  }

  // Пауза заказа — открывает модалку с вводом причины
  function handlePause(job) {
    setPauseModalJob(job);
    setPauseReasonInput("");
  }

  // Подтверждение паузы — пишем pause_log, status=paused, фиксируем work_min
  function confirmPause() {
    if (!pauseModalJob) return;
    if (!pauseReasonInput.trim()) { showToast("Bitte Grund angeben."); return; }
    var job = pauseModalJob;
    setUpdating(true);

    var nowMs = Date.now();
    var workSec = jobElapsedSec(job, nowMs);
    var workMin = Math.round(workSec / 60);
    var laborCost = (user && user.rate) ? Math.round((workMin / 60) * user.rate * 100) / 100 : (Number(job.labor_cost) || 0);

    var log = job.pause_log;
    if (typeof log === "string") { try { log = JSON.parse(log); } catch(e) { log = []; } }
    if (!Array.isArray(log)) log = [];
    // Закрываем все открытые паузы (защита от рассогласования)
    log = log.map(function(p){
      if (p.end) return p;
      var endT = new Date();
      var startT = p.start ? new Date(p.start) : endT;
      var mins = Math.max(0, Math.round((endT - startT) / 60000));
      return Object.assign({}, p, { end: endT.toISOString(), minutes: mins });
    });
    log.push({
      start: new Date().toISOString(),
      end: null,
      reason: pauseReasonInput.trim(),
      minutes: null
    });

    sbPatch("jobs", job.id, {
      status: "paused",
      paused_at: new Date().toISOString(),
      pause_log: JSON.stringify(log),
      work_min: workMin,
      labor_cost: laborCost
    }).then(function(){
      setUpdating(false);
      setPauseModalJob(null);
      setPauseReasonInput("");
      // Если этот заказ был открыт — закрываем окно (он переехал в Pausiert)
      if (openJob && openJob.id === job.id) setOpenJob(null);
      if (onRefresh) onRefresh();
    }).catch(function(e){
      setUpdating(false);
      showToast("Fehler: " + (e.message || e));
    });
  }

  // Продолжение из паузы — закрываем активную паузу, status=inProgress
  function handleWeiter(job) {
    setUpdating(true);
    var log = job.pause_log;
    if (typeof log === "string") { try { log = JSON.parse(log); } catch(e) { log = []; } }
    if (!Array.isArray(log)) log = [];
    log = log.map(function(p){
      if (p.end) return p;
      var endT = new Date();
      var startT = p.start ? new Date(p.start) : endT;
      var mins = Math.max(0, Math.round((endT - startT) / 60000));
      return Object.assign({}, p, { end: endT.toISOString(), minutes: mins });
    });

    sbPatch("jobs", job.id, {
      status: "inProgress",
      paused_at: null,
      pause_log: JSON.stringify(log)
    }).then(function(){
      setUpdating(false);
      // Обновляем открытый заказ если этот же
      if (openJob && openJob.id === job.id) {
        setOpenJob(Object.assign({}, openJob, { status:"inProgress", paused_at:null, pause_log: JSON.stringify(log) }));
      }
      if (onRefresh) onRefresh();
    }).catch(function(e){
      setUpdating(false);
      showToast("Fehler: " + (e.message || e));
    });
  }

  // Финальное завершение через long-press: status=done, фиксируем финальные часы и стоимость
  function handleFertig(job, elapsedSec) {
    setUpdating(true);
    var workMin = Math.round((elapsedSec || jobElapsedSec(job, Date.now())) / 60);
    var laborCost = (user && user.rate) ? Math.round((workMin / 60) * user.rate * 100) / 100 : (Number(job.labor_cost) || 0);

    // Если есть открытая пауза — закрываем
    var log = job.pause_log;
    if (typeof log === "string") { try { log = JSON.parse(log); } catch(e) { log = []; } }
    if (!Array.isArray(log)) log = [];
    log = log.map(function(p){
      if (p.end) return p;
      var endT = new Date();
      var startT = p.start ? new Date(p.start) : endT;
      var mins = Math.max(0, Math.round((endT - startT) / 60000));
      return Object.assign({}, p, { end: endT.toISOString(), minutes: mins });
    });

    sbPatch("jobs", job.id, {
      status: "done",
      finished_at: new Date().toISOString(),
      paused_at: null,
      pause_log: JSON.stringify(log),
      work_min: workMin,
      labor_cost: laborCost
    }).then(function(){
      setUpdating(false);
      setOpenJob(null);
      // Заказ завершён — теперь закрываем связанную заявку (alert→done).
      // До этого момента заявка была 'inProgress' (механик работал).
      if (job.alert_id) {
        sbPatch("alerts", job.alert_id, { status: "done" }).catch(function(){});
      }
      if (job.task_id) {
        // Помечаем КОНКРЕТНУЮ строку задания (task_row_index). Если все строки done — задание erledigt.
        var trIx = (typeof job.task_row_index === "number") ? job.task_row_index : null;
        sbSelect("tasks", "select=*&id=eq." + encodeURIComponent(job.task_id) + "&limit=1").then(function(res){
          var tk = res && res[0];
          if (!tk) return;
          var items = (tk.items && tk.items.length) ? tk.items.slice() : [];
          if (trIx !== null && items[trIx]) {
            items[trIx] = Object.assign({}, items[trIx], { done: true, job_id: job.id });
          }
          var allDone = items.length > 0 && items.every(function(it){ return it.done; });
          var patch = { items: items, linked_job_id: job.id, updated_at: new Date().toISOString() };
          if (allDone || items.length === 0) { patch.status = "erledigt"; patch.done_at = new Date().toISOString(); }
          sbPatch("tasks", job.task_id, patch).catch(function(){});
        }).catch(function(){});
      }
      if (onRefresh) onRefresh();
      showToast("Auftrag abgeschlossen — " + fmtMin(workMin) + " · " + laborCost.toFixed(2) + " €");
    }).catch(function(e){
      setUpdating(false);
      showToast("Fehler: " + (e.message || e));
    });
  }

  // Редактирование заказа — открывает форму создания через onContinueJob (старый поток)
  function handleEdit(job) {
    setOpenJob(null);
    if (onContinueJob) onContinueJob(job);
  }

  // Карточка заказа — тап на карточку открывает полный вид (OpenJobView).
  // Кнопки внизу карточки — быстрые действия (stopPropagation чтобы не открывать).
  function jobCard(j, mode) {
    var pLog = parsePauseLog(j);
    var tPause = totalPauseMin(j);
    return (
      <div key={j.id} className="alert-card"
        onClick={function(){ setOpenJob(j); }}
        style={{ cursor:"pointer" }}>
        <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:8, marginBottom:8 }}>
          <div>
            <div style={{ fontSize:17, fontWeight:800 }}>{j.plate || (j.work_type === "intern" ? "Interne Arbeit" : "Ohne Kennzeichen")}</div>
            <div className="meta" style={{ marginTop:4 }}>📍 {j.location || "Werkstatt"} · {labelFrom(WORK_TYPES, j.work_type)}</div>
          </div>
          <span style={{
            display:"inline-flex", alignItems:"center", gap:6,
            fontSize:11, fontWeight:700, letterSpacing:0.5,
            color: mode === "active" ? "#22c55e" : mode === "paused" ? "#ffa500" : "rgba(255,255,255,0.4)"
          }}>
            <span style={{
              width:8, height:8, borderRadius:"50%",
              background: mode === "active" ? "#22c55e" : mode === "paused" ? "#ffa500" : "rgba(255,255,255,0.4)",
              flexShrink:0
            }}></span>
            {mode === "active" ? "In Arbeit" : mode === "paused" ? "Pausiert" : "Erledigt"}
          </span>
        </div>
        {j.description && <div className="text-clamp-2" style={{ fontSize:13, lineHeight:1.4, marginBottom:8, whiteSpace:"pre-wrap" }}>{j.description}</div>}
        <div className="meta" style={{ marginTop:4 }}>
          ⏱ {fmtMin(j.work_min || 0)}
          {tPause > 0 ? " · Pause: " + fmtMin(tPause) : ""}
        </div>
        {pLog.length > 0 && (
          <div className="pause-reason-box" style={{ marginTop:8 }}>
            <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,165,0,0.85)", marginBottom:6 }}>PAUSEN-JOURNAL</div>
            {pLog.map(function(p, i){
              var t = p.start ? new Date(p.start).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}) : "";
              return (
                <div key={i} style={{ fontSize:13, marginBottom: i < pLog.length-1 ? 5 : 0, lineHeight:1.4 }}>
                  <span style={{ color:"rgba(255,165,0,0.8)", fontWeight:700 }}>{t}</span>
                  {p.minutes ? <span style={{ color:"rgba(255,255,255,0.5)" }}> · {fmtMin(p.minutes)}</span> : <span style={{ color:"#ffa500" }}> · läuft</span>}
                  <span style={{ color:"rgba(255,255,255,0.85)" }}> — {p.reason}</span>
                </div>
              );
            })}
          </div>
        )}
        {(mode === "active" || mode === "paused") && (
          <div style={{ display:"flex", gap:8, marginTop:12, flexWrap:"wrap" }} onClick={function(e){ e.stopPropagation(); }}>
            {mode === "active" && (
              <button className="mini-btn" type="button" disabled={updating}
                onClick={function(e){ e.stopPropagation(); handlePause(j); }}
                style={{ border:"2px solid #ffa500", background:"rgba(255,165,0,0.1)", color:"#ffa500" }}>
                ⏸ Pause
              </button>
            )}
            {mode === "paused" && (
              <button className="mini-btn start" type="button" disabled={updating}
                onClick={function(e){ e.stopPropagation(); handleWeiter(j); }}>
                ▶ Weiter
              </button>
            )}
            <LongPressButton label="■ Fertig (halten)" color="#ef4444" disabled={updating}
              onComplete={function(){ handleFertig(j, jobElapsedSec(j, Date.now())); }} />
          </div>
        )}
      </div>
    );
  }

  var tabs = [
    { key:"active", label:"In Arbeit", count:activeJobs.length },
    { key:"paused", label:"Pausiert",  count:pausedJobs.length },
    { key:"done",   label:"Erledigt",  count:doneToday.length }
  ];

  var currentList = subTab === "active" ? activeJobs : subTab === "paused" ? pausedJobs : doneToday;
  var emptyText = subTab === "active" ? "Keine Aufträge in Arbeit"
    : subTab === "paused" ? "Keine pausierten Aufträge"
    : "Heute noch nichts abgeschlossen";

  // Если открыт заказ — берём свежую версию из jobs (на случай обновления данных)
  var openJobFresh = openJob
    ? (jobs || []).find(function(j){ return j.id === openJob.id; }) || openJob
    : null;

  return (
    <div>
      {/* Открытый заказ перекрывает список */}
      {openJobFresh && (
        <OpenJobView
          job={openJobFresh}
          user={user}
          onClose={function(){ setOpenJob(null); }}
          onRefresh={onRefresh}
          onEdit={handleEdit}
          onPause={handlePause}
          onWeiter={handleWeiter}
          onFertig={handleFertig}
        />
      )}

      {/* Модалка паузы — может вызываться как из карточки, так и из OpenJobView */}
      {pauseModalJob && (
        <div className="modal-back" onClick={function(){ setPauseModalJob(null); }}>
          <div className="modal" onClick={function(e){ e.stopPropagation(); }}>
            <div style={{ fontSize:18, fontWeight:800, marginBottom:6 }}>⏸ Auftrag pausieren</div>
            <div style={{ fontSize:13, color:"rgba(255,255,255,0.55)", marginBottom:14 }}>
              <strong style={{ color:"#fff" }}>{pauseModalJob.plate}</strong> — Timer wird gestoppt.
            </div>
            <div className="label-cap">Grund der Pause</div>
            <textarea className="textarea-dark" value={pauseReasonInput}
              onChange={function(e){ setPauseReasonInput(e.target.value); }}
              placeholder="z.B. Ersatzteil holen, Mittagspause, Kunde wartet..."
              style={{ minHeight:90, marginBottom:14 }}
              autoFocus
            />
            <div style={{ display:"flex", gap:10 }}>
              <button className="btn-primary" type="button" style={{ flex:1 }}
                disabled={updating || !pauseReasonInput.trim()}
                onClick={confirmPause}>
                Pausieren
              </button>
              <button type="button"
                style={{ flex:1, padding:14, borderRadius:12,
                  border:"1px solid rgba(255,255,255,0.2)", background:"rgba(255,255,255,0.05)",
                  color:"#fff", fontFamily:"var(--font-display)", fontWeight:700, cursor:"pointer" }}
                onClick={function(){ setPauseModalJob(null); setPauseReasonInput(""); }}>
                Abbrechen
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Обычный список (скрыт когда открыт заказ) */}
      <div style={{ display: openJobFresh ? "none" : "block" }}>
      <div className="page-title">Meine <span style={{ color:"#ffa500" }}>Aufträge</span></div>
      <div style={{ display:"flex", gap:8, marginBottom:14 }}>
        <button className="outline-btn" type="button"
          style={{ flex:2, padding:"15px 6px", fontSize:15 }} onClick={onRefresh}>
          {loading ? "Lädt..." : "↻ Aktualisieren"}
        </button>
        <button type="button" onClick={exportDay}
          style={{ flex:1, padding:"15px 6px", borderRadius:12,
            border:"1px solid rgba(255,165,0,0.5)", background:"rgba(255,165,0,0.08)",
            color:"#ffa500", fontWeight:700, fontSize:14, whiteSpace:"nowrap",
            fontFamily:"var(--font-display)", cursor:"pointer" }}>
          📄 Tagesbericht
        </button>
      </div>

      {/* Вкладки-фильтры */}
      <div style={{ display:"flex", gap:8, marginBottom:14 }}>
        {tabs.map(function(t){
          var isActive = subTab === t.key;
          return (
            <button key={t.key} type="button" onClick={function(){ setSubTab(t.key); }}
              style={{ flex:1, padding:"11px 6px", borderRadius:12,
                border: isActive ? "1.5px solid #ffa500" : "1px solid rgba(255,255,255,0.15)",
                background: isActive ? "rgba(255,165,0,0.12)" : "rgba(255,255,255,0.04)",
                color: isActive ? "#ffa500" : "rgba(255,255,255,0.6)",
                fontFamily:"var(--font-display)", fontWeight:800, fontSize:13,
                cursor:"pointer", letterSpacing:0.3 }}>
              {t.label}
              <span style={{ display:"block", fontSize:18, marginTop:2,
                color: isActive ? "#ffa500" : "rgba(255,255,255,0.4)" }}>{t.count}</span>
            </button>
          );
        })}
      </div>

      {todayJobs.length > 0 && (
        <div style={{ marginBottom:12, padding:"14px 16px", borderRadius:12, background:"rgba(255,255,255,0.06)", fontSize:15, color:"rgba(255,255,255,0.85)", display:"flex", gap:18, flexWrap:"wrap", fontWeight:600 }}>
          <span>Heute: {todayJobs.length} Aufträge</span>
          <span>⏱ {fmtMin(todayJobs.reduce(function(s,j){ return s + (j.work_min||0); },0))}</span>
          <span>💶 {todayJobs.reduce(function(s,j){ return s + (Number(j.cost)||0); },0).toFixed(2)} €</span>
        </div>
      )}

      {currentList.length === 0 && (
        <div className="glass-panel" style={{ textAlign:"center", color:"rgba(255,255,255,0.55)", padding:32 }}>{emptyText}</div>
      )}
      {currentList.map(function(j){ return jobCard(j, subTab); })}
      </div>
    </div>
  );
}
