const sb = {
  query: function(table, opts) {
    var url = SUPABASE_URL + "/rest/v1/" + table + "?";
    if (opts && opts.select)  url += "select=" + opts.select + "&";
    if (opts && opts.filter)  url += opts.filter + "&";
    if (opts && opts.order)   url += "order=" + opts.order + "&";
    if (opts && opts.limit)   url += "limit=" + opts.limit + "&";
    var timeout = new Promise(function(_, rej){
      setTimeout(function(){ rej(new Error("timeout")); }, 5000);
    });
    return Promise.race([
      fetch(url, {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY,
          "Content-Type": "application/json"
        }
      }).then(function(r){
        if (!r.ok) return [];
        return r.json().then(function(d){ return Array.isArray(d) ? d : []; });
      }),
      timeout
    ]).catch(function(){ return []; });
  },
  insert: function(table, data) {
    return fetch(SUPABASE_URL + "/rest/v1/" + table, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify(data)
    }).then(function(r){ return r.status < 400 ? true : r.json(); });
  },
  update: function(table, id, data) {
    return fetch(SUPABASE_URL + "/rest/v1/" + table + "?id=eq." + id, {
      method: "PATCH",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify(data)
    }).then(function(r){ return r.status < 400 ? true : r.json(); });
  },
  subscribe(table, callback) {
    const ws = new WebSocket(
      SUPABASE_URL.replace("https","wss") + "/realtime/v1/websocket?apikey=" + SUPABASE_KEY + "&vsn=1.0.0"
    );
    ws.onopen = () => {
      ws.send(JSON.stringify({
        topic: "realtime:public:" + table,
        event: "phx_join",
        payload: { config: { broadcast: { self: true }, presence: { key: "" } } },
        ref: null
      }));
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.event === "INSERT" || msg.event === "UPDATE") {
        callback(msg.payload.record);
      }
    };
    return ws;
  }
};

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function formatMin(min) {
  if (!min) return "—";
  const h = Math.floor(min / 60);
  const m = min % 60;
  if (h > 0) return `${h}h ${m}min`;
  return `${m}min`;
}

function TimerBox({ label, icon, color, active, elapsed, savedMin, onToggle, onManual, t }) {
  const [manual, setManual] = useState(false);
  const [mH, setMH] = useState("0");
  const [mM, setMM] = useState("");

  const applyManual = () => {
    const total = (parseInt(mH)||0)*60 + (parseInt(mM)||0);
    if (total > 0) { onManual(total); setManual(false); }
  };
  const reset = () => { onManual(0); setMH("0"); setMM(""); };

  return (
    <div style={{ background: C.bg, borderRadius: 12, padding: 14, textAlign: "center", border: `1px solid ${active ? color+"88" : savedMin > 0 ? C.green+"55" : C.border}`, transition: "border 0.2s" }}>
      <div style={{ fontSize: 11, color: "#1e4fa0", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.8px" }}>{icon} {label}</div>
      {!manual ? (
        <div>
          <div style={{ fontSize: 28, fontWeight: 900, color: active ? color : savedMin > 0 ? C.green : C.white, fontFamily: "monospace", marginBottom: 8, letterSpacing: "-1px" }}>
            {savedMin > 0 && !active ? formatMin(savedMin) : formatTime(elapsed)}
          </div>
          {savedMin > 0 && !active ? (
            <div style={{ display: "flex", gap: 6, justifyContent: "center" }}>
              <span style={{ fontSize: 11, color: C.green, fontWeight: 700 }}>✅ OK</span>
              <button onClick={reset} style={{ fontSize: 11, color: C.gray500, background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>{(t ? t.reset : "R")||"↺"}</button>
            </div>
          ) : (
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={onToggle} style={{ flex: 1, background: active ? C.red : color, color: "#fff", border: "none", borderRadius: 8, padding: "8px 0", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>
                {active ? "⏹ STOP" : "▶ START"}
              </button>
              {!active && (
                <button onClick={() => setManual(true)} title="edit"
                  style={{ background: C.navyMid, border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 10px", fontSize: 14, cursor: "pointer" }}>✏</button>
              )}
            </div>
          )}
        </div>
      ) : (
        <div>
          <div style={{ fontSize: 11, color: C.orange, marginBottom: 8, fontWeight: 700 }}>✏ Manual</div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "center", marginBottom: 8 }}>
            <input value={mH} onChange={e => setMH(e.target.value)} placeholder="0"
              style={{ width: 44, background: C.navyDark, border: "1px solid "+C.border, borderRadius: 7, padding: "6px 8px", color: C.white, fontSize: 16, fontWeight: 700, textAlign: "center", outline: "none" }} />
            <span style={{ color: C.gray500, fontWeight: 700 }}>h</span>
            <input value={mM} onChange={e => setMM(e.target.value)} placeholder="0"
              style={{ width: 44, background: C.navyDark, border: "1px solid "+C.border, borderRadius: 7, padding: "6px 8px", color: C.white, fontSize: 16, fontWeight: 700, textAlign: "center", outline: "none" }} />
            <span style={{ color: C.gray500, fontWeight: 700 }}>min</span>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={applyManual} style={{ flex: 1, background: C.green, color: "#fff", border: "none", borderRadius: 8, padding: "7px 0", fontSize: 12, fontWeight: 800, cursor: "pointer" }}>✅ OK</button>
            <button onClick={() => setManual(false)} style={{ background: C.navyMid, border: `1px solid ${C.border}`, borderRadius: 8, padding: "7px 10px", fontSize: 12, color: C.gray300, cursor: "pointer" }}>✕</button>
          </div>
        </div>
      )}
    </div>
  );
}

function translateToGerman(text) {
  if (!text || !text.trim()) return Promise.resolve(text);
  if (!/[--іІїЇєЄ]/.test(text)) return Promise.resolve(text);
  return fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 300,
      messages: [{ role: "user",
        content: "Translate to German for a vehicle repair report. Return ONLY the translation, nothing else:\n\n" + text
      }]
    })
  }).then(function(r){ return r.json(); })
    .then(function(d){
      return (d.content && d.content[0] && d.content[0].text ? d.content[0].text.trim() : null) || text;
    })
    .catch(function(){ return text; });
}

function MyJobs({ user, jobs, setJobs, t }) {
  const isViewer = user.role === "boss" || user.role === "fpl";
  const myJobs = isViewer ? jobs : jobs.filter(j => j.mechanic === user.id || j.colleague === user.id);
  const [editJob, setEditJob] = useState(null);

  const getName = (id) => (USERS.find(u => u.id === id) || {}).name || id;
  const updateStatus = (id, status) => setJobs(prev => prev.map(j => j.id === id ? {...j, status} : j));
  const saveEdit = function(updated) {
    sb.update("jobs", updated.id, {
      status: updated.status, description: updated.description,
      travel_to_min: updated.travelToMin, travel_back_min: updated.travelBackMin,
      work_min: updated.workMin,
    }).catch(function(e){ console.error("job edit:", e); });
    setJobs(function(prev){ return prev.map(function(j){ return j.id === updated.id ? updated : j; }); });
    if (updated.status === "done" && updated.plate) {
      setAlerts(function(prev){ return prev.map(function(a){
        if (a.status !== "done" && a.plate === updated.plate) {
          sb.update("alerts", a.id, { status: "done" }).catch(function(e){ console.error("alert close:", e); });
          return Object.assign({}, a, { status: "done" });
        }
        return a;
      }); });
    }
    setEditJob(null);
  };

  const workTypeIcon = { repair:"🔧", maintenance:"🛢", inspection:"🔍", travelToShop:"🏪", emergency:"🚨" };
  const vehicleIcon  = { truck:"LKW", semiTrailer:"SAT", forklift:"STG", trailer:"ANH", pkw:"PKW", other:"SNG" };

  return (
    <div>
      {editJob && <EditJobModal job={editJob} onSave={saveEdit} onClose={() => setEditJob(null)} t={t} />}

              <div>
                <div style={{ fontWeight: 800, fontSize: 15 }}>{job.plate}</div>

function exportDayReport(jobs, vehicles, lang) {
  var today = new Date().toISOString().slice(0,10);
  var todayJobs = jobs.filter(function(j){ return j.date === today; });
  var dateStr = new Date().toLocaleDateString("de-DE");

  var vLabel = {truck:"LKW",semiTrailer:"SAT",forklift:"STG",trailer:"ANH",pkw:"PKW",other:"SNG"};
  var rows = todayJobs.map(function(j) {
    return "<tr style='border-bottom:1px solid #eee'>" +
      "<td style='padding:8px'>" + (vLabel[j.vehicleType]||"") + " " + (j.plate||"") + "</td>" +
      "<td style='padding:8px'>" + (j.mechanic||"") + "</td>" +
      "<td style='padding:8px'>" + (j.workType||"") + "</td>" +
      "<td style='padding:8px'>" + (j.description||"").slice(0,60) + "</td>" +
      "<td style='padding:8px'>" + (j.workMin||0) + " min</td>" +
      "<td style='padding:8px'>" + (j.cost||0).toFixed(2) + " €</td>" +
      "<td style='padding:8px'>" + (j.location||"") + "</td>" +
    "</tr>";
  }).join("");

  var totalCost = todayJobs.reduce(function(s,j){ return s+(j.cost||0); }, 0);
  var totalMin = todayJobs.reduce(function(s,j){ return s+(j.workMin||0); }, 0);

  var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'>" +
    "<style>body{font-family:Arial,sans-serif;padding:20px;color:#222}" +
    "h1{color:#1a3a6b}table{width:100%;border-collapse:collapse;margin-top:20px}" +
    "th{background:#1a3a6b;color:#fff;padding:10px;text-align:left}" +
    "tr:nth-child(even){background:#f5f5f5}" +
    ".summary{margin-top:20px;padding:15px;background:#f0f4ff;border-radius:8px}" +
    "</style></head><body>" +
    "<h1>LTG Werkstatt — Tagesbericht</h1>" +
    "<p><b>Datum:</b> " + dateStr + " | <b>Aufträge:</b> " + todayJobs.length + "</p>" +
    "<table><thead><tr>" +
    "<th>Fahrzeug</th><th>Mechaniker</th><th>Art</th><th>Beschreibung</th>" +
    "<th>Zeit</th><th>Kosten</th><th>Standort</th>" +
    "</tr></thead><tbody>" + rows + "</tbody></table>" +
    "<div class='summary'>" +
    "<b>Gesamt:</b> " + todayJobs.length + " Aufträge | " +
    Math.floor(totalMin/60) + "h " + (totalMin%60) + "min | " +
    totalCost.toFixed(2) + " €" +
    "</div></body></html>";

  var blob = new Blob([html], {type: "text/html"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "LTG_Bericht_" + today + ".html";
  a.click();
  URL.revokeObjectURL(url);
}

            return (

                style={{ padding:"6px 10px", borderRadius:6, cursor:"pointer", marginBottom:3,

                  color: period===p[0] ? "#fff" : "rgba(255,255,255,0.6)",

<div style={{ flex:1, overflowY:"auto", padding:"20px 24px" }}>

                    </thead>
                    <tbody>
                      {filtered.slice(0,8).map(function(j){

                        return <th key={h} style={{ padding:"8px 10px", textAlign:"left",
                          fontSize:11, color:C.gray500, fontWeight:600 }}>{h}</th>;
                      })}
                    </tr>
                  </thead>
                  <tbody>
                    {washJobs.map(function(j){
                      var washTypeLabel = {basic:"Einfach", full:"Vollwäsche", chemical:"Chemisch", other:"Sonstiges"}[j.washType||"basic"]||"Einfach";
                      var vAbbr3 = {truck:"LKW",semiTrailer:"SAT",forklift:"STG",trailer:"ANH",pkw:"PKW",other:"SNG"}[j.vehicleType]||"SNG";
                      return (
                        <tr key={j.id} style={{ borderBottom:"1px solid "+C.border+"44" }}>
                          <td style={{ padding:"9px 10px", fontWeight:700, color:C.white }}>
                            <span style={{ fontSize:9, fontWeight:800, color:"#1e4fa0", background:"#1e4fa018", borderRadius:3, padding:"1px 4px", marginRight:6, letterSpacing:"0.5px" }}>{vAbbr3}</span>
                            {j.plate}
                          </td>
                          <td style={{ padding:"9px 10px", color:C.gray300, fontSize:12 }}>{j.vehicleType}</td>
                          <td style={{ padding:"9px 10px", color:C.gray300 }}>{washTypeLabel}</td>
                          <td style={{ padding:"9px 10px", color:C.gray300 }}>{formatMin(j.workMin)}</td>
                          <td style={{ padding:"9px 10px", color:C.gray300 }}>{(j.cost||0).toFixed(2)}€</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

function Lager({ user, stock, setStock, invoices, setInvoices, t }) {
  const [activeTab, setActiveTab] = useState("stock"); // stock | invoices | addInvoice
  const [search, setSearch] = useState("");
  const [editItem, setEditItem] = useState(null);
  const [showAddItem, setShowAddItem] = useState(false);
  const [newItem, setNewItem] = useState({ name:"", category:"", quantity:"", minQty:"", unit:"Stk", location:"" });
  const [invoice, setInvoice] = useState({ supplier:"", amount:"", items:"", jobId:"", photo:null });
  const [invoiceSaved, setInvoiceSaved] = useState(false);

  const isMechanic = user.role === "mechanic";

  const filtered = stock.filter(s =>
    s.name.toLowerCase().includes(search.toLowerCase()) ||
    s.category.toLowerCase().includes(search.toLowerCase())
  );

  const stockStatus = (item) => {
    if (item.quantity === 0) return { color: C.red, label: t.stockEmpty, bg: C.red+"22" };
    if (item.quantity <= item.minQty) return { color: C.yellow, label: t.stockLow, bg: C.yellow+"22" };
    return { color: C.green, label: t.stockOk, bg: C.green+"22" };
  };

  const updateQty = (id, delta) => {
    setStock(prev => prev.map(s => s.id === id ? { ...s, quantity: Math.max(0, s.quantity + delta) } : s));
  };

  const addItem = () => {
    if (!newItem.name) return;
    const item = { ...newItem, id:"S"+Date.now(),
      quantity: parseInt(newItem.quantity)||0, minQty: parseInt(newItem.minQty)||1 };

    sb.insert("stock", {
      id: item.id, name: item.name, category: item.category || "",
      quantity: item.quantity, min_qty: item.minQty,
      unit: item.unit || "Stk", location: item.location || "",
    }).catch(e => console.error("stock:", e));
    setStock(prev => [...prev, item]);
    setNewItem({ name:"", category:"", quantity:"", minQty:"", unit:"Stk", location:"" });
    setShowAddItem(false);
  };

  const saveInvoice = () => {
    if (!invoice.supplier || !invoice.amount) return;
    const newInv = { id:"R"+Date.now(), date: new Date().toISOString().slice(0,10),
      mechanic: user.id, ...invoice, amount: parseFloat(invoice.amount)||0 };
    sb.insert("invoices", {
      id: newInv.id, date: newInv.date, supplier: newInv.supplier,
      amount: newInv.amount, items: newInv.items || "",
      mechanic: newInv.mechanic, job_id: newInv.jobId || null,
    }).catch(e => console.error("invoice:", e));
    setInvoices(prev => [newInv, ...prev]);
    setInvoice({ supplier:"", amount:"", items:"", jobId:"", photo:null });
    setInvoiceSaved(true);
    setTimeout(() => { setInvoiceSaved(false); setActiveTab("invoices"); }, 1500);
  };

  const handleInvPhoto = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setInvoice(i => ({ ...i, photo: ev.target.result }));
    reader.readAsDataURL(file);

function Fahrzeuge({ user, vehicles, setVehicles, t, initialSelected, onClearSelected }) {
  const [selected, setSelected] = useState(initialSelected || null);
  useEffect(() => {
    if (initialSelected) { setSelected(initialSelected); if(onClearSelected) onClearSelected(); }
  }, [initialSelected]);
  const [showAdd, setShowAdd] = useState(false);
  const [search, setSearch] = useState("");
  const [saved, setSaved] = useState(false);

  const [partsType, setPartsType] = useState(""); // no_parts | inspection | from_stock | buy | used
  const [partsItems, setPartsItems] = useState([]); // selected stock items
  const [partsInvoice, setPartsInvoice] = useState(""); // invoice number
  const [partsSupplier, setPartsSupplier] = useState(""); // supplier
  const [partsCost, setPartsCost] = useState(""); // cost
  const [partsNote, setPartsNote] = useState(""); // description for used/buy
  const [partsDate, setPartsDate] = useState(""); // invoice date
  const [newV, setNewV] = useState({
    type:"truck", plate:"", brand:"", year:"", tuev:"",
    insurance:"", uvv:"", nextService:"", mileage:"", notes:""
  });

  const today = new Date();
  const isViewer = user.role === "boss" || user.role === "fpl";

  const docStatus = (dateStr) => {
    if (!dateStr) return { color: C.gray500, icon: "-", label: "-", bg: C.gray500+"22" };
    const d = new Date(dateStr);
    const diff = Math.round((d - today) / 86400000);
    if (diff < 0)  return { color: C.red,    icon: "R", label: String(Math.abs(diff))+t.daysOverdue, bg: C.red+"22" };
    if (diff < 30) return { color: C.yellow, icon: "Y", label: diff+t.days,            bg: C.yellow+"22" };
    return              { color: C.green,  icon: "G", label: dateStr.slice(0,10),  bg: C.green+"22" };
  };



  const filtered = vehicles.filter(v =>
    v.plate.toLowerCase().includes(search.toLowerCase()) ||
    v.brand.toLowerCase().includes(search.toLowerCase())
  );

  const urgent = vehicles.filter(v => {
    return [v.tuev, v.insurance, v.uvv, v.nextService].some(d => {
      if (!d) return false;
      return Math.round((new Date(d) - today) / 86400000) < 30;
    });
  }).length;

  const addVehicle = function() {
    if (!newV.plate) return;
    var v = Object.assign({}, newV, { id:"V"+Date.now(),
      year: parseInt(newV.year)||2020, mileage: parseInt(newV.mileage)||0 });
    sb.insert("vehicles", {
      id: v.id, plate: v.plate,
      brand: v.brand.split(" ")[0] || v.brand,
      model: v.brand.split(" ").slice(1).join(" ") || "",
      type: v.type, year: v.year, mileage: v.mileage,
      tuev: v.tuev || null, insurance: v.insurance || null,
      uvv: v.uvv || null, next_service: v.nextService || null,
      notes: v.notes || "",
    }).catch(function(e){ console.error("vehicle:", e); });
    setVehicles(function(prev){ return prev.concat([v]); });
    setNewV({ type:"truck", plate:"", brand:"", year:"", tuev:"",
      insurance:"", uvv:"", nextService:"", mileage:"", notes:"" });
    setShowAdd(false);
    setSaved(true);
    setTimeout(function(){ setSaved(false); }, 2000);
  };

  if (selected) {
    const v = vehicles.find(x => x.id === selected);
    if (!v) { setSelected(null); return null; }
    const docs = [
      { label: t.tuev,        date: v.tuev },
      { label: t.insurance,   date: v.insurance },
      { label: t.uvv,         date: v.uvv },
      { label: t.nextService, date: v.nextService },
    ];
    return (
      <div>
        <button onClick={() => setSelected(null)}
          style={{ background:"none", border:"none", color:C.gray500, cursor:"pointer",
                   fontSize:13, marginBottom:16, padding:0 }}>
          {t.backBtn}
        </button>
        <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:20 }}>
          <span style={{ fontSize:40 }}><VehicleBrand brand={v.brand} size={40} /></span>
          <div>
            <div style={{ fontSize:22, fontWeight:900 }}>{v.plate}</div>
            <div style={{ fontSize:14, color:C.gray500 }}>{v.brand} - {v.year}</div>
          </div>
        </div>
        <Card style={{ marginBottom:14 }}>
          <div style={{ fontWeight:800, fontSize:15, marginBottom:14 }}>
            {t.docsAndDates}
          </div>
          {docs.map((doc, idx) => {
            const st = docStatus(doc.date);
            return (
              <div key={idx} style={{ display:"flex", alignItems:"center",
                justifyContent:"space-between", padding:"12px 0",
                borderBottom:"1px solid "+C.border+"22" }}>
                <div>
                  <div style={{ fontWeight:600, fontSize:14 }}>{doc.label}</div>
                  <div style={{ fontSize:12, color:C.gray500, marginTop:2 }}>
                    {doc.date || "-"}
                  </div>
                </div>
                <span style={{ background:st.bg, color:st.color,
                  borderRadius:20, padding:"4px 12px", fontSize:13, fontWeight:700 }}>
                  {st.icon === "G" ? "✅" : st.icon === "Y" ? "⚠" : "❌"} {st.label}
                </span>
              </div>
            );
          })}
        </Card>
        {v.mileage > 0 && (
          <Card style={{ marginBottom:14 }}>
            <div style={{ fontWeight:800, fontSize:15, marginBottom:8 }}>km</div>
            <div style={{ fontSize:28, fontWeight:900, color:C.orange }}>
              {v.mileage.toLocaleString("de-DE")} km
            </div>
          </Card>
        )}
        {v.notes ? (
          <Card>
            <div style={{ fontWeight:800, fontSize:15, marginBottom:8 }}>{t.inspectionNote}</div>
            <div style={{ fontSize:14, color:C.gray300 }}>{v.notes}</div>
          </Card>
        ) : null}
      </div>
    );
  }

  return (
    <div>
      <div style={{ fontSize:20, fontWeight:800, color:C.white, marginBottom:16 }}>{t.vehicles}</div>

      {urgent > 0 ? (
        <div style={{ background:C.red+"18", border:"1px solid "+C.red+"44",
          borderRadius:12, padding:"12px 16px", marginBottom:16,
          display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:22 }}>⚠</span>
          <div>
            <div style={{ fontWeight:800, color:C.red, fontSize:14 }}>
              {urgent} {t.urgentAlert}
            </div>
            <div style={{ fontSize:12, color:C.gray500, marginTop:2 }}>
              {t.urgentDesc}
            </div>
          </div>
        </div>
      ) : null}

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14 }}>
        <div style={{ background:C.surface, border:"1px solid "+C.border,
          borderLeft:"3px solid "+C.blue, borderRadius:10, padding:"12px 14px" }}>
          <div style={{ fontSize:22, fontWeight:900, color:C.white }}>
            {vehicles.length}
          </div>
          <div style={{ fontSize:11, color:C.gray500, marginTop:3 }}>{t.vehiclesTotal}</div>
        </div>
        <div style={{ background:C.surface, border:"1px solid "+C.border,
          borderLeft:"3px solid "+(urgent > 0 ? C.red : C.green),
          borderRadius:10, padding:"12px 14px" }}>
          <div style={{ fontSize:22, fontWeight:900, color:C.white }}>
            {urgent > 0 ? "⚠" : "✅"} {urgent}
          </div>
          <div style={{ fontSize:11, color:C.gray500, marginTop:3 }}>{t.attentionRequired}</div>
        </div>
      </div>

      {saved ? (
        <div style={{ background:C.green+"22", border:"1px solid "+C.green+"44",
          borderRadius:10, padding:"10px 16px", marginBottom:12,
          color:C.green, fontWeight:700 }}>
          {t.vehicleAdded}
        </div>
      ) : null}

      <Input placeholder={"🔍 "+t.plate+"..."} value={search}
        onChange={e => setSearch(e.target.value)} style={{ marginBottom:12 }} />

      {!isViewer ? (
        <button onClick={() => setShowAdd(!showAdd)}
          style={{ display:"flex", alignItems:"center", gap:8, width:"100%",
            background: showAdd ? C.orange+"22" : C.navyMid,
            border:"1px solid "+(showAdd ? C.orange : C.border),
            borderRadius:10, padding:"10px 16px",
            color: showAdd ? C.orange : C.gray300,
            fontWeight:700, fontSize:14, cursor:"pointer", marginBottom:14 }}>
          + {t.addVehicle}
        </button>
      ) : null}

      {showAdd ? (
        <Card style={{ marginBottom:14 }}>
          <div style={{ fontSize:13, fontWeight:800, color:C.orange, marginBottom:14 }}>
            {t.newVehicle}
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
            {[
              { key:"plate",       label:t.plate+"*",     type:"text",   ph:"MA-LT 999" },
              { key:"brand",       label:t.brand,         type:"text",   ph:"MAN TGX"   },
              { key:"year",        label:t.buildYear,     type:"number", ph:"2020"      },
              { key:"mileage",     label:t.mileageLabel,  type:"number", ph:"0"         },
              { key:"tuev",        label:t.tuev,          type:"date",   ph:""          },
              { key:"insurance",   label:t.insurance,     type:"date",   ph:""          },
              { key:"uvv",         label:t.uvv,           type:"date",   ph:""          },
              { key:"nextService", label:t.nextService,   type:"date",   ph:""          },
            ].map(f => (
              <div key={f.key}>
                <div style={{ fontSize:11, color:C.gray500, marginBottom:4 }}>{f.label}</div>
                <Input type={f.type} value={newV[f.key]} placeholder={f.ph}
                  onChange={e => setNewV(v => ({ ...v, [f.key]: e.target.value }))} />
              </div>
            ))}
          </div>
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:11, color:C.gray500, marginBottom:4 }}>{t.vehicleType}</div>
            <Select value={newV.type} onChange={e => setNewV(v => ({ ...v, type:e.target.value }))}>
              <option value="truck">{t.truck}</option>
              <option value="semiTrailer">{t.semiTrailer}</option>
              <option value="forklift">{t.forklift}</option>
              <option value="trailer">{t.trailer}</option>
              <option value="other">{t.other}</option>
            </Select>
          </div>
          <button onClick={addVehicle}
            style={{ background:C.orange, color:"#fff", border:"none",
              borderRadius:8, padding:"10px 20px", fontWeight:800,
              fontSize:14, cursor:"pointer" }}>
            {t.add}
          </button>
        </Card>
      ) : null}

      {filtered.map(v => {
        const allDocs = [v.tuev, v.insurance, v.uvv, v.nextService].filter(Boolean);
        const minDiff = allDocs.length
          ? Math.min(...allDocs.map(d => Math.round((new Date(d) - today) / 86400000)))
          : 999;
        const tl = minDiff < 0 ? { emoji:"🔴", color:C.red }
                 : minDiff < 30 ? { emoji:"🟡", color:C.yellow }
                 : { emoji:"🟢", color:C.green };
        return (
          <button key={v.id} onClick={() => setSelected(v.id)}
            style={{ display:"block", width:"100%", background:C.surface,
              border:"1px solid "+C.border, borderLeft:"3px solid "+tl.color,
              borderRadius:12, padding:16, marginBottom:10,
              textAlign:"left", cursor:"pointer" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <span style={{ fontSize:26 }}><VehicleBrand brand={v.brand} size={40} /></span>
                <div>
                  <div style={{ fontWeight:800, fontSize:15, color:C.white }}>{v.plate}</div>
                  <div style={{ fontSize:12, color:C.gray500, marginTop:2 }}>
                    {v.brand} - {v.year}
                  </div>
                </div>
              </div>
              <span style={{ fontSize:20 }}>{tl.emoji}</span>
            </div>
          </button>
        );
      })}
    </div>
  );
}

function NotrutButton({ user, onAlert, t, vehicles }) {
  const [open, setOpen]       = useState(false);
  const [sent, setSent]       = useState(false);
  const [sending, setSending] = useState(false);
  const [form, setForm] = useState({
    plate:"", type:"", urgency:"", location:"", description:"", photos:[],
  });
  const [showVehicles, setShowVehicles] = useState(false);
  const [customPlate, setCustomPlate]   = useState("");

  const canSend = form.plate && form.type && form.urgency && form.location && form.description;

  const handlePhoto = (e) => {
    const files = Array.from(e.target.files);
    Promise.all(files.map(f => new Promise(res => {
      const r = new FileReader(); r.onload = ev => res(ev.target.result); r.readAsDataURL(f);
    }))).then(results => setForm(f => ({...f, photos:[...f.photos,...results]})));
  };

  const send = function() {
    if (!canSend) return;
    setSending(true);
    sb.insert("alerts", {
      id: "A" + Date.now(),
      type: form.type || "breakdown", plate: form.plate || null,
      location: form.location, description: form.description,
      urgency: form.urgency, sender: user.id,
      sender_app: "werkstatt", status: "open",
    }).catch(function(e){ console.error("alert:", e); });
    onAlert({ type:form.type, location:form.location, desc:form.description,
      plate:form.plate, urgency:form.urgency, mechanic:user.id,
      time:new Date().toLocaleTimeString("de-DE") });
    setSending(false); setSent(true);
    setTimeout(function(){ setSent(false); setOpen(false);

              <button onClick={() => setOpen(false)}

            </div>
<div style={{ overflowY:"auto", padding:"16px 20px 24px", flex:1 }}>

              {sent ? (
                <div style={{ textAlign:"center", padding:"30px 0" }}>
                  <div style={{ fontSize:56, marginBottom:12 }}>✅</div>
                  <div style={{ fontSize:18, fontWeight:900, color:C.green, marginBottom:6 }}>
                    {t.emergencySent}
                  </div>
                  <div style={{ fontSize:13, color:C.gray500 }}>{t.emergencyNotified}</div>
                </div>
              ) : (
                <div>
<div style={{ marginBottom:14 }}>
                    <div style={{ fontSize:11, fontWeight:700, color:"#1e4fa0",
                      textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:8 }}>

                    <button onClick={() => setShowVehicles(!showVehicles)}

                    </div>
                    {[

                      </button>
                    ))}
                  </div>
<div style={{ marginBottom:14 }}>
                    <div style={{ fontSize:11, fontWeight:700, color:"#1e4fa0",
                      textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:8 }}>
                      {t.location} *

                      value={form.location}

                      justifyContent:"center", gap:10,
                      border:"2px dashed "+C.border, borderRadius:10,
                      padding:"12px", cursor:"pointer",
                      color:C.gray500, fontSize:14, fontWeight:600,
                      background:C.navyDark }}>
                      <span style={{ fontSize:20 }}>📷</span>
                      <span>{t.photos} {form.photos.length>0?"("+form.photos.length+")":""}</span>
                      <input type="file" accept="image/*" multiple

                    </label>
                    {form.photos.length > 0 && (
                      <div style={{ display:"flex", gap:8, marginTop:8, flexWrap:"wrap" }}>

                          <div key={i} style={{ position:"relative" }}>

          </div>
        </div>
      )}
    </div>
  );
}

function EveningReport({ user, jobs, t }) {
  const today = new Date().toISOString().slice(0,10);
  const myJobs = user.role === "mechanic"
    ? jobs.filter(j => j.date === today && (j.mechanic === user.id || j.colleague === user.id))
    : jobs.filter(j => j.date === today);
  const [sent, setSent] = useState(false);
  const getName = (id) => (USERS.find(u => u.id === id) || {}).name || id;

  const totalWork   = myJobs.reduce((s,j) => s+(j.workMin||0), 0);
  const totalTravel = myJobs.reduce((s,j) => s+(j.travelToMin||0)+(j.travelBackMin||0), 0);
  const done        = myJobs.filter(j => j.status === "done").length;

  const send = () => { setSent(true); setTimeout(() => setSent(false), 3000); };

  return (
    <div>
      <div style={{ fontSize:20, fontWeight:800, color:C.white, marginBottom:6 }}>
        📄 {t.eveningReport}
      </div>
      <div style={{ fontSize:13, color:C.gray500, marginBottom:20 }}>
        {t.reportFor} {today}
      </div>

      {sent ? (
        <div style={{ background:C.green+"22", border:"1px solid "+C.green+"44",
          borderRadius:12, padding:20, textAlign:"center", marginBottom:16 }}>
          <div style={{ fontSize:36, marginBottom:8 }}>✅</div>
          <div style={{ fontWeight:800, color:C.green, fontSize:16 }}>{t.reportSent}</div>
        </div>
      ) : null}

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:16 }}>
        <div style={{ background:C.surface, border:"1px solid "+C.border,
          borderLeft:"3px solid "+C.orange, borderRadius:10, padding:"12px 14px" }}>
          <div style={{ fontSize:22, fontWeight:900 }}>{myJobs.length}</div>
          <div style={{ fontSize:11, color:C.gray500, marginTop:3 }}>{t.jobsLabel}</div>
        </div>
        <div style={{ background:C.surface, border:"1px solid "+C.border,
          borderLeft:"3px solid "+C.green, borderRadius:10, padding:"12px 14px" }}>
          <div style={{ fontSize:22, fontWeight:900 }}>{done}</div>
          <div style={{ fontSize:11, color:C.gray500, marginTop:3 }}>{t.done}</div>
        </div>
        <div style={{ background:C.surface, border:"1px solid "+C.border,
          borderLeft:"3px solid "+C.blue, borderRadius:10, padding:"12px 14px" }}>
          <div style={{ fontSize:22, fontWeight:900 }}>{formatMin(totalWork)}</div>
          <div style={{ fontSize:11, color:C.gray500, marginTop:3 }}>{t.workTotal}</div>
        </div>
      </div>

      {myJobs.length === 0 ? (
        <div style={{ textAlign:"center", color:C.gray500, padding:40 }}>
          {t.noReportJobs}
        </div>
      ) : (
        <div>
          {myJobs.map(j => (
            <Card key={j.id} style={{ marginBottom:10 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:700 }}>{j.plate}
                    <span style={{ color:C.gray500, fontWeight:400 }}> - {j.location}</span>
                  </div>
                  <div style={{ fontSize:12, color:C.gray500, marginTop:2 }}>
                    {getName(j.mechanic)}{j.colleague ? " + "+getName(j.colleague) : ""}
                  </div>
                  {j.description ? (
                    <div style={{ fontSize:13, color:C.gray300, marginTop:4 }}>{j.description}</div>
                  ) : null}
                </div>
                <div style={{ textAlign:"right", flexShrink:0, marginLeft:10 }}>
                  <Badge status={j.status} t={t} />
                  <div style={{ fontSize:11, color:C.gray500, marginTop:4 }}>
                    {j.workMin ? formatMin(j.workMin) : "-"}
                  </div>
                </div>
              </div>
              {(j.travelToMin > 0 || j.travelBackMin > 0) ? (
                <div style={{ marginTop:8, fontSize:12, color:C.orange }}>
                  Fahrt: {formatMin((j.travelToMin||0)+(j.travelBackMin||0))}
                </div>
              ) : null}
            </Card>
          ))}

function DriverInspection({ user, vehicles, t }) {
  const [step, setStep] = useState("select"); // select | inspect | done
  const [selectedVehicle, setSelectedVehicle] = useState(null);
  const [checks, setChecks] = useState({
    tires:false, lights:false, brakes:false, body:false, documents:false
  });
  const [notes, setNotes] = useState("");
  const [defects, setDefects] = useState("");

  const items = [
    { k:"tires",     label:t.tires,     emoji:"🔄" },
    { k:"lights",    label:t.lights,    emoji:"💡" },
    { k:"brakes",    label:t.brakes,    emoji:"🛑" },
    { k:"body",      label:t.body,      emoji:"🚛" },
    { k:"documents", label:t.documents, emoji:"📋" },
  ];

  const allOk = Object.values(checks).every(Boolean);

  if (step === "done") {
    return (
      <div style={{ textAlign:"center", padding:"40px 20px" }}>
        <div style={{ fontSize:64, marginBottom:16 }}>
          {allOk && !defects ? "✅" : "⚠"}

          {t.inspectionDone}
        </div>
        <div style={{ fontSize:14, color:C.gray500, marginBottom:20 }}>
          {allOk && !defects ? t.noDefects : t.defectsFound}
        </div>
        {defects ? (
          <Card style={{ textAlign:"left", marginBottom:20 }}>
            <div style={{ fontSize:13, color:C.gray300 }}>{defects}</div>
          </Card>
        ) : null}
        <button onClick={() => { setStep("select"); setChecks({tires:false,lights:false,brakes:false,body:false,documents:false}); setNotes(""); setDefects(""); }}
          style={{ background:C.orange, color:"#000", border:"none",
            borderRadius:10, padding:"12px 24px", fontWeight:800, cursor:"pointer" }}>
          {t.startInspection}
        </button>
      </div>
    );
  }

  if (step === "inspect") {
    return (
      <div>
        <button onClick={() => setStep("select")}
          style={{ background:"none", border:"none", color:C.gray500,
            cursor:"pointer", fontSize:13, marginBottom:16, padding:0 }}>
          {t.backBtn}
        </button>
        <div style={{ fontSize:18, fontWeight:800, marginBottom:4 }}>
          {t.driverInspection}
        </div>
        <div style={{ fontSize:13, color:C.gray500, marginBottom:20 }}>
          {selectedVehicle ? selectedVehicle.plate+" - "+selectedVehicle.brand : ""}
        </div>

        {items.map(item => (
          <button key={item.k} onClick={() => setChecks(c => ({...c, [item.k]:!c[item.k]}))}
            style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
              width:"100%", background: checks[item.k] ? C.green+"18" : C.surface,
              border:"1px solid "+(checks[item.k] ? C.green : C.border),
              borderRadius:12, padding:"16px 18px", marginBottom:10,
              cursor:"pointer" }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <span style={{ fontSize:24 }}>{item.emoji}</span>
              <span style={{ fontWeight:600, fontSize:15, color:C.white }}>
                {item.label}
              </span>
            </div>
            <span style={{ fontSize:24 }}>
              {checks[item.k] ? "✅" : "⬜"}
            </span>
          </button>
        ))}

        <Card style={{ marginBottom:16 }}>
          <div style={{ fontSize:11, color:"#1e4fa0", marginBottom:6,
            textTransform:"uppercase" }}>
            {t.inspectionNote}
          </div>
          <Textarea value={defects} onChange={e => setDefects(e.target.value)}
            placeholder={t.defectsFound+"..."} style={{ minHeight:60 }} />
        </Card>

        <button onClick={() => setStep("done")}
          style={{ width:"100%", background: allOk ? C.green : C.orange,
            color: allOk ? "#fff" : "#000", border:"none",
            borderRadius:10, padding:"14px 0", fontWeight:900,
            fontSize:15, cursor:"pointer" }}>
          {t.inspectionDone}
        </button>
      </div>
    );
  }

  return (
    <div>
      <div style={{ fontSize:20, fontWeight:800, color:C.white, marginBottom:20 }}>
        🔍 {t.driverInspection}
      </div>
      <div style={{ fontSize:13, color:C.gray500, marginBottom:20 }}>
        {t.selectUser}:
      </div>
      {vehicles.filter(v => v.type === "truck" || v.type === "semiTrailer").map(v => (
        <button key={v.id} onClick={() => { setSelectedVehicle(v); setStep("inspect"); }}
          style={{ display:"block", width:"100%", background:C.surface,
            border:"1px solid "+C.border, borderRadius:12,
            padding:"14px 16px", marginBottom:10, textAlign:"left",
            cursor:"pointer" }}>
          <div style={{ fontWeight:800, fontSize:15, color:C.white }}>{v.plate}</div>
          <div style={{ fontSize:12, color:C.gray500, marginTop:2 }}>{v.brand} - {v.year}</div>
        </button>
      ))}
    </div>
  );
}

function LocationPicker({ value, onChange, placeholder, C }) {
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState(null);
  const [coords,  setCoords]  = useState(null);

  const colors = C || { surface:"#ffffff", border:"#d0dbe8", white:"#1a2332",
    red:"#ef4444", green:"#22c55e", gray500:"#64748b", blue:"#3b82f6",
    navyMid:"#1e4280", blueLt:"#2d5fa8" };

  const getLocation = function() {
    if (!navigator.geolocation) {
      setError("GPS: Bitte Standort manuell eingeben");
      return;
    }
    setLoading(true); setError(null);
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        var lat = pos.coords.latitude.toFixed(5);
        var lng = pos.coords.longitude.toFixed(5);
        setCoords({ lat: lat, lng: lng });
        fetch("https://nominatim.openstreetmap.org/reverse?lat="+lat+"&lon="+lng+"&format=json&accept-language=de",
          { headers: { "Accept-Language":"de", "User-Agent":"LTG-App/1.0" }})
          .then(function(r){ return r.json(); })
          .then(function(data) {
            var p = data.address || {};
            var parts = [p.road, p.suburb||p.quarter,
              p.town||p.city||p.village||p.county, p.postcode].filter(Boolean);
            onChange(parts.length ? parts.join(", ") : lat+", "+lng);
          })
          .catch(function(){ onChange(lat+", "+lng); })
          .then(function(){ setLoading(false); },
                function(){ setLoading(false); });
      },
      function(err) {
        var msg = err.message || "";
        if (msg.indexOf("permissions") !== -1 || msg.indexOf("disabled") !== -1 ||
            msg.indexOf("denied") !== -1) {
          setError("GPS: Bitte Standort manuell eingeben");
        } else {
          setError("GPS Fehler - bitte manuell eingeben");
        }
        setLoading(false);
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  };

  var openMaps = function() {
    if (coords) {
      window.open("https://www.google.com/maps?q="+coords.lat+","+coords.lng+"&zoom=16", "_blank");
    }
  };

  return (
    <div>
      <div style={{ display:"flex", gap:8 }}>
        <input value={value} onChange={function(e){ onChange(e.target.value); }}
          placeholder={placeholder || "Standort eingeben..."}
          style={{ flex:1, background:colors.surface, border:"1px solid "+colors.border,
            borderRadius:10, padding:"12px 14px", color:colors.white,
            fontSize:14, outline:"none", fontFamily:"inherit",
            boxSizing:"border-box" }} />
        <button onClick={getLocation} disabled={loading}
          style={{ background:loading ? colors.navyMid : colors.blue, border:"none",
            borderRadius:10, padding:"0 16px",
            cursor:loading ? "not-allowed" : "pointer",
            fontSize:20, color:"#fff", flexShrink:0,
            opacity:loading ? 0.6 : 1, minWidth:52 }}>
          {loading ? "..." : "📍"}
        </button>
        {coords && (
          <button onClick={openMaps}
            style={{ background:colors.surface, border:"1px solid "+colors.border,
              borderRadius:10, padding:"0 14px", cursor:"pointer",
              fontSize:20, flexShrink:0 }}>
            🗺
          </button>
        )}
      </div>
      {error && (
        <div style={{ fontSize:11, color:colors.gray500, marginTop:5, fontStyle:"italic" }}>
          {error}
        </div>
      )}
      {coords && (
        <div style={{ fontSize:11, color:colors.gray500, marginTop:5 }}>
          📍 {coords.lat}, {coords.lng}
          <button onClick={openMaps}
            style={{ background:"none", border:"none", color:colors.blueLt,
              cursor:"pointer", fontSize:11, padding:"0 4px",
              textDecoration:"underline" }}>
            Google Maps
          </button>
        </div>
      )}
    </div>
  );
}

        </div>
      </div>

                borderRadius:10, padding:"14px 16px", marginBottom:12 }}>
                <div style={{ display:"flex", justifyContent:"space-between",

function IncomingAlerts({ alerts, t, onCreateJob, C }) {
  var openAlerts = (alerts||[]).filter(function(a){ return a.status !== "done"; });
  var appLabel = function(app) {
    if (app === "fahrer") return t.fromDriver || "von Fahrer";
    if (app === "stapler") return t.fromStapler || "von Stapler";
    if (app === "werkstatt") return t.fromFPL || "von Jens";
    return app || "";
  };
  var urgColor = function(u) { return u === "urgent" ? C.red : C.yellow; };
  return (
    <div>
      <div style={{ fontSize:16, fontWeight:800, marginBottom:16 }}>
        {t.incomingTab||"Eingang"}
        {openAlerts.length > 0 && (
          <span style={{ marginLeft:8, background:C.red, color:"#fff",
            borderRadius:20, padding:"2px 8px", fontSize:12, fontWeight:700 }}>
            {openAlerts.length}
          </span>
        )}
      </div>
      {openAlerts.length === 0 ? (
        <div style={{ textAlign:"center" }}>
          <div style={{ color:C.gray500, padding:"30px 0 16px", fontSize:14 }}>
            {t.noAlerts||"Keine neuen Meldungen"}
          </div>
          <button onClick={function(){ loadAlerts(); }}
            style={{ background:C.surface, border:"1px solid "+C.border,
              borderRadius:8, padding:"8px 16px", color:C.gray300,
              cursor:"pointer", fontSize:12, fontWeight:700 }}>
            Aktualisieren
          </button>
        </div>
      ) : openAlerts.map(function(a) {
        return (
          <div key={a.id} style={{ background:C.surface,
            border:"1px solid " + (a.urgency==="urgent" ? C.red : C.border),
            borderLeft:"4px solid " + urgColor(a.urgency),
            borderRadius:10, padding:"14px 16px", marginBottom:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between",
              alignItems:"flex-start", marginBottom:8 }}>
              <div>
                <span style={{ fontWeight:700, fontSize:14, color:C.white }}>
                  {a.urgency === "urgent" ? "🔴 " : "🟡 "}
                  {a.plate || a.type || "Meldung"}
                </span>
                <span style={{ marginLeft:8, fontSize:11, color:C.gray500 }}>
                  {appLabel(a.senderApp)}
                </span>
              </div>
              <span style={{ fontSize:11, color:C.gray500 }}>
                {a.createdAt ? new Date(a.createdAt).toLocaleTimeString("de-DE",
                  {hour:"2-digit",minute:"2-digit"}) : ""}
              </span>
            </div>
            {a.location && (
              <div style={{ fontSize:13, color:C.gray300, marginBottom:4 }}>
                📍 {a.location}
              </div>
            )}
            {a.description && (
              <div style={{ fontSize:13, color:C.gray300, marginBottom:12 }}>
                {a.description}
              </div>
            )}
            <button onClick={function(){ onCreateJob(a); }}
              style={{ width:"100%", background:C.blue, color:"#fff",
                border:"none", borderRadius:8, padding:"10px 0",
                fontWeight:700, fontSize:13, cursor:"pointer" }}>
              + {t.createJobFrom||"Auftrag erstellen"}
            </button>
          </div>
        );
      })}
    </div>
  );
}

function mapJob(r) {
  return {
    id: r.id, mechanic: r.mechanic, colleague: r.colleague,
    vehicleType: r.vehicle_type, plate: r.plate, location: r.location,
    workType: r.work_type, description: r.description, status: r.status,
    date: r.date, travelToMin: r.travel_to_min || 0,
    travelBackMin: r.travel_back_min || 0, workMin: r.work_min || 0,
    cost: parseFloat(r.cost) || 0, downtime: r.downtime || 0,
    partsType: r.parts_type, partsItems: r.parts_items,
    partsInvoice: r.parts_invoice, partsSupplier: r.parts_supplier,
    partsNote: r.parts_note, partsDate: r.parts_date,
    photos: r.photos || 0, photoUrls: r.photo_urls || [],
    createdAt: r.created_at,
  };
}
function mapVehicle(r) {
  return {
    id: r.id, plate: r.plate, brand: r.brand + (r.model ? " " + r.model : ""),
    type: r.type, year: r.year, mileage: r.mileage || 0,
    tuev: r.tuev, insurance: r.insurance, uvv: r.uvv,
    nextService: r.next_service, notes: r.notes || "",
  };
}
function mapStock(r) {
  return {
    id: r.id, name: r.name, category: r.category,
    quantity: r.quantity || 0, minQty: r.min_qty || 0,
    unit: r.unit || "Stk", location: r.location || "",
  };
}
function mapInvoice(r) {
  return {
    id: r.id, date: r.date, supplier: r.supplier,
    amount: parseFloat(r.amount) || 0, items: r.items || "",
    mechanic: r.mechanic, jobId: r.job_id, photo: r.photo_url,
  };
}

function App() {
  const [lang, setLang] = useState("de");
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState("new");
  const [prevTab, setPrevTab] = useState("new");
  const [jobs, setJobs] = useState([]);
  const [stock, setStock] = useState([]);
  const [invoices, setInvoices] = useState([]);
  const [vehicles, setVehicles] = useState([]);
  const [alerts, setAlerts] = useState([]);
  const [inspections, setInspections] = useState([]);
  const [selectedVehicleId, setSelectedVehicleId] = useState(null);
  const [loading, setLoading] = useState(true);
  const [dbError, setDbError] = useState(null);
  const [prefillAlert, setPrefillAlert] = useState(null);
  const [formKey, setFormKey] = useState(0);
  const goTab = function(newTab) {
    setPrevTab(function(){ return tab; });
    setTab(newTab);
  };
  const [alertModal, setAlertModal] = useState(null);
  const [meldungenOpen, setMeldungenOpen] = useState(false);
  const [dbStatus, setDbStatus] = useState("loading");
  const t = T[lang];

  function loadAlerts() {
    sb.query("alerts", { select: "*", filter: "status=eq.open",
      order: "created_at.desc", limit: "50" })
      .then(function(a) {
        setDbStatus("ok");
        if (Array.isArray(a)) setAlerts(a.map(function(r){
          return { id:r.id, type:r.type, plate:r.plate, location:r.location,
            description:r.description, urgency:r.urgency, sender:r.sender,
            senderApp:r.sender_app, status:r.status, createdAt:r.created_at };
        }));
      }).catch(function(e){
        setDbStatus("error");
        console.error("loadAlerts error:", e);
      });
  }

  useEffect(function() {

    var safetyTimer = setTimeout(function() {
      setLoading(false);
      setDbStatus("error");
    }, 6000);

    Promise.all([
      sb.query("jobs",        { select: "*", order: "created_at.desc", limit: "200" }),
      sb.query("vehicles",    { select: "*", order: "plate.asc" }),
      sb.query("stock",       { select: "*", order: "name.asc" }),
      sb.query("invoices",    { select: "*", order: "created_at.desc", limit: "100" }),
      sb.query("inspections", { select: "*", order: "created_at.desc", limit: "300" }),
    ]).then(function(results) {
      var j = results[0], v = results[1], s = results[2], inv = results[3], insp = results[4];
      clearTimeout(safetyTimer);
      setDbStatus("ok");
      if (Array.isArray(j)) setJobs(j.map(mapJob));
      if (Array.isArray(v)) setVehicles(v.map(mapVehicle));
      if (Array.isArray(s)) setStock(s.map(mapStock));
      if (Array.isArray(inv)) setInvoices(inv.map(mapInvoice));
      if (Array.isArray(insp)) setInspections(insp);
      setLoading(false);
    }).catch(function(e) {
      clearTimeout(safetyTimer);
      setDbStatus("error");
      setDbError("DB: " + (e.message || "Verbindungsfehler"));
      setLoading(false);
    });

    loadAlerts();

    var alertTimer = setInterval(function() {
      loadAlerts();

    }, 8000);

    var jobTimer = setInterval(function() {
      sb.query("jobs", { select: "*", order: "created_at.desc", limit: "200" })
        .then(function(j) {
          if (Array.isArray(j)) setJobs(j.map(mapJob));
        }).catch(function(){});
    }, 30000);

    return function() {
      clearInterval(alertTimer);
      clearInterval(jobTimer);
    };
  }, []);

  const LANG_FLAGS = { de:"🇩🇪" };

  if (loading) return (
    <div style={{ background: C.bg, minHeight: "100vh", display: "flex",
      flexDirection: "column", alignItems: "center", justifyContent: "center",
      fontFamily: "'DM Sans','Segoe UI',sans-serif", color: "#f1f5f9" }}>
      <div style={{ fontSize: 32, fontWeight: 900, color: "#f1f5f9",
        letterSpacing: "-1px", marginBottom: 8 }}>LTG</div>
      <div style={{ height: 3, width: 60, background: "#e2001a",
        borderRadius: 2, marginBottom: 24 }} />
      <div style={{ fontSize: 14, color: "#64748b", marginBottom: 24 }}>
        Verbinde mit Datenbank...
      </div>
      <div style={{ width: 40, height: 40, border: "3px solid #d0dbe8",
        borderTop: "3px solid #3b82f6", borderRadius: "50%",
        animation: "spin 1s linear infinite" }} />
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      {dbError && <div style={{ marginTop: 20, color: "#ef4444",
        fontSize: 13, textAlign: "center", maxWidth: 300 }}>{dbError}</div>}
    </div>
  );

  if (!user) return <LoginScreen onLogin={function(u) {
    setUser(u);
    setTab(u.role === "fpl" || u.role === "boss" ? "dashboard" : "new");
  }} lang={lang} setLang={setLang} alerts={alerts}
    onRefresh={function(){ loadAlerts(); }} />;

  const isViewer = user.role === "boss" || user.role === "fpl";
  const isMechanic = user.role === "mechanic";

  const tabs = user.role === "fpl"
    ? [{ k:"dashboard", icon:"📊", label:"Dashboard" }, { k:"melden", icon:"⚡", label:t.breakdown||"Melden" }, { k:"jobs", icon:"📋", label:t.myJobs }, { k:"lager", icon:"📦", label:t.lager }, { k:"archive", icon:"🗂", label:t.archive }]
    : isViewer
    ? [{ k:"dashboard", icon:"📊", label:"Dashboard" }, { k:"jobs", icon:"📋", label:t.myJobs }, { k:"lager", icon:"📦", label:t.lager }, { k:"archive", icon:"🗂", label:t.archive }]
    : [{ k:"new", icon:"+", label:t.newJob }, { k:"eingang", icon:"📥", label:t.incomingTab }, { k:"jobs", icon:"📋", label:t.myJobs }, { k:"lager", icon:"📦", label:t.lager }, { k:"archive", icon:"🗂", label:t.archive }];

  const activeTab = ((user.role === "boss" || user.role === "fpl") && tab === "new") ? "dashboard" : tab;

  return (
    <React.Fragment><WfBg />

<div style={{ position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ height: 5, background: "linear-gradient(90deg, #1e4fa0 0%, #f5a623 40%, #f5a623 60%, #1e4fa0 100%)" }} />
        <div style={{ background: "rgba(10,23,48,0.92)", backdropFilter:"blur(12px)", WebkitBackdropFilter:"blur(12px)", borderBottom: "1px solid rgba(255,255,255,0.08)", padding: "0 16px", height: 54, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
<div>
            {isMechanic && <LTGLogo size={0.65} />}
          </div>
<div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div title={dbStatus === "ok" ? "Supabase verbunden" : dbStatus === "error" ? "Supabase Fehler" : "Verbinde..."}
              style={{ width:8, height:8, borderRadius:"50%",
                background: dbStatus==="ok" ? C.green : dbStatus==="error" ? C.red : C.yellow,
                flexShrink:0, cursor:"default" }} />
{isViewer && (function() {
              var cnt = (alerts||[]).filter(function(a){ return a.status !== "done"; }).length;
              var hasUrgent = (alerts||[]).some(function(a){ return a.urgency === "urgent" && a.status !== "done"; });
              if (cnt === 0) return null;
              return (
                <button onClick={function(){ setMeldungenOpen(true); }}
                  style={{ background:hasUrgent?"#ef4444":"#f5a623",
                    color:"#000", border:"none", borderRadius:8,
                    padding:"4px 10px", fontSize:12, fontWeight:800, cursor:"pointer" }}>
                  {cnt} Meldung{cnt > 1 ? "en" : ""}
                </button>
              );
            })()}
{isMechanic && (function() {
              var allOpen = (alerts||[]).filter(function(a){ return a.status !== "done"; });
              var hasUrgent = allOpen.some(function(a){ return a.urgency === "urgent"; });
              if (allOpen.length === 0) return null;
              return (
                <button onClick={function(){ setAlertModal(allOpen[0]); setPrevTab(tab); setTab("eingang"); }}

                    borderRadius:8, padding:"4px 10px", fontSize:12, fontWeight:800, cursor:"pointer" }}>
                  {hasUrgent?"🔴":"🟡"} {allOpen.length}
                </button>
              );
            })()}
{isMechanic && (
              <button onClick={function(){ setPrevTab(tab); setTab(prevTab); }}
                style={{ background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.3)",
                  borderRadius:8, padding:"8px 14px", color:"#fff", fontSize:18, cursor:"pointer" }}>

              </button>
            )}
            {isViewer && activeTab !== "dashboard" && (
              <button onClick={function(){
                  setPrevTab(tab);
                  setTab("dashboard");
                }}
                style={{ background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.3)",
                  borderRadius:8, padding:"8px 14px", color:"#fff", fontSize:18, cursor:"pointer" }}>
                ←
              </button>
            )}
          </div>
        </div>
      </div>
{dbStatus === "error" && (

          alignItems:"center" }}>

            Keine Datenbankverbindung — Daten werden lokal gespeichert

          <button onClick={function(){ loadAlerts(); }}
            style={{ background:"none", border:"1px solid "+C.red+"44",
              borderRadius:6, padding:"3px 10px", color:C.red,
              cursor:"pointer", fontSize:11 }}>
            Retry
          </button>
        </div>
      )}
{isMechanic && (alerts||[]).filter(function(a){ return a.status !== "done"; }).length > 0 && activeTab !== "eingang" && (
        <div onClick={function(){
            setPrevTab(tab);
            setTab("eingang");
          }}
          style={{ cursor:"pointer", padding:"10px 16px",
            background:(alerts||[]).some(function(a){ return a.urgency === "urgent" && a.status !== "done"; }) ? C.red : C.orange,
            display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <span style={{ fontWeight:800, fontSize:13, color:"#fff" }}>
              {(alerts||[]).some(function(a){ return a.urgency === "urgent" && a.status !== "done"; }) ? "🔴" : "🟡"} Neue Meldungen: {(alerts||[]).filter(function(a){ return a.status !== "done"; }).length}
            </span>
            <span style={{ fontSize:12, color:"rgba(255,255,255,0.8)", marginLeft:10 }}>
              {(function(){
                var a = (alerts||[]).find(function(x){ return x.status !== "done"; });

{isMechanic && alertModal && (

        <MeldungenPanel alerts={alerts} C={C} t={t}
          onClose={function(){ setMeldungenOpen(false); }} />
      )}
<div style={{ padding: activeTab==="dashboard" ? 0 : 16, paddingBottom: activeTab==="dashboard" ? 0 : 80,
        maxWidth: activeTab==="dashboard" ? "100%" : 700, margin: "0 auto" }}>

        {activeTab === "new"       && isMechanic && <NewJobForm key={formKey} user={user} jobs={jobs} setJobs={setJobs} t={t} stock={stock} prefill={prefillAlert} onClearPrefill={function(){ setPrefillAlert(null); }} onSaved={function(){ setTab("archive"); }} />}
        {activeTab === "jobs"                      && <MyJobs user={user} jobs={jobs} setJobs={setJobs} t={t} />}
        {(activeTab === "dashboard") && (user.role === "boss" || user.role === "fpl") && <DashboardShared jobs={jobs} vehicles={vehicles} alerts={alerts} inspections={inspections} t={t} lang={lang} user={user} onNavigate={function(vid){ setSelectedVehicleId(vid); setPrevTab(tab); setTab("fahrzeuge"); }} onCreateJob={function(){ setPrevTab(tab); setTab("melden"); }} onTabChange={function(k){ setPrevTab(tab); setTab(k); }} />}
        {activeTab === "lager"      && <Lager user={user} stock={stock} setStock={setStock} invoices={invoices} setInvoices={setInvoices} t={t} />}
        {activeTab === "fahrzeuge"  && <Fahrzeuge user={user} vehicles={vehicles} setVehicles={setVehicles} t={t} />}
        {activeTab === "report"     && isMechanic && <EveningReport user={user} jobs={jobs} t={t} />}
        {activeTab === "report"     && isViewer   && <DriverInspection user={user} vehicles={vehicles} t={t} />}
        {activeTab === "melden"     && user.role === "fpl" && <JensMelden jobs={jobs} vehicles={vehicles} setJobs={setJobs} t={t} />}
        {activeTab === "eingang" && isMechanic && <IncomingAlerts
          alerts={alerts} t={t} C={C}
          onCreateJob={function(alert){
            setPrefillAlert(alert);
            setFormKey(function(k){ return k + 1; });
            setPrevTab(tab);
            setTab("new");
          }} />}
        {activeTab === "archive"    && <Archive jobs={jobs} user={user} t={t} inspections={inspections||[]} />}
      </div>

      <NotrutButton user={user} onAlert={function(a) {
          setAlerts(function(prev) {
            return [{ id:"local_"+Date.now(), type:a.type, plate:a.plate,
              location:a.location, description:a.desc,
              urgency:a.urgency, sender:a.mechanic,
              senderApp:"werkstatt", status:"open",
              createdAt:new Date().toISOString() }, ...prev];
          });

          setTimeout(function(){ loadAlerts(); }, 2000);
        }} t={t} vehicles={vehicles} />
<div className="wf-navbar" style={{ display: (user.role==="boss"||user.role==="fpl") ? "none" : "flex" }}>
        {tabs.map(({ k, icon, label }) => (
          <button key={k} onClick={() => { setPrevTab(tab); setTab(k); }} className={"wf-nav-item" + (activeTab === k ? " active" : "")}>
            <div className="wf-nav-icon" style={{ position:"relative", background: activeTab === k && k === "new" ? "rgba(255,165,0,0.20)" : "transparent", borderRadius:10, width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center" }}>
              {icon}
              {k === "eingang" && (alerts||[]).filter(function(a){ return a.status !== "done"; }).length > 0 && (
                <span style={{ position:"absolute", top:0, right:0, background:C.red,
                  color:"#fff", borderRadius:"50%", width:16, height:16,
                  fontSize:9, fontWeight:900, display:"flex",
                  alignItems:"center", justifyContent:"center" }}>
                  {(alerts||[]).filter(function(a){ return a.status !== "done"; }).length}
                </span>
              )}
            </div>
            <div style={{ fontSize: 10, color: activeTab === k ? C.orange : C.gray500, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.3px" }}>{label}</div>
          </button>
        ))}
      </div>
    </div>
  </div>
    </React.Fragment>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>


</body>
</html>
