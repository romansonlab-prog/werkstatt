<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>LTG Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .box {
      background: #111a2e;
      padding: 40px;
      border-radius: 20px;
      width: 320px;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>

  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button onclick="login()">Einloggen</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://romansonlab-prog.supabase.co",
  "sb_publishable_8z54aRy2nVSWkT4n87ACjw_6StWhUxz"
);

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert("Ошибка: " + error.message);
  } else {
    window.location.href = "/dashboard.html";
  }
}

// RESET PASSWORD
const hash = window.location.hash;

if (hash && hash.includes("access_token")) {
  const params = new URLSearchParams(hash.substring(1));
  const access_token = params.get("access_token");

  if (access_token) {
    const newPassword = prompt("Задай пароль:");

    if (newPassword) {
      fetch("https://romansonlab-prog.supabase.co/auth/v1/user", {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + access_token
        },
        body: JSON.stringify({ password: newPassword })
      })
      .then(() => {
        alert("Пароль установлен!");
        window.location.href = "/login.html";
      })
      .catch(() => {
        alert("Ошибка установки пароля");
      });
    }
  }
}
</script>

</body>
</html>
