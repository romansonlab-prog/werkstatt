    var interval = setInterval(function(){ loadAll(); }, 30000);
    return function(){ clearInterval(interval); };
  }, []);

  var openAlerts = alerts.filter(function(a){ return a.status !== "done" && a.status !== "rejected"; });
  var lowStock = stock.filter(function(s){ return s.qty<=(s.min_qty||0); }).length;
  var overduePlans = plans.filter(function(p){
    if (!p.next_service_date) return false;
    return Math.round((new Date(p.next_service_date)-new Date())/86400000) < 14;
  }).length;

  var NAV = [
    { k:"uebersicht",  ic: IC.home,     label:"Übersicht" },
    { k:"eingang",     ic: IC.inbox,    label:"Eingang",      badge: openAlerts.length },
    { k:"mechaniker",  ic: IC.wrench,   label:"Mechaniker" },
    { k:"technik",     ic: IC.truck,    label:"Technik" },
    { k:"inspektion",  ic: IC.search,   label:"Inspektion" },
    { k:"waschhalle",  ic: IC.droplet,  label:"Waschhalle" },
    { k:"lager",       ic: IC.box,      label:"Lager",         badge: lowStock, badgeCls:"orange" },
    { k:"kosten",      ic: IC.euro,     label:"Kosten" },
    { k:"rechnungen",  ic: IC.receipt,  label:"Lieferscheine" },
    { k:"wartung",     ic: IC.calendar, label:"Wartungsplan",  badge: overduePlans, badgeCls:"" },
    { k:"archiv",      ic: IC.archive,  label:"Archiv" },
    { k:"kontakte",    ic: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>, label:"Kontakte" },
    { k:"settings",    ic: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>, label:"Einstellungen" },
  ];

  var PAGE_TITLES = {
    uebersicht:"Übersicht", eingang:"Eingang", mechaniker:"Mechaniker",
    technik:"Technik — Fuhrpark", inspektion:"Inspektion", waschhalle:"Waschhalle",
    lager:"Lager", kosten:"Kostenanalyse", rechnungen:"Lieferscheine",
    wartung:"Wartungsplan", archiv:"Archiv", settings:"Einstellungen", kontakte:"Kontakte"
  };

  return (
    <div className="dash-layout">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-text">
            <span style={{ color:"#fff" }}>Werk</span><span style={{ color:"#ffa500" }}>Flow</span>
          </div>
          <div className="sidebar-subtitle">Dashboard</div>
        </div>
        <div className="sidebar-nav">
          {NAV.map(function(n){
            return (
              <button key={n.k} className={"nav-item" + (sec===n.k ? " active" : "")} onClick={function(){ setSec(n.k); }}>
                <span style={{ display:"flex", alignItems:"center", flexShrink:0 }}>{n.ic}</span>
                <span>{n.label}</span>
                {n.badge > 0 && <span className={"nav-badge " + (n.badgeCls||"")}>{n.badge}</span>}
              </button>
            );
          })}
        </div>
        <div className="sidebar-footer">
          <div className="sidebar-user">
            <div className="sidebar-avatar">{user.avatar}</div>
            <div>
              <div className="sidebar-name">{user.name}</div>
              <div className="sidebar-role">{user.role==="chef"?"Chef":"Fuhrparkleiter"}</div>
            </div>
          </div>
          <div style={{ marginTop:12, display:"flex", gap:6, alignItems:"center" }}>
            <input type="date" className="inp" style={{ flex:1, fontSize:11, padding:"5px 8px" }} value={shiftDate} onChange={function(e){ setShiftDate(e.target.value); }} />
            <button onClick={function(){ genSchichtbericht(jobs, shiftDate, MECHANICS); }}
              style={{ flexShrink:0, padding:"5px 10px", border:"1px solid rgba(255,165,0,0.35)", background:"rgba(255,165,0,0.08)", color:"#ffa500", borderRadius:8, fontSize:11, fontWeight:700, whiteSpace:"nowrap" }}>
              {IC.report} Schicht
            </button>
          </div>
          <button onClick={onLogout} style={{ marginTop:8, width:"100%", padding:"7px", border:"1px solid rgba(255,255,255,0.12)", background:"transparent", color:"rgba(255,255,255,0.5)", borderRadius:8, fontSize:12, fontWeight:700 }}>
            ↩ Abmelden
          </button>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div style={{ display:"flex", alignItems:"center", color:"rgba(255,255,255,0.6)" }}>
            {NAV.find(function(n){ return n.k===sec; }) && NAV.find(function(n){ return n.k===sec; }).ic}
          </div>
          <div className="topbar-title" style={{ marginLeft:8 }}>{PAGE_TITLES[sec]||sec}</div>
          <div style={{ fontSize:15, color: dbOk===false?"#ef4444":dbOk===true?"#22c55e":"#ffa500", marginLeft:8, fontWeight:600 }}>
            {dbOk===false?"● Fehler":dbOk===true?"● Online":"● Lädt"}
          </div>
          <div className="topbar-right">
            <span style={{ fontSize:16, color:"rgba(255,255,255,0.5)", fontWeight:400 }}>{new Date().toLocaleDateString("de-DE",{weekday:"long",day:"2-digit",month:"2-digit",year:"numeric"})}</span>
            <button className="topbar-refresh no-print" onClick={loadAll}>{loading ? "⏳" : "↻ Aktualisieren"}</button>
          </div>
        </div>
        <InfoBar openAlerts={openAlerts.length} mechanics={MECHANICS} jobs={jobs} />

        <div className="page">
          {sec === "uebersicht"  && <Uebersicht jobs={jobs} alerts={alerts} vehicles={vehicles} forklifts={forklifts} washOrders={washOrders} inspections={inspections} />}
          {sec === "eingang"     && <Eingang alerts={alerts} onRefresh={loadAll} loading={loading} />}
          {sec === "mechaniker"  && <Mechaniker jobs={jobs} onRefresh={loadAll} loading={loading} />}
          {sec === "technik"     && <Technik vehicles={vehicles} forklifts={forklifts} jobs={jobs} />}
          {sec === "inspektion"  && <Inspektion inspections={inspections} onRefresh={loadAll} loading={loading} />}
          {sec === "waschhalle"  && <Waschhalle washOrders={washOrders} onRefresh={loadAll} loading={loading} />}
          {sec === "lager"       && <Lager stock={stock} onRefresh={loadAll} loading={loading} />}
          {sec === "kosten"      && <Kosten jobs={jobs} invoices={invoices} vehicles={vehicles} forklifts={forklifts} />}
          {sec === "rechnungen"  && <Rechnungen invoices={invoices} vehicles={vehicles} jobs={jobs} onRefresh={loadAll} loading={loading} />}
          {sec === "wartung"     && <Wartungsplan plans={plans} vehicles={vehicles} forklifts={forklifts} onRefresh={loadAll} loading={loading} />}
          {sec === "archiv"      && <Archiv jobs={jobs} />}
          {sec === "kontakte"    && <Kontakte onRefresh={loadAll} />}
          {sec === "settings"    && <Einstellungen vehicles={vehicles} forklifts={forklifts} stock={stock} onRefresh={loadAll} loading={loading} />}
        </div>
      </div>
    </div>
  );
}

// === ROOT ===
// === INFOBAR ===
var LOCATIONS = [
  { name:"Hockenheim", lat:49.3167, lon:8.5500 },
  { name:"Regensburg",  lat:49.0134, lon:12.1016 },
  { name:"Garching",    lat:48.2494, lon:11.6509 },
  { name:"Hof",         lat:50.3133, lon:11.9150 },
  { name:"Genthin",     lat:52.4017, lon:12.1647 },
  { name:"Zweibrücken", lat:49.2481, lon:7.3597 },
  { name:"Passau",      lat:48.5748, lon:13.4647 },
  { name:"Bruchsal",    lat:49.1253, lon:8.5981 },
];

var WX_ICONS = {0:"☀️",1:"🌤",2:"⛅",3:"☁️",45:"🌫",48:"🌫",51:"🌦",53:"🌦",55:"🌧",61:"🌧",63:"🌧",65:"🌧",71:"🌨",73:"🌨",75:"❄️",80:"🌦",81:"🌧",82:"⛈",95:"⛈",96:"⛈",99:"⛈"};

function InfoBar({ openAlerts, mechanics, jobs }) {
  var _loc = useState(0); var locIdx = _loc[0]; var setLocIdx = _loc[1];
  var _wx  = useState(null); var wx = _wx[0]; var setWx = _wx[1];
  var _ds  = useState(null); var diesel = _ds[0]; var setDiesel = _ds[1];
  var _kw  = useState(""); var kw = _kw[0]; var setKw = _kw[1];

  // Kalenderwoche
  useEffect(function(){
    var now = new Date();
    var jan1 = new Date(now.getFullYear(), 0, 1);
    var week = Math.ceil(((now - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    setKw("KW " + week);
  }, []);

  // Погода через Open-Meteo (бесплатно, без ключа)
  useEffect(function(){
    var loc = LOCATIONS[locIdx];
    setWx(null);
    fetch("https://api.open-meteo.com/v1/forecast?latitude="+loc.lat+"&longitude="+loc.lon+"&current=temperature_2m,weathercode,windspeed_10m,precipitation&wind_speed_unit=kmh&timezone=Europe/Berlin")
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (d && d.current) setWx(d.current);
      }).catch(function(){});
  }, [locIdx]);

  // Цена дизеля - среднее по Германии через открытый источник
  useEffect(function(){
    fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent("https://www.adac.de/api/rest/v2/tipp/kraftstoff"))
      .then(function(r){ return r.json(); })
      .then(function(d){
        var price = null;
        if (d && d.diesel && d.diesel > 1) price = d.diesel;
        else if (d && d.dieselAverage && d.dieselAverage > 1) price = d.dieselAverage;
        else if (Array.isArray(d) && d[0] && d[0].diesel) price = d[0].diesel;
        if (price) {
          setDiesel(Number(price).toFixed(3).replace(".",",") + " €/L");
        } else {
          setDiesel("~2,063 €/L");
        }
      })
      .catch(function(){
        // ADAC DE Ø Diesel nach Tankrabatt 01.05.2026
        setDiesel("~2,063 €/L");
      });
  }, []);

  // Механики
  var today = todayIso();
  var inProgress = mechanics.filter(function(m){
    return jobs.some(function(j){ return j.mechanic === m.id && j.status === "inProgress" && (j.date||"").slice(0,10) === today; });
  }).length;
  var available = mechanics.length - inProgress;

  var loc = LOCATIONS[locIdx];
  var temp = wx ? Math.round(wx.temperature_2m) + "°C" : "—";
  var icon = wx ? (WX_ICONS[wx.weathercode] || "🌡") : "⏳";
  var wind = wx ? Math.round(wx.windspeed_10m) + " km/h" : "";
  var rain = wx && wx.precipitation > 0 ? " · " + wx.precipitation + "mm" : "";

  return (
    <div style={{
      background:"rgba(5,12,30,0.95)",
      borderBottom:"1px solid rgba(255,255,255,0.08)",
      padding:"0 28px",
      display:"flex",
      alignItems:"center",
      gap:0,
      height:62,
      flexShrink:0
    }}>
      {/* ПОГОДА */}
      <div style={{ display:"flex", alignItems:"center", gap:12, flex:1, paddingRight:28, borderRight:"1px solid rgba(255,255,255,0.08)" }}>
        <span style={{ fontSize:26 }}>{icon}</span>
        <div>
          <div style={{ fontSize:20, fontWeight:600, color:"#fff", lineHeight:1 }}>{temp}</div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", lineHeight:1, marginTop:3 }}>{wind}{rain}</div>
        </div>
        <select value={locIdx} onChange={function(e){ setLocIdx(Number(e.target.value)); }}
          style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:8, color:"rgba(255,255,255,0.8)", fontSize:14, padding:"5px 10px", cursor:"pointer", outline:"none" }}>
          {LOCATIONS.map(function(l,i){
            return <option key={i} value={i} style={{ background:"#0d1f3d" }}>{l.name}</option>;
          })}
        </select>
      </div>

      {/* KW */}
      <div style={{ display:"flex", alignItems:"center", gap:8, flex:1, padding:"0 28px", borderRight:"1px solid rgba(255,255,255,0.08)" }}>
        <span style={{ fontSize:18 }}>📅</span>
        <span style={{ fontSize:17, fontWeight:600, color:"rgba(255,255,255,0.9)" }}>{kw}</span>
        <span style={{ fontSize:14, color:"rgba(255,255,255,0.45)" }}>· {new Date().toLocaleDateString("de-DE",{weekday:"long"})}</span>
      </div>

      {/* EINGANG STATUS */}
      <div style={{ display:"flex", alignItems:"center", gap:10, flex:1, padding:"0 28px", borderRight:"1px solid rgba(255,255,255,0.08)" }}>
        <span style={{ fontSize:18 }}>📥</span>
        <div>
          <span style={{ fontSize:20, fontWeight:700, color: openAlerts > 0 ? "#ef4444" : "#22c55e" }}>{openAlerts}</span>
          <span style={{ fontSize:14, color:"rgba(255,255,255,0.45)", marginLeft:6 }}>Eingang offen</span>
        </div>
      </div>

      {/* MECHANIKER */}
      <div style={{ display:"flex", alignItems:"center", gap:10, flex:1, padding:"0 28px", borderRight:"1px solid rgba(255,255,255,0.08)" }}>
        <span style={{ fontSize:18 }}>🔧</span>
        <div>
          <span style={{ fontSize:20, fontWeight:700, color:"#22c55e" }}>{inProgress}</span>
          <span style={{ fontSize:14, color:"rgba(255,255,255,0.45)", marginLeft:6 }}>in Arbeit</span>
          <span style={{ fontSize:14, color:"rgba(255,255,255,0.3)", marginLeft:8 }}>/ {available} frei</span>
        </div>
      </div>

      {/* ДИЗЕЛЬ */}
      <div style={{ display:"flex", alignItems:"center", gap:10, flex:1, padding:"0 0 0 28px" }}>
        <span style={{ fontSize:18 }}>⛽</span>
        <div>
          <span style={{ fontSize:20, fontWeight:700, color:"#ffa500" }}>{diesel||"..."}</span>
          <span style={{ fontSize:13, color:"rgba(255,255,255,0.35)", marginLeft:6 }}>Diesel DE Ø</span>
        </div>
      </div>
    </div>
  );
}

function App() {
  var _su = useState(null); var user = _su[0]; var setUser = _su[1];
  try {
    var saved = localStorage.getItem("werkflow_dash_user");
    if (saved && !user) {
      var u = JSON.parse(saved);
      if (u && u.id) { setTimeout(function(){ setUser(u); }, 0); }
    }
  } catch(e) {}

  if (!user) {
    return <PinLogin onLogin={function(u){
      try { localStorage.setItem("werkflow_dash_user", JSON.stringify(u)); } catch(e) {}
      setUser(u);
    }} />;
  }
  return <AppShell user={user} onLogout={function(){
    try { localStorage.removeItem("werkflow_dash_user"); } catch(e) {}
    setUser(null);
  }} />;
}

function AppWithModals() {
  return React.createElement(React.Fragment, null,
    React.createElement(App),
    React.createElement(ExportModal)
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AppWithModals));
</script>
</body>
</html>
