    const sb = {
  query: function(table, opts) {
    var url = SUPABASE_URL + "/rest/v1/" + table + "?";
    if (opts && opts.select)  url += "select=" + opts.select + "&";
    if (opts && opts.filter)  url += opts.filter + "&";
    if (opts && opts.order)   url += "order=" + opts.order + "&";
    if (opts && opts.limit)   url += "limit=" + opts.limit + "&";
    var timeout = new Promise(function(_, rej){
      setTimeout(function(){ rej(new Error("timeout")); }, 5000);
    });
    return Promise.race([
      fetch(url, {
        headers: {
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY,
          "Content-Type": "application/json"
        }
      }).then(function(r){
        if (!r.ok) return [];
        return r.json().then(function(d){ return Array.isArray(d) ? d : []; });
      }),
      timeout
    ]).catch(function(){ return []; });
  }
};

    function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function formatMin(min) {
  if (!min) return "—";
  const h = Math.floor(min / 60);
  const m = min % 60;
  if (h > 0) return `${h}h ${m}min`;
  return `${m}min`;
}

function FleetSection({ vehicles, jobs, vehicleType, label, C, fleetSearch, setFleetSearch, fleetDateFilter, setFleetDateFilter, expandedVehicle, setExpandedVehicle }) {
  var fmt = function(m){ if(!m) return "—"; return Math.floor(m/60)+"h "+(m%60)+"min"; };
  var search = (fleetSearch||"").toLowerCase();
  var typeArr = vehicleType.split(",");
  var typeVehicles = (vehicles||[]).filter(function(v){ return typeArr.indexOf(v.type)!==-1; });
  var filtered = typeVehicles.filter(function(v){
    if(!search) return true;
    return (v.plate||"").toLowerCase().includes(search) ||
           (v.brand||"").toLowerCase().includes(search) ||
           (v.location||"").toLowerCase().includes(search);
  });

  var getVehicleJobs = function(plate){
    return (jobs||[]).filter(function(j){
      var ok = j.plate===plate;
      if(fleetDateFilter) ok = ok && j.date===fleetDateFilter;
      return ok;
    });
  };

  var totalVehicles = typeVehicles.length;
  var totalOpen = typeVehicles.reduce(function(s,v){ return s+(jobs||[]).filter(function(j){ return j.plate===v.plate && j.status!=="done"; }).length; }, 0);
  var totalCost  = typeVehicles.reduce(function(s,v){ return s+(jobs||[]).filter(function(j){ return j.plate===v.plate; }).reduce(function(s2,j){ return s2+(j.cost||0); },0); }, 0);
  var docWarn    = typeVehicles.filter(function(v){
    var today = new Date();
    return [{d:v.tuev},{d:v.insurance},{d:v.uvv},{d:v.nextService}].some(function(x){
      if(!x.d) return false;
      var diff = Math.round((new Date(x.d)-today)/86400000);
      return diff < 60;
    });
  }).length;

function App() {
  const [authState, setAuthState] = useState("checking");
  const [currentUser, setCurrentUser] = useState(null);
  const [jobs, setJobs] = useState([]);
  const [vehicles, setVehicles] = useState([]);
  const lang = "de";

  useEffect(function() {
    supa.auth.getSession().then(function(res) {
      var session = res.data.session;
      if (!session) { window.location.href = "werkstatt.html"; return; }
      var email = session.user.email;
      var ALLOWED = ["doll@ltg.de", "jens@ltg.de"];
      if (!ALLOWED.includes(email)) {
        alert("Zugriff verweigert!");
        supa.auth.signOut().then(function(){ window.location.href = "werkstatt.html"; });
        return;
      }
      var found = USERS.find(function(u){ return u.id === email.split("@")[0]; });
      if (!found) found = { id: email, name: email, role: "boss", avatar: "??" };
      setCurrentUser(found);
      setAuthState("ok");
      Promise.all([
        sb.query("jobs",     { select: "*", order: "created_at.desc", limit: "200" }),
        sb.query("vehicles", { select: "*", order: "plate_number.asc", limit: "200" })
      ]).then(function(results) {
        setJobs(results[0].map(mapJob));
        setVehicles(results[1].map(mapVehicle));
      });
    });
  }, []);

  var t = T[lang] || T["de"];

  if (authState === "checking") {
    return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center",
                   minHeight:"100vh", background:"#f0f4f8", fontSize:18, color:"#1a3a6b" }}>
        Login wird geprüft...
      </div>
    );
  }
  if (!currentUser) return null;

  return (
    <div style={{ minHeight:"100vh", background:"#f0f4f8" }}>
      <div style={{ background:"#1a3a6b", color:"white", padding:"10px 20px",
                    display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ fontSize:28, fontWeight:900, letterSpacing:-1 }}>LTG</div>
        <div style={{ display:"flex", alignItems:"center", gap:16 }}>
          <span style={{ fontSize:13, color:"#dbeafe" }}>{currentUser.name} · DASHBOARD · v2</span>
          <button onClick={function(){ supa.auth.signOut().then(function(){ window.location.href="werkstatt.html"; }); }}
            style={{ background:"transparent", color:"#dbeafe", border:"1px solid rgba(255,255,255,.25)",
                     padding:"6px 14px", borderRadius:8, cursor:"pointer", fontWeight:700 }}>
            Abmelden
          </button>
        </div>
      </div>
      <DashboardShared
        jobs={jobs} vehicles={vehicles} alerts={[]} inspections={[]}
        t={t} lang={lang} user={currentUser}
        onNavigate={function(){}} onCreateJob={function(){}} onTabChange={function(){}}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));


  </script>
</body>
