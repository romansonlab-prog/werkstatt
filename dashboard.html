  <!-- === Sentry/Glitchtip Error Monitoring ===
       Активация: подставь DSN в SENTRY_DSN ниже (отдельный проект на каждое приложение).
       Без DSN — Sentry молча отключён, ничего не отправляет.
       Получить DSN: https://glitchtip.com (бесплатно, EU) или https://sentry.io (free до 5k/мес) -->
  <script src="https://browser.sentry-cdn.com/8.45.0/bundle.min.js" crossorigin="anonymous"></script>
  <script>
    (function(){
      var SENTRY_DSN = ""; // ← вставь DSN для dashboard, пусто = выключено
      if (SENTRY_DSN && window.Sentry) {
        try {
          Sentry.init({
            dsn: SENTRY_DSN,
            release: "dashboard@2026-05-13",
            environment: location.hostname.indexOf("localhost") >= 0 ? "dev" : "prod",
            tracesSampleRate: 0.0,
            beforeSend: function(event){
              if (event.exception && event.exception.values) {
                var msg = (event.exception.values[0]||{}).value || "";
                if (msg.indexOf("ResizeObserver") >= 0) return null;
                if (msg.indexOf("extension://") >= 0) return null;
              }
              return event;
            }
          });
        } catch(e){ console.warn("Sentry init failed:", e); }
      }
    })();
  </script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#0f1623;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
    #root{min-height:100vh}
    button{font:inherit;cursor:pointer}
    input,select,textarea{font:inherit}
    textarea{resize:none}
    ::placeholder{color:rgba(255,255,255,0.35)}

    /* LAYOUT */
    .dash-layout{display:flex;min-height:100vh}
    .sidebar{width:250px;flex-shrink:0;background:rgba(8,18,40,0.95);border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:30}
    .sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.07)}
    .sidebar-logo-text{font-size:32px;font-weight:900;letter-spacing:-1.5px;line-height:1}
    .sidebar-subtitle{font-size:13px;font-weight:600;color:#ffa500;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
    .sidebar-nav{flex:1;padding:14px 0;overflow-y:auto}
    .nav-section{padding:8px 18px 4px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:2px;text-transform:uppercase;margin-top:8px}
    .nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border:none;background:transparent;color:rgba(255,255,255,0.7);width:100%;text-align:left;font-size:16px;font-weight:500;border-radius:0;cursor:pointer;position:relative;transition:color 0.15s}
    .nav-item:hover{color:#fff;background:rgba(255,255,255,0.04)}
    .nav-item.active{color:#ffa500;background:rgba(255,165,0,0.08)}
    .nav-item.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:#ffa500;border-radius:0 2px 2px 0}
    .nav-badge{margin-left:auto;background:#ef4444;color:#fff;border-radius:99px;font-size:11px;font-weight:800;padding:2px 8px;min-width:22px;text-align:center}
    .nav-badge.orange{background:#ffa500;color:#0a1730}
    .sidebar-footer{padding:16px 18px;border-top:1px solid rgba(255,255,255,0.07)}
    .sidebar-user{display:flex;align-items:center;gap:10px}
    .sidebar-avatar{width:38px;height:38px;border-radius:50%;background:rgba(255,165,0,0.15);border:1px solid rgba(255,165,0,0.35);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#ffa500;flex-shrink:0}
    .sidebar-name{font-size:14px;font-weight:600;color:rgba(255,255,255,0.85);line-height:1.2}
    .sidebar-role{font-size:12px;color:rgba(255,255,255,0.4)}

    .main{margin-left:250px;flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:#0f1623}
    .topbar{height:64px;background:rgba(8,18,40,0.9);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;padding:0 28px;gap:16px;flex-shrink:0;z-index:20;backdrop-filter:blur(10px)}
    .topbar-title{font-size:20px;font-weight:700;color:#fff}
    .topbar-sub{font-size:14px;color:rgba(255,255,255,0.45);margin-left:4px}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:14px}
    .topbar-refresh{padding:9px 20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.8);border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
    .topbar-refresh:hover{border-color:#ffa500;color:#ffa500}
    .page{padding:16px 20px;overflow-y:auto;flex:1}

    /* CARDS & PANELS */
    .glass{background:rgba(15,30,60,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:14px;backdrop-filter:blur(12px)}
    .panel{background:rgba(15,30,60,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:18px 22px;margin-bottom:16px}
    .panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .panel-title{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.8)}
    .panel-title-lg{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.5px}

    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
    .kpi-card{background:rgba(15,30,60,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden}
    .kpi-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px}
    .kpi-card.blue::before{background:#3b82f6}
    .kpi-card.orange::before{background:#ffa500}
    .kpi-card.red::before{background:#ef4444}
    .kpi-card.green::before{background:#22c55e}
    .kpi-card.purple::before{background:#a855f7}
    .kpi-icon{font-size:22px;margin-bottom:10px}
    .kpi-val{font-size:32px;font-weight:800;letter-spacing:-1px;line-height:1}
    .kpi-label{font-size:13px;color:rgba(255,255,255,0.5);margin-top:6px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
    .kpi-sub{font-size:11px;margin-top:4px;font-weight:600}

    /* TABLE */
    .tbl{width:100%;border-collapse:collapse;table-layout:fixed}
    .tbl th{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:rgba(255,255,255,0.4);padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.1);border-right:1px solid rgba(255,255,255,0.06);text-align:left;white-space:nowrap}
    .tbl th:last-child{border-right:none}
    .tbl td{padding:15px 16px;border-bottom:1px solid rgba(255,255,255,0.06);border-right:1px solid rgba(255,255,255,0.04);font-size:15px;vertical-align:middle}
    .tbl td:last-child{border-right:none}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tr:hover td{background:rgba(255,255,255,0.04)}

    /* BADGES */
    .badge{display:inline-block;padding:4px 11px;border-radius:99px;font-size:13px;font-weight:700}
    .badge-red{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
    .badge-orange{background:rgba(255,165,0,0.15);color:#ffa500;border:1px solid rgba(255,165,0,0.3)}
    .badge-green{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
    .badge-blue{background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3)}
    .badge-gray{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.12)}
    .badge-purple{background:rgba(168,85,247,0.15);color:#c084fc;border:1px solid rgba(168,85,247,0.3)}

    /* BUTTONS */
    .btn-primary{background:linear-gradient(180deg,#ffa500,#ff8c00);color:#0a1730;border:none;border-radius:9px;font-weight:700;padding:10px 18px;font-size:15px;cursor:pointer}
    .btn-outline{border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.8);border-radius:9px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer}
    .btn-outline:hover{border-color:#ffa500;color:#ffa500}
    .btn-danger{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);border-radius:9px;padding:9px 14px;font-size:12px;font-weight:700}
    .btn-small{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer}

    /* INPUTS */
    .inp{background:rgba(9,27,58,0.8);border:1px solid rgba(255,255,255,0.14);border-radius:9px;color:#fff;padding:10px 14px;font-size:15px;outline:none}
    .inp:focus{border-color:#ffa500}
    select.inp{appearance:none}

    /* STATUS DOTS */
    .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
    .dot-green{background:#22c55e}
    .dot-orange{background:#ffa500}
    .dot-red{background:#ef4444}
    .dot-gray{background:rgba(255,255,255,0.3)}

    /* ALERT CARD */
    .alert-card{background:rgba(15,30,60,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;margin-bottom:10px}
    .alert-card.urgent{background:rgba(60,10,20,0.8);border-color:rgba(239,68,68,0.4)}

    /* DOC CHIP */
    .doc-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700}
    .doc-ok{background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.25)}
    .doc-warn{background:rgba(255,165,0,0.12);color:#ffa500;border:1px solid rgba(255,165,0,0.25)}
    .doc-urgent{background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.25)}
    .doc-none{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.1)}

    /* GRID */
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

    /* LOGIN */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f1623;padding:20px}
    .login-box{width:100%;max-width:360px}
    .login-card{background:rgba(15,30,60,0.9);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:32px 28px;box-shadow:0 24px 60px rgba(0,0,0,0.5)}
    .pin-row{display:flex;gap:14px;justify-content:center;margin:24px 0}
    .pin-dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background 0.15s}
    .pin-dot.on{background:#ffa500;box-shadow:0 0 10px rgba(255,165,0,0.5)}
    .pin-dot.err{background:#ef4444}
    .keypad{display:grid;grid-template-columns:repeat(3,68px);gap:12px;justify-content:center}
    .kkey{height:64px;border-radius:50%;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.15);color:#fff;font-size:24px;font-weight:500}
    .kkey:active{background:rgba(255,255,255,0.12)}

    /* MECHANIC CARD */
    .mech-card{background:rgba(15,30,60,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:18px;margin-bottom:12px}
    .mech-stats{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap}
    .mech-stat{text-align:center}
    .mech-stat-val{font-size:22px;font-weight:900;color:#ffa500}
    .mech-stat-lab{font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

    /* SCROLLBAR */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}

    /* EMPTY STATE */
    .empty{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.35);font-size:16px}

    /* EXPANDABLE ROW */
    .expand-row{background:rgba(9,20,48,0.6);border-left:2px solid rgba(255,165,0,0.3);padding:14px 16px;margin-top:2px;border-radius:0 0 10px 10px}

    /* CHART CONTAINER */
    .chart-wrap{position:relative;height:200px}

    /* MODAL */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal-box{background:#0d1f3d;border:1px solid rgba(255,255,255,0.15);border-radius:18px;padding:24px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,0.6)}

    /* PRINT */
    @media print{
      .sidebar,.topbar,.no-print{display:none!important}
      .main{margin-left:0!important}
      .page{padding:0!important}
      body{background:#fff!important;color:#000!important}
      .panel,.kpi-card,.glass,.alert-card,.mech-card{background:#fff!important;border:1px solid #ddd!important;color:#000!important}
      .panel-title,.kpi-label,.kpi-val,.panel-title-lg{color:#000!important}
    }

    @media(max-width:900px){
      .sidebar{transform:translateX(-100%);transition:transform 0.25s}
      .sidebar.open{transform:translateX(0)}
      .main{margin-left:0}
      .kpi-grid{grid-template-columns:1fr 1fr}
      .g4{grid-template-columns:1fr 1fr}
      .g3{grid-template-columns:1fr 1fr}
    }

    /* === SOS Unfall — мигающий красный экран для критической срочности === */
    @keyframes sosBlinkRow {
      0%, 100% { background-color: rgba(239,68,68,0.18); }
      50% { background-color: rgba(239,68,68,0.32); }
    }
    @keyframes sosBlinkBanner {
      0%, 100% { background-color: #dc2626; box-shadow: 0 0 20px rgba(239,68,68,0.6); }
      50% { background-color: #ef4444; box-shadow: 0 0 40px rgba(239,68,68,0.9); }
    }
    .sos-banner {
      position: fixed; top: 64px; left: 250px; right: 0;
      z-index: 100;
      padding: 14px 24px;
      color: #fff; font-weight: 900; font-size: 17px;
      letter-spacing: 1px;
      display: flex; align-items: center; gap: 14px;
      animation: sosBlinkBanner 1s ease-in-out infinite;
      cursor: pointer;
    }
    .sos-banner-icon {
      font-size: 24px;
    }
    @media(max-width:900px){
      .sos-banner { left: 0; }
    }
  </style>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js').then(function(reg) {
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
        reg.addEventListener('updatefound', function() {
          var nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', function() {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              nw.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
        document.addEventListener('visibilitychange', function() {
          if (document.visibilityState === 'visible') {
            reg.update().catch(function(){});
          }
        });
      }).catch(function(e){ console.warn('SW:', e); });

      var reloaded = false;
      navigator.serviceWorker.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'SW_UPDATED' && !reloaded) {
          reloaded = true;
          window.location.reload();
        }
      });
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (reloaded) return;
        reloaded = true;
        window.location.reload();
      });
    });
  }
</script>

function getMechanicsFromJobs(jobs) {

function todayIso() { return new Date().toLocaleDateString("sv-SE"); }
function fmtDate(d) { if (!d) return "—"; try { return new Date(d).toLocaleDateString("de-DE"); } catch(e){ return d; } }
function fmtDateTime(d) { if (!d) return "—"; try { return new Date(d).toLocaleString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); } catch(e){ return d; } }
function fmtMin(m) { m=parseInt(m||0)||0; if(!m) return "0 min"; var h=Math.floor(m/60),mm=m%60; return h ? h+"h "+mm+"min" : mm+" min"; }
// Парсинг журнала пауз заказа (pause_log из таблицы jobs)
function parsePauseLog(j) {
  if (!j || !j.pause_log) return [];
  var log = j.pause_log;
  if (typeof log === "string") { try { log = JSON.parse(log); } catch(e) { return []; } }
  return Array.isArray(log) ? log : [];
}
function totalPauseMin(j) {
  return parsePauseLog(j).reduce(function(s,p){ return s + (p.minutes || 0); }, 0);
}
function dateDiff(d) { if (!d) return null; return Math.round((new Date(d) - new Date()) / 86400000); }

function docStatus(diff) {
  if (diff === null) return "none";
  if (diff < 0) return "expired";
  if (diff < 30) return "urgent";
  if (diff < 60) return "warn";
  return "ok";
}
function docColor(st) {
  if (st === "expired") return "#ef4444";
  if (st === "urgent")  return "#ef4444";
  if (st === "warn")    return "#ffa500";
  if (st === "ok")      return "#22c55e";
  return "rgba(255,255,255,0.3)";
}
function docCls(st) {
  if (st === "expired" || st === "urgent") return "doc-urgent";
  if (st === "warn") return "doc-warn";
  if (st === "ok") return "doc-ok";
  return "doc-none";
}

// === Supabase API ===
function sbGet(table, query) {
  return fetch(SB_URL + "/rest/v1/" + table + (query ? "?" + query : ""), {
    headers:{ "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY }
  }).then(function(r){ return r.ok ? r.json() : []; })
    .then(function(d){ return Array.isArray(d) ? d : []; })
    .catch(function(){ return []; });
}

function sbPatch(table, id, body) {
  return fetch(SB_URL + "/rest/v1/" + table + "?id=eq." + encodeURIComponent(id), {
    method:"PATCH",
    headers:{ "Content-Type":"application/json", "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY, "Prefer":"return=minimal" },
    body:JSON.stringify(body)

// === УНИВЕРСАЛЬНЫЙ EXCEL-ЭКСПОРТ ===
// rows: массив объектов {колонка: значение}
// headers: массив имён колонок в нужном порядке
// title: название отчёта (станет именем файла и заголовком в шапке)
// meta: опциональные доп. строки шапки [{label, value}]
function exportXlsx(rows, headers, title, meta) {
  if (!window.XLSX) {
    alert("Excel-Bibliothek noch nicht geladen. Bitte Seite neu laden.");
    return;
  }
  var now = new Date();
  var aoa = [];
  // Служебная шапка
  aoa.push(["WerkFlow — " + (title || "Export")]);
  aoa.push(["LTG Landauer Transportgesellschaft Doll KG"]);
  aoa.push(["Erstellt: " + now.toLocaleDateString("de-DE") + " " + now.toLocaleTimeString("de-DE", { hour:"2-digit", minute:"2-digit" })]);
  if (meta && meta.length) {
    meta.forEach(function(m){ aoa.push([m.label + ": " + m.value]); });
  }
  aoa.push(["Datensätze: " + rows.length]);
  aoa.push([]); // пустая строка-разделитель
  var headerRowIdx = aoa.length; // индекс строки заголовков таблицы (0-based)
  aoa.push(headers);
  // Данные
  rows.forEach(function(r){
    aoa.push(headers.map(function(h){
      var v = r[h];
      return (v === null || v === undefined) ? "" : v;
    }));
  });

  var ws = XLSX.utils.aoa_to_sheet(aoa);

  // Ширина колонок
  ws["!cols"] = headers.map(function(h){
    var maxLen = String(h).length;
    rows.forEach(function(r){
      var v = r[h];
      var len = (v === null || v === undefined) ? 0 : String(v).length;
      if (len > maxLen) maxLen = len;
    });
    return { wch: Math.min(Math.max(maxLen + 2, 12), 55) };
  });

  // Объединяем ячейки служебной шапки на всю ширину таблицы
  var lastCol = headers.length - 1;
  ws["!merges"] = [];
  for (var hi = 0; hi < headerRowIdx - 1; hi++) {
    ws["!merges"].push({ s:{r:hi,c:0}, e:{r:hi,c:lastCol} });
  }

  // Заморозка: всё до строки данных включительно (шапка + заголовки таблицы)
  ws["!freeze"] = { xSplit:0, ySplit:headerRowIdx + 1, topLeftCell:XLSX.utils.encode_cell({r:headerRowIdx+1,c:0}), activePane:"bottomLeft", state:"frozen" };
  // SheetJS использует !freeze не везде — дублируем через стандартный механизм
  ws["!freeze"] = XLSX.utils.encode_cell({ r:headerRowIdx + 1, c:0 });

  // Стилизация ячеек (работает в SheetJS community для шрифта/выравнивания)
  function styleCell(addr, style){
    if (!ws[addr]) ws[addr] = { t:"s", v:"" };
    ws[addr].s = style;
  }
  // Заголовок отчёта — крупный жирный
  styleCell("A1", { font:{ bold:true, sz:15, color:{rgb:"0A1730"} } });
  styleCell("A2", { font:{ sz:11, color:{rgb:"666666"} } });
  styleCell("A3", { font:{ sz:10, color:{rgb:"999999"} } });
  // Строка заголовков таблицы — жирная, тёмный фон, белый текст
  headers.forEach(function(h, ci){
    var addr = XLSX.utils.encode_cell({ r:headerRowIdx, c:ci });
    styleCell(addr, {
      font:{ bold:true, sz:11, color:{rgb:"FFFFFF"} },
      fill:{ fgColor:{ rgb:"0A1730" } },
      alignment:{ horizontal:"left", vertical:"center" }
    });
  });

  // Числовой формат для колонок с числами/€
  headers.forEach(function(h, ci){
    var isNum = /€|min|km|anzahl|aufträge|bestand|minimum/i.test(h);
    if (!isNum) return;
    for (var ri = 0; ri < rows.length; ri++) {
      var addr = XLSX.utils.encode_cell({ r:headerRowIdx + 1 + ri, c:ci });
      if (ws[addr] && typeof ws[addr].v === "number") {
        ws[addr].z = /€/.test(h) ? "#,##0.00" : "#,##0";
      }
    }
  });

  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Bericht");
  var fname = (title || "WerkFlow_Export").replace(/[^\wÀ-ÿ\- ]/g, "").replace(/\s+/g, "_") + "_" +
    now.toLocaleDateString("sv-SE") + ".xlsx";
  XLSX.writeFile(wb, fname);
}

  return "○ Neu";
}

}

}

// Без селектора юзеров. Юзер вводит свой PIN, мы ищем его в users по
// app_access='dashboard' & active=true. Fallback PIN отсутствует — для
// дашборда только персональный логин.
function PinLogin({ onLogin }) {
  var _sp = useState(""); var pin = _sp[0]; var setPin = _sp[1];
  var _se = useState(false); var err = _se[0]; var setErr = _se[1];
  var _users = useState(null); var dbUsers = _users[0]; var setDbUsers = _users[1];
  var _msg = useState(""); var msg = _msg[0]; var setMsg = _msg[1];

  useEffect(function(){
    sbGet("users","active=eq.true&select=id,name,avatar,role,niederlassung_id,scope_level,pin,app_access").then(function(r){
      setDbUsers(r||[]);
    }).catch(function(){
      setDbUsers([]);
    });
  }, []);

  function tryLogin(nx){
    if (dbUsers === null) {
      setTimeout(function(){ tryLogin(nx); }, 150);
      return;
    }
    var found = (dbUsers||[]).find(function(u){
      // active уже отфильтрован на сервере через ?active=eq.true,
      // поэтому здесь не проверяем (поле может не быть в select)
      if (!u.pin || u.pin !== nx) return false;
      if (((u.app_access||[]).indexOf("dashboard")) === -1) return false;
      return true;
    });
    if (found) {
      // сохраняем расширенный объект сессии и обновляем last_login
      var sessUser = {
        id: found.id, name: found.name, avatar: found.avatar||"??",
        role: found.role, niederlassung_id: found.niederlassung_id, scope_level: found.scope_level,
        app_access: found.app_access||[], tenant_id: "ltg",
        pin: found.pin // нужен для совместимости с существующим кодом дашборда
      };
      fetch(SB_URL+"/rest/v1/users?id=eq."+encodeURIComponent(found.id), {
        method:"PATCH",
        headers:{ "Content-Type":"application/json", "apikey":SB_KEY, "Authorization":"Bearer "+SB_KEY, "Prefer":"return=minimal" },
        body:JSON.stringify({ last_login: new Date().toISOString() })
      }).catch(function(){});
      onLogin(sessUser);
    } else {
      setErr(true); setMsg("Falscher PIN");
      setTimeout(function(){ setPin(""); setErr(false); setMsg(""); }, 900);
    }
  }

  function press(d) {
    if (pin.length >= 4) return;
    setErr(false);
    var next = pin + d; setPin(next);
    if (next.length === 4) {
      setTimeout(function(){ tryLogin(next); }, 120);
    }
  }
  function del() { setPin(function(p){ return p.slice(0,-1); }); setErr(false); setMsg(""); }

  return (
    <div className="login-wrap">
      <div className="login-box">
        <div style={{ textAlign:"center", marginBottom:28 }}>
          <div style={{ fontSize:40, fontWeight:900, letterSpacing:-2, lineHeight:1, marginBottom:6 }}>
            <span style={{ color:"#fff" }}>Werk</span><span style={{ color:"#ffa500" }}>Flow</span>
          </div>
          <div style={{ fontSize:12, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:3 }}>Dashboard</div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.3)", marginTop:4 }}>Landauer Transportgesellschaft Doll KG</div>
        </div>
        <div className="login-card">
          <div style={{ fontSize:12, fontWeight:700, color:"rgba(255,255,255,0.5)", textAlign:"center", textTransform:"uppercase", letterSpacing:2, marginBottom:14 }}>
            {dbUsers === null ? "Lade..." : "PIN eingeben"}
          </div>
          <div className="pin-row">
            {[0,1,2,3].map(function(i){ return <div key={i} className={"pin-dot" + (i < pin.length ? " on" : "") + (err ? " err" : "")}></div>; })}
          </div>
          {msg && <div style={{ textAlign:"center", color:"#ef4444", fontSize:12, fontWeight:700, marginTop:4, marginBottom:6 }}>{msg}</div>}
          <div className="keypad">
            {[1,2,3,4,5,6,7,8,9].map(function(d){ return <button key={d} className="kkey" onClick={function(){ press(String(d)); }}>{d}</button>; })}
            <div></div>
            <button className="kkey" onClick={function(){ press("0"); }}>0</button>
            <button className="kkey" onClick={del} style={{ fontSize:18 }}>⌫</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// === ÜBERSICHT ===
function Uebersicht({ jobs, alerts, vehicles, forklifts, washOrders, inspections }) {
  var today = todayIso();
  var yesterday = (function(){ var d=new Date(); d.setDate(d.getDate()-1); return d.toLocaleDateString("sv-SE"); })();
  var thirtyAgo = (function(){ var d=new Date(); d.setDate(d.getDate()-30); return d.toLocaleDateString("sv-SE"); })();

  var todayJobs = jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10)) === today; });
  var yesterJobs = jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10)) === yesterday; });
  var openAlerts = alerts.filter(function(a){ return a.status !== "done" && a.status !== "rejected"; });
  var urgentAlerts = openAlerts.filter(function(a){ return (a.urgency||"").includes("urgent"); });
  var yesterAlerts = alerts.filter(function(a){ return (a.created_at||"").slice(0,10) === yesterday; });

  var allVeh = vehicles.concat(forklifts||[]);
  var tuevAlarm = allVeh.filter(function(v){
    var fields = [
      {label:"TÜV", date:v.tuev},
      {label:"UVV", date:v.uvv||v.uvv_datum},
      {label:"Versicherung", date:v.insurance},
      {label:"Wartung", date:v.next_service}
    ].filter(function(f){ return f.date; });
    return fields.some(function(f){ var d=dateDiff(f.date); return d!==null && d<30; });
  });

  var todayWash = (washOrders||[]).filter(function(o){ return (o.work_date||"")===today; });
  var yesterWash = (washOrders||[]).filter(function(o){ return (o.work_date||"")===yesterday; });
  var washRev = todayWash.reduce(function(s,o){ return s+(Number(o.price_eur)||0); }, 0);
  var yesterWashRev = yesterWash.reduce(function(s,o){ return s+(Number(o.price_eur)||0); }, 0);

  var todayInsp = (inspections||[]).filter(function(i){ return (i.created_at||"").slice(0,10)===today; });

  // График 30 дней
  var last30 = [];
  for (var i=29; i>=0; i--) {
    var d=new Date(); d.setDate(d.getDate()-i);
    var iso=d.toLocaleDateString("sv-SE");
    var cnt=jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10))===iso; }).length;
    last30.push({ iso:iso, label: i%5===0||i===0 ? d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"}) : "", count:cnt });
  }

  var barRef = useRef(null);
  var chartRef = useRef(null);
  var lineRef = useRef(null);
  var lineChartRef = useRef(null);

  useEffect(function(){
    if (!barRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(barRef.current, {
      type:"bar",
      data:{
        labels: last30.map(function(d){ return d.label; }),
        datasets:[{ data: last30.map(function(d){ return d.count; }),
          backgroundColor: last30.map(function(d){ return d.iso===today?"rgba(255,165,0,0.9)":"rgba(255,165,0,0.45)"; }),
          borderColor:"#ffa500", borderWidth:1, borderRadius:4 }]
      },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{ callbacks:{ title:function(items){ return last30[items[0].dataIndex].iso; } } } },
        scales:{
          x:{ticks:{color:"rgba(255,255,255,0.45)",font:{size:11}},grid:{display:false}},
          y:{ticks:{color:"rgba(255,255,255,0.45)",font:{size:11},stepSize:1},grid:{color:"rgba(255,255,255,0.05)"}}
        }
      }
    });
    return function(){ if (chartRef.current) chartRef.current.destroy(); };
  }, [jobs.length]);

  // График 12 месяцев
  var last12 = [];
  for (var mi=11; mi>=0; mi--) {
    var md = new Date(); md.setDate(1); md.setMonth(md.getMonth()-mi);
    var mStart = md.toLocaleDateString("sv-SE");
    var mEnd = new Date(md.getFullYear(), md.getMonth()+1, 1).toLocaleDateString("sv-SE");
    var mJobs = jobs.filter(function(j){
      var d = j.date||(j.created_at||"").slice(0,10);
      return d >= mStart && d < mEnd;
    });
    var mCost = mJobs.reduce(function(s,j){ return s+(Number(j.cost)||0); }, 0);
    last12.push({
      label: md.toLocaleDateString("de-DE",{month:"short",year:"2-digit"}),
      count: mJobs.length,
      cost: Math.round(mCost)
    });
  }

  useEffect(function(){
    if (!lineRef.current) return;
    if (lineChartRef.current) lineChartRef.current.destroy();
    lineChartRef.current = new Chart(lineRef.current, {
      type:"line",
      data:{
        labels: last12.map(function(m){ return m.label; }),
        datasets:[
          { label:"Aufträge", data: last12.map(function(m){ return m.count; }),
            borderColor:"#ffa500", backgroundColor:"rgba(255,165,0,0.1)",
            tension:0.3, pointRadius:4, pointBackgroundColor:"#ffa500",
            fill:true, yAxisID:"y1" },
          { label:"Kosten (€)", data: last12.map(function(m){ return m.cost; }),
            borderColor:"#60a5fa", backgroundColor:"rgba(96,165,250,0.08)",
            tension:0.3, pointRadius:4, pointBackgroundColor:"#60a5fa",
            fill:false, yAxisID:"y2" }
        ]
      },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:true, position:"top",
          labels:{ color:"rgba(255,255,255,0.6)", font:{size:11}, boxWidth:12 } } },
        scales:{
          x:{ ticks:{color:"rgba(255,255,255,0.5)",font:{size:11}}, grid:{color:"rgba(255,255,255,0.04)"} },
          y1:{ position:"left", ticks:{color:"#ffa500",font:{size:11},stepSize:1}, grid:{color:"rgba(255,255,255,0.04)"} },
          y2:{ position:"right", ticks:{color:"#60a5fa",font:{size:11}}, grid:{display:false} }
        }
      }
    });
    return function(){ if (lineChartRef.current) lineChartRef.current.destroy(); };
  }, [jobs.length]);

  // Top проблемные машины
  var topProblems = {};
  jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10))>=thirtyAgo; })
    .forEach(function(j){ if (j.plate) topProblems[j.plate]=(topProblems[j.plate]||0)+1; });
  var topArr = Object.keys(topProblems).sort(function(a,b){ return topProblems[b]-topProblems[a]; }).slice(0,5);

  // Aktivität heute
  var activity = [];
  todayJobs.forEach(function(j){
    activity.push({ time:(j.created_at||"").slice(11,16), icon:"🔧",
      text: (WORK_TYPES[j.work_type]||j.work_type||"Auftrag") + " · " + (j.plate||"—") + (j.mechanic?" · "+j.mechanic:""),
      sub: j.status==="done"?"✓ Fertig":j.status==="inProgress"?"⚙ In Arbeit":"Neu",
      color: j.status==="done"?"#22c55e":j.status==="inProgress"?"#ffa500":"rgba(255,255,255,0.5)",
      ts: j.created_at||""
    });
  });
  alerts.filter(function(a){ return (a.created_at||"").slice(0,10)===today; }).forEach(function(a){
    activity.push({ time:(a.created_at||"").slice(11,16), icon:"🚨",
      text:"Meldung · "+(a.plate||"—")+" · "+(a.sender||""),
      sub:(a.urgency||"").includes("urgent")?"Dringend":"Normal",
      color:(a.urgency||"").includes("urgent")?"#ef4444":"#ffa500",
      ts: a.created_at||""
    });
  });
  todayWash.forEach(function(w){
    activity.push({ time:(w.created_at||"").slice(11,16), icon:"🚿",
      text:"Wäsche · "+(w.plate_number||"—")+" · "+(w.wash_type_name||""),
      sub:(w.price_eur||0).toFixed(2)+" €",
      color:"#22c55e", ts: w.created_at||""
    });
  });
  todayInsp.forEach(function(ins){
    activity.push({ time:(ins.created_at||"").slice(11,16), icon:"📋",
      text:"Inspektion · "+(ins.plate||"—")+" · "+(ins.driver||""),
      sub:ins.status==="ok"?"✓ OK":"⚠ Mängel",
      color:ins.status==="ok"?"#22c55e":"#ef4444", ts: ins.created_at||""
    });
  });
  activity.sort(function(a,b){ return b.ts.localeCompare(a.ts); });

  // Mechaniker heute — динамически из jobs
  var mechStatus = getMechanicsFromJobs(todayJobs).map(function(m){
    var mj = todayJobs.filter(function(j){ return j.mechanic===m.id; });
    var active = mj.filter(function(j){ return j.status==="inProgress"; }).length;
    var done = mj.filter(function(j){ return j.status==="done"; }).length;
    var paused = mj.filter(function(j){ return j.status==="paused"; }).length;
    return { name:m.name, avatar:m.name.split(" ").map(function(w){ return w[0]||""; }).join("").slice(0,2).toUpperCase(),
      total:mj.length, active:active, done:done, paused:paused,
      status: active>0?"inArbeit":mj.length>0?"verfügbar":"verfügbar" };
  });

  function delta(cur, prev, suffix) {
    var diff = cur - prev;
    if (diff === 0) return <span style={{ fontSize:13, color:"rgba(255,255,255,0.35)" }}>= wie gestern</span>;
    var up = diff > 0;
    return <span style={{ fontSize:13, color: up?"#22c55e":"#60a5fa" }}>{up?"▲":"▼"} {Math.abs(diff)}{suffix} vs gestern</span>;
  }

  return (
    <div>
      {/* KPI КАРТОЧКИ */}
      <div className="kpi-grid" style={{ marginBottom:12 }}>
        <div className="kpi-card orange">
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>Aufträge heute</div>
          <div style={{ fontSize:34, fontWeight:700, lineHeight:1, marginBottom:6 }}>{todayJobs.length}</div>
          <div style={{ fontSize:13, color:"#ffa500", marginBottom:4 }}>{todayJobs.filter(function(j){ return j.status==="done"; }).length} erledigt · {todayJobs.filter(function(j){ return j.status==="inProgress"; }).length} in Arbeit</div>
          {delta(todayJobs.length, yesterJobs.length, "")}
        </div>
        <div className="kpi-card red">
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>Offene Meldungen</div>
          <div style={{ fontSize:34, fontWeight:700, lineHeight:1, marginBottom:6, color: openAlerts.length>0?"#ef4444":"#22c55e" }}>{openAlerts.length}</div>
          <div style={{ fontSize:13, color: urgentAlerts.length>0?"#ef4444":"rgba(255,255,255,0.4)", marginBottom:4 }}>{urgentAlerts.length} dringend</div>
          {delta(openAlerts.length, yesterAlerts.filter(function(a){ return a.status!=="done"; }).length, "")}
        </div>
        <div className="kpi-card" style={{ borderLeft:"3px solid #ef4444" }}>
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>Dokumente &lt; 30 Tage</div>
          <div style={{ fontSize:34, fontWeight:700, lineHeight:1, marginBottom:6, color: tuevAlarm.length>0?"#ef4444":"#22c55e" }}>{tuevAlarm.length}</div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)" }}>TÜV / UVV / Versicherung</div>
        </div>
        <div className="kpi-card green">
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>Wäschen heute</div>
          <div style={{ fontSize:34, fontWeight:700, lineHeight:1, marginBottom:6 }}>{todayWash.length}</div>
          <div style={{ fontSize:13, color:"#22c55e", marginBottom:4 }}>{washRev.toFixed(2)} €</div>
          {delta(todayWash.length, yesterWash.length, "")}
        </div>
      </div>

      {/* MECHANIKER STATUS + INSPEKTIONEN */}
      <div className="g2" style={{ marginBottom:16 }}>
        <div className="panel">
          <div className="panel-hd"><div className="panel-title" style={{ fontSize:15 }}>Mechaniker heute</div></div>
          {mechStatus.map(function(m){
            return (
              <div key={m.name} style={{ display:"flex", alignItems:"center", gap:14, padding:"12px 0", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                <div style={{ width:44, height:44, borderRadius:"50%", background:"rgba(255,165,0,0.12)", border:"2px solid rgba(255,165,0,0.3)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, fontSize:15, color:"#ffa500", flexShrink:0 }}>{m.avatar}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:16, fontWeight:600, color:"#fff" }}>{m.name}</div>
                  <div style={{ fontSize:13, marginTop:2, color: m.active>0?"#22c55e":"rgba(255,255,255,0.4)" }}>
                    {m.active>0 ? "● In Arbeit" : "○ Verfügbar"}
                    {m.paused>0 ? <span style={{ color:"#ffa500" }}>{" · ⏸ " + m.paused + " pausiert"}</span> : null}
                  </div>
                </div>
                <div style={{ textAlign:"center", padding:"0 16px", borderLeft:"1px solid rgba(255,255,255,0.07)" }}>
                  <div style={{ fontSize:22, fontWeight:700, color:"#ffa500" }}>{m.total}</div>
                  <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", textTransform:"uppercase" }}>Aufträge</div>
                </div>
                <div style={{ textAlign:"center", padding:"0 16px", borderLeft:"1px solid rgba(255,255,255,0.07)" }}>
                  <div style={{ fontSize:22, fontWeight:700, color:"#22c55e" }}>{m.done}</div>
                  <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", textTransform:"uppercase" }}>Fertig</div>
                </div>
              </div>
            );
          })}
        </div>

        <div className="panel">
          <div className="panel-hd"><div className="panel-title" style={{ fontSize:15 }}>Inspektionen heute</div></div>
          {todayInsp.length === 0
            ? <div className="empty" style={{ padding:"20px 0" }}>Noch keine Inspektionen heute</div>
            : todayInsp.map(function(ins){
                var ok = ins.status === "ok" || !(ins.mangel && ins.mangel.length);
                return (
                  <div key={ins.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"11px 0", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                    <div style={{ fontSize:20 }}>{ok?"✅":"⚠️"}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:15, fontWeight:600 }}>{ins.plate||"—"}</div>
                      <div style={{ fontSize:13, color:"rgba(255,255,255,0.45)", marginTop:2 }}>{ins.driver||"—"} · {(ins.created_at||"").slice(11,16)} Uhr</div>
                    </div>
                    <div style={{ fontSize:13, fontWeight:700, color: ok?"#22c55e":"#ef4444" }}>
                      {ok?"✓ OK":"⚠ Mängel"}
                    </div>
                  </div>
                );
              })
          }
          <div style={{ marginTop:12, padding:"10px 14px", background:"rgba(255,255,255,0.04)", borderRadius:10, display:"flex", justifyContent:"space-between" }}>
            <span style={{ fontSize:14, color:"rgba(255,255,255,0.5)" }}>Heute kontrolliert</span>
            <span style={{ fontSize:16, fontWeight:700, color:"#fff" }}>{todayInsp.length} Fahrzeuge</span>
          </div>
        </div>
      </div>

      {/* ГРАФИК 30 ДНЕЙ + AKTIVITÄT */}
      <div className="g2" style={{ marginBottom:16 }}>
        <div className="panel">
          <div className="panel-hd">
            <div className="panel-title" style={{ fontSize:15 }}>Aufträge letzte 30 Tage</div>
            <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)" }}>
              Ø {(jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10))>=thirtyAgo; }).length/30).toFixed(1)}/Tag
            </div>
          </div>
          <div className="chart-wrap" style={{ height:200 }}>
            <canvas ref={barRef}></canvas>
          </div>
        </div>

        <div className="panel">
          <div className="panel-hd"><div className="panel-title" style={{ fontSize:15 }}>Aktivität heute</div></div>
          {activity.length === 0
            ? <div className="empty" style={{ padding:"20px 0" }}>Noch keine Aktivität heute</div>
            : <div style={{ maxHeight:248, overflowY:"auto" }}>
                {activity.map(function(ev, i){
                  return (
                    <div key={i} style={{ display:"flex", alignItems:"flex-start", gap:12, padding:"10px 0", borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
                      <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", minWidth:36, marginTop:3, fontFamily:"monospace" }}>{ev.time}</div>
                      <div style={{ fontSize:18, marginTop:1 }}>{ev.icon}</div>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:14, fontWeight:600, color:"#fff" }}>{ev.text}</div>
                        <div style={{ fontSize:12, color:ev.color, marginTop:2 }}>{ev.sub}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
          }
        </div>
      </div>

      {/* TÜV ALARM + TOP PROBLEMFAHRZEUGE */}
      <div className="g2">
        <div className="panel">
          <div className="panel-hd"><div className="panel-title" style={{ fontSize:15 }}>Dokumente-Alarm</div></div>
          {tuevAlarm.length === 0
            ? <div className="empty" style={{ padding:"20px 0", color:"#22c55e" }}>Alle Dokumente in Ordnung</div>
            : <div style={{ maxHeight:280, overflowY:"auto" }}>
                {tuevAlarm.map(function(v){
                  var fields = [
                    {label:"TÜV", date:v.tuev},
                    {label:"UVV", date:v.uvv||v.uvv_datum},
                    {label:"Versicherung", date:v.insurance},
                    {label:"Wartung", date:v.next_service}
                  ].filter(function(f){ return f.date && dateDiff(f.date)!==null && dateDiff(f.date)<30; });
                  return (
                    <div key={v.id||v.nummer} style={{ display:"flex", alignItems:"center", gap:12, padding:"11px 0", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:16, fontWeight:700 }}>{v.plate||v.nummer||"—"}</div>
                        <div style={{ fontSize:12, color:"rgba(255,255,255,0.45)", marginTop:2 }}>{v.brand||v.hersteller||""} {v.model||""}</div>
                      </div>
                      <div>
                        {fields.map(function(f){
                          var d = dateDiff(f.date);
                          return (
                            <div key={f.label} style={{ fontSize:13, fontWeight:700, color: d<0?"#ef4444":d<10?"#ef4444":"#ffa500", textAlign:"right" }}>
                              {f.label}: {d<0?"ABGELAUFEN":d+" Tage"}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
          }
        </div>

        <div className="panel">
          <div className="panel-hd"><div className="panel-title" style={{ fontSize:15 }}>Top Problemfahrzeuge (30 Tage)</div></div>
          {topArr.length === 0
            ? <div className="empty" style={{ padding:"20px 0" }}>Keine Daten</div>
            : <div style={{ maxHeight:280, overflowY:"auto" }}>
                {topArr.map(function(plate, i){
                  var cnt = topProblems[plate];
                  return (
                    <div key={plate} style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 0", borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
                      <div style={{ width:30, height:30, borderRadius:"50%", background: i===0?"rgba(239,68,68,0.15)":"rgba(255,165,0,0.1)", color: i===0?"#ef4444":"#ffa500", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:14, flexShrink:0 }}>{i+1}</div>
                      <div style={{ flex:1, fontSize:17, fontWeight:700, fontFamily:"monospace", letterSpacing:1 }}>{plate}</div>
                      <div style={{ fontSize:15, fontWeight:800, color: i===0?"#ef4444":"#ffa500" }}>{cnt}x</div>
                      <div style={{ width:80, height:6, borderRadius:3, background:"rgba(255,255,255,0.08)", overflow:"hidden" }}>
                        <div style={{ height:"100%", background: i===0?"#ef4444":"#ffa500", width:(cnt/topProblems[topArr[0]]*100)+"%", borderRadius:3 }}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
          }
        </div>
      </div>

      {/* ТРЕНД 12 МЕСЯЦЕВ */}
      <div className="panel" style={{ marginTop:16, marginBottom:16 }}>
        <div className="panel-hd">
          <div className="panel-title" style={{ fontSize:15 }}>Trend — letzte 12 Monate</div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)" }}>
            Aufträge (orange) · Kosten € (blau)
          </div>
        </div>
        <div className="chart-wrap" style={{ height:220 }}>
          <canvas ref={lineRef}></canvas>
        </div>
      </div>

      {/* СРАВНЕНИЕ ФИЛИАЛОВ */}
      <div className="panel" style={{ marginBottom:16 }}>
        <div className="panel-hd">
          <div className="panel-title" style={{ fontSize:15 }}>Niederlassungen — Vergleich (laufender Monat)</div>
        </div>
        {(function(){
          var monthStart = (function(){ var d=new Date(); d.setDate(1); return d.toLocaleDateString("sv-SE"); })();
          var niedMap = {};
          jobs.filter(function(j){
            return (j.date||(j.created_at||"").slice(0,10)) >= monthStart;
          }).forEach(function(j){
            var n = j.workshop_niederlassung_id || "unbekannt";
            if (!niedMap[n]) niedMap[n] = { jobs:0, cost:0, min:0 };
            niedMap[n].jobs++;
            niedMap[n].cost += Number(j.cost)||0;
            niedMap[n].min  += parseInt(j.work_min||0)||0;
          });
          var nieds = Object.keys(niedMap).sort();
          if (!nieds.length) return React.createElement("div", { className:"empty" }, "Keine Daten für diesen Monat");
          return React.createElement("table", { className:"tbl" },
            React.createElement("thead", null,
              React.createElement("tr", null,
                React.createElement("th", null, "Niederlassung"),
                React.createElement("th", null, "Aufträge"),
                React.createElement("th", null, "Kosten"),
                React.createElement("th", null, "Ø Zeit/Auftrag"),
                React.createElement("th", null, "Anteil")
              )
            ),
            React.createElement("tbody", null,
              nieds.map(function(n){
                var d = niedMap[n];
                var totalJobsAll = nieds.reduce(function(s,k){ return s+niedMap[k].jobs; }, 0);
                var pct = totalJobsAll ? Math.round(d.jobs/totalJobsAll*100) : 0;
                var avgMin = d.jobs ? Math.round(d.min/d.jobs) : 0;
                return React.createElement("tr", { key:n },
                  React.createElement("td", null, React.createElement("strong", null, n)),
                  React.createElement("td", null, d.jobs),
                  React.createElement("td", { style:{color:"#ffa500",fontWeight:700} }, d.cost.toFixed(0)+" €"),
                  React.createElement("td", { style:{fontSize:12,color:"rgba(255,255,255,0.6)"} }, fmtMin(avgMin)),
                  React.createElement("td", null,
                    React.createElement("div", { style:{display:"flex",alignItems:"center",gap:8} },
                      React.createElement("div", { style:{flex:1,height:6,borderRadius:3,background:"rgba(255,255,255,0.08)",overflow:"hidden"} },
                        React.createElement("div", { style:{height:"100%",background:"#ffa500",width:pct+"%",borderRadius:3} })
                      ),
                      React.createElement("span", { style:{fontSize:11,color:"rgba(255,255,255,0.5)",minWidth:28} }, pct+"%")
                    )
                  )
                );
              })
            )
          );
        })()}
      </div>

    </div>
  );
}

// === TRANSLATE ===
function translateToDE(text) {
  if (!text || !text.trim()) return Promise.resolve(text);
  return fetch("https://vtswzvrflqoueowylidy.supabase.co/functions/v1/translate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + SB_KEY
    },
    body: JSON.stringify({ text: text, target_lang: "DE" })
  })
    .then(function(r){ return r.json(); })
    .then(function(d){ return (d && d.translated) ? d.translated : text; })
    .catch(function(){ return text; });
}

// === MECHANIKER ===
function Mechaniker({ jobs, alerts, onRefresh, loading }) {
  var _sd = useState(todayIso()); var date = _sd[0]; var setDate = _sd[1];
  var _se = useState(null); var expanded = _se[0]; var setExpanded = _se[1];
  var _st = useState("mechaniker"); var tab = _st[0]; var setTab = _st[1];

  var mechanics = getMechanicsFromJobs(jobs);

  function mechJobs(mechId) {
    return jobs.filter(function(j){
      var d = j.date || (j.created_at||"").slice(0,10);
      return j.mechanic === mechId && (!date || d === date);
    });
  }

  function exportMech(mech) {
    var mj = mechJobs(mech.id);
    exportJobs(mj, "Bericht — " + mech.name, fmtDate(date));
  }

  function exportMechXlsx(mech) {
    var mj = mechJobs(mech.id);
    exportJobsXlsx(mj, "Bericht — " + mech.name, date ? fmtDate(date) : "Alle Tage");
  }

  // SLA расчёты
  var slaData = (function(){
    var doneJobs = jobs.filter(function(j){ return j.status === "done" && j.finished_at && j.created_at; });

    // Время от создания job → done (в минутах)
    var closeTimes = doneJobs.map(function(j){
      return Math.round((new Date(j.finished_at) - new Date(j.created_at)) / 60000);
    }).filter(function(m){ return m > 0 && m < 60*24*30; }); // max 30 дней

    var avgClose = closeTimes.length ? Math.round(closeTimes.reduce(function(s,m){ return s+m; },0) / closeTimes.length) : null;

    // Топ медленных закрытий
    var slowJobs = doneJobs.map(function(j){
      var min = Math.round((new Date(j.finished_at) - new Date(j.created_at)) / 60000);
      return Object.assign({}, j, { closeMin: min });
    }).filter(function(j){ return j.closeMin > 0; })
      .sort(function(a,b){ return b.closeMin - a.closeMin; })
      .slice(0, 10);

    // Время реакции: alert → job (если job.alert_id есть)
    var alertsMap = {};
    (alerts||[]).forEach(function(a){ alertsMap[a.id] = a; });
    var reactionTimes = doneJobs.filter(function(j){ return j.alert_id && alertsMap[j.alert_id]; })
      .map(function(j){
        var a = alertsMap[j.alert_id];
        return Math.round((new Date(j.created_at) - new Date(a.created_at)) / 60000);
      }).filter(function(m){ return m >= 0 && m < 60*24*7; });
    var avgReaction = reactionTimes.length ? Math.round(reactionTimes.reduce(function(s,m){ return s+m; },0) / reactionTimes.length) : null;

    // По механикам
    var byMech = {};
    doneJobs.forEach(function(j){
      var m = j.mechanic || "unbekannt";
      if (!byMech[m]) byMech[m] = { times:[], jobs:0 };
      var min = Math.round((new Date(j.finished_at) - new Date(j.created_at)) / 60000);
      if (min > 0) byMech[m].times.push(min);
      byMech[m].jobs++;
    });

    return { avgClose:avgClose, avgReaction:avgReaction, slowJobs:slowJobs, byMech:byMech, total:doneJobs.length };
  })();

  return (
    <div>
      {/* ТАБ ПЕРЕКЛЮЧАТЕЛЬ */}
      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
        <button className={"btn-small "+(tab==="mechaniker"?"btn-primary":"btn-outline")} onClick={function(){ setTab("mechaniker"); }}>🔧 Mechaniker</button>
        <button className={"btn-small "+(tab==="sla"?"btn-primary":"btn-outline")} onClick={function(){ setTab("sla"); }}>⏱ SLA</button>
      </div>

      {/* SLA ТАБ */}
      {tab === "sla" && (
        <div>
          <div className="kpi-grid" style={{ marginBottom:20 }}>
            <div className="kpi-card orange">
              <div className="kpi-icon" style={{ fontSize:18 }}>⏱</div>
              <div className="kpi-val">{slaData.avgClose !== null ? fmtMin(slaData.avgClose) : "—"}</div>
              <div className="kpi-label">Ø Bearbeitungszeit</div>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", marginTop:4 }}>Auftrag erstellt → Fertig</div>
            </div>
            <div className="kpi-card blue">
              <div className="kpi-icon" style={{ fontSize:18 }}>🚨</div>
              <div className="kpi-val">{slaData.avgReaction !== null ? fmtMin(slaData.avgReaction) : "—"}</div>
              <div className="kpi-label">Ø Reaktionszeit</div>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", marginTop:4 }}>Alert eingegangen → Auftrag</div>
            </div>
            <div className="kpi-card green">
              <div className="kpi-icon" style={{ fontSize:18 }}>✓</div>
              <div className="kpi-val">{slaData.total}</div>
              <div className="kpi-label">Abgeschlossene Aufträge</div>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", marginTop:4 }}>Basis für SLA-Analyse</div>
            </div>
          </div>

          {/* По механикам */}
          <div className="panel" style={{ marginBottom:16 }}>
            <div className="panel-hd"><div className="panel-title">SLA je Mechaniker</div></div>
            {Object.keys(slaData.byMech).length === 0
              ? <div className="empty">Keine abgeschlossenen Aufträge</div>
              : Object.keys(slaData.byMech).sort(function(a,b){
                  var at = slaData.byMech[a].times; var bt = slaData.byMech[b].times;
                  var aa = at.length ? at.reduce(function(s,m){ return s+m; },0)/at.length : 0;
                  var ba = bt.length ? bt.reduce(function(s,m){ return s+m; },0)/bt.length : 0;
                  return aa - ba;
                }).map(function(id){
                  var m = slaData.byMech[id];
                  var avg = m.times.length ? Math.round(m.times.reduce(function(s,t){ return s+t; },0)/m.times.length) : null;
                  var maxT = slaData.avgClose || 1;
                  var pct = avg ? Math.min(100, Math.round(avg/maxT*100)) : 0;
                  var color = avg && avg < 60 ? "#22c55e" : avg && avg < 240 ? "#ffa500" : "#ef4444";
                  return (
                    <div key={id} style={{ padding:"14px 0", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8 }}>
                        <div style={{ width:36, height:36, borderRadius:"50%", background:"rgba(255,165,0,0.12)", border:"1px solid rgba(255,165,0,0.25)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, fontSize:13, color:"#ffa500", flexShrink:0 }}>
                          {id.split(" ").map(function(w){ return w[0]||""; }).join("").slice(0,2).toUpperCase()}
                        </div>
                        <div style={{ flex:1, fontWeight:700 }}>{id}</div>
                        <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)" }}>{m.jobs} Aufträge</div>
                        <div style={{ fontSize:16, fontWeight:900, color:color, minWidth:70, textAlign:"right" }}>{avg ? fmtMin(avg) : "—"}</div>
                      </div>
                      <div style={{ height:5, borderRadius:3, background:"rgba(255,255,255,0.07)", overflow:"hidden" }}>
                        <div style={{ height:"100%", borderRadius:3, background:color, width:pct+"%", transition:"width 0.5s" }}></div>
                      </div>
                    </div>
                  );
                })
            }
          </div>

          {/* Топ медленных */}
          <div className="panel">
            <div className="panel-hd"><div className="panel-title">Langsamste Abschlüsse (Top 10)</div></div>
            {slaData.slowJobs.length === 0
              ? <div className="empty">Keine Daten</div>
              : <table className="tbl">
                  <thead><tr><th>Fahrzeug</th><th>Typ</th><th>Mechaniker</th><th>Datum</th><th>Bearbeitungszeit</th></tr></thead>
                  <tbody>
                    {slaData.slowJobs.map(function(j){
                      var color = j.closeMin < 60 ? "#22c55e" : j.closeMin < 240 ? "#ffa500" : "#ef4444";
                      return (
                        <tr key={j.id}>
                          <td><strong>{j.plate||"—"}</strong></td>
                          <td style={{ fontSize:12, color:"rgba(255,255,255,0.6)" }}>{WORK_TYPES[j.work_type]||j.work_type||"—"}</td>
                          <td style={{ fontSize:12 }}>{j.mechanic_name||j.mechanic||"—"}</td>
                          <td style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>{fmtDate(j.date)||"—"}</td>
                          <td><span style={{ fontWeight:800, color:color }}>{fmtMin(j.closeMin)}</span></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
            }
          </div>
        </div>
      )}

      {/* MECHANIKER ТАБ */}
      {tab === "mechaniker" && (
      <div className="panel">
        <div className="panel-hd">
          <div className="panel-title-lg">Mechaniker</div>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <input type="date" className="inp" value={date} onChange={function(e){ setDate(e.target.value); }} />

              <div style={{

                    {mech.name.split(" ").map(function(w){ return w[0]||""; }).join("").slice(0,2).toUpperCase()}
                  </div>
                  <div>
                    <div style={{ fontWeight:600, fontSize:17, color:"#fff" }}>{mech.name}</div>
                    <div style={{ fontSize:13, marginTop:3 }}>
                      {inProgress > 0 && <span style={{ color:"#22c55e", fontWeight:600 }}>● In Arbeit</span>}
                      {inProgress === 0 && paused > 0 && <span style={{ color:"#ffa500", fontWeight:600 }}>● Pause</span>}
                      {inProgress === 0 && paused === 0 && <span style={{ color:"rgba(255,255,255,0.4)" }}>○ Verfügbar</span>}
                    </div>
                  </div>
                </div>
                {/* AUFTRÄGE */}
                <div style={{ borderLeft:"1px solid rgba(255,255,255,0.07)", padding:"0 24px", textAlign:"center" }}>
                  <div style={{ fontSize:28, fontWeight:700, color:"#ffa500", lineHeight:1 }}>{mj.length}</div>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:0.5, marginTop:4 }}>Aufträge</div>
                </div>
                {/* FERTIG */}
                <div style={{ borderLeft:"1px solid rgba(255,255,255,0.07)", padding:"0 24px", textAlign:"center" }}>
                  <div style={{ fontSize:28, fontWeight:700, color:"#22c55e", lineHeight:1 }}>{done}</div>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:0.5, marginTop:4 }}>Fertig</div>
                </div>
                {/* ARBEITSZEIT */}
                <div style={{ borderLeft:"1px solid rgba(255,255,255,0.07)", padding:"0 24px", textAlign:"center" }}>
                  <div style={{ fontSize:22, fontWeight:700, color:"#fff", lineHeight:1 }}>{fmtMin(totalMin)}</div>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:0.5, marginTop:4 }}>Arbeitszeit</div>
                </div>
                {/* FAHRZEIT */}
                {totalTravelMin > 0 && (
                  <div style={{ borderLeft:"1px solid rgba(255,255,255,0.07)", padding:"0 24px", textAlign:"center" }}>
                    <div style={{ fontSize:22, fontWeight:700, color:"rgba(255,165,0,0.8)", lineHeight:1 }}>{fmtMin(totalTravelMin)}</div>
                    <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:0.5, marginTop:4 }}>Fahrzeit</div>
                  </div>
                )}
                {/* KOSTEN */}
                <div style={{ borderLeft:"1px solid rgba(255,255,255,0.07)", padding:"0 24px", textAlign:"center" }}>
                  <div style={{ fontSize:22, fontWeight:700, color:"#ffa500", lineHeight:1 }}>{totalCost.toFixed(0)} €</div>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:0.5, marginTop:4 }}>Kosten</div>
                </div>
                {/* КНОПКИ */}
                <div style={{ borderLeft:"1px solid rgba(255,255,255,0.07)", padding:"0 0 0 20px", display:"flex", gap:8, justifyContent:"flex-end" }}>
                  <button className="btn-outline btn-small no-print" onClick={function(){ exportMech(mech); }} title="PDF / Drucken">📄 PDF</button>
                  <button className="btn-outline btn-small no-print" onClick={function(){ exportMechXlsx(mech); }} title="Excel-Datei"
                    style={{ borderColor:"rgba(34,197,94,0.4)", color:"#22c55e" }}>📊 Excel</button>
                  <button className="btn-outline btn-small" onClick={function(){ setExpanded(isExp ? null : mech.id); }}>
                    {isExp ? "▲" : "▼"}
                  </button>
                </div>
              </div>

              {isExp && (
                <div style={{ marginTop:14 }}>
                  {mj.length === 0
                    ? <div className="empty" style={{ padding:"16px 0" }}>Keine Aufträge {date ? "am " + fmtDate(date) : ""}</div>
                    : <table className="tbl">
                        <thead>
                          <tr>
                            <th>Fahrzeug</th><th>Typ</th><th>Standort</th>
                            <th>Beschreibung</th><th>Arbeit</th><th>Fahrt</th><th>Pause</th><th>Kosten</th><th>Status</th><th></th>
                          </tr>
                        </thead>
                        <tbody>
                          {mj.map(function(j){
                            var jPhotos = [];
                            try { jPhotos = Array.isArray(j.photo_urls) ? j.photo_urls : (typeof j.photo_urls==="string" ? JSON.parse(j.photo_urls||"[]") : []); } catch(e){}
                            var jPauses = parsePauseLog(j);
                            var jPauseMin = totalPauseMin(j);
                            var canExpand = jPhotos.length > 0 || jPauses.length > 0;
                            var isExpJ = expanded === ("m_"+j.id);
                            return [
                              <tr key={j.id} style={{ cursor: canExpand?"pointer":"default" }} onClick={function(){ if(canExpand) setExpanded(isExpJ?null:("m_"+j.id)); }}>
                                <td><strong>{j.plate||"—"}</strong></td>
                                <td>{WORK_TYPES[j.work_type]||j.work_type||"—"}</td>
                                <td style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>{j.location||"—"}</td>
                                <td style={{ fontSize:12, maxWidth:200, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{j.description||"—"}</td>
                                <td>{fmtMin(j.work_min||0)}</td>
                                <td style={{ color: (j.travel_to_min||0)+(j.travel_back_min||0) > 0 ? "rgba(255,165,0,0.8)" : "rgba(255,255,255,0.3)" }}>
                                  {(j.travel_to_min||0)+(j.travel_back_min||0) > 0
                                    ? fmtMin((j.travel_to_min||0)+(j.travel_back_min||0))
                                    : "—"}
                                </td>
                                <td style={{ color: jPauseMin > 0 ? "rgba(255,165,0,0.8)" : "rgba(255,255,255,0.3)" }}>
                                  {jPauseMin > 0 ? fmtMin(jPauseMin) : (jPauses.length > 0 ? "läuft" : "—")}
                                </td>
                                <td>{j.cost ? Number(j.cost).toFixed(2)+" €" : "—"}</td>
                                <td>{statusBadge(j.status)}</td>
                                <td style={{ fontSize:11, color:"rgba(255,255,255,0.35)" }}>{canExpand?(isExpJ?"▲":((jPhotos.length?"📷"+jPhotos.length:"")+(jPauses.length?" ⏸"+jPauses.length:""))):""}</td>
                              </tr>,
                              isExpJ && canExpand && (
                                <tr key={j.id+"_ph"}>
                                  <td colSpan={10} style={{ padding:"12px 14px", background:"rgba(0,0,0,0.2)" }}>
                                    {jPauses.length > 0 && (
                                      <div style={{ marginBottom: jPhotos.length ? 12 : 0 }}>
                                        <div style={{ fontSize:11, color:"rgba(255,165,0,0.85)", textTransform:"uppercase", letterSpacing:0.5, marginBottom:6, fontWeight:700 }}>
                                          Pausen{jPauseMin > 0 ? " — gesamt " + fmtMin(jPauseMin) : ""}
                                        </div>
                                        {jPauses.map(function(p,i){
                                          var t = p.start ? new Date(p.start).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}) : "";
                                          return (
                                            <div key={i} style={{ fontSize:13, marginBottom: i < jPauses.length-1 ? 5 : 0, lineHeight:1.4 }}>
                                              <span style={{ color:"rgba(255,165,0,0.85)", fontWeight:700 }}>{t}</span>
                                              {p.minutes
                                                ? <span style={{ color:"rgba(255,255,255,0.45)" }}> · {fmtMin(p.minutes)}</span>
                                                : <span style={{ color:"#ffa500" }}> · läuft</span>}
                                              <span style={{ color:"rgba(255,255,255,0.8)" }}> — {p.reason}</span>
                                            </div>
                                          );
                                        })}
                                      </div>
                                    )}
                                    {jPhotos.length > 0 && (
                                      <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                                        {jPhotos.map(function(u,i){
                                          return <a key={i} href={u} target="_blank" rel="noreferrer"><img src={u} alt="" style={{ width:80, height:80, objectFit:"cover", borderRadius:8, border:"1px solid rgba(255,255,255,0.15)" }} /></a>;
                                        })}
                                      </div>
                                    )}
                                  </td>
                                </tr>
                              )
                            ];
                          })}
                        </tbody>
                      </table>
                  }
                </div>
              )}
            </div>
          );
        })}
      </div>
      )}
    </div>
  );
}

// === FAHRZEUGAKTE ===
function Fahrzeugakte({ vehicle, jobs, invoices, inspections, onClose }) {
  var _stab = useState("auftraege"); var tab = _stab[0]; var setTab = _stab[1];

  var plate = vehicle.plate || vehicle.nummer || vehicle.id || "";
  var brand = ((vehicle.brand||vehicle.hersteller||"") + " " + (vehicle.model||"")).trim();

  // Все данные по этой машине
  var vJobs = (jobs||[]).filter(function(j){ return (j.plate||"") === plate; })
    .sort(function(a,b){ return (b.date||b.created_at||"").localeCompare(a.date||a.created_at||""); });
  var vInvoices = (invoices||[]).filter(function(i){ return (i.vehicle_id||"") === plate; })
    .sort(function(a,b){ return (b.date||b.created_at||"").localeCompare(a.date||a.created_at||""); });
  var vDU = (inspections||[]).filter(function(i){ return i.type === "du_auflieger" && (i.plate||"") === plate; })
    .sort(function(a,b){ return (b.date||"").localeCompare(a.date||""); });

  // Итоги
  var totalJobCost = vJobs.reduce(function(s,j){ return s+(Number(j.cost)||0); }, 0);
  var totalInvCost = vInvoices.reduce(function(s,i){ return s+(Number(i.amount)||0); }, 0);
  var totalMin = vJobs.reduce(function(s,j){ return s+(parseInt(j.work_min||0)||0); }, 0);

  // KPI расчёты
  var vKpi = (function(){
    // Verfügbarkeit%: дней с хотя бы 1 job / дней с момента первого job
    var doneJobs = vJobs.filter(function(j){ return j.status === "done"; });
    var uniqueDaysDown = {};
    doneJobs.forEach(function(j){ if (j.date) uniqueDaysDown[j.date] = 1; });
    var firstDate = vJobs.length ? (vJobs[vJobs.length-1].date || (vJobs[vJobs.length-1].created_at||"").slice(0,10)) : null;
    var totalDays = firstDate ? Math.max(1, Math.round((new Date()-new Date(firstDate))/(1000*60*60*24))) : null;
    var downDays = Object.keys(uniqueDaysDown).length;
    var verfuegbarkeit = totalDays ? Math.max(0, Math.round((1 - downDays/totalDays)*100)) : null;

    // €/km: только если есть jobs с km_stand
    var kmJobs = vJobs.filter(function(j){ return j.km_stand && Number(j.km_stand) > 0; })
      .sort(function(a,b){ return Number(a.km_stand)-Number(b.km_stand); });
    var euroPerKm = null;
    if (kmJobs.length >= 2) {
      var kmRange = Number(kmJobs[kmJobs.length-1].km_stand) - Number(kmJobs[0].km_stand);
      if (kmRange > 0) euroPerKm = (totalJobCost + totalInvCost) / kmRange;
    }

    // MTBF: среднее время между поломками (breakdowns) в днях
    var breakdowns = vJobs.filter(function(j){ return j.work_type === "breakdown" || j.work_type === "tire" || j.work_type === "emergency"; })
      .sort(function(a,b){ return (a.date||"").localeCompare(b.date||""); });
    var mtbf = null;
    if (breakdowns.length >= 2) {
      var gaps = [];
      for (var bi=1; bi<breakdowns.length; bi++) {
        var d1 = new Date(breakdowns[bi-1].date||breakdowns[bi-1].created_at);
        var d2 = new Date(breakdowns[bi].date||breakdowns[bi].created_at);
        var gapDays = Math.round((d2-d1)/(1000*60*60*24));
        if (gapDays > 0) gaps.push(gapDays);
      }
      if (gaps.length) mtbf = Math.round(gaps.reduce(function(s,g){ return s+g; },0)/gaps.length);
    }

    return { verfuegbarkeit:verfuegbarkeit, euroPerKm:euroPerKm, mtbf:mtbf, totalDays:totalDays, downDays:downDays };
  })();

  // Lebenslauf chart ref
  var lebenslaufChartRef = useRef(null);
  var lebenslaufChartInst = useRef(null);

  useEffect(function(){
    if (tab !== "kosten") return;
    if (!lebenslaufChartRef.current) return;
    if (lebenslaufChartInst.current) lebenslaufChartInst.current.destroy();
    // Группируем по месяцам
    var byMonth = {};
    vJobs.forEach(function(j){
      var d = j.date||(j.created_at||"").slice(0,7);
      var m = d.slice(0,7);
      if (!m) return;
      if (!byMonth[m]) byMonth[m] = 0;
      byMonth[m] += (Number(j.cost)||0) + (Number(j.labor_cost)||0) + (Number(j.parts_cost)||0);
    });
    var months = Object.keys(byMonth).sort();
    if (months.length < 2) return;
    lebenslaufChartInst.current = new Chart(lebenslaufChartRef.current, {
      type: "line",
      data: {
        labels: months.map(function(m){ var d=new Date(m+"-01"); return d.toLocaleDateString("de-DE",{month:"short",year:"2-digit"}); }),
        datasets: [{
          data: months.map(function(m){ return Math.round(byMonth[m]); }),
          borderColor: "#ffa500", backgroundColor: "rgba(255,165,0,0.08)",
          tension: 0.4, pointRadius: 4, pointBackgroundColor: "#ffa500",
          fill: true
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend:{display:false}, tooltip:{ callbacks:{ label:function(ctx){ return ctx.parsed.y.toLocaleString("de-DE")+" €"; } } } },
        scales: {
          x:{ ticks:{color:"rgba(255,255,255,0.4)",font:{size:10}}, grid:{display:false} },
          y:{ ticks:{color:"rgba(255,255,255,0.4)",font:{size:10},callback:function(v){ return v>=1000?(v/1000).toFixed(0)+"k":v; }}, grid:{color:"rgba(255,255,255,0.05)"} }
        }
      }
    });
    return function(){ if (lebenslaufChartInst.current) lebenslaufChartInst.current.destroy(); };
  }, [tab, vJobs.length]);

  function exportLebenslauf() {
    var jobRows = vJobs.map(function(j){
      return "<tr><td>"+(j.date||"—")+"</td><td>"+(WORK_TYPES[j.work_type]||j.work_type||"—")+"</td>"+
        "<td>"+(j.description||"—").slice(0,80)+"</td><td>"+(j.mechanic_name||j.mechanic||"—")+"</td>"+
        "<td style='text-align:right'>"+(j.cost?Number(j.cost).toFixed(2)+" €":"—")+"</td>"+
        "<td>"+fmtMin(j.work_min||0)+"</td></tr>";
    }).join("");
    var invRows = vInvoices.map(function(i){
      return "<tr><td>"+(i.date||"—")+"</td><td>"+(i.supplier||"—")+"</td>"+
        "<td>"+(i.invoice_nr||"—")+"</td><td>"+(i.items||"—").slice(0,80)+"</td>"+
        "<td style='text-align:right'>"+(i.amount?Number(i.amount).toFixed(2)+" €":"—")+"</td></tr>";
    }).join("");
    var duRows = vDU.map(function(d){
      var resColor = d.result==="passed"?"#22c55e":"#ef4444";
      var resLabel = d.result==="passed"?"Bestanden":d.result==="passed_with_remarks"?"Mit Mängeln":"—";
      return "<tr><td>"+(d.date||"—")+"</td><td>"+(d.mechanic_name||"—")+"</td>"+
        "<td>"+(d.km_stand||"—")+"</td>"+
        "<td style='color:"+resColor+";font-weight:700'>"+resLabel+"</td>"+
        "<td>"+(d.bemerkungen||"—")+"</td></tr>";
    }).join("");

    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'>"+
      "<title>Fahrzeug-Lebenslauf "+plate+"</title>"+baseReportStyle()+
      "<style>.summary-box{display:inline-block;padding:12px 20px;border-radius:8px;background:#f0f4ff;margin-right:12px;margin-bottom:12px;text-align:center}.summary-box .val{font-size:22px;font-weight:800;color:#0a1730}.summary-box .lbl{font-size:11px;color:#666;text-transform:uppercase}</style>"+
      "</head><body>"+
      "<h1>Fahrzeug-Lebenslauf</h1>"+
      "<h2 style='color:#555;font-weight:normal;margin-bottom:4px'>"+plate+(brand?" · "+brand:"")+"</h2>"+
      "<div style='font-size:12px;color:#999;margin-bottom:20px'>Exportiert: "+todayIso()+" · WerkFlow LTG</div>"+
      "<div style='margin-bottom:20px'>"+
        "<div class='summary-box'><div class='val'>"+vJobs.length+"</div><div class='lbl'>Aufträge</div></div>"+
        "<div class='summary-box'><div class='val'>"+totalJobCost.toFixed(0)+" €</div><div class='lbl'>Arbeitskosten</div></div>"+
        "<div class='summary-box'><div class='val'>"+totalInvCost.toFixed(0)+" €</div><div class='lbl'>Teilekosten</div></div>"+
        "<div class='summary-box'><div class='val'>"+(totalJobCost+totalInvCost).toFixed(0)+" €</div><div class='lbl'>Gesamt</div></div>"+
        "<div class='summary-box'><div class='val'>"+fmtMin(totalMin)+"</div><div class='lbl'>Arbeitszeit</div></div>"+
        "<div class='summary-box'><div class='val'>"+vDU.length+"</div><div class='lbl'>DU-Prüfungen</div></div>"+
      "</div>"+
      "<h2>Stammdaten</h2>"+
      "<table><tbody>"+
        "<tr><td style='font-weight:700;width:160px'>Kennzeichen</td><td>"+plate+"</td></tr>"+
        "<tr><td style='font-weight:700'>Marke/Modell</td><td>"+(brand||"—")+"</td></tr>"+
        "<tr><td style='font-weight:700'>Typ</td><td>"+(VEH_TYPES[vehicle.type]||vehicle.type||"—")+"</td></tr>"+
        (vehicle.fahrgestell?"<tr><td style='font-weight:700'>Fahrgestell-Nr.</td><td>"+vehicle.fahrgestell+"</td></tr>":"")+
        (vehicle.baujahr?"<tr><td style='font-weight:700'>Baujahr</td><td>"+vehicle.baujahr+"</td></tr>":"")+
        (vehicle.tuev?"<tr><td style='font-weight:700'>TÜV</td><td>"+vehicle.tuev+"</td></tr>":"")+
        (vehicle.insurance?"<tr><td style='font-weight:700'>Versicherung</td><td>"+vehicle.insurance+"</td></tr>":"")+
        (vehicle.uvv?"<tr><td style='font-weight:700'>UVV</td><td>"+vehicle.uvv+"</td></tr>":"")+
        (vehicle.home_niederlassung_id?"<tr><td style='font-weight:700'>Niederlassung</td><td>"+vehicle.home_niederlassung_id+"</td></tr>":"")+
      "</tbody></table>"+
      (vJobs.length>0?"<h2>Aufträge ("+vJobs.length+")</h2><table><thead><tr><th>Datum</th><th>Typ</th><th>Beschreibung</th><th>Mechaniker</th><th style='text-align:right'>Kosten</th><th>Zeit</th></tr></thead><tbody>"+jobRows+"</tbody></table>":"")+
      (vInvoices.length>0?"<h2>Lieferscheine ("+vInvoices.length+")</h2><table><thead><tr><th>Datum</th><th>Lieferant</th><th>LS-Nr.</th><th>Teile</th><th style='text-align:right'>Betrag</th></tr></thead><tbody>"+invRows+"</tbody></table>":"")+
      (vDU.length>0?"<h2>DU-Prüfungen ("+vDU.length+")</h2><table><thead><tr><th>Datum</th><th>Mechaniker</th><th>KM-Stand</th><th>Ergebnis</th><th>Bemerkungen</th></tr></thead><tbody>"+duRows+"</tbody></table>":"")+
      "<button onclick='window.print()' style='background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;margin-top:20px'>🖨 Drucken / PDF</button>"+
      "</body></html>";
    printHtml(html, "Fahrzeug_Lebenslauf_"+plate);
  }

  var TABS_FA = [
    { k:"auftraege",   label:"🔧 Aufträge (" + vJobs.length + ")" },
    { k:"du",          label:"📋 DU (" + vDU.length + ")" },
    { k:"lieferscheine", label:"📄 Lieferscheine (" + vInvoices.length + ")" },
    { k:"kosten",      label:"💶 Kosten" },
    { k:"stammdaten",  label:"📌 Stammdaten" },
  ];

  function DocChipFA({ d }) {
    if (!d) return React.createElement("span", { style:{color:"rgba(255,255,255,0.3)",fontSize:12} }, "—");
    var diff = dateDiff(d);
    var st = docStatus(diff);
    var color = docColor(st);
    return React.createElement("span", { style:{fontSize:12,fontWeight:700,color:color} },
      fmtDate(d) + (diff !== null && diff < 60 ? " (" + (diff < 0 ? Math.abs(diff)+"d !" : diff+"d") + ")" : "")
    );
  }

  return (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, zIndex:1000,
      background:"rgba(5,15,35,0.97)", overflowY:"auto", padding:"0 0 40px" }}>

      {/* Шапка */}
      <div style={{ position:"sticky", top:0, zIndex:10, background:"rgba(5,15,35,0.98)",

      {/* Табы */}

        {TABS_FA.map(function(t) {

        {/* AUFTRÄGE */}
        {tab === "auftraege" && (
