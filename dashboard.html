<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WerkFlow Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#0f1623;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
    #root{min-height:100vh}
    button{font:inherit;cursor:pointer}
    input,select,textarea{font:inherit}
    textarea{resize:none}
    ::placeholder{color:rgba(255,255,255,0.35)}

    /* LAYOUT */
    .dash-layout{display:flex;min-height:100vh}
    .sidebar{width:250px;flex-shrink:0;background:rgba(8,18,40,0.95);border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:30}
    .sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.07)}
    .sidebar-logo-text{font-size:32px;font-weight:900;letter-spacing:-1.5px;line-height:1}
    .sidebar-subtitle{font-size:13px;font-weight:600;color:#ffa500;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
    .sidebar-nav{flex:1;padding:14px 0;overflow-y:auto}
    .nav-section{padding:8px 18px 4px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:2px;text-transform:uppercase;margin-top:8px}
    .nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border:none;background:transparent;color:rgba(255,255,255,0.7);width:100%;text-align:left;font-size:16px;font-weight:500;border-radius:0;cursor:pointer;position:relative;transition:color 0.15s}
    .nav-item:hover{color:#fff;background:rgba(255,255,255,0.04)}
    .nav-item.active{color:#ffa500;background:rgba(255,165,0,0.08)}
    .nav-item.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:#ffa500;border-radius:0 2px 2px 0}
    .nav-badge{margin-left:auto;background:#ef4444;color:#fff;border-radius:99px;font-size:11px;font-weight:800;padding:2px 8px;min-width:22px;text-align:center}
    .nav-badge.orange{background:#ffa500;color:#0a1730}
    .sidebar-footer{padding:16px 18px;border-top:1px solid rgba(255,255,255,0.07)}
    .sidebar-user{display:flex;align-items:center;gap:10px}
    .sidebar-avatar{width:38px;height:38px;border-radius:50%;background:rgba(255,165,0,0.15);border:1px solid rgba(255,165,0,0.35);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#ffa500;flex-shrink:0}
    .sidebar-name{font-size:14px;font-weight:600;color:rgba(255,255,255,0.85);line-height:1.2}
    .sidebar-role{font-size:12px;color:rgba(255,255,255,0.4)}

    .main{margin-left:250px;flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:#0f1623}
    .topbar{height:64px;background:rgba(8,18,40,0.9);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;padding:0 28px;gap:16px;flex-shrink:0;z-index:20;backdrop-filter:blur(10px)}
    .topbar-title{font-size:20px;font-weight:700;color:#fff}
    .topbar-sub{font-size:14px;color:rgba(255,255,255,0.45);margin-left:4px}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:14px}
    .topbar-refresh{padding:9px 20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.8);border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
    .topbar-refresh:hover{border-color:#ffa500;color:#ffa500}
    .page{padding:16px 20px;overflow-y:auto;flex:1}

    /* CARDS & PANELS */
    .glass{background:rgba(15,30,60,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:14px;backdrop-filter:blur(12px)}
    .panel{background:rgba(15,30,60,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:18px 22px;margin-bottom:16px}
    .panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .panel-title{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.8)}
    .panel-title-lg{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.5px}

    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
    .kpi-card{background:rgba(15,30,60,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:20px 22px;position:relative;overflow:hidden}
    .kpi-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px}
    .kpi-card.blue::before{background:#3b82f6}
    .kpi-card.orange::before{background:#ffa500}
    .kpi-card.red::before{background:#ef4444}
    .kpi-card.green::before{background:#22c55e}
    .kpi-card.purple::before{background:#a855f7}
    .kpi-icon{font-size:22px;margin-bottom:10px}
    .kpi-val{font-size:32px;font-weight:800;letter-spacing:-1px;line-height:1}
    .kpi-label{font-size:13px;color:rgba(255,255,255,0.5);margin-top:6px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
    .kpi-sub{font-size:11px;margin-top:4px;font-weight:600}

    /* TABLE */
    .tbl{width:100%;border-collapse:collapse;table-layout:fixed}
    .tbl th{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:rgba(255,255,255,0.4);padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.1);border-right:1px solid rgba(255,255,255,0.06);text-align:left;white-space:nowrap}
    .tbl th:last-child{border-right:none}
    .tbl td{padding:15px 16px;border-bottom:1px solid rgba(255,255,255,0.06);border-right:1px solid rgba(255,255,255,0.04);font-size:15px;vertical-align:middle}
    .tbl td:last-child{border-right:none}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tr:hover td{background:rgba(255,255,255,0.04)}

    /* BADGES */
    .badge{display:inline-block;padding:4px 11px;border-radius:99px;font-size:13px;font-weight:700}
    .badge-red{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
    .badge-orange{background:rgba(255,165,0,0.15);color:#ffa500;border:1px solid rgba(255,165,0,0.3)}
    .badge-green{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
    .badge-blue{background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3)}
    .badge-gray{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.12)}
    .badge-purple{background:rgba(168,85,247,0.15);color:#c084fc;border:1px solid rgba(168,85,247,0.3)}

    /* BUTTONS */
    .btn-primary{background:linear-gradient(180deg,#ffa500,#ff8c00);color:#0a1730;border:none;border-radius:9px;font-weight:700;padding:10px 18px;font-size:15px;cursor:pointer}
    .btn-outline{border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.8);border-radius:9px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer}
    .btn-outline:hover{border-color:#ffa500;color:#ffa500}
    .btn-danger{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);border-radius:9px;padding:9px 14px;font-size:12px;font-weight:700}
    .btn-small{padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer}

    /* INPUTS */
    .inp{background:rgba(9,27,58,0.8);border:1px solid rgba(255,255,255,0.14);border-radius:9px;color:#fff;padding:10px 14px;font-size:15px;outline:none}
    .inp:focus{border-color:#ffa500}
    select.inp{appearance:none}

    /* STATUS DOTS */
    .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
    .dot-green{background:#22c55e}
    .dot-orange{background:#ffa500}
    .dot-red{background:#ef4444}
    .dot-gray{background:rgba(255,255,255,0.3)}

    /* ALERT CARD */
    .alert-card{background:rgba(15,30,60,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;margin-bottom:10px}
    .alert-card.urgent{background:rgba(60,10,20,0.8);border-color:rgba(239,68,68,0.4)}

    /* DOC CHIP */
    .doc-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700}
    .doc-ok{background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.25)}
    .doc-warn{background:rgba(255,165,0,0.12);color:#ffa500;border:1px solid rgba(255,165,0,0.25)}
    .doc-urgent{background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.25)}
    .doc-none{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.1)}

    /* GRID */
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

    /* LOGIN */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f1623;padding:20px}
    .login-box{width:100%;max-width:360px}
    .login-card{background:rgba(15,30,60,0.9);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:32px 28px;box-shadow:0 24px 60px rgba(0,0,0,0.5)}
    .pin-row{display:flex;gap:14px;justify-content:center;margin:24px 0}
    .pin-dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background 0.15s}
    .pin-dot.on{background:#ffa500;box-shadow:0 0 10px rgba(255,165,0,0.5)}
    .pin-dot.err{background:#ef4444}
    .keypad{display:grid;grid-template-columns:repeat(3,68px);gap:12px;justify-content:center}
    .kkey{height:64px;border-radius:50%;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.15);color:#fff;font-size:24px;font-weight:500}
    .kkey:active{background:rgba(255,255,255,0.12)}

    /* MECHANIC CARD */
    .mech-card{background:rgba(15,30,60,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:18px;margin-bottom:12px}
    .mech-stats{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap}
    .mech-stat{text-align:center}
    .mech-stat-val{font-size:22px;font-weight:900;color:#ffa500}
    .mech-stat-lab{font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

    /* SCROLLBAR */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}

    /* EMPTY STATE */
    .empty{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.35);font-size:16px}

    /* EXPANDABLE ROW */
    .expand-row{background:rgba(9,20,48,0.6);border-left:2px solid rgba(255,165,0,0.3);padding:14px 16px;margin-top:2px;border-radius:0 0 10px 10px}

    /* CHART CONTAINER */
    .chart-wrap{position:relative;height:200px}

    /* MODAL */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal-box{background:#0d1f3d;border:1px solid rgba(255,255,255,0.15);border-radius:18px;padding:24px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,0.6)}

    /* PRINT */
    @media print{
      .sidebar,.topbar,.no-print{display:none!important}
      .main{margin-left:0!important}
      .page{padding:0!important}
      body{background:#fff!important;color:#000!important}
      .panel,.kpi-card,.glass,.alert-card,.mech-card{background:#fff!important;border:1px solid #ddd!important;color:#000!important}
      .panel-title,.kpi-label,.kpi-val,.panel-title-lg{color:#000!important}
    }

    @media(max-width:900px){
      .sidebar{transform:translateX(-100%);transition:transform 0.25s}
      .sidebar.open{transform:translateX(0)}
      .main{margin-left:0}
      .kpi-grid{grid-template-columns:1fr 1fr}
      .g4{grid-template-columns:1fr 1fr}
      .g3{grid-template-columns:1fr 1fr}
    }
  </style>

  <meta name="theme-color" content="#7c3aed" />

</head>

function todayIso() { return new Date().toLocaleDateString("sv-SE"); }
function fmtDate(d) { if (!d) return "—"; try { return new Date(d).toLocaleDateString("de-DE"); } catch(e){ return d; } }
function fmtDateTime(d) { if (!d) return "—"; try { return new Date(d).toLocaleString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); } catch(e){ return d; } }
function fmtMin(m) { m=parseInt(m||0)||0; if(!m) return "0 min"; var h=Math.floor(m/60),mm=m%60; return h ? h+"h "+mm+"min" : mm+" min"; }
function dateDiff(d) { if (!d) return null; return Math.round((new Date(d) - new Date()) / 86400000); }

function docStatus(diff) {
  if (diff === null) return "none";
  if (diff < 0) return "expired";
  if (diff < 30) return "urgent";
  if (diff < 60) return "warn";
  return "ok";
}
function docColor(st) {
  if (st === "expired") return "#ef4444";
  if (st === "urgent")  return "#ef4444";
  if (st === "warn")    return "#ffa500";
  if (st === "ok")      return "#22c55e";
  return "rgba(255,255,255,0.3)";
}
function docCls(st) {
  if (st === "expired" || st === "urgent") return "doc-urgent";
  if (st === "warn") return "doc-warn";
  if (st === "ok") return "doc-ok";
  return "doc-none";
}

// === Supabase API ===
function sbGet(table, query) {
  return fetch(SB_URL + "/rest/v1/" + table + (query ? "?" + query : ""), {
    headers:{ "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY }
  }).then(function(r){ return r.ok ? r.json() : []; })
    .then(function(d){ return Array.isArray(d) ? d : []; })
    .catch(function(){ return []; });
}

function sbPatch(table, id, body) {
  return fetch(SB_URL + "/rest/v1/" + table + "?id=eq." + encodeURIComponent(id), {
    method:"PATCH",
    headers:{ "Content-Type":"application/json", "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY, "Prefer":"return=minimal" },
    body:JSON.stringify(body)
  }).then(function(r){ return r.ok; }).catch(function(){ return false; });
}

function sbUpsert(table, body) {
  return fetch(SB_URL + "/rest/v1/" + table, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY, "Prefer":"return=minimal,resolution=merge-duplicates" },
    body:JSON.stringify(body)
  }).then(function(r){ if(!r.ok) return r.text().then(function(t){ throw new Error(t); }); return true; });
}

}

function exportJobs(jobs, title, dateLabel) {
  var total = jobs.length;
  var totalMin = jobs.reduce(function(s,j){ return s+(parseInt(j.work_min||0)||0); }, 0);
  var totalCost = jobs.reduce(function(s,j){ return s+(Number(j.cost)||0); }, 0);
  var rows = jobs.map(function(j){
    return "<tr><td>"+(j.date||"")+"</td><td>"+(j.plate||"—")+"</td><td>"+(j.mechanic||"")+"</td><td>"+(WORK_TYPES[j.work_type]||j.work_type||"")+"</td><td>"+(j.description||"").slice(0,80)+"</td><td>"+fmtMin(j.work_min||0)+"</td><td>"+(j.cost?Number(j.cost).toFixed(2)+" €":"—")+"</td><td>"+statusDE(j.status)+"</td></tr>";
  }).join("");
  var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>"+title+"</title>"+baseReportStyle()+"</head><body>"+
    "<h1>WerkFlow — "+title+"</h1><h2>"+dateLabel+"</h2>"+
    "<div class='sum'><div class='sum-item'><div class='sum-val'>"+total+"</div><div class='sum-lab'>Aufträge</div></div>"+
    "<div class='sum-item'><div class='sum-val'>"+fmtMin(totalMin)+"</div><div class='sum-lab'>Arbeitszeit</div></div>"+
    "<div class='sum-item'><div class='sum-val'>"+totalCost.toFixed(2)+" €</div><div class='sum-lab'>Kosten</div></div></div>"+
    "<table><thead><tr><th>Datum</th><th>Fahrzeug</th><th>Mechaniker</th><th>Typ</th><th>Beschreibung</th><th>Zeit</th><th>Kosten</th><th>Status</th></tr></thead><tbody>"+rows+"</tbody></table>"+
    "<button onclick='window.print()' style='background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer'>🖨 Drucken / PDF</button>"+
    "</body></html>";
  printHtml(html, title);
}

function statusDE(s) {
  if (s === "done") return "✓ Fertig";
  if (s === "inProgress") return "⚙ In Arbeit";
  if (s === "paused") return "⏸ Pause";
  return "○ Neu";
}
function statusBadge(s) {
  if (s === "done")       return <span className="badge badge-green">✓ Fertig</span>;
  if (s === "inProgress") return <span className="badge badge-orange">⚙ In Arbeit</span>;
  if (s === "paused")     return <span className="badge badge-blue">⏸ Pause</span>;
  return <span className="badge badge-gray">○ Neu</span>;
}
function urgBadge(u) {
  if (u === "urgent") return <span className="badge badge-red">🚨 Dringend</span>;
  return <span className="badge badge-orange">⚠️ Normal</span>;
}

function PinLogin({ onLogin }) {
  var _su = useState(null); var selUser = _su[0]; var setSelUser = _su[1];
  var _sp = useState(""); var pin = _sp[0]; var setPin = _sp[1];
  var _se = useState(false); var err = _se[0]; var setErr = _se[1];

  function press(d) {
    if (!selUser || pin.length >= 4) return;
    setErr(false);
    var next = pin + d; setPin(next);
    if (next.length === 4) {
      setTimeout(function(){
        if (next === selUser.pin) onLogin(selUser);
        else { setErr(true); setTimeout(function(){ setPin(""); setErr(false); }, 650); }
      }, 100);

              {USERS.map(function(u){

              <div style={{ flex:1, textAlign:"center", fontWeight:700, fontSize:15 }}>{selUser.name}</div>
            </div>
            <div style={{ fontSize:12, fontWeight:700, color:"rgba(255,255,255,0.5)", textAlign:"center", textTransform:"uppercase", letterSpacing:2, marginBottom:4 }}>PIN eingeben</div>
            <div className="pin-row">
              {[0,1,2,3].map(function(i){ return <div key={i} className={"pin-dot" + (i < pin.length ? " on" : "") + (err ? " err" : "")}></div>; })}
            </div>

// === ÜBERSICHT ===
function Uebersicht({ jobs, alerts, vehicles, forklifts, washOrders, inspections }) {
  var today = todayIso();
  var yesterday = (function(){ var d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();
  var thirtyAgo = new Date(Date.now()-30*86400000).toISOString().slice(0,10);

  var todayJobs = jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10)) === today; });
  var yesterJobs = jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10)) === yesterday; });
  var openAlerts = alerts.filter(function(a){ return a.status !== "done" && a.status !== "rejected"; });
  var urgentAlerts = openAlerts.filter(function(a){ return (a.urgency||"").includes("urgent"); });
  var yesterAlerts = alerts.filter(function(a){ return (a.created_at||"").slice(0,10) === yesterday; });

  var allVeh = vehicles.concat(forklifts||[]);
  var tuevAlarm = allVeh.filter(function(v){
    var fields = [
      {label:"TÜV", date:v.tuev},
      {label:"UVV", date:v.uvv||v.uvv_datum},
      {label:"Versicherung", date:v.insurance},
      {label:"Wartung", date:v.next_service}
    ].filter(function(f){ return f.date; });
    return fields.some(function(f){ var d=dateDiff(f.date); return d!==null && d<30; });
  });

  var todayWash = (washOrders||[]).filter(function(o){ return (o.work_date||"")===today; });
  var yesterWash = (washOrders||[]).filter(function(o){ return (o.work_date||"")===yesterday; });
  var washRev = todayWash.reduce(function(s,o){ return s+(Number(o.price_eur)||0); }, 0);
  var yesterWashRev = yesterWash.reduce(function(s,o){ return s+(Number(o.price_eur)||0); }, 0);

  var todayInsp = (inspections||[]).filter(function(i){ return (i.created_at||"").slice(0,10)===today; });

  // График 30 дней
  var last30 = [];
  for (var i=29; i>=0; i--) {
    var d=new Date(); d.setDate(d.getDate()-i);
    var iso=d.toISOString().slice(0,10);
    var cnt=jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10))===iso; }).length;
    last30.push({ iso:iso, label: i%5===0||i===0 ? d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"}) : "", count:cnt });
  }

  var barRef = useRef(null);
  var chartRef = useRef(null);
  useEffect(function(){
    if (!barRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(barRef.current, {
      type:"bar",
      data:{
        labels: last30.map(function(d){ return d.label; }),
        datasets:[{ data: last30.map(function(d){ return d.count; }),
          backgroundColor: last30.map(function(d){ return d.iso===today?"rgba(255,165,0,0.9)":"rgba(255,165,0,0.45)"; }),
          borderColor:"#ffa500", borderWidth:1, borderRadius:4 }]
      },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{ callbacks:{ title:function(items){ return last30[items[0].dataIndex].iso; } } } },
        scales:{
          x:{ticks:{color:"rgba(255,255,255,0.45)",font:{size:11}},grid:{display:false}},
          y:{ticks:{color:"rgba(255,255,255,0.45)",font:{size:11},stepSize:1},grid:{color:"rgba(255,255,255,0.05)"}}
        }
      }
    });
    return function(){ if (chartRef.current) chartRef.current.destroy(); };
  }, [jobs.length]);

  // Top проблемные машины
  var topProblems = {};
  jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10))>=thirtyAgo; })
    .forEach(function(j){ if (j.plate) topProblems[j.plate]=(topProblems[j.plate]||0)+1; });
  var topArr = Object.keys(topProblems).sort(function(a,b){ return topProblems[b]-topProblems[a]; }).slice(0,5);

  // Aktivität heute
  var activity = [];
  todayJobs.forEach(function(j){
    activity.push({ time:(j.created_at||"").slice(11,16), icon:"🔧",
      text: (WORK_TYPES[j.work_type]||j.work_type||"Auftrag") + " · " + (j.plate||"—") + (j.mechanic?" · "+j.mechanic:""),
      sub: j.status==="done"?"✓ Fertig":j.status==="inProgress"?"⚙ In Arbeit":"Neu",
      color: j.status==="done"?"#22c55e":j.status==="inProgress"?"#ffa500":"rgba(255,255,255,0.5)",
      ts: j.created_at||""
    });
  });
  alerts.filter(function(a){ return (a.created_at||"").slice(0,10)===today; }).forEach(function(a){
    activity.push({ time:(a.created_at||"").slice(11,16), icon:"🚨",
      text:"Meldung · "+(a.plate||"—")+" · "+(a.sender||""),
      sub:(a.urgency||"").includes("urgent")?"Dringend":"Normal",
      color:(a.urgency||"").includes("urgent")?"#ef4444":"#ffa500",
      ts: a.created_at||""
    });
  });
  todayWash.forEach(function(w){
    activity.push({ time:(w.created_at||"").slice(11,16), icon:"🚿",
      text:"Wäsche · "+(w.plate_number||"—")+" · "+(w.wash_type_name||""),
      sub:(w.price_eur||0).toFixed(2)+" €",
      color:"#22c55e", ts: w.created_at||""
    });
  });
  todayInsp.forEach(function(ins){
    activity.push({ time:(ins.created_at||"").slice(11,16), icon:"📋",
      text:"Inspektion · "+(ins.plate||"—")+" · "+(ins.driver||""),
      sub:ins.status==="ok"?"✓ OK":"⚠ Mängel",
      color:ins.status==="ok"?"#22c55e":"#ef4444", ts: ins.created_at||""
    });
  });
  activity.sort(function(a,b){ return b.ts.localeCompare(a.ts); });

  // Mechaniker heute
  var mechStatus = MECHANICS.map(function(m){
    var mj = todayJobs.filter(function(j){ return j.mechanic===m.id; });
    var active = mj.filter(function(j){ return j.status==="inProgress"; }).length;
    var done = mj.filter(function(j){ return j.status==="done"; }).length;
    return { name:m.name, avatar:m.name.split(" ").map(function(w){ return w[0]||""; }).join("").slice(0,2).toUpperCase(),
      total:mj.length, active:active, done:done,
      status: active>0?"inArbeit":mj.length>0?"verfügbar":"verfügbar" };
  });

  function delta(cur, prev, suffix) {
    var diff = cur - prev;
    if (diff === 0) return <span style={{ fontSize:13, color:"rgba(255,255,255,0.35)" }}>= wie gestern</span>;
    var up = diff > 0;
    return <span style={{ fontSize:13, color: up?"#22c55e":"#60a5fa" }}>{up?"▲":"▼"} {Math.abs(diff)}{suffix} vs gestern</span>;
  }

  return (
    <div>
      {/* KPI КАРТОЧКИ */}
      <div className="kpi-grid" style={{ marginBottom:12 }}>
        <div className="kpi-card orange">
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>Aufträge heute</div>
          <div style={{ fontSize:34, fontWeight:700, lineHeight:1, marginBottom:6 }}>{todayJobs.length}</div>
          <div style={{ fontSize:13, color:"#ffa500", marginBottom:4 }}>{todayJobs.filter(function(j){ return j.status==="done"; }).length} erledigt · {todayJobs.filter(function(j){ return j.status==="inProgress"; }).length} in Arbeit</div>
          {delta(todayJobs.length, yesterJobs.length, "")}
        </div>
        <div className="kpi-card red">
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>Offene Meldungen</div>
          <div style={{ fontSize:34, fontWeight:700, lineHeight:1, marginBottom:6, color: openAlerts.length>0?"#ef4444":"#22c55e" }}>{openAlerts.length}</div>
          <div style={{ fontSize:13, color: urgentAlerts.length>0?"#ef4444":"rgba(255,255,255,0.4)", marginBottom:4 }}>{urgentAlerts.length} dringend</div>
          {delta(openAlerts.length, yesterAlerts.filter(function(a){ return a.status!=="done"; }).length, "")}
        </div>
        <div className="kpi-card" style={{ borderLeft:"3px solid #ef4444" }}>
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>Dokumente &lt; 30 Tage</div>
          <div style={{ fontSize:34, fontWeight:700, lineHeight:1, marginBottom:6, color: tuevAlarm.length>0?"#ef4444":"#22c55e" }}>{tuevAlarm.length}</div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)" }}>TÜV / UVV / Versicherung</div>
        </div>
        <div className="kpi-card green">
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>Wäschen heute</div>
          <div style={{ fontSize:34, fontWeight:700, lineHeight:1, marginBottom:6 }}>{todayWash.length}</div>
          <div style={{ fontSize:13, color:"#22c55e", marginBottom:4 }}>{washRev.toFixed(2)} €</div>
          {delta(todayWash.length, yesterWash.length, "")}
        </div>
      </div>

      {/* MECHANIKER STATUS + INSPEKTIONEN */}
      <div className="g2" style={{ marginBottom:16 }}>
        <div className="panel">
          <div className="panel-hd"><div className="panel-title" style={{ fontSize:15 }}>🔧 Mechaniker heute</div></div>
          {mechStatus.map(function(m){
            return (
              <div key={m.name} style={{ display:"flex", alignItems:"center", gap:14, padding:"12px 0", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                <div style={{ width:44, height:44, borderRadius:"50%", background:"rgba(255,165,0,0.12)", border:"2px solid rgba(255,165,0,0.3)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, fontSize:15, color:"#ffa500", flexShrink:0 }}>{m.avatar}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:16, fontWeight:600, color:"#fff" }}>{m.name}</div>
                  <div style={{ fontSize:13, marginTop:2, color: m.active>0?"#22c55e":"rgba(255,255,255,0.4)" }}>
                    {m.active>0 ? "● In Arbeit" : "○ Verfügbar"}
                  </div>
                </div>
                <div style={{ textAlign:"center", padding:"0 16px", borderLeft:"1px solid rgba(255,255,255,0.07)" }}>
                  <div style={{ fontSize:22, fontWeight:700, color:"#ffa500" }}>{m.total}</div>

        <div className="panel">

          {topArr.length === 0

            : topArr.map(function(plate, i){

// === TRANSLATE ===
function translateToDE(text) {
  if (!text || !text.trim()) return Promise.resolve(text);
  // detect if already german (basic check)
  var url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=de&dt=t&q=" + encodeURIComponent(text);
  return fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d && d[0] && d[0][0] && d[0][0][0]) return d[0][0][0];
      return text;
    })
    .catch(function(){ return text; });
}

// === EINGANG ===
function Eingang({ alerts, onRefresh, loading }) {
  var _sf = useState("all"); var filter = _sf[0]; var setFilter = _sf[1];
  var _su = useState(false); var updating = _su[0]; var setUpdating = _su[1];
  var _df = useState(todayIso()); var dateFilter = _df[0]; var setDateFilter = _df[1];
  var _ep = useState({}); var expandedPhotos = _ep[0]; var setExpandedPhotos = _ep[1];
  var _tr = useState({}); var translations = _tr[0]; var setTranslations = _tr[1];
  var _sa = useState(null); var selectedAlert = _sa[0]; var setSelectedAlert = _sa[1];
  function togglePhotos(id){ setExpandedPhotos(function(prev){ var n=Object.assign({},prev); n[id]=!n[id]; return n; }); }

  useEffect(function(){
    alerts.forEach(function(a){
      if (!a.description || !a.description.trim()) return;
      if (translations[a.id]) return; // already translated
      translateToDE(a.description).then(function(translated){
        setTranslations(function(prev){
          var n = Object.assign({}, prev);
          n[a.id] = translated;
          return n;
        });
      });
    });
  }, [alerts]);

  var list = alerts.filter(function(a){ return a.status !== "rejected"; });
  if (filter === "open")   list = list.filter(function(a){ return a.status !== "done"; });
  if (filter === "urgent") list = list.filter(function(a){ return (a.urgency||"").includes("urgent"); });
  if (filter === "done")   list = list.filter(function(a){ return a.status === "done"; });
  if (filter === "fahrer") list = list.filter(function(a){ return a.sender_app === "fahrer"; });
  if (filter === "stapler") list = list.filter(function(a){ return a.sender_app === "stapler"; });
  if (dateFilter) list = list.filter(function(a){
    if (!a.created_at) return false;
    var localDate = new Date(a.created_at).toLocaleDateString("sv-SE"); // sv-SE даёт YYYY-MM-DD в локальном времени
    return localDate === dateFilter;
  });

  function markDone(id) {
    setUpdating(true);
    sbPatch("alerts", id, { status:"done" }).then(function(){ setUpdating(false); onRefresh(); });
  }

  function exportAlerts() {
    var date = new Date().toLocaleDateString("de-DE", {weekday:"long", day:"2-digit", month:"long", year:"numeric"});
    var dringend = list.filter(function(a){ return (a.urgency||"").includes("urgent"); }).length;
    var erledigt = list.filter(function(a){ return a.status==="done"; }).length;
    var rows = list.map(function(a){
      var urg = (a.urgency||"").includes("urgent") ? "🚨 Dringend" : "Normal";
      var status = a.status === "done" ? "✓ Erledigt" : a.status === "inProgress" ? "In Bearbeitung" : "Offen";
      var src = a.sender_app === "stapler" ? "Stapler" : a.sender_app === "fahrer" ? "Fahrer" : (a.sender_app||"—");
      return "<tr style='border-bottom:1px solid #eee'>" +
        "<td style='color:#666;white-space:nowrap'>"+fmtDateTime(a.created_at)+"</td>" +
        "<td><strong style='font-size:15px;letter-spacing:1px'>"+( a.plate||"—")+"</strong></td>" +
        "<td>"+src+"</td>" +
        "<td>"+( a.sender||"—")+"</td>" +
        "<td style='color:"+(( a.urgency||"").includes("urgent")?"#c0392b":"#27ae60")+"'>"+urg+"</td>" +
        "<td style='max-width:300px'>"+( a.description||"—")+"</td>" +
        "<td style='color:"+(a.status==="done"?"#27ae60":"#e67e22")+"'>"+status+"</td>" +
        "</tr>";
    }).join("");
    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'>" +
      "<title>WerkFlow — Eingang Bericht</title>" +
      "<style>"+
        "body{font-family:Arial,sans-serif;padding:32px;color:#222;max-width:1100px;margin:0 auto}"+
        "h1{color:#0a1730;font-size:28px;margin:0 0 4px}"+
        ".sub{color:#666;font-size:14px;margin-bottom:24px}"+
        ".summary{display:flex;gap:32px;background:#f4f6fb;border-radius:10px;padding:16px 24px;margin-bottom:24px}"+
        ".sum-item{text-align:center}"+
        ".sum-val{font-size:26px;font-weight:900;color:#0a1730}"+
        ".sum-lab{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}"+
        "table{width:100%;border-collapse:collapse;margin-bottom:24px}"+
        "th{background:#0a1730;color:#fff;font-size:12px;font-weight:700;padding:10px 14px;text-align:left;letter-spacing:0.5px}"+
        "td{padding:11px 14px;font-size:13px;vertical-align:top}"+
        "tr:nth-child(even) td{background:#f8f9fc}"+
        ".footer{font-size:12px;color:#aaa;border-top:1px solid #eee;padding-top:12px;margin-top:8px}"+
        "@media print{.no-print{display:none}}"+
      "</style></head><body>"+
      "<h1>WerkFlow — Eingangsbericht</h1>"+
      "<div class='sub'>Erstellt am: "+date+" &nbsp;·&nbsp; Gefiltert: "+list.length+" Meldungen</div>"+
      "<div class='summary'>"+
        "<div class='sum-item'><div class='sum-val'>"+list.length+"</div><div class='sum-lab'>Meldungen gesamt</div></div>"+
        "<div class='sum-item'><div class='sum-val' style='color:#c0392b'>"+dringend+"</div><div class='sum-lab'>Dringend</div></div>"+
        "<div class='sum-item'><div class='sum-val' style='color:#27ae60'>"+erledigt+"</div><div class='sum-lab'>Erledigt</div></div>"+
        "<div class='sum-item'><div class='sum-val' style='color:#e67e22'>"+(list.length-erledigt)+"</div><div class='sum-lab'>Offen</div></div>"+
      "</div>"+
      "<table><thead><tr>"+
        "<th>Datum / Uhrzeit</th><th>Fahrzeug</th><th>Quelle</th><th>Fahrer / Sender</th><th>Dringlichkeit</th><th>Beschreibung</th><th>Status</th>"+
      "</tr></thead><tbody>"+rows+"</tbody></table>"+
      "<div class='footer'>WerkFlow Betriebsmanagementsystem &nbsp;·&nbsp; Automatisch generiert</div>"+
      "<button class='no-print' onclick='window.print()' style='margin-top:16px;background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer'>🖨 Drucken / Als PDF speichern</button>"+
      "</body></html>";
    printHtml(html, "Eingangsbericht");
  }

  return (
    <div style={{ position:"relative" }}>
      <div style={{ background:"rgba(15,30,60,0.7)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:14, padding:"20px 28px 0 28px", marginBottom:16 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
          <div style={{ fontSize:26, fontWeight:700, color:"#fff", letterSpacing:-0.5 }}>
            Eingang
            <span style={{ fontSize:16, fontWeight:500, color:"rgba(255,255,255,0.4)", marginLeft:12 }}>
              {list.length} Meldung{list.length!==1?"en":""}
            </span>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button className="btn-outline btn-small no-print" onClick={exportAlerts}>📄 Export</button>
            <button className="btn-outline btn-small no-print" onClick={onRefresh}>{loading ? "..." : "↻"}</button>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12, marginBottom:20 }}>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {[["all","Alle"],["open","Offen"],["urgent","Dringend"],["fahrer","Fahrer"],["stapler","Stapler"],["done","Erledigt"]].map(function(f){
              return <button key={f[0]} onClick={function(){ setFilter(f[0]); }} className={"btn-small " + (filter===f[0] ? "btn-primary" : "btn-outline")} style={{ fontSize:15, padding:"8px 20px" }}>{f[1]}</button>;
            })}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:13, color:"rgba(255,255,255,0.4)", fontWeight:600 }}>📅</span>
            <input type="date" value={dateFilter}
              onChange={function(e){ setDateFilter(e.target.value); }}
              style={{
                background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.15)",
                borderRadius:8, color:"#fff", fontSize:16, padding:"8px 14px",
                outline:"none", cursor:"pointer"
              }}
            />

          </div>
        </div>
        {list.length === 0
          ? <div className="empty">Keine Meldungen</div>
          : (function(){
              // группируем по дням
              var groups = [];
              var groupMap = {};
              list.forEach(function(a){
                var day = a.created_at ? new Date(a.created_at).toLocaleDateString("sv-SE") : "unknown";
                if (!groupMap[day]) {
                  groupMap[day] = [];
                  groups.push(day);
                }
                groupMap[day].push(a);
              });
              groups.sort(function(a,b){ return b > a ? 1 : -1; });

              var today = todayIso();
              var yesterday = (function(){ var d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();

              function dayLabel(iso){
                if (iso === today) return "Heute — " + iso.split("-").reverse().join(".");
                if (iso === yesterday) return "Gestern — " + iso.split("-").reverse().join(".");
                return iso.split("-").reverse().join(".");
              }

              return groups.map(function(day){
                var dayList = groupMap[day];
                return (
                  <div key={day}>
                    {/* РАЗДЕЛИТЕЛЬ ДНЯ */}
                    <div style={{

                      <div style={{ flex:1, height:1, background:"rgba(255,255,255,0.08)" }}></div>
                      <div style={{ fontSize:12, color:"rgba(255,255,255,0.25)" }}>
                        {dayList.length} Meldung{dayList.length!==1?"en":""}

                    </div>
                    {/* ЗАГОЛОВКИ КОЛОНОК */}
                    <div style={{
                      display:"grid",
                      gridTemplateColumns:"90px 110px 130px 1fr 140px 1fr 90px 90px",
                      borderBottom:"1px solid rgba(255,255,255,0.1)",
                      paddingBottom:6, marginBottom:0
                    }}>
                      {["Priorität","Zeit","Fahrzeug","Beschreibung","Fahrer","Standort","Mech.","Aktion"].map(function(h,i){
                        return (

                            fontSize:11, fontWeight:800, color:"rgba(255,255,255,0.3)",

                          }}>{h}</div>
                        );

                    </div>
                    {/* СТРОКИ */}
                    {dayList.map(function(a, idx){
              var urg = (a.urgency||"").includes("urgent");
              var done = a.status === "done";
              var photos = [];
              try {
                var raw = a.photo_urls;
                if (Array.isArray(raw)) photos = raw;
                else if (typeof raw === "string" && raw.trim()) {
                  var cleaned = raw.trim();
                  if (cleaned.startsWith("[")) photos = JSON.parse(cleaned);
                  else photos = [cleaned];
                }
              } catch(e){ photos = []; }
              photos = photos.filter(function(u){ return u && typeof u === "string" && u.startsWith("http"); });
              var showPhotos = !!expandedPhotos[a.id];
              return (
                <div key={a.id}>
                  <div style={{
                    display:"grid",
                    gridTemplateColumns:"90px 110px 130px 1fr 140px 1fr 90px 90px",
                    alignItems:"center",
                    minHeight:72,
                    borderBottom:"1px solid rgba(255,255,255,0.06)",

                      {urg
                        ? <span style={{ fontSize:12, fontWeight:800, color:"#ef4444", background:"rgba(239,68,68,0.15)", padding:"3px 8px", borderRadius:6 }}>🚨 Dringend</span>

                    <div style={{ padding:"0 12px", borderLeft:"1px solid rgba(255,255,255,0.07)" }}>

                      <div style={{ fontSize:18, fontWeight:700, color:"#fff", letterSpacing:1, fontFamily:"monospace" }}>{a.plate||"—"}</div>

                    {/* ОПИСАНИЕ */}
                    <div style={{ padding:"0 12px", borderLeft:"1px solid rgba(255,255,255,0.07)", cursor:"pointer" }}

                      <div style={{ fontSize:15, fontWeight:500, color:"rgba(255,255,255,0.9)" }}>{a.sender||"—"}</div>
                    </div>
                    {/* ЛОКАЦИЯ */}
                    <div style={{ padding:"0 12px", borderLeft:"1px solid rgba(255,255,255,0.07)" }}>
                      <div style={{ fontSize:14, color:"rgba(255,255,255,0.6)" }}>{a.location||"—"}</div>
                    </div>
                    {/* МЕХАНИК */}
                    <div style={{ padding:"0 12px", borderLeft:"1px solid rgba(255,255,255,0.07)" }}>

// === MECHANIKER ===
function Mechaniker({ jobs, onRefresh, loading }) {

                      {inProgress === 0 && paused > 0 && <span style={{ color:"#ffa500", fontWeight:600 }}>● Pause</span>}
                      {inProgress === 0 && paused === 0 && <span style={{ color:"rgba(255,255,255,0.4)" }}>○ Verfügbar</span>}

// === TECHNIK ===
function Technik({ vehicles, forklifts, jobs }) {
  var _st = useState("truck"); var vtype = _st[0]; var setVtype = _st[1];
  var _ss = useState(""); var search = _ss[0]; var setSearch = _ss[1];
  var _sd = useState(""); var dateF = _sd[0]; var setDateF = _sd[1];
  var _se = useState(null); var expanded = _se[0]; var setExpanded = _se[1];
  var _sf = useState(false); var onlyProblems = _sf[0]; var setOnlyProblems = _sf[1];

  var TABS = [
    { k:"truck",      label:"🚛 LKW",       types:["truck"] },
    { k:"trailer",    label:"🚜 Auflieger",  types:["semiTrailer","trailer"] },
    { k:"pkw",        label:"🚗 PKW",        types:["pkw"] },
    { k:"forklift",   label:"🏗 Stapler",    types:["forklift","__forklifts__"] },
  ];

  var activeTab = TABS.find(function(t){ return t.k === vtype; }) || TABS[0];
  var isFork = vtype === "forklift";

  var rawList = isFork ? (forklifts||[]) : vehicles.filter(function(v){ return activeTab.types.includes(v.type); });

  var list = rawList.filter(function(v){
    if (!search) return true;
    return ((v.plate||"")+(v.brand||"")+(v.model||"")+(v.nummer||"")).toLowerCase().includes(search.toLowerCase());
  });

  if (onlyProblems) {
    list = list.filter(function(v){
      var fields = isFork ? [v.uvv_datum] : [v.tuev, v.insurance, v.uvv, v.next_service];
      return fields.filter(Boolean).some(function(d){ return dateDiff(d) !== null && dateDiff(d) < 30; });
    });
  }

  function vehJobs(plate) {
    return jobs.filter(function(j){
      var ok = (j.plate||"") === plate;
      if (dateF) ok = ok && (j.date||(j.created_at||"").slice(0,10)) === dateF;
      return ok;
    });
  }

  function worstDocStatus(v) {
    var fields = isFork ? [v.uvv_datum] : [v.tuev, v.insurance, v.uvv, v.next_service];
    var diffs = fields.filter(Boolean).map(dateDiff);
    if (!diffs.length) return "none";
    var mn = Math.min.apply(null, diffs.filter(function(x){ return x !== null; }));
    if (mn < 0) return "expired";
    if (mn < 30) return "urgent";
    if (mn < 60) return "warn";
    return "ok";
  }

  function exportTechnik() {
    var rows = list.map(function(v){
      var ws = worstDocStatus(v);
      return "<tr><td>"+(v.plate||v.nummer||"—")+"</td><td>"+(v.brand||v.hersteller||"")+" "+(v.model||"")+"</td>"+
        "<td>"+(v.tuev||v.uvv_datum||"—")+"</td><td>"+(v.insurance||"—")+"</td><td>"+(v.uvv||"—")+"</td>"+
        "<td>"+(v.next_service||"—")+"</td><td style='color:"+docColor(ws)+"'>"+ws.toUpperCase()+"</td></tr>";
    }).join("");
    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Technik Export</title>"+baseReportStyle()+"</head><body>"+
      "<h1>WerkFlow — Technik: "+activeTab.label+"</h1><h2>"+list.length+" Fahrzeuge</h2>"+
      "<table><thead><tr><th>Kennzeichen</th><th>Marke/Modell</th><th>TÜV/UVV</th><th>Versicherung</th><th>UVV</th><th>Wartung</th><th>Status</th></tr></thead><tbody>"+rows+"</tbody></table>"+
      "<button onclick='window.print()' style='background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer'>🖨 Drucken / PDF</button></body></html>";
    printHtml(html, "Technik Export");
  }

  return (
    <div>
      <div className="panel">
        <div className="panel-hd">
          <div className="panel-title-lg">Technik</div>
          <button className="btn-outline btn-small no-print" onClick={exportTechnik}>📄 Export</button>
        </div>

        <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
          {TABS.map(function(t){
            return <button key={t.k} onClick={function(){ setVtype(t.k); setSearch(""); setExpanded(null); }} className={"btn-small " + (vtype===t.k ? "btn-primary" : "btn-outline")}>{t.label}</button>;
          })}
        </div>

        <div style={{ display:"flex", gap:10, marginBottom:14, flexWrap:"wrap", alignItems:"center" }}>
          <input className="inp" style={{ flex:1, minWidth:200 }} value={search} placeholder="Suche: Kennzeichen, Marke..." onChange={function(e){ setSearch(e.target.value); }} />
          <input type="date" className="inp" value={dateF} onChange={function(e){ setDateF(e.target.value); }} />
          <button className={"btn-small " + (onlyProblems ? "btn-primary" : "btn-outline")} onClick={function(){ setOnlyProblems(!onlyProblems); }}>
            ⚠️ Nur Probleme
          </button>
        </div>

        <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", marginBottom:12 }}>{list.length} Fahrzeuge</div>

        {list.length === 0
          ? <div className="empty">Keine Fahrzeuge gefunden</div>
          : <table className="tbl">
              <thead>
                <tr>
                  <th>Kennzeichen</th>
                  {!isFork && <th>Marke / Modell</th>}
                  {isFork && <th>Modell</th>}
                  {!isFork && <th>TÜV</th>}
                  {!isFork && <th>Versicherung</th>}
                  <th>UVV</th>
                  {!isFork && <th>Wartung</th>}
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {list.map(function(v){
                  var plate = v.plate || v.nummer || v.id;
                  var ws = worstDocStatus(v);
                  var isExp = expanded === plate;
                  var vj = vehJobs(plate);

                  function DocChip({ d }) {
                    if (!d) return <span className="doc-chip doc-none">—</span>;
                    var diff = dateDiff(d);
                    var st = docStatus(diff);
                    var cls = docCls(st);
                    return (
                      <span className={"doc-chip " + cls}>
                        {fmtDate(d)}
                        {diff !== null && diff < 60 && <span> ({diff < 0 ? Math.abs(diff)+"d !" : diff+"d"})</span>}
                      </span>
                    );
                  }

                  return [
                    <tr key={plate} style={{ cursor:"pointer" }} onClick={function(){ setExpanded(isExp?null:plate); }}>
                      <td><strong>{plate}</strong></td>
                      <td style={{ fontSize:12, color:"rgba(255,255,255,0.65)" }}>{(v.brand||v.hersteller||"")+" "+(v.model||"")}</td>
                      {!isFork && <td><DocChip d={v.tuev} /></td>}
                      {!isFork && <td><DocChip d={v.insurance} /></td>}
                      <td><DocChip d={v.uvv || v.uvv_datum} /></td>
                      {!isFork && <td><DocChip d={v.next_service} /></td>}
                      <td>
                        <span className={"badge " + (ws==="expired"||ws==="urgent"?"badge-red":ws==="warn"?"badge-orange":ws==="ok"?"badge-green":"badge-gray")}>
                          {ws==="expired"?"Abgelaufen":ws==="urgent"?"Dringend":ws==="warn"?"Bald":ws==="ok"?"OK":"—"}
                        </span>
                      </td>
                      <td style={{ color:"rgba(255,255,255,0.4)", fontSize:12 }}>{isExp ? "▲" : "▼"}</td>
                    </tr>,
                    isExp && (
                      <tr key={plate+"_exp"}>
                        <td colSpan={isFork ? 5 : 8} style={{ padding:0 }}>
                          <div className="expand-row">
                            <div style={{ display:"flex", gap:16, flexWrap:"wrap", marginBottom:10 }}>
                              {v.mileage && <span style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>🛣 {v.mileage} km</span>}
                              {v.baujahr && <span style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>📅 {v.baujahr}</span>}
                              {v.standort && <span style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>📍 {v.standort}</span>}
                              {v.einsatzort && <span style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>{v.einsatzort}</span>}
                              {v.fahrgestell && <span style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>FG: {v.fahrgestell}</span>}
                              {isFork && v.betrieb_std && <span style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>⏱ {v.betrieb_std} Std</span>}
                            </div>
                            <div style={{ fontSize:12, color:"rgba(255,165,0,0.8)", marginBottom:6, fontWeight:700 }}>
                              Aufträge{dateF ? " am "+fmtDate(dateF) : ""}: {vj.length}
                            </div>
                            {vj.slice(0,5).map(function(j){
                              return (
                                <div key={j.id} style={{ fontSize:12, padding:"5px 0", borderBottom:"1px solid rgba(255,255,255,0.05)", display:"flex", gap:10, flexWrap:"wrap" }}>
                                  <span style={{ color:"rgba(255,255,255,0.5)" }}>{j.date||""}</span>
                                  <span>{WORK_TYPES[j.work_type]||j.work_type||"—"}</span>
                                  <span style={{ color:"rgba(255,255,255,0.5)" }}>{(j.description||"").slice(0,60)}</span>
                                  <span style={{ marginLeft:"auto" }}>{fmtMin(j.work_min||0)}</span>
                                  {statusBadge(j.status)}
                                </div>
                              );
                            })}
                          </div>
                        </td>
                      </tr>
                    )
                  ];
                })}
              </tbody>
            </table>
        }
      </div>
    </div>
  );
}

// === KOSTEN ===
function Kosten({ jobs, invoices, vehicles, forklifts }) {
  var _sp = useState("month"); var period = _sp[0]; var setPeriod = _sp[1];

  function periodStart() {
    var d = new Date();
    if (period === "month") { d.setDate(1); return d.toISOString().slice(0,10); }
    if (period === "quarter") { d.setMonth(Math.floor(d.getMonth()/3)*3, 1); return d.toISOString().slice(0,10); }
    if (period === "year") { d.setMonth(0,1); return d.toISOString().slice(0,10); }
    return "";
  }

  var start = periodStart();
  var filtered = start ? jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10)) >= start; }) : jobs;
  var filtInv = start ? invoices.filter(function(i){ return (i.date||"") >= start; }) : invoices;

  var totalLabor = filtered.reduce(function(s,j){ return s+(Number(j.labor_cost)||0); }, 0);
  var totalParts = filtered.reduce(function(s,j){ return s+(Number(j.parts_cost)||0); }, 0);
  var totalInv   = filtInv.reduce(function(s,i){ return s+(Number(i.amount)||0); }, 0);
  var totalAll   = totalLabor + totalParts + totalInv;

  var byVeh = {};
  filtered.forEach(function(j){
    if (!j.plate) return;
    if (!byVeh[j.plate]) byVeh[j.plate] = { labor:0, parts:0, jobs:0, min:0 };
    byVeh[j.plate].labor += Number(j.labor_cost)||0;
    byVeh[j.plate].parts += Number(j.parts_cost)||0;
    byVeh[j.plate].jobs++;
    byVeh[j.plate].min += parseInt(j.work_min||0)||0;
  });
  var topVeh = Object.keys(byVeh).sort(function(a,b){
    return (byVeh[b].labor+byVeh[b].parts) - (byVeh[a].labor+byVeh[a].parts);
  }).slice(0,10);

  var byMech = {};
  filtered.forEach(function(j){
    if (!j.mechanic) return;
    if (!byMech[j.mechanic]) byMech[j.mechanic] = { labor:0, jobs:0, min:0 };
    byMech[j.mechanic].labor += Number(j.labor_cost)||0;
    byMech[j.mechanic].jobs++;
    byMech[j.mechanic].min += parseInt(j.work_min||0)||0;
  });

  var byType = {};
  filtered.forEach(function(j){
    var t = j.work_type||"other";
    if (!byType[t]) byType[t] = { cost:0, jobs:0 };
    byType[t].cost += (Number(j.labor_cost)||0)+(Number(j.parts_cost)||0);
    byType[t].jobs++;
  });

  function exportKosten() {
    var rows = topVeh.map(function(p){
      var v = byVeh[p];
      return "<tr><td>"+p+"</td><td>"+(v.labor.toFixed(2))+" €</td><td>"+(v.parts.toFixed(2))+" €</td><td>"+((v.labor+v.parts).toFixed(2))+" €</td><td>"+v.jobs+"</td><td>"+fmtMin(v.min)+"</td></tr>";
    }).join("");
    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Kostenanalyse</title>"+baseReportStyle()+"</head><body>"+
      "<h1>WerkFlow — Kostenanalyse</h1><h2>Zeitraum: "+fmtDate(start)+" — heute</h2>"+
      "<div class='sum'><div class='sum-item'><div class='sum-val'>"+totalAll.toFixed(2)+" €</div><div class='sum-lab'>Gesamt</div></div>"+
      "<div class='sum-item'><div class='sum-val'>"+totalLabor.toFixed(2)+" €</div><div class='sum-lab'>Lohnkosten</div></div>"+
      "<div class='sum-item'><div class='sum-val'>"+totalParts.toFixed(2)+" €</div><div class='sum-lab'>Ersatzteile</div></div>"+
      "<div class='sum-item'><div class='sum-val'>"+totalInv.toFixed(2)+" €</div><div class='sum-lab'>Rechnungen</div></div></div>"+
      "<h2 style='margin-bottom:10px'>Kosten je Fahrzeug</h2>"+
      "<table><thead><tr><th>Kennzeichen</th><th>Lohn</th><th>Teile</th><th>Gesamt</th><th>Aufträge</th><th>Arbeitszeit</th></tr></thead><tbody>"+rows+"</tbody></table>"+
      "<button onclick='window.print()' style='background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer'>🖨 Drucken / PDF</button></body></html>";
    printHtml(html, "Kostenanalyse");
  }

  return (
    <div>
      <div style={{ display:"flex", gap:8, marginBottom:20, alignItems:"center" }}>
        <div style={{ fontSize:18, fontWeight:900, flex:1 }}>Kostenanalyse</div>
        {[["month","Monat"],["quarter","Quartal"],["year","Jahr"],["all","Gesamt"]].map(function(p){
          return <button key={p[0]} className={"btn-small "+(period===p[0]?"btn-primary":"btn-outline")} onClick={function(){ setPeriod(p[0]); }}>{p[1]}</button>;
        })}
        <button className="btn-outline btn-small no-print" onClick={exportKosten}>Export</button>
      </div>

      <div className="kpi-grid">
        <div className="kpi-card orange"><div className="kpi-icon" style={{ fontSize:18 }}>∑</div><div className="kpi-val">{totalAll.toFixed(0)} €</div><div className="kpi-label">Gesamtkosten</div></div>
        <div className="kpi-card blue"><div className="kpi-icon" style={{ fontSize:18 }}>⏱</div><div className="kpi-val">{totalLabor.toFixed(0)} €</div><div className="kpi-label">Lohnkosten</div></div>
        <div className="kpi-card purple"><div className="kpi-icon" style={{ fontSize:18 }}>⚙</div><div className="kpi-val">{totalParts.toFixed(0)} €</div><div className="kpi-label">Ersatzteile</div></div>
        <div className="kpi-card green"><div className="kpi-icon" style={{ fontSize:18 }}>🧾</div><div className="kpi-val">{totalInv.toFixed(0)} €</div><div className="kpi-label">Rechnungen</div></div>
      </div>

      <div className="g2">
        <div className="panel">
          <div className="panel-hd"><div className="panel-title">Kosten je Fahrzeug (Top 10)</div></div>
          {topVeh.length === 0 ? <div className="empty">Keine Daten</div> :
            <table className="tbl">
              <thead><tr><th>Kennzeichen</th><th>Lohn</th><th>Teile</th><th>Gesamt</th><th>Aufträge</th></tr></thead>
              <tbody>
                {topVeh.map(function(p){
                  var v = byVeh[p];
                  var total = v.labor + v.parts;
                  return (
                    <tr key={p}>
                      <td><strong>{p}</strong></td>
                      <td style={{ fontSize:12, color:"rgba(255,255,255,0.6)" }}>{v.labor.toFixed(2)} €</td>
                      <td style={{ fontSize:12, color:"rgba(255,255,255,0.6)" }}>{v.parts.toFixed(2)} €</td>
                      <td style={{ color:"#ffa500", fontWeight:700 }}>{total.toFixed(2)} €</td>
                      <td style={{ fontSize:12 }}>{v.jobs}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          }
        </div>

        <div className="panel">
          <div className="panel-hd"><div className="panel-title">Kosten je Mechaniker</div></div>
          {Object.keys(byMech).length === 0 ? <div className="empty">Keine Daten</div> :
            Object.keys(byMech).map(function(id){
              var m = byMech[id];
              return (
                <div key={id} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 0", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                  <div style={{ flex:1, fontWeight:700, fontSize:13 }}>{id}</div>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>{m.jobs} Auftr. · {fmtMin(m.min)}</div>
                  <div style={{ fontWeight:800, color:"#ffa500", minWidth:70, textAlign:"right" }}>{m.labor.toFixed(2)} €</div>
                </div>
              );
            })
          }
          <div style={{ marginTop:14 }}>
            <div className="panel-title" style={{ marginBottom:10 }}>Kosten je Arbeitstyp</div>
            {Object.keys(byType).map(function(t){
              var x = byType[t];
              return (
                <div key={t} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                  <div style={{ flex:1, fontSize:12 }}>{WORK_TYPES[t]||t}</div>
                  <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>{x.jobs}x</div>
                  <div style={{ fontWeight:700, color:"#ffa500", fontSize:13, minWidth:70, textAlign:"right" }}>{x.cost.toFixed(2)} €</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// === RECHNUNGEN ===
function Rechnungen({ invoices, vehicles, jobs, onRefresh, loading }) {
  var _sd = useState(""); var dateF = _sd[0]; var setDateF = _sd[1];
  var _ss = useState(""); var search = _ss[0]; var setSearch = _ss[1];
  var _sf = useState("all"); var statusF = _sf[0]; var setStatusF = _sf[1];
  var _su = useState(false); var updating = _su[0]; var setUpdating = _su[1];

  var list = invoices;
  if (dateF) list = list.filter(function(i){ return (i.date||"") === dateF; });
  if (statusF === "confirmed") list = list.filter(function(i){ return i.paid; });
  if (statusF === "pending")   list = list.filter(function(i){ return !i.paid; });
  if (search) list = list.filter(function(i){
    var mechName = i.mechanic || (jobs.find(function(j){ return j.id===i.job_id; })||{}).mechanic || "";
    return ((i.supplier||"")+(i.invoice_nr||"")+(i.vehicle_id||"")+(i.items||"")+mechName)
      .toLowerCase().includes(search.toLowerCase());
  });

  var total = list.reduce(function(s,i){ return s+(Number(i.amount)||0); }, 0);
  var pending = list.filter(function(i){ return !i.paid; });
  var pendingTotal = pending.reduce(function(s,i){ return s+(Number(i.amount)||0); }, 0);

  function markConfirmed(id, val) {
    setUpdating(true);
    sbPatch("invoices", id, { paid: val })
      .then(function(){ setUpdating(false); onRefresh(); })
      .catch(function(){ setUpdating(false); });
  }

  function exportLS() {
    var date = new Date().toLocaleDateString("de-DE", {day:"2-digit",month:"long",year:"numeric"});
    var rows = list.map(function(i){
      var status = i.paid ? "<span style='color:#27ae60;font-weight:700'>✓ Rechnung erhalten</span>" : "<span style='color:#e67e22;font-weight:700'>⏳ Ausstehend</span>";
      return "<tr><td>"+(i.date?new Date(i.date).toLocaleDateString("de-DE"):"—")+"</td>"+
        "<td><strong>"+(i.invoice_nr||"—")+"</strong></td>"+
        "<td>"+(i.supplier||"—")+"</td>"+
        "<td>"+(i.vehicle_id||"—")+"</td>"+
        "<td>"+(i.items||"—").slice(0,60)+"</td>"+
        "<td style='font-weight:700;text-align:right'>"+(i.amount?Number(i.amount).toFixed(2)+" €":"—")+"</td>"+
        "<td>"+status+"</td></tr>";
    }).join("");
    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Lieferschein-Übersicht</title>"+baseReportStyle()+"</head><body>"+
      "<h1>WerkFlow — Lieferschein-Übersicht</h1>"+
      "<div class='sub'>Erstellt am: "+date+"</div>"+
      "<div class='summary'>"+
        "<div class='sum-item'><div class='sum-val'>"+list.length+"</div><div class='sum-lab'>Lieferscheine</div></div>"+
        "<div class='sum-item'><div class='sum-val'>"+total.toFixed(2)+" €</div><div class='sum-lab'>Gesamtbetrag</div></div>"+
        "<div class='sum-item'><div class='sum-val' style='color:#e67e22'>"+pending.length+"</div><div class='sum-lab'>Rechnung ausstehend</div></div>"+
        "<div class='sum-item'><div class='sum-val' style='color:#e67e22'>"+pendingTotal.toFixed(2)+" €</div><div class='sum-lab'>Offener Betrag</div></div>"+
      "</div>"+
      "<table><thead><tr><th>Datum</th><th>Lieferschein-Nr.</th><th>Lieferant</th><th>Fahrzeug</th><th>Beschreibung</th><th style='text-align:right'>Betrag</th><th>Status</th></tr></thead>"+
      "<tbody>"+rows+"</tbody></table>"+
      "<div class='footer'>WerkFlow Betriebsmanagementsystem · Automatisch generiert</div>"+
      "<button class='no-print' onclick='window.print()' style='margin-top:16px;background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer'>🖨 Drucken / PDF</button>"+
      "</body></html>";
    printHtml(html, "Lieferschein-Übersicht");
  }

  return (
    <div>
      {/* KPI */}
      <div style={{ display:"flex", gap:12, marginBottom:16 }}>
        <div className="kpi-card orange" style={{ flex:1 }}>
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>Lieferscheine gesamt</div>
          <div style={{ fontSize:30, fontWeight:700 }}>{list.length}</div>
        </div>
        <div className="kpi-card" style={{ flex:1, borderLeft:"3px solid #ffa500" }}>
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>Gesamtbetrag</div>
          <div style={{ fontSize:30, fontWeight:700, color:"#ffa500" }}>{total.toFixed(2)} €</div>
        </div>
        <div className="kpi-card red" style={{ flex:1 }}>
          <div style={{ fontSize:11, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>Rechnung ausstehend</div>
          <div style={{ fontSize:30, fontWeight:700, color:"#ef4444" }}>{pending.length}</div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)", marginTop:4 }}>{pendingTotal.toFixed(2)} €</div>
        </div>

      <div className="panel">

            return (
              <button key={f[0]} className={"btn-small "+(statusF===f[0]?"btn-primary":"btn-outline")}
                onClick={function(){ setStatusF(f[0]); }}>
                {f[1]}

            );
          })}
          <input type="date" className="inp" value={dateF}
            onChange={function(e){ setDateF(e.target.value); }} />
          <input className="inp" style={{ flex:1, minWidth:200 }} value={search}
            placeholder="Suche: Lieferant, LS-Nr., Fahrzeug, Mechaniker, Zapchast..."
            onChange={function(e){ setSearch(e.target.value); }} />
        </div>

        {/* Таблица */}
        {list.length === 0
          ? <div className="empty">Keine Lieferscheine gefunden</div>
          : <table className="tbl">
              <thead>
                <tr>
                  <th style={{ width:110 }}>Datum</th>
                  <th style={{ width:150 }}>Lieferschein-Nr.</th>
                  <th>Lieferant</th>
                  <th style={{ width:120 }}>Fahrzeug</th>
                  <th>Beschreibung</th>
                  <th style={{ width:110 }}>Mechaniker</th>
                  <th style={{ width:110 }}>Betrag</th>
                  <th style={{ width:160 }}>Rechnung</th>
                </tr>
              </thead>
              <tbody>
                {list.map(function(i){
                  var confirmed = !!i.paid;
                  return (
                    <tr key={i.id}>
                      <td style={{ fontSize:13, color:"rgba(255,255,255,0.5)" }}>
                        {i.date ? new Date(i.date).toLocaleDateString("de-DE") : "—"}
                      </td>
                      <td style={{ fontFamily:"monospace", fontWeight:700, fontSize:14, letterSpacing:0.5 }}>
                        {i.invoice_nr||"—"}
                      </td>
                      <td style={{ fontWeight:600 }}>{i.supplier||"—"}</td>
                      <td style={{ fontSize:13 }}>{i.vehicle_id||"—"}</td>
                      <td style={{ fontSize:13, color:"rgba(255,255,255,0.6)" }}>
                        {(i.items||"—").slice(0,50)}
                      </td>
                      <td style={{ fontSize:13, color:"rgba(255,255,255,0.5)" }}>
                        {i.mechanic || (jobs.find(function(j){ return j.id===i.job_id; })||{}).mechanic || "—"}
                      </td>
                      <td style={{ fontWeight:700, color:"#ffa500", fontSize:15 }}>
                        {i.amount ? Number(i.amount).toFixed(2)+" €" : "—"}
                      </td>
                      <td>
                        <button disabled={updating}
                          onClick={function(){ markConfirmed(i.id, !confirmed); }}
                          style={{
                            fontSize:12, padding:"5px 12px", borderRadius:8, cursor:"pointer", fontWeight:700,
                            border: confirmed ? "1px solid rgba(34,197,94,0.4)" : "1px solid rgba(255,165,0,0.4)",
                            background: confirmed ? "rgba(34,197,94,0.1)" : "rgba(255,165,0,0.08)",
                            color: confirmed ? "#22c55e" : "#ffa500"
                          }}>
                          {confirmed ? "✓ Erhalten" : "⏳ Ausstehend"}
                        </button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
        }
      </div>
    </div>
  );
}

// === WARTUNGSPLAN ===
function Wartungsplan({ plans, vehicles, forklifts, onRefresh, loading }) {
  var _sf = useState("all"); var filter = _sf[0]; var setFilter = _sf[1];

  var allVeh = vehicles.concat(forklifts||[]);

  function planStatus(p) {
    var today = new Date();
    var byDate = p.next_service_date ? Math.round((new Date(p.next_service_date) - today) / 86400000) : null;
    if (byDate !== null) {
      if (byDate < 0) return "expired";
      if (byDate < 14) return "urgent";
      if (byDate < 30) return "warn";
    }
    return "ok";
  }

  var list = plans;
  if (filter === "expired") list = list.filter(function(p){ return planStatus(p) === "expired"; });
  if (filter === "urgent")  list = list.filter(function(p){ return ["expired","urgent"].includes(planStatus(p)); });
  if (filter === "warn")    list = list.filter(function(p){ return ["expired","urgent","warn"].includes(planStatus(p)); });

  var expiredCount = plans.filter(function(p){ return planStatus(p) === "expired"; }).length;
  var urgentCount  = plans.filter(function(p){ return planStatus(p) === "urgent"; }).length;
  var warnCount    = plans.filter(function(p){ return planStatus(p) === "warn"; }).length;

  function exportPlan() {
    var rows = list.map(function(p){
      var st = planStatus(p);
      var diff = p.next_service_date ? Math.round((new Date(p.next_service_date)-new Date())/86400000) : null;

        <div className="kpi-card orange"><div style={{ fontSize:22, fontWeight:900 }}>{urgentCount}</div><div className="kpi-label">Dringend (&lt;14 Tage)</div></div>
        <div className="kpi-card" style={{ borderLeft:"3px solid #ffa500" }}><div style={{ fontSize:22, fontWeight:900 }}>{warnCount}</div><div className="kpi-label">Bald fällig (&lt;30 Tage)</div></div>
      </div>

          {[["all","Alle"],["urgent","Dringend"],["warn","Bald fällig"],["expired","Überfällig"]].map(function(f){
            return <button key={f[0]} className={"btn-small "+(filter===f[0]?"btn-primary":"btn-outline")} onClick={function(){ setFilter(f[0]); }}>{f[1]}</button>;
          })}
        </div>
        {list.length === 0

              <thead><tr><th>Fahrzeug</th><th>Letztes TO</th><th>Nächstes TO</th><th>Intervall</th><th>Fälligkeit</th><th>Status</th></tr></thead>
              <tbody>
                {list.map(function(p){
                  var st = planStatus(p);
                  var diff = p.next_service_date ? Math.round((new Date(p.next_service_date)-new Date())/86400000) : null;
                  var veh = allVeh.find(function(v){ return (v.plate||v.nummer||"") === (p.vehicle_plate||""); });
                  return (
                    <tr key={p.id}>
                      <td>

                      <td style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>{fmtDate(p.last_service_date)||"—"}</td>
                      <td style={{ fontWeight:700 }}>{fmtDate(p.next_service_date)||"—"}</td>

                      </td>
                      <td>
                        {diff !== null
                          ? <span style={{ fontWeight:700, color: diff<0?"#ef4444":diff<14?"#ef4444":diff<30?"#ffa500":"#22c55e" }}>
                              {diff < 0 ? Math.abs(diff)+"d überfällig" : "in "+diff+"d"}
                            </span>
                          : "—"
                        }
                      </td>
                      <td>
                        <span className={"badge "+(st==="expired"||st==="urgent"?"badge-red":st==="warn"?"badge-orange":"badge-green")}>
                          {st==="expired"?"Überfällig":st==="urgent"?"Dringend":st==="warn"?"Bald":"OK"}
                        </span>
                      </td>

        }

          Felder: vehicle_plate, interval_days, interval_km, last_service_date, next_service_date
        </div>
      </div>
    </div>
  );
}

// === SCHICHTBERICHT ===
function genSchichtbericht(jobs, date, mechanics) {
  var dateLabel = fmtDate(date) || "Heute";
  var allMechSections = mechanics.map(function(mech){
    var mj = jobs.filter(function(j){ return j.mechanic === mech.id && (j.date||(j.created_at||"").slice(0,10)) === date; });
    var totalMin  = mj.reduce(function(s,j){ return s+(parseInt(j.work_min||0)||0); }, 0);
    var totalCost = mj.reduce(function(s,j){ return s+(Number(j.cost)||0); }, 0);
    var done = mj.filter(function(j){ return j.status==="done"; }).length;
    if (mj.length === 0) return "";
    var rows = mj.map(function(j){
      return "<tr><td style='font-weight:700'>"+(j.plate||"—")+"</td>"+
        "<td>"+(WORK_TYPES[j.work_type]||j.work_type||"—")+"</td>"+
        "<td>"+(j.location||"—")+"</td>"+
        "<td style='max-width:200px'>"+(j.description||"").slice(0,80)+"</td>"+
        "<td>"+fmtMin(j.work_min||0)+"</td>"+
        "<td style='font-weight:700;color:#d97706'>"+(j.cost?Number(j.cost).toFixed(2)+" €":"—")+"</td>"+
        "<td style='color:"+(j.status==="done"?"#16a34a":"#d97706")+"'>"+(j.status==="done"?"✓ Fertig":"⚙ In Arbeit")+"</td></tr>";
    }).join("");
    return "<div style='margin-bottom:28px;page-break-inside:avoid'>"+
      "<h2 style='color:#1a3a6b;margin-bottom:4px'>"+mech.name+"</h2>"+
      "<p style='color:#64748b;font-size:13px;margin-bottom:10px'>"+mj.length+" Aufträge · "+done+" erledigt · "+fmtMin(totalMin)+" · "+totalCost.toFixed(2)+" €</p>"+
      "<table><thead><tr><th>Fahrzeug</th><th>Typ</th><th>Standort</th><th>Beschreibung</th><th>Zeit</th><th>Kosten</th><th>Status</th></tr></thead>"+
      "<tbody>"+rows+"</tbody></table></div>";
  }).join("");

  var allJobs = jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10)) === date; });
  var grand = { jobs:allJobs.length, min:allJobs.reduce(function(s,j){ return s+(parseInt(j.work_min||0)||0); },0), cost:allJobs.reduce(function(s,j){ return s+(Number(j.cost)||0); },0) };

  var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Schichtbericht "+dateLabel+"</title>"+baseReportStyle()+
    "</head><body>"+
    "<h1 style='margin-bottom:4px'>WerkFlow — Schichtbericht</h1>"+
    "<h2 style='margin-bottom:20px'>"+dateLabel+" · LTG Werkstatt</h2>"+
    "<div class='sum'>"+
    "<div class='sum-item'><div class='sum-val'>"+grand.jobs+"</div><div class='sum-lab'>Aufträge gesamt</div></div>"+
    "<div class='sum-item'><div class='sum-val'>"+fmtMin(grand.min)+"</div><div class='sum-lab'>Arbeitszeit</div></div>"+
    "<div class='sum-item'><div class='sum-val'>"+grand.cost.toFixed(2)+" €</div><div class='sum-lab'>Gesamtkosten</div></div>"+
    "</div>"+
    allMechSections+
    "<button onclick='window.print()' style='background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer'>🖨 Drucken / PDF</button>"+
    "</body></html>";
  printHtml(html, "Schichtbericht");
}
