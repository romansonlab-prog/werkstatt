<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WerkFlow Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#0f1623;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
    #root{min-height:100vh}
    button{font:inherit;cursor:pointer}
    input,select,textarea{font:inherit}
    textarea{resize:none}
    ::placeholder{color:rgba(255,255,255,0.35)}

    /* LAYOUT */
    .dash-layout{display:flex;min-height:100vh}
    .sidebar{width:220px;flex-shrink:0;background:rgba(8,18,40,0.95);border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:30}
    .sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.07)}
    .sidebar-logo-text{font-size:28px;font-weight:900;letter-spacing:-1.5px;line-height:1}
    .sidebar-subtitle{font-size:11px;font-weight:700;color:#ffa500;letter-spacing:2px;text-transform:uppercase;margin-top:3px}
    .sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
    .nav-section{padding:6px 16px 4px;font-size:10px;font-weight:800;color:rgba(255,255,255,0.3);letter-spacing:2px;text-transform:uppercase;margin-top:8px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;border:none;background:transparent;color:rgba(255,255,255,0.6);width:100%;text-align:left;font-size:13px;font-weight:600;border-radius:0;cursor:pointer;position:relative;transition:color 0.15s}
    .nav-item:hover{color:#fff;background:rgba(255,255,255,0.04)}
    .nav-item.active{color:#ffa500;background:rgba(255,165,0,0.08)}
    .nav-item.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:#ffa500;border-radius:0 2px 2px 0}
    .nav-badge{margin-left:auto;background:#ef4444;color:#fff;border-radius:99px;font-size:10px;font-weight:800;padding:2px 7px;min-width:20px;text-align:center}
    .nav-badge.orange{background:#ffa500;color:#0a1730}
    .sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,0.07)}
    .sidebar-user{display:flex;align-items:center;gap:10px}
    .sidebar-avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,165,0,0.15);border:1px solid rgba(255,165,0,0.35);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#ffa500;flex-shrink:0}
    .sidebar-name{font-size:12px;font-weight:700;color:rgba(255,255,255,0.85);line-height:1.2}
    .sidebar-role{font-size:10px;color:rgba(255,255,255,0.4)}

    .main{margin-left:220px;flex:1;min-height:100vh;background:#0f1623}
    .topbar{height:56px;background:rgba(8,18,40,0.9);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:20;backdrop-filter:blur(10px)}
    .topbar-title{font-size:16px;font-weight:800;color:#fff}
    .topbar-sub{font-size:12px;color:rgba(255,255,255,0.45);margin-left:4px}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
    .topbar-refresh{padding:7px 14px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.7);border-radius:8px;font-size:12px;font-weight:700}
    .topbar-refresh:hover{border-color:#ffa500;color:#ffa500}
    .page{padding:24px}

    /* CARDS & PANELS */
    .glass{background:rgba(15,30,60,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:14px;backdrop-filter:blur(12px)}
    .panel{background:rgba(15,30,60,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:20px;margin-bottom:16px}
    .panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .panel-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.8)}
    .panel-title-lg{font-size:17px;font-weight:900;color:#fff;letter-spacing:-0.5px}

    /* KPI */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
    .kpi-card{background:rgba(15,30,60,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden}
    .kpi-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px}
    .kpi-card.blue::before{background:#3b82f6}
    .kpi-card.orange::before{background:#ffa500}
    .kpi-card.red::before{background:#ef4444}
    .kpi-card.green::before{background:#22c55e}
    .kpi-card.purple::before{background:#a855f7}
    .kpi-icon{font-size:22px;margin-bottom:10px}
    .kpi-val{font-size:28px;font-weight:900;letter-spacing:-1px;line-height:1}
    .kpi-label{font-size:11px;color:rgba(255,255,255,0.5);margin-top:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
    .kpi-sub{font-size:11px;margin-top:4px;font-weight:600}

    /* TABLE */
    .tbl{width:100%;border-collapse:collapse}
    .tbl th{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.7px;color:rgba(255,255,255,0.4);padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.08);text-align:left;white-space:nowrap}
    .tbl td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px;vertical-align:middle}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tr:hover td{background:rgba(255,255,255,0.03)}

    /* BADGES */
    .badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:800}
    .badge-red{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
    .badge-orange{background:rgba(255,165,0,0.15);color:#ffa500;border:1px solid rgba(255,165,0,0.3)}
    .badge-green{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
    .badge-blue{background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3)}
    .badge-gray{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.12)}
    .badge-purple{background:rgba(168,85,247,0.15);color:#c084fc;border:1px solid rgba(168,85,247,0.3)}

    /* BUTTONS */
    .btn-primary{background:linear-gradient(180deg,#ffa500,#ff8c00);color:#0a1730;border:none;border-radius:9px;font-weight:800;padding:9px 16px;font-size:13px}
    .btn-outline{border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.8);border-radius:9px;padding:9px 14px;font-size:12px;font-weight:700}
    .btn-outline:hover{border-color:#ffa500;color:#ffa500}
    .btn-danger{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);border-radius:9px;padding:9px 14px;font-size:12px;font-weight:700}
    .btn-small{padding:5px 11px;border-radius:7px;font-size:11px;font-weight:700}

    /* INPUTS */
    .inp{background:rgba(9,27,58,0.8);border:1px solid rgba(255,255,255,0.14);border-radius:9px;color:#fff;padding:9px 12px;font-size:13px;outline:none}
    .inp:focus{border-color:#ffa500}
    select.inp{appearance:none}

    /* STATUS DOTS */
    .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
    .dot-green{background:#22c55e}
    .dot-orange{background:#ffa500}
    .dot-red{background:#ef4444}
    .dot-gray{background:rgba(255,255,255,0.3)}

    /* ALERT CARD */
    .alert-card{background:rgba(15,30,60,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;margin-bottom:10px}
    .alert-card.urgent{background:rgba(60,10,20,0.8);border-color:rgba(239,68,68,0.4)}

    /* DOC CHIP */
    .doc-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700}
    .doc-ok{background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.25)}
    .doc-warn{background:rgba(255,165,0,0.12);color:#ffa500;border:1px solid rgba(255,165,0,0.25)}
    .doc-urgent{background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.25)}
    .doc-none{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.1)}

    /* GRID */
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

    /* LOGIN */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f1623;padding:20px}
    .login-box{width:100%;max-width:360px}
    .login-card{background:rgba(15,30,60,0.9);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:32px 28px;box-shadow:0 24px 60px rgba(0,0,0,0.5)}
    .pin-row{display:flex;gap:14px;justify-content:center;margin:24px 0}
    .pin-dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background 0.15s}
    .pin-dot.on{background:#ffa500;box-shadow:0 0 10px rgba(255,165,0,0.5)}
    .pin-dot.err{background:#ef4444}
    .keypad{display:grid;grid-template-columns:repeat(3,68px);gap:12px;justify-content:center}
    .kkey{height:64px;border-radius:50%;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.15);color:#fff;font-size:24px;font-weight:500}
    .kkey:active{background:rgba(255,255,255,0.12)}

    /* MECHANIC CARD */
    .mech-card{background:rgba(15,30,60,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:18px;margin-bottom:12px}
    .mech-stats{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap}
    .mech-stat{text-align:center}
    .mech-stat-val{font-size:22px;font-weight:900;color:#ffa500}
    .mech-stat-lab{font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

    /* SCROLLBAR */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}

    /* EMPTY STATE */
    .empty{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.35);font-size:14px}

    /* EXPANDABLE ROW */
    .expand-row{background:rgba(9,20,48,0.6);border-left:2px solid rgba(255,165,0,0.3);padding:14px 16px;margin-top:2px;border-radius:0 0 10px 10px}

    /* CHART CONTAINER */
    .chart-wrap{position:relative;height:200px}

    /* MODAL */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal-box{background:#0d1f3d;border:1px solid rgba(255,255,255,0.15);border-radius:18px;padding:24px;max-width:500px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,0.6)}

    /* PRINT */
    @media print{
      .sidebar,.topbar,.no-print{display:none!important}
      .main{margin-left:0!important}
      .page{padding:0!important}
      body{background:#fff!important;color:#000!important}
      .panel,.kpi-card,.glass,.alert-card,.mech-card{background:#fff!important;border:1px solid #ddd!important;color:#000!important}
      .panel-title,.kpi-label,.kpi-val,.panel-title-lg{color:#000!important}
    }

    @media(max-width:900px){
      .sidebar{transform:translateX(-100%);transition:transform 0.25s}
      .sidebar.open{transform:translateX(0)}
      .main{margin-left:0}
      .kpi-grid{grid-template-columns:1fr 1fr}
      .g4{grid-template-columns:1fr 1fr}
      .g3{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

function todayIso() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) { if (!d) return "—"; try { return new Date(d).toLocaleDateString("de-DE"); } catch(e){ return d; } }
function fmtDateTime(d) { if (!d) return "—"; try { return new Date(d).toLocaleString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); } catch(e){ return d; } }
function fmtMin(m) { m=parseInt(m||0)||0; if(!m) return "0 min"; var h=Math.floor(m/60),mm=m%60; return h ? h+"h "+mm+"min" : mm+" min"; }
function dateDiff(d) { if (!d) return null; return Math.round((new Date(d) - new Date()) / 86400000); }

function docStatus(diff) {
  if (diff === null) return "none";
  if (diff < 0) return "expired";
  if (diff < 30) return "urgent";
  if (diff < 60) return "warn";
  return "ok";
}
function docColor(st) {
  if (st === "expired") return "#ef4444";
  if (st === "urgent")  return "#ef4444";
  if (st === "warn")    return "#ffa500";
  if (st === "ok")      return "#22c55e";
  return "rgba(255,255,255,0.3)";
}
function docCls(st) {
  if (st === "expired" || st === "urgent") return "doc-urgent";
  if (st === "warn") return "doc-warn";
  if (st === "ok") return "doc-ok";
  return "doc-none";
}

// === Supabase API ===
function sbGet(table, query) {
  return fetch(SB_URL + "/rest/v1/" + table + (query ? "?" + query : ""), {
    headers:{ "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY }
  }).then(function(r){ return r.ok ? r.json() : []; })
    .then(function(d){ return Array.isArray(d) ? d : []; })
    .catch(function(){ return []; });
}

function sbPatch(table, id, body) {
  return fetch(SB_URL + "/rest/v1/" + table + "?id=eq." + encodeURIComponent(id), {
    method:"PATCH",
    headers:{ "Content-Type":"application/json", "apikey":SB_KEY, "Authorization":"Bearer " + SB_KEY, "Prefer":"return=minimal" },
    body:JSON.stringify(body)
  }).then(function(r){ return r.ok; }).catch(function(){ return false; });
}

// === PRINT / EXPORT ===
function printHtml(html, title) {
  var win = window.open("", "_blank");
  if (!win) { alert("Popup blockiert — bitte Popup-Blocker deaktivieren"); return; }
  win.document.write(html);
  win.document.close();
  setTimeout(function(){ win.print(); }, 500);
}

function baseReportStyle() {
  return "<style>body{font-family:Arial,sans-serif;padding:24px;color:#111;max-width:1000px;margin:0 auto}h1{color:#0a1730;margin-bottom:6px}h2{color:#1e4fa0;font-size:14px;margin-bottom:20px;font-weight:400}table{width:100%;border-collapse:collapse;margin-bottom:20px}td,th{padding:9px 11px;border-bottom:1px solid #e0e0e0;text-align:left;font-size:12px}th{background:#0a1730;color:#fff;font-size:11px;letter-spacing:0.5px}tr:nth-child(even){background:#f8f9fc}.sum{background:#f0f4ff;border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;gap:30px}.sum-item{text-align:center}.sum-val{font-size:22px;font-weight:900;color:#0a1730}.sum-lab{font-size:10px;color:#666;text-transform:uppercase;margin-top:2px}@media print{button{display:none}}</style>";
}

function exportJobs(jobs, title, dateLabel) {
  var total = jobs.length;
  var totalMin = jobs.reduce(function(s,j){ return s+(parseInt(j.work_min||0)||0); }, 0);
  var totalCost = jobs.reduce(function(s,j){ return s+(Number(j.cost)||0); }, 0);
  var rows = jobs.map(function(j){
    return "<tr><td>"+(j.date||"")+"</td><td>"+(j.plate||"—")+"</td><td>"+(j.mechanic||"")+"</td><td>"+(WORK_TYPES[j.work_type]||j.work_type||"")+"</td><td>"+(j.description||"").slice(0,80)+"</td><td>"+fmtMin(j.work_min||0)+"</td><td>"+(j.cost?Number(j.cost).toFixed(2)+" €":"—")+"</td><td>"+statusDE(j.status)+"</td></tr>";
  }).join("");
  var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>"+title+"</title>"+baseReportStyle()+"</head><body>"+
    "<h1>WerkFlow — "+title+"</h1><h2>"+dateLabel+"</h2>"+
    "<div class='sum'><div class='sum-item'><div class='sum-val'>"+total+"</div><div class='sum-lab'>Aufträge</div></div>"+
    "<div class='sum-item'><div class='sum-val'>"+fmtMin(totalMin)+"</div><div class='sum-lab'>Arbeitszeit</div></div>"+
    "<div class='sum-item'><div class='sum-val'>"+totalCost.toFixed(2)+" €</div><div class='sum-lab'>Kosten</div></div></div>"+
    "<table><thead><tr><th>Datum</th><th>Fahrzeug</th><th>Mechaniker</th><th>Typ</th><th>Beschreibung</th><th>Zeit</th><th>Kosten</th><th>Status</th></tr></thead><tbody>"+rows+"</tbody></table>"+
    "<button onclick='window.print()' style='background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer'>🖨 Drucken / PDF</button>"+
    "</body></html>";
  printHtml(html, title);
}

function statusDE(s) {
  if (s === "done") return "✓ Fertig";
  if (s === "inProgress") return "⚙ In Arbeit";
  if (s === "paused") return "⏸ Pause";
  return "○ Neu";
}
function statusBadge(s) {
  if (s === "done")       return <span className="badge badge-green">✓ Fertig</span>;
  if (s === "inProgress") return <span className="badge badge-orange">⚙ In Arbeit</span>;
  if (s === "paused")     return <span className="badge badge-blue">⏸ Pause</span>;
  return <span className="badge badge-gray">○ Neu</span>;
}
function urgBadge(u) {
  if (u === "urgent") return <span className="badge badge-red">🚨 Dringend</span>;
  return <span className="badge badge-orange">⚠️ Normal</span>;
}

// === PIN LOGIN ===
function PinLogin({ onLogin }) {
  var _su = useState(null); var selUser = _su[0]; var setSelUser = _su[1];
  var _sp = useState(""); var pin = _sp[0]; var setPin = _sp[1];

        </div>

        {!selUser ? (
          <div className="login-card">
            <div style={{ fontSize:14, fontWeight:700, color:"rgba(255,255,255,0.6)", textAlign:"center", marginBottom:18 }}>Benutzer wählen</div>
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>

function Uebersicht({ jobs, alerts, vehicles, forklifts, washOrders, inspections }) {
  var today = todayIso();
  var todayJobs = jobs.filter(function(j){ return (j.date || (j.created_at||"").slice(0,10)) === today; });
  var openAlerts = alerts.filter(function(a){ return a.status !== "done" && a.status !== "rejected"; });
  var urgentAlerts = openAlerts.filter(function(a){ return (a.urgency||"").includes("urgent"); });

  var allVeh = vehicles.concat(forklifts || []);
  var docProblems = allVeh.filter(function(v){
    var diffs = [v.tuev, v.insurance, v.uvv, v.next_service, v.uvv_datum].filter(Boolean).map(dateDiff);
    return diffs.some(function(d){ return d !== null && d < 30; });
  });

  var todayWash = (washOrders||[]).filter(function(o){ return (o.work_date||"") === today; });
  var washRev = todayWash.reduce(function(s,o){ return s + (Number(o.price_eur)||0); }, 0);

  var last7 = [];
  for (var i = 6; i >= 0; i--) {
    var d = new Date(); d.setDate(d.getDate() - i);
    var iso = d.toISOString().slice(0,10);
    var count = jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10)) === iso; }).length;
    last7.push({ date:iso, label: d.toLocaleDateString("de-DE",{weekday:"short"}), count:count });
  }

  var barRef = useRef(null);
  var chartRef = useRef(null);
  useEffect(function(){
    if (!barRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(barRef.current, {
      type:"bar",
      data:{
        labels: last7.map(function(d){ return d.label; }),
        datasets:[{ data: last7.map(function(d){ return d.count; }),
          backgroundColor:"rgba(255,165,0,0.6)", borderColor:"#ffa500", borderWidth:1, borderRadius:6 }]
      },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
        scales:{ x:{ticks:{color:"rgba(255,255,255,0.5)",font:{size:11}},grid:{display:false}},
          y:{ticks:{color:"rgba(255,255,255,0.5)",font:{size:11},stepSize:1},grid:{color:"rgba(255,255,255,0.06)"}} } }
    });
    return function(){ if (chartRef.current) chartRef.current.destroy(); };
  }, [jobs.length]);

  var workTypeCount = {};
  todayJobs.forEach(function(j){ workTypeCount[j.work_type] = (workTypeCount[j.work_type]||0)+1; });

  var topProblems = {};
  jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10)) >= new Date(Date.now()-30*86400000).toISOString().slice(0,10); })
    .forEach(function(j){ if (j.plate) topProblems[j.plate] = (topProblems[j.plate]||0)+1; });
  var topArr = Object.keys(topProblems).sort(function(a,b){ return topProblems[b]-topProblems[a]; }).slice(0,5);

  return (
    <div>
      <div className="kpi-grid">
        <div className="kpi-card orange">
          <div className="kpi-icon">🔧</div>
          <div className="kpi-val">{todayJobs.length}</div>
          <div className="kpi-label">Aufträge heute</div>
          <div className="kpi-sub" style={{ color:"#ffa500" }}>{todayJobs.filter(function(j){ return j.status==="done"; }).length} erledigt</div>
        </div>
        <div className="kpi-card red">
          <div className="kpi-icon">🚨</div>
          <div className="kpi-val">{openAlerts.length}</div>
          <div className="kpi-label">Offene Meldungen</div>
          <div className="kpi-sub" style={{ color:"#ef4444" }}>{urgentAlerts.length} dringend</div>
        </div>
        <div className="kpi-card" style={{ borderLeft:"3px solid #ef4444" }}>
          <div className="kpi-icon">⚠️</div>
          <div className="kpi-val">{docProblems.length}</div>
          <div className="kpi-label">Dokumente &lt; 30 Tage</div>
          <div className="kpi-sub" style={{ color:"rgba(255,255,255,0.5)" }}>TÜV / UVV / Versicherung</div>
        </div>
        <div className="kpi-card green">
          <div className="kpi-icon">🚿</div>
          <div className="kpi-val">{todayWash.length}</div>
          <div className="kpi-label">Wäschen heute</div>

        <div className="panel">

          {Object.keys(workTypeCount).length === 0

                return (

        </div>
      </div>

      <div className="g2">
        <div className="panel">
          <div className="panel-hd">
            <div className="panel-title">🚨 Letzte Meldungen</div>

        </div>

        <div className="panel">
          <div className="panel-hd"><div className="panel-title">🔥 Top Problemfahrzeuge (30 Tage)</div></div>
          {topArr.length === 0
            ? <div className="empty">Keine Daten</div>

  );

// === TECHNIK ===
function Technik({ vehicles, forklifts, jobs }) {
  var _st = useState("truck"); var vtype = _st[0]; var setVtype = _st[1];
  var _ss = useState(""); var search = _ss[0]; var setSearch = _ss[1];
  var _sd = useState(""); var dateF = _sd[0]; var setDateF = _sd[1];
  var _se = useState(null); var expanded = _se[0]; var setExpanded = _se[1];
  var _sf = useState(false); var onlyProblems = _sf[0]; var setOnlyProblems = _sf[1];

  var TABS = [
    { k:"truck",      label:"🚛 LKW",       types:["truck"] },
    { k:"trailer",    label:"🚜 Auflieger",  types:["semiTrailer","trailer"] },
    { k:"pkw",        label:"🚗 PKW",        types:["pkw"] },
    { k:"forklift",   label:"🏗 Stapler",    types:["forklift","__forklifts__"] },
  ];

  var activeTab = TABS.find(function(t){ return t.k === vtype; }) || TABS[0];
  var isFork = vtype === "forklift";

  var rawList = isFork ? (forklifts||[]) : vehicles.filter(function(v){ return activeTab.types.includes(v.type); });

  var list = rawList.filter(function(v){
    if (!search) return true;
    return ((v.plate||"")+(v.brand||"")+(v.model||"")+(v.nummer||"")).toLowerCase().includes(search.toLowerCase());
  });

  if (onlyProblems) {
    list = list.filter(function(v){
      var fields = isFork ? [v.uvv_datum] : [v.tuev, v.insurance, v.uvv, v.next_service];
      return fields.filter(Boolean).some(function(d){ return dateDiff(d) !== null && dateDiff(d) < 30; });
    });
  }

  function vehJobs(plate) {
    return jobs.filter(function(j){
      var ok = (j.plate||"") === plate;
      if (dateF) ok = ok && (j.date||(j.created_at||"").slice(0,10)) === dateF;
      return ok;
    });
  }

  function worstDocStatus(v) {
    var fields = isFork ? [v.uvv_datum] : [v.tuev, v.insurance, v.uvv, v.next_service];
    var diffs = fields.filter(Boolean).map(dateDiff);
    if (!diffs.length) return "none";
    var mn = Math.min.apply(null, diffs.filter(function(x){ return x !== null; }));
    if (mn < 0) return "expired";
    if (mn < 30) return "urgent";
    if (mn < 60) return "warn";
    return "ok";
  }

  function exportTechnik() {
    var rows = list.map(function(v){
      var ws = worstDocStatus(v);
      return "<tr><td>"+(v.plate||v.nummer||"—")+"</td><td>"+(v.brand||v.hersteller||"")+" "+(v.model||"")+"</td>"+
        "<td>"+(v.tuev||v.uvv_datum||"—")+"</td><td>"+(v.insurance||"—")+"</td><td>"+(v.uvv||"—")+"</td>"+
        "<td>"+(v.next_service||"—")+"</td><td style='color:"+docColor(ws)+"'>"+ws.toUpperCase()+"</td></tr>";
    }).join("");
    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Technik Export</title>"+baseReportStyle()+"</head><body>"+

  var totalMin  = list.reduce(function(s,j){ return s+(parseInt(j.work_min||0)||0); }, 0);

  function doExport() {
    var label = dateFrom || dateTo ? (fmtDate(dateFrom)||"Anfang")+" — "+(fmtDate(dateTo)||"heute") : "Alle Aufträge";
    exportJobs(list, "Archiv — Aufträge", label);
  }

  return (
    <div>
      <div className="panel">
        <div className="panel-hd">
          <div className="panel-title-lg">Archiv</div>
          <button className="btn-outline btn-small no-print" onClick={doExport}>📄 Export</button>
        </div>
        <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:14, alignItems:"center" }}>
          <input type="date" className="inp" value={dateFrom} onChange={function(e){ setDateFrom(e.target.value); }} placeholder="Von" />
          <input type="date" className="inp" value={dateTo} onChange={function(e){ setDateTo(e.target.value); }} placeholder="Bis" />
          <select className="inp" value={mechF} onChange={function(e){ setMechF(e.target.value); }}>
            <option value="">Alle Mechaniker</option>
            {MECHANICS.map(function(m){ return <option key={m.id} value={m.id}>{m.name}</option>; })}
          </select>
          <select className="inp" value={typeF} onChange={function(e){ setTypeF(e.target.value); }}>
            <option value="">Alle Typen</option>
            {Object.keys(WORK_TYPES).map(function(k){ return <option key={k} value={k}>{WORK_TYPES[k]}</option>; })}
          </select>
          <input className="inp" style={{ flex:1, minWidth:180 }} value={search} placeholder="Suche KZ / Beschreibung..." onChange={function(e){ setSearch(e.target.value); }} />
          <button className="btn-outline btn-small" onClick={function(){ setDateFrom(""); setDateTo(""); setMechF(""); setTypeF(""); setSearch(""); }}>✕ Reset</button>
        </div>
        <div style={{ display:"flex", gap:20, marginBottom:14, fontSize:13, color:"rgba(255,255,255,0.6)" }}>
          <span>{list.length} Aufträge</span>
          <span>⏱ {fmtMin(totalMin)}</span>
          <span>💶 {totalCost.toFixed(2)} €</span>
        </div>
        {list.length === 0
          ? <div className="empty">Keine Aufträge gefunden</div>
          : <table className="tbl">
              <thead><tr><th>Datum</th><th>Fahrzeug</th><th>Mechaniker</th><th>Typ</th><th>Beschreibung</th><th>Zeit</th><th>Kosten</th><th>Status</th></tr></thead>
              <tbody>
                {list.slice(0,200).map(function(j){
                  return (
                    <tr key={j.id}>
                      <td style={{ fontSize:12, color:"rgba(255,255,255,0.5)", whiteSpace:"nowrap" }}>{j.date||(j.created_at||"").slice(0,10)}</td>
                      <td><strong>{j.plate||"—"}</strong></td>
                      <td style={{ fontSize:12 }}>{j.mechanic||"—"}</td>
                      <td style={{ fontSize:12 }}>{WORK_TYPES[j.work_type]||j.work_type||"—"}</td>
                      <td style={{ fontSize:12, maxWidth:180, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", color:"rgba(255,255,255,0.65)" }}>{j.description||"—"}</td>
                      <td style={{ fontSize:12, whiteSpace:"nowrap" }}>{fmtMin(j.work_min||0)}</td>
                      <td style={{ fontSize:12, color:"#ffa500" }}>{j.cost?Number(j.cost).toFixed(2)+" €":"—"}</td>
                      <td>{statusBadge(j.status)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
        }
        {list.length > 200 && <div style={{ textAlign:"center", fontSize:12, color:"rgba(255,255,255,0.35)", marginTop:8 }}>Zeige erste 200 — Filter verwenden für genauere Suche</div>}
      </div>
    </div>
  );
}

// === KOSTEN ===
function Kosten({ jobs, invoices, vehicles, forklifts }) {
  var _sp = useState("month"); var period = _sp[0]; var setPeriod = _sp[1];

  function periodStart() {
    var d = new Date();
    if (period === "month") { d.setDate(1); return d.toISOString().slice(0,10); }
    if (period === "quarter") { d.setMonth(Math.floor(d.getMonth()/3)*3, 1); return d.toISOString().slice(0,10); }
    if (period === "year") { d.setMonth(0,1); return d.toISOString().slice(0,10); }
    return "";
  }

  var start = periodStart();
  var filtered = start ? jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10)) >= start; }) : jobs;
  var filtInv = start ? invoices.filter(function(i){ return (i.date||"") >= start; }) : invoices;

  var totalLabor = filtered.reduce(function(s,j){ return s+(Number(j.labor_cost)||0); }, 0);
  var totalParts = filtered.reduce(function(s,j){ return s+(Number(j.parts_cost)||0); }, 0);
  var totalInv   = filtInv.reduce(function(s,i){ return s+(Number(i.total_eur)||0); }, 0);
  var totalAll   = totalLabor + totalParts + totalInv;

  var byVeh = {};
  filtered.forEach(function(j){
    if (!j.plate) return;
    if (!byVeh[j.plate]) byVeh[j.plate] = { labor:0, parts:0, jobs:0, min:0 };
    byVeh[j.plate].labor += Number(j.labor_cost)||0;
    byVeh[j.plate].parts += Number(j.parts_cost)||0;
    byVeh[j.plate].jobs++;
    byVeh[j.plate].min += parseInt(j.work_min||0)||0;
  });
  var topVeh = Object.keys(byVeh).sort(function(a,b){
    return (byVeh[b].labor+byVeh[b].parts) - (byVeh[a].labor+byVeh[a].parts);
  }).slice(0,10);

  var byMech = {};
  filtered.forEach(function(j){
    if (!j.mechanic) return;
    if (!byMech[j.mechanic]) byMech[j.mechanic] = { labor:0, jobs:0, min:0 };
    byMech[j.mechanic].labor += Number(j.labor_cost)||0;
    byMech[j.mechanic].jobs++;
    byMech[j.mechanic].min += parseInt(j.work_min||0)||0;
  });

  var byType = {};
  filtered.forEach(function(j){
    var t = j.work_type||"other";
    if (!byType[t]) byType[t] = { cost:0, jobs:0 };
    byType[t].cost += (Number(j.labor_cost)||0)+(Number(j.parts_cost)||0);
    byType[t].jobs++;
  });

  function exportKosten() {
    var rows = topVeh.map(function(p){
      var v = byVeh[p];
      return "<tr><td>"+p+"</td><td>"+(v.labor.toFixed(2))+" €</td><td>"+(v.parts.toFixed(2))+" €</td><td>"+((v.labor+v.parts).toFixed(2))+" €</td><td>"+v.jobs+"</td><td>"+fmtMin(v.min)+"</td></tr>";
    }).join("");
    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Kostenanalyse</title>"+baseReportStyle()+"</head><body>"+
      "<h1>WerkFlow — Kostenanalyse</h1><h2>Zeitraum: "+fmtDate(start)+" — heute</h2>"+
      "<div class='sum'><div class='sum-item'><div class='sum-val'>"+totalAll.toFixed(2)+" €</div><div class='sum-lab'>Gesamt</div></div>"+
      "<div class='sum-item'><div class='sum-val'>"+totalLabor.toFixed(2)+" €</div><div class='sum-lab'>Lohnkosten</div></div>"+
      "<div class='sum-item'><div class='sum-val'>"+totalParts.toFixed(2)+" €</div><div class='sum-lab'>Ersatzteile</div></div>"+
      "<div class='sum-item'><div class='sum-val'>"+totalInv.toFixed(2)+" €</div><div class='sum-lab'>Rechnungen</div></div></div>"+
      "<h2 style='margin-bottom:10px'>Kosten je Fahrzeug</h2>"+
      "<table><thead><tr><th>Kennzeichen</th><th>Lohn</th><th>Teile</th><th>Gesamt</th><th>Aufträge</th><th>Arbeitszeit</th></tr></thead><tbody>"+rows+"</tbody></table>"+
      "<button onclick='window.print()' style='background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer'>🖨 Drucken / PDF</button></body></html>";
    printHtml(html, "Kostenanalyse");
  }

  return (
    <div>
      <div style={{ display:"flex", gap:8, marginBottom:20, alignItems:"center" }}>
        <div style={{ fontSize:18, fontWeight:900, flex:1 }}>Kostenanalyse</div>
        {[["month","Monat"],["quarter","Quartal"],["year","Jahr"],["all","Gesamt"]].map(function(p){
          return <button key={p[0]} className={"btn-small "+(period===p[0]?"btn-primary":"btn-outline")} onClick={function(){ setPeriod(p[0]); }}>{p[1]}</button>;
        })}
        <button className="btn-outline btn-small no-print" onClick={exportKosten}>Export</button>
      </div>

      <div className="kpi-grid">
        <div className="kpi-card orange"><div className="kpi-icon" style={{ fontSize:18 }}>∑</div><div className="kpi-val">{totalAll.toFixed(0)} €</div><div className="kpi-label">Gesamtkosten</div></div>
        <div className="kpi-card blue"><div className="kpi-icon" style={{ fontSize:18 }}>⏱</div><div className="kpi-val">{totalLabor.toFixed(0)} €</div><div className="kpi-label">Lohnkosten</div></div>
        <div className="kpi-card purple"><div className="kpi-icon" style={{ fontSize:18 }}>⚙</div><div className="kpi-val">{totalParts.toFixed(0)} €</div><div className="kpi-label">Ersatzteile</div></div>
        <div className="kpi-card green"><div className="kpi-icon" style={{ fontSize:18 }}>🧾</div><div className="kpi-val">{totalInv.toFixed(0)} €</div><div className="kpi-label">Rechnungen</div></div>
      </div>

      <div className="g2">
        <div className="panel">
          <div className="panel-hd"><div className="panel-title">Kosten je Fahrzeug (Top 10)</div></div>
          {topVeh.length === 0 ? <div className="empty">Keine Daten</div> :
            <table className="tbl">
              <thead><tr><th>Kennzeichen</th><th>Lohn</th><th>Teile</th><th>Gesamt</th><th>Aufträge</th></tr></thead>
              <tbody>
                {topVeh.map(function(p){
                  var v = byVeh[p];
                  var total = v.labor + v.parts;
                  return (
                    <tr key={p}>
                      <td><strong>{p}</strong></td>
                      <td style={{ fontSize:12, color:"rgba(255,255,255,0.6)" }}>{v.labor.toFixed(2)} €</td>
                      <td style={{ fontSize:12, color:"rgba(255,255,255,0.6)" }}>{v.parts.toFixed(2)} €</td>
                      <td style={{ color:"#ffa500", fontWeight:700 }}>{total.toFixed(2)} €</td>
                      <td style={{ fontSize:12 }}>{v.jobs}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          }
        </div>

        <div className="panel">
          <div className="panel-hd"><div className="panel-title">Kosten je Mechaniker</div></div>
          {Object.keys(byMech).length === 0 ? <div className="empty">Keine Daten</div> :
            Object.keys(byMech).map(function(id){
              var m = byMech[id];
              return (
                <div key={id} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 0", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                  <div style={{ flex:1, fontWeight:700, fontSize:13 }}>{id}</div>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>{m.jobs} Auftr. · {fmtMin(m.min)}</div>
                  <div style={{ fontWeight:800, color:"#ffa500", minWidth:70, textAlign:"right" }}>{m.labor.toFixed(2)} €</div>
                </div>
              );
            })
          }
          <div style={{ marginTop:14 }}>
            <div className="panel-title" style={{ marginBottom:10 }}>Kosten je Arbeitstyp</div>
            {Object.keys(byType).map(function(t){
              var x = byType[t];
              return (
                <div key={t} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                  <div style={{ flex:1, fontSize:12 }}>{WORK_TYPES[t]||t}</div>
                  <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>{x.jobs}x</div>
                  <div style={{ fontWeight:700, color:"#ffa500", fontSize:13, minWidth:70, textAlign:"right" }}>{x.cost.toFixed(2)} €</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// === RECHNUNGEN ===
function Rechnungen({ invoices, vehicles, jobs, onRefresh, loading }) {
  var _sd = useState(""); var dateF = _sd[0]; var setDateF = _sd[1];

  var total = list.reduce(function(s,i){ return s+(Number(i.total_eur)||0); }, 0);

      "<table><thead><tr><th>Datum</th><th>Lieferant</th><th>Beleg-Nr.</th><th>Fahrzeug</th><th>Betrag</th><th>Status</th><th>Notizen</th></tr></thead><tbody>"+rows+"</tbody></table>"+

        <div className="kpi-card blue" style={{ flex:1 }}><div style={{ fontSize:22, fontWeight:900 }}>{total.toFixed(2)} €</div><div className="kpi-label">Gesamt</div></div>
        <div className="kpi-card red" style={{ flex:1 }}><div style={{ fontSize:22, fontWeight:900 }}>{unpaid.toFixed(2)} €</div><div className="kpi-label">Offene Beträge</div></div>
      </div>
      <div className="panel">
        <div className="panel-hd">
          <div className="panel-title-lg">Rechnungen</div>
          <div style={{ display:"flex", gap:8 }}>
            <button className="btn-outline btn-small no-print" onClick={exportInv}>Export</button>
            <button className="btn-outline btn-small no-print" onClick={onRefresh}>{loading?"...":"↻"}</button>
          </div>
        </div>
        <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap", alignItems:"center" }}>
          {[["all","Alle"],["unpaid","Offen"],["paid","Bezahlt"]].map(function(f){
            return <button key={f[0]} className={"btn-small "+(paidF===f[0]?"btn-primary":"btn-outline")} onClick={function(){ setPaidF(f[0]); }}>{f[1]}</button>;

              <thead><tr><th>Datum</th><th>Lieferant</th><th>Beleg-Nr.</th><th>Fahrzeug</th><th>Auftrag</th><th>Betrag</th><th>Status</th><th>Notizen</th></tr></thead>

// === WARTUNGSPLAN ===
function Wartungsplan({ plans, vehicles, forklifts, onRefresh, loading }) {
  var _sf = useState("all"); var filter = _sf[0]; var setFilter = _sf[1];

  var allVeh = vehicles.concat(forklifts||[]);

  function planStatus(p) {
    var today = new Date();
    var byDate = p.next_service_date ? Math.round((new Date(p.next_service_date) - today) / 86400000) : null;
    if (byDate !== null) {
      if (byDate < 0) return "expired";
      if (byDate < 14) return "urgent";
      if (byDate < 30) return "warn";
    }
    return "ok";
  }

  var list = plans;
  if (filter === "expired") list = list.filter(function(p){ return planStatus(p) === "expired"; });
  if (filter === "urgent")  list = list.filter(function(p){ return ["expired","urgent"].includes(planStatus(p)); });
  if (filter === "warn")    list = list.filter(function(p){ return ["expired","urgent","warn"].includes(planStatus(p)); });

  var expiredCount = plans.filter(function(p){ return planStatus(p) === "expired"; }).length;
  var urgentCount  = plans.filter(function(p){ return planStatus(p) === "urgent"; }).length;
  var warnCount    = plans.filter(function(p){ return planStatus(p) === "warn"; }).length;

  function exportPlan() {
    var rows = list.map(function(p){
      var st = planStatus(p);
      var diff = p.next_service_date ? Math.round((new Date(p.next_service_date)-new Date())/86400000) : null;
      return "<tr><td>"+(p.vehicle_plate||p.vehicle_id||"—")+"</td>"+
        "<td>"+(p.interval_days?" alle "+p.interval_days+" Tage":"—")+"</td>"+
        "<td>"+(p.interval_km?" alle "+p.interval_km+" km":"—")+"</td>"+
        "<td>"+(fmtDate(p.last_service_date)||"—")+"</td>"+
        "<td>"+(fmtDate(p.next_service_date)||"—")+"</td>"+
        "<td>"+(diff!==null?(diff<0?Math.abs(diff)+" Tage überfällig":diff+" Tage"):"—")+"</td>"+
        "<td style='color:"+docColor(st)+"'>"+st.toUpperCase()+"</td></tr>";
    }).join("");
    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Wartungsplan</title>"+baseReportStyle()+"</head><body>"+
      "<h1>WerkFlow — Wartungsplan</h1>"+
      "<table><thead><tr><th>Fahrzeug</th><th>Intervall (Zeit)</th><th>Intervall (km)</th><th>Letztes TO</th><th>Nächstes TO</th><th>In/Vor</th><th>Status</th></tr></thead><tbody>"+rows+"</tbody></table>"+
      "<button onclick='window.print()' style='background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer'>🖨 Drucken / PDF</button></body></html>";
    printHtml(html, "Wartungsplan");
  }

  return (
    <div>
      <div className="g3" style={{ marginBottom:16 }}>
        <div className="kpi-card red"><div style={{ fontSize:22, fontWeight:900 }}>{expiredCount}</div><div className="kpi-label">Überfällig</div></div>
        <div className="kpi-card orange"><div style={{ fontSize:22, fontWeight:900 }}>{urgentCount}</div><div className="kpi-label">Dringend (&lt;14 Tage)</div></div>
        <div className="kpi-card" style={{ borderLeft:"3px solid #ffa500" }}><div style={{ fontSize:22, fontWeight:900 }}>{warnCount}</div><div className="kpi-label">Bald fällig (&lt;30 Tage)</div></div>
      </div>
      <div className="panel">
        <div className="panel-hd">
          <div className="panel-title-lg">Wartungsplan</div>
          <div style={{ display:"flex", gap:8 }}>
            <button className="btn-outline btn-small no-print" onClick={exportPlan}>Export</button>
            <button className="btn-outline btn-small no-print" onClick={onRefresh}>{loading?"...":"↻"}</button>
          </div>
        </div>
        <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
          {[["all","Alle"],["urgent","Dringend"],["warn","Bald fällig"],["expired","Überfällig"]].map(function(f){
            return <button key={f[0]} className={"btn-small "+(filter===f[0]?"btn-primary":"btn-outline")} onClick={function(){ setFilter(f[0]); }}>{f[1]}</button>;
          })}
        </div>
        {list.length === 0
          ? <div className="empty">{plans.length === 0 ? "Noch keine Wartungspläne — Daten in Supabase eintragen" : "Keine Einträge für diesen Filter"}</div>
          : <table className="tbl">
              <thead><tr><th>Fahrzeug</th><th>Letztes TO</th><th>Nächstes TO</th><th>Intervall</th><th>Fälligkeit</th><th>Status</th></tr></thead>
              <tbody>
                {list.map(function(p){
                  var st = planStatus(p);
                  var diff = p.next_service_date ? Math.round((new Date(p.next_service_date)-new Date())/86400000) : null;
                  var veh = allVeh.find(function(v){ return (v.plate||v.nummer||"") === (p.vehicle_plate||""); });
                  return (
                    <tr key={p.id}>
                      <td>
                        <div style={{ fontWeight:700 }}>{p.vehicle_plate||p.vehicle_id||"—"}</div>
                        {veh && <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>{veh.brand||veh.hersteller||""} {veh.model||""}</div>}
                      </td>
                      <td style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>{fmtDate(p.last_service_date)||"—"}</td>
                      <td style={{ fontWeight:700 }}>{fmtDate(p.next_service_date)||"—"}</td>
                      <td style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>
                        {p.interval_days ? p.interval_days+"d" : ""}{p.interval_days && p.interval_km ? " / " : ""}{p.interval_km ? p.interval_km+"km" : ""}
                      </td>
                      <td>
                        {diff !== null
                          ? <span style={{ fontWeight:700, color: diff<0?"#ef4444":diff<14?"#ef4444":diff<30?"#ffa500":"#22c55e" }}>
                              {diff < 0 ? Math.abs(diff)+"d überfällig" : "in "+diff+"d"}
                            </span>
                          : "—"
                        }
                      </td>
                      <td>
                        <span className={"badge "+(st==="expired"||st==="urgent"?"badge-red":st==="warn"?"badge-orange":"badge-green")}>
                          {st==="expired"?"Überfällig":st==="urgent"?"Dringend":st==="warn"?"Bald":"OK"}
                        </span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
        }
        <div style={{ marginTop:16, padding:"12px 14px", borderRadius:10, background:"rgba(255,255,255,0.04)", fontSize:12, color:"rgba(255,255,255,0.4)", lineHeight:1.6 }}>
          💡 Wartungspläne werden in Supabase → Tabelle <strong style={{ color:"rgba(255,255,255,0.6)" }}>maintenance_plans</strong> gepflegt.
          Felder: vehicle_plate, interval_days, interval_km, last_service_date, next_service_date
        </div>
      </div>
    </div>
  );
}

// === SCHICHTBERICHT ===
function genSchichtbericht(jobs, date, mechanics) {
  var dateLabel = fmtDate(date) || "Heute";
  var allMechSections = mechanics.map(function(mech){
    var mj = jobs.filter(function(j){ return j.mechanic === mech.id && (j.date||(j.created_at||"").slice(0,10)) === date; });
    var totalMin  = mj.reduce(function(s,j){ return s+(parseInt(j.work_min||0)||0); }, 0);
    var totalCost = mj.reduce(function(s,j){ return s+(Number(j.cost)||0); }, 0);
    var done = mj.filter(function(j){ return j.status==="done"; }).length;
    if (mj.length === 0) return "";
    var rows = mj.map(function(j){
      return "<tr><td style='font-weight:700'>"+(j.plate||"—")+"</td>"+
        "<td>"+(WORK_TYPES[j.work_type]||j.work_type||"—")+"</td>"+
        "<td>"+(j.location||"—")+"</td>"+
        "<td style='max-width:200px'>"+(j.description||"").slice(0,80)+"</td>"+
        "<td>"+fmtMin(j.work_min||0)+"</td>"+
        "<td style='font-weight:700;color:#d97706'>"+(j.cost?Number(j.cost).toFixed(2)+" €":"—")+"</td>"+
        "<td style='color:"+(j.status==="done"?"#16a34a":"#d97706")+"'>"+(j.status==="done"?"✓ Fertig":"⚙ In Arbeit")+"</td></tr>";
    }).join("");
    return "<div style='margin-bottom:28px;page-break-inside:avoid'>"+
      "<h2 style='color:#1a3a6b;margin-bottom:4px'>"+mech.name+"</h2>"+
      "<p style='color:#64748b;font-size:13px;margin-bottom:10px'>"+mj.length+" Aufträge · "+done+" erledigt · "+fmtMin(totalMin)+" · "+totalCost.toFixed(2)+" €</p>"+
      "<table><thead><tr><th>Fahrzeug</th><th>Typ</th><th>Standort</th><th>Beschreibung</th><th>Zeit</th><th>Kosten</th><th>Status</th></tr></thead>"+
      "<tbody>"+rows+"</tbody></table></div>";
  }).join("");

  var allJobs = jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10)) === date; });
  var grand = { jobs:allJobs.length, min:allJobs.reduce(function(s,j){ return s+(parseInt(j.work_min||0)||0); },0), cost:allJobs.reduce(function(s,j){ return s+(Number(j.cost)||0); },0) };

  var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Schichtbericht "+dateLabel+"</title>"+baseReportStyle()+
    "</head><body>"+
    "<h1 style='margin-bottom:4px'>WerkFlow — Schichtbericht</h1>"+
    "<h2 style='margin-bottom:20px'>"+dateLabel+" · LTG Werkstatt</h2>"+
    "<div class='sum'>"+
    "<div class='sum-item'><div class='sum-val'>"+grand.jobs+"</div><div class='sum-lab'>Aufträge gesamt</div></div>"+
    "<div class='sum-item'><div class='sum-val'>"+fmtMin(grand.min)+"</div><div class='sum-lab'>Arbeitszeit</div></div>"+
    "<div class='sum-item'><div class='sum-val'>"+grand.cost.toFixed(2)+" €</div><div class='sum-lab'>Gesamtkosten</div></div>"+
    "</div>"+
    allMechSections+
    "<button onclick='window.print()' style='background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer'>🖨 Drucken / PDF</button>"+
    "</body></html>";
  printHtml(html, "Schichtbericht");
}

// === APP SHELL ===
function AppShell({ user, onLogout }) {
  var _sec = useState("uebersicht"); var sec = _sec[0]; var setSec = _sec[1];
  var _sj = useState([]); var jobs = _sj[0]; var setJobs = _sj[1];
  var _sa = useState([]); var alerts = _sa[0]; var setAlerts = _sa[1];
  var _sv = useState([]); var vehicles = _sv[0]; var setVehicles = _sv[1];
  var _sfk = useState([]); var forklifts = _sfk[0]; var setForklifts = _sfk[1];
  var _sst = useState([]); var stock = _sst[0]; var setStock = _sst[1];
  var _swash = useState([]); var washOrders = _swash[0]; var setWashOrders = _swash[1];
  var _sins = useState([]); var inspections = _sins[0]; var setInspections = _sins[1];
  var _sinv = useState([]); var invoices = _sinv[0]; var setInvoices = _sinv[1];
  var _splans = useState([]); var plans = _splans[0]; var setPlans = _splans[1];
  var _sload = useState(false); var loading = _sload[0]; var setLoading = _sload[1];
  var _sdb = useState(null); var dbOk = _sdb[0]; var setDbOk = _sdb[1];
  var _sshift = useState(todayIso()); var shiftDate = _sshift[0]; var setShiftDate = _sshift[1];

  function loadAll() {
    setLoading(true);
    Promise.all([
      sbGet("jobs",               "select=*&order=created_at.desc&limit=500"),
      sbGet("alerts",             "select=*&order=created_at.desc&limit=200"),
      sbGet("vehicles",           "select=*&order=plate.asc&limit=500"),
      sbGet("forklifts",          "select=*&order=nummer.asc&limit=200"),
      sbGet("stock",              "select=*&order=name.asc&limit=300"),
      sbGet("wash_orders",        "select=*&order=created_at.desc&limit=300"),
      sbGet("inspections",        "select=*&order=created_at.desc&limit=300"),
      sbGet("invoices",           "select=*&order=date.desc&limit=300"),
      sbGet("maintenance_plans",  "select=*&order=next_service_date.asc&limit=300"),
    ]).then(function(r){
      setJobs(r[0]); setAlerts(r[1]); setVehicles(r[2]); setForklifts(r[3]);
      setStock(r[4]); setWashOrders(r[5]); setInspections(r[6]);
      setInvoices(r[7]); setPlans(r[8]);
      setDbOk(true); setLoading(false);
    }).catch(function(e){ console.error(e); setDbOk(false); setLoading(false); });
  }

  useEffect(function(){ loadAll(); }, []);

  useEffect(function(){
    var interval = setInterval(function(){ loadAll(); }, 30000);
    return function(){ clearInterval(interval); };
  }, []);

  var openAlerts = alerts.filter(function(a){ return a.status !== "done" && a.status !== "rejected"; });
  var lowStock = stock.filter(function(s){ return s.qty<=(s.min_qty||0); }).length;
  var overduePlans = plans.filter(function(p){
    if (!p.next_service_date) return false;
    return Math.round((new Date(p.next_service_date)-new Date())/86400000) < 14;
  }).length;

  var NAV = [
    { k:"uebersicht",  ic: IC.home,     label:"Übersicht" },
    { k:"eingang",     ic: IC.inbox,    label:"Eingang",      badge: openAlerts.length },
    { k:"mechaniker",  ic: IC.wrench,   label:"Mechaniker" },
    { k:"technik",     ic: IC.truck,    label:"Technik" },
    { k:"inspektion",  ic: IC.search,   label:"Inspektion" },
    { k:"waschhalle",  ic: IC.droplet,  label:"Waschhalle" },
    { k:"lager",       ic: IC.box,      label:"Lager",         badge: lowStock, badgeCls:"orange" },
    { k:"kosten",      ic: IC.euro,     label:"Kosten" },
    { k:"rechnungen",  ic: IC.receipt,  label:"Rechnungen" },
    { k:"wartung",     ic: IC.calendar, label:"Wartungsplan",  badge: overduePlans, badgeCls:"" },
    { k:"archiv",      ic: IC.archive,  label:"Archiv" },
  ];

  var PAGE_TITLES = {
    uebersicht:"Übersicht", eingang:"Eingang", mechaniker:"Mechaniker",
    technik:"Technik — Fuhrpark", inspektion:"Inspektion", waschhalle:"Waschhalle",
    lager:"Lager", kosten:"Kostenanalyse", rechnungen:"Rechnungen",
    wartung:"Wartungsplan", archiv:"Archiv"
  };

  return (
    <div className="dash-layout">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-text">
            <span style={{ color:"#fff" }}>Werk</span><span style={{ color:"#ffa500" }}>Flow</span>
          </div>
          <div className="sidebar-subtitle">Dashboard</div>
        </div>
        <div className="sidebar-nav">
          {NAV.map(function(n){
            return (
              <button key={n.k} className={"nav-item" + (sec===n.k ? " active" : "")} onClick={function(){ setSec(n.k); }}>
                <span style={{ display:"flex", alignItems:"center", flexShrink:0 }}>{n.ic}</span>
                <span>{n.label}</span>
                {n.badge > 0 && <span className={"nav-badge " + (n.badgeCls||"")}>{n.badge}</span>}
              </button>
            );
          })}
        </div>
        <div className="sidebar-footer">
          <div className="sidebar-user">
            <div className="sidebar-avatar">{user.avatar}</div>
            <div>
              <div className="sidebar-name">{user.name}</div>
              <div className="sidebar-role">{user.role==="chef"?"Chef":"Fuhrparkleiter"}</div>
            </div>
          </div>
          <div style={{ marginTop:12, display:"flex", gap:6, alignItems:"center" }}>
            <input type="date" className="inp" style={{ flex:1, fontSize:11, padding:"5px 8px" }} value={shiftDate} onChange={function(e){ setShiftDate(e.target.value); }} />
            <button onClick={function(){ genSchichtbericht(jobs, shiftDate, MECHANICS); }}
              style={{ flexShrink:0, padding:"5px 10px", border:"1px solid rgba(255,165,0,0.35)", background:"rgba(255,165,0,0.08)", color:"#ffa500", borderRadius:8, fontSize:11, fontWeight:700, whiteSpace:"nowrap" }}>
              {IC.report} Schicht
            </button>
          </div>
          <button onClick={onLogout} style={{ marginTop:8, width:"100%", padding:"7px", border:"1px solid rgba(255,255,255,0.12)", background:"transparent", color:"rgba(255,255,255,0.5)", borderRadius:8, fontSize:12, fontWeight:700 }}>
            ↩ Abmelden
          </button>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div style={{ display:"flex", alignItems:"center", color:"rgba(255,255,255,0.6)" }}>
            {NAV.find(function(n){ return n.k===sec; }) && NAV.find(function(n){ return n.k===sec; }).ic}
          </div>
          <div className="topbar-title" style={{ marginLeft:8 }}>{PAGE_TITLES[sec]||sec}</div>
          <div style={{ fontSize:12, color: dbOk===false?"#ef4444":dbOk===true?"#22c55e":"#ffa500", marginLeft:8 }}>
            {dbOk===false?"● Fehler":dbOk===true?"● Online":"● Lädt"}
          </div>
          <div className="topbar-right">
            <span style={{ fontSize:12, color:"rgba(255,255,255,0.35)" }}>{new Date().toLocaleDateString("de-DE",{weekday:"long",day:"2-digit",month:"2-digit",year:"numeric"})}</span>
            <button className="topbar-refresh no-print" onClick={loadAll}>{loading ? "⏳" : "↻ Aktualisieren"}</button>
          </div>
        </div>

        <div className="page">
          {sec === "uebersicht"  && <Uebersicht jobs={jobs} alerts={alerts} vehicles={vehicles} forklifts={forklifts} washOrders={washOrders} inspections={inspections} />}
          {sec === "eingang"     && <Eingang alerts={alerts} onRefresh={loadAll} loading={loading} />}
          {sec === "mechaniker"  && <Mechaniker jobs={jobs} onRefresh={loadAll} loading={loading} />}
          {sec === "technik"     && <Technik vehicles={vehicles} forklifts={forklifts} jobs={jobs} />}
          {sec === "inspektion"  && <Inspektion inspections={inspections} onRefresh={loadAll} loading={loading} />}
          {sec === "waschhalle"  && <Waschhalle washOrders={washOrders} onRefresh={loadAll} loading={loading} />}
          {sec === "lager"       && <Lager stock={stock} onRefresh={loadAll} loading={loading} />}
          {sec === "kosten"      && <Kosten jobs={jobs} invoices={invoices} vehicles={vehicles} forklifts={forklifts} />}
          {sec === "rechnungen"  && <Rechnungen invoices={invoices} vehicles={vehicles} jobs={jobs} onRefresh={loadAll} loading={loading} />}
          {sec === "wartung"     && <Wartungsplan plans={plans} vehicles={vehicles} forklifts={forklifts} onRefresh={loadAll} loading={loading} />}
          {sec === "archiv"      && <Archiv jobs={jobs} />}
        </div>
      </div>
    </div>
  );
}

// === ROOT ===
function App() {
  var _su = useState(null); var user = _su[0]; var setUser = _su[1];
  try {
    var saved = localStorage.getItem("werkflow_dash_user");
    if (saved && !user) {
      var u = JSON.parse(saved);
      if (u && u.id) { setTimeout(function(){ setUser(u); }, 0); }
    }
  } catch(e) {}

  if (!user) {
    return <PinLogin onLogin={function(u){
      try { localStorage.setItem("werkflow_dash_user", JSON.stringify(u)); } catch(e) {}
      setUser(u);
    }} />;
  }
  return <AppShell user={user} onLogout={function(){
    try { localStorage.removeItem("werkflow_dash_user"); } catch(e) {}
    setUser(null);
  }} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
