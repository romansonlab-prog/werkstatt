                    <div style={{ fontSize:10, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>Verfügbarkeit</div>
                    <div style={{ fontSize:28, fontWeight:900, color: vKpi.verfuegbarkeit>=80?"#22c55e":vKpi.verfuegbarkeit>=60?"#ffa500":"#ef4444" }}>{vKpi.verfuegbarkeit}%</div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", marginTop:4 }}>{vKpi.downDays} Tage in Reparatur</div>
                  </div>
                )}
                {vKpi.euroPerKm !== null && (
                  <div style={{ borderRadius:12, padding:"14px 16px", background:"rgba(96,165,250,0.08)", border:"1px solid rgba(96,165,250,0.2)" }}>
                    <div style={{ fontSize:10, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>€ / km</div>
                    <div style={{ fontSize:28, fontWeight:900, color:"#60a5fa" }}>{vKpi.euroPerKm.toFixed(2)}</div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", marginTop:4 }}>Gesamtkosten je km</div>
                  </div>
                )}
                {vKpi.mtbf !== null && (
                  <div style={{ borderRadius:12, padding:"14px 16px", background:"rgba(168,85,247,0.08)", border:"1px solid rgba(168,85,247,0.2)" }}>
                    <div style={{ fontSize:10, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>MTBF</div>
                    <div style={{ fontSize:28, fontWeight:900, color:"#a855f7" }}>{vKpi.mtbf}d</div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", marginTop:4 }}>Ø Tage zwischen Pannen</div>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
              {[
                ["Arbeitskosten gesamt", totalJobCost.toFixed(2)+" €", "#ffa500"],

                ["Gesamtkosten",         (totalJobCost+totalInvCost).toFixed(2)+" €", "#22c55e"],
                ["Arbeitszeit gesamt",   fmtMin(totalMin), "rgba(255,255,255,0.7)"],
                ["Anzahl Aufträge",      vJobs.length+"", "rgba(255,255,255,0.7)"],
                ["Ø Kosten/Auftrag",     vJobs.length ? (totalJobCost/vJobs.length).toFixed(2)+" €" : "—", "rgba(255,255,255,0.7)"],
              ].map(function(item) {
                return (
                  <div key={item[0]} style={{ padding:"16px", borderRadius:12,
                    background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.08)" }}>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.45)", textTransform:"uppercase", letterSpacing:0.5, marginBottom:6 }}>{item[0]}</div>
                    <div style={{ fontSize:22, fontWeight:900, color:item[2] }}>{item[1]}</div>
                  </div>
                );
              })}
            </div>

            {/* LEBENSLAUF CHART */}
            {vJobs.length >= 2 && (
              <div style={{ borderRadius:12, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", padding:"14px 16px", marginBottom:16 }}>
                <div style={{ fontSize:12, fontWeight:700, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:10 }}>Kostenverlauf nach Monat</div>
                <div style={{ height:110 }}>
                  <canvas ref={lebenslaufChartRef}></canvas>
                </div>
              </div>

            {/* По годам */}
            {(function(){
              var byYear = {};
              vJobs.forEach(function(j){
                var yr = (j.date||(j.created_at||"")).slice(0,4);
                if (!yr) return;
                if (!byYear[yr]) byYear[yr] = { jobs:0, cost:0, min:0 };
                byYear[yr].jobs++;
                byYear[yr].cost += Number(j.cost)||0;
                byYear[yr].min  += parseInt(j.work_min||0)||0;
              });
              var years = Object.keys(byYear).sort().reverse();
              if (!years.length) return null;
              return (
                <div style={{ borderRadius:12, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", overflow:"hidden" }}>
                  <div style={{ padding:"12px 16px", borderBottom:"1px solid rgba(255,255,255,0.06)", fontWeight:700, fontSize:13 }}>Nach Jahr</div>
                  <table style={{ width:"100%", borderCollapse:"collapse" }}>
                    <thead>
                      <tr style={{ fontSize:11, color:"rgba(255,255,255,0.4)", textTransform:"uppercase" }}>
                        <th style={{ padding:"8px 16px", textAlign:"left" }}>Jahr</th>
                        <th style={{ padding:"8px 16px", textAlign:"right" }}>Aufträge</th>
                        <th style={{ padding:"8px 16px", textAlign:"right" }}>Kosten</th>
                        <th style={{ padding:"8px 16px", textAlign:"right" }}>Zeit</th>

                      {years.map(function(yr){

                            <td style={{ padding:"10px 16px", textAlign:"right", color:"rgba(255,255,255,0.5)" }}>{fmtMin(d.min)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              );
            })()}
          </div>
        )}

        {/* STAMMDATEN */}
        {tab === "stammdaten" && (
          <div style={{ maxWidth:600 }}>
            <div style={{ borderRadius:12, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", overflow:"hidden" }}>
              {[
                ["Kennzeichen", plate],
                ["Marke / Modell", brand||"—"],
                ["Fahrzeugtyp", VEH_TYPES[vehicle.type]||vehicle.type||"—"],
                ["Fahrgestell-Nr.", vehicle.fahrgestell||"—"],
                ["Baujahr", vehicle.baujahr||"—"],
                ["Kilometerstand", vehicle.mileage ? vehicle.mileage+" km" : "—"],
                ["TÜV", vehicle.tuev||"—"],
                ["Versicherung", vehicle.insurance||"—"],
                ["UVV", vehicle.uvv||"—"],
                ["Nächste Wartung", vehicle.next_service||"—"],
                ["Niederlassung", vehicle.home_niederlassung_id||"—"],

              ].map(function(row, idx) {
                return (
                  <div key={row[0]} style={{ display:"flex", padding:"12px 16px",

                    <div style={{ width:160, fontSize:12, color:"rgba(255,255,255,0.45)", fontWeight:700, textTransform:"uppercase", letterSpacing:0.3, flexShrink:0 }}>{row[0]}</div>
                    <div style={{ fontSize:14, fontWeight:600, color:"#fff" }}>{row[1]}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

// === TECHNIK ===
function Technik({ vehicles, forklifts, jobs, invoices, inspections }) {
  var _st = useState("truck"); var vtype = _st[0]; var setVtype = _st[1];
  var _ss = useState(""); var search = _ss[0]; var setSearch = _ss[1];
  var _sd = useState(""); var dateF = _sd[0]; var setDateF = _sd[1];
  var _se = useState(null); var expanded = _se[0]; var setExpanded = _se[1];
  var _sf = useState(false); var onlyProblems = _sf[0]; var setOnlyProblems = _sf[1];
  var _sakte = useState(null); var akteVehicle = _sakte[0]; var setAkteVehicle = _sakte[1];

  var TABS = [
    { k:"truck",      label:"🚛 LKW",       types:["truck"] },
    { k:"trailer",    label:"🚜 Auflieger",  types:["semiTrailer","trailer"] },
    { k:"pkw",        label:"🚗 PKW",        types:["pkw"] },
    { k:"forklift",   label:"🏗 Stapler",    types:["forklift","__forklifts__"] },
  ];

  var activeTab = TABS.find(function(t){ return t.k === vtype; }) || TABS[0];
  var isFork = vtype === "forklift";

  var rawList = isFork ? (forklifts||[]) : vehicles.filter(function(v){ return activeTab.types.includes(v.type); });

  var list = rawList.filter(function(v){
    if (!search) return true;
    return ((v.plate||"")+(v.brand||"")+(v.model||"")+(v.nummer||"")).toLowerCase().includes(search.toLowerCase());
  });

  if (onlyProblems) {
    list = list.filter(function(v){
      var fields = isFork ? [v.uvv_datum] : [v.tuev, v.insurance, v.uvv, v.next_service];
      return fields.filter(Boolean).some(function(d){ return dateDiff(d) !== null && dateDiff(d) < 30; });
    });
  }

  function vehJobs(plate) {
    return jobs.filter(function(j){
      var ok = (j.plate||"") === plate;
      if (dateF) ok = ok && (j.date||(j.created_at||"").slice(0,10)) === dateF;
      return ok;
    });
  }

  function worstDocStatus(v) {
    var fields = isFork ? [v.uvv_datum] : [v.tuev, v.insurance, v.uvv, v.next_service];
    var diffs = fields.filter(Boolean).map(dateDiff);
    if (!diffs.length) return "none";
    var mn = Math.min.apply(null, diffs.filter(function(x){ return x !== null; }));
    if (mn < 0) return "expired";
    if (mn < 30) return "urgent";
    if (mn < 60) return "warn";
    return "ok";
  }

  function exportTechnik() {
    var rows = list.map(function(v){
      var ws = worstDocStatus(v);
      return "<tr><td>"+(v.plate||v.nummer||"—")+"</td><td>"+(v.brand||v.hersteller||"")+" "+(v.model||"")+"</td>"+
        "<td>"+(v.tuev||v.uvv_datum||"—")+"</td><td>"+(v.insurance||"—")+"</td><td>"+(v.uvv||"—")+"</td>"+
        "<td>"+(v.next_service||"—")+"</td><td style='color:"+docColor(ws)+"'>"+ws.toUpperCase()+"</td></tr>";
    }).join("");
    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Technik Export</title>"+baseReportStyle()+"</head><body>"+
      "<h1>WerkFlow — Technik: "+activeTab.label+"</h1><h2>"+list.length+" Fahrzeuge</h2>"+
      "<table><thead><tr><th>Kennzeichen</th><th>Marke/Modell</th><th>TÜV/UVV</th><th>Versicherung</th><th>UVV</th><th>Wartung</th><th>Status</th></tr></thead><tbody>"+rows+"</tbody></table>"+
      "<button onclick='window.print()' style='background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer'>🖨 Drucken / PDF</button></body></html>";
    printHtml(html, "Technik Export");
  }

  function exportTechnikXlsx() {
    var headers = ["Kennzeichen", "Marke/Modell", "TÜV", "Versicherung", "UVV", "Nächste Wartung", "Status"];
    var rows = list.map(function(v){
      var ws = worstDocStatus(v);
      return {
        "Kennzeichen": v.plate || v.nummer || "",
        "Marke/Modell": ((v.brand||v.hersteller||"") + " " + (v.model||"")).trim(),
        "TÜV": v.tuev || v.uvv_datum || "",
        "Versicherung": v.insurance || "",
        "UVV": v.uvv || "",
        "Nächste Wartung": v.next_service || "",
        "Status": ws.toUpperCase()
      };
    });
    exportXlsx(rows, headers, "Technik — " + activeTab.label, null);
  }

  return (
    <div>
      <div className="panel">
        <div className="panel-hd">
          <div className="panel-title-lg">Technik</div>
          <div style={{ display:"flex", gap:8 }}>
            <button className="btn-outline btn-small no-print" onClick={exportTechnik} title="PDF / Drucken">📄 PDF</button>
            <button className="btn-outline btn-small no-print" onClick={exportTechnikXlsx} title="Excel-Datei"
              style={{ borderColor:"rgba(34,197,94,0.4)", color:"#22c55e" }}>📊 Excel</button>
          </div>
        </div>

        <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" }}>
          {TABS.map(function(t){
            return <button key={t.k} onClick={function(){ setVtype(t.k); setSearch(""); setExpanded(null); }} className={"btn-small " + (vtype===t.k ? "btn-primary" : "btn-outline")}>{t.label}</button>;
          })}
        </div>

        <div style={{ display:"flex", gap:10, marginBottom:14, flexWrap:"wrap", alignItems:"center" }}>
          <input className="inp" style={{ flex:1, minWidth:200 }} value={search} placeholder="Suche: Kennzeichen, Marke..." onChange={function(e){ setSearch(e.target.value); }} />
          <input type="date" className="inp" value={dateF} onChange={function(e){ setDateF(e.target.value); }} />
          <button className={"btn-small " + (onlyProblems ? "btn-primary" : "btn-outline")} onClick={function(){ setOnlyProblems(!onlyProblems); }}>
            ⚠️ Nur Probleme
          </button>
        </div>

        <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", marginBottom:12 }}>{list.length} Fahrzeuge</div>

        {list.length === 0
          ? <div className="empty">Keine Fahrzeuge gefunden</div>
          : <table className="tbl">
              <thead>
                <tr>
                  <th>Kennzeichen</th>
                  {!isFork && <th>Marke / Modell</th>}
                  {isFork && <th>Modell</th>}
                  {!isFork && <th>TÜV</th>}
                  {!isFork && <th>Versicherung</th>}
                  <th>UVV</th>
                  {!isFork && <th>Wartung</th>}
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {list.map(function(v){
                  var plate = v.plate || v.nummer || v.id;
                  var ws = worstDocStatus(v);
                  var isExp = expanded === plate;
                  var vj = vehJobs(plate);

                  function DocChip({ d }) {
                    if (!d) return <span className="doc-chip doc-none">—</span>;
                    var diff = dateDiff(d);
                    var st = docStatus(diff);
                    var cls = docCls(st);
                    return (
                      <span className={"doc-chip " + cls}>
                        {fmtDate(d)}
                        {diff !== null && diff < 60 && <span> ({diff < 0 ? Math.abs(diff)+"d !" : diff+"d"})</span>}
                      </span>
                    );
                  }

                  return [
                    <tr key={plate} style={{ cursor:"pointer" }} onClick={function(){ setExpanded(isExp?null:plate); }}>
                      <td><strong>{plate}</strong></td>
                      <td style={{ fontSize:12, color:"rgba(255,255,255,0.65)" }}>{(v.brand||v.hersteller||"")+" "+(v.model||"")}</td>
                      {!isFork && <td><DocChip d={v.tuev} /></td>}
                      {!isFork && <td><DocChip d={v.insurance} /></td>}
                      <td><DocChip d={v.uvv || v.uvv_datum} /></td>
                      {!isFork && <td><DocChip d={v.next_service} /></td>}
                      <td>
                        <span className={"badge " + (ws==="expired"||ws==="urgent"?"badge-red":ws==="warn"?"badge-orange":ws==="ok"?"badge-green":"badge-gray")}>
                          {ws==="expired"?"Abgelaufen":ws==="urgent"?"Dringend":ws==="warn"?"Bald":ws==="ok"?"OK":"—"}
                        </span>
                      </td>
                      <td>
                        <button onClick={function(e){ e.stopPropagation(); setAkteVehicle(v); }}
                          style={{ padding:"4px 10px", borderRadius:8, border:"1px solid rgba(255,165,0,0.4)",
                            background:"rgba(255,165,0,0.08)", color:"#ffa500", fontWeight:700, fontSize:11, cursor:"pointer" }}>
                          📂 Akte
                        </button>
                      </td>
                      <td style={{ color:"rgba(255,255,255,0.4)", fontSize:12 }}>{isExp ? "▲" : "▼"}</td>
                    </tr>,
                    isExp && (
                      <tr key={plate+"_exp"}>
                        <td colSpan={isFork ? 5 : 8} style={{ padding:0 }}>
                          <div className="expand-row">
                            <div style={{ display:"flex", gap:16, flexWrap:"wrap", marginBottom:10 }}>
                              {v.mileage && <span style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>🛣 {v.mileage} km</span>}
                              {v.baujahr && <span style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>📅 {v.baujahr}</span>}
                              {v.standort && <span style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>📍 {v.standort}</span>}
                              {v.einsatzort && <span style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>{v.einsatzort}</span>}
                              {v.fahrgestell && <span style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>FG: {v.fahrgestell}</span>}
                              {isFork && v.betrieb_std && <span style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>⏱ {v.betrieb_std} Std</span>}
                            </div>
                            <div style={{ fontSize:12, color:"rgba(255,165,0,0.8)", marginBottom:6, fontWeight:700 }}>
                              Aufträge{dateF ? " am "+fmtDate(dateF) : ""}: {vj.length}
                            </div>
                            {vj.slice(0,5).map(function(j){
                              return (
                                <div key={j.id} style={{ fontSize:12, padding:"5px 0", borderBottom:"1px solid rgba(255,255,255,0.05)", display:"flex", gap:10, flexWrap:"wrap" }}>
                                  <span style={{ color:"rgba(255,255,255,0.5)" }}>{j.date||""}</span>
                                  <span>{WORK_TYPES[j.work_type]||j.work_type||"—"}</span>
                                  <span style={{ color:"rgba(255,255,255,0.5)" }}>{(j.description||"").slice(0,60)}</span>
                                  <span style={{ marginLeft:"auto" }}>{fmtMin(j.work_min||0)}</span>
                                  {statusBadge(j.status)}
                                </div>
                              );
                            })}
                          </div>
                        </td>
                      </tr>
                    )
                  ];
                })}
              </tbody>
            </table>
        }
      </div>
      {akteVehicle && (
        <Fahrzeugakte
          vehicle={akteVehicle}
          jobs={jobs}
          invoices={invoices||[]}
          inspections={inspections||[]}
          onClose={function(){ setAkteVehicle(null); }}
        />
      )}
    </div>
  );
}

// === INSPEKTION ===
function Inspektion({ inspections, onRefresh, loading }) {
  var _sf = useState("all"); var filter = _sf[0]; var setFilter = _sf[1];
  var _sd = useState(""); var dateF = _sd[0]; var setDateF = _sd[1];
  var _ss = useState(""); var search = _ss[0]; var setSearch = _ss[1];
  var _se = useState(null); var expanded = _se[0]; var setExpanded = _se[1];

  var list = inspections;
  if (filter === "mangel") list = list.filter(function(i){ return i.status==="mangel"; });
  if (filter === "ok")     list = list.filter(function(i){ return i.status==="ok"; });
  if (dateF) list = list.filter(function(i){ return (i.created_at||"").slice(0,10) === dateF; });
  if (search) list = list.filter(function(i){ return ((i.plate||"")+(i.driver||"")).toLowerCase().includes(search.toLowerCase()); });

  function exportInsp() {
    var rows = list.map(function(i){
      var mangel = {}; try { mangel=JSON.parse(i.mangel||"{}"); } catch(e){}
      var mangelKeys = Object.keys(mangel).filter(function(k){ return mangel[k]; });
      return "<tr><td>"+fmtDateTime(i.created_at)+"</td><td>"+(i.plate||"—")+"</td><td>"+(i.driver||"—")+"</td>"+
        "<td style='color:"+(i.status==="mangel"?"#ef4444":"#22c55e")+"'>"+(i.status==="mangel"?"⚠ "+mangelKeys.length+" Mängel":"✓ OK")+"</td>"+
        "<td>"+(i.note||"—")+"</td></tr>";
    }).join("");
    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Inspektion Export</title>"+baseReportStyle()+"</head><body>"+
      "<h1>WerkFlow — Inspektion</h1><h2>"+list.length+" Einträge</h2>"+
      "<table><thead><tr><th>Datum/Zeit</th><th>Fahrzeug</th><th>Fahrer</th><th>Ergebnis</th><th>Bemerkungen</th></tr></thead><tbody>"+rows+"</tbody></table>"+
      "<button onclick='window.print()' style='background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer'>🖨 Drucken / PDF</button></body></html>";
    printHtml(html, "Inspektion Export");
  }

  function exportInspXlsx() {
    var headers = ["Datum/Zeit", "Fahrzeug", "Fahrer", "Ergebnis", "Anzahl Mängel", "Bemerkungen"];
    var rows = list.map(function(i){
      var mangel = {}; try { mangel=JSON.parse(i.mangel||"{}"); } catch(e){}
      var mangelKeys = Object.keys(mangel).filter(function(k){ return mangel[k]; });
      return {
        "Datum/Zeit": fmtDateTime(i.created_at),
        "Fahrzeug": i.plate || "",
        "Fahrer": i.driver || "",
        "Ergebnis": i.status === "mangel" ? "Mängel" : "OK",
        "Anzahl Mängel": i.status === "mangel" ? mangelKeys.length : 0,
        "Bemerkungen": i.note || ""
      };
    });
    exportXlsx(rows, headers, "Inspektion", [{ label:"Filter", value: dateF ? fmtDate(dateF) : "Alle" }]);
  }

  return (
    <div>
      <div className="panel">
        <div className="panel-hd">
          <div className="panel-title-lg">Inspektion</div>
          <div style={{ display:"flex", gap:8 }}>
            <button className="btn-outline btn-small no-print" onClick={exportInsp} title="PDF / Drucken">📄 PDF</button>
            <button className="btn-outline btn-small no-print" onClick={exportInspXlsx} title="Excel-Datei"
              style={{ borderColor:"rgba(34,197,94,0.4)", color:"#22c55e" }}>📊 Excel</button>
            <button className="btn-outline btn-small no-print" onClick={onRefresh}>{loading ? "..." : "↻"}</button>
          </div>
        </div>
        <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap", alignItems:"center" }}>
          {[["all","Alle"],["mangel","Mit Mängeln"],["ok","OK"]].map(function(f){
            return <button key={f[0]} onClick={function(){ setFilter(f[0]); }} className={"btn-small "+(filter===f[0]?"btn-primary":"btn-outline")}>{f[1]}</button>;
          })}
          <input type="date" className="inp" value={dateF} onChange={function(e){ setDateF(e.target.value); }} />
          <input className="inp" value={search} placeholder="Suche Kennzeichen / Fahrer..." onChange={function(e){ setSearch(e.target.value); }} style={{ flex:1, minWidth:180 }} />
        </div>
        <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", marginBottom:10 }}>{list.length} Einträge</div>
        {list.length === 0
          ? <div className="empty">Keine Einträge gefunden</div>
          : list.map(function(ins){
              var isMangel = ins.status === "mangel";
              var isExp = expanded === ins.id;
              var mangel = {}; try { mangel=JSON.parse(ins.mangel||"{}"); } catch(e){}
              var checks = {}; try { checks=JSON.parse(ins.checks||"{}"); } catch(e){}
              var mangelKeys = Object.keys(mangel).filter(function(k){ return mangel[k]; });
              var photos = []; try { photos=JSON.parse(ins.photos||"[]"); } catch(e){}
              return (
                <div key={ins.id} className={"alert-card" + (isMangel ? " urgent" : "")}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", cursor:"pointer" }} onClick={function(){ setExpanded(isExp?null:ins.id); }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      <span style={{ fontSize:20 }}>{ins.type==="truck"?"🚛":"🚜"}</span>
                      <div>
                        <div style={{ fontWeight:700 }}>{ins.plate||"—"} {ins.brand ? "· "+ins.brand : ""}</div>
                        <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>{ins.driver||"—"} · {fmtDateTime(ins.created_at)}</div>
                      </div>
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      {ins.acknowledged && <span className="badge badge-blue">✓ Zur Kenntnis</span>}
                      <span className={"badge "+(isMangel?"badge-red":"badge-green")}>
                        {isMangel ? "⚠ "+mangelKeys.length+" Mängel" : "✓ OK"}
                      </span>
                      <span style={{ color:"rgba(255,255,255,0.4)", fontSize:12 }}>{isExp?"▲":"▼"}</span>
                    </div>
                  </div>
                  {isExp && (
                    <div className="expand-row" style={{ marginTop:10 }}>
                      {mangelKeys.length > 0 && (
                        <div style={{ marginBottom:10 }}>
                          <div style={{ fontSize:11, fontWeight:700, color:"#ef4444", textTransform:"uppercase", letterSpacing:0.5, marginBottom:6 }}>Mängel:</div>
                          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                            {mangelKeys.map(function(k){ return <span key={k} className="badge badge-red">{k}</span>; })}
                          </div>
                        </div>
                      )}
                      {ins.note && <div style={{ fontSize:13, color:"rgba(255,255,255,0.7)", marginBottom:8 }}>📝 {ins.note}</div>}
                      {photos.length > 0 && (
                        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>
                          {photos.slice(0,6).map(function(u,i){ return <a key={i} href={u} target="_blank" rel="noreferrer"><img src={u} alt="" style={{ width:70, height:70, objectFit:"cover", borderRadius:8, border:"1px solid rgba(255,255,255,0.15)" }} /></a>; })}
                        </div>
                      )}
                      {!ins.acknowledged && (
                        <button className="btn-outline btn-small" onClick={function(e){
                          e.stopPropagation();
                          sbPatch("inspections", ins.id, { acknowledged:true }).then(function(){ onRefresh(); });
                        }}>
                          ✓ Zur Kenntnis genommen
                        </button>
                      )}
                    </div>
                  )}
                </div>
              );
            })
        }
      </div>
    </div>
  );
}

function DUAufliegerDash({ inspections, onRefresh, loading }) {

  var duList = (inspections || []).filter(function(i){ return i.type === "du_auflieger"; });

  var list = duList;

  if (dateF) list = list.filter(function(i){ return (i.date||"") === dateF; });
  if (search) list = list.filter(function(i){

        "<td>" + (i.km_stand||"—") + "</td>" +

    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>DU Auflieger Export</title>" + baseReportStyle() + "</head><body>" +
      "<h1>WerkFlow — DU Auflieger</h1><h2>" + list.length + " Einträge</h2>" +
      "<table><thead><tr><th>Datum</th><th>Fahrzeug</th><th>Mechaniker</th><th>Niederlassung</th><th>KM</th><th>Ergebnis</th><th>Bemerkungen</th></tr></thead>" +
      "<tbody>" + rows + "</tbody></table>" +
      "<button onclick='window.print()' style='background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer'>🖨 Drucken / PDF</button>" +
      "</body></html>";
    printHtml(html, "DU_Auflieger_Export");
  }

  function exportAllXlsx() {
    var headers = ["Datum", "Fahrzeug", "Mechaniker", "Niederlassung", "KM-Stand", "Ergebnis", "Bemerkungen"];

      return {
        "Datum": i.date || "",

        "KM-Stand": i.km_stand || "",

        "Bemerkungen": i.bemerkungen || ""
      };
    });
    exportXlsx(rows, headers, "DU Auflieger", [{ label:"Filter", value: dateF ? fmtDate(dateF) : "Alle" }]);
  }

  return (
    <div>
      <div className="panel">
        <div className="panel-hd">
          <div className="panel-title-lg">DU Auflieger</div>

                    </tr>,

                      <tr key={j.id+"_ph"}>

      </div>

// === MONATSBERICHT ===
function Monatsbericht({ jobs, washOrders, inspections, alerts }) {
  // Список месяцев: текущий + 11 предыдущих
  var now = new Date();
  var months = [];
  for (var mi = 0; mi < 12; mi++) {
    var d = new Date(now.getFullYear(), now.getMonth() - mi, 1);
    months.push({
      label: d.toLocaleDateString("de-DE", { month: "long", year: "numeric" }),
      labelShort: d.toLocaleDateString("de-DE", { month: "short", year: "2-digit" }),
      year: d.getFullYear(),
      month: d.getMonth(),
      start: d.toLocaleDateString("sv-SE"),
      end: new Date(d.getFullYear(), d.getMonth() + 1, 1).toLocaleDateString("sv-SE")
    });
  }

  var _sm = useState(0); var selMonth = _sm[0]; var setSelMonth = _sm[1];
  var _sg = useState(false); var generating = _sg[0]; var setGenerating = _sg[1];

  var m = months[selMonth];

  // Фильтрация данных за выбранный месяц
  var mJobs = jobs.filter(function(j) {
    var d = j.date || (j.created_at || "").slice(0, 10);
    return d >= m.start && d < m.end;
  });
  var mWash = (washOrders || []).filter(function(w) {
    return (w.work_date || "") >= m.start && (w.work_date || "") < m.end;
  });
  var mInsp = (inspections || []).filter(function(i) {
    var d = (i.created_at || "").slice(0, 10);
    return d >= m.start && d < m.end;
  });
  var mAlerts = (alerts || []).filter(function(a) {
    var d = (a.created_at || "").slice(0, 10);
    return d >= m.start && d < m.end;
  });

  // KPI
  var totalJobs     = mJobs.length;
  var doneJobs      = mJobs.filter(function(j) { return j.status === "done"; }).length;
  var totalMin      = mJobs.reduce(function(s, j) { return s + (parseInt(j.work_min || 0) || 0); }, 0);
  var totalPause    = mJobs.reduce(function(s, j) { return s + totalPauseMin(j); }, 0);
  var pausedJobsCnt = mJobs.filter(function(j) { return parsePauseLog(j).length > 0; }).length;
  var totalLabor    = mJobs.reduce(function(s, j) { return s + (Number(j.labor_cost) || 0); }, 0);
  var totalParts    = mJobs.reduce(function(s, j) { return s + (Number(j.parts_cost) || 0); }, 0);
  var totalCost     = totalLabor + totalParts;
  var totalWashRev  = mWash.reduce(function(s, w) { return s + (Number(w.price_eur) || 0); }, 0);
  var totalRevenue  = totalCost + totalWashRev;
  var openAlertsM   = mAlerts.filter(function(a) { return a.status !== "done"; }).length;
  var doneAlertsM   = mAlerts.filter(function(a) { return a.status === "done"; }).length;

  // По механикам
  var byMech = {};
  mJobs.forEach(function(j) {
    var key = j.mechanic || "unbekannt";
    var name = j.mechanic_name || j.mechanic || "Unbekannt";
    if (!byMech[key]) byMech[key] = { name: name, jobs: 0, done: 0, min: 0, labor: 0, parts: 0, pauseMin: 0 };
    byMech[key].jobs++;
    if (j.status === "done") byMech[key].done++;
    byMech[key].min   += parseInt(j.work_min || 0) || 0;
    byMech[key].labor += Number(j.labor_cost) || 0;
    byMech[key].parts += Number(j.parts_cost) || 0;
    byMech[key].pauseMin += totalPauseMin(j);
  });
  var mechArr = Object.keys(byMech).map(function(k) { return byMech[k]; })
    .sort(function(a, b) { return b.jobs - a.jobs; });

  // По типам работ
  var byType = {};
  mJobs.forEach(function(j) {
    var t = WORK_TYPES[j.work_type] || j.work_type || "Sonstiges";
    if (!byType[t]) byType[t] = 0;
    byType[t]++;
  });
  var typeArr = Object.keys(byType).sort(function(a, b) { return byType[b] - byType[a]; });

  // Топ машины (по затратам)
  var byVeh = {};
  mJobs.forEach(function(j) {
    if (!j.plate) return;
    if (!byVeh[j.plate]) byVeh[j.plate] = { jobs: 0, cost: 0, min: 0 };
    byVeh[j.plate].jobs++;
    byVeh[j.plate].cost += (Number(j.labor_cost) || 0) + (Number(j.parts_cost) || 0);
    byVeh[j.plate].min  += parseInt(j.work_min || 0) || 0;
  });
  var topVeh = Object.keys(byVeh).sort(function(a, b) {
    return byVeh[b].cost - byVeh[a].cost;
  }).slice(0, 10);

  // Waschhalle по типу
  var byWashType = {};
  mWash.forEach(function(w) {
    var t = w.wash_type_name || "Sonstiges";
    if (!byWashType[t]) byWashType[t] = { count: 0, rev: 0 };
    byWashType[t].count++;
    byWashType[t].rev += Number(w.price_eur) || 0;
  });
  var washTypeArr = Object.keys(byWashType).sort(function(a, b) {
    return byWashType[b].count - byWashType[a].count;
  });

  // === PDF EXPORT ===

          "</tr>";

      var vehRows = topVeh.map(function(plate) {

      var washRows = washTypeArr.map(function(t) {

      var typeRowsHtml = typeArr.map(function(t) {

      var jobRows = mJobs.slice(0, 300).map(function(j) {

      var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'>" +

  // === EXCEL EXPORT — мультилистовой ===
  function generateXlsx() {

    setGenerating(true);
    setTimeout(function() {
      var now = new Date();

      function addSheet(name, aoa, colWidths, headerRow) {
        var ws = XLSX.utils.aoa_to_sheet(aoa);
        if (colWidths) ws["!cols"] = colWidths.map(function(w){ return { wch: w }; });
        // Стилизуем строку заголовков таблицы (если указана)

          aoa[headerRow].forEach(function(h, ci){

            ws[addr].s = {
              font:{ bold:true, sz:11, color:{rgb:"FFFFFF"} },
              fill:{ fgColor:{ rgb:"0A1730" } },
              alignment:{ horizontal:"left" }
            };
          });
          ws["!freeze"] = XLSX.utils.encode_cell({ r:headerRow + 1, c:0 });
        }
        // Заголовок отчёта (A1) — жирный, если первая ячейка похожа на title
        if (ws["A1"]) ws["A1"].s = { font:{ bold:true, sz:14, color:{rgb:"0A1730"} } };
        XLSX.utils.book_append_sheet(wb, ws, name);

        ["LTG Landauer Transportgesellschaft Doll KG"],

        ["Lohnkosten (€)", Number(totalLabor.toFixed(2))],
        ["Ersatzteile (€)", Number(totalParts.toFixed(2))],
        ["Werkstatt gesamt (€)", Number(totalCost.toFixed(2))],
        ["Wäschen", mWash.length],
        ["Waschhalle Umsatz (€)", Number(totalWashRev.toFixed(2))],
        ["Gesamt (€)", Number(totalRevenue.toFixed(2))],
        ["Inspektionen", mInsp.length],
        ["Meldungen gesamt", mAlerts.length],
        ["Meldungen offen", openAlertsM],
        ["Meldungen erledigt", doneAlertsM]
      ];
      addSheet("Übersicht", uebersicht, [28, 22], 5);

      // Лист 2 — Mechaniker
      var mechSheet = [["Name", "Aufträge", "Fertig", "Arbeitszeit (min)", "Pausen (min)", "Lohnkosten (€)", "Ersatzteile (€)", "Gesamt (€)"]];
      mechArr.forEach(function(mch){
        mechSheet.push([
          mch.name, mch.jobs, mch.done, mch.min, mch.pauseMin,
          Number(mch.labor.toFixed(2)), Number(mch.parts.toFixed(2)),
          Number((mch.labor + mch.parts).toFixed(2))
        ]);
      });
      mechSheet.push(["Gesamt", totalJobs, doneJobs, totalMin, totalPause,
        Number(totalLabor.toFixed(2)), Number(totalParts.toFixed(2)), Number(totalCost.toFixed(2))]);
      addSheet("Mechaniker", mechSheet, [22, 12, 10, 18, 16, 16, 16, 14], 0);

      // Лист 3 — Auftragstypen
      var typeSheet = [["Typ", "Anzahl", "Anteil %"]];
      typeArr.forEach(function(t){
        typeSheet.push([t, byType[t], Math.round(byType[t] / Math.max(totalJobs, 1) * 100)]);
      });
      addSheet("Auftragstypen", typeSheet, [28, 12, 12], 0);

      // Лист 4 — Top-Fahrzeuge
      var vehSheet = [["Kennzeichen", "Aufträge", "Arbeitszeit (min)", "Kosten (€)"]];
      topVeh.forEach(function(plate){
        var v = byVeh[plate];
        vehSheet.push([plate, v.jobs, v.min, Number(v.cost.toFixed(2))]);
      });
      addSheet("Top-Fahrzeuge", vehSheet, [16, 12, 18, 14], 0);

      // Лист 5 — Waschhalle
      if (washTypeArr.length > 0) {
        var washSheet = [["Waschtyp", "Anzahl", "Umsatz (€)"]];
        washTypeArr.forEach(function(t){
          washSheet.push([t, byWashType[t].count, Number(byWashType[t].rev.toFixed(2))]);
        });
        addSheet("Waschhalle", washSheet, [28, 12, 14], 0);
      }

      // Лист 6 — Alle Aufträge (полный список)
      var jobSheet = [["Datum", "Fahrzeug", "Mechaniker", "Typ", "Beschreibung", "Arbeitszeit (min)", "Fahrzeit (min)", "Kosten (€)", "Status"]];
      mJobs.forEach(function(j){
        var travelMin = (parseInt(j.travel_to_min||0)||0) + (parseInt(j.travel_back_min||0)||0);
        jobSheet.push([
          j.date || (j.created_at || "").slice(0, 10),
          j.plate || "",
          j.mechanic_name || j.mechanic || "",
          WORK_TYPES[j.work_type] || j.work_type || "",
          j.description || "",
          parseInt(j.work_min||0) || 0,
          travelMin,
          (Number(j.labor_cost)||0) + (Number(j.parts_cost)||0),
          statusDE(j.status)
        ]);
      });
      addSheet("Alle Aufträge", jobSheet, [12, 14, 18, 16, 40, 16, 14, 12, 14], 0);

      var fname = "WerkFlow_Monatsbericht_" + m.label.replace(/ /g, "_") + ".xlsx";
      XLSX.writeFile(wb, fname);
      setGenerating(false);
    }, 50);
  }

  return (
    <div>
      <div className="panel">
        <div className="panel-hd">
          <div className="panel-title-lg">Monatsbericht</div>
        </div>

        <div style={{ display:"flex", alignItems:"center", gap:14, flexWrap:"wrap", marginBottom:24 }}>

            <select className="inp" value={selMonth}
              onChange={function(e){ setSelMonth(Number(e.target.value)); }}

            <table className="tbl" style={{ marginBottom:20 }}>

                      <td style={{ textAlign:"center" }}>{mch.jobs}</td>
                      <td style={{ textAlign:"center", color:"#22c55e" }}>{mch.done}</td>
                      <td style={{ fontSize:12, color:"rgba(255,255,255,0.6)" }}>{fmtMin(mch.min)}</td>
                      <td style={{ textAlign:"right", fontSize:12 }}>{mch.labor.toFixed(2)} €</td>
                      <td style={{ textAlign:"right", fontSize:12 }}>{mch.parts.toFixed(2)} €</td>
                      <td style={{ textAlign:"right", fontWeight:700, color:"#ffa500" }}>{(mch.labor + mch.parts).toFixed(2)} €</td>

                <tr style={{ background:"rgba(255,165,0,0.08)", fontWeight:700 }}>
                  <td>Gesamt</td>
                  <td style={{ textAlign:"center" }}>{totalJobs}</td>
                  <td style={{ textAlign:"center", color:"#22c55e" }}>{doneJobs}</td>
                  <td style={{ fontSize:12 }}>{fmtMin(totalMin)}</td>
                  <td style={{ textAlign:"right", fontSize:12 }}>{totalLabor.toFixed(2)} €</td>
                  <td style={{ textAlign:"right", fontSize:12 }}>{totalParts.toFixed(2)} €</td>
                  <td style={{ textAlign:"right", color:"#ffa500" }}>{totalCost.toFixed(2)} €</td>
                </tr>
              </tbody>
            </table>
          </div>
        )}

        {totalJobs === 0 && mWash.length === 0 && (
          <div className="empty">Keine Daten für {m.label}</div>
        )}

        <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
          <button className="btn-primary"
            style={{ padding:"13px 32px", fontSize:15, width:"auto", opacity: generating ? 0.6 : 1 }}
            onClick={generatePDF}
            disabled={generating}>
            {generating ? "⏳ Generiere..." : "📄 PDF generieren — " + m.label}
          </button>
          <button
            style={{ padding:"13px 32px", fontSize:15, width:"auto", opacity: generating ? 0.6 : 1,
              background:"rgba(34,197,94,0.15)", border:"1.5px solid rgba(34,197,94,0.5)",
              color:"#22c55e", borderRadius:10, fontWeight:700, cursor:"pointer" }}
            onClick={generateXlsx}
            disabled={generating}>
            {generating ? "⏳ Generiere..." : "📊 Excel generieren — " + m.label}
          </button>
        </div>
      </div>
    </div>
  );
}

// === KOSTEN ===
function Kosten({ jobs, invoices, vehicles, forklifts }) {
  var _sp = useState("month"); var period = _sp[0]; var setPeriod = _sp[1];

  function periodStart() {
    var d = new Date();
    if (period === "month")   { d.setDate(1); return d.toLocaleDateString("sv-SE"); }
    if (period === "quarter") { d.setMonth(Math.floor(d.getMonth()/3)*3, 1); return d.toLocaleDateString("sv-SE"); }
    if (period === "year")    { d.setMonth(0,1); return d.toLocaleDateString("sv-SE"); }
    return "";
  }

  function prevPeriodRange() {
    // Возвращает {start, end} предыдущего периода для Δ% сравнения
    var d = new Date();
    if (period === "month") {
      var end = new Date(d.getFullYear(), d.getMonth(), 1);
      var start = new Date(d.getFullYear(), d.getMonth()-1, 1);
      return { start: start.toLocaleDateString("sv-SE"), end: end.toLocaleDateString("sv-SE") };
    }
    if (period === "quarter") {
      var qStart = Math.floor(d.getMonth()/3)*3;
      var end2 = new Date(d.getFullYear(), qStart, 1);
      var start2 = new Date(d.getFullYear(), qStart-3, 1);
      return { start: start2.toLocaleDateString("sv-SE"), end: end2.toLocaleDateString("sv-SE") };
    }
    if (period === "year") {
      return { start: (d.getFullYear()-1)+"-01-01", end: d.getFullYear()+"-01-01" };
    }
    return null;
  }

  function deltaPct(cur, prev) {
    if (!prev || prev === 0) return null;
    var pct = Math.round((cur - prev) / prev * 100);
    var up = pct > 0;
    var color = up ? "#ef4444" : "#22c55e"; // рост затрат = плохо (красный), снижение = хорошо (зелёный)
    return React.createElement("div", { style:{fontSize:12,fontWeight:700,color:color,marginTop:4} },
      (up ? "▲ +" : "▼ ") + Math.abs(pct) + "% vs Vorperiode"
    );
  }

  var start = periodStart();
  var prev = prevPeriodRange();

  var filtered = start ? jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10)) >= start; }) : jobs;
  var filtInv  = start ? invoices.filter(function(i){ return (i.date||"") >= start; }) : invoices;

  // Предыдущий период
  var prevJobs = prev ? jobs.filter(function(j){
    var d = j.date||(j.created_at||"").slice(0,10);
    return d >= prev.start && d < prev.end;
  }) : [];
  var prevInv = prev ? invoices.filter(function(i){
    return (i.date||"") >= prev.start && (i.date||"") < prev.end;
  }) : [];

  var totalLabor = filtered.reduce(function(s,j){ return s+(Number(j.labor_cost)||0); }, 0);
  var totalParts = filtered.reduce(function(s,j){ return s+(Number(j.parts_cost)||0); }, 0);
  var totalInv   = filtInv.reduce(function(s,i){ return s+(Number(i.amount)||0); }, 0);
  var totalAll   = totalLabor + totalParts + totalInv;
  var totalJobs  = filtered.length;

  var prevLabor = prevJobs.reduce(function(s,j){ return s+(Number(j.labor_cost)||0); }, 0);
  var prevParts = prevJobs.reduce(function(s,j){ return s+(Number(j.parts_cost)||0); }, 0);
  var prevInvAmt = prevInv.reduce(function(s,i){ return s+(Number(i.amount)||0); }, 0);
  var prevAll   = prevLabor + prevParts + prevInvAmt;
  var prevJobsCnt = prevJobs.length;

  var byVeh = {};
  filtered.forEach(function(j){
    if (!j.plate) return;
    if (!byVeh[j.plate]) byVeh[j.plate] = { labor:0, parts:0, jobs:0, min:0 };
    byVeh[j.plate].labor += Number(j.labor_cost)||0;
    byVeh[j.plate].parts += Number(j.parts_cost)||0;
    byVeh[j.plate].jobs++;
    byVeh[j.plate].min += parseInt(j.work_min||0)||0;
  });
  var topVeh = Object.keys(byVeh).sort(function(a,b){
    return (byVeh[b].labor+byVeh[b].parts) - (byVeh[a].labor+byVeh[a].parts);
  }).slice(0,10);

  var byMech = {};
  filtered.forEach(function(j){
    if (!j.mechanic) return;
    if (!byMech[j.mechanic]) byMech[j.mechanic] = { labor:0, jobs:0, min:0 };
    byMech[j.mechanic].labor += Number(j.labor_cost)||0;
    byMech[j.mechanic].jobs++;
    byMech[j.mechanic].min += parseInt(j.work_min||0)||0;
  });

  var byType = {};
  filtered.forEach(function(j){
    var t = j.work_type||"other";
    if (!byType[t]) byType[t] = { cost:0, jobs:0 };
    byType[t].cost += (Number(j.labor_cost)||0)+(Number(j.parts_cost)||0);
    byType[t].jobs++;
  });

  // Прогноз бюджета — только для "month"
  var forecastData = (function(){
    if (period !== "month") return null;
    var now = new Date();
    var dayOfMonth = now.getDate();
    var daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    if (dayOfMonth === 0) return null;
    var projected = Math.round(totalAll / dayOfMonth * daysInMonth);
    var prevM = prev ? jobs.filter(function(j){
      var d = j.date||(j.created_at||"").slice(0,10);
      return d >= prev.start && d < prev.end;
    }).concat(prev ? invoices.filter(function(i){ return (i.date||"") >= prev.start && (i.date||"") < prev.end; }) : []) : [];
    var prevTotal = prevJobs.reduce(function(s,j){ return s+(Number(j.labor_cost)||0)+(Number(j.parts_cost)||0); },0)
                  + prevInv.reduce(function(s,i){ return s+(Number(i.amount)||0); },0);
    var deltaProjPct = prevTotal > 0 ? Math.round((projected - prevTotal) / prevTotal * 100) : null;
    return { dayOfMonth:dayOfMonth, daysInMonth:daysInMonth, projected:projected, prevTotal:prevTotal, deltaProjPct:deltaProjPct, progressPct: Math.round(dayOfMonth/daysInMonth*100) };
  })();

  // 12-месячный график для Kosten
  var last12kosten = [];
  for (var ki=11; ki>=0; ki--) {
    var kd = new Date(); kd.setDate(1); kd.setMonth(kd.getMonth()-ki);
    var kStart = kd.toLocaleDateString("sv-SE");
    var kEnd = new Date(kd.getFullYear(), kd.getMonth()+1, 1).toLocaleDateString("sv-SE");
    var kJobs = jobs.filter(function(j){ var d=j.date||(j.created_at||"").slice(0,10); return d>=kStart && d<kEnd; });
    var kInv  = invoices.filter(function(i){ return (i.date||"")>=kStart && (i.date||"")<kEnd; });
    var kCost = kJobs.reduce(function(s,j){ return s+(Number(j.labor_cost)||0)+(Number(j.parts_cost)||0); },0)
               +kInv.reduce(function(s,i){ return s+(Number(i.amount)||0); },0);
    last12kosten.push({ label: kd.toLocaleDateString("de-DE",{month:"short",year:"2-digit"}), cost: Math.round(kCost) });
  }

  var kostenChartRef = useRef(null);
  var kostenChartInst = useRef(null);

  useEffect(function(){
    if (!kostenChartRef.current) return;
    if (kostenChartInst.current) kostenChartInst.current.destroy();
    var maxCost = Math.max.apply(null, last12kosten.map(function(m){ return m.cost; })) || 1;
    kostenChartInst.current = new Chart(kostenChartRef.current, {
      type: "bar",
      data: {
        labels: last12kosten.map(function(m){ return m.label; }),
        datasets: [{
          data: last12kosten.map(function(m){ return m.cost; }),
          backgroundColor: last12kosten.map(function(m,i){
            return i === last12kosten.length-1 ? "rgba(255,165,0,0.9)" : "rgba(255,165,0,0.35)";
          }),
          borderColor: "#ffa500", borderWidth: 1, borderRadius: 6
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend:{display:false}, tooltip:{ callbacks:{ label:function(ctx){ return ctx.parsed.y.toLocaleString("de-DE")+" €"; } } } },
        scales: {

function Wartungsplan({ plans, vehicles, forklifts, onRefresh, loading }) {
  var _sf = useState("all"); var filter = _sf[0]; var setFilter = _sf[1];
  var _sv = useState("list"); var view = _sv[0]; var setView = _sv[1];
  var calRef = useRef(null);
  var calInst = useRef(null);

  var allVeh = vehicles.concat(forklifts||[]);

  function planStatus(p) {
    var today = new Date();
    var byDate = p.next_service_date ? Math.round((new Date(p.next_service_date) - today) / 86400000) : null;
    if (byDate !== null) {
      if (byDate < 0) return "expired";
      if (byDate < 14) return "urgent";
      if (byDate < 30) return "warn";
    }
    return "ok";
  }

  var list = plans;
  if (filter === "expired") list = list.filter(function(p){ return planStatus(p) === "expired"; });
  if (filter === "urgent")  list = list.filter(function(p){ return ["expired","urgent"].includes(planStatus(p)); });
  if (filter === "warn")    list = list.filter(function(p){ return ["expired","urgent","warn"].includes(planStatus(p)); });

  var expiredCount = plans.filter(function(p){ return planStatus(p) === "expired"; }).length;
  var urgentCount  = plans.filter(function(p){ return planStatus(p) === "urgent"; }).length;
  var warnCount    = plans.filter(function(p){ return planStatus(p) === "warn"; }).length;

  // Строим события для FullCalendar из plans + TÜV/UVV/Versicherung машин
  var calEvents = [];

  // Из maintenance_plans
  plans.forEach(function(p){
    if (!p.next_service_date) return;
    var st = planStatus(p);
    var color = st === "expired" ? "#ef4444" : st === "urgent" ? "#ef4444" : st === "warn" ? "#ffa500" : "#22c55e";
    calEvents.push({
      title: (p.vehicle_plate||p.vehicle_id||"?") + " — Wartung",
      start: p.next_service_date,
      backgroundColor: color,
      borderColor: color,
      textColor: "#fff",
      extendedProps: { type: "wartung", plate: p.vehicle_plate||p.vehicle_id, status: st }
    });
  });

  // TÜV / UVV / Versicherung из vehicles
  allVeh.forEach(function(v){
    var plate = v.plate || v.nummer || "";
    var fields = [
      { label:"TÜV", date: v.tuev, color:"#3b82f6" },
      { label:"UVV", date: v.uvv || v.uvv_datum, color:"#a855f7" },
      { label:"Versicherung", date: v.insurance, color:"#60a5fa" },
      { label:"Nächste Wartung", date: v.next_service, color:"#ffa500" }
    ];
    fields.forEach(function(f){
      if (!f.date) return;
      var diff = Math.round((new Date(f.date) - new Date()) / 86400000);
      var color = diff < 0 ? "#ef4444" : diff < 14 ? "#ef4444" : diff < 30 ? "#ffa500" : f.color;
      calEvents.push({
        title: plate + " — " + f.label,
        start: f.date,
        backgroundColor: color,
        borderColor: color,
        textColor: "#fff",
        extendedProps: { type: f.label.toLowerCase(), plate: plate }
      });
    });
  });

  useEffect(function(){
    if (view !== "calendar") return;
    if (!calRef.current) return;
    if (!window.FullCalendar) return;

    if (calInst.current) calInst.current.destroy();

    calInst.current = new window.FullCalendar.Calendar(calRef.current, {
      plugins: [],
      initialView: "dayGridMonth",
      locale: "de",
      height: "auto",
      headerToolbar: {
        left: "prev,next today",
        center: "title",
        right: "dayGridMonth,listMonth"
      },
      events: calEvents,
      eventClick: function(info) {
        var p = info.event.extendedProps;
        alert(info.event.title + "\nDatum: " + info.event.startStr + (p.plate ? "\nFahrzeug: " + p.plate : ""));
      },
      themeSystem: "standard",
      buttonText: { today:"Heute", month:"Monat", list:"Liste" }
    });
    calInst.current.render();
    return function(){ if (calInst.current) { calInst.current.destroy(); calInst.current = null; } };
  }, [view, plans.length, vehicles.length]);

  function exportPlan() {
    var rows = list.map(function(p){
      var st = planStatus(p);
      var diff = p.next_service_date ? Math.round((new Date(p.next_service_date)-new Date())/86400000) : null;
      return "<tr><td>"+(p.vehicle_plate||p.vehicle_id||"—")+"</td>"+
        "<td>"+(p.interval_days?" alle "+p.interval_days+" Tage":"—")+"</td>"+
        "<td>"+(p.interval_km?" alle "+p.interval_km+" km":"—")+"</td>"+
        "<td>"+(fmtDate(p.last_service_date)||"—")+"</td>"+
        "<td>"+(fmtDate(p.next_service_date)||"—")+"</td>"+
        "<td>"+(diff!==null?(diff<0?Math.abs(diff)+" Tage überfällig":diff+" Tage"):"—")+"</td>"+
        "<td style='color:"+docColor(st)+"'>"+st.toUpperCase()+"</td></tr>";
    }).join("");
    var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Wartungsplan</title>"+baseReportStyle()+"</head><body>"+
      "<h1>WerkFlow — Wartungsplan</h1>"+
      "<table><thead><tr><th>Fahrzeug</th><th>Intervall (Zeit)</th><th>Intervall (km)</th><th>Letztes TO</th><th>Nächstes TO</th><th>In/Vor</th><th>Status</th></tr></thead><tbody>"+rows+"</tbody></table>"+
      "<button onclick='window.print()' style='background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer'>🖨 Drucken / PDF</button></body></html>";
    printHtml(html, "Wartungsplan");
  }

  function exportPlanXlsx() {
    var headers = ["Fahrzeug", "Intervall (Tage)", "Intervall (km)", "Letztes TO", "Nächstes TO", "Fälligkeit", "Status"];
    var rows = list.map(function(p){
      var st = planStatus(p);
      var diff = p.next_service_date ? Math.round((new Date(p.next_service_date)-new Date())/86400000) : null;
      return {
        "Fahrzeug": p.vehicle_plate || p.vehicle_id || "",
        "Intervall (Tage)": p.interval_days || "",
        "Intervall (km)": p.interval_km || "",
        "Letztes TO": fmtDate(p.last_service_date) || "",
        "Nächstes TO": fmtDate(p.next_service_date) || "",
        "Fälligkeit": diff !== null ? (diff < 0 ? Math.abs(diff)+" Tage überfällig" : "in "+diff+" Tagen") : "",
        "Status": st.toUpperCase()
      };
    });
    exportXlsx(rows, headers, "Wartungsplan", null);
  }

  return (
    <div>
      <div className="g3" style={{ marginBottom:16 }}>
        <div className="kpi-card red"><div style={{ fontSize:22, fontWeight:900 }}>{expiredCount}</div><div className="kpi-label">Überfällig</div></div>
        <div className="kpi-card orange"><div style={{ fontSize:22, fontWeight:900 }}>{urgentCount}</div><div className="kpi-label">Dringend (&lt;14 Tage)</div></div>
        <div className="kpi-card" style={{ borderLeft:"3px solid #ffa500" }}><div style={{ fontSize:22, fontWeight:900 }}>{warnCount}</div><div className="kpi-label">Bald fällig (&lt;30 Tage)</div></div>
      </div>

      <div className="panel">
        <div className="panel-hd">
          <div className="panel-title-lg">Wartungsplan</div>
          <div style={{ display:"flex", gap:8 }}>
            <button className={"btn-small "+(view==="list"?"btn-primary":"btn-outline")} onClick={function(){ setView("list"); }}>☰ Liste</button>
            <button className={"btn-small "+(view==="calendar"?"btn-primary":"btn-outline")} onClick={function(){ setView("calendar"); }}>📅 Kalender</button>
            <button className="btn-outline btn-small no-print" onClick={exportPlan} title="PDF / Drucken">📄 PDF</button>
            <button className="btn-outline btn-small no-print" onClick={exportPlanXlsx} title="Excel-Datei"
              style={{ borderColor:"rgba(34,197,94,0.4)", color:"#22c55e" }}>📊 Excel</button>
            <button className="btn-outline btn-small no-print" onClick={onRefresh}>{loading?"...":"↻"}</button>
          </div>
        </div>

        {view === "calendar" && (
          <div>
            {/* Легенда */}
            <div style={{ display:"flex", gap:16, flexWrap:"wrap", marginBottom:14, fontSize:12 }}>
              {[["#ef4444","Überfällig / Dringend"],["#ffa500","Wartung / Bald fällig"],["#3b82f6","TÜV"],["#a855f7","UVV"],["#60a5fa","Versicherung"]].map(function(l){
                return (
                  <div key={l[1]} style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <div style={{ width:12, height:12, borderRadius:3, background:l[0], flexShrink:0 }}></div>
                    <span style={{ color:"rgba(255,255,255,0.6)" }}>{l[1]}</span>
                  </div>
                );
              })}
            </div>
            <style dangerouslySetInnerHTML={{ __html:
              ".fc{color:#fff!important;font-family:inherit!important}" +
              ".fc .fc-toolbar-title{color:#fff!important;font-size:16px!important;font-weight:800!important}" +
              ".fc .fc-button{background:rgba(255,255,255,0.08)!important;border:1px solid rgba(255,255,255,0.15)!important;color:#fff!important;font-size:12px!important;padding:6px 12px!important;border-radius:8px!important}" +
              ".fc .fc-button-primary:not(:disabled).fc-button-active,.fc .fc-button-primary:not(:disabled):active{background:rgba(255,165,0,0.25)!important;border-color:#ffa500!important;color:#ffa500!important}" +
              ".fc .fc-daygrid-day{background:transparent!important}" +
              ".fc .fc-daygrid-day-number{color:rgba(255,255,255,0.6)!important;font-size:12px!important}" +
              ".fc .fc-col-header-cell{background:rgba(255,255,255,0.04)!important;border-color:rgba(255,255,255,0.08)!important}" +
              ".fc .fc-col-header-cell-cushion{color:rgba(255,255,255,0.5)!important;font-size:11px!important;font-weight:700!important;text-transform:uppercase!important;letter-spacing:1px!important}" +
              ".fc td,.fc th{border-color:rgba(255,255,255,0.07)!important}" +
              ".fc .fc-daygrid-day.fc-day-today{background:rgba(255,165,0,0.06)!important}" +
              ".fc .fc-event{border-radius:5px!important;font-size:11px!important;padding:1px 4px!important;font-weight:600!important}" +
              ".fc .fc-list-event{background:transparent!important}" +
              ".fc .fc-list-day-cushion{background:rgba(255,255,255,0.05)!important}" +
              ".fc .fc-list-event-title{color:#fff!important}" +
              ".fc .fc-list-event-time{color:rgba(255,255,255,0.4)!important}"
            }} />
            <div ref={calRef}></div>
          </div>
        )}

        {view === "list" && (
          <div>
            <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
              {[["all","Alle"],["urgent","Dringend"],["warn","Bald fällig"],["expired","Überfällig"]].map(function(f){
                return <button key={f[0]} className={"btn-small "+(filter===f[0]?"btn-primary":"btn-outline")} onClick={function(){ setFilter(f[0]); }}>{f[1]}</button>;
              })}
            </div>
            {list.length === 0
              ? <div className="empty">{plans.length === 0 ? "Noch keine Wartungspläne — Daten in Supabase eintragen" : "Keine Einträge für diesen Filter"}</div>
              : <table className="tbl">
                  <thead><tr><th>Fahrzeug</th><th>Letztes TO</th><th>Nächstes TO</th><th>Intervall</th><th>Fälligkeit</th><th>Status</th></tr></thead>
                  <tbody>
                    {list.map(function(p){
                      var st = planStatus(p);
                      var diff = p.next_service_date ? Math.round((new Date(p.next_service_date)-new Date())/86400000) : null;
                      var veh = allVeh.find(function(v){ return (v.plate||v.nummer||"") === (p.vehicle_plate||""); });
                      return (
                        <tr key={p.id}>
                          <td>
                            <div style={{ fontWeight:700 }}>{p.vehicle_plate||p.vehicle_id||"—"}</div>
                            {veh && <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>{veh.brand||veh.hersteller||""} {veh.model||""}</div>}
                          </td>
                          <td style={{ fontSize:12, color:"rgba(255,255,255,0.55)" }}>{fmtDate(p.last_service_date)||"—"}</td>
                          <td style={{ fontWeight:700 }}>{fmtDate(p.next_service_date)||"—"}</td>
                          <td style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>
                            {p.interval_days ? p.interval_days+"d" : ""}{p.interval_days && p.interval_km ? " / " : ""}{p.interval_km ? p.interval_km+"km" : ""}
                          </td>
                          <td>
                            {diff !== null
                              ? <span style={{ fontWeight:700, color: diff<0?"#ef4444":diff<14?"#ef4444":diff<30?"#ffa500":"#22c55e" }}>
                                  {diff < 0 ? Math.abs(diff)+"d überfällig" : "in "+diff+"d"}
                                </span>
                              : "—"
                            }
                          </td>
                          <td>
                            <span className={"badge "+(st==="expired"||st==="urgent"?"badge-red":st==="warn"?"badge-orange":"badge-green")}>

                            </span>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
            }
            <div style={{ marginTop:16, padding:"12px 14px", borderRadius:10, background:"rgba(255,255,255,0.04)", fontSize:12, color:"rgba(255,255,255,0.4)", lineHeight:1.6 }}>
              💡 Wartungspläne werden in Supabase → Tabelle <strong style={{ color:"rgba(255,255,255,0.6)" }}>maintenance_plans</strong> gepflegt.
              Felder: vehicle_plate, interval_days, interval_km, last_service_date, next_service_date
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// === SCHICHTBERICHT ===
function genSchichtbericht(jobs, date, mechanics) {
  var dateLabel = fmtDate(date) || "Heute";
  var allMechSections = mechanics.map(function(mech){
    var mj = jobs.filter(function(j){ return j.mechanic === mech.id && (j.date||(j.created_at||"").slice(0,10)) === date; });
    var totalMin  = mj.reduce(function(s,j){ return s+(parseInt(j.work_min||0)||0); }, 0);
    var totalCost = mj.reduce(function(s,j){ return s+(Number(j.cost)||0); }, 0);
    var done = mj.filter(function(j){ return j.status==="done"; }).length;
    if (mj.length === 0) return "";
    var rows = mj.map(function(j){
      return "<tr><td style='font-weight:700'>"+(j.plate||"—")+"</td>"+
        "<td>"+(WORK_TYPES[j.work_type]||j.work_type||"—")+"</td>"+
        "<td>"+(j.location||"—")+"</td>"+
        "<td style='max-width:200px'>"+(j.description||"").slice(0,80)+"</td>"+
        "<td>"+fmtMin(j.work_min||0)+"</td>"+
        "<td style='font-weight:700;color:#d97706'>"+(j.cost?Number(j.cost).toFixed(2)+" €":"—")+"</td>"+
        "<td style='color:"+(j.status==="done"?"#16a34a":"#d97706")+"'>"+(j.status==="done"?"✓ Fertig":"⚙ In Arbeit")+"</td></tr>";
    }).join("");
    return "<div style='margin-bottom:28px;page-break-inside:avoid'>"+
      "<h2 style='color:#1a3a6b;margin-bottom:4px'>"+mech.name+"</h2>"+
      "<p style='color:#64748b;font-size:13px;margin-bottom:10px'>"+mj.length+" Aufträge · "+done+" erledigt · "+fmtMin(totalMin)+" · "+totalCost.toFixed(2)+" €</p>"+
      "<table><thead><tr><th>Fahrzeug</th><th>Typ</th><th>Standort</th><th>Beschreibung</th><th>Zeit</th><th>Kosten</th><th>Status</th></tr></thead>"+
      "<tbody>"+rows+"</tbody></table></div>";
  }).join("");

  var allJobs = jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10)) === date; });
  var grand = { jobs:allJobs.length, min:allJobs.reduce(function(s,j){ return s+(parseInt(j.work_min||0)||0); },0), cost:allJobs.reduce(function(s,j){ return s+(Number(j.cost)||0); },0) };

  var html = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Schichtbericht "+dateLabel+"</title>"+baseReportStyle()+
    "</head><body>"+
    "<h1 style='margin-bottom:4px'>WerkFlow — Schichtbericht</h1>"+
    "<h2 style='margin-bottom:20px'>"+dateLabel+" · LTG Werkstatt</h2>"+
    "<div class='sum'>"+
    "<div class='sum-item'><div class='sum-val'>"+grand.jobs+"</div><div class='sum-lab'>Aufträge gesamt</div></div>"+
    "<div class='sum-item'><div class='sum-val'>"+fmtMin(grand.min)+"</div><div class='sum-lab'>Arbeitszeit</div></div>"+
    "<div class='sum-item'><div class='sum-val'>"+grand.cost.toFixed(2)+" €</div><div class='sum-lab'>Gesamtkosten</div></div>"+
    "</div>"+
    allMechSections+
    "<button onclick='window.print()' style='background:#0a1730;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer'>🖨 Drucken / PDF</button>"+
    "</body></html>";
  printHtml(html, "Schichtbericht");
}

// === KONTAKTE ===
var CONTACT_CATS = ["Mitarbeiter","Lieferanten","Servicepartner","Notfall","Management","Sonstiges"];

function Kontakte({ onRefresh }) {
  var _sc = useState([]); var contacts = _sc[0]; var setContacts = _sc[1];
  var _sf = useState("all"); var catF = _sf[0]; var setCatF = _sf[1];
  var _ss = useState(""); var search = _ss[0]; var setSearch = _ss[1];
  var _se = useState(null); var editItem = _se[0]; var setEditItem = _se[1];
  var _sl = useState(false); var loading = _sl[0]; var setLoading = _sl[1];
  var _sm = useState(""); var msg = _sm[0]; var setMsg = _sm[1];
  var empty = { id:"", name:"", firma:"", phone:"", whatsapp:"", email:"", category:"Mitarbeiter", notes:"" };
  var _sf2 = useState(empty); var form = _sf2[0]; var setForm = _sf2[1];
  var _sshow = useState(false); var showForm = _sshow[0]; var setShowForm = _sshow[1];

  function load() {
    sbGet("contacts","select=*&order=name.asc").then(function(r){ setContacts(r); });
  }
  useEffect(function(){ load(); },[]);

  function showMsg(m){ setMsg(m); setTimeout(function(){ setMsg(""); },3000); }

  function save() {
    if (!form.name.trim()) { showMsg("Name ist Pflicht"); return; }
    setLoading(true);
    var payload = Object.assign({}, form, { id: form.id || ("C"+Date.now()) });
    sbUpsert("contacts", payload).then(function(){ setLoading(false); showMsg("✅ Gespeichert"); setForm(empty); setShowForm(false); setEditItem(null); load(); })
    .catch(function(e){ setLoading(false); showMsg("Fehler: "+(e.message||e)); });
  }

  function startEdit(c) { setForm(Object.assign({},c)); setEditItem(c.id); setShowForm(true); }
  function startNew() { setForm(empty); setEditItem(null); setShowForm(true); }

  function del(id) {
    if (!window.confirm("Kontakt löschen?")) return;
    fetch(SB_URL+"/rest/v1/contacts?id=eq."+encodeURIComponent(id), {
      method:"DELETE", headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}
    }).then(function(){ load(); });
  }

  var list = contacts.filter(function(c){
    var mc = catF === "all" || c.category === catF;
    var ms = !search || ((c.name||"")+(c.firma||"")).toLowerCase().includes(search.toLowerCase());
    return mc && ms;
  });

  var CAT_ICONS = { Mitarbeiter:"👷", Lieferanten:"🏢", Servicepartner:"🔧", Notfall:"🚨", Management:"👔", Sonstiges:"📋" };

  return (

          <button className="btn-primary btn-small" onClick={startNew}>+ Neu</button>
        </div>

      {showForm && (
        <div className="panel" style={{ marginBottom:16, borderColor:"rgba(255,165,0,0.3)" }}>
          <div className="panel-hd">
            <div className="panel-title">{editItem ? "Kontakt bearbeiten" : "Neuer Kontakt"}</div>
            <button className="btn-outline btn-small" onClick={function(){ setShowForm(false); setForm(empty); setEditItem(null); }}>✕</button>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
            <div>
              <div className="label-cap">Name *</div>
              <input className="inp" style={{ width:"100%" }} value={form.name} placeholder="Max Mustermann" onChange={function(e){ setForm(Object.assign({},form,{name:e.target.value})); }} />
            </div>
            <div>
              <div className="label-cap">Firma</div>
              <input className="inp" style={{ width:"100%" }} value={form.firma||""} placeholder="ATU, Bosch..." onChange={function(e){ setForm(Object.assign({},form,{firma:e.target.value})); }} />
            </div>
            <div>
              <div className="label-cap">Telefon</div>
              <input className="inp" style={{ width:"100%" }} value={form.phone||""} placeholder="+49 621..." onChange={function(e){ setForm(Object.assign({},form,{phone:e.target.value})); }} />
            </div>
            <div>
              <div className="label-cap">WhatsApp</div>
              <input className="inp" style={{ width:"100%" }} value={form.whatsapp||""} placeholder="+49 151..." onChange={function(e){ setForm(Object.assign({},form,{whatsapp:e.target.value})); }} />
            </div>
            <div>
              <div className="label-cap">E-Mail</div>
              <input className="inp" style={{ width:"100%" }} value={form.email||""} placeholder="name@firma.de" onChange={function(e){ setForm(Object.assign({},form,{email:e.target.value})); }} />
            </div>
