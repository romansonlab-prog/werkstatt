                    )}
                    {c.whatsapp && (
                      <a href={"https://wa.me/"+c.whatsapp.replace(/[^0-9]/g,"")} target="_blank" rel="noreferrer" style={{ display:"flex", alignItems:"center", gap:6, padding:"7px 12px", borderRadius:9, background:"rgba(37,211,102,0.12)", border:"1px solid rgba(37,211,102,0.3)", color:"#25d366", fontSize:12, fontWeight:700, textDecoration:"none" }}>
                        💬 WhatsApp
                      </a>
                    )}
                    {c.email && (
                      <a href={"mailto:"+c.email} style={{ display:"flex", alignItems:"center", gap:6, padding:"7px 12px", borderRadius:9, background:"rgba(59,130,246,0.12)", border:"1px solid rgba(59,130,246,0.3)", color:"#60a5fa", fontSize:12, fontWeight:700, textDecoration:"none" }}>
                        ✉️ E-Mail
                      </a>
                    )}
                  </div>
                  {c.notes && <div style={{ marginTop:8, fontSize:12, color:"rgba(255,255,255,0.45)", lineHeight:1.4 }}>{c.notes}</div>}
                </div>
              );
            })}
          </div>
      }
    </div>
  );
}

// === EINSTELLUNGEN ===
function Einstellungen({ vehicles, forklifts, stock, onRefresh, loading, niedList }) {
  var _stab = useState("vehicles"); var tab = _stab[0]; var setTab = _stab[1];
  var _ssav = useState(false); var saving = _ssav[0]; var setSaving = _ssav[1];
  var _smsg = useState(""); var msg = _smsg[0]; var setMsg = _smsg[1];

  // Vehicle form
  var _vf = useState({ plate:"", brand:"", model:"", type:"truck", tuev:"", insurance:"", uvv:"", next_service:"", mileage:"" });
  var vf = _vf[0]; var setVf = _vf[1];
  // Forklift form
  var _ff = useState({ nummer:"", hersteller:"", model:"", baujahr:"", standort:"", einsatzort:"", fahrgestell:"", betrieb_std:"", uvv_datum:"", kaufpreis:"", leasingrate:"", aktiv:true });
  var ff = _ff[0]; var setFf = _ff[1];
  // Stock form
  var _sf = useState({ name:"", unit:"Stk", qty:"0", min_qty:"0", price:"", category:"Sonstiges", serial_nr:"", condition:"new" });
  var sf = _sf[0]; var setSf = _sf[1];
  var _editItem = useState(null); var editItem = _editItem[0]; var setEditItem = _editItem[1];
  var _fSearch = useState(""); var fSearch = _fSearch[0]; var setFSearch = _fSearch[1];
  var _fLoc = useState(""); var fLoc = _fLoc[0]; var setFLoc = _fLoc[1];

  var _musers = useState([]); var dbUsers = _musers[0]; var setDbUsers = _musers[1];
  var _mnied  = useState([]); var dbNiederlassungen = _mnied[0]; var setDbNiederlassungen = _mnied[1];
  var _mset   = useState([]); var dbSettings = _mset[0]; var setDbSettings = _mset[1];

  // подвкладка Mitarbeiter: 'alle' | 'fahrer' | 'pins'
  var _mtab = useState("alle"); var mTab = _mtab[0]; var setMTab = _mtab[1];

  // фильтры в подвкладке "Alle"
  var _fNied = useState("");      var fNied = _fNied[0];     var setFNied = _fNied[1];
  var _fRole = useState("");      var fRole = _fRole[0];     var setFRole = _fRole[1];
  var _fAct  = useState("active"); var fAct  = _fAct[0];      var setFAct  = _fAct[1]; // 'all' | 'active' | 'inactive'

  // редактируемый юзер (объект из users или null = новый, undefined = форма скрыта)
  var _uEdit = useState(undefined); var uEdit = _uEdit[0]; var setUEdit = _uEdit[1];

  function loadUsers() {
    return sbGet("users","select=*&order=name.asc").then(function(r){ setDbUsers(r); return r; });
  }
  function loadNiederlassungen() {
    return sbGet("niederlassungen","select=*&order=name.asc").then(function(r){ setDbNiederlassungen(r||[]); }).catch(function(){ setDbNiederlassungen([]); });
  }
  function loadSettings() {
    return sbGet("app_settings","select=*").then(function(r){ setDbSettings(r||[]); }).catch(function(){ setDbSettings([]); });
  }

  useEffect(function(){
    loadUsers();
    loadNiederlassungen();
    loadSettings();
  },[]);

  function showMsg(m){ setMsg(m); setTimeout(function(){ setMsg(""); }, 3000); }

  function saveVehicle() {
    if (!vf.plate.trim()) { showMsg("Kennzeichen ist Pflicht"); return; }
    setSaving(true);
    sbUpsert("vehicles", Object.assign({}, vf, {
      id: vf.plate.toLowerCase().replace(/\s/g,"-"),
      mileage: parseInt(vf.mileage||"0")||0
    })).then(function(){ setSaving(false); showMsg("✅ Fahrzeug gespeichert"); setVf({ plate:"", brand:"", model:"", type:"truck", tuev:"", insurance:"", uvv:"", next_service:"", mileage:"" }); onRefresh(); })
    .catch(function(e){ setSaving(false); showMsg("Fehler: "+(e.message||e)); });
  }

  function saveForklift() {
    if (!ff.nummer.trim()) { showMsg("Nummer ist Pflicht"); return; }
    setSaving(true);
    sbUpsert("forklifts", Object.assign({}, ff, {
      id: "F"+ff.nummer,
      baujahr: parseInt(ff.baujahr||"0")||null,
      betrieb_std: parseInt(ff.betrieb_std||"0")||null,
      kaufpreis: parseFloat(ff.kaufpreis||"0")||null,
      leasingrate: parseFloat(ff.leasingrate||"0")||null,
    })).then(function(){ setSaving(false); showMsg("✅ Stapler gespeichert"); setFf({ nummer:"", hersteller:"", model:"", baujahr:"", standort:"", einsatzort:"", fahrgestell:"", betrieb_std:"", uvv_datum:"", kaufpreis:"", leasingrate:"", aktiv:true }); onRefresh(); })
    .catch(function(e){ setSaving(false); showMsg("Fehler: "+(e.message||e)); });
  }

  function saveStock() {
    if (!sf.name.trim()) { showMsg("Bezeichnung ist Pflicht"); return; }
    setSaving(true);
    sbUpsert("stock", { id:"S"+Date.now(), name:sf.name.trim(), unit:sf.unit||"Stk", qty:parseInt(sf.qty||"0")||0, min_qty:parseInt(sf.min_qty||"0")||0, price:parseFloat(sf.price||"0")||null })
    .then(function(){ setSaving(false); showMsg("✅ Position gespeichert"); setSf({ name:"", unit:"Stk", qty:"0", min_qty:"0", price:"" }); onRefresh(); })
    .catch(function(e){ setSaving(false); showMsg("Fehler: "+(e.message||e)); });
  }

  // === MITARBEITER: сохранение юзера (новый или редактирование) ===
  function saveUser(u) {
    if (!u.name || !u.name.trim()) { showMsg("Name ist Pflicht"); return Promise.reject("noname"); }
    if (!u.role) { showMsg("Rolle ist Pflicht"); return Promise.reject("norole"); }
    if (!u.niederlassung_id) { showMsg("Niederlassung ist Pflicht"); return Promise.reject("nonied"); }

    // Валидация PIN: пустой допустим (юзер не сможет логиниться), но если задан — должен быть 4 цифры
    var pin = (u.pin||"").trim();
    if (pin && !/^\d{4}$/.test(pin)) { showMsg("PIN muss 4 Ziffern sein"); return Promise.reject("badpin"); }

    // Проверка уникальности PIN в пересекающемся app_access
    if (pin) {
      var apps = u.app_access || [];
      var conflict = dbUsers.find(function(other){
        if (!other.active) return false;
        if (other.id === u.id) return false; // редактируем того же
        if ((other.pin||"") !== pin) return false;
        var oa = other.app_access || [];
        return apps.some(function(a){ return oa.indexOf(a) !== -1; });
      });
      if (conflict) {
        showMsg("PIN bereits vergeben an: " + conflict.name);
        return Promise.reject("pinconflict");
      }
    }

    var id = u.id;
    if (!id) {
      // Новый юзер — id из имени, в lowercase, без пробелов; если занят — добавляем число
      var base = u.name.trim().toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9\-]/g,"");
      if (!base) base = "user";
      id = base;
      var n = 1;
      while (dbUsers.find(function(x){ return x.id === id; })) {
        n++; id = base + "-" + n;
      }
    }

    var avatar = (u.avatar||"").trim();
    if (!avatar) {
      avatar = u.name.trim().split(/\s+/).map(function(w){ return (w[0]||"").toUpperCase(); }).join("").slice(0,2);
    }

    var payload = {
      id: id,
      name: u.name.trim(),
      avatar: avatar,
      role: u.role,
      niederlassung_id: u.niederlassung_id,
      scope_level: u.scope_level || (u.role === "chef" || u.role === "fpl" ? "tenant" : "niederlassung"),
      pin: pin || null,
      app_access: u.app_access || [],
      active: u.active !== false,
      rate_per_hour: u.rate_per_hour ? (parseFloat(u.rate_per_hour)||null) : null,
      notes: (u.notes||"").trim() || null,
      tenant_id: "ltg"
    };

    setSaving(true);
    return sbUpsert("users", payload)
      .then(function(){ setSaving(false); showMsg("✅ Mitarbeiter gespeichert"); setUEdit(undefined); return loadUsers(); })
      .catch(function(e){ setSaving(false); showMsg("Fehler: "+(e.message||e)); throw e; });
  }

  // Защита от lockout: проверяем, что после деактивации останется минимум один активный 'dashboard'-юзер
  function canDeactivate(u) {
    var apps = u.app_access || [];
    if (apps.indexOf("dashboard") === -1) return true;
    var remainingDashUsers = dbUsers.filter(function(x){
      if (x.id === u.id) return false;
      if (!x.active) return false;
      return (x.app_access||[]).indexOf("dashboard") !== -1;
    });
    return remainingDashUsers.length > 0;
  }

  function toggleActive(u) {
    if (u.active && !canDeactivate(u)) {
      showMsg("Letzter aktiver Dashboard-Benutzer — kann nicht deaktiviert werden");
      return;
    }
    var msg = u.active
      ? ("Mitarbeiter \"" + u.name + "\" deaktivieren? Login wird gesperrt, Historie bleibt erhalten.")
      : ("Mitarbeiter \"" + u.name + "\" wieder aktivieren?");
    if (!window.confirm(msg)) return;
    sbPatch("users", u.id, { active: !u.active }).then(function(ok){
      if (ok) { showMsg(u.active ? "✅ Deaktiviert" : "✅ Aktiviert"); loadUsers(); }
      else { showMsg("Fehler beim Speichern"); }
    });
  }

  function resetPin(u) {
    var newPin = window.prompt("Neuer PIN für \"" + u.name + "\" (4 Ziffern, leer = generieren):", "");
    if (newPin === null) return;
    newPin = (newPin||"").trim();
    if (!newPin) newPin = genPin4();
    if (!/^\d{4}$/.test(newPin)) { showMsg("PIN muss 4 Ziffern sein"); return; }

    // Проверка коллизий
    var apps = u.app_access || [];
    var conflict = dbUsers.find(function(other){
      if (!other.active) return false;
      if (other.id === u.id) return false;
      if ((other.pin||"") !== newPin) return false;
      var oa = other.app_access || [];
      return apps.some(function(a){ return oa.indexOf(a) !== -1; });
    });
    if (conflict) { showMsg("PIN bereits vergeben an: " + conflict.name); return; }

    sbPatch("users", u.id, { pin: newPin }).then(function(ok){
      if (ok) {
        showMsg("✅ Neuer PIN: " + newPin);
        window.alert("Neuer PIN für " + u.name + ":\n\n    " + newPin + "\n\nBitte mitteilen!");
        loadUsers();
      } else { showMsg("Fehler beim Speichern"); }
    });
  }

  // Запись настройки (driver_shared_pin / *_fallback_pin)
  function settingValue(k) {
    var s = (dbSettings||[]).find(function(x){ return x.key === k; });
    return s ? (s.value||"") : "";
  }
  function settingUpdated(k) {
    var s = (dbSettings||[]).find(function(x){ return x.key === k; });
    return s ? (s.updated_at || s.created_at || null) : null;
  }
  function saveSetting(k, v) {
    if (!/^\d{4}$/.test(v)) { showMsg("PIN muss 4 Ziffern sein"); return; }
    setSaving(true);
    var existing = (dbSettings||[]).find(function(x){ return x.key === k; });
    if (existing) {
      sbPatchBy("app_settings", "key", k, { value: v, updated_at: new Date().toISOString() })
        .then(function(ok){
          setSaving(false);
          if (ok) { showMsg("✅ Gespeichert"); loadSettings(); }
          else { showMsg("Fehler beim Speichern"); }
        });
    } else {
      // Записи нет — создаём
      sbUpsert("app_settings", { key: k, value: v, updated_at: new Date().toISOString() })
        .then(function(){ setSaving(false); showMsg("✅ Gespeichert"); loadSettings(); })
        .catch(function(e){ setSaving(false); showMsg("Fehler: " + (e.message||e)); });
    }
  }

  function deleteItem(table, id) {
    if (!window.confirm("Wirklich löschen?")) return;
    fetch(SB_URL+"/rest/v1/"+table+"?id=eq."+encodeURIComponent(id), {
      method:"DELETE", headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}
    }).then(function(){ onRefresh(); sbGet("users","select=*&order=name.asc").then(function(r){ setDbUsers(r); }); });
  }

  var TABS = [
    { k:"vehicles",   label:"🚛 Fahrzeuge" },
    { k:"forklifts",  label:"🏗 Stapler" },
    { k:"stock",      label:"📦 Lager" },
    { k:"users",      label:"👥 Mitarbeiter" },
    { k:"standorte",  label:"📍 Standorte" },
  ];

  var VEH_TYPE_OPTS = [
    { k:"truck", l:"LKW" }, { k:"trailer", l:"Auflieger" },
    { k:"semiTrailer", l:"Sattelauflieger" }, { k:"pkw", l:"PKW" },
    { k:"van", l:"Transporter" }, { k:"other", l:"Sonstiges" },
  ];

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div style={{ fontSize:18, fontWeight:900 }}>Einstellungen</div>
        {msg && (
          <div style={{ padding:"8px 14px", borderRadius:10, fontSize:13, fontWeight:700,
            background: msg.startsWith("✅") ? "rgba(34,197,94,0.15)" : "rgba(239,68,68,0.15)",
            color: msg.startsWith("✅") ? "#22c55e" : "#ef4444",
            border:"1px solid " + (msg.startsWith("✅") ? "rgba(34,197,94,0.3)" : "rgba(239,68,68,0.3)") }}>
            {msg}
          </div>
        )}
      </div>

      <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
        {TABS.map(function(t){
          return <button key={t.k} className={"btn-small "+(tab===t.k?"btn-primary":"btn-outline")} onClick={function(){ setTab(t.k); }}>{t.label}</button>;
        })}
      </div>

      {/* FAHRZEUGE */}
      {tab === "vehicles" && (
        <div>
          <div className="panel" style={{ marginBottom:16 }}>
            <div className="panel-hd"><div className="panel-title">Neues Fahrzeug hinzufügen</div></div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
              <div>
                <div className="label-cap">Kennzeichen *</div>
                <input className="inp" style={{ width:"100%" }} value={vf.plate} placeholder="MA-LT 441" onChange={function(e){ setVf(Object.assign({},vf,{plate:e.target.value})); }} />
              </div>
              <div>
                <div className="label-cap">Typ</div>
                <select className="inp" style={{ width:"100%" }} value={vf.type} onChange={function(e){ setVf(Object.assign({},vf,{type:e.target.value})); }}>
                  {VEH_TYPE_OPTS.map(function(o){ return <option key={o.k} value={o.k}>{o.l}</option>; })}
                </select>
              </div>
              <div>
                <div className="label-cap">Marke</div>
                <input className="inp" style={{ width:"100%" }} value={vf.brand} placeholder="MAN, Mercedes..." onChange={function(e){ setVf(Object.assign({},vf,{brand:e.target.value})); }} />
              </div>
              <div>
                <div className="label-cap">Modell</div>
                <input className="inp" style={{ width:"100%" }} value={vf.model} placeholder="TGX, Actros..." onChange={function(e){ setVf(Object.assign({},vf,{model:e.target.value})); }} />
              </div>
              <div>
                <div className="label-cap">TÜV (Datum)</div>
                <input type="date" className="inp" style={{ width:"100%" }} value={vf.tuev} onChange={function(e){ setVf(Object.assign({},vf,{tuev:e.target.value})); }} />
              </div>
              <div>
                <div className="label-cap">Versicherung (Datum)</div>
                <input type="date" className="inp" style={{ width:"100%" }} value={vf.insurance} onChange={function(e){ setVf(Object.assign({},vf,{insurance:e.target.value})); }} />
              </div>
              <div>
                <div className="label-cap">UVV (Datum)</div>
                <input type="date" className="inp" style={{ width:"100%" }} value={vf.uvv} onChange={function(e){ setVf(Object.assign({},vf,{uvv:e.target.value})); }} />
              </div>
              <div>
                <div className="label-cap">Nächstes Service</div>
                <input type="date" className="inp" style={{ width:"100%" }} value={vf.next_service} onChange={function(e){ setVf(Object.assign({},vf,{next_service:e.target.value})); }} />
              </div>
              <div>
                <div className="label-cap">Kilometerstand</div>
                <input className="inp" style={{ width:"100%" }} inputMode="numeric" value={vf.mileage} placeholder="0" onChange={function(e){ setVf(Object.assign({},vf,{mileage:e.target.value})); }} />
              </div>
            </div>
            <button className="btn-primary" style={{ maxWidth:200 }} disabled={saving} onClick={saveVehicle}>
              {saving ? "..." : "+ Fahrzeug speichern"}
            </button>
          </div>

          <div className="panel">
            <div className="panel-hd"><div className="panel-title">Vorhandene Fahrzeuge ({vehicles.length})</div></div>
            {vehicles.length === 0
              ? <div className="empty">Noch keine Fahrzeuge</div>
              : <table className="tbl">
                  <thead><tr><th>Kennzeichen</th><th>Typ</th><th>Marke</th><th>TÜV</th><th>UVV</th><th>km</th><th></th></tr></thead>
                  <tbody>
                    {vehicles.map(function(v){
                      return (
                        <tr key={v.id}>
                          <td><strong>{v.plate}</strong></td>
                          <td style={{ fontSize:12 }}>{VEH_TYPE_OPTS.find(function(o){ return o.k===v.type; }) ? VEH_TYPE_OPTS.find(function(o){ return o.k===v.type; }).l : v.type}</td>
                          <td style={{ fontSize:12 }}>{v.brand||""} {v.model||""}</td>
                          <td style={{ fontSize:12 }}>{fmtDate(v.tuev)||"—"}</td>
                          <td style={{ fontSize:12 }}>{fmtDate(v.uvv)||"—"}</td>
                          <td style={{ fontSize:12 }}>{v.mileage||"—"}</td>
                          <td><button className="btn-danger btn-small" onClick={function(){ deleteItem("vehicles",v.id); }}>✕</button></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
            }
          </div>
        </div>
      )}

      {/* STAPLER */}
      {tab === "forklifts" && (
        <div>
          <div className="panel" style={{ marginBottom:16 }}>
            <div className="panel-hd"><div className="panel-title">Neuen Stapler hinzufügen</div></div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
              <div>
                <div className="label-cap">Nummer *</div>
                <input className="inp" style={{ width:"100%" }} value={ff.nummer} placeholder="128" onChange={function(e){ setFf(Object.assign({},ff,{nummer:e.target.value})); }} />
              </div>
              <div>
                <div className="label-cap">Hersteller</div>
                <input className="inp" style={{ width:"100%" }} value={ff.hersteller} placeholder="Jungheinrich, Linde..." onChange={function(e){ setFf(Object.assign({},ff,{hersteller:e.target.value})); }} />
              </div>
              <div>
                <div className="label-cap">Modell</div>
                <input className="inp" style={{ width:"100%" }} value={ff.model} placeholder="EFG 425k" onChange={function(e){ setFf(Object.assign({},ff,{model:e.target.value})); }} />
              </div>
              <div>
                <div className="label-cap">Baujahr</div>
                <input className="inp" style={{ width:"100%" }} inputMode="numeric" value={ff.baujahr} placeholder="2020" onChange={function(e){ setFf(Object.assign({},ff,{baujahr:e.target.value})); }} />
              </div>
              <div>
                <div className="label-cap">Standort</div>
                <input className="inp" style={{ width:"100%" }} value={ff.standort} placeholder="HOC1, JDWB..." onChange={function(e){ setFf(Object.assign({},ff,{standort:e.target.value})); }} />

                <div className="label-cap">Einsatzort</div>

                <div className="label-cap">Fahrgestellnummer</div>

              <div>
                <div className="label-cap">Betriebsstunden</div>
                <input className="inp" style={{ width:"100%" }} inputMode="numeric" value={ff.betrieb_std} placeholder="12354" onChange={function(e){ setFf(Object.assign({},ff,{betrieb_std:e.target.value})); }} />
              </div>
              <div>
                <div className="label-cap">UVV Datum</div>

          </div>

          <div className="panel">

      method:"DELETE", headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}

// === VERGLEICH ===
function Vergleich({ jobs, invoices, vehicles }) {
  var _sp = useState("month"); var period = _sp[0]; var setPeriod = _sp[1];
  var _sm = useState("cost"); var metric = _sm[0]; var setMetric = _sm[1];
  var verglChartRef = useRef(null);
  var verglChartInst = useRef(null);

  function getPeriodStart(p) {
    var d = new Date();
    if (p === "month")   { d.setDate(1); return d.toLocaleDateString("sv-SE"); }
    if (p === "quarter") { d.setMonth(Math.floor(d.getMonth()/3)*3,1); return d.toLocaleDateString("sv-SE"); }
    if (p === "year")    { d.setMonth(0,1); return d.toLocaleDateString("sv-SE"); }
    return "";
  }

  var start = getPeriodStart(period);
  var filtered = start ? jobs.filter(function(j){ return (j.date||(j.created_at||"").slice(0,10)) >= start; }) : jobs;
  var filtInv  = start ? invoices.filter(function(i){ return (i.date||"") >= start; }) : invoices;

  // Группируем по Niederlassung
  var niedMap = {};
  filtered.forEach(function(j){
    var n = j.workshop_niederlassung_id || "Unbekannt";
    if (!niedMap[n]) niedMap[n] = { jobs:0, cost:0, labor:0, parts:0, min:0, done:0 };
    niedMap[n].jobs++;
    niedMap[n].cost  += (Number(j.labor_cost)||0)+(Number(j.parts_cost)||0);
    niedMap[n].labor += Number(j.labor_cost)||0;
    niedMap[n].parts += Number(j.parts_cost)||0;
    niedMap[n].min   += parseInt(j.work_min||0)||0;
    if (j.status === "done") niedMap[n].done++;
  });
  filtInv.forEach(function(i){
    var veh = vehicles ? vehicles.find(function(v){ return v.plate === i.vehicle_id; }) : null;
    var n = (veh && veh.home_niederlassung_id) || "Unbekannt";
    if (!niedMap[n]) niedMap[n] = { jobs:0, cost:0, labor:0, parts:0, min:0, done:0 };
    niedMap[n].cost += Number(i.amount)||0;
    niedMap[n].parts += Number(i.amount)||0;
  });

  var nieds = Object.keys(niedMap).sort(function(a,b){ return niedMap[b].cost - niedMap[a].cost; });
  var maxVal = nieds.length ? Math.max.apply(null, nieds.map(function(n){ return niedMap[n][metric === "cost" ? "cost" : metric === "jobs" ? "jobs" : "min"] || 0; })) : 1;

  var COLORS = ["#ffa500","#60a5fa","#22c55e","#a855f7","#ef4444","#f59e0b"];

  useEffect(function(){
    if (!verglChartRef.current || nieds.length === 0) return;
    if (verglChartInst.current) verglChartInst.current.destroy();
    var vals = nieds.map(function(n){
      if (metric === "jobs") return niedMap[n].jobs;
      if (metric === "min")  return Math.round(niedMap[n].min/60*10)/10;
      return Math.round(niedMap[n].cost);
    });
    verglChartInst.current = new Chart(verglChartRef.current, {
      type: "bar",
      data: {
        labels: nieds,
        datasets: [{
          data: vals,
          backgroundColor: nieds.map(function(_,i){ return COLORS[i%COLORS.length]+"99"; }),
          borderColor:      nieds.map(function(_,i){ return COLORS[i%COLORS.length]; }),
          borderWidth: 1, borderRadius: 8
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, indexAxis: "y",
        plugins: { legend:{display:false}, tooltip:{ callbacks:{ label:function(ctx){
          if (metric==="jobs") return ctx.parsed.x+" Aufträge";
          if (metric==="min")  return ctx.parsed.x+"h Arbeitszeit";
          return ctx.parsed.x.toLocaleString("de-DE")+" €";
        } } } },
        scales: {
          x:{ ticks:{color:"rgba(255,255,255,0.4)",font:{size:11}}, grid:{color:"rgba(255,255,255,0.05)"} },
          y:{ ticks:{color:"rgba(255,255,255,0.7)",font:{size:13,weight:"700"}}, grid:{display:false} }
        }
      }
    });
    return function(){ if (verglChartInst.current) verglChartInst.current.destroy(); };
  }, [nieds.length, period, metric, jobs.length]);

  if (nieds.length === 0) {
    return (
      <div>
        <div style={{ fontSize:18, fontWeight:900, marginBottom:20 }}>Vergleich — Niederlassungen</div>
        <div className="panel"><div className="empty">Keine Daten für diesen Zeitraum</div></div>
      </div>
    );
  }

  var totalCost = nieds.reduce(function(s,n){ return s+niedMap[n].cost; },0);
  var totalJobs = nieds.reduce(function(s,n){ return s+niedMap[n].jobs; },0);

  return (
    <div>
      <div style={{ display:"flex", gap:8, marginBottom:20, alignItems:"center", flexWrap:"wrap" }}>
        <div style={{ fontSize:18, fontWeight:900, flex:1 }}>Vergleich — Niederlassungen</div>
        <div style={{ display:"flex", gap:6 }}>
          {[["month","Monat"],["quarter","Quartal"],["year","Jahr"],["all","Gesamt"]].map(function(p){
            return <button key={p[0]} className={"btn-small "+(period===p[0]?"btn-primary":"btn-outline")} onClick={function(){ setPeriod(p[0]); }}>{p[1]}</button>;
          })}
        </div>
        <div style={{ display:"flex", gap:6 }}>
          {[["cost","€ Kosten"],["jobs","Aufträge"],["min","Zeit"]].map(function(m){
            return <button key={m[0]} className={"btn-small "+(metric===m[0]?"btn-primary":"btn-outline")} onClick={function(){ setMetric(m[0]); }}>{m[1]}</button>;
          })}
        </div>
      </div>

      {/* SUMMARY KPI */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:20 }}>
        <div className="kpi-card orange">
          <div className="kpi-val">{totalCost.toLocaleString("de-DE",{maximumFractionDigits:0})} €</div>
          <div className="kpi-label">Gesamtkosten</div>
        </div>
        <div className="kpi-card blue">
          <div className="kpi-val">{totalJobs}</div>
          <div className="kpi-label">Aufträge gesamt</div>
        </div>
        <div className="kpi-card green">
          <div className="kpi-val">{nieds.length}</div>
          <div className="kpi-label">Niederlassungen</div>
        </div>
      </div>

      {/* CHART */}
      <div className="panel" style={{ marginBottom:20 }}>
        <div style={{ height: Math.max(180, nieds.length * 52) }}>
          <canvas ref={verglChartRef}></canvas>
        </div>
      </div>

      {/* DETAIL TABELLE */}
      <div className="panel">
        <div className="panel-hd"><div className="panel-title">Detail-Vergleich</div></div>
        {nieds.map(function(n, idx){
          var d = niedMap[n];
          var pct = totalCost > 0 ? Math.round(d.cost/totalCost*100) : 0;
          var donePct = d.jobs > 0 ? Math.round(d.done/d.jobs*100) : 0;
          var avgMin = d.jobs > 0 ? Math.round(d.min/d.jobs) : 0;
          return (
            <div key={n} style={{ padding:"16px 0", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:10 }}>
                <div style={{ width:10, height:10, borderRadius:"50%", background:COLORS[idx%COLORS.length], flexShrink:0 }}></div>
                <div style={{ fontWeight:800, fontSize:15, flex:1 }}>{n}</div>
                <div style={{ fontSize:13, color:"#ffa500", fontWeight:700 }}>{d.cost.toLocaleString("de-DE",{maximumFractionDigits:0})} €</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", minWidth:60, textAlign:"right" }}>{pct}% Anteil</div>
              </div>
              <div style={{ height:5, borderRadius:3, background:"rgba(255,255,255,0.07)", marginBottom:10, overflow:"hidden" }}>
                <div style={{ height:"100%", borderRadius:3, background:COLORS[idx%COLORS.length], width:pct+"%", transition:"width 0.5s ease" }}></div>
              </div>
              <div style={{ display:"flex", gap:20, flexWrap:"wrap" }}>
                <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>🔧 <strong style={{ color:"#fff" }}>{d.jobs}</strong> Aufträge</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>✓ <strong style={{ color:"#22c55e" }}>{donePct}%</strong> erledigt</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>⏱ <strong style={{ color:"#fff" }}>{fmtMin(avgMin)}</strong> Ø/Auftrag</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>🔩 <strong style={{ color:"#60a5fa" }}>{d.labor.toLocaleString("de-DE",{maximumFractionDigits:0})} €</strong> Lohn</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>⚙ <strong style={{ color:"#a855f7" }}>{d.parts.toLocaleString("de-DE",{maximumFractionDigits:0})} €</strong> Teile</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

        ws.onopen = function(){
          ws.send(JSON.stringify({ topic:"realtime:public:alerts", event:"phx_join", payload:{}, ref:String(refCounter++) }));
          ws.send(JSON.stringify({ topic:"realtime:public:jobs", event:"phx_join", payload:{}, ref:String(refCounter++) }));
          ws.send(JSON.stringify({ topic:"realtime:public:inspections", event:"phx_join", payload:{}, ref:String(refCounter++) }));
          if (hbTimer) clearInterval(hbTimer);
          hbTimer = setInterval(function(){
            try { ws.send(JSON.stringify({ topic:"phoenix", event:"heartbeat", payload:{}, ref:String(refCounter++) })); } catch(e){}
          }, 25000);
        };
        ws.onmessage = function(e){
          try {
            var msg = JSON.parse(e.data);
            if (msg.event === "INSERT" || msg.event === "UPDATE") loadAll();
          } catch(err){}
        };
        ws.onerror = function(){};
        ws.onclose = function(){
          if (hbTimer) { clearInterval(hbTimer); hbTimer = null; }
          if (!stopped) { if (reconnectTimer) clearTimeout(reconnectTimer); reconnectTimer = setTimeout(connect, 3000); }
        };
      } catch(e){}
    }

    connect();
    // Fallback polling каждые 60 сек
    var interval = setInterval(function(){ loadAll(); }, 60000);
    return function(){
      stopped = true;
      clearInterval(interval);
      if (hbTimer) clearInterval(hbTimer);
      if (reconnectTimer) clearTimeout(reconnectTimer);
      if (wsRef2.current) { try { wsRef2.current.close(); } catch(e){} }
    };
  }, []);

  // === SOS Unfall: звук + слежение за новыми SOS-алертами ===
  // Воспроизводим тревожный звук при обнаружении нового SOS-алерта.
  // Используем Web Audio API без файлов, чтобы не нужны были звуковые файлы на сервере.
  var sosSeenRef = useRef({}); // id виденных SOS, чтобы звук не повторялся
  function playSosSound() {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      // Сирена: чередование 800Hz и 1200Hz, 4 цикла
      var times = [
        [800, 0,     0.35],
        [1200, 0.4,  0.35],
        [800, 0.8,   0.35],
        [1200, 1.2,  0.35],
        [800, 1.6,   0.35],
        [1200, 2.0,  0.35],
      ];
      times.forEach(function(t){
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = t[0];
        gain.gain.setValueAtTime(0.0001, ctx.currentTime + t[1]);
        gain.gain.exponentialRampToValueAtTime(0.4, ctx.currentTime + t[1] + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + t[1] + t[2]);
        osc.connect(gain).connect(ctx.destination);
        osc.start(ctx.currentTime + t[1]);
        osc.stop(ctx.currentTime + t[1] + t[2]);
      });
      setTimeout(function(){ try { ctx.close(); } catch(e){} }, 3000);
    } catch(e) { console.warn("SOS sound failed:", e); }
  }

  // Активные SOS-алерты (открытые, не done/rejected)

      try { localStorage.setItem("werkflow_dash_user", JSON.stringify(u)); } catch(e) {}
      setUser(u); setStage("app");
    }} />;
  }
  return <AppShell user={user} onLogout={function(){
    try { localStorage.removeItem("werkflow_dash_user"); } catch(e) {}
    setUser(null); setStage("pin");
  }} />;
}

function AppWithModals() {
  return React.createElement(React.Fragment, null,
    React.createElement(App),
    React.createElement(ExportModal)
  );
}
// === ErrorBoundary — ловит падения React-компонентов и показывает экран вместо белого экрана ===
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, errorMsg: "" };
  }
  static getDerivedStateFromError(err) {
    return { hasError: true, errorMsg: (err && err.message) ? err.message : String(err) };
  }
  componentDidCatch(err, info) {
    console.error("App crash:", err, info);
  }
  render() {
    if (this.state.hasError) {
      return React.createElement("div", {
        style: {
          minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
          background:"#0a0a0a", color:"#fff", padding:24, fontFamily:"system-ui,sans-serif"
        }
      },
        React.createElement("div", { style:{ maxWidth:400, textAlign:"center" } },
          React.createElement("div", { style:{ fontSize:48, marginBottom:16 } }, "⚠️"),
          React.createElement("div", { style:{ fontSize:20, fontWeight:700, marginBottom:8 } }, "Etwas ist schiefgelaufen"),
          React.createElement("div", { style:{ fontSize:13, color:"rgba(255,255,255,0.6)", marginBottom:20, wordBreak:"break-word" } }, this.state.errorMsg),
          React.createElement("button", {
            onClick: function(){ window.location.reload(); },
            style: {
              background:"#ffa500", color:"#000", border:"none", padding:"12px 24px",
              borderRadius:10, fontWeight:800, fontSize:14, cursor:"pointer"
            }
          }, "🔄 App neu laden")
        )
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(AppWithModals))
);
