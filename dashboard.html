<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LTG Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing:border-box; }
    body { margin:0; background:#f0f4f8; color:#1a2332; font-family:Arial, Helvetica, sans-serif; }
    .top { background:#1a3a6b; color:white; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; }
    .logo { font-size:30px; font-weight:900; letter-spacing:-1px; }
    .user { font-size:13px; color:#dbeafe; text-align:right; }
    .logout { background:transparent; color:#dbeafe; border:1px solid rgba(255,255,255,.25); padding:8px 10px; border-radius:10px; font-weight:800; cursor:pointer; }
    .wrap { max-width:1120px; margin:0 auto; padding:20px; }
    h1 { margin:8px 0 18px; font-size:26px; }
    .kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
    .kpi { background:white; border:1px solid #d0dbe8; border-radius:18px; padding:18px; box-shadow:0 8px 20px rgba(26,58,107,.07); }
    .kpi .label { color:#4a6080; font-size:12px; font-weight:900; text-transform:uppercase; letter-spacing:.5px; }
    .kpi .value { font-size:34px; font-weight:900; margin-top:8px; }
    .grid { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-top:16px; }
    .panel { background:white; border:1px solid #d0dbe8; border-radius:18px; padding:16px; box-shadow:0 8px 20px rgba(26,58,107,.07); }
    .panel h2 { font-size:18px; margin:0 0 12px; }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:10px 8px; border-bottom:1px solid #e2e8f0; font-size:14px; vertical-align:top; }
    th { color:#4a6080; font-size:12px; text-transform:uppercase; }
    .badge { display:inline-block; padding:5px 8px; border-radius:999px; font-weight:900; font-size:11px; background:#e2e8f0; }
    .urgent { background:#fee2e2; color:#b91c1c; }
    .ok { background:#dcfce7; color:#15803d; }
    .warn { background:#fef3c7; color:#92400e; }
    .empty { color:#7a90a8; padding:20px; text-align:center; }
    @media (max-width: 920px) {
      .kpis { grid-template-columns:1fr 1fr; }
      .grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="logo">LTG</div>
    <div>
      <div id="user" class="user">Login wird geprüft...</div>
      <button id="logout" class="logout" style="display:none">Abmelden</button>
    </div>
  </header>

  <main class="wrap">
    <h1>Dashboard</h1>

    <section class="kpis">
      <div class="kpi"><div class="label">Open Jobs</div><div id="kOpen" class="value">—</div></div>
      <div class="kpi"><div class="label">Critical</div><div id="kCritical" class="value">—</div></div>
      <div class="kpi"><div class="label">Waiting Parts</div><div id="kParts" class="value">—</div></div>
      <div class="kpi"><div class="label">Done Today</div><div id="kDone" class="value">—</div></div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Aktuelle Aufträge</h2>
        <div id="jobsTable"></div>
      </div>
      <div class="panel">
        <h2>Nach Quelle</h2>
        <div id="sourceBox"></div>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Waschhalle — heutige Aufträge</h2>
        <div id="washTable"></div>
      </div>
      <div class="panel">
        <h2>Waschhalle — letzte Tage</h2>
        <div id="washSummary"></div>
      </div>
    </section>
  </main>

  <script>
    const SB_URL = "https://vtswzvrflqoueowylidy.supabase.co";
    const SB_KEY = "sb_publishable_8z54aRy2nVSWkT4n87ACjw_6StWhUxz";
    const supa = window.supabase.createClient(SB_URL, SB_KEY);

    let session = null;
    let jobs = [];
    let washOrders = [];
    let washSummary = [];

    async function authHeaders() {
      const r = await supa.auth.getSession();
      session = r.data.session;
      if (!session) {
        window.location.href = "login.html";
        throw new Error("not logged in");
      }
      return {
        "apikey": SB_KEY,
        "Authorization": "Bearer " + session.access_token,
        "Content-Type": "application/json"
      };
    }

    async function checkAuth() {
      const r = await supa.auth.getSession();
      session = r.data.session;
      if (!session) {
        window.location.href = "login.html";
        return false;
      }
      document.getElementById("user").textContent = (session.user.email || "Dashboard") + " · DASHBOARD";
      document.getElementById("logout").style.display = "inline-block";
      return true;
    }

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, function(c) {
        return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"})[c];
      });
    }

    function todayIso() {
      return new Date().toISOString().slice(0,10);
    }

    function isOpen(j) {
      return !["done","closed","cancelled"].includes(j.status);
    }

    async function loadData() {
      const headers = await authHeaders();

      const j = await fetch(SB_URL + "/rest/v1/jobs?select=*&order=created_at.desc&limit=200", { headers });
      jobs = j.ok ? await j.json() : [];

      try {
        const w = await fetch(SB_URL + "/rest/v1/v_wash_orders_dashboard?select=*&order=created_at.desc&limit=100", { headers });
        washOrders = w.ok ? await w.json() : [];
      } catch(e) {
        washOrders = [];
      }

      try {
        const s = await fetch(SB_URL + "/rest/v1/v_wash_daily_summary?select=*&limit=14", { headers });
        washSummary = s.ok ? await s.json() : [];
      } catch(e) {
        washSummary = [];
      }

      render();
    }

    function render() {
      const open = jobs.filter(isOpen);
      document.getElementById("kOpen").textContent = open.length;
      document.getElementById("kCritical").textContent = open.filter(j => j.urgency === "critical").length;
      document.getElementById("kParts").textContent = open.filter(j => j.status === "waiting_parts").length;
      document.getElementById("kDone").textContent = jobs.filter(j => (j.work_finished_at || j.closed_at || "").slice(0,10) === todayIso()).length;

      const rows = open.slice(0,50);
      document.getElementById("jobsTable").innerHTML = !rows.length
        ? '<div class="empty">Keine offenen Aufträge.</div>'
        : '<table><thead><tr><th>Asset</th><th>Quelle</th><th>Status</th><th>Mechaniker</th></tr></thead><tbody>' +
          rows.map(j => '<tr><td><b>'+escapeHtml(j.asset_label || "-")+'</b><br><span style="color:#7a90a8">'+escapeHtml(j.description_de || j.description_raw || "")+'</span></td><td>'+escapeHtml(j.source_app || "")+'</td><td><span class="badge '+(j.urgency==="critical"?"urgent":j.status==="waiting_parts"?"warn":"")+'">'+escapeHtml(j.status || "new")+'</span></td><td>'+escapeHtml(j.assigned_mechanic_name || "-")+'</td></tr>').join("") +
          '</tbody></table>';

      const bySource = {};
      open.forEach(j => bySource[j.source_app || "unknown"] = (bySource[j.source_app || "unknown"] || 0) + 1);
      document.getElementById("sourceBox").innerHTML = Object.keys(bySource).map(k =>
        '<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #e2e8f0"><b>'+escapeHtml(k)+'</b><span class="badge">'+bySource[k]+'</span></div>'
      ).join("") || '<div class="empty">Keine Daten.</div>';

      const todayWash = washOrders.filter(w => (w.work_date || "").slice(0,10) === todayIso());
      if (!todayWash.length) {
        document.getElementById("washTable").innerHTML = '<div class="empty">Keine Waschhalle-Daten heute.</div>';
      } else {
        document.getElementById("washTable").innerHTML =
          '<table><thead><tr><th>Fahrzeug</th><th>Waschtyp</th><th>Preis</th><th>Status</th></tr></thead><tbody>' +
          todayWash.slice(0,50).map(w =>
            '<tr><td><b>'+escapeHtml(w.plate_number || w.fleet_number || "-")+'</b><br><span style="color:#7a90a8">'+escapeHtml((w.vehicle_brand || "") + " " + (w.vehicle_model || ""))+'</span></td><td>'+escapeHtml(w.wash_type_name || "-")+'<br><span style="color:#7a90a8">'+escapeHtml(String(w.duration_minutes || 0))+' min</span></td><td><b>'+Number(w.price_eur || 0).toFixed(2)+' €</b></td><td><span class="badge '+(w.status==="archived"?"ok":w.status==="done"?"warn":"")+'">'+escapeHtml(w.status || "")+'</span></td></tr>'
          ).join("") + '</tbody></table>';
      }

      document.getElementById("washSummary").innerHTML = !washSummary.length
        ? '<div class="empty">Keine Zusammenfassung.</div>'
        : washSummary.slice(0,10).map(s =>
            '<div style="display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid #e2e8f0"><div><b>'+escapeHtml(s.work_date || "-")+'</b><br><span style="color:#7a90a8">'+escapeHtml(String(s.duration_minutes || 0))+' min</span></div><div style="text-align:right"><b>'+Number(s.revenue_eur || 0).toFixed(2)+' €</b><br><span class="badge">'+escapeHtml(String(s.completed_orders || 0))+' Aufträge</span></div></div>'
          ).join("");
    }

    document.getElementById("logout").onclick = async function() {
      await supa.auth.signOut();
      window.location.href = "login.html";
    };

    (async function boot() {
      if (await checkAuth()) {
        await loadData();
        setInterval(loadData, 30000);
      }
    })();
  </script>
</body>
</html>
