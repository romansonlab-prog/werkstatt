<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LTG Mechanic App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing:border-box; }
    body { margin:0; background:#f0f4f8; color:#1a2332; font-family:Arial, Helvetica, sans-serif; }
    .top { background:#1a3a6b; color:white; padding:16px; display:flex; justify-content:space-between; align-items:center; }
    .logo { font-size:28px; font-weight:900; letter-spacing:-1px; }
    .user { font-size:13px; color:#dbeafe; text-align:right; }
    .wrap { max-width:760px; margin:0 auto; padding:18px; }
    h1 { margin:10px 0 16px; font-size:24px; }
    .tabs { display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; }
    .tab { border:1px solid #d0dbe8; background:white; color:#1a3a6b; padding:10px 14px; border-radius:12px; font-weight:900; cursor:pointer; white-space:nowrap; }
    .tab.active { background:#1a3a6b; color:white; }
    .card { background:white; border:1px solid #d0dbe8; border-radius:18px; padding:16px; margin:12px 0; box-shadow:0 8px 20px rgba(26,58,107,.07); }
    .row { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .badge { display:inline-block; padding:5px 9px; border-radius:999px; font-size:11px; font-weight:900; background:#e2e8f0; color:#334155; }
    .urgent { background:#fee2e2; color:#b91c1c; }
    .asset { font-size:18px; font-weight:900; margin:10px 0 5px; }
    .desc { color:#4a6080; line-height:1.35; margin:8px 0 14px; }
    .meta { color:#7a90a8; font-size:13px; line-height:1.5; }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
    button { height:46px; border:0; border-radius:12px; font-weight:900; font-size:14px; cursor:pointer; }
    .primary { background:#1a3a6b; color:white; }
    .green { background:#16a34a; color:white; }
    .yellow { background:#c8a84b; color:#10254a; }
    .red { background:#dc2626; color:white; }
    .ghost { background:#e2e8f0; color:#1a2332; }
    .logout { background:transparent; color:#dbeafe; border:1px solid rgba(255,255,255,.25); padding:8px 10px; height:auto; }
    .empty { text-align:center; color:#7a90a8; margin-top:40px; }
  </style>
</head>
<body>
  <header class="top">
    <div class="logo">LTG</div>
    <div>
      <div id="user" class="user">Login wird geprüft...</div>
      <button id="logout" class="logout" style="display:none">Abmelden</button>
    </div>
  </header>

  <main class="wrap">
    <h1>Mechanic App</h1>
    <div class="tabs" id="tabs"></div>
    <div id="list"></div>
  </main>

  <script>
    const SB_URL = 'https://vtswzvrflqoueowylidy.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0c3d6dnJmbHFvdWVvd3lsaWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0OTY4NTEsImV4cCI6MjA5MjA3Mjg1MX0.xfsewg1ZGW4UDlNJAAYR-wwXStcVJIWOyCAOavuxnRI';
    const supa = window.supabase.createClient(SB_URL, SB_KEY);

    let session = null;
    let profile = null;
    let jobs = [];
    let activeFilter = "open";

    const filters = [
      ["open", "Offen"],
      ["urgent", "Dringend"],
      ["mine", "Meine"],
      ["waiting_parts", "Wartet Teile"],
      ["done", "Erledigt"]
    ];

    async function authHeaders(prefer) {
      const r = await supa.auth.getSession();
      session = r.data.session;
      if (!session) {
        window.location.href = "login.html";
        throw new Error("not logged in");
      }
      return {
        "apikey": SB_KEY,
        "Authorization": "Bearer " + session.access_token,
        "Content-Type": "application/json",
        "Prefer": prefer || "return=minimal"
      };
    }

    async function checkAuth() {
      const r = await supa.auth.getSession();
      session = r.data.session;
      if (!session) {
        window.location.href = "login.html";
        return false;
      }

      const res = await fetch(SB_URL + "/rest/v1/user_profiles?user_id=eq." + session.user.id + "&select=role,display_name,active", {
        headers: await authHeaders()
      });
      const data = await res.json();
      profile = data && data[0] ? data[0] : null;

      if (!profile || !profile.active || ["mechanic","admin"].indexOf(profile.role) === -1) {
        alert("Kein Zugriff auf Mechanic App.");
        window.location.href = "login.html";
        return false;
      }

      document.getElementById("user").textContent = profile.display_name + " · " + profile.role.toUpperCase();
      document.getElementById("logout").style.display = "inline-block";
      return true;
    }

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, function(c) {
        return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"})[c];
      });
    }

    async function loadJobs() {
      const res = await fetch(SB_URL + "/rest/v1/jobs?select=*&order=created_at.desc&limit=200", {
        headers: await authHeaders()
      });
      jobs = await res.json();
      render();
    }

    async function addLog(job, action, note) {
      await fetch(SB_URL + "/rest/v1/job_work_logs", {
        method: "POST",
        headers: await authHeaders("return=minimal"),
        body: JSON.stringify({
          job_id: job.id,
          mechanic_name: profile.display_name,
          action_type: action,
          note: note || ""
        })
      });
    }

    async function updateJob(job, patch, action, note) {
      await fetch(SB_URL + "/rest/v1/jobs?id=eq." + job.id, {
        method: "PATCH",
        headers: await authHeaders("return=minimal"),
        body: JSON.stringify(patch)
      });
      await addLog(job, action, note);
      await loadJobs();
    }

    function visibleJobs() {
      if (activeFilter === "urgent") return jobs.filter(j => j.urgency === "critical" && !["done","closed","cancelled"].includes(j.status));
      if (activeFilter === "mine") return jobs.filter(j => j.assigned_mechanic_name === profile.display_name && !["closed","cancelled"].includes(j.status));
      if (activeFilter === "waiting_parts") return jobs.filter(j => j.status === "waiting_parts");
      if (activeFilter === "done") return jobs.filter(j => ["done","closed"].includes(j.status));
      return jobs.filter(j => !["done","closed","cancelled"].includes(j.status));
    }

    function renderTabs() {
      document.getElementById("tabs").innerHTML = filters.map(f => 
        '<button class="tab '+(activeFilter===f[0]?'active':'')+'" onclick="setFilter(\''+f[0]+'\')">'+f[1]+'</button>'
      ).join("");
    }

    window.setFilter = function(f) {
      activeFilter = f;
      render();
    }

    function actionButtons(job) {
      if (job.status === "new") return '<button class="primary" onclick="acceptJob(\''+job.id+'\')">Übernehmen</button>';
      if (job.status === "assigned") return '<button class="yellow" onclick="travelJob(\''+job.id+'\')">Fahrt starten</button><button class="ghost" onclick="startJob(\''+job.id+'\')">Direkt starten</button>';
      if (job.status === "travel_started") return '<button class="primary" onclick="arriveJob(\''+job.id+'\')">Angekommen</button>';
      if (job.status === "arrived") return '<button class="green" onclick="startJob(\''+job.id+'\')">Arbeit starten</button>';
      if (job.status === "in_progress") return '<button class="yellow" onclick="waitParts(\''+job.id+'\')">Wartet Teile</button><button class="green" onclick="doneJob(\''+job.id+'\')">Erledigt</button>';
      if (job.status === "waiting_parts") return '<button class="green" onclick="startJob(\''+job.id+'\')">Weiterarbeiten</button><button class="green" onclick="doneJob(\''+job.id+'\')">Erledigt</button>';
      return '<button class="ghost" disabled>Keine Aktion</button>';
    }

    function render() {
      renderTabs();
      const list = document.getElementById("list");
      const arr = visibleJobs();
      if (!arr.length) {
        list.innerHTML = '<div class="empty">Keine Aufträge.</div>';
        return;
      }
      list.innerHTML = arr.map(j => {
        const urgent = j.urgency === "critical";
        return '<div class="card">' +
          '<div class="row"><span class="badge '+(urgent?'urgent':'')+'">'+escapeHtml(j.urgency || "medium")+'</span><span class="badge">'+escapeHtml(j.status || "new")+'</span></div>' +
          '<div class="asset">'+escapeHtml(j.asset_label || "Ohne Fahrzeug")+'</div>' +
          '<div class="desc">'+escapeHtml(j.description_de || j.description_raw || "Keine Beschreibung")+'</div>' +
          '<div class="meta">Quelle: '+escapeHtml(j.source_app || "")+' · Typ: '+escapeHtml(j.source_type || "")+'<br>Ort: '+escapeHtml(j.location_label || "-")+'<br>Melder: '+escapeHtml(j.reporter_name || "-")+'</div>' +
          '<div class="actions">'+actionButtons(j)+'</div>' +
        '</div>';
      }).join("");
    }

    function byId(id) { return jobs.find(j => j.id === id); }

    window.acceptJob = id => {
      const j = byId(id);
      updateJob(j, { status:"assigned", assigned_mechanic_name:profile.display_name, assigned_at:new Date().toISOString() }, "assigned", "Job accepted");
    };
    window.travelJob = id => {
      const j = byId(id);
      updateJob(j, { status:"travel_started", travel_started_at:new Date().toISOString() }, "travel_start", "Travel started");
    };
    window.arriveJob = id => {
      const j = byId(id);
      updateJob(j, { status:"arrived", arrived_at:new Date().toISOString() }, "arrived", "Arrived on site");
    };
    window.startJob = id => {
      const j = byId(id);
      updateJob(j, { status:"in_progress", work_started_at:new Date().toISOString(), assigned_mechanic_name:profile.display_name }, "work_start", "Work started");
    };
    window.waitParts = id => {
      const j = byId(id);
      updateJob(j, { status:"waiting_parts" }, "waiting_parts", "Waiting for parts");
    };
    window.doneJob = id => {
      const j = byId(id);
      updateJob(j, { status:"done", work_finished_at:new Date().toISOString() }, "work_end", "Work done");
    };

    document.getElementById("logout").onclick = async function() {
      await supa.auth.signOut();
      window.location.href = "login.html";
    };

    (async function boot() {
      if (await checkAuth()) {
        await loadJobs();
        setInterval(loadJobs, 30000);
      }
    })();
  </script>
</body>
</html>
